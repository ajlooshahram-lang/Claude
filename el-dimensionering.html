// ===== EV CHARGER MODULE (DS/HD 60364-7-722) =====
function calcEVCableSize(power, phases, length, loadMgmt) {
  // Continuous load factor per 722.531.1 = 1.0 (EV chargers rated for continuous duty)
  var contFactor = 1.0;
  var voltage = phases === '3' ? 400 : 230;
  var current = phases === '3' ? (power * 1000) / (Math.sqrt(3) * voltage) : (power * 1000) / voltage;
  var designCurrent = current * contFactor;
  // Load management reduction (conservative: static=0.9, dynamic=0.75, per 722.311.1)
  if (loadMgmt === 'static') designCurrent *= 0.9;
  else if (loadMgmt === 'dynamic') designCurrent *= 0.75;
  // Cable sizing: pick smallest Cu XLPE cable that carries designCurrent
  // Using standard cable sizes and their Iz ratings (method C, Cu XLPE)
  var cableSizes = [
    {size: 1.5, iz: 23}, {size: 2.5, iz: 32}, {size: 4, iz: 42},
    {size: 6, iz: 54}, {size: 10, iz: 73}, {size: 16, iz: 98},
    {size: 25, iz: 131}, {size: 35, iz: 162}, {size: 50, iz: 196}
  ];
  var selected = cableSizes[cableSizes.length - 1];
  for (var i = 0; i < cableSizes.length; i++) {
    if (cableSizes[i].iz >= designCurrent) { selected = cableSizes[i]; break; }
  }
  // Voltage drop check (conservative: max 3% for dedicated EV circuit)
  var r = 0.0183 / selected.size; // approx Cu resistance ohm/m at 70C
  var vdrop = phases === '3' ? Math.sqrt(3) * designCurrent * (length / 1000) * r * 1000 : 2 * designCurrent * (length / 1000) * r * 1000;
  var vdropPercent = (vdrop / voltage) * 100;
  return { current: current, designCurrent: designCurrent, cableSize: selected.size, iz: selected.iz, vdropPercent: vdropPercent, contFactor: contFactor };
}

function getEVRcdType(chargerType) {
  // Per 722.531.2: Mode 3 chargers with onboard DC charging require Type B RCD
  // Mode 2 with Type A + 6mA DC detection acceptable per 722.531.2.101
  if (chargerType === 'mode3') return { type: 'Type B', clause: '722.531.2' };
  return { type: 'Type A + 6mA DC', clause: '722.531.2.101' };
}

// ===== EARTHING & BONDING MODULE (DS/HD 60364-5-54) =====
function calcEarthResistance(soilRes, electrodeType, electrodeLength) {
  // Earth electrode resistance formulas per DS/HD 60364-5-54 section 542
  var R;
  switch (electrodeType) {
    case 'rod':
      // Vertical rod: R = rho / (2 * pi * L) (simplified Dwight formula)
      R = soilRes / (2 * Math.PI * electrodeLength);
      break;
    case 'strip':
      // Horizontal strip: R = rho / (pi * L) * ln(2L/d), d~0.03m typical
      R = (soilRes / (Math.PI * electrodeLength)) * Math.log(2 * electrodeLength / 0.03);
      break;
    case 'plate':
      // Plate electrode: R = rho / (4 * sqrt(A/pi)), A = L*L
      var area = electrodeLength * electrodeLength;
      R = soilRes / (4 * Math.sqrt(area / Math.PI));
      break;
    case 'foundation':
      // Foundation earth: R = rho / (2 * pi * equivalent_radius), conservative approx
      var equivR = Math.sqrt(electrodeLength * electrodeLength / Math.PI);
      R = soilRes / (2 * Math.PI * equivR);
      break;
    default:
      R = soilRes / (2 * Math.PI * electrodeLength);
  }
  return R;
}

function getMinPESize(phaseSize) {
  // Per Table 54.1 (DS/HD 60364-5-54 section 543)
  if (phaseSize <= 16) return phaseSize; // S_PE = S_phase for S <= 16
  if (phaseSize <= 35) return 16; // S_PE = 16 for 16 < S <= 35
  return phaseSize / 2; // S_PE = S/2 for S > 35
}

}

// ===== HARMONICS / NEUTRAL SIZING MODULE (IEC 60364 section 523.6.3) =====
function calcNeutralFactor(thdRange, balance) {
  // Per IEC 60364 section 523.6.3 and IEC/TR 60725:
  // THD-N 0-15%: standard sizing, factor 1.0, no reduction allowed
  // THD-N 15-33%: neutral same as phase (factor 1.0, no reduction)
  // THD-N 33-45%: neutral must be oversized, factor 1.45
  // THD-N >45%: neutral must be oversized, factor 1.45 (minimum)
  switch (thdRange) {
    case '0-15': return 1.0;
    case '15-33': return 1.0;
    case '33-45': return 1.45;
    case '>45': return 1.45;
    default: return 1.0;
  }
}

// ===== MOTOR STARTER MODULE (IEC 60947-4-1) =====
function calcMotorFLC(powerKW, voltage, phases) {
  // FLC = P / (sqrt(3) * U * cos_phi * eta)
  // Conservative: cos_phi=0.85, eta=0.88 for standard induction motors
  var cosPhi = 0.85;
  var eta = 0.88;
  if (phases === '1') {
    return (powerKW * 1000) / (parseFloat(voltage) * cosPhi * eta);
  }
  return (powerKW * 1000) / (Math.sqrt(3) * parseFloat(voltage) * cosPhi * eta);
}

function getNextContactorSize(flc) {
  // Standard contactor sizes per IEC 60947-4-1
  var sizes = [9, 12, 16, 18, 25, 32, 40, 50, 65, 80, 95, 115, 150, 185, 225, 265, 330, 400, 500, 630];
  for (var i = 0; i < sizes.length; i++) {
    if (sizes[i] >= flc) return sizes[i];
  }
  return sizes[sizes.length - 1];
}

function getMotorSCPD(flc, startType, coordType) {
  // Short-circuit protection sizing per IEC 60947-4-1
  // Type 2 coordination requires MPCB or fuse rated for motor starting
  var startingMultiple = 1;
  switch(startType) {
    case 'DOL': startingMultiple = 8; break;
    case 'Star-Delta': startingMultiple = 2.7; break;
    case 'Soft': startingMultiple = 4; break;
    case 'VFD': startingMultiple = 1.5; break;
  }
  var scpdRating = Math.ceil(flc * 1.3); // Minimum 1.3x FLC for cable protection
  var fuseRating = Math.ceil(flc * startingMultiple * 0.8); // Fuse must withstand starting current
  // Standard fuse sizes
  var fuseSizes = [2, 4, 6, 10, 16, 20, 25, 32, 40, 50, 63, 80, 100, 125, 160, 200, 250, 315, 400, 500, 630];
  var selectedFuse = fuseSizes[fuseSizes.length - 1];
  for (var i = 0; i < fuseSizes.length; i++) {
    if (fuseSizes[i] >= fuseRating) { selectedFuse = fuseSizes[i]; break; }
  }
  return { rating: scpdRating, fuseSize: selectedFuse, startMult: startingMultiple, type: coordType === '2' ? 'MPCB' : 'gG Fuse + Contactor' };
}

// ===== CABLE TRAY FILL MODULE =====
function calcTrayFill(trayType, trayWidth, trayDepth, cables) {
  // Fill factor limits per NEMA VE-2 / IEC 61537 guidance
  var fillLimit = 0.50; // 50% for ladder and perforated
  if (trayType === 'solid') fillLimit = 0.40; // 40% for solid bottom

  var usableArea = trayWidth * trayDepth * fillLimit; // mm^2
  var totalCableArea = 0;
  cables.forEach(function(od) {
    totalCableArea += Math.PI * (od / 2) * (od / 2);
  });

  var fillPct = (trayWidth * trayDepth > 0) ? (totalCableArea / (trayWidth * trayDepth)) * 100 : 0;
  var remaining = usableArea - totalCableArea;

  return {
    totalCableArea: totalCableArea,
    usableArea: usableArea,
    totalArea: trayWidth * trayDepth,
    fillPct: fillPct,
    fillLimit: fillLimit * 100,
    pass: totalCableArea <= usableArea,
    remaining: remaining
  };
}

// ===== ENERGY METER/CT SIZING MODULE (EN 50470 + MID 2014/32/EU) =====
function calcCTSizing(maxCurrent) {
  // CT primary must be >= 1.2x max load current for headroom
  var requiredPrimary = maxCurrent * 1.2;
  var standardRatios = [
    {primary: 50, secondary: 5, label: '50/5'},
    {primary: 75, secondary: 5, label: '75/5'},
    {primary: 100, secondary: 5, label: '100/5'},
    {primary: 150, secondary: 5, label: '150/5'},
    {primary: 200, secondary: 5, label: '200/5'},
    {primary: 250, secondary: 5, label: '250/5'},
    {primary: 300, secondary: 5, label: '300/5'},
    {primary: 400, secondary: 5, label: '400/5'},
    {primary: 500, secondary: 5, label: '500/5'},
    {primary: 600, secondary: 5, label: '600/5'},
    {primary: 750, secondary: 5, label: '750/5'},
    {primary: 800, secondary: 5, label: '800/5'},
    {primary: 1000, secondary: 5, label: '1000/5'},
    {primary: 1250, secondary: 5, label: '1250/5'},
    {primary: 1500, secondary: 5, label: '1500/5'},
    {primary: 2000, secondary: 5, label: '2000/5'}
  ];
  var recommended = standardRatios[standardRatios.length - 1];
  for (var i = 0; i < standardRatios.length; i++) {
    if (standardRatios[i].primary >= requiredPrimary) {
      recommended = standardRatios[i];
      break;
    }
  }
  // Burden calculation (typical): 5VA for class 0.5, 2.5VA for class 1.0
  return {
    requiredPrimary: requiredPrimary,
    recommended: recommended,
    allRatios: standardRatios
  };
}

function renderMeter() {
  var s = meterState;
  var connTypes = ['direct', 'CT'];
  var voltages = ['230', '400'];
  var currents = [25, 32, 40, 50, 63, 80, 100, 125, 160, 200, 250, 315, 400, 500, 630, 800, 1000, 1250, 1500, 2000];
  var ctRatios = ['50/5', '75/5', '100/5', '150/5', '200/5', '250/5', '300/5', '400/5', '500/5', '600/5', '750/5', '800/5', '1000/5', '1250/5', '1500/5', '2000/5'];
  var accuracyClasses = ['0.5', '1.0', '2.0'];
  var midClasses = ['A', 'B', 'C'];

  var html = '<div class="card fade-in"><div class="card-title">\uD83D\uDCCA ' + t('meterTitle') + '</div>';
  html += '<div class="info-row">' + (lang === 'da' ? 'Dimensionering af energim\u00e5ler og str\u00f8mtransformere iht. EN 50470 og MID-direktivet 2014/32/EU. For str\u00f8mme over 63A anbefales CT-tilsluttet m\u00e5ler.' : 'Energy meter and current transformer sizing per EN 50470 and MID directive 2014/32/EU. For currents above 63A, CT-connected meter is recommended.') + '</div>';

  // Connection type
  html += '<div class="select-group"><div class="select-label">' + t('meterConnType') + '</div><div class="select-grid">';
  connTypes.forEach(function(ct) {
    var lbl = ct === 'direct' ? t('meterDirect') : t('meterCT');
    html += '<button class="sel-btn ' + (s.connType === ct ? 'selected' : '') + '" onclick="meterState.connType=\'' + ct + '\';renderModule(\'meter\')">' + lbl + '</button>';
  });
  html += '</div></div>';

  // System voltage
  html += '<div class="select-group"><div class="select-label">' + t('meterVoltage') + '</div><div class="select-grid">';
  voltages.forEach(function(v) {
    var lbl = v === '230' ? '230V 1~' : '400V 3~';
    html += '<button class="sel-btn ' + (s.voltage === v ? 'selected' : '') + '" onclick="meterState.voltage=\'' + v + '\';renderModule(\'meter\')">' + lbl + '</button>';
  });
  html += '</div></div>';

  // Max load current
  html += '<div class="select-group"><div class="select-label">' + t('meterMaxCurrent') + '</div><div class="select-grid">';
  currents.forEach(function(c) {
    html += '<button class="sel-btn ' + (s.maxCurrent === c ? 'selected' : '') + '" onclick="meterState.maxCurrent=' + c + ';renderModule(\'meter\')">' + c + ' A</button>';
  });
  html += '</div></div>';

  // CT Ratio (only shown for CT connection)
  if (s.connType === 'CT') {
    html += '<div class="select-group"><div class="select-label">' + t('meterCTRatio') + '</div><div class="select-grid">';
    ctRatios.forEach(function(r) {
      html += '<button class="sel-btn ' + (s.ctRatio === r ? 'selected' : '') + '" onclick="meterState.ctRatio=\'' + r + '\';renderModule(\'meter\')">' + r + '</button>';
    });
    html += '</div></div>';
  }

  // Accuracy class
  html += '<div class="select-group"><div class="select-label">' + t('meterAccuracy') + '</div><div class="select-grid">';
  accuracyClasses.forEach(function(ac) {
    html += '<button class="sel-btn ' + (s.accuracy === ac ? 'selected' : '') + '" onclick="meterState.accuracy=\'' + ac + '\';renderModule(\'meter\')">' + (lang === 'da' ? 'Klasse ' : 'Class ') + ac + '</button>';
  });
  html += '</div></div>';

  // MID class
  html += '<div class="select-group"><div class="select-label">' + t('meterMIDClass') + '</div><div class="select-grid">';
  midClasses.forEach(function(mc) {
    html += '<button class="sel-btn ' + (s.midClass === mc ? 'selected' : '') + '" onclick="meterState.midClass=\'' + mc + '\';renderModule(\'meter\')">' + (lang === 'da' ? 'Klasse ' : 'Class ') + mc + '</button>';
  });
  html += '</div></div>';

  html += '</div>'; // end input card

  // Results
  html += '<div class="card fade-in"><div class="card-title">' + t('meterResult') + '</div>';

  if (s.connType === 'direct') {
    // Direct connection - max 63A typically
    var directMax = s.maxCurrent <= 63;
    html += '<div class="result-box ' + (directMax ? '' : 'error') + '"><div class="result-title">' + t('meterRecMeter') + '</div>';
    html += '<div class="result-row"><span class="label">' + t('meterConnType') + '</span><span class="value">' + t('meterDirect') + '</span></div>';
    html += '<div class="result-row"><span class="label">' + t('meterMaxCurrent') + '</span><span class="value">' + s.maxCurrent + ' A</span></div>';
    html += '<div class="result-row"><span class="label">' + t('meterAccuracy') + '</span><span class="value">' + (lang === 'da' ? 'Klasse ' : 'Class ') + s.accuracy + ' (EN 50470-3)</span></div>';
    html += '<div class="result-row"><span class="label">' + t('meterMIDClass') + '</span><span class="value">' + (lang === 'da' ? 'Klasse ' : 'Class ') + s.midClass + ' (2014/32/EU)</span></div>';
    if (!directMax) {
      html += '<div class="info-row" style="color:var(--danger)">' + (lang === 'da' ? '\u26A0\uFE0F Direkte m\u00e5ling anbefales kun op til 63A. For ' + s.maxCurrent + 'A skal CT-tilsluttet m\u00e5ler anvendes.' : '\u26A0\uFE0F Direct measurement recommended only up to 63A. For ' + s.maxCurrent + 'A, CT-connected meter should be used.') + '</div>';
    }
    html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Standard' : 'Standard') + '</span><span class="value">EN 50470-1/-3, MID 2014/32/EU</span></div>';
    html += '</div>';
  } else {
    // CT connected
    var ctCalc = calcCTSizing(s.maxCurrent);
    var selectedRatio = s.ctRatio.split('/');
    var selectedPrimary = parseInt(selectedRatio[0]);
    var ctAdequate = selectedPrimary >= ctCalc.requiredPrimary;
    var burdenVA = s.accuracy === '0.5' ? 5 : (s.accuracy === '1.0' ? 2.5 : 1.5);

    html += '<div class="result-box"><div class="result-title">' + t('meterRecCT') + '</div>';
    html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Maks. belastning' : 'Max. load') + '</span><span class="value">' + s.maxCurrent + ' A</span></div>';
    html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Kr\u00e6vet CT prim\u00e6r (\u22651.2\u00D7 belastning)' : 'Required CT primary (\u22651.2\u00D7 load)') + '</span><span class="value">\u2265 ' + ctCalc.requiredPrimary.toFixed(0) + ' A</span></div>';
    html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Anbefalet CT-forhold' : 'Recommended CT ratio') + '</span><span class="value" style="font-weight:800">' + ctCalc.recommended.label + '</span></div>';
    html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Valgt CT-forhold' : 'Selected CT ratio') + '</span><span class="value' + (ctAdequate ? '' : '" style="color:var(--danger)') + '">' + s.ctRatio + (ctAdequate ? ' \u2705' : ' \u274C') + '</span></div>';
    html += '<div class="result-row"><span class="label">' + t('meterBurden') + '</span><span class="value">' + burdenVA + ' VA (class ' + s.accuracy + ')</span></div>';
    html += '<div class="result-row"><span class="label">' + t('meterAccuracy') + '</span><span class="value">' + (lang === 'da' ? 'Klasse ' : 'Class ') + s.accuracy + ' (EN 50470-3)</span></div>';
    html += '<div class="result-row"><span class="label">' + t('meterMIDClass') + '</span><span class="value">' + (lang === 'da' ? 'Klasse ' : 'Class ') + s.midClass + ' (2014/32/EU)</span></div>';
    if (!ctAdequate) {
      html += '<div class="info-row" style="color:var(--danger)">' + (lang === 'da' ? '\u26A0\uFE0F Valgt CT-forhold ' + s.ctRatio + ' er utilstr\u00e6kkeligt. CT prim\u00e6r skal v\u00e6re \u2265 1.2 \u00D7 ' + s.maxCurrent + 'A = ' + ctCalc.requiredPrimary.toFixed(0) + 'A. Anbefalet: ' + ctCalc.recommended.label + '.' : '\u26A0\uFE0F Selected CT ratio ' + s.ctRatio + ' is insufficient. CT primary must be \u2265 1.2 \u00D7 ' + s.maxCurrent + 'A = ' + ctCalc.requiredPrimary.toFixed(0) + 'A. Recommended: ' + ctCalc.recommended.label + '.') + '</div>';
    }
    html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Standard' : 'Standard') + '</span><span class="value">EN 50470-1/-3, MID 2014/32/EU</span></div>';
    html += '</div>';
  }

  // MID class explanation
  html += '<div class="result-box"><div class="result-title">' + (lang === 'da' ? 'MID-klasser (2014/32/EU Annex V)' : 'MID Classes (2014/32/EU Annex V)') + '</div>';
  html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Klasse A' : 'Class A') + '</span><span class="value">\u00B12% - ' + (lang === 'da' ? 'Husholdning' : 'Domestic') + '</span></div>';
  html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Klasse B' : 'Class B') + '</span><span class="value">\u00B11% - ' + (lang === 'da' ? 'Erhverv' : 'Commercial') + '</span></div>';
  html += '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Klasse C' : 'Class C') + '</span><span class="value">\u00B10.5% - ' + (lang === 'da' ? 'Industri/afregning' : 'Industrial/billing') + '</span></div>';
  html += '<div class="info-row">' + (lang === 'da' ? 'MID-direktivet 2014/32/EU kr\u00e6ver CE-m\u00e6rket m\u00e5ler med relevant klasse for faktureringsform\u00e5l. EN 50470-3 specificerer pr\u00e6cisionsklasser for aktiv energim\u00e5ling.' : 'MID directive 2014/32/EU requires CE-marked meter with relevant class for billing purposes. EN 50470-3 specifies accuracy classes for active energy measurement.') + '</div>';
  html += '</div>';

  html += '</div>'; // end result card
  return html;
}

// ===== INIT =====
renderNav();
renderStatusBar();
renderModule(activeModule);
(function(){ var b=document.getElementById('verBadge'); if(b) b.textContent='v'+DATA_VERSION; })();
</script>
