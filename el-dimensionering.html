      { q:{da:'Mindste standard-brydeevne (Icu) for hovedafbryderen?',en:'Minimum standard breaking capacity (Icu) for the main breaker?'}, opts:['25 kA','16 kA','22 kA','10 kA'], ci:0, ex:{da:'Icu \u2265 Ik max = 22,7 kA \u2192 n\u00e6rmeste standardv\u00e6rdi OVER = 25 kA. 16 kA ville v\u00e6re FARLIGT \u2014 afbryderen kan \u00f8del\u00e6gges ved fejl.',en:'Icu \u2265 Ik max = 22.7 kA \u2192 nearest standard value ABOVE = 25 kA. 16 kA would be DANGEROUS \u2014 the breaker can be destroyed during a fault.'}, clause:'DS/HD 60364-4-43 \u00a7434.5.1' },
      { q:{da:'XLPE temperaturkorrektion ved 40\u00b0C omgivelse (ref. 30\u00b0C)?',en:'XLPE temperature correction at 40\u00b0C ambient (ref. 30\u00b0C)?'}, opts:['0,91','0,87','1,00','0,82'], ci:0, ex:{da:'XLPE (90\u00b0C) ved 40\u00b0C luft \u2192 0,91 (PVC ville v\u00e6re 0,87). Iz_korr = Iz_tabel \u00b7 0,91.',en:'XLPE (90\u00b0C) at 40\u00b0C in air \u2192 0.91 (PVC would be 0.87). Iz_corr = Iz_table \u00b7 0.91.'}, clause:'DS/HD 60364-5-52, Tabel B.52.14' },
      { q:{da:'Hovedbeskyttelsens m\u00e6rkestr\u00f8m In (IB = 909 A) \u2013 mindste tilladte?',en:'Main protection rating In (IB = 909 A) \u2013 smallest permitted?'}, opts:['1000 A','800 A','909 A','630 A'], ci:0, ex:{da:'IB \u2264 In. 909 A \u2192 1000 A (n\u00e6rmeste standard over). 800 A ville overbelaste \u2014 sikringen ser ikke 909 A som fejl, og kabel/trafo overophedes.',en:'IB \u2264 In. 909 A \u2192 1000 A (nearest standard above). 800 A would overload \u2014 the device does not see 909 A as a fault and the cable/transformer overheats.'}, clause:'DS/HD 60364-4-43 \u00a7433.1' },
      { q:{da:'For selektivitet til en 250 A afgang nedstr\u00f8ms skal du...',en:'For selectivity with a 250 A downstream feeder you must...'}, opts:[{da:'Bruge hovedafbryder med justerbar korttidsforsinkelse sat OVER 250 A-afgangens udl\u00f8sekurve',en:'Use a main breaker with adjustable short-time delay set ABOVE the 250 A feeder trip curve'},{da:'V\u00e6lge samme type i begge ender',en:'Use the same type at both ends'},{da:'Fjerne den nedstr\u00f8ms beskyttelse',en:'Remove the downstream protection'},{da:'S\u00e6tte hovedet til 250 A',en:'Set the main to 250 A'}], ci:0, ex:{da:'Selektivitet = nedstr\u00f8ms beskyttelse rydder fejlen F\u00d8R hovedet udl\u00f8ser. Det kr\u00e6ver tid/str\u00f8m-graduering: hovedets korttidsforsinkelse l\u00e6gges over afgangens udl\u00f8sekurve i hele fejlomr\u00e5det. Bekr\u00e6ft mod fabrikantens selektivitetstabel.',en:'Selectivity = the downstream device clears the fault BEFORE the main trips. This needs time/current grading: the main short-time delay sits above the feeder curve across the whole fault range. Confirm against the manufacturer selectivity table.'}, clause:'DS/HD 60364-5-53 \u00a7536' }
    ] },
  { id:'s2', cat:'forsyning', title:{da:'Forsyning B \u2013 400 kVA + 4\u00d722 kW EV-ladere',en:'Supply B \u2013 400 kVA + 4\u00d722 kW EV chargers'},
    brief:{da:'Moderne forsyning: 400 kVA trafo, 400 V. Tilslut 4 \u00d7 22 kW AC-ladestandere (semi-offentlig parkering). Vurder samtidighed, kontinuerlig last og beskyttelse.',en:'Modern supply: 400 kVA transformer, 400 V. Connect 4 \u00d7 22 kW AC chargers (semi-public parking). Assess diversity, continuous load and protection.'},
    steps:[
      { q:{da:'Str\u00f8m pr. 22 kW lader (3-faset, cos\u03c6 \u2248 1)?',en:'Current per 22 kW charger (3-phase, cos\u03c6 \u2248 1)?'}, opts:['\u224832 A','\u224816 A','\u224855 A','\u224822 A'], ci:0, ex:{da:'I = P/(\u221a3\u00b7U\u00b7cos\u03c6) = 22000/(1,732\u00b7400) \u2248 32 A pr. fase.',en:'I = P/(\u221a3\u00b7U\u00b7cos\u03c6) = 22000/(1.732\u00b7400) \u2248 32 A per phase.'}, clause:'DS/HD 60364-7-722' },
      { q:{da:'M\u00e5 du anvende samtidighedsfaktor p\u00e5 SELVE ladekredsen?',en:'May you apply a diversity factor on the charging circuit itself?'}, opts:[{da:'Nej \u2013 EV er kontinuerlig last, dimensionér 100%',en:'No \u2013 EV is continuous load, size at 100%'},{da:'Ja, 0,7',en:'Yes, 0.7'},{da:'Ja, 0,5',en:'Yes, 0.5'},{da:'Ja, 0,4',en:'Yes, 0.4'}], ci:0, ex:{da:'Ladning er kontinuerlig last (timevis). P\u00e5 den enkelte ladekreds m\u00e5 du IKKE regne samtidighed ned \u2014 kredsen dimensioneres til laderens fulde indstillede str\u00f8m.',en:'Charging is a continuous load (hours). On the individual circuit you must NOT reduce by diversity \u2014 size it for the full set current.'}, clause:'DS/HD 60364-7-722 \u00a7722.311' },
      { q:{da:'Hvilken HPFI-type pr. ladepunkt (uden indbygget 6 mA DC-detektion)?',en:'Which RCD type per charging point (without built-in 6 mA DC detection)?'}, opts:['Type B','Type A','Type AC','Ingen'], ci:0, ex:{da:'EV kan give glatte DC-fejlstr\u00f8mme der bl\u00e6nder Type A. Brug Type B \u2014 eller Type A + 6 mA DC-detektion. Hvert ladepunkt har egen HPFI.',en:'EV can produce smooth DC fault currents that blind Type A. Use Type B \u2014 or Type A + 6 mA DC detection. Each point has its own RCD.'}, clause:'DS/HD 60364-7-722 \u00a7722.531.3.101' },
      { q:{da:'Samlet str\u00f8m hvis alle 4 ladere k\u00f8rer fuldt (uden laststyring)?',en:'Total current if all 4 chargers run full (no load management)?'}, opts:['128 A','32 A','64 A','96 A'], ci:0, ex:{da:'4\u00b732 A = 128 A samtidigt + \u00f8vrig last. EV\u2019s kontinuerlige natur betyder ingen nedregning.',en:'4\u00b732 A = 128 A simultaneously + other load. EV\u2019s continuous nature means no reduction.'}, clause:'DS/HD 60364-7-722; \u00a7433.1' },
      { q:{da:'400 kVA-trafoens fuldlaststr\u00f8m \u2013 er der plads til 128 A EV?',en:'400 kVA transformer full-load current \u2013 room for 128 A EV?'}, opts:[{da:'577 A \u2013 rigelig margin, hvis \u00f8vrig last tillader',en:'577 A \u2013 ample margin, if other load allows'},'330 A','1000 A','145 A'], ci:0, ex:{da:'In = 400000/(1,732\u00b7400) \u2248 577 A. 128 A EV \u2248 22% af trafoen \u2014 men kun forsvarligt hvis dokumenteret \u00f8vrig last + 128 A ikke overstiger trafo/hovedsikring.',en:'In = 400000/(1.732\u00b7400) \u2248 577 A. 128 A EV \u2248 22% of the transformer \u2014 but only safe if documented other load + 128 A does not exceed transformer/main fuse.'}, clause:'DS/HD 60364-4-43 \u00a7433.1' },
      { q:{da:'\u201d30%-/70%-regler\u201d som tommelfinger for ledig kapacitet \u2013 hvorn\u00e5r m\u00e5 de bruges?',en:'\u201c30%/70% rules\u201d as a rule of thumb for spare capacity \u2013 when may they be used?'}, opts:[{da:'Aldrig som erstatning for en dokumenteret belastningsm\u00e5ling eller laststyring',en:'Never as a substitute for a documented load measurement or load management'},{da:'Altid',en:'Always'},{da:'Kun i boliger',en:'Only in dwellings'},{da:'Kun >100 A',en:'Only >100 A'}], ci:0, ex:{da:'Den gamle forenklede 75%-regel blev AFSKAFFET 1. jan 2020. Procent-tommelfingre m\u00e5 ALDRIG begrunde undersizet beskyttelse. Dokumentér ledig kapacitet med reel belastningsm\u00e5ling \u2014 eller install\u00e9r dynamisk laststyring.',en:'The old simplified 75% rule was ABOLISHED 1 Jan 2020. Rules of thumb must NEVER justify undersized protection. Document spare capacity with a real load measurement \u2014 or install dynamic load management.'}, clause:'DS/HD 60364-5-52 (dansk till\u00e6g); Sikkerhedsstyrelsen' },
      { q:{da:'Bedste l\u00f8sning hvis trafo/hovedsikring IKKE har fast plads til 128 A?',en:'Best solution if the transformer/main fuse has NO firm headroom for 128 A?'}, opts:[{da:'Dynamisk laststyring (load management)',en:'Dynamic load management'},{da:'St\u00f8rre sikring uden kabelopgradering',en:'Bigger fuse without cable upgrade'},{da:'Fjern HPFI',en:'Remove the RCD'},{da:'Ignorér \u00f8vrig last',en:'Ignore other load'}], ci:0, ex:{da:'Dynamisk laststyring m\u00e5ler forbruget og neddrosler EV i realtid, s\u00e5 summen aldrig overstiger hovedsikringen. ALDRIG opskalér sikringen uden at kablet (Iz) ogs\u00e5 kan b\u00e6re det.',en:'Dynamic load management measures consumption and throttles EV in real time so the sum never exceeds the main fuse. NEVER upscale the fuse unless the cable (Iz) can also carry it.'}, clause:'DS/HD 60364-7-722; \u00a7433.1' }
    ] },
  { id:'s3', cat:'maskine', title:{da:'Maskine A \u2013 37 kW DOL-motor',en:'Machine A \u2013 37 kW DOL motor'},
    brief:{da:'37 kW DOL-motor (direkte start), 400 V, cos\u03c6 0,86, \u03b7 0,93. 80 m kabel i kabelbakke sammen med 5 andre belastede kredse, 35\u00b0C. Dimensionér motorafgang + verificér kortslutningsbeskyttelse.',en:'37 kW DOL motor (direct-on-line), 400 V, cos\u03c6 0.86, \u03b7 0.93. 80 m cable on a tray with 5 other loaded circuits, 35\u00b0C. Size the motor feeder + verify short-circuit protection.'},
    steps:[
      { q:{da:'Motorens m\u00e6rkestr\u00f8m In?',en:'Motor rated current In?'}, opts:['\u224867 A','\u224853 A','\u224845 A','\u224880 A'], ci:0, ex:{da:'In = P/(\u221a3\u00b7U\u00b7cos\u03c6\u00b7\u03b7) = 37000/(1,732\u00b7400\u00b70,86\u00b70,93) \u2248 67 A. Husk virkningsgrad \u03b7 \u2014 uden den undervurderes str\u00f8mmen (farligt).',en:'In = P/(\u221a3\u00b7U\u00b7cos\u03c6\u00b7\u03b7) = 37000/(1.732\u00b7400\u00b70.86\u00b70.93) \u2248 67 A. Include efficiency \u03b7 \u2014 omitting it underestimates current (dangerous).'}, clause:'DS/HD 60364-5-52' },
      { q:{da:'DOL-startstr\u00f8m er ~6\u20138\u00d7In \u2013 hvad dimensionerer du efter?',en:'DOL inrush is ~6\u20138\u00d7In \u2013 what do you design for?'}, opts:[{da:'V\u00e6lg kurve D / motorv\u00e6rn (startstr\u00f8m ~6\u20138\u00d7In)',en:'Choose curve D / motor protector (inrush ~6\u20138\u00d7In)'},{da:'Kurve B',en:'Curve B'},{da:'Dimensionér kabel til 435 A kontinuerligt',en:'Size cable for 435 A continuous'},{da:'Ingen s\u00e6rlige hensyn',en:'No special consideration'}], ci:0, ex:{da:'DOL giver ~6\u20138\u00d7 startstr\u00f8m (her ~435 A) kortvarigt. Kortslutningsbeskyttelsen m\u00e5 IKKE udl\u00f8se p\u00e5 start \u2192 kurve D / motorv\u00e6rn. Kablet dimensioneres efter In (67 A), ikke startstr\u00f8mmen.',en:'DOL gives ~6\u20138\u00d7 inrush (here ~435 A) briefly. Short-circuit protection must NOT trip on start \u2192 curve D / motor protector. The cable is sized for In (67 A), not inrush.'}, clause:'DS/HD 60364; IEC 60947-4-1' },
      { q:{da:'Grupperingsfaktor for 6 belastede kredse samlet i bakken?',en:'Grouping factor for 6 loaded circuits bunched on the tray?'}, opts:['0,57','0,80','1,00','0,70'], ci:0, ex:{da:'6 samlede belastede kredse \u2192 grupperingsfaktor \u2248 0,57. Mange kredse i samme bakke s\u00e6nker str\u00f8mb\u00e6reevnen drastisk.',en:'6 bunched loaded circuits \u2192 grouping factor \u2248 0.57. Many circuits in one tray drop ampacity drastically.'}, clause:'DS/HD 60364-5-52, Tabel B.52.17' },
      { q:{da:'Temperaturkorrektion ved 35\u00b0C (PVC, ref. 30\u00b0C)?',en:'Temperature correction at 35\u00b0C (PVC, ref. 30\u00b0C)?'}, opts:['0,94','0,91','1,00','0,87'], ci:0, ex:{da:'PVC (70\u00b0C) ved 35\u00b0C \u2192 0,94. Samlet korrektion = 0,94\u00b70,57 \u2248 0,54.',en:'PVC (70\u00b0C) at 35\u00b0C \u2192 0.94. Combined correction = 0.94\u00b70.57 \u2248 0.54.'}, clause:'DS/HD 60364-5-52, Tabel B.52.14 + B.52.17' },
      { q:{da:'Hvis Iz_tabel = 76 A, hvad er korrigeret Iz \u2013 og er det nok?',en:'If Iz_table = 76 A, what is the corrected Iz \u2013 and is it enough?'}, opts:[{da:'\u224841 A \u2013 FOR LILLE til 67 A, v\u00e6lg st\u00f8rre kabel',en:'\u224841 A \u2013 TOO SMALL for 67 A, choose a larger cable'},{da:'\u224876 A \u2013 OK',en:'\u224876 A \u2013 OK'},{da:'\u224867 A \u2013 lige nok',en:'\u224867 A \u2013 just enough'},{da:'\u224858 A \u2013 OK',en:'\u224858 A \u2013 OK'}], ci:0, ex:{da:'Iz_korr = 76\u00b70,54 \u2248 41 A < IB = 67 A \u2192 kablet ville overophede. V\u00e6lg st\u00f8rre tv\u00e6rsnit s\u00e5 Iz_korr \u2265 In \u2265 IB. Accepter aldrig Iz < IB.',en:'Iz_corr = 76\u00b70.54 \u2248 41 A < IB = 67 A \u2192 the cable would overheat. Choose a larger cross-section so Iz_corr \u2265 In \u2265 IB. Never accept Iz < IB.'}, clause:'DS/HD 60364-4-43 \u00a7433.1' },
      { q:{da:'Adiabatisk kontrol af kortslutningsbeskyttelsen \u2013 betingelse?',en:'Adiabatic check of short-circuit protection \u2013 condition?'}, opts:['k\u00b2S\u00b2 \u2265 I\u00b2t','I\u00b2t \u2265 k\u00b2S\u00b2','k\u00b7S \u2265 I\u00b7t','S \u2265 k\u00b7I\u00b2t'], ci:0, ex:{da:'Lederen m\u00e5 ikke overophede f\u00f8r fejlen ryddes: k\u00b2S\u00b2 \u2265 I\u00b2t. For Cu/PVC er k \u2248 115. Ikke opfyldt \u2192 st\u00f8rre tv\u00e6rsnit eller hurtigere beskyttelse.',en:'The conductor must not overheat before the fault clears: k\u00b2S\u00b2 \u2265 I\u00b2t. For Cu/PVC, k \u2248 115. Not met \u2192 larger cross-section or faster protection.'}, clause:'DS/HD 60364-4-43 \u00a7434.5.2' },
      { q:{da:'Motorafgangens komponenter (korrekt s\u00e6t)?',en:'Motor feeder components (correct set)?'}, opts:[{da:'Kortslutningsbeskyttelse + kontaktor + termorel\u00e6',en:'Short-circuit protection + contactor + overload relay'},{da:'Kun sikring',en:'Fuse only'},{da:'Kun HPFI',en:'RCD only'},{da:'Kun kontaktor',en:'Contactor only'}], ci:0, ex:{da:'Standard motorafgang: 1) kortslutningsbeskyttelse (motorv\u00e6rn/sikring), 2) kontaktor (til/fra), 3) termorel\u00e6 indstillet til motorens In (overbelastning). Tre lag \u2014 hvert med sit form\u00e5l.',en:'Standard motor feeder: 1) short-circuit protection (motor protector/fuse), 2) contactor (on/off), 3) overload relay set to motor In. Three layers \u2014 each with its purpose.'}, clause:'DS/HD 60364; IEC 60947-4-1' }
    ] },
  { id:'s4', cat:'maskine', title:{da:'Maskine B \u2013 15 kW softstarter',en:'Machine B \u2013 15 kW soft starter'},
    brief:{da:'15 kW motor med softstarter, 400 V, cos\u03c6 0,85, \u03b7 0,90. 45 m jordkabel. Forankoblet 100 A gG-sikring. Vurder startsp\u00e6ndingsfald og selektivitet.',en:'15 kW motor with soft starter, 400 V, cos\u03c6 0.85, \u03b7 0.90. 45 m buried cable. Upstream 100 A gG fuse. Assess starting voltage drop and selectivity.'},
    steps:[
      { q:{da:'Motorens m\u00e6rkestr\u00f8m In?',en:'Motor rated current In?'}, opts:['\u224828 A','\u224822 A','\u224838 A','\u224815 A'], ci:0, ex:{da:'In = 15000/(1,732\u00b7400\u00b70,85\u00b70,90) \u2248 28 A.',en:'In = 15000/(1.732\u00b7400\u00b70.85\u00b70.90) \u2248 28 A.'}, clause:'DS/HD 60364-5-52' },
      { q:{da:'Softstarter reducerer startstr\u00f8mmen til typisk?',en:'A soft starter reduces inrush to typically?'}, opts:[{da:'\u22483\u00d7In (~84 A)',en:'\u22483\u00d7In (~84 A)'},{da:'\u22488\u00d7In',en:'\u22488\u00d7In'},{da:'\u22481\u00d7In',en:'\u22481\u00d7In'},{da:'\u224812\u00d7In',en:'\u224812\u00d7In'}], ci:0, ex:{da:'Softstarter begr\u00e6nser startstr\u00f8mmen til typisk ~3\u00d7In (~84 A) mod 6\u20138\u00d7 ved DOL \u2014 mindre sp\u00e6ndingsfald og mekanisk stress.',en:'A soft starter limits inrush to ~3\u00d7In (~84 A) vs 6\u20138\u00d7 for DOL \u2014 less voltage drop and mechanical stress.'}, clause:'DS/HD 60364; IEC 60947-4-2' },
      { q:{da:'Sp\u00e6ndingsfaldet skal kontrolleres ved...?',en:'Voltage drop must be checked at...?'}, opts:[{da:'Start\u00f8jeblikket (h\u00f8jeste str\u00f8m)',en:'The moment of starting (highest current)'},{da:'Tomgang',en:'No load'},{da:'Efter 1 time',en:'After 1 hour'},{da:'Aldrig',en:'Never'}], ci:0, ex:{da:'V\u00e6rste sp\u00e6ndingsfald optr\u00e6der under START hvor str\u00f8mmen er h\u00f8jest (~84 A). For stort fald kan forhindre motoren i at starte. Tjek b\u00e5de start OG drift.',en:'Worst voltage drop occurs during START at highest current (~84 A). Too large a drop can prevent the motor from starting. Check both start AND running.'}, clause:'DS/HD 60364-5-52 \u00a7525' },
      { q:{da:'Maks. kontinuerligt sp\u00e6ndingsfald for kraftinstallation?',en:'Max continuous voltage drop for a power installation?'}, opts:['5%','3%','8%','1%'], ci:0, ex:{da:'Maks 5% for \u00f8vrige belastninger (3% for belysning). 45 m jordkabel + motorstart kan let overskride \u2192 v\u00e6lg st\u00f8rre tv\u00e6rsnit.',en:'Max 5% for other loads (3% for lighting). 45 m buried cable + motor start can easily exceed it \u2192 upsize the cable.'}, clause:'DS/HD 60364-5-52 \u00a7525' },
      { q:{da:'100 A gG forankoblet, motorsikring 32 A \u2013 er selektivitet sandsynlig?',en:'100 A gG upstream, 32 A motor fuse \u2013 is selectivity likely?'}, opts:[{da:'Ja \u2013 forhold ~3:1 > 1,6:1 (bekr\u00e6ft i tabel)',en:'Yes \u2013 ratio ~3:1 > 1.6:1 (confirm in table)'},{da:'Nej, aldrig',en:'No, never'},{da:'Kun hvis samme st\u00f8rrelse',en:'Only if same size'},{da:'Kun med HPFI',en:'Only with an RCD'}], ci:0, ex:{da:'gG/gG er typisk selektive ved \u2265 1,6:1. 100/32 \u2248 3,1:1 \u2192 selektivitet sandsynlig, men bekr\u00e6ft i fabrikantens selektivitetstabel (I\u00b2t).',en:'gG/gG are typically selective at \u2265 1.6:1. 100/32 \u2248 3.1:1 \u2192 selectivity likely, but confirm in the manufacturer table (I\u00b2t).'}, clause:'DS/HD 60364-5-53 \u00a7536; IEC 60269' },
      { q:{da:'Hvad sikrer hurtig frakobling ved kortslutning i kabelenden (45 m)?',en:'What ensures fast disconnection on a short-circuit at the cable end (45 m)?'}, opts:[{da:'Tilstr\u00e6kkelig Ik_min s\u00e5 sikringen udl\u00f8ser inden for kravstiden',en:'Sufficient Ik_min so the fuse trips within the required time'},{da:'Lav Ik_min',en:'Low Ik_min'},{da:'St\u00f8rre sikring',en:'A bigger fuse'},{da:'L\u00e6ngere kabel',en:'A longer cable'}], ci:0, ex:{da:'Ik_min (mindste kortslutning i kabelenden) skal v\u00e6re stor nok til at sikringen udl\u00f8ser inden for frakoblingstiden (5 s for fordeling). Lange/tynde kabler \u2192 lav Ik_min \u2192 risiko for at fejl ikke ryddes. Kontrollér Zs.',en:'Ik_min (minimum short-circuit at the cable end) must be high enough to trip the fuse within the disconnection time (5 s for distribution). Long/thin cables \u2192 low Ik_min \u2192 risk the fault is not cleared. Check Zs.'}, clause:'DS/HD 60364-4-41 \u00a7411.4.4' }
    ] },
  { id:'s5', cat:'installation', title:{da:'Installation A \u2013 Parcelhus TN-S',en:'Installation A \u2013 Dwelling TN-S'},
    brief:{da:'Parcelhus, TN-S, 400/230 V, 3-faset indf\u00f8dning. Ovn 7,2 kW (3-faset), badev\u00e6relse, 8 lyskredse + 12 stikkredse. L\u00e6g HPFI-strategi og dimensionér.',en:'Dwelling, TN-S, 400/230 V, 3-phase supply. Oven 7.2 kW (3-phase), bathroom, 8 lighting + 12 socket circuits. Plan the RCD strategy and size circuits.'},
    steps:[
      { q:{da:'Ovn 7,2 kW 3-faset \u2013 str\u00f8m pr. fase?',en:'Oven 7.2 kW 3-phase \u2013 current per phase?'}, opts:['\u224810,4 A','\u224831 A','\u224818 A','\u22483,5 A'], ci:0, ex:{da:'I = P/(\u221a3\u00b7U) = 7200/(1,732\u00b7400) \u2248 10,4 A pr. fase. En 16 A 3-faset gruppe passer (IB \u2264 In).',en:'I = P/(\u221a3\u00b7U) = 7200/(1.732\u00b7400) \u2248 10.4 A per phase. A 16 A 3-phase circuit fits (IB \u2264 In).'}, clause:'DS/HD 60364-4-43 \u00a7433.1' },
      { q:{da:'Badev\u00e6relse zone 1 \u2013 tilladt udstyr?',en:'Bathroom zone 1 \u2013 permitted equipment?'}, opts:[{da:'Kun egnet, fastmonteret udstyr iht. zonekrav (IP)',en:'Only suitable fixed equipment per zone rules (IP)'},{da:'Almindelige stikkontakter',en:'Ordinary sockets'},{da:'Intet krav',en:'No requirement'},{da:'Frit valg',en:'Free choice'}], ci:0, ex:{da:'V\u00e5drum er zoneinddelt (0/1/2). Zone 0/1 tillader kun egnet fastmonteret udstyr med passende IP-klasse; stikkontakter er som hovedregel ikke tilladt. Alt forsynes via 30 mA HPFI.',en:'Wet rooms are zoned (0/1/2). Zones 0/1 allow only suitable fixed equipment with adequate IP rating; sockets are generally not permitted. Everything is fed via a 30 mA RCD.'}, clause:'DS/HD 60364-7-701' },
      { q:{da:'HPFI-type og -str\u00f8m til stikkredse og badev\u00e6relse?',en:'RCD type and rating for socket circuits and the bathroom?'}, opts:['30 mA Type A','300 mA Type AC','100 mA Type A','30 mA Type AC'], ci:0, ex:{da:'30 mA HPFI Type A er lovpligtig p\u00e5 stikkredse, v\u00e5drum og udend\u00f8rs. Type A d\u00e6kker pulserende DC-fejlstr\u00f8mme fra moderne elektronik; ren AC-type er utilstr\u00e6kkelig.',en:'A 30 mA Type A RCD is mandatory on socket circuits, wet rooms and outdoors. Type A covers pulsating DC fault currents from modern electronics; a pure AC type is insufficient.'}, clause:'DS/HD 60364-4-41 \u00a7411.3.3' },
      { q:{da:'Hvorfor IKKE samle alle 8 lys + 12 stik p\u00e5 \u00e9n HPFI?',en:'Why NOT put all 8 lighting + 12 socket circuits on one RCD?'}, opts:[{da:'Fordel p\u00e5 flere HPFI \u2013 \u00e9n fejl m\u00e5 ikke slukke hele huset + l\u00e6kstr\u00f8m',en:'Split over several RCDs \u2013 one fault must not kill the whole house + leakage'},{da:'\u00c9n HPFI er bedst',en:'One RCD is best'},{da:'HPFI er un\u00f8dvendig',en:'An RCD is unnecessary'},{da:'Brug 500 mA',en:'Use 500 mA'}], ci:0, ex:{da:'Mange kredse p\u00e5 \u00e9n HPFI: (1) hele huset m\u00f8rkl\u00e6gges ved \u00e9n fejl, (2) summen af normale l\u00e6kstr\u00f8mme kan u\u00f8nsket udl\u00f8se 30 mA. Fordel p\u00e5 flere HPFI (fx pr. 4\u20136 kredse). Lys og stik b\u00f8r ikke dele kreds.',en:'Many circuits on one RCD: (1) the whole house goes dark on one fault, (2) summed normal leakage can nuisance-trip 30 mA. Split over several RCDs (e.g. per 4\u20136 circuits). Lighting and sockets should not share a circuit.'}, clause:'DS/HD 60364-5-53 \u00a7531' },
      { q:{da:'Hvad begr\u00e6nser antallet af lyspunkter p\u00e5 en 10 A lyskreds?',en:'What limits the number of luminaires on a 10 A lighting circuit?'}, opts:[{da:'IB \u2264 In \u2264 Iz OG maks 3% sp\u00e6ndingsfald',en:'IB \u2264 In \u2264 Iz AND max 3% voltage drop'},{da:'Antallet er frit',en:'The number is free'},{da:'Kun \u00e6stetik',en:'Only aesthetics'},{da:'Kun kabell\u00e6ngde',en:'Only cable length'}], ci:0, ex:{da:'Kredsen begr\u00e6nses af IB \u2264 In \u2264 Iz og maks 3% sp\u00e6ndingsfald for belysning. Hold margin over hele ruten.',en:'The circuit is limited by IB \u2264 In \u2264 Iz and max 3% voltage drop for lighting. Keep margin over the whole run.'}, clause:'DS/HD 60364-4-43 \u00a7433.1; \u00a7525' },
      { q:{da:'TN-S \u2013 hvad sikrer beskyttelse mod indirekte ber\u00f8ring?',en:'TN-S \u2013 what provides protection against indirect contact?'}, opts:[{da:'Automatisk frakobling: Zs\u00b7Ia \u2264 U0 + udligning',en:'Automatic disconnection: Zs\u00b7Ia \u2264 U0 + bonding'},{da:'Kun isolation',en:'Insulation only'},{da:'Kun afstand',en:'Distance only'},{da:'Kun m\u00e6rkning',en:'Labelling only'}], ci:0, ex:{da:'Isolationsfejl ryddes ved automatisk frakobling: Zs skal v\u00e6re lav nok til at beskyttelsen udl\u00f8ser inden for tiden (0,4 s for 230 V endegrupper). Suppleres af hovedudligning + 30 mA HPFI.',en:'Insulation faults are cleared by automatic disconnection: Zs must be low enough to trip within the time (0.4 s for 230 V final circuits). Supplemented by main bonding + 30 mA RCD.'}, clause:'DS/HD 60364-4-41 \u00a7411.3.2 / \u00a7411.4' }
    ] },
  { id:'s6', cat:'installation', title:{da:'Installation B \u2013 Eksisterende bolig + 11 kW EV',en:'Installation B \u2013 Existing dwelling + 11 kW EV'},
    brief:{da:'Eksisterende parcelhus, 3\u00d725 A hovedsikring (TN-C-S). Kunden vil have en 11 kW EV-lader. Vurder ledig kapacitet og beskyttelse \u2014 uden at overbelaste.',en:'Existing dwelling, 3\u00d725 A main fuse (TN-C-S). Customer wants an 11 kW EV charger. Assess spare capacity and protection \u2014 without overloading.'},
    steps:[
      { q:{da:'11 kW lader \u2013 str\u00f8m pr. fase?',en:'11 kW charger \u2013 current per phase?'}, opts:['\u224816 A','\u224811 A','\u224832 A','\u224848 A'], ci:0, ex:{da:'I = 11000/(1,732\u00b7400) \u2248 16 A pr. fase. Kredsen dimensioneres til 100% (kontinuerlig).',en:'I = 11000/(1.732\u00b7400) \u2248 16 A per phase. The circuit is sized at 100% (continuous).'}, clause:'DS/HD 60364-7-722' },
      { q:{da:'Hovedsikring 3\u00d725 A \u2013 m\u00e5 man bare l\u00e6gge 16 A EV oveni?',en:'Main fuse 3\u00d725 A \u2013 may you just add 16 A EV on top?'}, opts:[{da:'Nej \u2013 dokumentér husets eksisterende last f\u00f8rst',en:'No \u2013 document the existing load first'},{da:'Ja, altid',en:'Yes, always'},{da:'Ja, hvis kunden beder om det',en:'Yes, if the customer asks'},{da:'Ja, op til 25 A',en:'Yes, up to 25 A'}], ci:0, ex:{da:'16 A EV + husets \u00f8vrige last m\u00e5 ikke overstige 25 A pr. fase. Du SKAL vurdere den eksisterende belastning (m\u00e5ling/dokumenteret beregning) f\u00f8r du tilf\u00f8jer kontinuerlig EV-last.',en:'16 A EV + the rest of the house must not exceed 25 A per phase. You MUST assess the existing load (measurement / documented calculation) before adding continuous EV load.'}, clause:'DS/HD 60364-4-43 \u00a7433.1; 7-722' },
      { q:{da:'\u201d70%-reglen\u201d som hurtig kapacitetsvurdering \u2013 status?',en:'\u201c70% rule\u201d as a quick capacity check \u2013 status?'}, opts:[{da:'Tommelfinger \u2013 erstatter IKKE m\u00e5ling/laststyring; 75%-reglen er afskaffet',en:'Rule of thumb \u2013 does NOT replace measurement/management; the 75% rule is abolished'},{da:'Lovkrav',en:'Legal requirement'},{da:'Altid gyldig',en:'Always valid'},{da:'G\u00e6lder kun alu',en:'Aluminium only'}], ci:0, ex:{da:'Den gamle forenklede 75%-regel blev afskaffet 1. jan 2020. Procent-tommelfingre m\u00e5 aldrig begrunde at overbelaste hovedsikringen. Brug reel belastningsm\u00e5ling over tid eller dynamisk laststyring.',en:'The old simplified 75% rule was abolished 1 Jan 2020. Rules of thumb must never justify overloading the main fuse. Use a real load measurement over time or dynamic load management.'}, clause:'DS/HD 60364-5-52 (dansk till\u00e6g); Sikkerhedsstyrelsen' },
      { q:{da:'Sikreste l\u00f8sning n\u00e5r kapaciteten er stram?',en:'Safest solution when capacity is tight?'}, opts:[{da:'Dynamisk laststyring der begr\u00e6nser EV i realtid',en:'Dynamic load management that limits EV in real time'},{da:'Skift til 3\u00d735 A uden at tjekke kabel',en:'Switch to 3\u00d735 A without checking the cable'},{da:'Fjern HPFI',en:'Remove the RCD'},{da:'Lad EV k\u00f8re uden styring',en:'Run EV without management'}], ci:0, ex:{da:'Dynamisk laststyring m\u00e5ler forbruget og neddrosler EV s\u00e5 summen aldrig overstiger 25 A. ALDRIG opgradér hovedsikringen uden at forsyningskabel (Iz) OG netselskabets tilslutning ogs\u00e5 kan b\u00e6re det.',en:'Dynamic load management measures consumption and throttles EV so the sum never exceeds 25 A. NEVER upgrade the main fuse unless the supply cable (Iz) AND the utility connection can also carry it.'}, clause:'DS/HD 60364-7-722; \u00a7433.1' },
      { q:{da:'HPFI-type til 11 kW laderen (ingen indbygget DC-detektion)?',en:'RCD type for the 11 kW charger (no built-in DC detection)?'}, opts:[{da:'Type B (eller Type A + 6 mA RDC-DD)',en:'Type B (or Type A + 6 mA RDC-DD)'},{da:'Type AC',en:'Type AC'},{da:'Type A alene',en:'Type A alone'},{da:'Ingen',en:'None'}], ci:0, ex:{da:'EV kr\u00e6ver beskyttelse mod glatte DC-fejlstr\u00f8mme: Type B, eller Type A + 6 mA DC-detektion. Egen dedikeret HPFI til laderen.',en:'EV requires protection against smooth DC fault currents: Type B, or Type A + 6 mA DC detection. A dedicated RCD for the charger.'}, clause:'DS/HD 60364-7-722 \u00a7722.531.3.101' },
      { q:{da:'TN-C-S og udend\u00f8rs EV \u2013 ekstra hensyn (PEN-brud)?',en:'TN-C-S and outdoor EV \u2013 extra consideration (PEN break)?'}, opts:[{da:'PEN-brud kan g\u00f8re bilen sp\u00e6ndingsf\u00f8rende \u2192 kr\u00e6ver beskyttelse mod tab af PEN',en:'A PEN break can make the car live \u2192 requires protection against loss of PEN'},{da:'Ingen',en:'None'},{da:'Kun jordspyd uden andet',en:'Just an earth rod, nothing else'},{da:'Ingen relevans',en:'Not relevant'}], ci:0, ex:{da:'Ved TN-C-S kan et brud p\u00e5 PEN-lederen l\u00f8fte potentialet p\u00e5 udsatte dele (bilen). 7-722 kr\u00e6ver foranstaltninger mod dette (fx sp\u00e6ndingsoverv\u00e5gning/frakobling eller lokal jordelektrode efter konkret vurdering). En kendt d\u00f8ds\u00e5rsag \u2014 tag det alvorligt.',en:'In TN-C-S a broken PEN can raise the potential on exposed parts (the car). 7-722 requires measures against this (e.g. voltage monitoring/disconnection or a local earth electrode after assessment). A known cause of death \u2014 take it seriously.'}, clause:'DS/HD 60364-7-722 \u00a7722.411.4.1' }
    ] },
  { id:'s7', cat:'installation', title:{da:'Installation C \u2013 Kontor 63 A med harmoniske',en:'Installation C \u2013 Office 63 A with harmonics'},
    brief:{da:'Kontor, 3\u00d763 A. 8 kredse i f\u00e6lles kabelkanal. Mange LED-drivere/lysstof \u2192 3. harmoniske. Dimensionér med hensyn til neutralleder og gruppering.',en:'Office, 3\u00d763 A. 8 circuits in a shared trunking. Many LED drivers/fluorescent \u2192 3rd harmonics. Size considering the neutral and grouping.'},
    steps:[
      { q:{da:'3. harmoniske str\u00f8mme i et 3-faset 4-leder system samles i...?',en:'3rd harmonic currents in a 3-phase 4-wire system add up in...?'}, opts:[{da:'Neutrallederen (de adderer sig)',en:'The neutral (they add up)'},{da:'Jordlederen',en:'The earth conductor'},{da:'Faserne oph\u00e6ves',en:'The phases cancel'},{da:'De forsvinder',en:'They disappear'}], ci:0, ex:{da:'Triplen-harmoniske (3., 9., ...) er i fase i alle tre faser og adderer sig aritmetisk i neutrallederen. Neutralstr\u00f8mmen kan overstige fasestr\u00f8mmen \u2014 selv ved balanceret last.',en:'Triplen harmonics (3rd, 9th, ...) are in phase across all three phases and add arithmetically in the neutral. Neutral current can exceed phase current \u2014 even with balanced load.'}, clause:'DS/HD 60364-5-52, Annex E' },
      { q:{da:'Ved 3. harmoniske > 33% \u2013 hvordan behandles neutrallederen?',en:'With 3rd harmonic > 33% \u2013 how is the neutral treated?'}, opts:[{da:'Som en fuldt belastet str\u00f8mf\u00f8rende leder',en:'As a fully loaded current-carrying conductor'},{da:'Ignoreres',en:'Ignored'},{da:'Halveres',en:'Halved'},{da:'Fjernes',en:'Removed'}], ci:0, ex:{da:'Ved >33% 3. harmoniske kan neutralstr\u00f8mmen > fasestr\u00f8m. Neutrallederen regnes som str\u00f8mf\u00f8rende og dimensioneres derefter \u2014 ofte forst\u00f8rres tv\u00e6rsnittet.',en:'Above 33% 3rd harmonic, neutral current can exceed phase current. The neutral counts as current-carrying and is sized accordingly \u2014 often upsized.'}, clause:'DS/HD 60364-5-52 \u00a7523.6.3 + Annex E' },
      { q:{da:'Indg\u00e5r en belastet neutralleder i optællingen af belastede ledere?',en:'Does a loaded neutral count in the number of loaded conductors?'}, opts:[{da:'Ja \u2013 den t\u00e6ller med som belastet leder',en:'Yes \u2013 it counts as a loaded conductor'},{da:'Kun faser t\u00e6ller',en:'Only phases count'},{da:'Ingen t\u00e6ller',en:'None count'},{da:'Halvdelen',en:'Half'}], ci:0, ex:{da:'N\u00e5r neutrallederen er str\u00f8mf\u00f8rende pga. harmoniske, indg\u00e5r den i optællingen af belastede ledere \u2014 det \u00f8ger den effektive belastning og kan kr\u00e6ve yderligere grupperingskorrektion.',en:'When the neutral is current-carrying due to harmonics, it counts among loaded conductors \u2014 increasing effective load and possibly requiring extra grouping correction.'}, clause:'DS/HD 60364-5-52 \u00a7523.6.3' },
      { q:{da:'8 kredse i f\u00e6lles kanal \u2013 grupperingsfaktor (ca.)?',en:'8 circuits in a shared trunking \u2013 grouping factor (approx.)?'}, opts:['\u22480,52','\u22480,80','\u22481,00','\u22480,70'], ci:0, ex:{da:'8 belastede kredse samlet \u2192 faktor \u2248 0,52. Iz falder til ca. halvdelen. Mange kredse samlet er en klassisk faldgrube \u2014 kablerne overophedes hvis det ignoreres.',en:'8 bunched loaded circuits \u2192 factor \u2248 0.52. Iz drops to about half. Bunching is a classic pitfall \u2014 cables overheat if ignored.'}, clause:'DS/HD 60364-5-52, Tabel B.52.17' },
      { q:{da:'Samlet konsekvens for kabelvalg?',en:'Overall consequence for cable selection?'}, opts:[{da:'St\u00f8rre tv\u00e6rsnit s\u00e5 Iz_korr \u2265 In, og forst\u00f8r neutral',en:'Larger cross-section so Iz_corr \u2265 In, and upsize the neutral'},{da:'Behold mindste kabel',en:'Keep the smallest cable'},{da:'Reducér neutral',en:'Reduce the neutral'},{da:'Drop gruppering',en:'Skip grouping'}], ci:0, ex:{da:'Gruppering (0,52) OG harmonisk neutralbelastning tr\u00e6kker Iz markant ned. V\u00e6lg st\u00f8rre faseledere s\u00e5 Iz_korr \u2265 In \u2265 IB, og dimensionér neutrallederen mindst som faserne (ofte st\u00f8rre).',en:'Grouping (0.52) AND harmonic neutral load pull Iz down sharply. Choose larger phases so Iz_corr \u2265 In \u2265 IB, and size the neutral at least as the phases (often larger).'}, clause:'DS/HD 60364-4-43 \u00a7433.1; \u00a7523.6.3' },
      { q:{da:'Hvorfor er korrekt neutraldimensionering en SIKKERHEDSsag?',en:'Why is correct neutral sizing a SAFETY matter?'}, opts:[{da:'Overbelastet neutral kan overophede uden at fasesikringen ser det \u2192 brandfare',en:'An overloaded neutral can overheat unseen by phase protection \u2192 fire hazard'},{da:'Det er kun et effektivitetssp\u00f8rgsm\u00e5l',en:'It is only an efficiency matter'},{da:'Neutral f\u00f8rer aldrig str\u00f8m',en:'The neutral never carries current'},{da:'Ingen risiko',en:'No risk'}], ci:0, ex:{da:'Faseovercurrent-beskyttelsen overv\u00e5ger ikke altid neutralstr\u00f8mmen \u2192 en harmonisk-overbelastet, undersizet neutral kan overophede uopdaget \u2192 BRANDFARE.',en:'Phase overcurrent protection does not always monitor neutral current \u2192 a harmonic-overloaded, undersized neutral can overheat undetected \u2192 FIRE HAZARD.'}, clause:'DS/HD 60364-5-52 \u00a7523.6.3' }
    ] },
  { id:'s8', cat:'installation', title:{da:'Installation D \u2013 V\u00e6rksted med motorgruppe',en:'Installation D \u2013 Workshop with motor group'},
    brief:{da:'V\u00e6rksted, 3\u00d7250 A tavle (gG 250 A forankoblet). Tre motorafgange (18,5 / 11 / 7,5 kW) + almen kraft. Beregn samlet last, v\u00e6lg beskyttelse og sikr selektivitet. Ik max p\u00e5 tavlen = 12 kA.',en:'Workshop, 3\u00d7250 A board (gG 250 A upstream). Three motor feeders (18.5 / 11 / 7.5 kW) + general power. Compute total load, choose protection and ensure selectivity. Ik max at the board = 12 kA.'},
    steps:[
      { q:{da:'Str\u00f8m for 18,5 kW motor (cos\u03c6 0,86, \u03b7 0,91)?',en:'Current for the 18.5 kW motor (cos\u03c6 0.86, \u03b7 0.91)?'}, opts:['\u224834 A','\u224827 A','\u224845 A','\u224818 A'], ci:0, ex:{da:'In = 18500/(1,732\u00b7400\u00b70,86\u00b70,91) \u2248 34 A.',en:'In = 18500/(1.732\u00b7400\u00b70.86\u00b70.91) \u2248 34 A.'}, clause:'DS/HD 60364-4-43 \u00a7433.1' },
      { q:{da:'Samlet motorstr\u00f8m hvis alle k\u00f8rer (18,5+11+7,5 kW)?',en:'Total motor current if all run (18.5+11+7.5 kW)?'}, opts:['\u224868 A','\u224834 A','\u224848 A','\u2248120 A'], ci:0, ex:{da:'\u224834 + 20 + 14 \u2248 68 A. Samtidighed kan anvendes p\u00e5 blandet last efter vurdering \u2014 men v\u00e6r konservativ i et v\u00e6rksted hvor alt kan k\u00f8re samtidigt.',en:'\u224834 + 20 + 14 \u2248 68 A. Diversity can be applied to mixed load after assessment \u2014 but be conservative in a workshop where everything may run at once.'}, clause:'DS/HD 60364-4-43 \u00a7433.1' },
      { q:{da:'St\u00f8rste motor starter DOL \u2013 dimensionér forsyningen efter?',en:'Largest motor starts DOL \u2013 size the supply for?'}, opts:[{da:'Sum af l\u00f8bende last + den ST\u00d8RSTE motors startstr\u00f8m',en:'Sum of running load + the LARGEST motor inrush'},{da:'Kun l\u00f8bende last',en:'Running load only'},{da:'Kun startstr\u00f8m for alle',en:'Inrush of all motors'},{da:'Tilf\u00e6ldigt',en:'Arbitrary'}], ci:0, ex:{da:'Klassisk regel: dimensionér efter (sum af kontinuerlige str\u00f8mme) + (startstr\u00f8msbidrag fra den st\u00f8rste motor). 18,5 kW DOL kan give ~6\u20138\u00d7 = 200+ A kortvarigt.',en:'Classic rule: size for (sum of continuous currents) + (inrush of the largest motor). The 18.5 kW DOL can give ~6\u20138\u00d7 = 200+ A briefly.'}, clause:'DS/HD 60364; god praksis' },
      { q:{da:'250 A gG i tavle, motorafgang sikret med 40 A gG \u2013 selektivt?',en:'250 A gG at the board, motor feeder with 40 A gG \u2013 selective?'}, opts:[{da:'Ja \u2013 forhold ~6:1 > 1,6:1 (bekr\u00e6ft i tabel)',en:'Yes \u2013 ratio ~6:1 > 1.6:1 (confirm in table)'},{da:'Nej',en:'No'},{da:'Kun ved samme st\u00f8rrelse',en:'Only if same size'},{da:'Aldrig',en:'Never'}], ci:0, ex:{da:'gG/gG er typisk selektive ved \u2265 1,6:1. 250/40 \u2248 6:1 \u2192 selektivitet sandsynlig. Bekr\u00e6ft altid i fabrikantens I\u00b2t-/selektivitetstabel.',en:'gG/gG are typically selective at \u2265 1.6:1. 250/40 \u2248 6:1 \u2192 selectivity likely. Always confirm in the manufacturer I\u00b2t/selectivity table.'}, clause:'DS/HD 60364-5-53 \u00a7536; IEC 60269' },
      { q:{da:'Selektivitet mellem 250 A gG (opstr\u00f8ms) og en C40 MCB (nedstr\u00f8ms)?',en:'Selectivity between 250 A gG (upstream) and a C40 MCB (downstream)?'}, opts:[{da:'Begr\u00e6nset \u2013 kun selektiv op til en bestemt fejlstr\u00f8m; tjek tabel',en:'Limited \u2013 only selective up to a certain fault current; check the table'},{da:'Altid fuldt selektiv',en:'Always fully selective'},{da:'Aldrig selektiv',en:'Never selective'},{da:'Selektiv hvis MCB > sikring',en:'Selective if MCB > fuse'}], ci:0, ex:{da:'Mellem en opstr\u00f8ms sikring og en nedstr\u00f8ms MCB er selektivitet ofte kun delvis \u2014 fuldt selektiv op til en gr\u00e6nsestr\u00f8m, derover kan begge udl\u00f8se. Tjek ALTID fabrikantens selektivitetstabel; antag ikke.',en:'Between an upstream fuse and a downstream MCB selectivity is often only partial \u2014 fully selective up to a limit current, above which both may trip. ALWAYS check the manufacturer table; do not assume.'}, clause:'DS/HD 60364-5-53 \u00a7536' },
      { q:{da:'Brydeevne for tavlens afgange ved Ik max = 12 kA?',en:'Breaking capacity for the board feeders at Ik max = 12 kA?'}, opts:[{da:'Icu \u2265 12 kA for hver afbryder',en:'Icu \u2265 12 kA for each device'},{da:'Icu \u2265 In',en:'Icu \u2265 In'},{da:'Icu \u2265 IB',en:'Icu \u2265 IB'},{da:'Icu \u2265 1 kA',en:'Icu \u2265 1 kA'}], ci:0, ex:{da:'Hver afbryder/MCB skal have Icu \u2265 prospektiv Ik max p\u00e5 sit monteringssted (12 kA). En MCB med fx 6 kA ville v\u00e6re FARLIG. Backup-beskyttelse fra opstr\u00f8ms sikring kan i nogle tilf\u00e6lde anvendes (fabrikantverificeret).',en:'Each device/MCB must have Icu \u2265 prospective Ik max at its location (12 kA). A 6 kA MCB would be DANGEROUS. Backup protection from the upstream fuse may sometimes be used (manufacturer-verified).'}, clause:'DS/HD 60364-4-43 \u00a7434.5.1' }
    ] },
  { id:'s9', cat:'installation', title:{da:'Installation E \u2013 TT-system (landejendom)',en:'Installation E \u2013 TT system (rural property)'},
    brief:{da:'Landejendom p\u00e5 TT-system med egen jordelektrode, 230/400 V. HPFI er prim\u00e6r fejlbeskyttelse. Vurder jordelektrode, frakobling og RCD-koordinering.',en:'Rural property on a TT system with its own earth electrode, 230/400 V. The RCD is the primary fault protection. Assess the earth electrode, disconnection and RCD coordination.'},
    steps:[

const EXAM_CATNAME = { forsyning:{da:'Forsyning',en:'Supply'}, maskine:{da:'Maskine',en:'Machine'}, installation:{da:'Installation',en:'Installation'} };
const EXAM_PASS = 80;
const EXAM_CAT_FLOOR = 60;

function examQuizScore(){ let c=0,a=0; EXAM_QUIZ.forEach((q,i)=>{ if(examState.quizPick[i]!==undefined){ a++; if(examState.quizPick[i]===q.ci) c++; } }); return { correct:c, answered:a, total:EXAM_QUIZ.length }; }
function examScenScore(sc){ let c=0; sc.steps.forEach((s,i)=>{ if(examState.scPick[sc.id+':'+i]===s.ci) c++; }); return { correct:c, total:sc.steps.length }; }
function examScenAnswered(sc){ let a=0; sc.steps.forEach((s,i)=>{ if(examState.scPick[sc.id+':'+i]!==undefined) a++; }); return a; }

function examSaveScenario(sc){
  const store = examLoadStore(); store.sc = store.sc || {};
  const pct = Math.round(100 * examScenScore(sc).correct / sc.steps.length);
  const prev = store.sc[sc.id] || { best:0, attempts:0 };
  const wrongClauses = sc.steps.filter((s,i)=>examState.scPick[sc.id+':'+i]!==s.ci).map(s=>s.clause);
  store.sc[sc.id] = { best:Math.max(prev.best, pct), last:pct, attempts:prev.attempts + 1, cat:sc.cat, lastWrongClauses:wrongClauses };
  examSaveStore(store);
}

function examPickQuiz(i){
  if(examState.quizPick[examState.quizIdx]!==undefined) return;
  examState.quizPick[examState.quizIdx] = i;
  const s = examQuizScore();
  if(s.answered === s.total){ const store = examLoadStore(); const pct = Math.round(100*s.correct/s.total); store.quizBest = Math.max(store.quizBest||0, pct); store.quizLast = pct; store.quizWrongClauses = EXAM_QUIZ.filter((q,i)=>examState.quizPick[i]!==q.ci).map(q=>q.clause); examSaveStore(store); }
  renderModule('exam');
}
function examQuizGo(i){ examState.quizIdx = Math.max(0, Math.min(EXAM_QUIZ.length-1, i)); renderModule('exam'); }
function examResetQuiz(){ examState.quizPick = {}; examState.quizOrder = {}; examState.quizReview = false; examState.quizIdx = 0; renderModule('exam'); }

function examPickStep(i){
  const sc = EXAM_SCEN.find(s=>s.id===examState.scId); if(!sc) return;
  const k = sc.id+':'+examState.step;
  if(examState.scPick[k]!==undefined) return;
  examState.scPick[k] = i;
  if(examScenAnswered(sc) === sc.steps.length) examSaveScenario(sc);
  renderModule('exam');
}
function examScenStep(d){ const sc = EXAM_SCEN.find(s=>s.id===examState.scId); if(!sc) return; examState.step = Math.max(0, Math.min(sc.steps.length-1, examState.step+d)); renderModule('exam'); }
function examOpenScen(id){ examState.scId = id; examState.step = 0; renderModule('exam'); }
function examBackToList(){ examState.scId = null; renderModule('exam'); }
function examResetScen(id){ Object.keys(examState.scPick).forEach(k=>{ if(k.indexOf(id+':')===0) delete examState.scPick[k]; }); Object.keys(examState.scOrder).forEach(k=>{ if(k.indexOf(id+':')===0) delete examState.scOrder[k]; }); examState.step = 0; renderModule('exam'); }
function examTab(t){ examState.tab = t; examState.scId = null; examState.quizReview = false; examState.mockReview = false; renderModule('exam'); }
function examSetMode(m){ examState.mode = m; renderModule('exam'); }
let examKeyTaps = 0;
function examKeyTap(){ examKeyTaps++; if(examKeyTaps>=5){ examKeyTaps=0; examState.tab='answerkey'; renderModule('exam'); } setTimeout(function(){ examKeyTaps=0; },2000); }

function examResetAll(){ try { localStorage.removeItem('examStore'); } catch(e){} examState.quizPick = {}; examState.quizOrder = {}; examState.quizReview = false; examState.scPick = {}; examState.scOrder = {}; examState.mockReview = false; examState.quizIdx = 0; examState.step = 0; renderModule('exam'); }

function examStartTimer(){ examState.timerOn = true; examState.timerEnd = Date.now() + examState.timerLeft*1000; if(examTimerHandle) clearInterval(examTimerHandle); examTimerHandle = setInterval(examTick, 1000); renderModule('exam'); }
function examPauseTimer(){ examState.timerOn = false; if(examTimerHandle){ clearInterval(examTimerHandle); examTimerHandle = null; } renderModule('exam'); }
function examResetTimer(){ examState.timerOn = false; if(examTimerHandle){ clearInterval(examTimerHandle); examTimerHandle = null; } examState.timerLeft = 3600; renderModule('exam'); }
function examTick(){ const left = Math.max(0, Math.round((examState.timerEnd - Date.now())/1000)); examState.timerLeft = left; const el = document.getElementById('examTimer'); if(el) el.textContent = examFmtTime(left); if(left<=0){ if(examTimerHandle){ clearInterval(examTimerHandle); examTimerHandle = null; } examState.timerOn = false; renderModule('exam'); } }
function examFeedback(ok, exObj, clause){
  const da = lang==='da';
  return `<div class="result-box ${ok?'':'error'}" style="margin-top:12px">`
    + `<div class="result-title">${ok?(tx('\u2705 Rigtigt', '\u2705 Correct')):(tx('\u274c Forkert \u2014 l\u00e6r af det', '\u274c Wrong \u2014 learn from it'))}</div>`
    + `<div style="padding:6px 2px;line-height:1.5">\uD83D\uDC68\u200D\uD83C\uDFEB <strong>${tx('L\u00e6rling:', 'Apprentice:')}</strong> ${examL(exObj)}</div>`
    + `<div class="result-row"><span class="label">\uD83D\uDCD8 ${tx('Reference', 'Reference')}</span><span class="value">${clause}</span></div></div>`;
}

function examReportData(){
  const store = examLoadStore(); const ss = store.sc || {};
  const cats = {}; ['forsyning','maskine','installation'].forEach(c=>cats[c]={sum:0,n:0,done:0,total:0});
  EXAM_SCEN.forEach(sc=>{ const cc=cats[sc.cat]; cc.total++; const r=ss[sc.id]; if(r){ cc.sum+=r.best; cc.n++; cc.done++; } });
  const clauseCount = {};
  Object.keys(ss).forEach(id=>{ (ss[id].lastWrongClauses||[]).forEach(cl=>{ clauseCount[cl]=(clauseCount[cl]||0)+1; }); });
  (store.quizWrongClauses||[]).forEach(cl=>{ clauseCount[cl]=(clauseCount[cl]||0)+1; });

    + `<div class="select-group"><div class="select-label">${tx('Pr\u00f8vetimer (60 min, valgfri)', 'Exam timer (60 min, optional)')}</div>`
    + `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">`
    + `<span id="examTimer" style="font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums;color:${timerColor}">${examFmtTime(tleft)}</span>`
    + (examState.timerOn ? `<button class="sel-btn" onclick="examPauseTimer()">\u23F8 ${tx('Pause', 'Pause')}</button>` : `<button class="sel-btn selected" onclick="examStartTimer()">\u25B6 ${tx('Start', 'Start')}</button>`)

    + `</div></div>`;
  const body = examState.tab==='answerkey' ? examRenderAnswerKey() : (examState.tab==='quiz' ? examRenderQuiz() : (examState.tab==='mock' ? renderMock() : (examState.scId ? examRenderScenario() : examRenderScenList())));
  return head + body;
}

function examRenderQuiz(){

    + `<button class="sel-btn" ${i>=EXAM_QUIZ.length-1?"disabled style='opacity:.4'":''} onclick="examQuizGo(${i+1})">${tx('N\u00e6ste', 'Next')} \u25B6</button>`

function examRenderScenList(){

  const cats={}; ['forsyning','maskine','installation'].forEach(c=>cats[c]={sum:0,n:0,done:0,total:0});
  EXAM_SCEN.forEach(sc=>{ const cc=cats[sc.cat]; cc.total++; const r=ss[sc.id]; if(r){ cc.sum+=r.best; cc.n++; cc.done++; } });
  let weak=[];
  ['forsyning','maskine','installation'].forEach(c=>{ if(cats[c].n>0){ const avg=Math.round(cats[c].sum/cats[c].n); if(avg<EXAM_PASS) weak.push(examL(EXAM_CATNAME[c])+' ('+avg+'%)'); } });
  let resPanel = `<div class="card fade-in"><div class="card-title">\uD83D\uDCCA ${tx('Mine resultater', 'My results')}</div>`;
  ['forsyning','maskine','installation'].forEach(c=>{ const cc=cats[c]; const avg=cc.n?Math.round(cc.sum/cc.n):null; resPanel += `<div class="result-row"><span class="label">${examL(EXAM_CATNAME[c])}</span><span class="value">${cc.done}/${cc.total} ${tx('l\u00f8st', 'done')}${avg!==null?' \u00b7 '+avg+'%':''}</span></div>`; });
  resPanel += `<div class="result-row"><span class="label">${tx('Svage omr\u00e5der', 'Weak areas')}</span><span class="value" style="color:${weak.length?'var(--danger)':'var(--success)'}">${weak.length?weak.join(', '):(tx('Ingen endnu', 'None yet'))}</span></div>`;
  const rd = examReportData();
  if(rd.weakClauses.length){ resPanel += `<div class="result-row"><span class="label">${tx('Svage klausuler (gennemg\u00e5)', 'Weak clauses (review)')}</span><span class="value" style="color:var(--danger);text-align:right;max-width:70%">${rd.weakClauses.slice(0,4).map(function(w){return w.clause+' \u00d7'+w.count;}).join('<br>')}</span></div>`; }
  resPanel += `<div class="select-grid" style="margin-top:10px"><button class="sel-btn" onclick="examPrintReport()">\uD83D\uDDA8\uFE0F ${tx('Udskriv rapport', 'Print report')}</button><button class="sel-btn" onclick="examDownloadReport()">\u2B07\uFE0F ${tx('Download .txt', 'Download .txt')}</button><button class="sel-btn" onclick="examResetAll()">\u21BA ${tx('Nulstil alle', 'Reset all')}</button></div></div>`;
  let groups='';
  ['forsyning','maskine','installation'].forEach(c=>{
    groups += `<div class="card fade-in"><div class="card-title">${examL(EXAM_CATNAME[c])}</div>`;
    EXAM_SCEN.filter(sc=>sc.cat===c).forEach(sc=>{
      const r = ss[sc.id];
      const badge = r ? `<span style="font-weight:800;color:${r.best>=EXAM_PASS?'var(--success)':'var(--danger)'}">${r.best}%</span>` : `<span style="color:var(--text-light)">${tx('Ikke l\u00f8st', 'Not done')}</span>`;
      groups += `<div class="result-row" style="cursor:pointer" onclick="examOpenScen('${sc.id}')"><span class="label">${examL(sc.title)} \u00b7 ${sc.steps.length} ${tx('trin', 'steps')}</span><span class="value">${badge} \u25B6</span></div>`;
    });
    groups += `</div>`;
  });
  return resPanel + groups;
}

function examRenderScenario(){

  const sc = EXAM_SCEN.find(s=>s.id===examState.scId); if(!sc) return examRenderScenList();
  const stepN = sc.steps.length, i = examState.step, step = sc.steps[i];

  }).join('');

      + `<div class="result-row"><span class="label">${tx('Rigtige trin', 'Correct steps')}</span><span class="value">${r.correct}/${stepN}</span></div>`
      + `<div class="result-row"><span class="label">${tx('Kr\u00e6vet', 'Required')}</span><span class="value">${EXAM_PASS}%</span></div>`
      + (wrong.length?`<div class="result-row"><span class="label">${tx('Gennemg\u00e5 trin', 'Review steps')}</span><span class="value" style="color:var(--danger)">${wrong.join(', ')}</span></div>`:'')

    + fb + verdict + nav + `</div>`;
