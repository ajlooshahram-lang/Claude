<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El-Dimensionering / Electrical Dimensioning</title>
<style>
:root {
  --primary: #0f4c75;
  --primary-light: #3282b8;
  --primary-glow: rgba(50,130,184,0.15);
  --accent: #00b4d8;
  --accent-soft: #90e0ef;
  --success: #06d6a0;
  --success-bg: rgba(6,214,160,0.08);
  --danger: #ef476f;
  --danger-bg: rgba(239,71,111,0.08);
  --warning: #ffd166;
  --warning-bg: rgba(255,209,102,0.1);
  --bg: #f0f4f8;
  --bg-gradient: linear-gradient(180deg, #e8eef5 0%, #f0f4f8 100%);
  --card: #ffffff;
  --text: #1b2838;
  --text-light: #5a6d7e;
  --text-muted: #8fa3b5;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --shadow-sm: 0 1px 3px rgba(15,76,117,0.04), 0 1px 2px rgba(15,76,117,0.06);
  --shadow: 0 4px 12px rgba(15,76,117,0.06), 0 1px 3px rgba(15,76,117,0.08);
  --shadow-lg: 0 10px 30px rgba(15,76,117,0.08), 0 4px 10px rgba(15,76,117,0.05);
  --shadow-glow: 0 0 20px rgba(50,130,184,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: var(--bg-gradient);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0a2e4d 0%, var(--primary) 50%, var(--primary-light) 100%);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(10,46,77,0.25);
  backdrop-filter: blur(10px);
}

.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.lang-toggle {
  display: flex;
  gap: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 22px;
  padding: 3px;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.1);
}

.lang-btn {
  padding: 6px 16px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 700;
  background: transparent;
  color: rgba(255,255,255,0.6);
  transition: var(--transition);
  letter-spacing: 0.5px;
}

.lang-btn:hover { color: rgba(255,255,255,0.9); }
.lang-btn.active {
  background: white;
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Navigation */
.nav {
  display: flex;
  gap: 8px;
  padding: 14px 20px;
  background: white;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-shadow: var(--shadow-sm);
}
.nav::-webkit-scrollbar { display: none; }

.nav-btn {
  padding: 9px 18px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--bg);
  color: var(--text-light);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: var(--transition);
  letter-spacing: 0.2px;
}

.nav-btn:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  background: var(--primary-glow);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.nav-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-color: transparent;
  box-shadow: 0 3px 12px rgba(15,76,117,0.3);
  transform: translateY(-1px);
}

/* Main Content */
.main {
  padding: 20px;
  max-width: 920px;
  margin: 0 auto;
}

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid var(--border-light);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: var(--transition);
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.card:hover::before { opacity: 1; }

.card-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border-light);
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Selection Grid */
.select-group {
  margin-bottom: 20px;
}

.select-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.select-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.sel-btn {
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  color: var(--text);
  font-size: 0.84rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  min-width: 52px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.sel-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--primary-glow);
  opacity: 0;
  transition: var(--transition);
}

.sel-btn:hover {
  border-color: var(--primary-light);
  background: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(50,130,184,0.12);
}

.sel-btn:hover::after { opacity: 1; }

.sel-btn:active {
  transform: translateY(0);
  box-shadow: none;
}

.sel-btn.selected {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(15,76,117,0.25);
  transform: translateY(-1px);
}

.sel-btn.selected::after { display: none; }
.sel-btn.disabled { opacity: 0.35; pointer-events: none; filter: grayscale(0.5); }

/* Results */
.result-box {
  background: linear-gradient(135deg, rgba(6,214,160,0.05), rgba(6,214,160,0.02));
  border: 1.5px solid var(--success);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-top: 18px;
  position: relative;
  overflow: hidden;
}

.result-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--success);
  border-radius: 2px;
}

.result-box.warning {
  background: linear-gradient(135deg, rgba(255,209,102,0.06), rgba(255,209,102,0.02));
  border-color: var(--warning);
}
.result-box.warning::before { background: var(--warning); }

.result-box.error {
  background: linear-gradient(135deg, rgba(239,71,111,0.04), rgba(239,71,111,0.02));
  border-color: var(--danger);
}
.result-box.error::before { background: var(--danger); }

.result-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  color: var(--success);
  padding-left: 8px;
}

.result-box.warning .result-title { color: #b8860b; }
.result-box.error .result-title { color: var(--danger); }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 8px 8px 12px;
  margin: 2px 0;
  border-radius: 6px;
  font-size: 0.88rem;
  transition: var(--transition);
}

.result-row:hover { background: rgba(15,76,117,0.03); }
.result-row .label { color: var(--text-light); font-weight: 500; }
.result-row .value { font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

/* Verification badges */
.verify-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.verify-badge.ok {
  background: linear-gradient(135deg, rgba(6,214,160,0.15), rgba(6,214,160,0.08));
  color: #047857;
  border: 1px solid rgba(6,214,160,0.3);
}

.verify-badge.fail {
  background: linear-gradient(135deg, rgba(239,71,111,0.12), rgba(239,71,111,0.06));
  color: #b91c46;
  border: 1px solid rgba(239,71,111,0.3);
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.82rem;
  margin-top: 12px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.data-table th {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
  transition: var(--transition);
}

.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--primary-glow); }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 1.05rem; }
  .nav { padding: 10px 12px; gap: 6px; }
  .nav-btn { font-size: 0.72rem; padding: 7px 12px; }
  .card { padding: 16px; margin-bottom: 14px; border-radius: var(--radius); }
  .sel-btn { padding: 8px 12px; font-size: 0.8rem; min-width: 44px; }
  .main { padding: 14px; }
  .select-grid { gap: 6px; }
}

/* Animations */
.fade-in {
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }

/* Info tooltip */
.info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg, var(--primary-glow), rgba(50,130,184,0.05));
  border: 1px solid rgba(50,130,184,0.12);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  font-size: 0.8rem;
  color: var(--primary);
  font-weight: 500;
}

.info-row::before {
  content: "\2139";
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(15,76,117,0.2);
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Status Bar */
.status-bar {
  display: flex;
  gap: 6px;
  padding: 8px 20px;
  background: linear-gradient(135deg, #f8fafc, #edf2f7);
  border-bottom: 1px solid var(--border-light);
  overflow-x: auto;
  scrollbar-width: none;
  align-items: center;
  min-height: 40px;
}
.status-bar::-webkit-scrollbar { display: none; }
.status-bar:empty { display: none; }

.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-light);
  white-space: nowrap;
  transition: var(--transition);
  cursor: pointer;
}

.status-chip:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.status-chip .chip-label {
  color: var(--text-muted);
  font-weight: 500;
}

.status-chip .chip-value {
  color: var(--primary);
  font-weight: 700;
}

.status-chip.has-value {
  background: var(--primary-glow);
  border-color: rgba(50,130,184,0.2);
}

/* ===== DARK MODE ===== */
body.dark {
  --primary: #4a9fd4;
  --primary-light: #6bb6e0;
  --primary-glow: rgba(74,159,212,0.18);
  --accent: #2ec7e0;
  --bg: #0f1620;
  --bg-gradient: linear-gradient(180deg, #0b1119 0%, #0f1620 100%);
  --card: #1a2330;
  --text: #e6edf3;
  --text-light: #aab8c5;
  --text-muted: #718595;
  --border: #2a3645;
  --border-light: #232e3b;
  --success: #2ee6a8;
  --success-bg: rgba(46,230,168,0.10);
  --danger: #ff6b8a;
  --danger-bg: rgba(255,107,138,0.10);
  --warning: #ffd27a;
  --warning-bg: rgba(255,210,122,0.12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.45);
}
body.dark .sel-btn { background: #1a2535; color: #b8d4e8; border-color: #2a3f55; }
body.dark .sel-btn:hover { background: #1f3048; border-color: #00e5ff; color: #e0f4ff; box-shadow: 0 0 10px rgba(0,229,255,0.25); }
body.dark .sel-btn.selected { background: linear-gradient(135deg, #00c8ff, #0080ff); color: #fff; border-color: transparent; box-shadow: 0 0 18px rgba(0,229,255,0.75), 0 0 4px rgba(0,200,255,0.9); text-shadow: 0 0 6px rgba(255,255,255,0.5); }
body.dark .nav { background: #0f1a26; }
body.dark .nav-btn { background: #1a2535; color: #8ab4d0; border-color: #2a3f55; }
body.dark .nav-btn:hover { border-color: #00e5ff; color: #e0f4ff; box-shadow: 0 0 8px rgba(0,229,255,0.3); }
body.dark .nav-btn.active { background: linear-gradient(135deg, #00c8ff, #0080ff); color: #fff; border-color: transparent; box-shadow: 0 0 14px rgba(0,229,255,0.7); }
body.dark .status-bar { background: linear-gradient(135deg, #161f2a, #1a2330); }
body.dark .status-chip { background: #1a2535; border-color: #2a3f55; }
body.dark .status-chip.has-value { background: rgba(0,200,255,0.12); border-color: rgba(0,229,255,0.4); }
body.dark #aiSearchBox { background: #1a2535; color: #e0f4ff; border-color: #00c8ff; box-shadow: 0 0 8px rgba(0,200,255,0.2); }
body.dark .card { border-color: #1f3048; }
body.dark .card-title { color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.4); }
body.dark .result-box { background: rgba(10,25,40,0.8); border-color: #1f4060; }
body.dark .result-box.warning { background: rgba(40,30,10,0.6); border-color: #7a5a00; }
body.dark .result-box.error { background: rgba(40,10,20,0.6); border-color: #7a0025; }
body.dark .result-row { border-color: rgba(100,180,255,0.08); }
body.dark .result-row .label { color: #8cc8e8; }
body.dark .result-row .value { color: #e8f4ff; }
body.dark .result-title { color: #00ffc8; }
body.dark .info-row { background: rgba(0,180,255,0.08); border-color: rgba(0,200,255,0.2); color: #7dd4f0; }
body.dark .select-label { color: #6aa8c8; }
body.dark .data-table th { background: linear-gradient(135deg, #0a2540, #0f3050); }
body.dark .data-table td { border-color: #1f3048; color: #c8e0f0; }
body.dark .data-table tr:hover td { background: rgba(0,200,255,0.08); }
body.dark .verify-badge.ok { background: rgba(0,255,200,0.15); color: #00ffc8; border-color: rgba(0,255,200,0.3); }
body.dark .verify-badge.fail { background: rgba(255,80,120,0.15); color: #ff8aa6; border-color: rgba(255,80,120,0.3); }
body.dark img { filter: brightness(0.92); }
.theme-btn {
  border: none;
  background: rgba(255,255,255,0.12);
  color: #fff;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.theme-btn:hover { background: rgba(255,255,255,0.25); }

/* ===== PRINT / PDF ===== */
@media print {
  .header, .nav, .status-bar, .theme-btn, .lang-toggle { display: none !important; }
  body { background: #fff; }
  .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; }
  .card::before { display: none; }
  .sel-btn { display: none !important; }
  .main { padding: 0; max-width: 100%; }
  .no-print { display: none !important; }
  .print-only { display: block !important; }
  img { filter: none !important; }
}
.print-only { display: none; }
</style>
</head>

<div class="header">

  <div style="display:flex;align-items:center;gap:10px">
    <button id="themeBtn" class="theme-btn" onclick="toggleTheme()" title="Dark / Light">🌙</button>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('da')">DA</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<div class="nav" id="mainNav"></div>
<div class="status-bar" id="statusBar"></div>

<div class="main" id="mainContent"></div>

// Alias to the translation tables so self-tests can probe the Danish fallback
// without colliding with local variables also named `T` (e.g. the self-test
// results array inside runSelfTests()).
const I18N = T;

// Every UI string key introduced by the dimensioning-correctness-hardening
// feature (Tasks 1, 7, 8, 10). Each MUST resolve to a non-empty value in BOTH
// da and en; a missing active-language value falls back to Danish (see t()).
// Used by the Property 19 bilingual-completeness self-test.
const NEW_I18N_KEYS = [
  'verdictPanelTitle', 'verdictInputsTitle',
  'vStatePass', 'vStateFail', 'vStateInsufficient', 'vRecommendation',
  'vSystemType', 'vCircuitCategory', 'vFinal', 'vDistribution',
  'vTclear', 'vDeviceDerived', 'vRcdIDn', 'vSoil', 'vNotBuried',
  'vTitleAmpacity', 'vTitleOverload', 'vTitleAdiabatic', 'vTitleZs',
  'cableVerifyTitle'
];

// t(): resolve a key in the active language. Life-safety-critical strings must
// never render blank or as a raw key — so if the active-language value is
// missing or empty, fall back to the authoritative Danish text, and only if
// that is also missing return the key itself. (Req 8.4, 8.5.)
function t(key) {
  const active = T[lang] ? T[lang][key] : undefined;
  if (active !== undefined && active !== null && active !== '') return active;
  const da = T.da ? T.da[key] : undefined;
  if (da !== undefined && da !== null && da !== '') return da;
  return key;
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.getElementById('appTitleText').textContent = t('appTitle');
  renderNav();
  renderModule(activeModule);
}

// ============================================================================
// ===== CORRECTNESS ENGINE — SHARED PURE FUNCTIONS ===========================
// Single source of truth for derating. recommendCables, the cable AI assistant
// and the cable module display all route through computeDeratedIz so derating
// can never again be "display only".
// ============================================================================

// Resolve one correction-factor category to its active value, applying the
// conservative default (numerically lowest value ≤ 1.0 — most reducing) when
// the key is not selected. For 'cs', when the installation is NOT buried the
// soil correction does not apply and the value is a non-defaulted 1.0.
// category: 'ca' | 'cg' | 'cs' | 'kInstall'
// Returns { value, defaulted, valid, source }.
function getCorrectionFactor(category, key, buried) {
  const tables = { ca: TEMP_FACTORS, cg: GROUP_FACTORS, cs: SOIL_FACTORS, kInstall: INSTALL_METHODS };
  const sources = {
    ca: 'DS/HD 60364-5-52 Annex B (Ca, ambient temperature)',
    cg: 'DS/HD 60364-5-52 Annex B (Cg, grouping)',
    cs: 'DS/HD 60364-5-52 Annex B (Cs, soil resistivity)',
    kInstall: 'DS/HD 60364-5-52 (installation method)'
  };
  const table = tables[category];
  const source = sources[category] || String(category);
  if (!table) return { value: NaN, defaulted: false, valid: false, source };

  // Soil correction only applies to buried installations.
  if (category === 'cs' && !buried) {
    return { value: 1.0, defaulted: false, valid: true, source };
  }

  // Key explicitly selected and present in the reference table.
  if (key !== null && key !== undefined && Object.prototype.hasOwnProperty.call(table, key)) {
    const v = table[key];
    return { value: v, defaulted: false, valid: typeof v === 'number' && isFinite(v), source };
  }

  // Conservative default: the numerically lowest value ≤ 1.0 in this category
  // (guaranteed ≤ every selectable value, so a default never inflates capacity).
  const vals = Object.keys(table).map(function (k) { return table[k]; });
  const reducing = vals.filter(function (v) { return typeof v === 'number' && isFinite(v) && v <= 1.0; });
  const fallback = reducing.length ? Math.min.apply(null, reducing) : Math.min.apply(null, vals);
  return { value: fallback, defaulted: true, valid: isFinite(fallback), source };
}

// Compute the derated continuous ampacity:
//   Derated_Iz = floor(Base_Iz × Ca × Cg × Cs × k_install × 100) / 100  (round DOWN to 2 dp)
// Applies the DD-5 validation guard: rejects non-numeric factors, factors < 0.01,
// and DEFAULTED factors > 1.0 (a default may never increase capacity); honours
// user-selected Annex B values > 1.0 up to the documented ceiling of 1.25.
// opts = { baseIz, caKey, cgKey, csKey, kInstallKey, buried }
function computeDeratedIz(opts) {
  opts = opts || {};
  const baseIz = opts.baseIz;
  const buried = !!opts.buried;
  if (typeof baseIz !== 'number' || !isFinite(baseIz) || baseIz <= 0) {
    return { ok: false, error: { factor: 'baseIz', reason: 'non-numeric' } };
  }
  const ca = getCorrectionFactor('ca', opts.caKey);
  const cg = getCorrectionFactor('cg', opts.cgKey);
  const cs = getCorrectionFactor('cs', opts.csKey, buried);
  const kInstall = getCorrectionFactor('kInstall', opts.kInstallKey);
  const resolved = { ca: ca, cg: cg, cs: cs, kInstall: kInstall };

  // DD-5 validation guard.
  const names = ['ca', 'cg', 'cs', 'kInstall'];
  for (let i = 0; i < names.length; i++) {
    const name = names[i];
    const f = resolved[name];
    const v = f.value;
    if (typeof v !== 'number' || !isFinite(v)) return { ok: false, error: { factor: name, reason: 'non-numeric' } };
    if (v < 0.01) return { ok: false, error: { factor: name, reason: 'below-minimum' } };
    if (f.defaulted && v > 1.0) return { ok: false, error: { factor: name, reason: 'default-exceeds-unity' } };
    if (!f.defaulted && v > 1.25) return { ok: false, error: { factor: name, reason: 'exceeds-ceiling' } };
  }

  const totalFactor = ca.value * cg.value * cs.value * kInstall.value;
  const deratedIz = Math.floor(baseIz * totalFactor * 100) / 100; // round DOWN to 2 dp
  return {
    ok: true,
    deratedIz: deratedIz,
    baseIz: baseIz,
    totalFactor: totalFactor,
    factors: { ca: ca.value, cg: cg.value, cs: cs.value, kInstall: kInstall.value },
    defaulted: { ca: ca.defaulted, cg: cg.defaulted, cs: cs.defaulted, kInstall: kInstall.defaulted }
  };
}

// Convenience wrapper: derate a PRODUCT using its official base Iz table value
// and the active environment selections (falling back to live cableState).
// Returns the numeric Derated_Iz, or NaN when the computation is rejected.
function deratedIzForProduct(product, env) {
  env = env || {};
  const baseIz = officialIz(product);
  const cs = (typeof cableState !== 'undefined') ? cableState : {};
  const installKey = (env.installMethod != null) ? env.installMethod : cs.installMethod;
  const buried = (env.buried != null) ? env.buried : (installKey === 'D');
  const res = computeDeratedIz({
    baseIz: baseIz,
    caKey: (env.temp != null) ? env.temp : cs.temp,
    cgKey: (env.grouping != null) ? env.grouping : cs.grouping,
    csKey: (env.soil != null) ? env.soil : cs.soil,
    kInstallKey: installKey,
    buried: buried
  });
  return res.ok ? res.deratedIz : NaN;
}

// ============================================================================
// ===== CORRECTNESS ENGINE — VERDICT CHECKS (Tasks 3, 4, 5) ==================
// Each check is a pure function returning the shared verdict shape:
//   { id, state:'PASS'|'FAIL'|'INSUFFICIENT_DATA', clause, values:{...},
//     message:{da,en}, recommendation:{da,en}|null }
// Conservative by default: any missing/zero/negative required input yields
// INSUFFICIENT_DATA (never PASS), and every verdict cites its governing
// DS/HD 60364 clause. Danish text is primary; English mirrors it.
// ============================================================================

// Round a current/value to two decimal places for safe comparison & display.
function round2(x) { return Math.round(x * 100) / 100; }

// ---- TASK 3: Overload coordination I2 <= 1,45 x Iz (DS/HD 60364-4-43 §433.1) -

// deviceI2: conventional operating current I2 by device type.
//   gG fuse -> 1.6 x In ; MCB/MCCB -> 1.45 x In ; unknown kind -> 1.6 x In
//   (conservative, with defaulted:true).
// device = { kind:'fuse'|'mcb'|'mccb'|null, inA:Number }.
// Returns { i2, factor, defaulted }.
function deviceI2(device) {
  device = device || {};
  const inA = device.inA;
  let factor, defaulted;
  if (device.kind === 'mcb' || device.kind === 'mccb') {
    factor = 1.45; defaulted = false;
  } else if (device.kind === 'fuse') {
    factor = 1.6; defaulted = false;
  } else {
    factor = 1.6; defaulted = true; // undetermined kind -> highest applicable factor
  }
  const i2 = (typeof inA === 'number' && isFinite(inA)) ? factor * inA : NaN;
  return { i2: i2, factor: factor, defaulted: defaulted };
}

// checkOverloadI2: second condition of overload protection, I2 <= 1,45 x Derated_Iz.
// opts = { device, deratedIz }.
function checkOverloadI2(opts) {
  opts = opts || {};
  const device = opts.device || {};
  const deratedIz = opts.deratedIz;
  const clause = 'DS/HD 60364-4-43 \u00A7433.1';
  const inA = device.inA;
  if (typeof inA !== 'number' || !isFinite(inA) || inA <= 0 ||
      typeof deratedIz !== 'number' || !isFinite(deratedIz) || deratedIz <= 0) {
    return {
      id: 'overload', state: 'INSUFFICIENT_DATA', clause: clause, values: {},
      message: {
        da: 'Overbelastningsbetingelsen (I\u2082 \u2264 1,45 \u00D7 Iz) kunne ikke vurderes \u2014 In eller Derated_Iz mangler.',
        en: 'Overload condition (I\u2082 \u2264 1.45 \u00D7 Iz) could not be evaluated \u2014 In or Derated_Iz missing.'
      },
      recommendation: null
    };
  }
  const di = deviceI2(device);
  const i2 = round2(di.i2);
  const limit = round2(1.45 * deratedIz);
  const values = { i2: i2, limit: limit, factor: di.factor, defaulted: di.defaulted, inA: round2(inA), deratedIz: round2(deratedIz) };
  if (i2 <= limit) {
    return {
      id: 'overload', state: 'PASS', clause: clause, values: values,
      message: {
        da: 'I\u2082 = ' + i2.toFixed(2) + ' A \u2264 1,45 \u00D7 Iz = ' + limit.toFixed(2) + ' A \u2014 overbelastningsbeskyttelse OK.',
        en: 'I\u2082 = ' + i2.toFixed(2) + ' A \u2264 1.45 \u00D7 Iz = ' + limit.toFixed(2) + ' A \u2014 overload protection OK.'
      },
      recommendation: null
    };
  }
  return {
    id: 'overload', state: 'FAIL', clause: clause, values: values,
    message: {
      da: 'I\u2082 = ' + i2.toFixed(2) + ' A > 1,45 \u00D7 Iz = ' + limit.toFixed(2) + ' A \u2014 overbelastningsbeskyttelse ikke opfyldt.',
      en: 'I\u2082 = ' + i2.toFixed(2) + ' A > 1.45 \u00D7 Iz = ' + limit.toFixed(2) + ' A \u2014 overload protection not met.'
    },
    recommendation: {
      da: 'V\u00E6lg et st\u00F8rre tv\u00E6rsnit (h\u00F8jere Derated_Iz) eller en enhed med lavere I\u2082-faktor.',
      en: 'Choose a larger cross-section (higher Derated_Iz) or a device with a lower I\u2082 factor.'
    }
  };
}

// ---- TASK 4: Adiabatic short-circuit withstand k^2*S^2 >= I^2t (§434.5.2) ----

// adiabaticK: material/insulation -> k [A.s^1/2/mm^2] from K_ADIABATIC, or null.
// material 'Cu'/'Al' (also accepts 'copper'/'aluminium'); insulation 'PVC'/'XLPE'.
function adiabaticK(material, insulation) {
  const m = /^(al|alu)/i.test(String(material)) ? 'Al'
          : /^(cu|copper)/i.test(String(material)) ? 'Cu' : null;
  const ins = /(xlpe|epr)/i.test(String(insulation)) ? 'XLPE'
            : /pvc/i.test(String(insulation)) ? 'PVC' : null;
  if (!m || !ins) return null;
  const row = K_ADIABATIC[m];
  const k = row ? row[ins] : undefined;
  return (typeof k === 'number' && isFinite(k)) ? k : null;
}

// insulationForType: map insulation from the existing cable type/model string
// (same convention as officialIz): XLPE for NOIKLX/NOIKX/NOIK-AL/NOSP, else PVC.
function insulationForType(typeOrModel) {
  return /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(String(typeOrModel || '')) ? 'XLPE' : 'PVC';
}

// nextStandardCrossSection: smallest STANDARD_CSA value >= sMin, or null if none.
function nextStandardCrossSection(sMin) {
  if (typeof sMin !== 'number' || !isFinite(sMin)) return null;
  for (let i = 0; i < STANDARD_CSA.length; i++) {
    if (STANDARD_CSA[i] >= sMin) return STANDARD_CSA[i];
  }
  return null;
}

// checkAdiabatic: the conductor survives the fault energy until the device clears.
// opts = { material, insulation, sArea, isc, tClear }.
function checkAdiabatic(opts) {
  opts = opts || {};
  const clause = 'DS/HD 60364-4-43 \u00A7434.5.2';
  const k = adiabaticK(opts.material, opts.insulation);
  const isc = opts.isc, tClear = opts.tClear, sArea = opts.sArea;
  const iscBad = (typeof isc !== 'number' || !isFinite(isc) || isc <= 0);
  const tBad = (typeof tClear !== 'number' || !isFinite(tClear) || tClear <= 0);
  const sBad = (typeof sArea !== 'number' || !isFinite(sArea) || sArea <= 0);
  if (k === null || iscBad || tBad || sBad) {
    return {
      id: 'adiabatic', state: 'INSUFFICIENT_DATA', clause: clause, values: { k: k },
      message: {
        da: 'Kortslutningsholdbarhed (k\u00B2\u00B7S\u00B2 \u2265 I\u00B2t) kunne ikke vurderes \u2014 Isc, t_clear, tv\u00E6rsnit eller k mangler.',
        en: 'Short-circuit withstand (k\u00B2\u00B7S\u00B2 \u2265 I\u00B2t) could not be evaluated \u2014 Isc, t_clear, cross-section or k missing.'
      },
      recommendation: null
    };
  }
  const i2t = isc * isc * tClear;
  const withstand = k * k * sArea * sArea;
  const sMin = Math.sqrt(i2t) / k;
  const values = { k: k, i2t: i2t, withstand: withstand, sMin: sMin, sArea: sArea, isc: isc, tClear: tClear };
  if (withstand >= i2t) {
    return {
      id: 'adiabatic', state: 'PASS', clause: clause, values: values,
      message: {
        da: 'k\u00B2\u00B7S\u00B2 = ' + Math.round(withstand) + ' \u2265 I\u00B2t = ' + Math.round(i2t) + ' A\u00B2s \u2014 leder t\u00E5ler kortslutningsenergien (S_min = ' + sMin.toFixed(2) + ' mm\u00B2).',
        en: 'k\u00B2\u00B7S\u00B2 = ' + Math.round(withstand) + ' \u2265 I\u00B2t = ' + Math.round(i2t) + ' A\u00B2s \u2014 conductor withstands the fault energy (S_min = ' + sMin.toFixed(2) + ' mm\u00B2).'
      },
      recommendation: null
    };
  }
  const rec = nextStandardCrossSection(sMin);
  if (rec === null) {
    return {
      id: 'adiabatic', state: 'FAIL', clause: clause, values: values,
      message: {
        da: 'k\u00B2\u00B7S\u00B2 = ' + Math.round(withstand) + ' < I\u00B2t = ' + Math.round(i2t) + ' A\u00B2s \u2014 ingen tilg\u00E6ngelig tv\u00E6rsnit opfylder kortslutningsholdbarhed.',
        en: 'k\u00B2\u00B7S\u00B2 = ' + Math.round(withstand) + ' < I\u00B2t = ' + Math.round(i2t) + ' A\u00B2s \u2014 no available cross-section meets withstand.'
      },
      recommendation: {
        da: 'Ingen tilg\u00E6ngelig tv\u00E6rsnit opfylder kortslutningsholdbarhed \u2014 reduc\u00E9r I\u00B2t (hurtigere udkobling) eller anvend parallelle ledere.',
        en: 'No available cross-section meets withstand \u2014 reduce I\u00B2t (faster clearing) or use parallel conductors.'
      }
    };
  }
  const valuesRec = Object.assign({}, values, { recommendedCsa: rec });
  return {
    id: 'adiabatic', state: 'FAIL', clause: clause, values: valuesRec,
    message: {
      da: 'k\u00B2\u00B7S\u00B2 = ' + Math.round(withstand) + ' < I\u00B2t = ' + Math.round(i2t) + ' A\u00B2s \u2014 tv\u00E6rsnit for lille til kortslutningsenergien.',
      en: 'k\u00B2\u00B7S\u00B2 = ' + Math.round(withstand) + ' < I\u00B2t = ' + Math.round(i2t) + ' A\u00B2s \u2014 cross-section too small for the fault energy.'
    },
    recommendation: {
      da: 'V\u00E6lg mindst ' + rec + ' mm\u00B2 (\u2265 S_min = ' + sMin.toFixed(2) + ' mm\u00B2).',
      en: 'Choose at least ' + rec + ' mm\u00B2 (\u2265 S_min = ' + sMin.toFixed(2) + ' mm\u00B2).'
    }
  };
}

// ---- TASK 5: Zs / disconnection time (DS/HD 60364-4-41 §411) ----------------

// requiredDisconnectionTime: DISCONNECT_TIME matrix lookup -> seconds, or null.
//   TN: final <=32A -> 0.4 s, else 5 s ; distribution -> 5 s.
//   TT: final <=32A -> 0.2 s, else 1 s ; distribution -> 1 s.
function requiredDisconnectionTime(systemType, circuitCategory, inA) {
  const sys = DISCONNECT_TIME[systemType];
  if (!sys) return null;
  if (circuitCategory === 'distribution') return sys.distribution;
  if (circuitCategory === 'final') {
    if (typeof inA !== 'number' || !isFinite(inA)) return null;
    return (inA <= 32) ? sys.final['<=32'] : sys.final['>32'];
  }
  return null;
}

// deriveIa: current guaranteeing operation within reqTime, by device.
//   MCB  -> MCB_CURVES[curve].isdMax x In (instantaneous magnetic trip; valid 0.4 s & 5 s)
//   MCCB -> inVal x ioMult x isdMult x 1.1 (magnetic pickup with tolerance)
//   gG fuse -> FUSE_5S[size] when reqTime >= 5 s, else FUSE_0_4S[size]
//   unknown / no data -> { known:false }
// Returns { ia, known }.
function deriveIa(device, reqTime) {
  device = device || {};
  if (device.kind === 'mcb') {
    const curve = MCB_CURVES[device.curve];
    const inA = device.inA;
    if (!curve || typeof inA !== 'number' || !isFinite(inA) || inA <= 0) return { ia: NaN, known: false };
    return { ia: curve.isdMax * inA, known: true };
  }
  if (device.kind === 'mccb') {
    const a = device.inVal, b = device.ioMult, c = device.isdMult;
    if ([a, b, c].some(function (v) { return typeof v !== 'number' || !isFinite(v) || v <= 0; })) return { ia: NaN, known: false };
    return { ia: a * b * c * 1.1, known: true };
  }
  if (device.kind === 'fuse') {
    const table = (typeof reqTime === 'number' && reqTime >= 5) ? FUSE_5S : FUSE_0_4S;
    const ia = table[device.size];
    if (typeof ia !== 'number' || !isFinite(ia)) return { ia: NaN, known: false };
    return { ia: ia, known: true };
  }
  return { ia: NaN, known: false };
}

// estimateZsActual: earth-fault-loop impedance from scState + selected cable.
//   zTotal_mOhm = zNet + zTrafo + cableZ ; zs = zTotal_mOhm / 1000 (Ohm).
//   Returns { zs, known }; known:false when the impedance model is incomplete.
function estimateZsActual() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const byType = cables[cableState.type];
  const byCores = (byType && byType[cableState.cores]) ? byType[cableState.cores] : null;
  const selected = byCores ? byCores[cableState.crossSection] : null;
  if (!selected) return { zs: NaN, known: false };
  if (typeof scState.zNet !== 'number' || !isFinite(scState.zNet) ||
      typeof scState.zTrafo !== 'number' || !isFinite(scState.zTrafo)) {
    return { zs: NaN, known: false };
  }
  const L = ((vdropState && typeof vdropState.length === 'number') ? vdropState.length : 0) / 1000; // km
  const rCable = selected.r * L;
  const xCable = selected.x * L;
  const zCable = Math.sqrt(rCable * rCable + xCable * xCable) * 1000; // mOhm
  const zTotal_mOhm = scState.zNet + scState.zTrafo + zCable;
  if (!isFinite(zTotal_mOhm) || zTotal_mOhm <= 0) return { zs: NaN, known: false };
  return { zs: zTotal_mOhm / 1000, known: true };
}

// checkZs: automatic disconnection / fault protection.
//   TN -> Zs <= Zs_max = U0/Ia            clause §411.4 (+ §411.3.2)
//   TT -> Zs x IDn <= U_L (50 V)          clause §411.5 (+ §411.3.2)
// opts = { systemType, circuitCategory, device, rcdIDn, u0 }.
function checkZs(opts) {
  opts = opts || {};
  const device = opts.device || {};
  const systemType = opts.systemType;
  const circuitCategory = opts.circuitCategory;
  const rcdIDn = opts.rcdIDn;
  const u0 = (typeof opts.u0 === 'number' && isFinite(opts.u0) && opts.u0 > 0) ? opts.u0 : U0_NOMINAL;
  const reqTime = requiredDisconnectionTime(systemType, circuitCategory, device.inA);
  const zsRes = estimateZsActual();
  const zsActual = zsRes.known ? zsRes.zs : NaN;

  if (systemType === 'TT') {
    const clause = 'DS/HD 60364-4-41 \u00A7411.5 (+ \u00A7411.3.2)';
    if (!zsRes.known || typeof rcdIDn !== 'number' || !isFinite(rcdIDn) || rcdIDn <= 0) {
      return {
        id: 'zs', state: 'INSUFFICIENT_DATA', clause: clause,
        values: { zsMax: null, zsActual: zsRes.known ? round2(zsActual) : null, ia: null, reqTime: reqTime, rcdIDn: (typeof rcdIDn === 'number' ? rcdIDn : null) },
        message: {
          da: 'Fejlbeskyttelse (Zs \u00D7 I\u0394n \u2264 50 V) kunne ikke vurderes \u2014 Zs eller I\u0394n mangler.',
          en: 'Fault protection (Zs \u00D7 I\u0394n \u2264 50 V) could not be evaluated \u2014 Zs or I\u0394n missing.'
        },
        recommendation: null
      };
    }
    const product = zsActual * rcdIDn;
    const zsMax = U_L_LIMIT / rcdIDn; // largest Zs that satisfies the touch-voltage limit
    const values = { zsMax: round2(zsMax), zsActual: round2(zsActual), ia: null, reqTime: reqTime, rcdIDn: rcdIDn, uL: U_L_LIMIT, touchVoltage: round2(product) };
    if (product <= U_L_LIMIT) {
      return {
        id: 'zs', state: 'PASS', clause: clause, values: values,
        message: {
          da: 'Zs \u00D7 I\u0394n = ' + round2(product).toFixed(2) + ' V \u2264 50 V \u2014 RCD-fejlbeskyttelse OK (TT).',
          en: 'Zs \u00D7 I\u0394n = ' + round2(product).toFixed(2) + ' V \u2264 50 V \u2014 RCD fault protection OK (TT).'
        },
        recommendation: null
      };
    }
    return {
      id: 'zs', state: 'FAIL', clause: clause, values: values,
      message: {
        da: 'Zs \u00D7 I\u0394n = ' + round2(product).toFixed(2) + ' V > 50 V \u2014 automatisk udkobling ikke sikret (TT).',
        en: 'Zs \u00D7 I\u0394n = ' + round2(product).toFixed(2) + ' V > 50 V \u2014 automatic disconnection not assured (TT).'
      },
      recommendation: {
        da: 'Tilf\u00F8j en RCD eller v\u00E6lg en lavere I\u0394n (f.eks. 30 mA).',
        en: 'Add an RCD or choose a lower I\u0394n (e.g. 30 mA).'
      }
    };
  }

  if (systemType === 'TN') {
    const clause = 'DS/HD 60364-4-41 \u00A7411.4 (+ \u00A7411.3.2)';
    const iaRes = deriveIa(device, reqTime);
    const ia = iaRes.ia;
    if (!iaRes.known || typeof ia !== 'number' || !isFinite(ia) || ia <= 0 || !zsRes.known) {
      return {
        id: 'zs', state: 'INSUFFICIENT_DATA', clause: clause,
        values: { zsMax: null, zsActual: zsRes.known ? round2(zsActual) : null, ia: iaRes.known ? round2(ia) : null, reqTime: reqTime },
        message: {
          da: 'Udkoblingsbetingelsen (Zs \u2264 U\u2080/Ia) kunne ikke vurderes \u2014 Ia eller Zs mangler.',
          en: 'Disconnection condition (Zs \u2264 U\u2080/Ia) could not be evaluated \u2014 Ia or Zs missing.'
        },
        recommendation: null
      };
    }
    const zsMax = u0 / ia;
    const reqTxtDa = (reqTime != null) ? (reqTime + ' s') : 'kr\u00E6vet tid';
    const reqTxtEn = (reqTime != null) ? (reqTime + ' s') : 'required time';
    const values = { zsMax: round2(zsMax), zsActual: round2(zsActual), ia: round2(ia), reqTime: reqTime, u0: u0 };
    if (zsActual <= zsMax) {
      return {
        id: 'zs', state: 'PASS', clause: clause, values: values,
        message: {
          da: 'Zs = ' + round2(zsActual).toFixed(2) + ' \u03A9 \u2264 Zs_max = ' + round2(zsMax).toFixed(2) + ' \u03A9 \u2014 udkobling inden for ' + reqTxtDa + ' (TN).',
          en: 'Zs = ' + round2(zsActual).toFixed(2) + ' \u03A9 \u2264 Zs_max = ' + round2(zsMax).toFixed(2) + ' \u03A9 \u2014 disconnection within ' + reqTxtEn + ' (TN).'
        },
        recommendation: null
      };
    }
    return {
      id: 'zs', state: 'FAIL', clause: clause, values: values,
      message: {
        da: 'Zs = ' + round2(zsActual).toFixed(2) + ' \u03A9 > Zs_max = ' + round2(zsMax).toFixed(2) + ' \u03A9 \u2014 udkobling inden for kr\u00E6vet tid ikke bevist (TN).',
        en: 'Zs = ' + round2(zsActual).toFixed(2) + ' \u03A9 > Zs_max = ' + round2(zsMax).toFixed(2) + ' \u03A9 \u2014 disconnection within required time not proven (TN).'
      },
      recommendation: {
        da: 'V\u00E6lg en hurtigere enhed (lavere Ia), reduc\u00E9r Zs (st\u00F8rre tv\u00E6rsnit/kortere l\u00E6ngde) eller tilf\u00F8j en RCD.',
        en: 'Choose a faster-operating device (lower Ia), reduce Zs (larger cross-section/shorter length) or add an RCD.'
      }
    };
  }

  // Unknown earthing system -> governing clause/path cannot be determined.
  return {
    id: 'zs', state: 'INSUFFICIENT_DATA', clause: 'DS/HD 60364-4-41 \u00A7411.3.2',
    values: { zsMax: null, zsActual: zsRes.known ? round2(zsActual) : null, ia: null, reqTime: reqTime },
    message: {
      da: 'Jordingssystem ikke fastlagt \u2014 udkoblings-/fejlbeskyttelse kan ikke vurderes.',
      en: 'Earthing system not determined \u2014 disconnection/fault protection cannot be evaluated.'
    },
    recommendation: null
  };
}

// ============================================================================
// ===== CORRECTNESS ENGINE — ORCHESTRATOR + SHARED RENDERERS (Task 7) =========
// Compute once, render many. evaluateCorrectnessVerdicts() reads the global
// click-only state, calls the four pure checks, and returns ONE frozen bundle
// consumed identically by the Cable engine, the Verify module, the QI index and
// the Risk matrix — so cross-view consistency is guaranteed by construction.
// ============================================================================

// activeDevice: pick the device that drives the overload & Zs verdicts.
//   Prefer a selected MCB rating, else an MCCB In, else a gG fuse size.
//   Returns a descriptor usable by deviceI2 / deriveIa, or { kind:null }.
function activeDevice() {
  if (typeof mcbState !== 'undefined' && mcbState && mcbState.rating) {
    return { kind: 'mcb', inA: mcbState.rating, curve: mcbState.curve };
  }
  if (typeof mccbState !== 'undefined' && mccbState && mccbState.inVal) {
    return { kind: 'mccb', inA: mccbState.inVal, inVal: mccbState.inVal, ioMult: mccbState.ioMult, isdMult: mccbState.isdMult };
  }
  if (typeof fuseState !== 'undefined' && fuseState && fuseState.size) {
    return { kind: 'fuse', inA: fuseState.size, size: fuseState.size };
  }
  return { kind: null, inA: null };
}

// evaluateCorrectnessVerdicts: build inputs, call the four checks, return the
// immutable bundle { ampacity, overload, adiabatic, zs }. Each check call is
// wrapped so any thrown error degrades to INSUFFICIENT_DATA for that id (never
// a crash that blanks the screen). Every verdict carries its governing clause.
function evaluateCorrectnessVerdicts() {
  const clauseAmp = 'DS/HD 60364-5-52 \u00A7523';
  const clauseOv  = 'DS/HD 60364-4-43 \u00A7433.1';
  const clauseAd  = 'DS/HD 60364-4-43 \u00A7434.5.2';
  const clauseZs  = 'DS/HD 60364-4-41 \u00A7411.3.2';

  // Defensive wrapper: a thrown check yields an INSUFFICIENT_DATA verdict and a
  // returned verdict is guaranteed a non-empty clause (safety provenance).
  function guard(id, clause, fn) {
    try {
      const v = fn();
      if (v && (!v.clause || v.clause === '')) v.clause = clause;
      return v;
    } catch (e) {
      return {
        id: id, state: 'INSUFFICIENT_DATA', clause: clause, values: {},
        message: {
          da: 'Verdikt kunne ikke beregnes (uventet fejl) \u2014 behandlet konservativt som utilstr\u00E6kkelige data.',
          en: 'Verdict could not be computed (unexpected error) \u2014 treated conservatively as insufficient data.'
        },
        recommendation: null
      };
    }
  }

  // --- Shared derived inputs (read from the click-only global state) ---
  const ib = (typeof calcIB === 'function') ? calcIB() : NaN;
  const cs = (typeof cableState !== 'undefined' && cableState) ? cableState : {};
  const izTable = (typeof izTableFor === 'function') ? izTableFor() : null;
  const hasCable = !!(cs.crossSection && izTable);
  const baseIz = hasCable ? (izTable[parseFloat(cs.crossSection)] || 0) : 0;
  const buried = cs.installMethod === 'D';
  // Same derating the Cable module and recommendCables use (single source of truth).
  const dRes = hasCable ? computeDeratedIz({
    baseIz: baseIz, caKey: cs.temp, cgKey: cs.grouping, csKey: cs.soil,
    kInstallKey: cs.installMethod, buried: buried
  }) : null;
  const deratedIz = (dRes && dRes.ok) ? dRes.deratedIz : NaN;

  const device = activeDevice();

  // In for coordination: the smallest standard device rating >= IB (Req 1).
  const stdRatings = [6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const ibOk = (typeof ib === 'number' && isFinite(ib) && ib > 0);
  const inFromIB = ibOk ? (stdRatings.find(function (r) { return r >= ib; }) || ib) : null;
  // For disconnection-time bracketing prefer the actually selected device In.
  const inForChecks = (device.inA != null && isFinite(device.inA) && device.inA > 0) ? device.inA : inFromIB;

  // Prospective max short-circuit current ikMax (largest I^2t -> conservative
  // for adiabatic), computed exactly as the short-circuit module does.
  const Un = (typeof loadState !== 'undefined' && loadState && loadState.voltage === '3x400') ? 400 : 230;
  const zSum = ((typeof scState !== 'undefined' && scState) ? (scState.zNet + scState.zTrafo) : NaN); // mOhm
  const ikMax3ph = (typeof zSum === 'number' && isFinite(zSum) && zSum > 0)
    ? (1.05 * Un) / (Math.sqrt(3) * zSum / 1000) : NaN; // A

  // Clearing time: explicit click selection wins, else device-derived required time.
  const vs = (typeof verdictState !== 'undefined' && verdictState) ? verdictState : {};
  const reqT = requiredDisconnectionTime(vs.systemType, vs.circuitCategory, inForChecks);
  const tClear = (vs.tClear != null) ? vs.tClear : reqT;

  // ---- Ampacity coordination IB <= In <= Derated_Iz (DS/HD 60364-5-52 §523) ----
  const ampacity = guard('ampacity', clauseAmp, function () {
    if (!hasCable || !dRes || !dRes.ok || inFromIB == null) {
      return {
        id: 'ampacity', state: 'INSUFFICIENT_DATA', clause: clauseAmp,
        values: {
          baseIz: hasCable ? round2(baseIz) : null,
          deratedIz: (dRes && dRes.ok) ? round2(dRes.deratedIz) : null,
          inA: inFromIB != null ? round2(inFromIB) : null,
          ib: ibOk ? round2(ib) : null
        },
        message: {
          da: 'Str\u00F8mb\u00E6reevne (IB \u2264 In \u2264 Derated_Iz) kunne ikke vurderes \u2014 kabel, IB eller korrektionsfaktor mangler.',
          en: 'Ampacity (IB \u2264 In \u2264 Derated_Iz) could not be evaluated \u2014 cable, IB or correction factor missing.'
        },
        recommendation: null
      };
    }
    const inEff = inFromIB;
    const values = {
      baseIz: round2(baseIz), deratedIz: round2(deratedIz), inA: round2(inEff),
      ib: round2(ib), totalFactor: Math.round(dRes.totalFactor * 1000) / 1000
    };
    const pass = (deratedIz >= inEff) && (ib <= inEff);
    if (pass) {
      return {
        id: 'ampacity', state: 'PASS', clause: clauseAmp, values: values,
        message: {
          da: 'IB = ' + round2(ib).toFixed(2) + ' A \u2264 In = ' + round2(inEff).toFixed(2) + ' A \u2264 Derated_Iz = ' + round2(deratedIz).toFixed(2) + ' A \u2014 str\u00F8mb\u00E6reevne OK.',
          en: 'IB = ' + round2(ib).toFixed(2) + ' A \u2264 In = ' + round2(inEff).toFixed(2) + ' A \u2264 Derated_Iz = ' + round2(deratedIz).toFixed(2) + ' A \u2014 ampacity OK.'
        },
        recommendation: null
      };
    }
    return {
      id: 'ampacity', state: 'FAIL', clause: clauseAmp, values: values,
      message: {
        da: 'Koordination IB \u2264 In \u2264 Derated_Iz ikke opfyldt \u2014 In = ' + round2(inEff).toFixed(2) + ' A > Derated_Iz = ' + round2(deratedIz).toFixed(2) + ' A.',
        en: 'Coordination IB \u2264 In \u2264 Derated_Iz not satisfied \u2014 In = ' + round2(inEff).toFixed(2) + ' A > Derated_Iz = ' + round2(deratedIz).toFixed(2) + ' A.'
      },
      recommendation: {
        da: 'V\u00E6lg et st\u00F8rre tv\u00E6rsnit (h\u00F8jere Derated_Iz) eller en enhed med lavere In.',
        en: 'Choose a larger cross-section (higher Derated_Iz) or a device with a lower In.'
      }
    };
  });

  // ---- Overload coordination I2 <= 1,45 x Derated_Iz (§433.1) ----
  const overload = guard('overload', clauseOv, function () {
    return checkOverloadI2({ device: device, deratedIz: deratedIz });
  });

  // ---- Adiabatic short-circuit withstand k^2*S^2 >= I^2t (§434.5.2) ----
  const adiabatic = guard('adiabatic', clauseAd, function () {
    const sArea = hasCable ? parseFloat(cs.crossSection) : NaN;
    return checkAdiabatic({
      material: cs.material,                       // 'copper'/'aluminium' accepted by adiabaticK
      insulation: insulationForType(cs.type),
      sArea: sArea, isc: ikMax3ph, tClear: tClear
    });
  });

  // ---- Earth-fault-loop impedance / disconnection time (§411) ----
  const zs = guard('zs', clauseZs, function () {
    return checkZs({
      systemType: vs.systemType, circuitCategory: vs.circuitCategory,
      device: device, rcdIDn: vs.rcdIDn, u0: U0_NOMINAL
    });
  });

  return Object.freeze({ ampacity: ampacity, overload: overload, adiabatic: adiabatic, zs: zs });
}

// classifyVerdictForQi: pure mapping of a verdict state to its QI bucket /
// severity. PASS -> passed; FAIL -> error issue; INSUFFICIENT_DATA -> warning
// issue (never counted as passing). Used by runQiValidation and Property 16.
function classifyVerdictForQi(verdict) {
  const st = verdict && verdict.state;
  if (st === 'PASS') return { target: 'passed', severity: null };
  if (st === 'FAIL') return { target: 'issues', severity: 'error' };
  return { target: 'issues', severity: 'warning' }; // INSUFFICIENT_DATA / anything else
}

// Risk metadata per verdict (category + worst-case probability/consequence used
// for FAIL; INSUFFICIENT_DATA is scored one notch lower — yellow, not red).
const VERDICT_RISK_META = {
  ampacity:  { category: 'fire',        probability: 4, consequence: 4, da: 'Str\u00F8mb\u00E6reevne', en: 'Ampacity' },
  overload:  { category: 'fire',        probability: 4, consequence: 4, da: 'Overbelastningskoordination', en: 'Overload coordination' },
  adiabatic: { category: 'overcurrent', probability: 4, consequence: 5, da: 'Kortslutningsholdbarhed', en: 'Short-circuit withstand' },
  zs:        { category: 'earth_fault', probability: 4, consequence: 4, da: 'Fejlsl\u00F8jfeimpedans / udkobling', en: 'Fault-loop impedance / disconnection' }
};

// verdictRiskEntriesFromBundle: pure mapping of a verdict bundle to risk entries.
// FAIL or INSUFFICIENT_DATA -> exactly one entry referencing the verdict id, its
// state and its governing clause; PASS -> no entry. (Req 7.5, 7.6; Property 17.)
function verdictRiskEntriesFromBundle(bundle) {
  const out = [];
  ['ampacity', 'overload', 'adiabatic', 'zs'].forEach(function (id) {
    const v = bundle ? bundle[id] : null;
    if (!v || v.state === 'PASS') return; // PASS -> ensure no entry remains
    const meta = VERDICT_RISK_META[id];
    const isFail = (v.state === 'FAIL');
    const p = isFail ? meta.probability : 2;
    const c = isFail ? meta.consequence : 4;
    const level = RISK_MATRIX[c - 1][p - 1];
    const stateDa = isFail ? 'FEJL' : 'UTILSTR\u00C6KKELIGE DATA';
    const stateEn = isFail ? 'FAIL' : 'INSUFFICIENT DATA';
    out.push({
      id: 'verdict_' + id,
      verdictId: id,
      verdictState: v.state,
      category: meta.category,
      description: {
        da: meta.da + ' \u2014 ' + stateDa + ': ' + (v.message ? v.message.da : ''),
        en: meta.en + ' \u2014 ' + stateEn + ': ' + (v.message ? v.message.en : '')
      },
      probability: p, consequence: c, riskLevel: level, autoDetected: true,
      clause: v.clause,
      mitigation: v.recommendation || {
        da: 'Tilvejebring de manglende inputs, s\u00E5 verdiktet kan beregnes (konservativ h\u00E5ndtering).',
        en: 'Provide the missing inputs so the verdict can be evaluated (conservative handling).'
      }
    });
  });
  return out;
}

// verdictRiskEntries: live wrapper reading the one computed bundle.
function verdictRiskEntries() {
  let bundle = null;
  try { bundle = evaluateCorrectnessVerdicts(); } catch (e) { bundle = null; }
  return verdictRiskEntriesFromBundle(bundle);
}

// renderVerdictRow: one bilingual verdict card. PASS = green check, FAIL = red
// cross, INSUFFICIENT_DATA = amber warning — always with a TEXT state label (not
// colour alone, Req 9.4). Shows the governing clause, key values and (if any)
// the conservative recommendation. Uses the existing neon theme classes.
function renderVerdictRow(verdict) {
  if (!verdict) return '';
  const st = verdict.state;
  const boxClass = st === 'PASS' ? '' : (st === 'FAIL' ? 'error' : 'warning');
  const badgeClass = st === 'PASS' ? 'ok' : 'fail';
  const icon = st === 'PASS' ? '\u2713' : (st === 'FAIL' ? '\u2717' : '\u26A0');
  const stateLabel = st === 'PASS' ? t('vStatePass') : (st === 'FAIL' ? t('vStateFail') : t('vStateInsufficient'));
  const titleKey = { ampacity: 'vTitleAmpacity', overload: 'vTitleOverload', adiabatic: 'vTitleAdiabatic', zs: 'vTitleZs' }[verdict.id] || null;
  const title = titleKey ? t(titleKey) : (verdict.id || '');
  const msg = verdict.message ? (lang === 'da' ? verdict.message.da : verdict.message.en) : '';
  const rec = verdict.recommendation ? (lang === 'da' ? verdict.recommendation.da : verdict.recommendation.en) : '';

  const vals = verdict.values || {};
  const num = function (x) { return (typeof x === 'number' && isFinite(x)); };
  const vr = function (label, x, unit) {
    if (!num(x)) return '';
    return '<div class="result-row"><span class="label">' + label + '</span><span class="value">' + x.toFixed(2) + (unit ? ' ' + unit : '') + '</span></div>';
  };
  let valuesHtml = '';
  if (verdict.id === 'ampacity') {
    valuesHtml = vr('IB', vals.ib, 'A') + vr('In', vals.inA, 'A') + vr('Iz (base)', vals.baseIz, 'A') + vr('Derated_Iz', vals.deratedIz, 'A');
  } else if (verdict.id === 'overload') {
    valuesHtml = vr('I\u2082', vals.i2, 'A') + vr('1,45 \u00D7 Iz', vals.limit, 'A');
  } else if (verdict.id === 'adiabatic') {
    valuesHtml = vr('k', vals.k, 'A\u00B7s\u00BD/mm\u00B2') + vr('S', vals.sArea, 'mm\u00B2') + vr('S_min', vals.sMin, 'mm\u00B2') + vr('S anbefalet / rec.', vals.recommendedCsa, 'mm\u00B2');
  } else if (verdict.id === 'zs') {
    valuesHtml = vr('Zs', vals.zsActual, '\u03A9') + vr('Zs_max', vals.zsMax, '\u03A9') + vr('Ia', vals.ia, 'A') + vr('Zs\u00D7I\u0394n', vals.touchVoltage, 'V') + (num(vals.reqTime) ? '<div class="result-row"><span class="label">t_req</span><span class="value">' + vals.reqTime + ' s</span></div>' : '');
  }

  return '\n    <div class="result-box ' + boxClass + '" style="margin-bottom:8px">' +
    '<div class="result-row"><span class="label"><strong>' + title + '</strong></span>' +
    '<span class="value"><span class="verify-badge ' + badgeClass + '">' + icon + ' ' + stateLabel + '</span></span></div>' +
    (msg ? '<div class="result-row"><span class="label">' + msg + '</span></div>' : '') +
    valuesHtml +
    (rec ? '<div class="result-row"><span class="label" style="color:#b8860b">\uD83D\uDCA1 ' + t('vRecommendation') + ': ' + rec + '</span></div>' : '') +
    '<div class="info-row">' + (verdict.clause || '') + '</div>' +
    (st === 'FAIL' ? '<div style="margin-top:6px"><button class="sel-btn" style="font-size:0.75rem;padding:5px 12px" onclick="toggleForensic(\'' + verdict.id + '\')">' + t('forensicWhy') + '</button></div>' + (forensicExpanded[verdict.id] ? (function(){ var fe = buildForensicExplanation(verdict); var causal = lang === 'da' ? fe.causal.da : fe.causal.en; var fixesHtml = fe.fixes.map(function(f){ return '<div class="result-row"><span class="label" style="color:var(--accent)">' + (lang === 'da' ? f.desc.da : f.desc.en) + '</span></div>'; }).join(''); return '<div style="margin-top:8px;padding:10px;background:rgba(0,200,255,0.05);border:1px solid rgba(0,200,255,0.2);border-radius:8px"><div style="font-size:0.72rem;font-weight:700;color:var(--primary);margin-bottom:6px">' + t('forensicCausal') + '</div><div style="font-size:0.8rem;font-family:monospace;color:var(--text-light);margin-bottom:10px;word-break:break-all">' + causal + '</div>' + (fe.fixes.length ? '<div style="font-size:0.72rem;font-weight:700;color:var(--primary);margin-bottom:6px">' + t('forensicFixes') + '</div>' + fixesHtml : '') + '</div>'; })() : '') : '') +
    '</div>';
}

// renderVerdictInputs: 100% click-only controls binding verdictState. Every
// control pre-selects its conservative default, has a 44x44 px minimum target,
// and re-renders the active module on tap (no typing anywhere). (Req 6.)
function renderVerdictInputs() {
  const vs = (typeof verdictState !== 'undefined' && verdictState) ? verdictState : {};
  const re = "renderModule(activeModule)";
  const b = function (sel, onclick, label) {
    return '<button class="sel-btn ' + (sel ? 'selected' : '') + '" style="min-width:44px;min-height:44px" onclick="' + onclick + '">' + label + '</button>';
  };
  // System type (TN / TT)
  let sysHtml = '';
  [['TN', 'TN'], ['TT', 'TT']].forEach(function (o) {
    sysHtml += b(vs.systemType === o[0], "verdictState.systemType='" + o[0] + "';" + re, o[1]);
  });
  // Circuit category (final / distribution)
  let catHtml =
    b(vs.circuitCategory === 'final', "verdictState.circuitCategory='final';" + re, t('vFinal')) +
    b(vs.circuitCategory === 'distribution', "verdictState.circuitCategory='distribution';" + re, t('vDistribution'));
  // Clearing time t_clear (device-derived/null + discrete standard times)
  let tcHtml = b(vs.tClear == null, "verdictState.tClear=null;" + re, t('vDeviceDerived'));
  [0.1, 0.2, 0.4, 1, 5].forEach(function (s) {
    tcHtml += b(vs.tClear === s, "verdictState.tClear=" + s + ";" + re, s + ' s');
  });
  // RCD I-delta-n
  let rcdHtml = '';
  [0.03, 0.1, 0.3, 0.5].forEach(function (a) {
    rcdHtml += b(vs.rcdIDn === a, "verdictState.rcdIDn=" + a + ";" + re, a + ' A');
  });
  // Soil class (SOIL_FACTORS keys + a not-buried option). The button also mirrors
  // the value into cableState.soil so the ampacity derating stays identical to
  // the Cable module and recommendCables (single source of truth).
  let soilHtml = b(vs.soilResistivity == null, "verdictState.soilResistivity=null;cableState.soil=null;" + re, t('vNotBuried'));
  Object.keys(SOIL_FACTORS).forEach(function (k) {
    const sel = (vs.soilResistivity != null && String(vs.soilResistivity) === String(k));
    soilHtml += b(sel, "verdictState.soilResistivity=" + k + ";cableState.soil=" + k + ";" + re, k + ' (' + SOIL_FACTORS[k] + ')');
  });

  return '\n    <div class="select-group" style="margin-top:12px"><div class="select-label">' + t('verdictInputsTitle') + '</div></div>' +
    '<div class="select-group"><div class="select-label">' + t('vSystemType') + '</div><div class="select-grid">' + sysHtml + '</div></div>' +
    '<div class="select-group"><div class="select-label">' + t('vCircuitCategory') + '</div><div class="select-grid">' + catHtml + '</div></div>' +
    '<div class="select-group"><div class="select-label">' + t('vTclear') + '</div><div class="select-grid">' + tcHtml + '</div></div>' +
    '<div class="select-group"><div class="select-label">' + t('vRcdIDn') + '</div><div class="select-grid">' + rcdHtml + '</div></div>' +
    '<div class="select-group"><div class="select-label">' + t('vSoil') + '</div><div class="select-grid">' + soilHtml + '</div></div>';
}

// ===== SMART RECOMMENDATION ENGINE =====
// Only returns products that are SAFE and CORRECT for the given parameters
// Rules per IEC 60364-4-43: IB <= In <= Iz, Icu >= Ikmax

// Official Iz (DS/HD 60364-5-52 Table C.52.1, method C). NKT NOIKLX/NOIKX-Flex
// are halogen-free XLPE 90°C -> use XLPE column; others use conservative PVC 70°C.
function officialIz(product) {
  const xlpe = /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(product.model || '');
  if (product.material === 'Al') return (xlpe ? IZ_ALU_XLPE : IZ_ALU)[product.mm2] || product.iz;
  return (xlpe ? IZ_COPPER_XLPE : IZ_COPPER)[product.mm2] || product.iz;
}

function recommendCables(ib, material) {
  // Proper coordination IB <= In <= Derated_Iz: the cable must carry at least the
  // protection rating (next standard size >= IB) AFTER derating — not the raw
  // table value (the original display-only-derating bug). Single source of truth:
  // deratedIzForProduct() -> computeDeratedIz().  DS/HD 60364-5-52 §523.
  const mat = material || cableState.material;
  const stdRatings = [6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const inMin = stdRatings.find(r => r >= ib) || ib;
  const env = {
    temp: cableState.temp,
    grouping: cableState.grouping,
    installMethod: cableState.installMethod,
    soil: cableState.soil,
    buried: cableState.installMethod === 'D'
  };
  return PRODUCTS.cables
    .filter(c => c.material === (mat === 'copper' ? 'Cu' : 'Al'))
    .filter(c => { const d = deratedIzForProduct(c, env); return isFinite(d) && d >= inMin; }) // Derated_Iz >= In >= IB
    .sort((a, b) => deratedIzForProduct(a, env) - deratedIzForProduct(b, env)) // Smallest suitable first
    .slice(0, 5);
}

function recommendMCBs(ib, ikmax) {
  // IEC 60364-4-43: IB <= In (rating must be >= load current)
  // Icu >= Ikmax (breaking capacity must handle short circuit)
  const ikMaxA = (ikmax || 6) * 1000; // convert kA to A, default 6kA
  return PRODUCTS.mcbs
    .filter(m => m.rating >= ib) // In >= IB
    .filter(m => m.icu * 1000 >= ikMaxA) // Icu >= Ikmax
    .sort((a, b) => a.rating - b.rating || a.icu - b.icu)
    .slice(0, 6);
}

function recommendMCCBs(ib, ikmax) {
  const ikMaxA = (ikmax || 10) * 1000;
  return PRODUCTS.mccbs
    .filter(m => {
      const maxIn = Math.max(...m.inOptions);
      return maxIn >= ib && m.icu * 1000 >= ikMaxA;
    })
    .sort((a, b) => Math.min(...a.inOptions.filter(i => i >= ib)) - Math.min(...b.inOptions.filter(i => i >= ib)))
    .slice(0, 4);
}

function recommendFuses(ib) {
  // In >= IB (fuse must be rated at or above load current)
  return PRODUCTS.fuses
    .filter(f => f.rating >= ib)
    .sort((a, b) => a.rating - b.rating)
    .slice(0, 5);
}

function recommendContactors(ib) {
  // AC-3 rating must be >= motor current
  return PRODUCTS.contactors
    .filter(c => c.ac3_A >= ib)
    .sort((a, b) => a.ac3_A - b.ac3_A)
    .slice(0, 4);
}

function recommendRCDs(ib, phases) {
  // RCD rating must be >= load current; match pole count to phase count
  const poles = phases === '3x400' ? '4P' : '2P';
  return PRODUCTS.rcds
    .filter(r => r.poles === poles && r.rating >= ib && r.sensitivity === 30)
    .sort((a, b) => a.rating - b.rating)
    .slice(0, 4);
}

function recommendMPCBs(ib) {
  // Motor protection: IB must fall within adjustment range
  return PRODUCTS.mpcbs
    .filter(m => ib <= m.rangeMax && ib >= m.rangeMin * 0.7)
    .sort((a, b) => a.rangeMax - b.rangeMax)
    .slice(0, 3);
}

function recommendOverloadRelays(ib) {
  // Overload relay: IB must fall within range
  return PRODUCTS.overloadRelays
    .filter(r => ib <= r.rangeMax && ib >= r.rangeMin * 0.7)
    .sort((a, b) => a.rangeMax - b.rangeMax)
    .slice(0, 3);
}

      return `
    <div class="card fade-in" style="border-left:4px solid var(--danger)">
      <div class="card-title">\u26A0\uFE0F ${title}</div>

        <div class="info-row">DS/HD 60364-5-52 \u00A7523</div>

  const cat = typeToCat[type] || type;

  const rowWrap = (p, mainLabel, valueText, sub) => `
    <div class="result-row" style="align-items:center;gap:12px">
      ${getComponentVisual(cat, p)}
      <div style="flex:1;display:flex;flex-direction:column;gap:2px">
        <div style="display:flex;justify-content:space-between;width:100%;gap:8px">
          <span class="label">${mainLabel}</span>
          <span class="value">${valueText}</span>
        </div>
        ${sub ? `<span style="font-size:0.75rem;color:var(--text-muted)">${sub}</span>` : ''}
      </div>
    </div>`;

  let rows = '';
  if (type === 'cable') {
    rows = products.map(p => {
      const dz = deratedIzForProduct(p);
      const dzTxt = isFinite(dz) ? dz.toFixed(2) : '\u2014';
      return rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.cores} ${p.mm2} mm\u00B2`, `Iz = ${officialIz(p)} A \u00B7 Iz\u2032 = ${dzTxt} A`, `${lang === 'da' ? p.use_da : p.use_en} | R=${p.r} X=${p.x} \u03A9/km`);
    }).join('');
  } else if (type === 'mcb') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.curve}${p.rating} (${p.poles})`, `Icu = ${p.icu} kA`)).join('');
  } else if (type === 'mccb') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model}`, `Icu = ${p.icu} kA`, `In: ${p.inOptions.join(', ')} A`)).join('');
  } else if (type === 'fuse') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.rating} A`, `${p.size}`, `Icu=${p.icu} kA | I5s=${p.i5s} A`)).join('');
  } else if (type === 'contactor') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} (${p.series})`, `AC-3: ${p.ac3_A} A`, `${p.ac3_kW} kW`)).join('');
  } else if (type === 'rcd') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.poles} ${p.rating}A`, `${p.sensitivity} mA`, `Type ${p.rcdType}`)).join('');
  } else if (type === 'mpcb') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} (${p.series})`, `${p.rangeMin}-${p.rangeMax} A`, `${p.kW} kW`)).join('');
  } else if (type === 'relay') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} (${p.series})`, `${p.rangeMin}-${p.rangeMax} A`)).join('');
  }

  return `
    <div class="card fade-in">
      <div class="card-title">\u2705 ${title}</div>
