<!DOCTYPE html>
<html lang="da" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El-Dimensionering / Electrical Dimensioning</title>
<style>
:root {
  --primary: #0f4c75;
  --primary-light: #3282b8;
  --primary-glow: rgba(50,130,184,0.15);
  --accent: #00b4d8;
  --accent-soft: #90e0ef;
  --success: #06d6a0;
  --success-bg: rgba(6,214,160,0.08);
  --danger: #ef476f;
  --danger-bg: rgba(239,71,111,0.08);
  --warning: #ffd166;
  --warning-bg: rgba(255,209,102,0.1);
  --bg: #f0f4f8;
  --bg-gradient: linear-gradient(180deg, #e8eef5 0%, #f0f4f8 100%);
  --card: #ffffff;
  --text: #1b2838;
  --text-light: #5a6d7e;
  --text-muted: #8fa3b5;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --shadow-sm: 0 1px 3px rgba(15,76,117,0.04), 0 1px 2px rgba(15,76,117,0.06);
  --shadow: 0 4px 12px rgba(15,76,117,0.06), 0 1px 3px rgba(15,76,117,0.08);
  --shadow-lg: 0 10px 30px rgba(15,76,117,0.08), 0 4px 10px rgba(15,76,117,0.05);
  --shadow-glow: 0 0 20px rgba(50,130,184,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: var(--bg-gradient);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0a2e4d 0%, var(--primary) 50%, var(--primary-light) 100%);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(10,46,77,0.25);
  backdrop-filter: blur(10px);
}

.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.lang-toggle {
  display: flex;
  gap: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 22px;
  padding: 3px;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.1);
}

.lang-btn {
  padding: 6px 16px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 700;
  background: transparent;
  color: rgba(255,255,255,0.6);
  transition: var(--transition);
  letter-spacing: 0.5px;
}

.lang-btn:hover { color: rgba(255,255,255,0.9); }
.lang-btn.active {
  background: white;
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Navigation */
.nav {
  display: flex;
  gap: 8px;
  padding: 14px 20px;
  background: white;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-shadow: var(--shadow-sm);
}
.nav::-webkit-scrollbar { display: none; }

.nav-btn {
  padding: 9px 18px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--bg);
  color: var(--text-light);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: var(--transition);
  letter-spacing: 0.2px;
}

.nav-btn:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  background: var(--primary-glow);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.nav-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-color: transparent;
  box-shadow: 0 3px 12px rgba(15,76,117,0.3);
  transform: translateY(-1px);
}

/* Main Content */
.main {
  padding: 20px;
  max-width: 920px;
  margin: 0 auto;
}

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid var(--border-light);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: var(--transition);
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.card:hover::before { opacity: 1; }

.card-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border-light);
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Selection Grid */
.select-group {
  margin-bottom: 20px;
}

.select-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.select-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.sel-btn {
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  color: var(--text);
  font-size: 0.84rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  min-width: 52px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.sel-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--primary-glow);
  opacity: 0;
  transition: var(--transition);
}

.sel-btn:hover {
  border-color: var(--primary-light);
  background: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(50,130,184,0.12);
}

.sel-btn:hover::after { opacity: 1; }

.sel-btn:active {
  transform: translateY(0);
  box-shadow: none;
}

.sel-btn.selected {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(15,76,117,0.25);
  transform: translateY(-1px);
}

.sel-btn.selected::after { display: none; }
.sel-btn.disabled { opacity: 0.35; pointer-events: none; filter: grayscale(0.5); }

/* Results */
.result-box {
  background: linear-gradient(135deg, rgba(6,214,160,0.05), rgba(6,214,160,0.02));
  border: 1.5px solid var(--success);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-top: 18px;
  position: relative;
  overflow: hidden;
}

.result-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--success);
  border-radius: 2px;
}

.result-box.warning {
  background: linear-gradient(135deg, rgba(255,209,102,0.06), rgba(255,209,102,0.02));
  border-color: var(--warning);
}
.result-box.warning::before { background: var(--warning); }

.result-box.error {
  background: linear-gradient(135deg, rgba(239,71,111,0.04), rgba(239,71,111,0.02));
  border-color: var(--danger);
}
.result-box.error::before { background: var(--danger); }

.result-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  color: var(--success);
  padding-left: 8px;
}

.result-box.warning .result-title { color: #b8860b; }
.result-box.error .result-title { color: var(--danger); }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 8px 8px 12px;
  margin: 2px 0;
  border-radius: 6px;
  font-size: 0.88rem;
  transition: var(--transition);
}

.result-row:hover { background: rgba(15,76,117,0.03); }
.result-row .label { color: var(--text-light); font-weight: 500; }
.result-row .value { font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

/* Verification badges */
.verify-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.verify-badge.ok {
  background: linear-gradient(135deg, rgba(6,214,160,0.15), rgba(6,214,160,0.08));
  color: #047857;
  border: 1px solid rgba(6,214,160,0.3);
}

.verify-badge.fail {
  background: linear-gradient(135deg, rgba(239,71,111,0.12), rgba(239,71,111,0.06));
  color: #b91c46;
  border: 1px solid rgba(239,71,111,0.3);
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.82rem;
  margin-top: 12px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.data-table th {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
  transition: var(--transition);
}

.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--primary-glow); }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 1.05rem; }
  .nav { padding: 10px 12px; gap: 6px; }
  .nav-btn { font-size: 0.72rem; padding: 7px 12px; }
  .card { padding: 16px; margin-bottom: 14px; border-radius: var(--radius); }
  .sel-btn { padding: 8px 12px; font-size: 0.8rem; min-width: 44px; }
  .main { padding: 14px; }
  .select-grid { gap: 6px; }
}

/* Animations */
.fade-in {
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }

/* Info tooltip */
.info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg, var(--primary-glow), rgba(50,130,184,0.05));
  border: 1px solid rgba(50,130,184,0.12);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  font-size: 0.8rem;
  color: var(--primary);
  font-weight: 500;
}

.info-row::before {
  content: "\2139";
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(15,76,117,0.2);
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Status Bar */
.status-bar {
  display: flex;
  gap: 6px;
  padding: 8px 20px;
  background: linear-gradient(135deg, #f8fafc, #edf2f7);
  border-bottom: 1px solid var(--border-light);
  overflow-x: auto;
  scrollbar-width: none;
  align-items: center;
  min-height: 40px;
}
.status-bar::-webkit-scrollbar { display: none; }
.status-bar:empty { display: none; }

.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-light);
  white-space: nowrap;
  transition: var(--transition);
  cursor: pointer;
}

.status-chip:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.status-chip .chip-label {
  color: var(--text-muted);
  font-weight: 500;
}

.status-chip .chip-value {
  color: var(--primary);
  font-weight: 700;
}

.status-chip.has-value {
  background: var(--primary-glow);
  border-color: rgba(50,130,184,0.2);
}

/* ===== DARK MODE ===== */
body.dark {
  --primary: #4a9fd4;
  --primary-light: #6bb6e0;
  --primary-glow: rgba(74,159,212,0.18);
  --accent: #2ec7e0;
  --bg: #0f1620;
  --bg-gradient: linear-gradient(180deg, #0b1119 0%, #0f1620 100%);
  --card: #1a2330;
  --text: #e6edf3;
  --text-light: #aab8c5;
  --text-muted: #718595;
  --border: #2a3645;
  --border-light: #232e3b;
  --success: #2ee6a8;
  --success-bg: rgba(46,230,168,0.10);
  --danger: #ff6b8a;
  --danger-bg: rgba(255,107,138,0.10);
  --warning: #ffd27a;
  --warning-bg: rgba(255,210,122,0.12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.45);
}
body.dark .sel-btn { background: #1a2535; color: #b8d4e8; border-color: #2a3f55; }
body.dark .sel-btn:hover { background: #1f3048; border-color: #00e5ff; color: #e0f4ff; box-shadow: 0 0 10px rgba(0,229,255,0.25); }
body.dark .sel-btn.selected { background: linear-gradient(135deg, #00c8ff, #0080ff); color: #fff; border-color: transparent; box-shadow: 0 0 18px rgba(0,229,255,0.75), 0 0 4px rgba(0,200,255,0.9); text-shadow: 0 0 6px rgba(255,255,255,0.5); }
body.dark .nav { background: #0f1a26; }
body.dark .nav-btn { background: #1a2535; color: #8ab4d0; border-color: #2a3f55; }
body.dark .nav-btn:hover { border-color: #00e5ff; color: #e0f4ff; box-shadow: 0 0 8px rgba(0,229,255,0.3); }
body.dark .nav-btn.active { background: linear-gradient(135deg, #00c8ff, #0080ff); color: #fff; border-color: transparent; box-shadow: 0 0 14px rgba(0,229,255,0.7); }
body.dark .status-bar { background: linear-gradient(135deg, #161f2a, #1a2330); }
body.dark .status-chip { background: #1a2535; border-color: #2a3f55; }
body.dark .status-chip.has-value { background: rgba(0,200,255,0.12); border-color: rgba(0,229,255,0.4); }
body.dark #aiSearchBox { background: #1a2535; color: #e0f4ff; border-color: #00c8ff; box-shadow: 0 0 8px rgba(0,200,255,0.2); }
body.dark .card { border-color: #1f3048; }
body.dark .card-title { color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.4); }
body.dark .result-box { background: rgba(10,25,40,0.8); border-color: #1f4060; }
body.dark .result-box.warning { background: rgba(40,30,10,0.6); border-color: #7a5a00; }
body.dark .result-box.error { background: rgba(40,10,20,0.6); border-color: #7a0025; }
body.dark .result-row { border-color: rgba(100,180,255,0.08); }
body.dark .result-row .label { color: #8cc8e8; }
body.dark .result-row .value { color: #e8f4ff; }
body.dark .result-title { color: #00ffc8; }
body.dark .info-row { background: rgba(0,180,255,0.08); border-color: rgba(0,200,255,0.2); color: #7dd4f0; }
body.dark .select-label { color: #6aa8c8; }
body.dark .data-table th { background: linear-gradient(135deg, #0a2540, #0f3050); }
body.dark .data-table td { border-color: #1f3048; color: #c8e0f0; }
body.dark .data-table tr:hover td { background: rgba(0,200,255,0.08); }
body.dark .verify-badge.ok { background: rgba(0,255,200,0.15); color: #00ffc8; border-color: rgba(0,255,200,0.3); }
body.dark .verify-badge.fail { background: rgba(255,80,120,0.15); color: #ff8aa6; border-color: rgba(255,80,120,0.3); }
body.dark img { filter: brightness(0.92); }
.theme-btn {
  border: none;
  background: rgba(255,255,255,0.12);
  color: #fff;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.theme-btn:hover { background: rgba(255,255,255,0.25); }

/* ===== PRINT / PDF ===== */
@media print {
  .header, .nav, .status-bar, .theme-btn, .lang-toggle { display: none !important; }
  body { background: #fff; }
  .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; }
  .card::before { display: none; }
  .sel-btn { display: none !important; }
  .main { padding: 0; max-width: 100%; }
  .no-print { display: none !important; }
  .print-only { display: block !important; }
  img { filter: none !important; }
}
.print-only { display: none; }

/* RTL Support for Persian/Farsi */
html[dir="rtl"] body { direction: rtl; text-align: right; }
html[dir="rtl"] .header { direction: rtl; }
html[dir="rtl"] .nav { direction: rtl; }
html[dir="rtl"] .select-grid { direction: rtl; }
html[dir="rtl"] .result-row { direction: rtl; }
html[dir="rtl"] .result-row .label { text-align: right; }
html[dir="rtl"] .result-row .value { text-align: left; }
html[dir="rtl"] .card-title { text-align: right; }
html[dir="rtl"] .info-row { text-align: right; }
html[dir="rtl"] .select-label { text-align: right; }
html[dir="rtl"] .status-bar { direction: rtl; }
html[dir="rtl"] .lang-toggle { direction: ltr; }
</style>
</head>
<body>

<div class="header">
  <h1 id="appTitle" style="display:flex;align-items:center;gap:8px"><span id="appTitleText">El-Dimensionering</span><span id="verBadge" style="font-size:0.6rem;font-weight:700;background:rgba(255,255,255,0.18);padding:2px 7px;border-radius:10px;letter-spacing:0.5px"></span></h1>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="themeBtn" class="theme-btn" onclick="toggleTheme()" title="Dark / Light">🌙</button>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('da')">DA</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('fa')">FA</button>
    </div>
  </div>
</div>

<div class="nav" id="mainNav"></div>
<div class="status-bar" id="statusBar"></div>

<div class="main" id="mainContent"></div>

// ===== SMART RECOMMENDATION ENGINE =====
// Only returns products that are SAFE and CORRECT for the given parameters
// Rules per IEC 60364-4-43: IB <= In <= Iz, Icu >= Ikmax

// Official Iz (DS/HD 60364-5-52 Table C.52.1, method C). NKT NOIKLX/NOIKX-Flex
// are halogen-free XLPE 90°C -> use XLPE column; others use conservative PVC 70°C.
function officialIz(product) {
  const xlpe = /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(product.model || '');
  if (product.material === 'Al') return (xlpe ? IZ_ALU_XLPE : IZ_ALU)[product.mm2] || product.iz;
  return (xlpe ? IZ_COPPER_XLPE : IZ_COPPER)[product.mm2] || product.iz;
}

function recommendCables(ib, material) {
  // Proper coordination IB <= In <= Iz: the cable must carry at least the
  // protection rating (next standard size >= IB), not just IB itself.
  const mat = material || cableState.material;
  const stdRatings = [6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const inMin = stdRatings.find(r => r >= ib) || ib;
  return PRODUCTS.cables
    .filter(c => c.material === (mat === 'copper' ? 'Cu' : 'Al'))
    .filter(c => officialIz(c) >= inMin) // Iz >= In >= IB
    .sort((a, b) => officialIz(a) - officialIz(b)) // Smallest suitable first
    .slice(0, 5);
}

function recommendMCBs(ib, ikmax) {
  // IEC 60364-4-43: IB <= In (rating must be >= load current)
  // Icu >= Ikmax (breaking capacity must handle short circuit)
  const ikMaxA = (ikmax || 6) * 1000; // convert kA to A, default 6kA
  return PRODUCTS.mcbs
    .filter(m => m.rating >= ib) // In >= IB
    .filter(m => m.icu * 1000 >= ikMaxA) // Icu >= Ikmax
    .sort((a, b) => a.rating - b.rating || a.icu - b.icu)
    .slice(0, 6);
}

function recommendMCCBs(ib, ikmax) {
  const ikMaxA = (ikmax || 10) * 1000;
  return PRODUCTS.mccbs
    .filter(m => {
      const maxIn = Math.max(...m.inOptions);
      return maxIn >= ib && m.icu * 1000 >= ikMaxA;
    })
    .sort((a, b) => Math.min(...a.inOptions.filter(i => i >= ib)) - Math.min(...b.inOptions.filter(i => i >= ib)))
    .slice(0, 4);
}

function recommendFuses(ib) {
  // In >= IB (fuse must be rated at or above load current)
  return PRODUCTS.fuses
    .filter(f => f.rating >= ib)
    .sort((a, b) => a.rating - b.rating)
    .slice(0, 5);
}

function recommendContactors(ib) {
  // AC-3 rating must be >= motor current
  return PRODUCTS.contactors
    .filter(c => c.ac3_A >= ib)
    .sort((a, b) => a.ac3_A - b.ac3_A)
    .slice(0, 4);
}

function recommendRCDs(ib, phases) {
  // RCD rating must be >= load current; match pole count to phase count
  const poles = phases === '3x400' ? '4P' : '2P';
  return PRODUCTS.rcds
    .filter(r => r.poles === poles && r.rating >= ib && r.sensitivity === 30)
    .sort((a, b) => a.rating - b.rating)
    .slice(0, 4);
}

function recommendMPCBs(ib) {
  // Motor protection: IB must fall within adjustment range
  return PRODUCTS.mpcbs
    .filter(m => ib <= m.rangeMax && ib >= m.rangeMin * 0.7)
    .sort((a, b) => a.rangeMax - b.rangeMax)
    .slice(0, 3);
}

function recommendOverloadRelays(ib) {
  // Overload relay: IB must fall within range
  return PRODUCTS.overloadRelays
    .filter(r => ib <= r.rangeMax && ib >= r.rangeMin * 0.7)
    .sort((a, b) => a.rangeMax - b.rangeMax)
    .slice(0, 3);
}

  } else if (type === 'mccb') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model}`, `Icu = ${p.icu} kA`, `In: ${p.inOptions.join(', ')} A`)).join('');
  } else if (type === 'fuse') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.rating} A`, `${p.size}`, `Icu=${p.icu} kA | I5s=${p.i5s} A`)).join('');
  } else if (type === 'contactor') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} (${p.series})`, `AC-3: ${p.ac3_A} A`, `${p.ac3_kW} kW`)).join('');
  } else if (type === 'rcd') {

// ===== AI ASSISTANT - Contextual Guidance =====
// Provides intelligent tips and warnings in each module based on current state

function getAiAssistant(module) {
  const ib = calcIB();
  const tips = [];
  const warnings = [];
  const errors = [];

  switch(module) {
    case 'load':
      if (loadState.power === 1) {
        tips.push(tx('Tip: Vælg den faktiske effekt for din belastning.', 'Tip: Select the actual power for your load.'));
      }
      if (ib > 63 && ib <= 125) {
        tips.push(tx('IB > 63 A: Overvej C120N/H MCB eller NH-sikring.', 'IB > 63 A: Consider C120N/H MCB or NH fuse.'));
      }
      if (ib > 125) {
        tips.push(tx('IB > 125 A: Brug maksimalafbryder (MCCB) eller NH-sikring.', 'IB > 125 A: Use MCCB or NH fuse.'));
      }
      if (loadState.cosPhi < 0.85) {
        tips.push(tx('Lav cos\u03C6: Overvej fasekompensering for at reducere strømmen.', 'Low cos\u03C6: Consider power factor correction to reduce current.'));
      }
      if (loadState.simFactor < 0.7) {
        tips.push(tx('Lav samtidighedsfaktor: Kontroll\u00E9r at dette er korrekt for anlægstypen.', 'Low simultaneity factor: Verify this is correct for the installation type.'));
      }
      break;

    case 'fuse':
      if (fuseState.size && fuseState.size < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Sikringsstørrelse (' + fuseState.size + ' A) er MINDRE end IB (' + ib.toFixed(1) + ' A)! Vælg en større sikring.' : '\u26A0\uFE0F ERROR: Fuse rating (' + fuseState.size + ' A) is LESS than IB (' + ib.toFixed(1) + ' A)! Select a larger fuse.');
      }
      if (fuseState.size && fuseState.size >= ib) {
        tips.push(lang === 'da' ? '\u2705 IB (' + ib.toFixed(1) + ' A) \u2264 In (' + fuseState.size + ' A) — korrekt dimensioneret.' : '\u2705 IB (' + ib.toFixed(1) + ' A) \u2264 In (' + fuseState.size + ' A) — correctly dimensioned.');
      }
      if (!fuseState.size) {
        tips.push(lang === 'da' ? 'Vælg sikringsholder og størrelse. IB = ' + ib.toFixed(1) + ' A.' : 'Select fuse holder and size. IB = ' + ib.toFixed(1) + ' A.');
      }
      break;

    case 'mcb':
      if (mcbState.rating && mcbState.rating < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: MCB mærkestrøm (' + mcbState.rating + ' A) < IB (' + ib.toFixed(1) + ' A)! Oversikret kabel!' : '\u26A0\uFE0F ERROR: MCB rating (' + mcbState.rating + ' A) < IB (' + ib.toFixed(1) + ' A)! Cable overloaded!');
      }
      if (mcbState.rating && mcbState.rating >= ib) {
        tips.push(tx('\u2705 IB \u2264 In — korrekt.', '\u2705 IB \u2264 In — correct.'));
      }
      if (mcbState.curve === 'B') {
        tips.push(tx('Kurve B: Bedst til resistive belastninger (lys, varme, stikkontakter).', 'Curve B: Best for resistive loads (lighting, heating, sockets).'));
      } else if (mcbState.curve === 'C') {
        tips.push(tx('Kurve C: Til induktive belastninger (motorer, transformere, kompressorer).', 'Curve C: For inductive loads (motors, transformers, compressors).'));
      } else if (mcbState.curve === 'D') {
        tips.push(tx('Kurve D: Til høje startstrømme (store motorer, svejsemaskiner).', 'Curve D: For high inrush (large motors, welding machines).'));
      }
      break;

    case 'mccb':
      const io = mccbState.inVal * mccbState.ioMult;
      if (io < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Io (' + io.toFixed(0) + ' A) < IB (' + ib.toFixed(1) + ' A)! Utilstrækkelig beskyttelse.' : '\u26A0\uFE0F ERROR: Io (' + io.toFixed(0) + ' A) < IB (' + ib.toFixed(1) + ' A)! Insufficient protection.');
      }
      if (io >= ib) {
        tips.push(tx('\u2705 IB \u2264 Io — langsom udløser korrekt indstillet.', '\u2705 IB \u2264 Io — long-time protection correctly set.'));
      }
      tips.push(tx('Micrologic 2.2: Indstil Io \u2265 IB, og Isd baseret p\u00E5 Ik min.', 'Micrologic 2.2: Set Io \u2265 IB, and Isd based on Ik min.'));
      break;

    case 'cable':
      if (cableState.crossSection) {
        const izTable = izTableFor();
        const baseIz = izTable[parseFloat(cableState.crossSection)] || 0;
        const kInstall = INSTALL_METHODS[cableState.installMethod] || 1.0;
        const kTemp = TEMP_FACTORS[cableState.temp] || 1.0;
        const kGroup = GROUP_FACTORS[cableState.grouping] || 1.0;
        const correctedIz = baseIz * kInstall * kTemp * kGroup;

        if (correctedIz < ib) {
          errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Korrigeret Iz (' + correctedIz.toFixed(1) + ' A) < IB (' + ib.toFixed(1) + ' A)! Kablet er UNDERDIMENSIONERET!' : '\u26A0\uFE0F ERROR: Corrected Iz (' + correctedIz.toFixed(1) + ' A) < IB (' + ib.toFixed(1) + ' A)! Cable is UNDERSIZED!');
        } else {
          tips.push(lang === 'da' ? '\u2705 Iz (' + correctedIz.toFixed(1) + ' A) \u2265 IB (' + ib.toFixed(1) + ' A) — kabel korrekt dimensioneret.' : '\u2705 Iz (' + correctedIz.toFixed(1) + ' A) \u2265 IB (' + ib.toFixed(1) + ' A) — cable correctly sized.');
        }
        if (cableState.grouping > 3) {
          warnings.push(tx('H\u00F8j gruppering reducerer kapaciteten kraftigt. Overvej større tværsnit.', 'High grouping significantly reduces capacity. Consider larger cross-section.'));
        }
        if (cableState.temp > 35) {
          warnings.push(tx('Forhøjet temperatur: Kablets kapacitet er reduceret.', 'Elevated temperature: Cable capacity is reduced.'));
        }
      } else {
        tips.push(lang === 'da' ? 'Vælg kabeltype og tværsnit. Krævet Iz \u2265 ' + ib.toFixed(1) + ' A.' : 'Select cable type and cross-section. Required Iz \u2265 ' + ib.toFixed(1) + ' A.');
      }
      break;

    case 'vdrop':
      const cables2 = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
      const ct2 = cables2[cableState.type];
      const cc2 = ct2 && ct2[cableState.cores] ? ct2[cableState.cores] : {};
      const sc2 = cc2[cableState.crossSection];
      if (sc2) {
        const L = vdropState.length / 1000;
        const cosP = loadState.cosPhi;
        const sinP = Math.sin(Math.acos(cosP));
        const Un = loadState.voltage === '3x400' ? 400 : 230;
        let vd;
        if (loadState.voltage === '3x400') {
          vd = Math.sqrt(3) * ib * L * (sc2.r * cosP + sc2.x * sinP);
        } else {
          vd = 2 * ib * L * (sc2.r * cosP + sc2.x * sinP);
        }
        const vdP = (vd / Un) * 100;
        if (vdP > 5) {
          errors.push(lang === 'da' ? '\u26A0\uFE0F Spændingsfald ' + vdP.toFixed(1) + '% OVERSTIGER 5%! Vælg større kabel eller kortere kabelrute.' : '\u26A0\uFE0F Voltage drop ' + vdP.toFixed(1) + '% EXCEEDS 5%! Choose larger cable or shorter route.');
        } else if (vdP > 3) {
          warnings.push(lang === 'da' ? 'Spændingsfald ' + vdP.toFixed(1) + '% — uegnet til belysning (maks 3%).' : 'Voltage drop ' + vdP.toFixed(1) + '% — unsuitable for lighting (max 3%).');
        } else {
          tips.push(lang === 'da' ? '\u2705 Spændingsfald ' + vdP.toFixed(1) + '% — OK for alle belastningstyper.' : '\u2705 Voltage drop ' + vdP.toFixed(1) + '% — OK for all load types.');
        }
      }
      if (vdropState.length > 100) {
        tips.push(tx('Lang kabelrute: Kontroller spændingsfald og kortslutningsstrøm i enden.', 'Long cable run: Check voltage drop and short-circuit current at end.'));
      }
      break;

    case 'scircuit':
      tips.push(tx('Kontroll\u00E9r: Icu \u2265 Ik max OG Isd \u2264 Ik min for korrekt beskyttelse.', 'Verify: Icu \u2265 Ik max AND Isd \u2264 Ik min for correct protection.'));
      tips.push(tx('IEC 60909: c = 1,05 (maks) for lavspænding. Ik min beregnes med 0,95 faktor.', 'IEC 60909: c = 1.05 (max) for LV. Ik min calculated with 0.95 factor.'));
      break;

    case 'trafo':
      tips.push(tx('Belastningsgrad 75-80% er optimal for levetid og effektivitet.', 'Load level 75-80% is optimal for lifetime and efficiency.'));
      if (trafoState.loadPercent > 90) {
        warnings.push(tx('Belastning over 90%: Overvej større trafo for fremtidige udvidelser.', 'Load above 90%: Consider larger transformer for future expansion.'));
      }
      break;

    case 'standards':
      tips.push(tx('Alle beregninger f\u00F8lger DS/HD 60364 og IEC 60909.', 'All calculations follow DS/HD 60364 and IEC 60909.'));
      break;
  }

  return { tips, warnings, errors };
}

// Render AI assistant card
function renderAiAssistant(module) {
  const ai = getAiAssistant(module);
  if (ai.tips.length === 0 && ai.warnings.length === 0 && ai.errors.length === 0) return '';

  let html = '<div class="card fade-in" style="border-left:4px solid var(--accent);"><div class="card-title">\uD83E\uDD16 ' + (tx('AI-Assistent', 'AI Assistant')) + '</div>';

  if (ai.errors.length > 0) {
    html += '<div class="result-box error" style="margin-top:0">';
    html += '<div class="result-title">' + (tx('FEJL — Korrektion påkrævet', 'ERROR — Correction required')) + '</div>';
    ai.errors.forEach(e => { html += '<div class="result-row"><span class="label" style="color:var(--danger);font-weight:600">' + e + '</span></div>'; });
    html += '</div>';
  }

  if (ai.warnings.length > 0) {
    html += '<div class="result-box warning" style="margin-top:8px">';
    html += '<div class="result-title">' + (tx('Advarsel', 'Warning')) + '</div>';
    ai.warnings.forEach(w => { html += '<div class="result-row"><span class="label" style="color:#b8860b">\u26A0\uFE0F ' + w + '</span></div>'; });
    html += '</div>';
  }

  if (ai.tips.length > 0) {
    html += '<div style="margin-top:8px;padding:10px 12px;background:var(--primary-glow);border-radius:var(--radius-sm)">';
    ai.tips.forEach(t => { html += '<div style="padding:4px 0;font-size:0.82rem;color:var(--primary);">\uD83D\uDCA1 ' + t + '</div>'; });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ===== QI VALIDATION SYSTEM =====
// Quality Index: Checks coordination between all modules and flags issues

function runQiValidation() {
  const ib = calcIB();
  const issues = [];
  const passed = [];

  // 1. Check IB <= In (protection device rating)
  if (mcbState.rating) {
    if (mcbState.rating >= ib) {
      passed.push({ rule: 'IB \u2264 In (MCB)', detail: ib.toFixed(1) + ' A \u2264 ' + mcbState.rating + ' A' });
    } else {
      issues.push({ rule: 'IB \u2264 In (MCB)', detail: ib.toFixed(1) + ' A > ' + mcbState.rating + ' A', severity: 'error' });
    }
  }

  // 2. Check In <= Iz (protection device <= cable capacity)
  if (mcbState.rating && cableState.crossSection) {
    const izTable = izTableFor();
    const baseIz = izTable[parseFloat(cableState.crossSection)] || 0;
    const kTotal = (INSTALL_METHODS[cableState.installMethod] || 1) * (TEMP_FACTORS[cableState.temp] || 1) * (GROUP_FACTORS[cableState.grouping] || 1);
    const corrIz = baseIz * kTotal;
    if (mcbState.rating <= corrIz) {
      passed.push({ rule: 'In \u2264 Iz', detail: mcbState.rating + ' A \u2264 ' + corrIz.toFixed(1) + ' A' });
    } else {
      issues.push({ rule: 'In \u2264 Iz', detail: mcbState.rating + ' A > ' + corrIz.toFixed(1) + ' A', severity: 'error' });
    }
  }

  // 3. Check voltage drop
  const cables3 = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const ct3 = cables3[cableState.type];
  const cc3 = ct3 && ct3[cableState.cores] ? ct3[cableState.cores] : {};
  const sc3 = cc3[cableState.crossSection];
  if (sc3 && vdropState.length) {
    const L = vdropState.length / 1000;
    const cosP = loadState.cosPhi;
    const sinP = Math.sin(Math.acos(cosP));
    const Un = loadState.voltage === '3x400' ? 400 : 230;
    const vd = loadState.voltage === '3x400'
      ? Math.sqrt(3) * ib * L * (sc3.r * cosP + sc3.x * sinP)
      : 2 * ib * L * (sc3.r * cosP + sc3.x * sinP);
    const vdP = (vd / Un) * 100;
    if (vdP <= 4) {
      passed.push({ rule: '\u0394U \u2264 4%', detail: vdP.toFixed(2) + '%' });
    } else {
      issues.push({ rule: '\u0394U \u2264 4%', detail: vdP.toFixed(2) + '% > 4%', severity: vdP > 5 ? 'error' : 'warning' });
    }
  }

  // 4. Coordination check: IB <= In <= Iz
  if (mcbState.rating && cableState.crossSection) {
    const izTable = izTableFor();
    const corrIz = (izTable[parseFloat(cableState.crossSection)] || 0) *
      (INSTALL_METHODS[cableState.installMethod] || 1) *
      (TEMP_FACTORS[cableState.temp] || 1) *
      (GROUP_FACTORS[cableState.grouping] || 1);
    if (ib <= mcbState.rating && mcbState.rating <= corrIz) {
      passed.push({ rule: 'IB \u2264 In \u2264 Iz (koordination)', detail: ib.toFixed(1) + ' \u2264 ' + mcbState.rating + ' \u2264 ' + corrIz.toFixed(1) + ' A' });
    }
  }

  // 5. Fuse coordination
  if (fuseState.size) {
    if (fuseState.size >= ib) {
      passed.push({ rule: 'IB \u2264 In (sikring)', detail: ib.toFixed(1) + ' A \u2264 ' + fuseState.size + ' A' });
    } else {
      issues.push({ rule: 'IB \u2264 In (sikring)', detail: ib.toFixed(1) + ' A > ' + fuseState.size + ' A', severity: 'error' });
    }
  }

  return { issues, passed, score: passed.length > 0 ? Math.round((passed.length / (passed.length + issues.length)) * 100) : 0 };
}

// ===== DYNAMIC COORDINATE AXES =====
// When a value changes in one module, propagate relevant data to other modules

function syncAxes() {
  // Auto-suggest cable based on IB
  const ib = calcIB();

  // If no cable selected yet, auto-find smallest suitable
  if (!cableState.crossSection && ib > 0) {
    const izTable = izTableFor();
    const sizes = Object.keys(izTable).map(Number).sort((a,b) => a - b);
    for (const sz of sizes) {
      if (izTable[sz] >= ib) {
        // Don't auto-set, but store suggestion
        cableState._suggested = sz;
        break;
      }
    }
  }

  // Auto-suggest fuse based on IB
  if (!fuseState.size && ib > 0) {
    const allSizes = [6,10,13,16,20,25,32,35,40,50,63,80,100,125,160,200,250,315,400,500,630];
    fuseState._suggested = allSizes.find(s => s >= ib) || null;
  }

  // Auto-suggest MCB based on IB
  if (!mcbState.rating && ib > 0) {
    const stdRatings = [6,10,13,16,20,25,32,40,50,63];
    mcbState._suggested = stdRatings.find(r => r >= ib) || null;
  }
}

// Per-consumer current contribution to each phase (A)
function lsConsumerCurrent(c){
  const P = c.kW*1000*c.sf;
  if(c.phase==='3'){ const I = P/(Math.sqrt(3)*400*c.cos); return {L1:I,L2:I,L3:I,kVA:c.kW*c.sf/c.cos}; }
  const I = P/(230*c.cos); const r={L1:0,L2:0,L3:0,kVA:c.kW*c.sf/c.cos}; r[c.phase]=I; return r;
}
function calcLoadSchedule(){
  const ph={L1:0,L2:0,L3:0}; let kVA=0, kW=0;
  loadList.forEach(c=>{ const x=lsConsumerCurrent(c); ph.L1+=x.L1; ph.L2+=x.L2; ph.L3+=x.L3; kVA+=x.kVA; kW+=c.kW*c.sf; });
  const maxPhase=Math.max(ph.L1,ph.L2,ph.L3);
  return { ph, maxPhase, kVA, kW, ib: maxPhase, count: loadList.length };
}

function sldCreateNode(type, parentId, overrides) {

    final_circuit: { name_da: 'Slutkreds', name_en: 'Final Circuit', name_fa: 'مدار نهایی', voltage: 230, power_kW: 3.45, cosPhi: 0.95, cable: PRODUCTS.cables.find(function(c){ return c.mm2 === 2.5 && c.material === 'Cu'; }), protection: PRODUCTS.mcbs.find(function(m){ return m.rating === 16 && m.curve === 'B'; }), length_m: 25, installMethod: 'C', temp: 30, grouping: 1, phases: '1x230', protectionIn: 16 }

// --- Calculation Engine ---
function sldCalcNodeIB(node) {
  if (node.type === 'transformer') return 0;
  const P = (node.power_kW || 0) * 1000;
  const cos = node.cosPhi || 0.9;
  if (node.phases === '3x400' || node.voltage === 400) {
    return P / (Math.sqrt(3) * 400 * cos);
  }
  return P / (230 * cos);
}

function sldGetPath(tree, nodeId) {
  const path = [];
  let current = nodeId;
  while (current) {
    path.unshift(current);
    const node = tree.nodes[current];
    current = node ? node.parentId : null;
  }
  return path;
}

function sldCalcNodeZs(tree, nodeId) {
  const path = sldGetPath(tree, nodeId);
  let zs = 0;
  for (let i = 0; i < path.length; i++) {
    const node = tree.nodes[path[i]];
    if (!node) continue;
    if (node.type === 'transformer') {
      const uk = node.uk_pct || TRAFO_UK[node.power_kVA] || 4;
      const sn = (node.power_kVA || 630) * 1000;
      const u = 400;
      zs += (uk / 100) * (u * u) / sn;
    } else if (node.cable && node.length_m > 0) {
      const r = node.cable.r || 0;
      const x = node.cable.x || 0;
      const L = node.length_m;
      zs += 2 * L * (r + x) / 1000;
    }
  }
  return zs;
}

// Positive-sequence impedance for three-phase Ikmax calculation (IEC 60909).
// Unlike Zs (earth-fault loop with factor 2), Z1 uses factor 1 and sqrt(r^2 + x^2)
// per segment. This gives the correct prospective three-phase fault current.
function sldCalcNodeZ1(tree, nodeId) {
  const path = sldGetPath(tree, nodeId);
  let z1 = 0;
  for (let i = 0; i < path.length; i++) {
    const node = tree.nodes[path[i]];
    if (!node) continue;
    if (node.type === 'transformer') {
      // Transformer positive-sequence impedance is the same: Zt = (uk/100) * U^2 / Sn
      const uk = node.uk_pct || TRAFO_UK[node.power_kVA] || 4;
      const sn = (node.power_kVA || 630) * 1000;
      const u = 400;
      z1 += (uk / 100) * (u * u) / sn;
    } else if (node.cable && node.length_m > 0) {
      const r = node.cable.r || 0;
      const x = node.cable.x || 0;
      const L = node.length_m;
      // Positive-sequence: L * sqrt(r^2 + x^2) / 1000 (no factor of 2, geometric sum)
      z1 += L * Math.sqrt(r * r + x * x) / 1000;
    }
  }
  return z1;
}

function sldCalcNodeVdrop(tree, nodeId) {
  const path = sldGetPath(tree, nodeId);
  let vdropTotal = 0;
  for (let i = 0; i < path.length; i++) {
    const node = tree.nodes[path[i]];
    if (!node || node.type === 'transformer') continue;
    if (node.cable && node.length_m > 0) {
      const ib = sldCalcNodeIB(node);
      const r = node.cable.r || 0;
      const x = node.cable.x || 0;
      const cos = node.cosPhi || 0.9;
      const sin = Math.sqrt(1 - cos * cos);
      const L = node.length_m;
      let dv;
      if (node.phases === '3x400' || node.voltage === 400) {
        dv = Math.sqrt(3) * ib * L * (r * cos + x * sin) / (400 * 10);
      } else {
        dv = 2 * ib * L * (r * cos + x * sin) / (230 * 10);
      }
      vdropTotal += dv;
    }
  }
  return vdropTotal;
}

function sldCalcNodeIk(tree, nodeId) {
  const zs = sldCalcNodeZs(tree, nodeId);
  if (zs <= 0) return { ikmax: 0, ikmin: 0, zs: 0, z1: 0 };
  const z1 = sldCalcNodeZ1(tree, nodeId);
  const cmax = 1.05;
  const cmin = 0.95;
  const node = tree.nodes[nodeId];
  var ikmax, ikmin;
  if (node && (node.phases === '1x230' || (node.voltage === 230 && node.phases !== '3x400'))) {
    // Single-phase fault: Ik = c * U0 / Zs (IEC 60909 for single-phase)
    // Uses earth-fault loop impedance (Zs with factor 2) - correct for single-phase faults
    ikmax = (cmax * 230) / zs;
    // The 1.5 factor accounts for increased conductor resistance at end-of-fault
    // temperature per Danish engineering practice (DS/HD 60364-4-41 Annex).
    // This is conservative for the disconnection check (understates Ikmin).
    ikmin = (cmin * 230) / (zs * 1.5);
  } else {
    // Three-phase symmetrical fault: Ik = c * U / (sqrt(3) * Z1) (IEC 60909 clause 4.2)
    // Uses positive-sequence impedance Z1 (factor 1, geometric sum) for accurate Ikmax.
    var U = 400;
    ikmax = (z1 > 0) ? (cmax * U) / (Math.sqrt(3) * z1) : 0;
    // For Ikmin (disconnection time check), use Zs (loop, conservative - understates current)
    // 1.5 factor: Danish simplification for minimum Ik at end-of-fault conductor temp.
    // Conservative for disconnection time check (DS/HD 60364-4-41, Danish annex practice).
    ikmin = (cmin * U) / (Math.sqrt(3) * zs * 1.5);
  }
  return { ikmax: ikmax, ikmin: ikmin, zs: zs, z1: z1 };
}

function sldPropagateAll(tree) {
  if (!tree || !tree.rootId) return;
  // Two-pass propagation:
  // Pass 1 (leaf-to-root): aggregate power_kW so parent boards reflect children's actual load.
  // Pass 2 (root-to-leaf): compute Zs, Vdrop, and Ik which depend on upstream impedance.

  // Build BFS order (root-to-leaf), then reverse for leaf-to-root pass
  var bfsOrder = [];
  var queue = [tree.rootId];
  while (queue.length > 0) {
    var id = queue.shift();
    var node = tree.nodes[id];
    if (!node) continue;
    bfsOrder.push(id);
    node.childIds.forEach(function(cid) { queue.push(cid); });
  }

  // Pass 1: Leaf-to-root - aggregate power_kW for boards
  for (var i = bfsOrder.length - 1; i >= 0; i--) {
    var nodeId = bfsOrder[i];
    var n = tree.nodes[nodeId];
    if (!n) continue;
    if (n.type === 'main_board' || n.type === 'sub_board') {
      var totalPower = 0;
      n.childIds.forEach(function(cid) {
        var child = tree.nodes[cid];
        if (child) totalPower += (child.power_kW || 0);
      });
      n.power_kW = totalPower;
    }
  }

  // Pass 2: Root-to-leaf - compute IB, Zs, Vdrop, Ik (depends on upstream values)
  for (var j = 0; j < bfsOrder.length; j++) {
    var nid = bfsOrder[j];
    var nd = tree.nodes[nid];
    if (!nd) continue;
    nd._ib = sldCalcNodeIB(nd);
    nd._zs = sldCalcNodeZs(tree, nid);
    nd._z1 = sldCalcNodeZ1(tree, nid);
    nd._vdrop = sldCalcNodeVdrop(tree, nid);
    var ik = sldCalcNodeIk(tree, nid);
    nd._ikmax = ik.ikmax;
    nd._ikmin = ik.ikmin;
  }
}

// --- DS/HD 60364 Compliance Verification ---
function sldVerifyNode(tree, nodeId) {
  const node = tree.nodes[nodeId];
  if (!node || node.type === 'transformer') return [];
  const results = [];
  const ib = node._ib || sldCalcNodeIB(node);
  const rawIz = node.cable ? (node.cable.iz || 0) : 0;
  // Apply installation method, temperature, and grouping derating factors to Iz
  // per DS/HD 60364-5-52 (correction factors for current-carrying capacity)
  const kInstall = INSTALL_METHODS[node.installMethod] || 1.0;
  const kTemp = TEMP_FACTORS[node.temp] || 1.0;
  const kGroup = GROUP_FACTORS[node.grouping] || 1.0;
  const iz = rawIz * kInstall * kTemp * kGroup;
  const protIn = node.protectionIn || (node.protection ? node.protection.rating : 0);
  const ikmax = node._ikmax || sldCalcNodeIk(tree, nodeId).ikmax;
  const vdrop = node._vdrop || sldCalcNodeVdrop(tree, nodeId);
  const zs = node._zs || sldCalcNodeZs(tree, nodeId);

  if (protIn > 0 && iz > 0) {
    if (ib <= protIn && protIn <= iz) {
      results.push({ rule: 'IB <= In <= Iz', clause: 'DS/HD 60364-4-43 cl. 433.1', status: 'ok', detail: ib.toFixed(1) + 'A <= ' + protIn + 'A <= ' + iz.toFixed(1) + 'A' });
    } else if (ib > protIn) {
      results.push({ rule: 'IB <= In <= Iz', clause: 'DS/HD 60364-4-43 cl. 433.1', status: 'fail', detail: 'IB=' + ib.toFixed(1) + 'A > In=' + protIn + 'A' });
    } else if (protIn > iz) {
      results.push({ rule: 'IB <= In <= Iz', clause: 'DS/HD 60364-4-43 cl. 433.1', status: 'fail', detail: 'In=' + protIn + 'A > Iz=' + iz.toFixed(1) + 'A' });
    }
  }

  // I2 <= 1.45 * Iz check (DS/HD 60364-4-43 cl. 433.1)
  // For MCBs, I2 = 1.45*In by construction (IEC 60898), so this is always satisfied when In <= Iz.
  // For MCCBs with adjustable trip units, verify the conventional tripping current.
  if (protIn > 0 && iz > 0 && node.protection) {
    const isMCCB = node.protection.frame || node.protection.inOptions;
    if (isMCCB) {
      // MCCB conventional tripping current I2 = 1.3 * In (IEC 60947-2)
      const i2 = 1.3 * protIn;
      if (i2 <= 1.45 * iz) {
        results.push({ rule: 'I2 <= 1.45*Iz', clause: 'DS/HD 60364-4-43 cl. 433.1', status: 'ok', detail: 'I2=' + i2.toFixed(1) + 'A <= 1.45*Iz=' + (1.45 * iz).toFixed(1) + 'A' });
      } else {
        results.push({ rule: 'I2 <= 1.45*Iz', clause: 'DS/HD 60364-4-43 cl. 433.1', status: 'fail', detail: 'I2=' + i2.toFixed(1) + 'A > 1.45*Iz=' + (1.45 * iz).toFixed(1) + 'A' });
      }
    }
  }

  if (node.protection && ikmax > 0) {
    const icu = (node.protection.icu || 0) * 1000;
    // DS/HD 60364-4-43 cl. 434.5.1: Icu must be >= maximum prospective fault current
    // at the device terminals (not at cable far end). This is the parent node's Ikmax,
    // i.e. the fault current at the busbar where the device is installed.
    let ikAtTerminals = ikmax; // fallback to own Ikmax if parent not available
    if (node.parentId) {
      const parent = tree.nodes[node.parentId];
      if (parent && parent.type === 'transformer') {
        // First device after transformer: Ik at terminals = Ik with only Ztrafo
        ikAtTerminals = sldCalcNodeIk(tree, node.parentId).ikmax;
        // If transformer has no downstream cable, use the three-phase formula with Ztrafo
        if (ikAtTerminals <= 0) {
          const uk = parent.uk_pct || TRAFO_UK[parent.power_kVA] || 4;
          const sn = (parent.power_kVA || 630) * 1000;
          const zTrafo = (uk / 100) * (400 * 400) / sn;
          ikAtTerminals = (1.05 * 400) / (Math.sqrt(3) * zTrafo);
        }
      } else if (parent && parent._ikmax > 0) {
        // For other nodes: fault current at device terminals = parent's Ikmax
        ikAtTerminals = parent._ikmax;
      } else if (parent) {
        // Parent not yet propagated: compute on the fly
        ikAtTerminals = sldCalcNodeIk(tree, node.parentId).ikmax;
      }
    }
    if (ikAtTerminals <= 0) ikAtTerminals = ikmax; // safety fallback
    if (icu >= ikAtTerminals) {
      results.push({ rule: 'Icu >= Ikmax', clause: 'DS/HD 60364-4-43 cl. 434.5.1', status: 'ok', detail: (icu / 1000).toFixed(1) + 'kA >= ' + (ikAtTerminals / 1000).toFixed(1) + 'kA (at device terminals)' });
    } else {
      results.push({ rule: 'Icu >= Ikmax', clause: 'DS/HD 60364-4-43 cl. 434.5.1', status: 'fail', detail: 'Icu=' + (icu / 1000).toFixed(1) + 'kA < Ikmax=' + (ikAtTerminals / 1000).toFixed(1) + 'kA (at device terminals)' });
    }
  }

  if (protIn > 0 && zs > 0) {
    let ia, timeReq, clauseRef;
    if (node.type === 'final_circuit' && protIn <= 32) {
      const curve = (node.protection && node.protection.curve) || 'B';
      const mult = curve === 'B' ? 5 : (curve === 'C' ? 10 : 20);
      ia = mult * protIn;
      timeReq = '0.4s';
      clauseRef = 'DS/HD 60364-4-41 Table 41.1';
    } else {
      ia = 5 * protIn;
      timeReq = '5s';
      clauseRef = 'DS/HD 60364-4-41 cl. 411.3.2.3';
    }
    const u0 = 230;
    const zsIa = zs * ia;
    if (zsIa <= u0) {
      results.push({ rule: 'Zs*Ia <= U0 (' + timeReq + ')', clause: clauseRef, status: 'ok', detail: 'Zs*Ia=' + zsIa.toFixed(0) + 'V <= U0=' + u0 + 'V' });
    } else {
      results.push({ rule: 'Zs*Ia <= U0 (' + timeReq + ')', clause: clauseRef, status: 'fail', detail: 'Zs*Ia=' + zsIa.toFixed(0) + 'V > U0=' + u0 + 'V' });
    }
  }

  if (vdrop > 0) {
    const limit = DK_STANDARDS.vdropGeneral;
    if (vdrop <= limit) {
      results.push({ rule: 'Vdrop <= ' + limit + '%', clause: 'DS/HD 60364-5-52 cl. 525', status: 'ok', detail: vdrop.toFixed(2) + '% <= ' + limit + '%' });
    } else if (vdrop <= 5) {
      results.push({ rule: 'Vdrop <= ' + limit + '%', clause: 'DS/HD 60364-5-52 cl. 525', status: 'warning', detail: vdrop.toFixed(2) + '% > ' + limit + '% (marginal)' });
    } else {
      results.push({ rule: 'Vdrop <= ' + limit + '%', clause: 'DS/HD 60364-5-52 cl. 525', status: 'fail', detail: vdrop.toFixed(2) + '% > ' + limit + '%' });
    }
  }

  // Selectivity compliance check (DS/HD 60364-5-53 cl.536)
  if (node.parentId && node.protection) {
    var parentN = tree.nodes[node.parentId];
    if (parentN && parentN.protection && parentN.type !== 'transformer') {
      var selResult = sldAnalyzeSelectivity(tree, nodeId);
      if (selResult) {
        if (selResult.verdict === 'full') {
          results.push({ rule: tx('Selektivitet', 'Selectivity'), clause: selResult.clause, status: 'ok', detail: selResult.details });
        } else if (selResult.verdict === 'partial') {
          results.push({ rule: tx('Selektivitet', 'Selectivity'), clause: selResult.clause, status: 'warning', detail: selResult.details });
        } else {
          results.push({ rule: tx('Selektivitet', 'Selectivity'), clause: selResult.clause, status: 'fail', detail: selResult.details });
        }
      }
    }
  }

  return results;
}

function sldGetOverallStatus(tree, nodeId) {
  const results = sldVerifyNode(tree, nodeId);
  if (results.some(function(r){ return r.status === 'fail'; })) return 'fail';
  if (results.some(function(r){ return r.status === 'warning'; })) return 'warning';
  return 'ok';
}

// --- SLD Node Operations ---
function sldAddNode(parentId, type) {
  if (!sldTree) return;
  const parent = sldTree.nodes[parentId];
  if (!parent) return;
  const node = sldCreateNode(type, parentId);
  sldTree.nodes[node.id] = node;
  parent.childIds.push(node.id);
  sldPropagateAll(sldTree);
  sldSelectedId = node.id;
  sldSave();
  renderModule('sld');
}

function sldRemoveNode(nodeId) {
  if (!sldTree || nodeId === sldTree.rootId) return;
  const node = sldTree.nodes[nodeId];
  if (!node) return;
  if (node.type === 'main_board') {
    const root = sldTree.nodes[sldTree.rootId];
    if (root && root.childIds.length <= 1) return;
  }
  function removeRecursive(nid) {
    const n = sldTree.nodes[nid];
    if (!n) return;
    n.childIds.forEach(function(cid){ removeRecursive(cid); });
    delete sldTree.nodes[nid];
  }
  removeRecursive(nodeId);
  const parent = sldTree.nodes[node.parentId];
  if (parent) {
    parent.childIds = parent.childIds.filter(function(id){ return id !== nodeId; });
  }
  if (sldSelectedId === nodeId) sldSelectedId = node.parentId;
  sldPropagateAll(sldTree);
  sldSave();
  renderModule('sld');
}

function sldSelectNode(nodeId) {
  sldSelectedId = nodeId;
  renderModule('sld');
}

function sldSetNodeProp(nodeId, prop, value) {
  if (!sldTree) return;
  const node = sldTree.nodes[nodeId];
  if (!node) return;
  node[prop] = value;
  sldPropagateAll(sldTree);
  sldSave();
  renderModule('sld');
}

function sldSetNodeCable(nodeId, cableId) {
  if (!sldTree) return;
  const node = sldTree.nodes[nodeId];
  if (!node) return;
  const cable = PRODUCTS.cables.find(function(c){ return c.id === cableId; });
  if (cable) {
    node.cable = cable;
    sldPropagateAll(sldTree);
    sldSave();
    renderModule('sld');
  }
}

function sldSetNodeProtection(nodeId, protId) {
  if (!sldTree) return;
  const node = sldTree.nodes[nodeId];
  if (!node) return;
  const prot = PRODUCTS.mcbs.find(function(m){ return m.id === protId; }) || PRODUCTS.mccbs.find(function(m){ return m.id === protId; });
  if (prot) {
    node.protection = prot;
    node.protectionIn = prot.rating || (prot.inOptions ? Math.min.apply(null, prot.inOptions.filter(function(i){ return i >= (node._ib || 0); })) : 0);
    if (prot.rating) node.protectionIn = prot.rating;
    sldPropagateAll(sldTree);
    sldSave();
    renderModule('sld');
  }
}

function sldStepLength(nodeId, delta) {
  if (!sldTree) return;
  const node = sldTree.nodes[nodeId];
  if (!node) return;
  let newLen = (node.length_m || 0) + delta;
  if (newLen < 5) newLen = 5;
  if (newLen > 200) newLen = 200;
  node.length_m = newLen;
  sldPropagateAll(sldTree);
  sldSave();
  renderModule('sld');
}

function sldSetInstallMethod(nodeId, method) {
  sldSetNodeProp(nodeId, 'installMethod', method);
}

function sldSetTrafoSize(kva) {
  if (!sldTree) return;
  const root = sldTree.nodes[sldTree.rootId];
  if (!root) return;
  root.power_kVA = kva;
  root.uk_pct = TRAFO_UK[kva] || 4;
  sldPropagateAll(sldTree);
  sldSave();
  renderModule('sld');
}

// --- Persistence ---
function sldSave() {
  if (!sldTree) return;
  try {
    const data = { nextId: sldNextId, tree: { rootId: sldTree.rootId, nodes: {} } };
    Object.keys(sldTree.nodes).forEach(function(id) {
      const n = sldTree.nodes[id];
      const saved = Object.assign({}, n);
      if (saved.cable && saved.cable.id) saved._cableId = saved.cable.id;
      if (saved.protection && saved.protection.id) saved._protectionId = saved.protection.id;
      delete saved.cable;
      delete saved.protection;
      delete saved._ib; delete saved._zs; delete saved._vdrop; delete saved._ikmax; delete saved._ikmin;
      data.tree.nodes[id] = saved;
    });
    localStorage.setItem('sld_installation', JSON.stringify(data));
  } catch (e) { /* localStorage may be unavailable */ }
}

function sldLoad() {
  try {
    const raw = localStorage.getItem('sld_installation');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data || !data.tree || !data.tree.rootId) return null;
    sldNextId = data.nextId || 1;
    const tree = { rootId: data.tree.rootId, nodes: {} };
    Object.keys(data.tree.nodes).forEach(function(id) {
      const n = data.tree.nodes[id];
      if (n._cableId) {
        n.cable = PRODUCTS.cables.find(function(c){ return c.id === n._cableId; }) || null;
        delete n._cableId;
      }
      if (n._protectionId) {
        n.protection = PRODUCTS.mcbs.find(function(m){ return m.id === n._protectionId; }) || PRODUCTS.mccbs.find(function(m){ return m.id === n._protectionId; }) || null;
        delete n._protectionId;
      }
      tree.nodes[id] = n;
    });
    return tree;
  } catch (e) { return null; }
}

function sldToJSON(tree) {
  if (!tree) return null;
  const data = { rootId: tree.rootId, nextId: sldNextId, nodes: {} };
  Object.keys(tree.nodes).forEach(function(id) {
    const n = tree.nodes[id];
    const saved = Object.assign({}, n);
    if (saved.cable && saved.cable.id) saved._cableId = saved.cable.id;
    if (saved.protection && saved.protection.id) saved._protectionId = saved.protection.id;
    delete saved.cable; delete saved.protection;
    delete saved._ib; delete saved._zs; delete saved._vdrop; delete saved._ikmax; delete saved._ikmin;
    data.nodes[id] = saved;
  });
  return data;
}

function sldFromJSON(data) {
  if (!data || !data.rootId) return null;
  if (data.nextId) sldNextId = data.nextId;
  const tree = { rootId: data.rootId, nodes: {} };
  Object.keys(data.nodes).forEach(function(id) {
    const n = data.nodes[id];
    if (n._cableId) {
      n.cable = PRODUCTS.cables.find(function(c){ return c.id === n._cableId; }) || null;
      delete n._cableId;
    }
    if (n._protectionId) {
      n.protection = PRODUCTS.mcbs.find(function(m){ return m.id === n._protectionId; }) || PRODUCTS.mccbs.find(function(m){ return m.id === n._protectionId; }) || null;
      delete n._protectionId;
    }
    tree.nodes[id] = n;
  });
  sldPropagateAll(tree);
  return tree;
}

function sldInit() {
  sldTree = sldLoad();
  if (!sldTree) {
    sldTree = sldCreateTree();
    sldPropagateAll(sldTree);
    sldSave();
  } else {
    sldPropagateAll(sldTree);
  }
  if (!sldSelectedId && sldTree.rootId) {
    const root = sldTree.nodes[sldTree.rootId];
    sldSelectedId = (root && root.childIds.length > 0) ? root.childIds[0] : sldTree.rootId;
  }
}


// ===== RENDERING =====
function renderNav() {
  const nav = document.getElementById('mainNav');
  const mods = t('modules');
  nav.innerHTML = Object.keys(mods).map(key =>
    `<button class="nav-btn ${key === activeModule ? 'active' : ''}" onclick="switchModule('${key}')">${mods[key]}</button>`
  ).join('');
}

function switchModule(mod) {
  activeModule = mod;
  renderNav();
  renderStatusBar();
  renderModule(mod);
}

function renderStatusBar() {
  const bar = document.getElementById('statusBar');
  const chips = [];

  // IB from load module
  const ib = calcIB();
  if (loadState.power > 0) {
    chips.push({ label: 'IB', value: `${ib.toFixed(1)} A`, mod: 'load' });
    chips.push({ label: loadState.voltage === '3x400' ? '3~' : '1~', value: `${loadState.voltage}V`, mod: 'load' });
  }

  // Protection device
  if (mcbState.rating) {
    chips.push({ label: 'MCB', value: `${mcbState.type} ${mcbState.curve}${mcbState.rating}`, mod: 'mcb' });
  } else if (mccbState.inVal) {
    chips.push({ label: 'MCCB', value: `${mccbState.frame} ${mccbState.inVal}A`, mod: 'mccb' });
  }

  // Fuse
  if (fuseState.size) {
    chips.push({ label: tx('Sikring', 'Fuse'), value: `${fuseState.holder} ${fuseState.size}A`, mod: 'fuse' });
  }

  // Cable
  if (cableState.crossSection) {
    chips.push({ label: tx('Kabel', 'Cable'), value: `${cableState.crossSection} mm²`, mod: 'cable' });
  }

  // Length
  if (vdropState.length && cableState.crossSection) {
    chips.push({ label: 'L', value: `${vdropState.length} m`, mod: 'vdrop' });
  }

  bar.innerHTML = chips.map(c =>
    `<span class="status-chip has-value" onclick="switchModule('${c.mod}')"><span class="chip-label">${c.label}:</span><span class="chip-value">${c.value}</span></span>`
  ).join('');
}

function renderModule(mod) {
  syncAxes(); // Dynamic coordination
  const main = document.getElementById('mainContent');
  let content = '';
  switch(mod) {
    case 'load': content = renderLoad(); break;
    case 'fuse': content = renderFuse(); break;
    case 'mcb': content = renderMCB(); break;
    case 'mccb': content = renderMCCB(); break;
    case 'cable': content = renderCable(); break;
    case 'vdrop': content = renderVdrop(); break;
    case 'scircuit': content = renderShortCircuit(); break;
    case 'trafo': content = renderTrafo(); break;
    case 'standards': content = renderStandards(); break;
    case 'bank': content = renderBank(); break;
    case 'ai': content = renderAiElectrician(); break;
    case 'bid': content = renderBid(); break;
    case 'projekt': content = renderProjekt(); break;
    case 'verify': content = renderVerify(); break;
    case 'draw': content = renderDrawing(); break;
    case 'sld': content = renderSLD(); break;
    case 'exam': content = renderExam(); break;
  }
  // Append AI assistant to every module
  if (mod !== 'exam') content += renderAiAssistant(mod);
  // Append QI validation summary if enough data exists
  const qi = runQiValidation();
  const noQi = ['standards','bank','ai','bid','projekt','verify','draw','exam'];
  if (qi.passed.length + qi.issues.length > 0 && noQi.indexOf(mod) < 0) {
    content += renderQiCard(qi);
  }
  main.innerHTML = content;
  renderStatusBar();
}

function renderQiCard(qi) {
  const scoreColor = qi.score >= 80 ? 'var(--success)' : qi.score >= 50 ? '#b8860b' : 'var(--danger)';
  let html = '<div class="card fade-in" style="border-left:4px solid ' + scoreColor + ';">';
  html += '<div class="card-title">\uD83D\uDCCA ' + (tx('QI Kvalitetsindeks', 'QI Quality Index')) + ' \u2014 ' + qi.score + '%</div>';

  if (qi.issues.length > 0) {
    html += '<div class="result-box ' + (qi.issues.some(i => i.severity === 'error') ? 'error' : 'warning') + '" style="margin-top:0">';
    html += '<div class="result-title">' + (tx('Problemer fundet', 'Issues found')) + '</div>';
    qi.issues.forEach(i => {
      const icon = i.severity === 'error' ? '\u274C' : '\u26A0\uFE0F';
      html += '<div class="result-row"><span class="label">' + icon + ' ' + i.rule + '</span><span class="value">' + i.detail + '</span></div>';
    });
    html += '</div>';
  }

  if (qi.passed.length > 0) {
    html += '<div class="result-box" style="margin-top:8px">';
    html += '<div class="result-title">' + (tx('Bestået', 'Passed')) + '</div>';
    qi.passed.forEach(p => {
      html += '<div class="result-row"><span class="label">\u2705 ' + p.rule + '</span><span class="value">' + p.detail + '</span></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function calcIB() {
  const P = loadState.power * 1000; // W
  const cosP = loadState.cosPhi;
  const sf = loadState.simFactor;
  const ef = loadState.expFactor;
  let ib;
  if (loadState.voltage === '3x400') {
    ib = P / (Math.sqrt(3) * 400 * cosP);
  } else {
    ib = P / (230 * cosP);
  }
  return ib * sf * ef;
}

function calcS() {
  return loadState.power / loadState.cosPhi;
}

function renderVdrop() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const currentType = cables[cableState.type];
  const currentCores = currentType && currentType[cableState.cores] ? currentType[cableState.cores] : {};
  const selectedCable = currentCores[cableState.crossSection];

  const lengthSteps = [5, 10, 15, 20, 25, 30, 40, 50, 60, 70, 80, 90, 100, 125, 150, 175, 200, 250, 300, 400, 500];

  let vdrop = 0, vdropPercent = 0, Un = 400;
  if (selectedCable) {
    const ib = calcIB();
    const L = vdropState.length / 1000; // km
    const cosP = loadState.cosPhi;
    const sinP = Math.sin(Math.acos(cosP));
    Un = loadState.voltage === '3x400' ? 400 : 230;

    if (loadState.voltage === '3x400') {
      vdrop = Math.sqrt(3) * ib * L * (selectedCable.r * cosP + selectedCable.x * sinP);
    } else {
      vdrop = 2 * ib * L * (selectedCable.r * cosP + selectedCable.x * sinP);
    }
    vdropPercent = (vdrop / Un) * 100;
  }

  const isOk = vdropPercent <= 4;
  const isLighting = vdropPercent <= 3;
  const boxClass = !selectedCable ? '' : (isOk ? '' : 'error');

  return `
    <div class="card fade-in">
      <div class="card-title">${t('vdropTitle')}</div>

// ===== SHORT CIRCUIT MODULE =====
function renderShortCircuit() {
  const zNetSteps = [0.5, 1, 1.5, 2, 3, 4, 5, 7, 10, 15, 20];
  const zTrafoSteps = [2, 3, 4, 5, 6, 7, 8, 10, 12, 15, 20, 25, 30, 40, 50];

  // Cable impedance
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const currentType = cables[cableState.type];
  const currentCores = currentType && currentType[cableState.cores] ? currentType[cableState.cores] : {};
  const selectedCable = currentCores[cableState.crossSection];

  let zCable = 0;
  if (selectedCable) {
    const L = vdropState.length / 1000; // km
    const rCable = selectedCable.r * L;
    const xCable = selectedCable.x * L;
    zCable = Math.sqrt(rCable * rCable + xCable * xCable) * 1000; // mOhm
  }

  const zTotal = scState.zNet + scState.zTrafo + zCable;
  const Un = loadState.voltage === '3x400' ? 400 : 230;
  const cFactor = 1.05; // voltage factor per IEC 60909

  // Ik max (3-phase, at busbar)
  const ikMax3ph = (cFactor * Un) / (Math.sqrt(3) * (scState.zNet + scState.zTrafo) / 1000);
  // Ik min (2-phase at end of cable, factor 0.95)
  const ikMin2ph = (0.95 * Un) / (2 * zTotal / 1000);

  // Get protection device Icu and Isd for check
  let deviceIcu = 0, deviceIsd = 0;
  if (activeModule === 'scircuit') {
    // Try MCCB first
    deviceIcu = MCCB_TRIPS[mccbState.trip] * 1000; // A
    const io = mccbState.inVal * mccbState.ioMult;
    deviceIsd = io * mccbState.isdMult * 1.1;

    // Or MCB
    if (mcbState.rating) {
      const mcb = MCB_TYPES[mcbState.type];
      const mcbIcu = (mcbState.poles === '1p' ? mcb.icu1p : mcb.icuMp) * 1000;
      if (mcbIcu > 0) {
        deviceIcu = mcbIcu;
        deviceIsd = MCB_CURVES[mcbState.curve].isdMax * mcbState.rating;
      }
    }
  }

  const check1 = deviceIcu >= ikMax3ph;
  const check2 = deviceIsd <= ikMin2ph;
  // Disconnection time per DS/HD 60364-4-41: final circuits <=32A must clear
  // within 0.4s (TN), distribution within 5s. Met if Ik min trips the magnetic element.
  const ibForTime = calcIB();
  const reqTime = (ibForTime <= 32 && loadState.voltage !== '3x400') ? 0.4 : (ibForTime <= 32 ? 0.4 : 5);
  const discOk = ikMin2ph >= deviceIsd; // Ik min reaches the instantaneous/magnetic trip

  return `
    <div class="card fade-in">
      <div class="card-title">${t('scTitle')}</div>
      <div class="info-row">${tx('V\u00E6lg netimpedans og trafoimpedans. Kabelimpedans beregnes fra kabelmodulet.', 'Select network impedance and transformer impedance. Cable impedance is calculated from the cable module.')}</div>

      <div class="select-group">
        <div class="select-label">${t('scZnet')}</div>
        <div class="select-grid">
          ${zNetSteps.map(z =>
            `<button class="sel-btn ${scState.zNet === z ? 'selected' : ''}" onclick="scState.zNet=${z};renderModule('scircuit')">${z}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${t('scZtrafo')}</div>
        <div class="select-grid">
          ${zTrafoSteps.map(z =>
            `<button class="sel-btn ${scState.zTrafo === z ? 'selected' : ''}" onclick="scState.zTrafo=${z};renderModule('scircuit')">${z}</button>`
          ).join('')}
        </div>
      </div>

      ${selectedCable ? `
        <div class="result-box" style="margin-top:12px;background:var(--primary-glow);border-color:var(--primary-light)">
          <div class="result-row"><span class="label">${tx('Kabelimpedans', 'Cable impedance')}</span><span class="value">${zCable.toFixed(2)} m\u03A9</span></div>
          <div class="result-row"><span class="label">${tx('Kabel', 'Cable')}</span><span class="value">${cableState.type} ${cableState.crossSection} mm\u00B2 \u00D7 ${vdropState.length} m</span></div>
        </div>
      ` : `
        <div class="result-box warning" style="margin-top:12px">
          <div class="result-row"><span class="label">${tx('V\u00E6lg kabel i "Kabler"-modulet for fuld beregning', 'Select cable in "Cables" module for full calculation')}</span></div>
        </div>
      `}
    </div>

    <div class="card fade-in">
      <div class="card-title">${t('scResult')}</div>
      <div class="result-box">
        <div class="result-title">${t('result')}</div>
        <div class="result-row"><span class="label">${t('scIkmax')} (3-${tx('faset', 'phase')})</span><span class="value">${(ikMax3ph/1000).toFixed(2)} kA</span></div>
        <div class="result-row"><span class="label">${t('scIkmin')} (2-${tx('faset', 'phase')})</span><span class="value">${ikMin2ph.toFixed(0)} A</span></div>
        <div class="result-row"><span class="label">Z total</span><span class="value">${zTotal.toFixed(2)} m\u03A9</span></div>
      </div>

      ${deviceIcu > 0 ? `
      <div class="result-box ${check1 && check2 ? '' : 'error'}" style="margin-top:12px">
        <div class="result-title">${tx('Kontrol', 'Verification')}</div>
        <div class="result-row">
          <span class="label">${t('scCheck1')}</span>
          <span class="value">
            ${(deviceIcu/1000).toFixed(1)} kA \u2265 ${(ikMax3ph/1000).toFixed(2)} kA
            <span class="verify-badge ${check1 ? 'ok' : 'fail'}">${check1 ? t('ok') : t('fail')}</span>
          </span>
        </div>
        <div class="result-row">
          <span class="label">${t('scCheck2')}</span>
          <span class="value">
            ${deviceIsd.toFixed(0)} A \u2264 ${ikMin2ph.toFixed(0)} A
            <span class="verify-badge ${check2 ? 'ok' : 'fail'}">${check2 ? t('ok') : t('fail')}</span>
          </span>
        </div>
        <div class="result-row">
          <span class="label">${tx('Frakoblingstid', 'Disconnection time')} (DS/HD 60364-4-41)</span>
          <span class="value">
            \u2264 ${reqTime.toFixed(1)} s
            <span class="verify-badge ${discOk ? 'ok' : 'fail'}">${discOk ? (tx('OK <0,4s', 'OK <0.4s')) : (tx('For langsom', 'Too slow'))}</span>
          </span>
        </div>
      </div>
      ` : `
      <div class="result-box warning" style="margin-top:12px">
        <div class="result-row"><span class="label">${tx('V\u00E6lg beskyttelsesenhed (MCB/MCCB) for kontrolberegning', 'Select protection device (MCB/MCCB) for verification')}</span></div>
      </div>
      `}
    </div>
  `;
}

// ===== TRANSFORMER MODULE =====
// Data from 1.-Dim-af-trafo.ppx.pptx
let trafoState = { size: 400, voltage: '10/0.4', loadPercent: 75 };

function renderTrafo() {
  const S = trafoState.size;
  const uk = TRAFO_UK[S] || 4;
  const losses = TRAFO_LOSSES[S] || { p0: 0, pk: 0 };
  const loadFactor = trafoState.loadPercent / 100;

  // Full load current (secondary)
  const Ifl = (S * 1000) / (Math.sqrt(3) * 400);
  // Actual load current
  const Iload = Ifl * loadFactor;
  // Transformer impedance in mOhm (secondary side)
  const Ztrafo = (uk / 100) * (400 * 400) / (S * 1000) * 1000; // mOhm
  // Short-circuit current at secondary busbar
  const Ik = (S * 1000) / (Math.sqrt(3) * 400 * (uk / 100));
  // Total losses at given load
  const Ploss = losses.p0 + losses.pk * loadFactor * loadFactor;

  const voltageOptions = ['10/0.4', '20/0.4', '50/10', '30/10'];
  const loadSteps = [25, 50, 60, 70, 75, 80, 85, 90, 95, 100];

  return `
    <div class="card fade-in">
      <div class="card-title">${tx('Transformerdimensionering', 'Transformer Dimensioning')}</div>
      <div class="info-row">${tx('Vælg trafostørrelse og belastningsgrad. Baseret på Fællesregulativet 2019.', 'Select transformer size and load level. Based on Fællesregulativet 2019.')}</div>

      <div class="select-group">
        <div class="select-label">${tx('Trafostørrelse [kVA]', 'Transformer Size [kVA]')}</div>
        <div class="select-grid">
          ${TRAFO_SIZES.map(s =>
            `<button class="sel-btn ${trafoState.size === s ? 'selected' : ''}" onclick="trafoState.size=${s};renderModule('trafo')">${s}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${tx('Omsætningsforhold [kV]', 'Voltage Ratio [kV]')}</div>
        <div class="select-grid">
          ${voltageOptions.map(v =>
            `<button class="sel-btn ${trafoState.voltage === v ? 'selected' : ''}" onclick="trafoState.voltage='${v}';renderModule('trafo')">${v}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${tx('Belastningsgrad [%]', 'Load Level [%]')}</div>
        <div class="select-grid">
          ${loadSteps.map(l =>
            `<button class="sel-btn ${trafoState.loadPercent === l ? 'selected' : ''}" onclick="trafoState.loadPercent=${l};renderModule('trafo')">${l}%</button>`
          ).join('')}
        </div>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-title">${tx('Trafodata', 'Transformer Data')}</div>
      <div class="result-box">
        <div class="result-title">${tx('Resultat', 'Result')}</div>
        <div class="result-row"><span class="label">${tx('Størrelse', 'Size')}</span><span class="value">${S} kVA</span></div>
        <div class="result-row"><span class="label">${tx('Omsætning', 'Ratio')}</span><span class="value">${trafoState.voltage} kV</span></div>
        <div class="result-row"><span class="label">uk%</span><span class="value">${uk} %</span></div>
        <div class="result-row"><span class="label">${tx('Fuldlaststrøm (sek.)', 'Full-load current (sec.)')}</span><span class="value">${Ifl.toFixed(1)} A</span></div>
        <div class="result-row"><span class="label">${tx('Aktuel belastning', 'Actual load')}</span><span class="value">${Iload.toFixed(1)} A (${trafoState.loadPercent}%)</span></div>
        <div class="result-row"><span class="label">Z trafo</span><span class="value">${Ztrafo.toFixed(2)} mΩ</span></div>
        <div class="result-row"><span class="label">${tx('Ik (sekundær skinne)', 'Ik (secondary busbar)')}</span><span class="value">${(Ik/1000).toFixed(2)} kA</span></div>
        <div class="result-row"><span class="label">${tx('Tab (tomgang)', 'Losses (no-load)')}</span><span class="value">${losses.p0} W</span></div>
        <div class="result-row"><span class="label">${tx('Tab (belastning)', 'Losses (load)')}</span><span class="value">${(losses.pk * loadFactor * loadFactor).toFixed(0)} W</span></div>
        <div class="result-row"><span class="label">${tx('Totale tab', 'Total losses')}</span><span class="value">${Ploss.toFixed(0)} W</span></div>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-title">${tx('Strømtransformer til måling', 'Current Transformer for Metering')}</div>
      <div class="result-box" style="background:var(--primary-glow);border-color:var(--primary-light)">
        <div class="result-title">${tx('Anbefaling', 'Recommendation')}</div>
        <div class="result-row"><span class="label">${tx('CT primær', 'CT primary')}</span><span class="value">${Math.ceil(Ifl / 50) * 50} / 5 A</span></div>
        <div class="result-row"><span class="label">${tx('CT klasse', 'CT class')}</span><span class="value">0.5 (${tx('måling', 'metering')})</span></div>
        <div class="result-row"><span class="label">${tx('Sikringselement', 'Fuse element')}</span><span class="value">${tx('NH sikring', 'NH fuse')} ${Math.ceil(Ifl / 50) * 50 > 250 ? 'NH 2' : 'NH 1'}</span></div>
      </div>
    </div>
  `;
}
