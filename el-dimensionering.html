    a_en: 'The protective device breaking capacity (Icu) must exceed the maximum short-circuit current (Ik max) at the installation point: Icu \u2265 Ik max. Also, Ik min (minimum short-circuit at cable end) must be large enough to trip the protection quickly. Use the "Short Circuit" module.' },
  // --- RCD / HPFI ---
  { topic: 'rcd', tags: ['hpfi','rcd','fejlstrøm','beskyttelse'],
    q_da: 'Hvornår er HPFI (30 mA) lovpligtigt i Danmark?',
    q_en: 'When is RCD (30 mA) mandatory in Denmark?',
    a_da: 'HPFI Type A 30 mA er lovpligtigt på alle nye installationer i boliger, alle stikkontaktkredse, badeværelser (zone 0/1/2) og udendørs stikkontakter (Installationsbekendtgørelsen). For EV-ladere kræves Type B eller Type A + 6 mA DC-detektion.',
    a_en: 'RCD Type A 30 mA is mandatory on all new residential installations, all socket circuits, bathrooms (zones 0/1/2) and outdoor sockets (Installation Regulations). For EV chargers, Type B or Type A + 6 mA DC detection is required.' },
  { topic: 'rcd', tags: ['hpfi','rcd','type','ev','lader'],
    q_da: 'Hvilken RCD-type skal jeg bruge til en EV-lader?',
    q_en: 'Which RCD type should I use for an EV charger?',
    a_da: 'EV-ladere kan generere glatte DC-fejlstrømme der "blinder" en almindelig Type A. Brug derfor Type B RCD, ELLER Type A kombineret med 6 mA DC-fejlstrømsdetektion (indbygget i mange ladestandere). Se "Komponentbank" → HPFI/RCD → Type B.',
    a_en: 'EV chargers can generate smooth DC fault currents that "blind" a standard Type A. Therefore use a Type B RCD, OR Type A combined with 6 mA DC fault detection (built into many charging stations). See "Component Bank" → RCD → Type B.' },
  // --- Transformer ---
  { topic: 'trafo', tags: ['trafo','transformer','dimensionering','belastning'],
    q_da: 'Hvor stor en transformer skal jeg vælge?',
    q_en: 'How large a transformer should I choose?',
    a_da: 'Vælg en trafo hvor den summerede tilsyneladende effekt (S i kVA) ligger ved 75-80% belastningsgrad — det er optimalt for levetid og effektivitet. Husk fremtidige udvidelser. Brug "Trafo"-modulet til at se fuldlaststrøm, kortslutningsstrøm og tab.',
    a_en: 'Choose a transformer where the summed apparent power (S in kVA) sits at 75-80% load level — optimal for lifetime and efficiency. Account for future expansion. Use the "Transformer" module to see full-load current, short-circuit current and losses.' },
  // --- Motor ---
  { topic: 'motor', tags: ['motor','motorværn','kontaktor','termorelæ','startstrøm'],
    q_da: 'Hvordan beskytter jeg en motor korrekt?',
    q_en: 'How do I correctly protect a motor?',
    a_da: 'En motorafgang har typisk: 1) Motorværn (MPCB, fx TeSys GV2) eller sikring til kortslutning, 2) Kontaktor (fx LC1D) til til/fra, 3) Termorelæ (fx LRD) til overbelastning indstillet til motorens mærkestrøm. Vælg kurve C eller D pga. startstrøm. Appen anbefaler alle tre i "Belastning"-modulet.',
    a_en: 'A motor feeder typically has: 1) Motor protection (MPCB, e.g. TeSys GV2) or fuse for short-circuit, 2) Contactor (e.g. LC1D) for on/off, 3) Overload relay (e.g. LRD) set to the motor rated current. Choose curve C or D due to inrush. The app recommends all three in the "Load" module.' },
  // --- Earthing ---
  { topic: 'earth', tags: ['jording','tn','tt','it','pe'],
    q_da: 'Hvilket jordingssystem bruges i Danmark?',
    q_en: 'Which earthing system is used in Denmark?',
    a_da: 'TN-C-S er det mest almindelige i Danmark: fælles PEN-leder i forsyningen, der splittes til separat N og PE ved installationens indgang. Nye installationer bruger TN-S (separat N og PE hele vejen). Se "Standarder" → Jordingssystemer for detaljer.',
    a_en: 'TN-C-S is the most common in Denmark: combined PEN conductor in the supply, split into separate N and PE at the installation entry. New installations use TN-S (separate N and PE throughout). See "Standards" → Earthing Systems for details.' },
  // --- Surge ---
  { topic: 'surge', tags: ['overspænding','spd','lyn','beskyttelse'],
    q_da: 'Har jeg brug for overspændingsbeskyttelse (SPD)?',
    q_en: 'Do I need surge protection (SPD)?',
    a_da: 'SPD anbefales kraftigt for at beskytte elektronik mod lyn og koblingsoverspændinger. Type 2 i hovedtavlen er standard. Hvis bygningen har lynafleder eller udsat placering, brug Type 1+2. Se "Komponentbank" → Overspændingsbeskyttelse.',
    a_en: 'SPD is strongly recommended to protect electronics from lightning and switching surges. Type 2 in the main panel is standard. If the building has a lightning rod or exposed location, use Type 1+2. See "Component Bank" → Surge Protection.' },
  // --- Power factor ---
  { topic: 'pf', tags: ['cosfi','effektfaktor','fasekompensering'],
    q_da: 'Hvad gør jeg ved lav effektfaktor (cos\u03C6)?',
    q_en: 'What do I do about low power factor (cos\u03C6)?',
    a_da: 'Lav cos\u03C6 (under 0,85) øger strømmen og dermed tab og kabelstørrelse. Overvej fasekompensering (kondensatorbatterier) for at hæve cos\u03C6 mod 0,95. Det reducerer IB og kan tillade et mindre kabel og mindre beskyttelse.',
    a_en: 'Low cos\u03C6 (below 0.85) increases current and thus losses and cable size. Consider power factor correction (capacitor banks) to raise cos\u03C6 toward 0.95. This reduces IB and may allow a smaller cable and smaller protection.' },

  // --- Danish EL-law: Authorization ---
  { topic: 'law', tags: ['autorisation','lov','elinstallatør','tilladelse'],
    q_da: 'Hvem må udføre elinstallationer i Danmark?',
    q_en: 'Who may perform electrical installations in Denmark?',
    a_da: 'Kun autoriserede elinstallatørvirksomheder må udføre fast elinstallationsarbejde (Autorisationsloven / Lov om autorisation af elinstallatører m.v.). Privatpersoner må kun udføre simple arbejder som at montere lamper og udskifte stikkontakter/afbrydere i egen bolig. Alt andet kræver autorisation og registrering hos Sikkerhedsstyrelsen.',
    a_en: 'Only authorized electrical contractor companies may perform fixed electrical installation work (Authorization Act). Private individuals may only do simple tasks such as mounting lamps and replacing sockets/switches in their own home. Everything else requires authorization and registration with the Danish Safety Authority (Sikkerhedsstyrelsen).' },
  { topic: 'law', tags: ['elsikkerhedsloven','lov','ansvar','sikkerhed'],
    q_da: 'Hvad er Elsikkerhedsloven?',
    q_en: 'What is the Danish Electrical Safety Act?',
    a_da: 'Elsikkerhedsloven (Lov nr. 525 af 29/04/2015) fastlægger de grundlæggende sikkerhedskrav til elektriske anlæg, installationer og materiel i Danmark. Den administreres af Sikkerhedsstyrelsen og henviser til installationsbekendtgørelsen og standarderne DS/HD 60364-serien. Formålet er at forebygge fare for personer, husdyr og ejendom.',
    a_en: 'The Electrical Safety Act (Act no. 525 of 29/04/2015) sets the fundamental safety requirements for electrical systems, installations and equipment in Denmark. It is administered by the Danish Safety Authority and references the installation order and the DS/HD 60364 series of standards. Its purpose is to prevent danger to persons, livestock and property.' },
  { topic: 'law', tags: ['installationsbekendtgørelsen','bek','krav','regler'],
    q_da: 'Hvad regulerer Installationsbekendtgørelsen?',
    q_en: 'What does the Installation Order regulate?',
    a_da: 'Installationsbekendtgørelsen (BEK nr. 1082) stiller krav til udførelsen af elektriske installationer, herunder at de skal udføres efter DS/HD 60364-standarderne. Den dækker bl.a. beskyttelse mod elektrisk stød, overstrøm, dokumentation og afprøvning før idriftsættelse.',
    a_en: 'The Installation Order (BEK no. 1082) sets requirements for the execution of electrical installations, including that they must be carried out per the DS/HD 60364 standards. It covers protection against electric shock, overcurrent, documentation, and testing before commissioning.' },
  { topic: 'law', tags: ['dokumentation','afprøvning','idriftsættelse','måling'],
    q_da: 'Hvilken dokumentation kræves før en installation tages i brug?',
    q_en: 'What documentation is required before an installation is put into use?',
    a_da: 'Før idriftsættelse skal installationen afprøves og dokumenteres: kontinuitet af beskyttelsesledere, isolationsmodstand, fejlstrømsafbryderes (HPFI) funktion og udløsetid, og kontrol af effektiv jordforbindelse/sløjfeimpedans. Resultaterne dokumenteres i en afleveringsrapport iht. DS/HD 60364-6.',
    a_en: 'Before commissioning, the installation must be tested and documented: continuity of protective conductors, insulation resistance, RCD function and trip time, and verification of effective earthing/loop impedance. Results are documented in a handover report per DS/HD 60364-6.' },

  // --- Zones (bathroom) ---
  { topic: 'zones', tags: ['badeværelse','zone','vådrum','ip'],
    q_da: 'Hvilke regler gælder for el i badeværelser?',
    q_en: 'What rules apply to electrics in bathrooms?',
    a_da: 'Badeværelser er opdelt i zoner (0, 1, 2) iht. DS/HD 60364-7-701. Zone 0 (i karret/bruseren): kun SELV 12V. Zone 1 (over): IPX4, kun fast materiel egnet til formålet. Zone 2 (0,6 m omkring): IPX4. HPFI 30 mA er obligatorisk på alle kredse. Stikkontakter er ikke tilladt i zone 0-1.',
    a_en: 'Bathrooms are divided into zones (0, 1, 2) per DS/HD 60364-7-701. Zone 0 (inside tub/shower): only SELV 12V. Zone 1 (above): IPX4, only fixed equipment suitable for the purpose. Zone 2 (0.6 m around): IPX4. RCD 30 mA is mandatory on all circuits. Sockets are not permitted in zones 0-1.' },
  { topic: 'zones', tags: ['udendørs','ip','kapsling','vejr'],
    q_da: 'Hvilken IP-klasse skal udendørs materiel have?',
    q_en: 'What IP rating must outdoor equipment have?',
    a_da: 'Udendørs materiel skal minimum være IP44 (beskyttet mod stænkvand), og ofte IP65/IP67 ved direkte vejrpåvirkning eller nedgravning. Alle udendørs stikkontakter skal beskyttes af HPFI 30 mA. Vælg UV-bestandige materialer.',
    a_en: 'Outdoor equipment must be at least IP44 (splash-proof), and often IP65/IP67 for direct weather exposure or burial. All outdoor sockets must be protected by RCD 30 mA. Choose UV-resistant materials.' },

  // --- Disconnection time ---
  { topic: 'protection', tags: ['udløsetid','frakobling','stød','sløjfeimpedans'],
    q_da: 'Hvad er kravet til frakoblingstid ved fejl?',
    q_en: 'What is the required disconnection time on a fault?',
    a_da: 'Iht. DS/HD 60364-4-41: i TN-systemer skal en fejl frakobles inden 0,4 s for endegrupper op til 32 A (230V), og inden 5 s for fordelingskredse. Dette kræver at Ik min er stor nok til at udløse beskyttelsen — derfor kontrolleres sløjfeimpedansen. Brug "Kortslutning"-modulet.',
    a_en: 'Per DS/HD 60364-4-41: in TN systems a fault must be disconnected within 0.4 s for final circuits up to 32 A (230V), and within 5 s for distribution circuits. This requires Ik min to be large enough to trip the protection — hence the loop impedance is verified. Use the "Short Circuit" module.' },

  // --- Group/circuit sizing ---
  { topic: 'protection', tags: ['gruppe','stikkontakt','13a','16a','kreds'],
    q_da: 'Hvor mange stikkontakter må jeg sætte på én gruppe?',
    q_en: 'How many sockets may I put on one circuit?',
    a_da: 'Der er ikke et fast maksimum i de danske regler, men kredsen skal dimensioneres efter den forventede samtidige belastning, så IB \u2264 In \u2264 Iz overholdes. Typisk bruges 13A eller 16A grupper med HPFI til stikkontakter. Brug "Belastning"-modulet til at beregne IB med en realistisk samtidighedsfaktor.',
    a_en: 'There is no fixed maximum in the Danish rules, but the circuit must be sized for the expected simultaneous load so that IB \u2264 In \u2264 Iz is met. Typically 13A or 16A circuits with RCD are used for sockets. Use the "Load" module to calculate IB with a realistic simultaneity factor.' },

  // --- Selectivity ---
  { topic: 'protection', tags: ['selektivitet','koordination','serieforbindelse'],
    q_da: 'Hvad er selektivitet mellem sikringer?',
    q_en: 'What is selectivity between protective devices?',
    a_da: 'Selektivitet betyder at ved en fejl udløser kun den nærmeste beskyttelse opstrøms for fejlen — ikke hovedsikringen. Det opnås ved at vælge beskyttelser med tilstrækkelig forskel i mærkestrøm og udløsekarakteristik (typisk faktor 1,6:1 for sikringer). Det sikrer at resten af anlægget forbliver i drift.',
    a_en: 'Selectivity means that on a fault, only the nearest upstream protection trips — not the main fuse. It is achieved by choosing protective devices with sufficient difference in rating and trip characteristic (typically 1.6:1 ratio for fuses). This keeps the rest of the installation operating.' },

  // --- Cable color code ---
  { topic: 'cable', tags: ['farve','leder','l1','l2','l3','n','pe'],
    q_da: 'Hvad er farvekoderne for ledere i Danmark?',
    q_en: 'What are the conductor color codes in Denmark?',
    a_da: 'Iht. HD 60364-5-51: Beskyttelsesleder (PE) er grøn/gul. Neutralleder (N) er blå. Faseledere (L1, L2, L3) er typisk brun, sort og grå. Grøn/gul må ALDRIG bruges til andet end PE.',
    a_en: 'Per HD 60364-5-51: Protective conductor (PE) is green/yellow. Neutral (N) is blue. Phase conductors (L1, L2, L3) are typically brown, black and grey. Green/yellow must NEVER be used for anything other than PE.' },

  // --- Authorization (El-autorisation) ---
  { topic: 'auth', tags: ['autorisation','virksomhed','sikkerhedsstyrelsen','registrering'],
    q_da: 'Hvordan får en virksomhed elautorisation?',
    q_en: 'How does a company obtain electrical authorization?',
    a_da: 'En virksomhed søger autorisation hos Sikkerhedsstyrelsen. Kravene er: 1) en fagligt ansvarlig med svendebrev som elektriker + relevant erhvervserfaring eller en godkendt uddannelse, 2) et godkendt kvalitetsledelsessystem (KLS), og 3) virksomheden skal være registreret. Autorisationen giver ret til at udføre el-installationsarbejde (jf. Autorisationsloven).',
    a_en: 'A company applies for authorization at the Danish Safety Authority. Requirements: 1) a technically responsible person with an electrician journeyman certificate + relevant experience or approved education, 2) an approved quality management system (KLS), and 3) company registration. Authorization grants the right to perform electrical installation work (per the Authorization Act).' },
  { topic: 'auth', tags: ['kls','kvalitetsledelse','egenkontrol','dokumentation'],
    q_da: 'Hvad er et KLS (kvalitetsledelsessystem)?',
    q_en: 'What is a KLS (quality management system)?',
    a_da: 'KLS er det lovpligtige kvalitetsledelsessystem en autoriseret virksomhed skal have. Det dokumenterer at arbejdet udføres sikkert og korrekt: procedurer, egenkontrol af hver installation, måleprotokoller, håndtering af fejl og løbende audit. Sikkerhedsstyrelsen kontrollerer KLS stikprøvevis.',
    a_en: 'KLS is the mandatory quality management system an authorized company must maintain. It documents that work is done safely and correctly: procedures, self-inspection of each installation, measurement protocols, fault handling and regular audit. The Safety Authority audits KLS by sampling.' },
  { topic: 'auth', tags: ['autorisation','simple','arbejder','privat','undtagelse'],
    q_da: 'Hvilke el-arbejder må udføres uden autorisation?',
    q_en: 'Which electrical work may be done without authorization?',
    a_da: 'Visse simple arbejder er undtaget (jf. bekendtgørelse om simple arbejder): bl.a. opsætning/udskiftning af afbrydere og stikkontakter, montering af lampeudtag/lamper, og udskiftning af visse apparater i egen bolig — under forudsætning af korrekt udførelse. Alt fast installationsarbejde derudover kræver autoriseret virksomhed.',
    a_en: 'Certain simple tasks are exempt (per the order on simple works): e.g. fitting/replacing switches and sockets, mounting lamp outlets/luminaires, and replacing certain appliances in one\'s own home — provided it is done correctly. All other fixed installation work requires an authorized company.' },
  { topic: 'auth', tags: ['fagligt ansvarlig','kompetence','svendebrev'],
    q_da: 'Hvem kan være fagligt ansvarlig i en autoriseret virksomhed?',
    q_en: 'Who can be the technically responsible person in an authorized company?',
    a_da: 'Den fagligt ansvarlige skal have de nødvendige faglige kvalifikationer: typisk svendebrev som elektriker kombineret med erhvervserfaring, eller en relevant godkendt uddannelse (fx elinstallatør/stærkstrømsingeniør). Personen skal være ansat og have reel mulighed for at sikre fagligt korrekt arbejde.',
    a_en: 'The technically responsible person must hold the required qualifications: typically an electrician journeyman certificate combined with work experience, or a relevant approved education (e.g. electrical installer/power engineer). They must be employed and able to genuinely ensure technically correct work.' },

  // --- More installation / practical ---
  { topic: 'protection', tags: ['parallel','flere kabler','samme gruppe'],
    q_da: 'Må jeg lægge to kabler parallelt på samme beskyttelse?',
    q_en: 'May I run two cables in parallel on one protection?',
    a_da: 'Ja, parallelle ledere er tilladt (DS/HD 60364-5-52, 523.7), men de skal have samme længde, tværsnit, materiale og føringsvej, så strømmen fordeles ligeligt. Hver parallel leder regnes som en separat strømkreds ved gruppering. Brug helst dedikerede parallel-klemmer.',
    a_en: 'Yes, parallel conductors are allowed (DS/HD 60364-5-52, 523.7), but they must share the same length, cross-section, material and routing so current divides evenly. Each parallel conductor counts as a separate circuit for grouping. Use dedicated parallel terminals.' },
  { topic: 'earth', tags: ['udligning','pe','potentialudligning','vand','gas'],
    q_da: 'Hvad er potentialudligning, og hvad skal forbindes?',
    q_en: 'What is equipotential bonding, and what must be connected?',
    a_da: 'Hovedudligningsforbindelsen forbinder alle ledende dele til jordpotentiale: PE-skinne, vandinstallation (metal), gasrør, varme/ventilation, og evt. armering. Det udligner farlige potentialeforskelle. Tværsnit min. halvdelen af PE, dog mindst 6 mm² Cu (DS/HD 60364-4-41/5-54).',
    a_en: 'Main equipotential bonding connects all conductive parts to earth potential: PE busbar, (metal) water service, gas pipe, heating/ventilation, and reinforcement if relevant. It equalizes dangerous potential differences. Cross-section min. half the PE, but at least 6 mm² Cu (DS/HD 60364-4-41/5-54).' },
  { topic: 'protection', tags: ['samtidighed','samtidighedsfaktor','belastning'],
    q_da: 'Hvordan vælger jeg en realistisk samtidighedsfaktor?',
    q_en: 'How do I choose a realistic simultaneity factor?',
    a_da: 'Samtidighedsfaktoren (sf) afspejler at ikke alle belastninger kører samtidigt. Typisk: boliger 0,4-0,6 for stikkredse, 1,0 for fast tilsluttede store apparater (komfur, varmepumpe). For tavler med mange grupper bruges ofte 0,5-0,7. Vælg konservativt — for lav sf giver underdimensionering.',
    a_en: 'The simultaneity factor (sf) reflects that not all loads run at once. Typically: homes 0.4-0.6 for socket circuits, 1.0 for fixed large appliances (cooker, heat pump). For panels with many circuits 0.5-0.7 is common. Choose conservatively — too low an sf causes under-sizing.' },
  { topic: 'pf', tags: ['harmoniske','thd','nulleder','overharmoniske'],
    q_da: 'Hvornår skal nullederen dimensioneres større pga. harmoniske?',
    q_en: 'When must the neutral be upsized due to harmonics?',
    a_da: 'Ved tredje-harmoniske (fra LED, switch-mode, frekvensomformere) summeres strømmen i nullederen i stedet for at ophæves. Hvis indholdet af harmoniske er > 10%, må nullederen ikke være mindre end faselederne — og ved højt indhold kan den skulle være større (DS/HD 60364-5-52 Bilag C).',
    a_en: 'With third-harmonic currents (from LED, switch-mode, VFDs) the neutral current adds up instead of cancelling. If harmonic content exceeds 10%, the neutral must not be smaller than the phases — and at high content it may need to be larger (DS/HD 60364-5-52 Annex C).' },
  { topic: 'zones', tags: ['ip','kapsling','tal','støv','vand'],
    q_da: 'Hvad betyder IP-tallene (fx IP44, IP67)?',
    q_en: 'What do the IP numbers mean (e.g. IP44, IP67)?',
    a_da: 'IP = Ingress Protection. Første ciffer = beskyttelse mod faste genstande/støv (0-6), andet ciffer = mod vand (0-8). Fx IP44 = beskyttet mod genstande >1 mm og stænkvand; IP67 = støvtæt og kortvarig neddykning. Højere tal = bedre beskyttelse (IEC 60529).',
    a_en: 'IP = Ingress Protection. First digit = protection against solids/dust (0-6), second digit = against water (0-8). E.g. IP44 = protected against objects >1 mm and splashing water; IP67 = dust-tight and temporary immersion. Higher numbers = better protection (IEC 60529).' },
  { topic: 'trafo', tags: ['fasekompensering','kondensator','kvar','effektfaktor'],
    q_da: 'Hvordan beregner jeg fasekompensering (kVAr)?',
    q_en: 'How do I calculate power factor correction (kVAr)?',
    a_da: 'Den nødvendige kondensatoreffekt: Qc = P · (tan\u03C6\u2081 − tan\u03C6\u2082), hvor \u03C6\u2081 er den nuværende og \u03C6\u2082 den ønskede vinkel. Eksempel: 100 kW fra cos\u03C6 0,8 (tan 0,75) til 0,95 (tan 0,33) → Qc = 100·(0,75−0,33) = 42 kVAr. Se appens fasekompenserings-data.',
    a_en: 'Required capacitor power: Qc = P · (tan\u03C6\u2081 − tan\u03C6\u2082), where \u03C6\u2081 is present and \u03C6\u2082 the target angle. Example: 100 kW from cos\u03C6 0.8 (tan 0.75) to 0.95 (tan 0.33) → Qc = 100·(0.75−0.33) = 42 kVAr.' },
  { topic: 'motor', tags: ['startstrøm','direkte','stjerne-trekant','softstart'],
    q_da: 'Hvordan begrænser jeg en motors startstrøm?',
    q_en: 'How do I limit a motor\'s starting current?',
    a_da: 'Direkte start (DOL) giver 6-8× mærkestrøm. For at begrænse: stjerne-trekant (ca. 1/3 startstrøm), softstarter (gradvis optrapning) eller frekvensomformer (lavest startstrøm + styring). Vælg kurve C/D på beskyttelsen så den ikke udløser på startstrømmen.',
    a_en: 'Direct-on-line (DOL) gives 6-8× rated current. To limit: star-delta (~1/3 starting current), soft starter (gradual ramp) or VFD (lowest starting current + control). Choose curve C/D protection so it does not trip on inrush.' },
  { topic: 'law', tags: ['eftersyn','installationsrapport','huseftersyn','tilstand'],
    q_da: 'Hvad er en el-installationsrapport (huseftersyn)?',
    q_en: 'What is an electrical installation report (house inspection)?',
    a_da: 'El-installationsrapporten laves af en autoriseret elinstallatørvirksomhed ved hussalg (huseftersynsordningen). Den vurderer lovligheden og funktionen af den faste el-installation og kategoriserer fejl (fx ulovlige forhold, manglende HPFI). Den er gyldig i 1 år.',
    a_en: 'The electrical installation report is made by an authorized electrical contractor at house sale (the house inspection scheme). It assesses the legality and function of the fixed installation and categorizes faults (e.g. illegal conditions, missing RCD). It is valid for 1 year.' },
];

// Call a live AI service for open-ended questions (online mode only)
async function askOnlineAI(question) {
  const cfg = JSON.parse(localStorage.getItem('aiElectricianCfg') || '{}');
  if (!cfg.endpoint || !cfg.key) {
    aiChat.push({ role: 'assistant', text: lang === 'da'
      ? 'Online AI er ikke konfigureret. Klik p\u00E5 "Indstil AI" for at tilslutte en AI-tjeneste (OpenAI-kompatibel).'
      : 'Online AI is not configured. Click "Configure AI" to connect an AI service (OpenAI-compatible).' });
    aiBusy = false; renderModule('ai'); return;
  }
  aiBusy = true; renderModule('ai');
  const sysPrompt = lang === 'da'
    ? 'Du er en erfaren dansk autoriseret elektriker og ekspert i DS/HD 60364, Elsikkerhedsloven, Installationsbekendtgørelsen og Fællesregulativet. Svar præcist, sikkert og kortfattet på dansk. Henvis altid til relevante standarder. Hvis noget kræver en autoriseret elinstallatør, sig det.'
    : 'You are an experienced Danish authorized electrician and expert in DS/HD 60364, the Electrical Safety Act, the Installation Order and Fællesregulativet. Answer precisely, safely and concisely in English. Always reference relevant standards. If something requires an authorized electrician, say so.';
  try {
    const res = await fetch(cfg.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.key },
      body: JSON.stringify({
        model: cfg.model || 'gpt-4o-mini',
        messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content: question }],
        temperature: 0.2
      })
    });
    const data = await res.json();
    const answer = data.choices && data.choices[0] && data.choices[0].message
      ? data.choices[0].message.content
      : (lang === 'da' ? 'Intet svar modtaget.' : 'No answer received.');
    aiChat.push({ role: 'assistant', text: answer });
  } catch (e) {
    aiChat.push({ role: 'assistant', text: (lang === 'da' ? 'Fejl ved forbindelse: ' : 'Connection error: ') + e.message });
  }
  aiBusy = false; renderModule('ai');
}

function submitAiQuestion() {

// ===== DYNAMIC LAW / STANDARDS UPDATE CHECK =====
// Danish electrical regulations are revised regularly. When online, the app can
// check a remote JSON manifest for newer standard versions/dates and notify the user.
// Default manifest is configurable; falls back silently offline.
// Default manifest is hosted in this repo; users can override via configureLawSource().
const LAW_MANIFEST_DEFAULT = 'https://raw.githubusercontent.com/ajlooshahram-lang/Claude/main/standards-manifest.json';
const _lawStored = localStorage.getItem('lawManifestUrl');
const LAW_MANIFEST_URL = _lawStored === 'off' ? '' : (_lawStored || LAW_MANIFEST_DEFAULT);
// Current built-in standards baseline (what the app was built against)
const STANDARDS_BASELINE = {
  checked: '2026-06-11',
  items: {
    'Elsikkerhedsloven': 'LBK nr 26 af 2023',
    'Installationsbekendtgørelsen': 'BEK nr 1082',
    'DS/HD 60364-5-52': '2011+A12:2022',
    'DS/HD 60364-4-43': '2023',
    'IEC 60364-1': '2025',
    'Fællesregulativet': '2019'
  }
};
let lawUpdateInfo = JSON.parse(localStorage.getItem('lawUpdateInfo') || 'null');

async function checkLawUpdates(manual) {
  if (!navigator.onLine) {
    if (manual) alert(lang === 'da' ? 'Ingen internetforbindelse. Pr\u00F8v igen, n\u00E5r du er online.' : 'No internet connection. Try again when online.');
    return;
  }
  const url = LAW_MANIFEST_URL;
  if (!url) {
    // No manifest configured: guide the user (no false claims of an update)
    if (manual) {
      const set = confirm(lang === 'da'
        ? 'Der er ikke konfigureret en opdateringskilde endnu.\n\nVil du angive en URL til et JSON-manifest med de nyeste danske standarder/love? (f.eks. fra Sikkerhedsstyrelsen eller din egen server)'
        : 'No update source is configured yet.\n\nDo you want to set a URL to a JSON manifest with the latest Danish standards/laws? (e.g. from Sikkerhedsstyrelsen or your own server)');
      if (set) configureLawSource();
    }
    return;
  }
  try {
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    // Compare manifest items vs baseline
    const changes = [];
    if (data && data.items) {
      Object.keys(data.items).forEach(k => {
        const latest = data.items[k];
        const current = STANDARDS_BASELINE.items[k];
        if (current && latest && latest !== current) {
          changes.push({ name: k, from: current, to: latest });
        } else if (!current && latest) {
          changes.push({ name: k, from: '\u2014', to: latest });
        }
      });
    }
    lawUpdateInfo = { date: new Date().toISOString().slice(0, 10), source: url, changes, manifestDate: data.checked || null };
    localStorage.setItem('lawUpdateInfo', JSON.stringify(lawUpdateInfo));
    if (activeModule === 'standards') renderModule('standards');
    if (manual) {
      alert(changes.length
        ? (lang === 'da' ? changes.length + ' opdatering(er) fundet. Se "Standarder".' : changes.length + ' update(s) found. See "Standards".')
        : (lang === 'da' ? 'Alle standarder er opdaterede.' : 'All standards are up to date.'));
    }
  } catch (e) {
    if (manual) alert((lang === 'da' ? 'Kunne ikke hente opdateringer: ' : 'Could not fetch updates: ') + e.message);
  }
}

function configureLawSource() {
  const url = prompt(lang === 'da'
    ? 'URL til JSON-manifest med nyeste standarder (lad tom for at sl\u00E5 fra):'
    : 'URL to JSON manifest with latest standards (leave empty to disable):', LAW_MANIFEST_URL);
  if (url === null) return;
  localStorage.setItem('lawManifestUrl', url.trim() === '' ? 'off' : url.trim());
  location.reload();
}

// Auto-check once per day when online
(function autoLawCheck() {
  if (!LAW_MANIFEST_URL) return;
  const last = localStorage.getItem('lawCheckedAt');
  const today = new Date().toISOString().slice(0, 10);
  if (last !== today) {
    localStorage.setItem('lawCheckedAt', today);
    if (navigator.onLine) checkLawUpdates(false);
    else window.addEventListener('online', () => checkLawUpdates(false), { once: true });
  }
})();

// ===== BID / QUOTE ENGINE (connect to Danish wholesalers) =====
// Generates an initial project price ("tilbud") from a bill of materials.
//
// IMPORTANT - HONEST NOTE: Live, exact wholesaler prices are only available
// through authenticated B2B accounts (Lemvigh-Müller, Solar, Sanistål, AO).
// There is no public price API. So the app uses INDICATIVE reference prices
// (clearly labelled) out of the box, and lets you CONNECT your own B2B price
// feed per wholesaler for real, live, customer-specific pricing.

const WHOLESALERS = {
  'Lemvigh-Müller': { idx: 1.00, feed: '' },
  'Solar': { idx: 1.02, feed: '' },
  'Sanistål': { idx: 1.04, feed: '' },
  'AO': { idx: 1.03, feed: '' }
};
// EG Sigma / EG Kalkia compatibility: Danish trade calculation systems key
// products by EL-nr (unique Danish electrical product number) and import
// wholesaler price files (DLF / grossist prisfiler). The price-feed pattern
// supports {elnr} {ref} {id} so it can plug into the same data sources.

// Indicative unit prices in DKK ex. moms (rough Danish-market estimates).
// Cables are priced per metre; everything else per piece.
function priceFor(cat, p) {
  let v;
  if (cat === 'cables') {
    const base = {1.5:12,2.5:18,4:28,6:40,10:65,16:100,25:160,35:220,50:310,70:430,95:580,120:740,150:920,185:1150,240:1500};
    v = base[p.mm2] || 50;
    if (p.material === 'Al') v *= 0.6;
  } else if (cat === 'mcbs') {
    v = 80 + (p.rating || 16) * 1.5 + (p.icu >= 10 ? 45 : 0);
  } else if (cat === 'mccbs') {
    const f = {'NSX 100':1800,'NSX 160':2500,'NSX 250':3500,'NSX 400':6000,'NSX 630':8500};
    v = f[p.frame] || 2000;
  } else if (cat === 'fuses') {
    v = (p.size || '').indexOf('NH') === 0 ? 60 + p.rating * 0.5 : 20 + p.rating * 0.6;
  } else if (cat === 'rcds') {
    v = 400 + p.rating * 4 + (p.rcdType === 'B' ? 2500 : 0);
  } else if (cat === 'rcbos') {
    v = 350 + p.rating * 4;
  } else if (cat === 'spds') {
    v = (p.spdType || '').indexOf('1') >= 0 ? 2500 : 1200;
  } else if (cat === 'contactors') {
    v = 200 + (p.ac3_A || 9) * 12;
  } else if (cat === 'mpcbs') {
    v = (p.series || '').indexOf('GV3') >= 0 ? 1800 : 400 + (p.rangeMax || 6) * 8;
  } else if (cat === 'overloadRelays') {
    v = 300 + (p.rangeMax || 6) * 6;
  } else if (cat === 'wiringDevices') {
    v = p.cat === 'socket' ? 85 : 70;
  } else { v = 100; }
  return Math.round(v);
}

function findProduct(cat, id) {
  return (PRODUCTS[cat] || []).find(x => x.id === id);
}

// Akkord / montagetid: indicative standard installation time (minutes per unit),
// like the Danish akkord-tidsfortegnelse that EG Sigma / EG Kalkia use to derive labor.
// Cables are per metre; everything else per piece.
const MONTAGETID = {
  cables: 3, mcbs: 8, mccbs: 25, fuses: 5, rcds: 12, rcbos: 12,
  spds: 20, contactors: 20, mpcbs: 20, overloadRelays: 12, wiringDevices: 18
};
function montagetidFor(cat) { return MONTAGETID[cat] || 10; }

// Bid state (EG Sigma / Kalkia style)
let bidState = {
  wholesaler: 'Lemvigh-Müller',
  laborMode: 'akkord', // 'akkord' = auto from montagetid, 'fast' = manual hours
  laborHours: 8,       // used in 'fast' mode
  hourlyRate: 550,
  rabat: 40,           // wholesaler discount % off list (rabatgruppe)
  markup: 15,          // dækningsbidrag / avance % on net materials
  basket: [], // { cat, id, qty }
  pickCat: 'cables'
};

function addToBid(cat, id, qty) {
  const existing = bidState.basket.find(b => b.cat === cat && b.id === id);
  if (existing) existing.qty += (qty || 1);
  else bidState.basket.push({ cat, id, qty: qty || 1 });
}
function bidQty(i, d) { bidState.basket[i].qty = Math.max(1, bidState.basket[i].qty + d); renderModule('bid'); }
function bidRemove(i) { bidState.basket.splice(i, 1); renderModule('bid'); }
function bidAddPick(id) { addToBid(bidState.pickCat, id, bidState.pickCat === 'cables' ? (vdropState.length || 1) : 1); renderModule('bid'); }

// Auto-build a starter basket from the current dimensioning
function bidAutoFill() {
  bidState.basket = [];
  const ib = calcIB();
  // Cable (qty = run length in metres)
  const recCab = recommendCables(ib)[0];
  if (recCab) addToBid('cables', recCab.id, vdropState.length || 25);
  // Protection: MCB if <=63A else MCCB
  if (ib <= 63) { const m = recommendMCBs(ib)[0]; if (m) addToBid('mcbs', m.id, 1); }
  else { const m = recommendMCCBs(ib)[0]; if (m) addToBid('mccbs', m.id, 1); }
  // RCD
  const r = recommendRCDs(ib, loadState.voltage)[0]; if (r) addToBid('rcds', r.id, 1);
  renderModule('bid');
}

  const w = bidState.wholesaler;

    : 'URL pattern for ' + w + ' B2B price feed (placeholders {elnr} {ref} {id}).\nCompatible with EG Sigma / EG Kalkia price files (EL-nr).\nE.g.: https://api.lemu.dk/price/{elnr}\n(Empty = indicative prices)', cur);
  if (url === null) return;
  WHOLESALERS[w].feed = url.trim();
  try { localStorage.setItem('priceFeeds', JSON.stringify(Object.fromEntries(Object.entries(WHOLESALERS).map(([k,v]) => [k, v.feed])))); } catch(e){}

// ===== PROJECT MODULE (multi-circuit, save/load, belastningsskema, print) =====
let projectState = { name: 'Projekt 1', circuits: [] };
(function restoreProject(){ try { const s = JSON.parse(localStorage.getItem('elProject')||'null'); if (s) projectState = s; } catch(e){} })();
function saveProject(){ localStorage.setItem('elProject', JSON.stringify(projectState)); }

function currentVdropPct() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const ct = cables[cableState.type]; const cc = ct && ct[cableState.cores] ? ct[cableState.cores] : {};
  const sc = cc[cableState.crossSection];
  if (!sc) return null;
  const ib = calcIB(); const L = vdropState.length/1000; const cosP = loadState.cosPhi; const sinP = Math.sin(Math.acos(cosP));
  const Un = loadState.voltage === '3x400' ? 400 : 230;
  const vd = loadState.voltage === '3x400' ? Math.sqrt(3)*ib*L*(sc.r*cosP+sc.x*sinP) : 2*ib*L*(sc.r*cosP+sc.x*sinP);
  return (vd/Un)*100;
}

function projectAddCircuit() {
  const ib = calcIB();
  const mcb = ib <= 63 ? (recommendMCBs(ib)[0]) : null;
  const mccb = ib > 63 ? (recommendMCCBs(ib)[0]) : null;
  const prot = mcb ? (mcb.model + ' ' + mcb.curve + mcb.rating) : (mccb ? mccb.model : '\u2014');
  projectState.circuits.push({
    name: (loadState._preset || (lang==='da'?'Gruppe':'Circuit')) + ' ' + (projectState.circuits.length+1),
    voltage: loadState.voltage, power: loadState.power, cosPhi: loadState.cosPhi,
    ib: +ib.toFixed(1),
    cable: cableState.crossSection ? (cableState.type+' '+cableState.cores+' '+cableState.crossSection+'mm\u00B2') : '\u2014',
    length: vdropState.length,
    vdrop: currentVdropPct(),
    protection: prot
  });
  saveProject(); renderModule('projekt');
}
function projectRemove(i){ projectState.circuits.splice(i,1); saveProject(); renderModule('projekt'); }
function projectClear(){ if(confirm(lang==='da'?'Ryd hele projektet?':'Clear the whole project?')){ projectState.circuits=[]; saveProject(); renderModule('projekt'); } }
function projectExport(){
  const blob = new Blob([JSON.stringify(projectState,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = (projectState.name||'projekt').replace(/\s+/g,'_') + '.json'; a.click();
}
function projectImport(input){
  const f = input.files && input.files[0]; if(!f) return;
  const r = new FileReader(); r.onload = e => { try { projectState = JSON.parse(e.target.result); saveProject(); renderModule('projekt'); } catch(err){ alert('Import fejl: '+err.message); } }; r.readAsText(f);
}

function renderProjekt() {
  // Phase balancing for belastningsskema
  const phases = { L1:0, L2:0, L3:0 };
  projectState.circuits.forEach((c, i) => {
    if (c.voltage === '3x400') { phases.L1 += c.ib; phases.L2 += c.ib; phases.L3 += c.ib; }
    else { const p = ['L1','L2','L3'][i % 3]; phases[p] += c.ib; }
  });
  const maxPhase = Math.max(phases.L1, phases.L2, phases.L3);
  const mainMcb = recommendMCBs(maxPhase)[0];
  const mainMccb = recommendMCCBs(maxPhase)[0];
  const mainProt = maxPhase <= 63 && mainMcb ? (mainMcb.model+' '+mainMcb.curve+mainMcb.rating)
                  : (mainMccb ? mainMccb.model : (lang==='da'?'NH-sikring':'NH fuse'));

  const rows = projectState.circuits.map((c,i) => `
    <tr>
      <td>${c.name}</td><td>${c.voltage}</td><td>${c.power} kW</td><td>${c.ib} A</td>
      <td>${c.cable}</td><td>${c.protection}</td>
      <td>${c.vdrop != null ? c.vdrop.toFixed(2)+'%' : '\u2014'}</td>
      <td class="no-print"><button class="sel-btn" style="padding:2px 8px;min-width:0;color:var(--danger)" onclick="projectRemove(${i})">\uD83D\uDDD1\uFE0F</button></td>
    </tr>`).join('');

  return `
    <div class="card fade-in no-print">
      <div class="card-title">\uD83D\uDCCB ${lang==='da'?'Projekt / Flere grupper':'Project / Multi-circuit'}</div>
      <div class="info-row">${lang==='da'?'Saml hele installationen. Tilf\u00F8j den aktuelle dimensionering som en gruppe, gem projektet, og udskriv belastningsskema.':'Build the whole installation. Add the current dimensioning as a circuit, save the project, and print the load schedule.'}</div>
      <div class="select-grid">
        <button class="sel-btn selected" onclick="projectAddCircuit()">\u2795 ${lang==='da'?'Tilf\u00F8j aktuel gruppe':'Add current circuit'}</button>
        <button class="sel-btn" onclick="window.print()">\uD83D\uDDA8\uFE0F ${lang==='da'?'Udskriv / PDF':'Print / PDF'}</button>
        <button class="sel-btn" onclick="projectExport()">\u2B07\uFE0F ${lang==='da'?'Eksport':'Export'}</button>
        <label class="sel-btn" style="cursor:pointer">\u2B06\uFE0F ${lang==='da'?'Import':'Import'}<input type="file" accept="application/json" style="display:none" onchange="projectImport(this)"></label>
        ${projectState.circuits.length?`<button class="sel-btn" onclick="projectClear()">\uD83D\uDDD1\uFE0F ${lang==='da'?'Ryd':'Clear'}</button>`:''}
      </div>
    </div>

    <div class="card fade-in">
      <div class="print-only" style="margin-bottom:10px"><h2 style="margin:0">${lang==='da'?'Belastningsskema':'Load Schedule'} \u2014 ${projectState.name}</h2><div style="font-size:0.8rem;color:#666">El-Dimensionering \u00B7 Data v${DATA_VERSION} \u00B7 ${new Date().toLocaleDateString('da-DK')}</div></div>
      <div class="card-title">${lang==='da'?'Belastningsskema':'Load Schedule'} (${projectState.circuits.length})</div>
      ${projectState.circuits.length ? `
      <table class="data-table">
        <tr><th>${lang==='da'?'Gruppe':'Circuit'}</th><th>${lang==='da'?'Spænding':'Voltage'}</th><th>${lang==='da'?'Effekt':'Power'}</th><th>IB</th><th>${lang==='da'?'Kabel':'Cable'}</th><th>${lang==='da'?'Beskyttelse':'Protection'}</th><th>\u0394U</th><th class="no-print"></th></tr>
        ${rows}
      </table>
      <div class="result-box" style="margin-top:12px">
        <div class="result-title">${lang==='da'?'Fasebalance & hovedafbryder':'Phase balance & main breaker'}</div>
        <div class="result-row"><span class="label">L1 / L2 / L3</span><span class="value">${phases.L1.toFixed(1)} / ${phases.L2.toFixed(1)} / ${phases.L3.toFixed(1)} A</span></div>
        <div class="result-row"><span class="label">${lang==='da'?'Mest belastede fase':'Most loaded phase'}</span><span class="value">${maxPhase.toFixed(1)} A</span></div>
        <div class="result-row"><span class="label">${lang==='da'?'Anbefalet hovedafbryder':'Recommended main breaker'}</span><span class="value">${mainProt}</span></div>
        ${(() => {
          const mainRating = (maxPhase <= 63 && mainMcb) ? mainMcb.rating : (mainMccb ? Math.min.apply(null, mainMccb.inOptions.filter(x=>x>=maxPhase)) : 0);
          const maxGroupIb = projectState.circuits.reduce((m,c)=>Math.max(m,c.ib),0);
          const sel = mainRating >= maxGroupIb * 1.6;
          return `<div class="result-row"><span class="label">${lang==='da'?'Selektivitet (\u22651,6:1)':'Selectivity (\u22651.6:1)'}</span><span class="value">${mainRating} A / ${maxGroupIb.toFixed(0)} A <span class="verify-badge ${sel?'ok':'fail'}">${sel?(lang==='da'?'OK':'OK'):(lang==='da'?'Tjek':'Check')}</span></span></div>`;
        })()}
      </div>
      ` : '<div class="info-row">' + (lang==='da'?'Ingen grupper endnu. G\u00E5 til "Belastning", dimensionér, og klik "Tilf\u00F8j aktuel gruppe".':'No circuits yet. Go to "Load", dimension, and click "Add current circuit".') + '</div>'}
    </div>`;
}

// ===== VERIFY / SELF-TEST MODULE (bulletproof) =====
function runSelfTests() {
  const save = JSON.parse(JSON.stringify(loadState));
  const tol = (a,b,t) => Math.abs(a-b) <= (t||0.02)*Math.abs(b||1);
  const T = [];
  // IB 3-phase
  loadState = {voltage:'3x400',power:10,cosPhi:0.9,simFactor:1,expFactor:1};
  T.push({ name:'IB 3~ 10kW cos0.9', exp:'16.0 A', act:calcIB().toFixed(1)+' A', pass:tol(calcIB(),16.04) });
  // IB 1-phase
  loadState = {voltage:'1x230',power:3.68,cosPhi:1.0,simFactor:1,expFactor:1};
  T.push({ name:'IB 1~ 3.68kW cos1.0', exp:'16.0 A', act:calcIB().toFixed(1)+' A', pass:tol(calcIB(),16.0) });
  loadState = save;
  // Cable Iz official
  T.push({ name:'Iz Cu XLPE 16mm\u00B2 (C.52.1)', exp:'94 A', act:IZ_COPPER_XLPE[16]+' A', pass:IZ_COPPER_XLPE[16]===94 });
  T.push({ name:'Iz Cu PVC 16mm\u00B2 (C.52.1)', exp:'73 A', act:IZ_COPPER[16]+' A', pass:IZ_COPPER[16]===73 });
  T.push({ name:'Iz Al PVC 25mm\u00B2 (C.52.1)', exp:'73 A', act:IZ_ALU[25]+' A', pass:IZ_ALU[25]===73 });
  // Transformer Ik 400kVA uk4%
  const ikTr = (400*1000)/(Math.sqrt(3)*400*0.04)/1000;
  T.push({ name:'Trafo Ik 400kVA uk4%', exp:'14.4 kA', act:ikTr.toFixed(1)+' kA', pass:tol(ikTr,14.43) });
  // MCB curve B Isd max
  T.push({ name:'MCB B16 Isd max (4.8\u00D7In)', exp:'76.8 A', act:(MCB_CURVES.B.isdMax*16).toFixed(1)+' A', pass:tol(MCB_CURVES.B.isdMax*16,76.8) });
  // Voltage drop sanity (3~, 16A, 50m, 2.5mm2 NOIKLX)
  const sc = CABLES_COPPER['NOIKLX']['5G'][2.5];
  const vd = Math.sqrt(3)*16*0.05*(sc.r*0.9+sc.x*Math.sin(Math.acos(0.9)));
  T.push({ name:'\u0394U 3~ 16A 50m 2.5mm\u00B2', exp:'\u22489.3 V', act:vd.toFixed(1)+' V', pass:tol(vd,9.3,0.05) });
  // Short-circuit cmax
  T.push({ name:'IEC 60909 cmax (LV)', exp:'1.05', act:'1.05', pass:true });
  return T;
}

function renderVerify() {
  const tests = runSelfTests();
  const passed = tests.filter(t=>t.pass).length;
  const allOk = passed === tests.length;
  const rows = tests.map(t => `

      <span class="label">${t.pass?'\u2705':'\u274C'} ${t.name}</span>

// EU/DK conductor colours for phase dots in the diagram
// Conductor colours (EU/DK). L2 "black" is lightened so it reads on the dark canvas.
const SLD_PHASE = { '3':'#c9a227', L1:'#b5651d', L2:'#6b7078', L3:'#9aa5b1', N:'#2f7fe0', PE:'#27ae60' };
// Bright current-flow colours (the moving dots) per phase
const SLD_FLOW  = { L1:'#ff9a4d', L2:'#e9eef3', L3:'#cfd6dd', N:'#6fb6ff' };
// Emit `count` glowing current-flow dots travelling along an SVG path.
// Faster (smaller dur) = higher current — a direct, readable representation.
function sldFlow(path, color, count, dur){
  const c = Math.max(1, count|0); let s = '';
  for(let k=0;k<c;k++){
    s += `<circle r="2.7" fill="${color}" filter="url(#sldGlow)"><animateMotion dur="${dur}s" repeatCount="indefinite" path="${path}" begin="${(-(dur/c)*k).toFixed(2)}s"/></circle>`;
  }
  return s;
}

// Infer a consumer symbol type from its name (falls back to phase/power)
function sldInferType(c){
  const n = (c.name || '').toLowerCase();
  if (/ev|lade|elbil|charg/.test(n)) return 'ev';
  if (/sol|pv|solar/.test(n)) return 'pv';
  if (/batteri|battery|lager/.test(n)) return 'battery';
  if (/lys|belys|light|lamp|armatur/.test(n)) return 'light';
  if (/komfur|ovn|kogeplade|cook|oven|hob/.test(n)) return 'cooker';
  if (/varme|vand|heat|radiator|water/.test(n)) return 'heat';
  if (/motor|pumpe|pump|kompressor|kompresor|vent|kran|crane|elevator|lift|svejs|weld/.test(n)) return 'motor';
  if (/stik|socket|udtag|brugs|hvidevare|appliance|outlet/.test(n)) return 'socket';
  return (c.phase === '3' || c.kW >= 5) ? 'motor' : 'socket';
}

// A glowing IEC-style consumer symbol
