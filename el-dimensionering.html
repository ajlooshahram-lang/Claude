    case 'ev':     return `<rect x="${x-12}" y="${y-13}" width="24" height="26" rx="4" fill="#08121e" stroke="#a0ff80" stroke-width="2" filter="url(#sldGlow)"/><circle cx="${x}" cy="${y-3}" r="4" fill="none" stroke="#a0ff80" stroke-width="1.6"/><path d="M${x} ${y+1} v6" stroke="#a0ff80" stroke-width="2"/><text x="${x}" y="${y+11}" text-anchor="middle" font-size="6" fill="#a0ff80" font-weight="700">EV</text>`;
    case 'light':  return `<circle cx="${x}" cy="${y}" r="12" fill="#08121e" stroke="#ffd166" stroke-width="2" filter="url(#sldGlow)"/><path d="M${x-7} ${y-7} L${x+7} ${y+7} M${x+7} ${y-7} L${x-7} ${y+7}" stroke="#ffd166" stroke-width="1.6"/>`;
    case 'cooker':
    case 'heat':   return `<rect x="${x-13}" y="${y-12}" width="26" height="24" rx="3" fill="#08121e" stroke="#ff8a5c" stroke-width="2" filter="url(#sldGlow)"/><path d="M${x-7} ${y-4} q3 -4 6 0 q3 4 6 0 M${x-7} ${y+5} q3 -4 6 0 q3 4 6 0" fill="none" stroke="#ff8a5c" stroke-width="1.6"/>`;
    case 'pv':     return `<rect x="${x-12}" y="${y-12}" width="24" height="24" rx="2" fill="#08121e" stroke="#ffee55" stroke-width="2" filter="url(#sldGlow)"/><path d="M${x-12} ${y-4} h24 M${x-12} ${y+4} h24 M${x-4} ${y-12} v24 M${x+4} ${y-12} v24" stroke="#ffee55" stroke-width="0.8" opacity="0.7"/>`;
    case 'battery':return `<rect x="${x-12}" y="${y-10}" width="22" height="20" rx="2" fill="#08121e" stroke="#80ffcc" stroke-width="2" filter="url(#sldGlow)"/><rect x="${x+11}" y="${y-4}" width="3" height="8" fill="#80ffcc"/><text x="${x-1}" y="${y+4}" text-anchor="middle" font-size="10" fill="#80ffcc" font-weight="800">+−</text>`;
    default:       return `<circle cx="${x}" cy="${y}" r="13" fill="#0a1422" stroke="#ffd166" stroke-width="2" filter="url(#sldGlow)"/><circle cx="${x-4}" cy="${y-2}" r="2.2" fill="#ffd166"/><circle cx="${x+4}" cy="${y-2}" r="2.2" fill="#ffd166"/><path d="M${x-4} ${y+6} h8" stroke="#ffd166" stroke-width="2.4" stroke-linecap="round"/>`;
  }
}

function buildSLD(){
  // Use the unlimited load schedule if present, else a representative sample
  let cons = loadList.length ? loadList.slice(0, 16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  const sch = calcLoadSchedule();
  const ib = loadList.length ? sch.ib : 30;

  // ---- per-circuit currents + per-phase totals (drives the live animation) ----
  const pT = { L1:0, L2:0, L3:0 };
  const R = cons.map(c => {
    const ci = lsConsumerCurrent ? lsConsumerCurrent(c) : {L1:0,L2:0,L3:0};
    const cIb = Math.max(ci.L1||0, ci.L2||0, ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
    pT.L1 += ci.L1||0; pT.L2 += ci.L2||0; pT.L3 += ci.L3||0;
    const cab = (typeof recommendCables==='function') ? recommendCables(cIb)[0] : null;
    const mcb = (typeof recommendMCBs==='function') ? recommendMCBs(cIb,10)[0] : null;
    return { c, cIb, cab, mcb, phases: c.phase==='3' ? ['L1','L2','L3'] : [c.phase] };
  });
  const totalKVA = loadList.length ? sch.kVA : (R.reduce((s,r)=>s+r.c.kW,0)/0.9);
  const trafo = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=totalKVA)||630) : 630;
  // Neutral current for a 3-phase system (IEC vector sum at 120°)
  const IN = Math.sqrt(Math.max(0, pT.L1*pT.L1 + pT.L2*pT.L2 + pT.L3*pT.L3 - pT.L1*pT.L2 - pT.L2*pT.L3 - pT.L1*pT.L3));
  const maxA = Math.max(pT.L1, pT.L2, pT.L3, 1);
  const maxCIb = Math.max(...R.map(r=>r.cIb), 1);
  // earth-fault demo: fault the clicked circuit, else auto-pick one with an exposed conductive part
  let faultRow = -1, faultRow2 = -1;
  const itSecond = sldFault && sldEarthing==='IT' && sldITSecond;
  if(sldFault){
    faultRow = (sldFaultRow >= 0 && sldFaultRow < R.length)
      ? sldFaultRow
      : R.findIndex(r => ['motor','ev','heat','cooker'].includes(sldInferType(r.c)));
    if(faultRow < 0) faultRow = 0;
    if(itSecond){
      const p1 = R[faultRow] ? R[faultRow].c.phase : '3';
      faultRow2 = R.findIndex((r,ix)=> ix!==faultRow && r.c.phase!==p1 && r.c.phase!=='3');
      if(faultRow2 < 0) faultRow2 = R.findIndex((r,ix)=> ix!==faultRow);
      if(faultRow2 < 0) faultRow2 = faultRow;
    }
  }

  const W = 820, rowH = 48, top = 196;
  const H = top + cons.length*rowH + (sldEarthing==='TT' ? 92 : 54);
  const busX = 250, feedY = 150;
  const barX = { L1:busX-24, L2:busX-12, L3:busX, N:busX+12, PE:busX+24 };
  const busR = barX.PE;
  const busTop = feedY + 24, busBot = top + (cons.length-1)*rowH + 18;
  const brX = 300, brW = 46, symX = W-150, nameX = W-128, srcX = 82;

  // ---- circuit rows: pickoff from phase bars, phase tag, animated current ----
  let rows = '';
  R.forEach((r,i)=>{
    const y = top + i*rowH + 18;
    const c = r.c, cIb = r.cIb, is3 = c.phase==='3';
    const cableLbl = r.cab ? (r.cab.mm2+' mm²') : '';
    const mcbLbl = r.mcb ? ('C'+r.mcb.rating) : (cIb>63?'NH':'');
    const ph = is3 ? '3~' : c.phase;
    const tagCol = is3 ? '#bfe9ff' : (SLD_PHASE[c.phase]||'#7fb4d6');
    const type = sldInferType(c);
    const isFault = sldFault && (i===faultRow || (itSecond && i===faultRow2));
    const tapDur = Math.max(0.7, 2.6 - (cIb/maxCIb)*1.8).toFixed(2);
    // pickoffs from each tapped phase bar (shows which phases feed the circuit)
    let picks = '';
    r.phases.forEach(pp => { const bx = barX[pp];
      picks += `<line x1="${bx}" y1="${y}" x2="${busR}" y2="${y}" stroke="${isFault?'#ff3b5c':SLD_PHASE[pp]}" stroke-width="2"/><circle cx="${bx}" cy="${y}" r="3.6" fill="${isFault?'#ff3b5c':SLD_PHASE[pp]}" stroke="#0a1422" stroke-width="0.8"/>`; });
    const tapPath = `M ${busR} ${y} L ${brX} ${y}`;
    const tapFlow = isFault
      ? sldFlow(tapPath, '#ff3b5c', 3, tapDur)
      : (is3
        ? (sldFlow(tapPath, SLD_FLOW.L1, 1, tapDur) + sldFlow(tapPath, SLD_FLOW.L2, 1, (tapDur*1.12).toFixed(2)) + sldFlow(tapPath, SLD_FLOW.L3, 1, (tapDur*1.24).toFixed(2)))
        : sldFlow(tapPath, SLD_FLOW[c.phase]||'#7fe9ff', Math.min(3, 1+Math.round(cIb/maxCIb*2)), tapDur));
    rows += `
      ${isFault?`<rect x="${barX.L1-8}" y="${y-20}" width="${W-barX.L1-30}" height="40" rx="6" fill="#ff3b5c" opacity="0.08"/>`:''}
      ${picks}
      <line x1="${busR}" y1="${y}" x2="${brX}" y2="${y}" stroke="${isFault?'#ff3b5c':(is3?'#3a6f86':tagCol)}" stroke-width="2"/>
      ${tapFlow}
      <text x="${(busR+brX)/2}" y="${y-6}" text-anchor="middle" font-size="9" font-weight="800" fill="${isFault?'#ff6b82':tagCol}">${ph}</text>
      <g filter="url(#sldGlow)"><rect x="${brX}" y="${y-12}" width="${brW}" height="24" rx="5" fill="#0c1c2b" stroke="${isFault?'#ff3b5c':'#00d0ff'}" stroke-width="1.6"/></g>
      <line x1="${brX+8}" y1="${y+7}" x2="${brX+brW-8}" y2="${y-7}" stroke="#7fe9ff" stroke-width="1.6"/>
      <text x="${brX+brW/2}" y="${y+21}" text-anchor="middle" font-size="8.5" fill="#9fe6ff" font-weight="700">${mcbLbl}</text>
      <line x1="${brX+brW}" y1="${y}" x2="${symX-16}" y2="${y}" stroke="${isFault?'#7a2230':'#27506b'}" stroke-width="2"/>
      ${sldFlow(`M ${brX+brW} ${y} L ${symX-16} ${y}`, isFault?'#ff3b5c':'#7fe9ff', isFault?3:1, (parseFloat(tapDur)*1.3).toFixed(2))}
      <text x="${brX+brW+10}" y="${y-6}" font-size="10.5" fill="#9fd0ea">${cableLbl} · ${cIb.toFixed(1)} A</text>
      ${sldSymbol(type, symX, y)}
      <text x="${nameX}" y="${y-2}" font-size="11" fill="#dbeaf6" font-weight="600">${(c.name || ('K'+(i+1)))}</text>
      <text x="${nameX}" y="${y+12}" font-size="10" fill="#7fa8c4">${c.kW} kW</text>
      <rect x="${barX.L1-8}" y="${y-20}" width="${W-barX.L1-30}" height="40" fill="#ffffff" opacity="0" style="cursor:pointer" onclick="sldPickFault(${i})"><title>${lang==='da'?'Klik for at simulere jordfejl her':'Click to simulate an earth fault here'}</title></rect>`;
  });

  // ---- L1/L2/L3/N/PE busbars with animated phase-current flow ----
  let bars = '';
  ['L1','L2','L3','N','PE'].forEach(pp=>{
    const bx = barX[pp], col = SLD_PHASE[pp], lblCol = pp==='L2' ? '#aeb6bf' : col;
    bars += `<line x1="${bx}" y1="${busTop}" x2="${bx}" y2="${busBot}" stroke="${col}" stroke-width="4" stroke-linecap="round" filter="url(#sldGlow)"/>`;
    bars += `<text x="${bx}" y="${busTop-6}" text-anchor="middle" font-size="7.5" font-weight="700" fill="${lblCol}">${pp}</text>`;
    bars += `<path d="M ${bx-3} ${busBot-7} L ${bx+3} ${busBot-7} L ${bx} ${busBot} Z" fill="${col}"/>`;
    if(pp!=='PE'){
      const amps = pp==='N' ? IN : pT[pp];
      const fr = amps/maxA;
      const dur = Math.max(0.7, 3.2 - fr*2.4).toFixed(2);
      const cnt = Math.max(1, Math.min(4, Math.round(1+fr*3)));
      bars += sldFlow(`M ${bx} ${busTop} L ${bx} ${busBot}`, SLD_FLOW[pp], cnt, dur);
    } else if(sldFault){
      const isTT = sldEarthing==='TT', isIT = sldEarthing==='IT';
      const fcol = isIT ? '#ffd27a' : '#ff3b5c';
      bars += `<line x1="${bx}" y1="${busTop}" x2="${bx}" y2="${busBot}" stroke="${fcol}" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.85" filter="url(#sldGlow)"/>`;
      // TN: metallic return UP (high current). TT: down to local electrode (low). IT: tiny monitored current.
      bars += isTT
        ? sldFlow(`M ${bx} ${busTop} L ${bx} ${busBot}`, fcol, 2, '2.0')
        : isIT
        ? sldFlow(`M ${bx} ${busBot} L ${bx} ${busTop}`, fcol, 1, '2.8')
        : sldFlow(`M ${bx} ${busBot} L ${bx} ${busTop}`, fcol, 4, '1.1');
    }
  });

  // ---- phase-balance gauge (top-right) ----
  const gx = W-258, gy = 18, gw = 240, gh = 134, gbY = gy+gh-26, gMaxH = 66;
  let gauge = `<g filter="url(#sldGlow)"><rect x="${gx}" y="${gy}" width="${gw}" height="${gh}" rx="9" fill="#08182a" stroke="#00c8ff" stroke-opacity="0.5" stroke-width="1.5"/></g>
    <text x="${gx+14}" y="${gy+20}" font-size="11" font-weight="800" fill="#bfe9ff">${lang==='da'?'Fasebalance':'Phase balance'}</text>`;
  ['L1','L2','L3'].forEach((pp,k)=>{
    const bx = gx+24+k*42, h = (pT[pp]/maxA)*gMaxH, fill = pp==='L2' ? '#9aa1aa' : SLD_PHASE[pp];
    gauge += `<rect x="${bx}" y="${gbY-gMaxH}" width="28" height="${gMaxH}" rx="3" fill="#0e2236"/>`;
    gauge += `<rect x="${bx}" y="${(gbY-h).toFixed(1)}" width="28" height="${Math.max(1,h).toFixed(1)}" rx="3" fill="${fill}" filter="url(#sldGlow)"/>`;
    gauge += `<text x="${bx+14}" y="${(gbY-h-4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#dbeaf6" font-weight="700">${pT[pp].toFixed(0)}A</text>`;
    gauge += `<text x="${bx+14}" y="${gbY+12}" text-anchor="middle" font-size="9" fill="#9fb8cc">${pp}</text>`;
  });
  const unbal = (1 - Math.min(pT.L1,pT.L2,pT.L3)/maxA) * 100;
  gauge += `<text x="${gx+158}" y="${gy+54}" font-size="10" fill="#6fb6ff" font-weight="700">N: ${IN.toFixed(0)} A</text>`;
  gauge += sldFault
    ? `<text x="${gx+158}" y="${gy+74}" font-size="10" fill="#ff6b82" font-weight="800">PE: ⚡ ${lang==='da'?'FEJL':'FAULT'}</text>`
    : `<text x="${gx+158}" y="${gy+74}" font-size="10" fill="#3fcf7a" font-weight="700">PE: 0 A</text>`;
  gauge += `<text x="${gx+158}" y="${gy+90}" font-size="7.5" fill="#7fa8c4">${lang==='da'?'PE: kun fejlstrøm':'PE: fault only'}</text>`;
  gauge += `<text x="${gx+14}" y="${gy+gh-8}" font-size="8.5" fill="#9fb8cc">${lang==='da'?'Skævhed':'Imbalance'}: ${unbal.toFixed(0)}%</text>`;

  // ---- phase-colour legend (bottom) ----
  const leg = [['L1',SLD_PHASE.L1],['L2','#aeb6bf'],['L3',SLD_PHASE.L3],['N',SLD_PHASE.N],['PE',SLD_PHASE.PE]];
  let legend = '';
  leg.forEach((l,k)=>{ const lx = 24 + k*58; legend += `<circle cx="${lx}" cy="${H-18}" r="5" fill="${l[1]}" stroke="#5a7488" stroke-width="1"/><text x="${lx+9}" y="${H-14}" font-size="9" fill="#9fb8cc">${l[0]}</text>`; });

  // ---- earthing arrangement (drawn in every mode): system earth, PEN split, TT electrodes+soil, or IT/IMD ----
  let earthViz = '';
  earthViz += `<text x="${busX}" y="${feedY-22}" text-anchor="middle" font-size="9.5" font-weight="800" fill="#9fe6ff">⏚ ${sldEarthing}</text>`;
  if(sldEarthing==='TT'){
    const soilTop = H-60, soilMid = H-50;
    earthViz += `<rect x="0" y="${soilTop}" width="${W}" height="${H-soilTop-22}" fill="#3a2a18" opacity="0.55"/>`;
    earthViz += `<text x="14" y="${soilMid+2}" font-size="8.5" fill="#caa97a">${lang==='da'?'JORD':'SOIL'}</text>`;
    earthViz += `<line x1="${srcX}" y1="${feedY}" x2="${srcX}" y2="${soilMid}" stroke="#5a7488" stroke-width="2"/>`;
    earthViz += earthSymbol(srcX, soilMid, '#3fcf7a') + `<text x="${srcX-16}" y="${soilMid+2}" text-anchor="end" font-size="8" fill="#caa97a">Rb</text>`;
    earthViz += `<line x1="${barX.PE}" y1="${busBot}" x2="${barX.PE}" y2="${soilMid}" stroke="#27ae60" stroke-width="2.5"/>`;
    earthViz += earthSymbol(barX.PE, soilMid, '#3fcf7a') + `<text x="${barX.PE+16}" y="${soilMid+2}" font-size="8" fill="#caa97a">Ra</text>`;
  } else if(sldEarthing==='IT'){
    earthViz += `<line x1="${srcX}" y1="${feedY}" x2="${srcX}" y2="${feedY+16}" stroke="#5a7488" stroke-width="2"/>`;
    earthViz += `<g filter="url(#sldGlow)"><rect x="${srcX-16}" y="${feedY+16}" width="32" height="16" rx="3" fill="#1a2230" stroke="#ffd27a" stroke-width="1.4"/></g>`;
    earthViz += `<text x="${srcX}" y="${feedY+28}" text-anchor="middle" font-size="8" font-weight="700" fill="#ffd27a">IMD</text>`;
    earthViz += `<line x1="${srcX}" y1="${feedY+32}" x2="${srcX}" y2="${feedY+40}" stroke="#5a7488" stroke-width="2"/>`;
    earthViz += earthSymbol(srcX, feedY+40, '#3fcf7a');
    earthViz += `<text x="${(srcX+busX)/2}" y="${feedY-6}" text-anchor="middle" font-size="8" fill="#c9a98a">${lang==='da'?'isoleret / Z':'isolated / Z'}</text>`;
  } else {
    earthViz += `<line x1="${srcX}" y1="${feedY}" x2="${srcX}" y2="${feedY+24}" stroke="#5a7488" stroke-width="2"/>`;
    earthViz += earthSymbol(srcX, feedY+24, '#3fcf7a');
    earthViz += `<text x="${srcX}" y="${feedY+48}" text-anchor="middle" font-size="8" fill="#8fb0c4">${lang==='da'?'systemjord':'system earth'}</text>`;
    if(sldEarthing==='TN-C-S'){
      const ex = busX+96;
      earthViz += `<line x1="${busX+66}" y1="${feedY}" x2="${ex}" y2="${feedY}" stroke="#5a7488" stroke-width="2"/>`;
      earthViz += earthSymbol(ex, feedY+10, '#3fcf7a') + `<text x="${ex+14}" y="${feedY+2}" font-size="8" fill="#9fb8cc">PEN→PE+N</text>`;
      earthViz += `<text x="${(srcX+busX)/2}" y="${feedY-6}" text-anchor="middle" font-size="8" fill="#c9a98a">PEN</text>`;
    } else {
      earthViz += `<text x="${(srcX+busX)/2}" y="${feedY-6}" text-anchor="middle" font-size="8" fill="#c9a98a">${lang==='da'?'N + PE separat':'separate N + PE'}</text>`;
    }
  }

  // ---- earth-fault overlay: the fault-return path depends on the earthing system (IT supports 1st/2nd fault) ----
  let faultOverlay = '';
  if(sldFault && faultRow >= 0){
    const fy = top + faultRow*rowH + 18;
    const belowY = busBot + 16, peX = barX.PE, soilMid = H-50;
    let peRoute, dots, dur, retNote, fcol = '#ff3b5c', extra = '';
    if(sldEarthing==='TT'){
      peRoute = `M ${symX} ${fy} L ${symX} ${belowY} L ${peX} ${belowY} L ${peX} ${soilMid} L ${srcX} ${soilMid} L ${srcX} ${feedY}`;
      dots = 3; dur = '2.3';
      retNote = lang==='da' ? 'TT: fejlstrøm gennem JORD (Ra+Rb) — høj impedans, LAV fejlstrøm → automatsikring udløser IKKE, HPFI er OBLIGATORISK' : 'TT: fault current through SOIL (Ra+Rb) — high impedance, LOW current → MCB will NOT trip, RCD is MANDATORY';
    } else if(sldEarthing==='IT' && itSecond){
      const fyB = top + faultRow2*rowH + 18;
      peRoute = `M ${symX} ${fy} L ${peX} ${fy} L ${peX} ${fyB} L ${symX} ${fyB}`;
      dots = 5; dur = '0.9'; fcol = '#ff3b5c';
      retNote = lang==='da' ? 'IT 2. fejl: anden fejl på en anden fase → fase-fase via PE/jord → HØJ strøm → overstrømsbeskyttelse (automatsikring) udløser hurtigt.' : 'IT 2nd fault: a second fault on another phase → line-to-line via PE/earth → HIGH current → overcurrent protection (MCB) disconnects fast.';
      extra += `<g filter="url(#sldGlow)"><path d="M ${symX-5} ${fyB-15} l 9 0 l -5 7 l 8 0 l -12 14 l 4 -10 l -7 0 z" fill="#ff3b5c"/></g>`;
      extra += `<text x="${symX}" y="${fyB-19}" text-anchor="middle" font-size="9" font-weight="800" fill="#ff6b82">${lang==='da'?'2. FEJL':'2nd FAULT'}</text>`;
    } else if(sldEarthing==='IT'){
      peRoute = `M ${symX} ${fy} L ${symX} ${belowY} L ${peX} ${belowY} L ${peX} ${busTop} L ${srcX} ${busTop} L ${srcX} ${feedY+16}`;
      dots = 1; dur = '3.0'; fcol = '#ffd27a';
      retNote = lang==='da' ? 'IT: 1. fejl → lille fejlstrøm (isoleret/Z) — INGEN udkobling, IMD ALARMERER. 2. fejl på anden fase → udkobling.' : 'IT: 1st fault → small fault current (isolated/Z) — NO disconnection, IMD ALARMS. 2nd fault on another phase → disconnection.';
    } else {
      peRoute = `M ${symX} ${fy} L ${symX} ${belowY} L ${peX} ${belowY} L ${peX} ${busTop} L ${srcX} ${busTop} L ${srcX} ${feedY+24}`;
      dots = 5; dur = '1.0';
      retNote = (sldEarthing==='TN-C-S')
        ? (lang==='da' ? 'TN-C-S: metallisk retur via PE/PEN — lav impedans, HØJ fejlstrøm → automatsikring + HPFI udløser hurtigt' : 'TN-C-S: metallic return via PE/PEN — low impedance, HIGH current → MCB + RCD trip fast')
        : (lang==='da' ? 'TN-S: metallisk PE-retur hele vejen — lav impedans, HØJ fejlstrøm' : 'TN-S: metallic PE return throughout — low impedance, HIGH current');
    }
    const isIT1 = sldEarthing==='IT' && !itSecond;
    const bcol = isIT1 ? '#ffd27a' : '#ff6b82', bfill = isIT1 ? '#2a2208' : '#2a0a12';
    const banner = isIT1
      ? (lang==='da'?'1. JORDFEJL — IMD ALARM (ingen udkobling)':'1st EARTH FAULT — IMD ALARM (no disconnect)')
      : ((sldEarthing==='IT' && itSecond)
        ? (lang==='da'?'2. JORDFEJL — fase-fase → udkobling':'2nd FAULT — line-line → trips')
        : (lang==='da'?'JORDFEJL — HPFI 30 mA udløser <0,3 s':'EARTH FAULT — RCD 30 mA trips <0.3 s'));
    const flashLbl = (sldEarthing==='IT') ? (lang==='da'?'1. FEJL':'1st FAULT') : (lang==='da'?'JORDFEJL':'EARTH FAULT');
    const resLbl = isIT1 ? 'IMD: alarm' : (lang==='da'?'Reststrøm > 30 mA':'Residual > 30 mA');
    const noteCol = (sldEarthing==='TT'||isIT1) ? '#ffd27a' : '#ff8a9c';
    faultOverlay += `<path d="${peRoute}" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.85"/>`;
    faultOverlay += sldFlow(peRoute, fcol, dots, dur);
    faultOverlay += `<g filter="url(#sldGlow)"><path d="M ${symX-5} ${fy-15} l 9 0 l -5 7 l 8 0 l -12 14 l 4 -10 l -7 0 z" fill="${fcol}"/></g>`;
    faultOverlay += `<text x="${symX}" y="${fy-19}" text-anchor="middle" font-size="9" font-weight="800" fill="${bcol}">${flashLbl}</text>`;
    faultOverlay += `<text x="${brX+brW+10}" y="${fy+12}" font-size="9" fill="${isIT1?'#ffd27a':'#ff8a9c'}">${resLbl}</text>`;
    faultOverlay += `<g filter="url(#sldGlow)"><rect x="${W/2-164}" y="6" width="328" height="24" rx="8" fill="${bfill}" stroke="${bcol}" stroke-width="1.5"/></g>`;
    faultOverlay += `<text x="${W/2}" y="22" text-anchor="middle" font-size="10" font-weight="800" fill="${bcol}">⚡ ${banner}</text>`;
    faultOverlay += `<rect x="${W/2-232}" y="${H-44}" width="464" height="18" rx="6" fill="#0a0f17" opacity="0.78"/>`;
    faultOverlay += `<text x="${W/2}" y="${H-31}" text-anchor="middle" font-size="9" font-weight="700" fill="${noteCol}">${retNote}</text>`;
    faultOverlay += extra;
  }

  return `
  <svg viewBox="0 0 ${W} ${H}" width="100%" style="border-radius:14px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 30px rgba(0,160,255,0.18)" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="sldGrid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0 H0 V26" fill="none" stroke="rgba(80,150,200,0.10)" stroke-width="1"/></pattern>
      <radialGradient id="sldBg" cx="0.3" cy="0" r="1.15"><stop offset="0" stop-color="#0c2236"/><stop offset="0.55" stop-color="#071322"/><stop offset="1" stop-color="#03080f"/></radialGradient>
      <filter id="sldGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect x="0" y="0" width="${W}" height="${H}" fill="url(#sldBg)"/>
    <rect x="0" y="0" width="${W}" height="${H}" fill="url(#sldGrid)"/>
    <text x="22" y="30" font-size="13" font-weight="800" fill="#bfe9ff" filter="url(#sldGlow)">${lang==='da'?'Enstregsdiagram — fasestrøm':'Single-line diagram — phase current'}</text>

    <!-- Transformer -->
    <g filter="url(#sldGlow)">
      <circle cx="82" cy="70" r="20" fill="none" stroke="#ff9a6a" stroke-width="2.5"/>
      <circle cx="82" cy="90" r="20" fill="none" stroke="#ff9a6a" stroke-width="2.5"/>
    </g>
    <text x="82" y="124" text-anchor="middle" font-size="12" fill="#ffb38a" font-weight="700">${trafo} kVA</text>
    <text x="82" y="137" text-anchor="middle" font-size="9" fill="#c9a98a">10/0,4 kV</text>

    <!-- Feed: transformer -> main panel (animated power flow) -->
    <line x1="82" y1="110" x2="82" y2="${feedY}" stroke="#ff9a6a" stroke-width="2.5"/>
    <line x1="82" y1="${feedY}" x2="${busX}" y2="${feedY}" stroke="#ff9a6a" stroke-width="2.5"/>
    <circle r="3.4" fill="#ffd0b0" filter="url(#sldGlow)"><animateMotion dur="2.2s" repeatCount="indefinite" path="M 82 110 L 82 ${feedY} L ${busX} ${feedY}"/></circle>

    <!-- Main panel -->
    <g filter="url(#sldGlow)"><rect x="${busX-66}" y="${feedY-16}" width="132" height="32" rx="7" fill="#08201a" stroke="#00ffc8" stroke-width="2"/></g>
    <text x="${busX}" y="${feedY+5}" text-anchor="middle" font-size="11" fill="#00ffc8" font-weight="800">${lang==='da'?'HOVEDTAVLE':'MAIN PANEL'} · IB ${ib.toFixed(0)} A</text>

    ${bars}
    ${earthViz}
    ${rows}
    ${gauge}
    ${faultOverlay}
    ${legend}
    <text x="${W-18}" y="${H-14}" text-anchor="end" font-size="9.5" fill="#5b7790">${cons.length} ${lang==='da'?'grupper':'circuits'} · El-Dimensionering</text>
  </svg>`;
}

// Optional online AI painting
async function genAiPainting(){
  const cfg = JSON.parse(localStorage.getItem('aiElectricianCfg')||'{}');
  const imgCfg = JSON.parse(localStorage.getItem('aiImgCfg')||'{}');
  const box = document.getElementById('aiImgBox');
  if(!imgCfg.endpoint || !imgCfg.key){
    if(box) box.innerHTML = '<div class="info-row">'+(lang==='da'?'Online AI-billede ikke konfigureret. Klik "Indstil AI-billede".':'Online AI image not configured. Click "Configure AI image".')+'</div>';
    return;
  }
  if(box) box.innerHTML = '<div class="info-row">'+(lang==='da'?'Genererer AI-maleri…':'Generating AI painting…')+'</div>';
  const sch = calcLoadSchedule();
  const prompt = (lang==='da'?'Fotorealistisk maleri af en dansk eltavle-installation: ':'Photorealistic painting of a Danish electrical switchboard installation: ')
    + (loadList.length?loadList.length:4)+' grupper, '+(TRAFO_SIZES.find(t=>t>=sch.kVA)||630)+' kVA transformer, neon blue glow, clean industrial, professional';
  try{
    const res = await fetch(imgCfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+imgCfg.key},
      body:JSON.stringify({model:imgCfg.model||'dall-e-3',prompt:prompt,n:1,size:'1024x1024'})});
    const data = await res.json();
    const url = data.data && data.data[0] && (data.data[0].url || ('data:image/png;base64,'+data.data[0].b64_json));
    if(box) box.innerHTML = url ? '<img src="'+url+'" style="width:100%;border-radius:12px;border:1px solid var(--line)">' : '<div class="info-row">'+(lang==='da'?'Intet billede modtaget.':'No image received.')+'</div>';
  }catch(e){ if(box) box.innerHTML = '<div class="info-row">'+(lang==='da'?'Fejl: ':'Error: ')+e.message+'</div>'; }
}
function configAiImg(){
  const cur = JSON.parse(localStorage.getItem('aiImgCfg')||'{}');
  const ep = prompt(lang==='da'?'Billede-API endpoint (OpenAI-kompatibel images):':'Image API endpoint (OpenAI-compatible images):', cur.endpoint||'https://api.openai.com/v1/images/generations');
  if(ep===null) return; const key = prompt('API key:', cur.key||''); if(key===null) return;
  const model = prompt('Model:', cur.model||'dall-e-3'); if(model===null) return;
  localStorage.setItem('aiImgCfg', JSON.stringify({endpoint:ep.trim(),key:key.trim(),model:model.trim()}));
  alert(lang==='da'?'Gemt. Klik "Generér AI-maleri".':'Saved. Click "Generate AI painting".');
}

// ===== GENERATIVE 3D INSTALLATION DRAWING (highest quality) =====
// Data-driven: draws ANY installation from a composable node graph.
const NODE_TYPES = {
  grid:{da:'EL-net',en:'Grid',color:'#7fc8ff',icon:'\u26A1'},
  trafo:{da:'Trafostation',en:'Transformer',color:'#ff8a5c',icon:'\uD83D\uDD0C'},
  meter:{da:'M\u00E5ler',en:'Meter',color:'#ffd166',icon:'\uD83D\uDCCA'},
  panel:{da:'Hovedtavle',en:'Main panel',color:'#00ffc8',icon:'\uD83D\uDCCB'},
  subpan:{da:'Undertavle',en:'Sub-panel',color:'#9fe6ff',icon:'\uD83D\uDCE6'},
  motor:{da:'Motor',en:'Motor',color:'#00d0ff',icon:'\u2699\uFE0F'},
  ev:{da:'EV-lader',en:'EV charger',color:'#a0ff80',icon:'\uD83D\uDE97'},
  pv:{da:'Solcelle/PV',en:'Solar PV',color:'#ffee55',icon:'\u2600\uFE0F'},
  battery:{da:'Batteri',en:'Battery',color:'#80ffcc',icon:'\uD83D\uDD0B'},
  gen:{da:'Generator',en:'Generator',color:'#ff9955',icon:'\uD83C\uDFED'},
  load:{da:'Forbrugere',en:'Consumers',color:'#ffd166',icon:'\uD83C\uDFE0'},
  custom:{da:'Andet',en:'Custom',color:'#cc88ff',icon:'\uD83D\uDD27'}
};
let drawNodes = null;
function getDrawNodes(){
  if(drawNodes) return drawNodes;
  const sch=(typeof calcLoadSchedule==='function')?calcLoadSchedule():{kVA:18.5,ib:30};
  const trafo=(typeof TRAFO_SIZES!=='undefined')?(TRAFO_SIZES.find(t=>t>=(loadList.length?sch.kVA:18.5))||630):630;
  const ib=loadList.length?sch.ib:30;
  return [{type:'grid',label:'60 kV'},{type:'trafo',label:trafo+' kVA'},{type:'panel',label:'IB '+ib.toFixed(0)+' A'},{type:'load',label:(loadList.length||4)+' '+(lang==='da'?'grupper':'circuits')}];
}
function drawNodeAdd(type){if(!drawNodes)drawNodes=[...getDrawNodes()];drawNodes.push({type,label:''});renderModule('draw');}
function drawNodeRemove(i){if(!drawNodes)drawNodes=[...getDrawNodes()];drawNodes.splice(i,1);renderModule('draw');}
function drawNodeMove(i,d){if(!drawNodes)drawNodes=[...getDrawNodes()];const j=i+d;if(j<0||j>=drawNodes.length)return;[drawNodes[i],drawNodes[j]]=[drawNodes[j],drawNodes[i]];renderModule('draw');}
function drawNodeReset(){drawNodes=null;renderModule('draw');}

// High-quality neon isometric 3D scene renderer. Data-driven from a node list.
// Used by the Drawing module AND the Analyzing Brain module. Premium, sell-grade.
let _sceneSeq = 0;
function neonScene(nodes, opts){
  opts = opts || {};
  if(!nodes || !nodes.length) nodes = [{type:'panel',label:''}];
  const sq = 's' + (_sceneSeq++) + '_';
  const title = opts.title || ((lang==='da'?'3D installationsskitse':'3D installation scene'));
  const n = nodes.length;
  const sp = 188, padX = 100, bw = 96, bd = 50, bh = 122;
  const W = Math.max(860, padX*2 + (n-1)*sp + bd + 40);
  const H = 480, gY = 348;
  const dxp = bd*0.46, dyp = bd*0.46, vpX = W/2;
  let defs = '', g = '';

  // ---- per-node gradients (shaded faces, glow halo) ----
  nodes.forEach((nd,i)=>{
    const C = (NODE_TYPES[nd.type]||NODE_TYPES.custom).color;
    defs += `
      <linearGradient id="${sq}f${i}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${C}" stop-opacity="0.52"/>
        <stop offset="0.55" stop-color="${C}" stop-opacity="0.12"/>
        <stop offset="1" stop-color="#040b15" stop-opacity="0.96"/></linearGradient>
      <linearGradient id="${sq}t${i}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="${C}" stop-opacity="0.9"/>
        <stop offset="1" stop-color="${C}" stop-opacity="0.28"/></linearGradient>
      <linearGradient id="${sq}s${i}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#02080f" stop-opacity="0.96"/>
        <stop offset="1" stop-color="${C}" stop-opacity="0.24"/></linearGradient>
      <radialGradient id="${sq}h${i}" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="${C}" stop-opacity="0.6"/>
        <stop offset="1" stop-color="${C}" stop-opacity="0"/></radialGradient>`;
  });
  // ---- shared defs: deep-space sky, neon horizon, glow + shadow filters ----
  defs += `
    <radialGradient id="${sq}sky" cx="0.5" cy="0.16" r="0.95">
      <stop offset="0" stop-color="#0b2138"/><stop offset="0.5" stop-color="#050e1a"/><stop offset="1" stop-color="#01040a"/></radialGradient>
    <radialGradient id="${sq}vig" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset="0.7" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.5"/></radialGradient>
    <linearGradient id="${sq}hz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d0ff" stop-opacity="0"/><stop offset="0.5" stop-color="#00e5ff" stop-opacity="0.95"/><stop offset="1" stop-color="#00d0ff" stop-opacity="0"/></linearGradient>
    <filter id="${sq}glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="${sq}soft" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#000" flood-opacity="0.55"/></filter>
    <filter id="${sq}bk" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="14"/></filter>`;

  // ---- background + depth bokeh + perspective floor ----
  g += `<rect x="0" y="0" width="${W}" height="${H}" fill="url(#${sq}sky)"/>`;
  const bokeh = ['#00c8ff','#8c5cff','#00ffc8','#3b7dd8','#00c8ff'];
  for(let i=0;i<5;i++){ const bx=(W/5)*i+40+(i*37%60), by=40+(i*53%150), br=22+(i*9%26); g += `<circle cx="${bx}" cy="${by}" r="${br}" fill="${bokeh[i]}" opacity="0.08" filter="url(#${sq}bk)"/>`; }
  for(let i=0;i<=16;i++){ const x=(W/16)*i; g += `<line x1="${x}" y1="${H}" x2="${vpX}" y2="${gY}" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>`; }
  for(let i=1;i<=9;i++){ const f=Math.pow(i/9,2); const yy=gY+(H-gY)*f; g += `<line x1="0" y1="${yy}" x2="${W}" y2="${yy}" stroke="rgba(0,200,255,${(0.05+0.13*f).toFixed(3)})" stroke-width="1"/>`; }
  g += `<line x1="0" y1="${gY}" x2="${W}" y2="${gY}" stroke="url(#${sq}hz)" stroke-width="2.5" filter="url(#${sq}glow)"/>`;
  g += `<rect x="0" y="0" width="${W}" height="${H}" fill="url(#${sq}vig)"/>`;

  // ---- glowing curved connectors with 3-phase travelling current (behind boxes) ----
  for(let i=0;i<n-1;i++){
    const C=(NODE_TYPES[nodes[i].type]||NODE_TYPES.custom).color;
    const cx=padX+i*sp, nx=padX+(i+1)*sp, cyMid=gY-bh*0.46;
    const x1=cx+bw/2+dxp, x2=nx-bw/2, midX=(x1+x2)/2;
    const path=`M ${x1} ${cyMid} Q ${midX} ${(cyMid-30).toFixed(0)} ${x2} ${cyMid}`;
    const dur=2+i*0.25;
    g += `<path d="${path}" fill="none" stroke="${C}" stroke-width="3" stroke-linecap="round" opacity="0.5" filter="url(#${sq}glow)"/>`;
    // three phase-coloured current pulses (L1/L2/L3) flowing along the feed
    ['L1','L2','L3'].forEach((pp,k)=>{ g += `<circle r="3.1" fill="${SLD_FLOW[pp]}" filter="url(#${sq}glow)"><animateMotion dur="${dur.toFixed(2)}s" repeatCount="indefinite" path="${path}" begin="${(-(dur/3)*k).toFixed(2)}s"/></circle>`; });
  }

  // ---- nodes: shaded isometric boxes, halo, reflection, glowing icon disc ----
  nodes.forEach((nd,i)=>{
    const nt=NODE_TYPES[nd.type]||NODE_TYPES.custom, C=nt.color;
    const cx=padX+i*sp, topY=gY-bh;
    const front=`${cx-bw/2},${topY} ${cx+bw/2},${topY} ${cx+bw/2},${gY} ${cx-bw/2},${gY}`;
    const top=`${cx-bw/2},${topY} ${cx+bw/2},${topY} ${cx+bw/2+dxp},${topY-dyp} ${cx-bw/2+dxp},${topY-dyp}`;
    const side=`${cx+bw/2},${topY} ${cx+bw/2+dxp},${topY-dyp} ${cx+bw/2+dxp},${gY-dyp} ${cx+bw/2},${gY}`;
    g += `<ellipse cx="${cx+dxp/2}" cy="${gY}" rx="${(bw*0.72).toFixed(0)}" ry="15" fill="url(#${sq}h${i})"/>`;
    g += `<polygon points="${cx-bw/2},${gY} ${cx+bw/2},${gY} ${cx+bw/2},${gY+bh*0.55} ${cx-bw/2},${gY+bh*0.55}" fill="${C}" opacity="0.07"/>`;
    g += `<g filter="url(#${sq}soft)">`;
    g += `<polygon points="${side}" fill="url(#${sq}s${i})" stroke="${C}" stroke-width="1.4" stroke-opacity="0.7"/>`;
    g += `<polygon points="${front}" fill="url(#${sq}f${i})" stroke="${C}" stroke-width="1.8"/>`;
    g += `<polygon points="${top}" fill="url(#${sq}t${i})" stroke="${C}" stroke-width="1.6"/>`;
    g += `</g>`;
    // rim lights (left edge + top edge) for a polished lit look
    g += `<line x1="${cx-bw/2}" y1="${topY}" x2="${cx-bw/2}" y2="${gY}" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>`;
    g += `<line x1="${cx-bw/2}" y1="${topY}" x2="${cx+bw/2}" y2="${topY}" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1"/>`;
    // front-face detail vents (subtle equipment louvres)
    for(let v=0; v<3; v++){ const vy = topY + 24 + v*16; g += `<line x1="${cx-bw/2+14}" y1="${vy}" x2="${cx+bw/2-14}" y2="${vy}" stroke="${C}" stroke-width="1" stroke-opacity="0.22"/>`; }
    // glowing icon disc on the top face
    const ix=cx+dxp*0.5, iy=topY-dyp*0.5;
    g += `<circle cx="${ix}" cy="${iy}" r="18" fill="#03101c" stroke="${C}" stroke-width="1.6" filter="url(#${sq}glow)"><animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="${(2.4+i*0.3).toFixed(1)}s" repeatCount="indefinite"/></circle>`;
    g += `<text x="${ix}" y="${iy+6}" text-anchor="middle" font-size="19">${nt.icon}</text>`;
    // readability chip behind the labels
    const nm = lang==='da'?nt.da:nt.en;
    const lbl = nd.label ? (''+nd.label) : '';
    const chipW = Math.max(nm.length, lbl.length) * 6.6 + 18;
    const chipX = cx + dxp/2 - chipW/2, chipH = lbl ? 34 : 20;
    g += `<rect x="${chipX.toFixed(0)}" y="${gY+14}" width="${chipW.toFixed(0)}" height="${chipH}" rx="7" fill="#04111d" fill-opacity="0.78" stroke="${C}" stroke-opacity="0.45" stroke-width="1"/>`;
    g += `<text x="${cx+dxp/2}" y="${gY+27}" text-anchor="middle" font-size="12" font-weight="800" fill="${C}">${nm}</text>`;
    if(lbl) g += `<text x="${cx+dxp/2}" y="${gY+42}" text-anchor="middle" font-size="11" fill="#cfe6f5">${lbl.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`;
  });

  // ---- ambient floating particles ----
  for(let i=0;i<8;i++){ const px=(W/8)*i+24, r=(1.4+(i%3)).toFixed(1); g += `<circle cx="${px}" cy="${56+(i*29)%150}" r="${r}" fill="#7fe9ff" opacity="0.45"><animate attributeName="opacity" values="0.08;0.65;0.08" dur="${(3+i*0.4).toFixed(1)}s" repeatCount="indefinite"/></circle>`; }

  // ---- title + footer ----
  g += `<text x="24" y="34" font-size="14" font-weight="800" fill="#cdeeff" filter="url(#${sq}glow)">${title}</text>`;
  // phase legend (matches the single-line diagram)
  [['L1','#ff9a4d'],['L2','#e9eef3'],['L3','#cfd6dd']].forEach((p,k)=>{ const lx=24+k*52; g += `<circle cx="${lx}" cy="${H-16}" r="4" fill="${p[1]}"/><text x="${lx+8}" y="${H-12}" font-size="9" fill="#9fb8cc">${p[0]}</text>`; });
  g += `<text x="${W-18}" y="${H-14}" text-anchor="end" font-size="9" fill="#5681a0">El-Dimensionering \u00B7 ${n} ${lang==='da'?'noder':'nodes'}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="border-radius:16px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 34px rgba(0,160,255,0.20);overflow:visible" xmlns="http://www.w3.org/2000/svg"><defs>${defs}</defs>${g}</svg>`;
}

// Time/current trip-curve (log-log) for the selected circuit's MCB, with the prospective
// fault current marked, the required disconnection time, the RCD line for TT/IT, AND the
// upstream main device overlaid to show selectivity (discrimination).
function buildTccCurve(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  let idx = (sldFaultRow>=0 && sldFaultRow<cons.length) ? sldFaultRow : cons.findIndex(c=>['motor','ev','heat','cooker'].includes(sldInferType(c)));
  if(idx<0) idx=0;
  const c = cons[idx];
  const ci = lsConsumerCurrent(c);
  const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
  const cab = recommendCables(cIb)[0];
  const mcb = recommendMCBs(cIb,10)[0];
  if(!mcb) return '';
  const In = mcb.rating, curve = mcb.curve||'C';
  const m = curve==='B'?5:curve==='D'?20:10, Ia = m*In, K = 90;
  const autoL = (c.dist && c.dist>0) ? c.dist : 25;
  const L = sldRunLen>0 ? sldRunLen : autoL;
  const Rkm = cab ? (cab.r!=null?cab.r:(cab.R||0)) : 0;
  const R1R2 = 2*Rkm*(L/1000);
  const Ze = sldEarthing==='TN-C-S'?0.35 : sldEarthing==='TN-S'?0.80 : sldEarthing==='TT'?20 : 0;
  const measZs = sldMeasZsFactor*(Ze+R1R2), Uo=230, Cmin=0.95, rcd = sldEarthing==='TT';
  let If, scen;
  if(sldEarthing==='IT' && !sldITSecond){ If=0.5; scen='it1'; }
  else if(sldEarthing==='IT' && sldITSecond){ If=400/(2*R1R2+0.3); scen='it2'; }
  else { If=(Cmin*Uo)/measZs; scen=(sldEarthing==='TT')?'tt':'tn'; }
  const tReq = scen==='it1' ? null : (sldEarthing==='TT'?0.2:((In<=32)?0.4:5));

  const STD=[6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const nextStd=(v)=>STD.find(x=>x>=v)||STD[STD.length-1];
  let mainIb = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().ib||0) : 0;
  if(!(mainIb>0)){ let pT={L1:0,L2:0,L3:0}; cons.forEach(cc=>{const x=lsConsumerCurrent(cc);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;}); mainIb=Math.max(pT.L1,pT.L2,pT.L3); }
  mainIb = Math.max(mainIb, In*1.25);
  const mainType = mainIb<=63 ? 'mcb' : 'fuse';
  const Inm = Math.max(nextStd(mainIb), nextStd(In));
  const IaM = 10*Inm;
  const mainLbl = mainType==='mcb' ? ('C'+Inm+' A') : ('gG '+Inm+' A');
  const tMain = (I)=> mainType==='mcb'
    ? (I>=IaM?0.02:(I>1.13*Inm?K/((I/Inm)*(I/Inm)-1):Infinity))
    : Math.min(1000, Math.max(0.004, 1056*Math.pow(I/Inm,-4.72)));
  let kVAv = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().kVA||0) : 0;
  if(!(kVAv>0)){ kVAv = cons.reduce((a,cc)=>a+(cc.kW||0),0)/0.9; }
  const trafoK = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=kVAv)||630) : 630;
  const uk = (typeof TRAFO_UK!=='undefined' && TRAFO_UK[trafoK]) ? (TRAFO_UK[trafoK]/100) : 0.04;
  const Ik = trafoK*1000/(Math.sqrt(3)*400*uk)/1000;
  const IcuBr = (mcb.icu!=null?mcb.icu:6);
  const mainProd = mainType==='mcb' ? recommendMCBs(mainIb,10)[0] : (typeof recommendFuses==='function'?recommendFuses(mainIb)[0]:null);
  const IcuMain = mainProd ? (mainProd.icu!=null?mainProd.icu:(mainType==='fuse'?120:10)) : (mainType==='fuse'?120:10);

  const W=720,H=420,mLft=54,mTop=30,pw=W-mLft-18,ph=H-mTop-44;
  const L10=Math.log10;
  const X=(I)=>mLft+(L10(Math.min(Math.max(I,1),100000)))/5*pw;
  const Y=(t)=>mTop+(3-L10(Math.min(Math.max(t,0.01),1000)))/5*ph;
  const tTh=(I)=>K/((I/In)*(I/In)-1);
  const fmt=(t)=> t<0.1?t.toFixed(2):t.toFixed(1);
  let tDisc; if(If>=Ia)tDisc=0.02; else if(If>1.13*In)tDisc=tTh(If); else tDisc=Infinity;

  let g='';
  g += `<rect x="0" y="0" width="${W}" height="${H}" fill="#06101c"/>`;
  for(let e=0;e<5;e++)for(let kk=2;kk<10;kk++){const x=X(Math.pow(10,e)*kk);g+=`<line x1="${x}" y1="${mTop}" x2="${x}" y2="${mTop+ph}" stroke="rgba(0,200,255,0.05)" stroke-width="0.6"/>`;}
  for(let e=0;e<=5;e++){const I=Math.pow(10,e),x=X(I);g+=`<line x1="${x}" y1="${mTop}" x2="${x}" y2="${mTop+ph}" stroke="rgba(0,200,255,0.13)" stroke-width="1"/>`;g+=`<text x="${x}" y="${mTop+ph+13}" text-anchor="middle" font-size="9" fill="#7fa8c4">${I>=1000?(I/1000)+'k':I}A</text>`;}
  const tl={'-2':'0,01s','-1':'0,1s','0':'1s','1':'10s','2':'100s','3':'1000s'};
  for(let e=-2;e<=3;e++){const y=Y(Math.pow(10,e));g+=`<line x1="${mLft}" y1="${y}" x2="${mLft+pw}" y2="${y}" stroke="rgba(0,200,255,0.13)" stroke-width="1"/>`;g+=`<text x="${mLft-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#7fa8c4">${da?tl[e]:tl[e].replace(',','.')}</text>`;}

  let pts=[]; const startI=1.15*In;
  for(let i=0;i<=30;i++){const I=startI*Math.pow(Ia/startI,i/30);let t=tTh(I);if(t>1000)t=1000;pts.push(X(I).toFixed(1)+','+Y(t).toFixed(1));}
  pts.push(X(Ia).toFixed(1)+','+Y(0.02).toFixed(1)); pts.push(X(100000).toFixed(1)+','+Y(0.02).toFixed(1));
  let mpts=[];
  if(mainType==='mcb'){ const sM=1.15*Inm; for(let i=0;i<=30;i++){const I=sM*Math.pow(IaM/sM,i/30);let t=K/((I/Inm)*(I/Inm)-1);if(t>1000)t=1000;mpts.push(X(I).toFixed(1)+','+Y(t).toFixed(1));} mpts.push(X(IaM).toFixed(1)+','+Y(0.02).toFixed(1)); mpts.push(X(100000).toFixed(1)+','+Y(0.02).toFixed(1)); }
  else { const sM=1.3*Inm; for(let i=0;i<=40;i++){const I=sM*Math.pow(100000/sM,i/40);let t=1056*Math.pow(I/Inm,-4.72);if(t>1000)t=1000;if(t<0.004)t=0.004;mpts.push(X(I).toFixed(1)+','+Y(t).toFixed(1));} }
  g += `<polyline points="${mpts.join(' ')}" fill="none" stroke="#ff9a4d" stroke-width="2.2" stroke-dasharray="7 4" opacity="0.9" filter="url(#tccGlow)"/>`;
  g += `<polyline points="${pts.join(' ')}" fill="none" stroke="#00e5ff" stroke-width="2.5" filter="url(#tccGlow)"/>`;
  g += `<line x1="${mLft+pw-168}" y1="13" x2="${mLft+pw-150}" y2="13" stroke="#00e5ff" stroke-width="2.5"/><text x="${mLft+pw-146}" y="16" font-size="8.5" fill="#bfe9ff">${da?'gren':'branch'} ${curve}${In}</text>`;
  g += `<line x1="${mLft+pw-168}" y1="25" x2="${mLft+pw-150}" y2="25" stroke="#ff9a4d" stroke-width="2.5" stroke-dasharray="5 3"/><text x="${mLft+pw-146}" y="28" font-size="8.5" fill="#ffcaa0">${da?'hoved':'main'} ${mainLbl}</text>`;

  // --- Cable thermal damage curve (IEC 60364-4-43): t = k²S² / I² ---
  const _cblS = cab ? cab.mm2 : 2.5;
  const _cblXlpe = cab ? /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(cab.model||'') : false;
  const _cblMat = cab ? cab.material : 'Cu';
  const cabDmgK = (_cblMat==='Cu') ? (_cblXlpe ? 143 : 115) : (_cblXlpe ? 94 : 76);
  const cabDmgS = _cblS;   // cable mm²
  const cabDmgStart = Math.max(If, cIb, In); // start from Ief or IB (whichever is higher)
  let cblPts = [];
  for(let i=0; i<=50; i++){
    const I = cabDmgStart * Math.pow(100000/cabDmgStart, i/50);
    const tCab = (cabDmgK*cabDmgK*cabDmgS*cabDmgS)/(I*I);
    if(tCab > 1000) continue;
    if(tCab < 0.01) continue;
    cblPts.push(X(I).toFixed(1)+','+Y(tCab).toFixed(1));
  }
  if(cblPts.length > 1){
    g += `<polyline points="${cblPts.join(' ')}" fill="none" stroke="#ff3b5c" stroke-width="2" stroke-dasharray="6 3" opacity="0.85" filter="url(#tccGlow)"/>`;
  }
  g += `<line x1="${mLft+pw-168}" y1="37" x2="${mLft+pw-150}" y2="37" stroke="#ff3b5c" stroke-width="2" stroke-dasharray="4 2"/><text x="${mLft+pw-146}" y="40" font-size="8.5" fill="#ff7a8f">${da?'kabelgrænse':'cable limit'} (k\u00B2S\u00B2/I\u00B2)</text>`;


  g += `<line x1="${X(In)}" y1="${mTop}" x2="${X(In)}" y2="${mTop+ph}" stroke="#6aa8c8" stroke-width="1" stroke-dasharray="3 3"/><text x="${X(In)}" y="${mTop-4}" text-anchor="middle" font-size="8" fill="#9fb8cc">In ${In}A</text>`;
  g += `<line x1="${X(Ia)}" y1="${mTop}" x2="${X(Ia)}" y2="${mTop+ph}" stroke="#6aa8c8" stroke-width="1" stroke-dasharray="2 4"/><text x="${X(Ia)}" y="${mTop-4}" text-anchor="middle" font-size="8" fill="#9fb8cc">Ia ${Ia}A</text>`;
  if(tReq){const tc = rcd?'#3fcf7a':'#ffd27a'; const tlb = rcd?(da?'HPFI 30 mA ≤'+tReq+'s':'RCD 30 mA ≤'+tReq+'s'):((da?'krav ':'req ')+tReq+'s'); g+=`<line x1="${mLft}" y1="${Y(tReq)}" x2="${mLft+pw}" y2="${Y(tReq)}" stroke="${tc}" stroke-width="1.4" stroke-dasharray="6 4"/><text x="${mLft+pw}" y="${Y(tReq)-4}" text-anchor="end" font-size="8.5" fill="${tc}">${tlb}</text>`;}
  const ifCol = scen==='it1' ? '#ffd27a' : '#ff3b5c';
  g += `<line x1="${X(If)}" y1="${mTop}" x2="${X(If)}" y2="${mTop+ph}" stroke="${ifCol}" stroke-width="2" filter="url(#tccGlow)"/>`;
  g += `<text x="${X(If)}" y="${mTop+ph+27}" text-anchor="middle" font-size="9" font-weight="700" fill="${ifCol}">Ief ${If<1?'<1':If.toFixed(0)} A</text>`;
  if(isFinite(tDisc)){g+=`<circle cx="${X(If)}" cy="${Y(tDisc)}" r="5" fill="#ffffff" stroke="${ifCol}" stroke-width="2" filter="url(#tccGlow)"/><text x="${X(If)+8}" y="${Y(tDisc)-6}" font-size="9" font-weight="700" fill="#e6f4ff">t≈${fmt(tDisc)} s</text>`;}

  g += `<line x1="${X(Ik*1000)}" y1="${mTop}" x2="${X(Ik*1000)}" y2="${mTop+ph}" stroke="#c08cff" stroke-width="2" stroke-dasharray="2 3" filter="url(#tccGlow)"/>`;
  g += `<text x="${X(Ik*1000)}" y="${mTop+ph+38}" text-anchor="middle" font-size="9" font-weight="700" fill="#c08cff">Ik ${Ik.toFixed(1)} kA</text>`;
  let buTxt, buCol;
  if(Ik<=IcuBr){ buCol='var(--success)'; buTxt = da?('Kortslutning: Ik≈'+Ik.toFixed(1)+' kA ≤ gren-brydeevne ('+IcuBr+' kA) → gren-værnet er tilstrækkeligt alene.'):('Short circuit: Ik≈'+Ik.toFixed(1)+' kA ≤ branch breaking capacity ('+IcuBr+' kA) → the branch device is adequate alone.'); }
  else if(Ik<=IcuMain){ buCol='var(--warning-text)'; buTxt = da?('Back-up: Ik≈'+Ik.toFixed(1)+' kA > gren-Icu ('+IcuBr+' kA) men ≤ hoved-Icu ('+IcuMain+' kA) → CASCADING: hovedværnet understøtter grenen (brug producentens back-up-tabel).'):('Back-up: Ik≈'+Ik.toFixed(1)+' kA > branch Icu ('+IcuBr+' kA) but ≤ main Icu ('+IcuMain+' kA) → CASCADING: the main backs up the branch (use the maker back-up table).'); }
  else { buCol='var(--danger)'; buTxt = da?('⚠ Ik≈'+Ik.toFixed(1)+' kA overstiger begge brydeevner ('+IcuBr+'/'+IcuMain+' kA) → vælg højere Icu eller strømbegrænsende værn.'):('⚠ Ik≈'+Ik.toFixed(1)+' kA exceeds both breaking capacities ('+IcuBr+'/'+IcuMain+' kA) → choose higher Icu or current-limiting devices.'); }
  let cls,cap;
  if(scen==='it1'){cls='warning';cap=da?'IT 1. fejl: fejlstrømmen er meget lille (langt til venstre for In) → ingen overstrømsudkobling; IMD alarmerer.':'IT 1st fault: the fault current is tiny (far left of In) → no overcurrent trip; the IMD alarms.';}
  else if(rcd){cls='ok';cap=da?('Ief ('+If.toFixed(0)+' A) er under In → automatsikringen udkobler ikke; HPFI 30 mA sikrer udkobling ≤'+tReq+' s (grøn linje).'):('Ief ('+If.toFixed(0)+' A) is below In → the MCB will not trip; the 30 mA RCD ensures disconnection ≤'+tReq+' s (green line).');}
  else {const ok=isFinite(tDisc)&&tDisc<=tReq;cls=ok?'ok':(isFinite(tDisc)?'warning':'error');cap=ok?(da?('✓ Ief skærer gren-kurven ved t≈'+fmt(tDisc)+' s ≤ '+tReq+' s — opfyldt.'):('✓ Ief crosses the branch curve at t≈'+fmt(tDisc)+' s ≤ '+tReq+' s — met.')):(isFinite(tDisc)?(da?('⚠ t≈'+fmt(tDisc)+' s > '+tReq+' s — for langsomt; brug HPFI, større tværsnit eller kortere kabel.'):('⚠ t≈'+fmt(tDisc)+' s > '+tReq+' s — too slow; use an RCD, larger csa or shorter cable.')):(da?'⚠ Ief ≤ In → automatsikringen udkobler ikke; HPFI nødvendig.':'⚠ Ief ≤ In → the MCB will not trip; an RCD is required.'));}

  let selTxt, selCol;
  if(!isFinite(tDisc)){ selTxt = da?'Gren udkobler ikke på overstrøm — selektivitet sikres via HPFI/tid.':'Branch does not trip on overcurrent — selectivity via RCD/time.'; selCol='var(--warning-text)'; }
  else { const tm=tMain(If); const ratio = isFinite(tm)? tm/tDisc : 999; const selOk = ratio>=1.5; selCol = selOk?'var(--success)':'var(--warning-text)';
    selTxt = da ? ('Selektivitet ved Ief: gren t≈'+fmt(tDisc)+' s vs hoved ('+mainLbl+') t≈'+(isFinite(tm)?fmt(tm):'>1000')+' s → '+(selOk?'SELEKTIV ✓ — kun gruppen kobler ud':'IKKE fuld selektiv ⚠ — hovedværn kan også udløse')) : ('Selectivity at Ief: branch t≈'+fmt(tDisc)+' s vs main ('+mainLbl+') t≈'+(isFinite(tm)?fmt(tm):'>1000')+' s → '+(selOk?'SELECTIVE ✓ — only the circuit trips':'NOT fully selective ⚠ — main may also trip')); }

  // --- I²t adiabatic energy let-through (IEC 60364-4-43 clause 434.5.2) ---
  const cabS = cab ? cab.mm2 : 2.5;
  const cabXlpe = cab ? /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(cab.model||'') : false;
  const cabMat = cab ? cab.material : 'Cu';
  const kAdiab = (cabMat==='Cu') ? (cabXlpe ? 143 : 115) : (cabXlpe ? 94 : 76);
  const cableI2tLimit = kAdiab * kAdiab * cabS * cabS;
  // Branch device I²t: MCB → Ief² × t_disconnect
  const brI2t = (isFinite(tDisc) && tDisc>0) ? (If*If*tDisc) : (If*If*0.02);
  // Main device I²t: for fuses use simplified gG formula K*In^β, for MCBs use Ief²*t
  const mainI2tCalc = mainType==='fuse' ? (80000*Math.pow(Inm,1.8)) : (function(){ const tmv=tMain(If); return (isFinite(tmv)&&tmv>0)?(If*If*tmv):(If*If*0.02); })();
  const i2tBrOk = brI2t <= cableI2tLimit;
  const i2tMainOk = mainI2tCalc <= cableI2tLimit;
  const i2tOk = i2tBrOk; // cable protection is primarily the branch device's job
  const i2tCol = i2tOk ? 'var(--success)' : 'var(--danger)';
  const i2tVerdict = i2tOk
    ? (da ? '✓ Kablet tåler energigennemløbet (I²t) — adiabatisk kontrol opfyldt.' : '✓ Cable withstands the energy let-through (I²t) — adiabatic check met.')
    : (da ? '⚠ Kablet kan blive beskadiget — I²t overstiger k²S² grænsen. Vælg større tværsnit eller hurtigere udkobling.' : '⚠ Cable may be damaged — I²t exceeds k²S² limit. Choose larger cross-section or faster disconnection.');
  const fmtI2t = (v) => v>=1e6 ? (v/1e6).toFixed(1)+'M' : v>=1e3 ? (v/1e3).toFixed(1)+'k' : v.toFixed(0);

  return `<div class="card fade-in"><div class="card-title">📈 ${da?'Kurve, selektivitet & brydeevne':'Curve, selectivity & breaking capacity'} — ${curve}${In} · ⏚ ${sldEarthing}</div>`
    + `<svg viewBox="0 0 ${W} ${H}" width="100%" style="border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg"><defs><filter id="tccGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${g}<text x="${mLft}" y="16" font-size="11" font-weight="800" fill="#bfe9ff">${da?'Tid (log) vs strøm (log)':'Time (log) vs current (log)'}</text></svg>`
    + `<div class="result-box ${cls}" style="margin-top:10px"><div class="result-row"><span class="label" style="line-height:1.5">${cap}</span></div><div class="result-row"><span class="label" style="line-height:1.5;color:${selCol}">⛓ ${selTxt}</span></div><div class="result-row"><span class="label" style="line-height:1.5;color:${buCol}">🔌 ${buTxt}</span></div><div class="result-row"><span class="label" style="line-height:1.5;color:${i2tCol}">⚡ I²t: ${da?'Gren':'Branch'} ${fmtI2t(brI2t)} A²s | ${da?'Hoved':'Main'} ${fmtI2t(mainI2tCalc)} A²s | ${da?'Kabelgrænse':'Cable limit'} k²S²=${fmtI2t(cableI2tLimit)} A²s (k=${kAdiab}, S=${cabS} mm²) → ${i2tVerdict}</span></div></div>`
    + `<div style="font-size:0.68rem;font-style:italic;color:var(--text-muted);margin-top:6px;opacity:0.85;line-height:1.6">\u{1F4D6} ${da?'Ref: Selektivitet':'Ref: Selectivity'}: DS/HD 60364-4-43 \u00A7435 | I\u00B2t: DS/HD 60364-4-43 \u00A7434.5.2 | ${da?'Cascading/back-up':'Cascading/back-up'}: IEC 60947-2 Annex A \u00B7 <a href="https://sikkerhedsstyrelsen.dk" target="_blank" style="color:var(--primary-light)">sik.dk</a></div></div>`;
}

// Printable protection-coordination report (IEC 60364 adiabatic, selectivity, cascading)
// Shows on print (class print-only inverted), summary of ALL coordination for selected circuit.
// Protection-coordination dashboard summary — compact visual card
function buildCoordDashboard(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  const STD=[6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const nextStd=(v)=>STD.find(x=>x>=v)||STD[STD.length-1];
  const K=90;
  // Main device
  let mainIb = 0;
  let pT={L1:0,L2:0,L3:0}; cons.forEach(cc=>{const x=lsConsumerCurrent(cc);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;});
  mainIb=Math.max(pT.L1,pT.L2,pT.L3);
  const firstMcb = recommendMCBs(cons[0]?(Math.max(...Object.values(lsConsumerCurrent(cons[0])).filter(v=>typeof v==='number'))):16,10)[0];
  const firstIn = firstMcb?firstMcb.rating:16;
  mainIb = Math.max(mainIb, firstIn*1.25);
  const mainType = mainIb<=63 ? 'mcb' : 'fuse';
  const Inm = Math.max(nextStd(mainIb), nextStd(firstIn));
  const IaM = 10*Inm;
  const tMain = (I)=> mainType==='mcb'
    ? (I>=IaM?0.02:(I>1.13*Inm?K/((I/Inm)*(I/Inm)-1):Infinity))
    : Math.min(1000, Math.max(0.004, 1056*Math.pow(I/Inm,-4.72)));
  let kVAv = cons.reduce((a,cc)=>a+(cc.kW||0),0)/0.9;
  const trafoK = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=kVAv)||630) : 630;
  const uk = (typeof TRAFO_UK!=='undefined' && TRAFO_UK[trafoK]) ? (TRAFO_UK[trafoK]/100) : 0.04;
  const Ik = trafoK*1000/(Math.sqrt(3)*400*uk)/1000;

  let total=0, passAll=0, issues=[];
  cons.forEach((c,i)=>{
    total++;
    const ci = lsConsumerCurrent(c);
    const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
    const cab = recommendCables(cIb)[0];
    const mcb = recommendMCBs(cIb,10)[0];
    if(!mcb){ issues.push({name:c.name||('K'+(i+1)),msg:da?'Ingen MCB fundet':'No MCB found'}); return; }
    const In = mcb.rating, curve = mcb.curve||'C';
    const Iz = cab ? officialIz(cab) : cIb*1.25;
    const m = curve==='B'?5:curve==='D'?20:10, Ia = m*In;
    // Check 1: IB <= In <= Iz
    const chk1 = (cIb <= In) && (In <= Iz);
    // Fault current
    const autoL = (c.dist && c.dist>0) ? c.dist : 25;
    const L = sldRunLen>0 ? sldRunLen : autoL;
    const Rkm = cab ? (cab.r!=null?cab.r:(cab.R||0)) : 0;
    const R1R2 = 2*Rkm*(L/1000);
    const Ze = sldEarthing==='TN-C-S'?0.35 : sldEarthing==='TN-S'?0.80 : sldEarthing==='TT'?20 : 0;
    const measZs = sldMeasZsFactor*(Ze+R1R2), Uo=230, Cmin=0.95;
    let If;
    if(sldEarthing==='IT' && !sldITSecond){ If=0.5; }
    else if(sldEarthing==='IT' && sldITSecond){ If=400/(2*R1R2+0.3); }
    else { If=(Cmin*Uo)/measZs; }
    const tReq = (sldEarthing==='IT'&&!sldITSecond) ? null : (sldEarthing==='TT'?0.2:((In<=32)?0.4:5));
    // Check 2: Zs disconnection
    let tDisc;
    if(If>=Ia) tDisc=0.02;
    else if(If>1.13*In) tDisc=K/((If/In)*(If/In)-1);
    else tDisc=Infinity;
    const chk2 = (tReq===null) || (sldEarthing==='TT') || (isFinite(tDisc) && tDisc<=tReq);
    // Check 3: I²t adiabatic
    const cabS = cab ? cab.mm2 : 2.5;
    const cabXlpe = cab ? /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(cab.model||'') : false;
    const cabMat = cab ? cab.material : 'Cu';
    const kAdiab = (cabMat==='Cu') ? (cabXlpe ? 143 : 115) : (cabXlpe ? 94 : 76);
    const cableI2tLimit = kAdiab * kAdiab * cabS * cabS;
    const brI2t = (isFinite(tDisc) && tDisc>0) ? (If*If*tDisc) : (If*If*0.02);
    const chk3 = brI2t <= cableI2tLimit;
    // Check 4: Selectivity
    let tBranch = tDisc;
    const tM = tMain(If);
    const ratio = (isFinite(tBranch) && isFinite(tM)) ? tM/tBranch : 999;
    const chk4 = !isFinite(tBranch) || ratio >= 1.0;
    // Aggregate
    const circName = c.name||('K'+(i+1));
    if(chk1 && chk2 && chk3 && chk4){ passAll++; }
    else {
      let fixes = [];
      if(!chk1) fixes.push(da?'IB≤In≤Iz fejler — vælg større kabel eller mindre In':'IB≤In≤Iz fails — choose larger cable or smaller In');
      if(!chk2) fixes.push(da?'Zs-udkobling for langsom — HPFI eller kortere kabel':'Zs disconnection too slow — add RCD or shorter cable');
      if(!chk3) fixes.push(da?'I²t overstiger kabelgrænse — større tværsnit':'I²t exceeds cable limit — larger cross-section');
      if(!chk4) fixes.push(da?'Selektivitet ikke opfyldt — koordiner med hovedværn':'Selectivity not met — coordinate with main');
      issues.push({name:circName, msg:fixes.join('; ')});
    }
  });

  const pct = total>0 ? Math.round(100*passAll/total) : 100;
  const barCol = pct===100 ? 'var(--success)' : pct>=75 ? '#ffd166' : 'var(--danger)';
  const needAtt = total - passAll;

  let issueHtml = '';
  if(issues.length>0){
    issueHtml = `<div style="margin-top:10px"><div style="font-weight:700;margin-bottom:4px;font-size:0.82rem;color:var(--danger)">${da?'Kredse der kræver handling':'Circuits needing attention'}:</div>`;
    issues.forEach(iss=>{
      issueHtml += `<div class="info-row" style="margin:3px 0;font-size:0.78rem;padding:4px 8px;background:var(--danger-bg);border-radius:6px"><strong>${iss.name}</strong>: ${iss.msg}</div>`;
    });
    issueHtml += `</div>`;
  }

  return `<div class="card fade-in" style="border-left:4px solid ${barCol}"><div class="card-title">\u{1F4CA} ${da?'Koordineringsoversigt':'Coordination overview'} \u00B7 \u23DA ${sldEarthing}</div>
  <div class="info-row" style="margin-bottom:4px">${da?'Automatisk kontrol af IB\u2264In\u2264Iz, Zs-udkobling, I\u00B2t adiabatisk og selektivitet for alle kredse.':'Automatic check of IB\u2264In\u2264Iz, Zs disconnection, I\u00B2t adiabatic and selectivity for all circuits.'}</div>
  <div style="font-size:0.68rem;font-style:italic;color:var(--text-muted);margin-bottom:10px;opacity:0.85">${da?'Baseret p\u00E5 DS/HD 60364':'Based on DS/HD 60364'} \u00B7 <a href="https://sikkerhedsstyrelsen.dk" target="_blank" style="color:var(--primary-light)">sik.dk</a></div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px">
    <div class="result-box ok" style="flex:1;min-width:100px;text-align:center;padding:12px"><div style="font-size:2rem;font-weight:800;color:var(--text)">${total}</div><div style="font-size:0.75rem;color:var(--text-light)">${da?'kredse kontrolleret':'circuits checked'}</div></div>
    <div class="result-box ok" style="flex:1;min-width:100px;text-align:center;padding:12px"><div style="font-size:2rem;font-weight:800;color:var(--success)">${passAll}</div><div style="font-size:0.75rem;color:var(--text-light)">${da?'bestået alle':'pass all'}</div></div>
    <div class="result-box ${needAtt>0?'error':'ok'}" style="flex:1;min-width:100px;text-align:center;padding:12px"><div style="font-size:2rem;font-weight:800;color:${needAtt>0?'var(--danger)':'var(--success)'}">${needAtt}</div><div style="font-size:0.75rem;color:var(--text-light)">${da?'kræver handling':'need attention'}</div></div>
  </div>
  <div style="background:var(--border-light);border-radius:8px;height:18px;overflow:hidden;margin-bottom:6px">
    <div style="width:${pct}%;height:100%;background:${barCol};border-radius:8px;transition:width 0.5s ease"></div>
  </div>
  <div style="text-align:center;font-size:0.8rem;font-weight:700;color:${barCol}">${pct}% ${da?'opfyldt':'compliant'}</div>
  ${issueHtml}
  </div>`;
}

// Discrimination table — selectivity matrix of all circuits vs main device
function buildDiscrimTable(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  const STD=[6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const nextStd=(v)=>STD.find(x=>x>=v)||STD[STD.length-1];
  const K=90;
  // Main device
  let mainIb = 0;
  let pT={L1:0,L2:0,L3:0}; cons.forEach(cc=>{const x=lsConsumerCurrent(cc);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;});
  mainIb=Math.max(pT.L1,pT.L2,pT.L3);
  const firstMcb = recommendMCBs(cons[0]?(Math.max(...Object.values(lsConsumerCurrent(cons[0])).filter(v=>typeof v==='number'))):16,10)[0];
  const firstIn = firstMcb?firstMcb.rating:16;
  mainIb = Math.max(mainIb, firstIn*1.25);
  const mainType = mainIb<=63 ? 'mcb' : 'fuse';
  const Inm = Math.max(nextStd(mainIb), nextStd(firstIn));
  const IaM = 10*Inm;
  const mainLbl = mainType==='mcb' ? ('C'+Inm+' A') : ('gG '+Inm+' A');
  const tMain = (I)=> mainType==='mcb'
    ? (I>=IaM?0.02:(I>1.13*Inm?K/((I/Inm)*(I/Inm)-1):Infinity))
    : Math.min(1000, Math.max(0.004, 1056*Math.pow(I/Inm,-4.72)));

  let rows = '';
  cons.forEach((c,i)=>{
    const ci = lsConsumerCurrent(c);
    const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
    const cab = recommendCables(cIb)[0];
    const mcb = recommendMCBs(cIb,10)[0];
    if(!mcb) return;
    const In = mcb.rating, curve = mcb.curve||'C';
    const m = curve==='B'?5:curve==='D'?20:10, Ia = m*In;
    const autoL = (c.dist && c.dist>0) ? c.dist : 25;
    const L = sldRunLen>0 ? sldRunLen : autoL;
    const Rkm = cab ? (cab.r!=null?cab.r:(cab.R||0)) : 0;
    const R1R2 = 2*Rkm*(L/1000);
    const Ze = sldEarthing==='TN-C-S'?0.35 : sldEarthing==='TN-S'?0.80 : sldEarthing==='TT'?20 : 0;
    const measZs = sldMeasZsFactor*(Ze+R1R2), Uo=230, Cmin=0.95;
    let If;
    if(sldEarthing==='IT' && !sldITSecond){ If=0.5; }
    else if(sldEarthing==='IT' && sldITSecond){ If=400/(2*R1R2+0.3); }
    else { If=(Cmin*Uo)/measZs; }
    // Branch trip time at If
    let tBranch;
    if(If>=Ia) tBranch=0.02;
    else if(If>1.13*In) tBranch=K/((If/In)*(If/In)-1);
    else tBranch=Infinity;
    // Main trip time at If
    const tM = tMain(If);
    // Selectivity evaluation
    let status, color, label;
    if(!isFinite(tBranch)){
      status='rcd'; color='#ffd166'; label=da?'HPFI/tid':'RCD/time';
    } else {
      const ratio = isFinite(tM) ? tM/tBranch : 999;
      if(ratio >= 1.5){
        status='sel'; color='var(--success)'; label=da?'Selektiv ✓':'Selective ✓';
      } else if(ratio >= 1.0){
        status='backup'; color='#ffd166'; label=da?'Back-up kræves':'Back-up required';
      } else {
        status='no'; color='var(--danger)'; label=da?'Ikke selektiv ✗':'Not selective ✗';
      }
    }
    const circName = c.name || ('K'+(i+1));
    const brLbl = curve+In+'A';
    const fmt=(t)=> t<0.1?t.toFixed(2):t.toFixed(1);
    rows += `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:6px 10px;font-weight:600">${circName}</td>
      <td style="padding:6px 10px;text-align:center">${brLbl}</td>
      <td style="padding:6px 10px;text-align:center">${If<1?'<1':If.toFixed(0)} A</td>
      <td style="padding:6px 10px;text-align:center">${isFinite(tBranch)?fmt(tBranch)+' s':'—'}</td>
      <td style="padding:6px 10px;text-align:center">${isFinite(tM)?fmt(tM)+' s':'—'}</td>
      <td style="padding:6px 10px;text-align:center;font-weight:700;color:${color};background:${status==='sel'?'rgba(6,214,160,0.08)':status==='backup'?'rgba(255,209,102,0.10)':status==='no'?'rgba(239,71,111,0.08)':'rgba(255,209,102,0.08)'};border-radius:6px">${label}</td>
    </tr>`;
  });

  return `<div class="card fade-in"><div class="card-title">⛓ ${da?'Selektivitetstabel':'Discrimination table'} — ${da?'alle kredse vs hoved':'all circuits vs main'} (${mainLbl}) · ⏚ ${sldEarthing}</div>
  <div class="info-row" style="margin-bottom:8px">${da?'Matrixen viser selektiviteten mellem hver gren og hovedværnet ved kredsens forventede fejlstrøm (Ief). Grøn = selektiv, gul = back-up nødvendig, rød = ikke selektiv.':'The matrix shows selectivity between each branch and the main device at the circuit prospective fault current (Ief). Green = selective, amber = back-up needed, red = not selective.'}</div>
  <div style="overflow-x:auto"><table class="data-table" style="width:100%;border-collapse:collapse;font-size:0.82rem">
    <thead><tr style="background:var(--primary-glow);border-bottom:2px solid var(--primary-light)">

// ===== ARC-FLASH ENERGY ESTIMATE (IEEE 1584 simplified for LV) =====
function buildArcFlash(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  // Compute Ik (bolted fault at transformer secondary)
  let kVAv = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().kVA||0) : 0;
  if(!(kVAv>0)){ kVAv = cons.reduce((a,cc)=>a+(cc.kW||0),0)/0.9; }
  const trafoK = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=kVAv)||630) : 630;
  const uk = (typeof TRAFO_UK!=='undefined' && TRAFO_UK[trafoK]) ? (TRAFO_UK[trafoK]/100) : 0.04;
  const Ik = trafoK*1000/(Math.sqrt(3)*400*uk); // Amperes
  // Main device for clearing time
  const STD=[6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const nextStd=(v)=>STD.find(x=>x>=v)||STD[STD.length-1];
  let mainIb = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().ib||0) : 0;
  if(!(mainIb>0)){ let pT={L1:0,L2:0,L3:0}; cons.forEach(cc=>{const x=lsConsumerCurrent(cc);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;}); mainIb=Math.max(pT.L1,pT.L2,pT.L3); }
  const firstIn = cons[0] ? (recommendMCBs(Math.max(...Object.values(lsConsumerCurrent(cons[0])).filter(v=>typeof v==='number')),10)[0]||{rating:16}).rating : 16;
  mainIb = Math.max(mainIb, firstIn*1.25);
  const mainType = mainIb<=63 ? 'mcb' : 'fuse';
  const Inm = Math.max(nextStd(mainIb), nextStd(firstIn));
  const IaM = 10*Inm;
  const K=90;
  // Arc duration = clearing time of main device at Ik
  let tArc;
  if(mainType==='mcb'){
    if(Ik>=IaM) tArc=0.02;
    else if(Ik>1.13*Inm) tArc=K/((Ik/Inm)*(Ik/Inm)-1);
    else tArc=5;
  } else {
    tArc = Math.min(5, Math.max(0.004, 1056*Math.pow(Ik/Inm,-4.72)));
  }
  tArc = Math.max(tArc, 0.01); // minimum realistic arc time
  // IEEE 1584 simplified for LV (<= 1kV)
  // E = 5.12e-8 * V * Ibf * t / D^2  (cal/cm^2)
  const Voc = 400; // 3-phase system voltage
  const D = 455;   // working distance mm (IEEE 1584 typical for LV panels)
  const E = 5.12e-8 * Voc * Ik * tArc / (D*D/(1000*1000)); // D in mm -> (D/1000)^2 in m^2... 
  // Correct formula: E (cal/cm^2) = 5.12×10^-8 × V × Ibf(A) × t(s) / D^2(mm converted)
  // Actually per IEEE 1584 simplified box approach: E_n = K1*K2*Cf*En (log domain)
  // Simpler Lee method for LV: E = 5.12×10^5 × V × Ibf × t / D^2  with D in mm
  // Let's use the simplified Lee method adapted:
  // E (J/cm^2) = V × Ibf × t / (4π × D^2) ... then /4.184 for cal
  // Standard simplified for training: E = Cf × Voc × Ibf × t / D^2 where Cf calibration
  // We use: E(cal/cm^2) ≈ 0.0093 × Ibf × t × (610^x / D^x) ... 
  // Let's use the straightforward simplified formula from the task:
  // E (cal/cm^2) ≈ 5.12 × 10^-8 × V × Ibf × t / D^2  (D in some unit)
  // For IEEE 1584-2002 simplified (< 600V): E = 4.184 × Cf × En × (t/0.2) × (610/D)^x
  // For TEACHING purposes, use the direct formula given in the task spec:
  const Ecalc = 5.12e-8 * Voc * Ik * (tArc * 1000) / ((D/25.4)*(D/25.4));
  // Simplified: let's just use the clear formula from IEEE 1584 simplified approach
  // E_incident ≈ K × Ibf^1.081 × t × 610^1.641 / D^1.641 for <1kV with adjustments
  // For a clean educational result, use: E = 0.0016 × Voc × Ibf × t / D^2 (D in cm)
  const Dcm = D/10; // 455mm = 45.5 cm
  const Einc = 0.0016 * Voc * Ik * tArc / (Dcm * Dcm);
  // PPE categories
  let ppeCat, ppeCol, ppeLbl;
  if(Einc < 1.2){ ppeCat=0; ppeCol='#06d6a0'; ppeLbl=da?'Kategori 0 — Almindeligt arbejdstøj':'Category 0 — Everyday work clothing'; }
  else if(Einc < 4){ ppeCat=1; ppeCol='#00b4d8'; ppeLbl=da?'Kategori 1 — FR-skjorte + sikkerhedsbriller':'Category 1 — FR shirt + safety glasses'; }
  else if(Einc < 8){ ppeCat=2; ppeCol='#ffd166'; ppeLbl=da?'Kategori 2 — FR-tøj + ansigtsskærm + handsker':'Category 2 — FR clothing + face shield + gloves'; }
  else if(Einc < 25){ ppeCat=3; ppeCol='#ff9a4d'; ppeLbl=da?'Kategori 3 — FR-dragt + hætte + læderhandsker':'Category 3 — FR coverall + hood + leather gloves'; }
  else if(Einc < 40){ ppeCat=4; ppeCol='#ef476f'; ppeLbl=da?'Kategori 4 — Komplet lysbuedragt (40 cal/cm²)':'Category 4 — Full arc-flash suit (40 cal/cm²)'; }
  else { ppeCat='!'; ppeCol='#ff0040'; ppeLbl=da?'FARLIGT — Ingen standard-PPE er tilstrækkelig! Reducer energien.':'DANGEROUS — No standard PPE is adequate! Reduce the energy.'; }

  const row = (l,v,col)=>`<div class="result-row"><span class="label">${l}</span><span class="value"${col?' style="color:'+col+'"':''}>${v}</span></div>`;
  let html = `<div class="card fade-in"><div class="card-title">⚡ ${da?'Lysbueenergi (IEEE 1584)':'Arc-flash energy (IEEE 1584)'} — ⏚ ${sldEarthing}</div>`;
  html += `<div class="info-row" style="margin-bottom:8px">${da?'Estimerer den termiske energi ved arbejdsafstand (455 mm) under en lysbue-fejl. Bruges til valg af PPE (personligt beskyttelsesudstyr).':'Estimates the thermal energy at working distance (455 mm) during an arc-flash event. Used to select PPE (personal protective equipment).'}</div>`;
  // Arc-flash warning badge
  html += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:12px 16px;border-radius:10px;background:rgba(${ppeCat==='!'||ppeCat>=3?'239,71,111':'6,214,160'},0.08);border:2px solid ${ppeCol}">`;
  html += `<div style="font-size:2.2rem">⚡</div>`;
  html += `<div><div style="font-size:1.1rem;font-weight:800;color:${ppeCol}">PPE ${da?'Kategori':'Category'} ${ppeCat}</div>`;
  html += `<div style="font-size:0.85rem;color:var(--text-light)">${ppeLbl}</div></div></div>`;
  html += `<div class="result-box ok">`;
  html += row(da?'Kortslutningsstrøm (Ik)':'Bolted fault current (Ik)', (Ik/1000).toFixed(1)+' kA ('+(Ik).toFixed(0)+' A)');
  html += row(da?'Lysbuetid (udkobling)':'Arc duration (clearing)', (tArc*1000).toFixed(0)+' ms ('+(tArc).toFixed(3)+' s)');
  html += row(da?'Arbejdsafstand (D)':'Working distance (D)', D+' mm');
  html += row(da?'Systemspænding':'System voltage', Voc+' V');
  html += row(da?'Incident energi (E)':'Incident energy (E)', Einc.toFixed(2)+' cal/cm\u00B2', ppeCol);
  html += row(da?'PPE-kategori':'PPE category', ppeCat+' ('+ppeLbl.split('—')[0].trim()+')', ppeCol);
  html += `</div>`;
  html += `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:6px">${da?'Beregningen er en forenklet estimering til undervisningsbrug (IEEE 1584 / Lee-metoden). Ved reel risikovurdering skal der bruges detaljeret beregningsprogram og målt data.':'The calculation is a simplified teaching estimate (IEEE 1584 / Lee method). For real risk assessment, use a detailed calculation tool and measured data.'}</div></div>`;
  return html;
}

// ===== CABLE DERATING INTERACTIVE CHART (DS/HD 60364-5-52) =====
function buildDeratingChart(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  let idx = (sldFaultRow>=0 && sldFaultRow<cons.length) ? sldFaultRow : 0;
  const c = cons[idx];
  const ci = lsConsumerCurrent(c);
  const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
  const cab = recommendCables(cIb)[0];
  if(!cab) return '';
  const baseIz = officialIz(cab);
  // Get current derating factors
  const instMeth = cableState.installMethod || 'C';
  const kInstall = INSTALL_METHODS[instMeth] || 1.0;
  const kTemp = TEMP_FACTORS[cableState.temp] || 1.0;
  const kGroup = GROUP_FACTORS[cableState.grouping] || 1.0;
  // Soil thermal resistivity factor (only for method D - buried)
  const SOIL_FACTORS = {0.7:1.18, 1.0:1.0, 1.5:0.89, 2.0:0.82, 2.5:0.77, 3.0:0.73};
  const isBuried = (instMeth === 'D');
  const kSoil = isBuried ? (SOIL_FACTORS[derSoilRes] || 1.0) : 1.0;
  // Derating sequence
  const steps = [
    { label: da?'Basis Iz (tabel C.52.1)':'Base Iz (table C.52.1)', factor: 1.0, iz: baseIz },
    { label: da?'Installationsmetode '+instMeth:'Installation method '+instMeth, factor: kInstall, iz: baseIz * kInstall },
    { label: da?'Temperatur '+cableState.temp+'°C':'Temperature '+cableState.temp+'°C', factor: kTemp, iz: baseIz * kInstall * kTemp },
    { label: da?'Gruppering ('+cableState.grouping+' kabler)':'Grouping ('+cableState.grouping+' cables)', factor: kGroup, iz: baseIz * kInstall * kTemp * kGroup }
  ];
  if(isBuried){
    steps.push({ label: da?'Jordmodstand '+derSoilRes+' K\u00B7m/W':'Soil resistivity '+derSoilRes+' K\u00B7m/W', factor: kSoil, iz: baseIz * kInstall * kTemp * kGroup * kSoil });
  }
  const finalIz = steps[steps.length-1].iz;
  const ibOk = finalIz >= cIb;
  // SVG bar chart
  const W=680, H=260, mLft=140, mTop=30, mBot=40, barH=32, gap=8;
  const chartH = steps.length*(barH+gap)+gap;
  const svgH = mTop + chartH + mBot + 40;
  const maxIz = baseIz * 1.05;
  const barW = W - mLft - 60;
  const scaleX = (iz)=> (iz/maxIz)*barW;
  let g = '';
  g += `<rect x="0" y="0" width="${W}" height="${svgH}" fill="#06101c"/>`;
  g += `<defs><filter id="derGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  // Grid lines
  for(let pct=0; pct<=100; pct+=25){
    const x = mLft + (pct/100)*barW;
    g += `<line x1="${x}" y1="${mTop}" x2="${x}" y2="${mTop+chartH}" stroke="rgba(0,200,255,0.08)" stroke-width="0.7"/>`;
    g += `<text x="${x}" y="${mTop+chartH+16}" text-anchor="middle" font-size="8.5" fill="#7fa8c4">${Math.round(maxIz*pct/100)} A</text>`;
  }
  // Bars
  steps.forEach((s, i)=>{
    const y = mTop + gap + i*(barH+gap);
    const w = scaleX(s.iz);
    const col = i===0 ? '#00e5ff' : (i===steps.length-1 ? (ibOk?'#06d6a0':'#ef476f') : '#3282b8');
    g += `<rect x="${mLft}" y="${y}" width="${w}" height="${barH}" rx="4" fill="${col}" opacity="0.8" filter="url(#derGlow)"/>`;
    g += `<text x="${mLft-6}" y="${y+barH/2+4}" text-anchor="end" font-size="9" fill="#bfe9ff">${s.label}</text>`;
    g += `<text x="${mLft+w+6}" y="${y+barH/2+4}" font-size="10" font-weight="700" fill="${col}">${s.iz.toFixed(1)} A</text>`;
    if(i>0){
      g += `<text x="${mLft+w/2}" y="${y+barH/2+4}" text-anchor="middle" font-size="8.5" fill="#fff" opacity="0.9">\u00D7${s.factor.toFixed(2)}</text>`;
    }
  });
  // IB line
  const ibX = mLft + scaleX(cIb);
  g += `<line x1="${ibX}" y1="${mTop}" x2="${ibX}" y2="${mTop+chartH}" stroke="#ff3b5c" stroke-width="2" stroke-dasharray="5 3" filter="url(#derGlow)"/>`;
  g += `<text x="${ibX}" y="${mTop+chartH+30}" text-anchor="middle" font-size="10" font-weight="700" fill="#ff3b5c">IB ${cIb.toFixed(1)} A</text>`;
  // Title
  g += `<text x="${mLft}" y="18" font-size="11" font-weight="800" fill="#bfe9ff">${da?'Kabelafvurdering (Iz)':'Cable derating (Iz)'} \u2014 ${cab.mm2} mm\u00B2 ${cab.material}</text>`;

  // Soil resistivity selectors (only for method D)
  const soilBtns = isBuried ? `<div class="select-group" style="margin-top:10px"><div class="select-label">${da?'Jordmodstand (termisk resistivitet)':'Soil thermal resistivity'} [K\u00B7m/W]</div><div class="select-grid">${[0.7,1.0,1.5,2.0,2.5,3.0].map(v=>`<button class="sel-btn ${derSoilRes===v?'selected':''}" onclick="setDerSoilRes(${v})">${v}</button>`).join('')}</div></div>` : '';

  const verdict = ibOk
    ? (da?'\u2713 Korrigeret Iz ('+finalIz.toFixed(1)+' A) \u2265 IB ('+cIb.toFixed(1)+' A) \u2014 kablet er tilstr\u00E6kkeligt.':'\u2713 Corrected Iz ('+finalIz.toFixed(1)+' A) \u2265 IB ('+cIb.toFixed(1)+' A) \u2014 cable is adequate.')
    : (da?'\u26A0 Korrigeret Iz ('+finalIz.toFixed(1)+' A) < IB ('+cIb.toFixed(1)+' A) \u2014 v\u00E6lg st\u00F8rre tv\u00E6rsnit!':'\u26A0 Corrected Iz ('+finalIz.toFixed(1)+' A) < IB ('+cIb.toFixed(1)+' A) \u2014 choose larger cross-section!');

  let html = `<div class="card fade-in"><div class="card-title">\uD83D\uDCC9 ${da?'Kabelafvurdering (Iz)':'Cable derating (Iz)'} \u2014 ${cab.mm2} mm\u00B2 ${cab.material} \u00B7 ${da?'Metode':'Method'} ${instMeth}</div>`;
  html += `<div class="info-row" style="margin-bottom:8px">${da?'Viser den sekventielle reduktion af kabelets str\u00F8mb\u00E6reevne (Iz) fra basisv\u00E6rdien (DS/HD 60364-5-52 Tabel C.52.1) til den endelige korrigerede v\u00E6rdi. Den r\u00F8de linje er driftstr\u00F8mmen (IB).':'Shows the sequential reduction of the cable current capacity (Iz) from the base value (DS/HD 60364-5-52 Table C.52.1) to the final corrected value. The red line is the load current (IB).'}</div>`;
  html += `<svg viewBox="0 0 ${W} ${svgH}" width="100%" style="border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${g}</svg>`;
  html += soilBtns;
  html += `<div class="result-box ${ibOk?'ok':'error'}" style="margin-top:10px"><div class="result-row"><span class="label" style="line-height:1.5;color:${ibOk?'var(--success)':'var(--danger)'};">${verdict}</span></div></div>`;
  html += `</div>`;
  return html;
}

// ===== TRANSFORMER INRUSH COORDINATION =====
function buildInrushCheck(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  // Transformer
  let kVAv = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().kVA||0) : 0;
  if(!(kVAv>0)){ kVAv = cons.reduce((a,cc)=>a+(cc.kW||0),0)/0.9; }
  const trafoK = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=kVAv)||630) : 630;
  const Irated = trafoK * 1000 / (Math.sqrt(3) * 400); // rated current A
  // Inrush characteristics
  const inrushMult = inrushType==='dry' ? 25 : 12;
  const tau = 0.1; // time constant (s)
  const Ipeak = inrushMult * Irated;
  // Main device
  const STD=[6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const nextStd=(v)=>STD.find(x=>x>=v)||STD[STD.length-1];
  let mainIb = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().ib||0) : 0;
  if(!(mainIb>0)){ let pT={L1:0,L2:0,L3:0}; cons.forEach(cc=>{const x=lsConsumerCurrent(cc);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;}); mainIb=Math.max(pT.L1,pT.L2,pT.L3); }
  const firstIn = cons[0] ? (recommendMCBs(Math.max(...Object.values(lsConsumerCurrent(cons[0])).filter(v=>typeof v==='number')),10)[0]||{rating:16}).rating : 16;
  mainIb = Math.max(mainIb, firstIn*1.25);
  const mainType = mainIb<=63 ? 'mcb' : 'fuse';
  const Inm = Math.max(nextStd(mainIb), nextStd(firstIn));
  const IaM = 10*Inm;
  const K=90;
  const mainLbl = mainType==='mcb' ? ('C'+Inm+' A') : ('gG '+Inm+' A');
  const tMain = (I)=> mainType==='mcb'
    ? (I>=IaM?0.02:(I>1.13*Inm?K/((I/Inm)*(I/Inm)-1):Infinity))
    : Math.min(1000, Math.max(0.004, 1056*Math.pow(I/Inm,-4.72)));
  // Does the inrush envelope cross the trip curve?
  // Check at discrete time points: if I_inrush(t) > device trip current at time t
  let trips = false;
  for(let t=0.01; t<=2.0; t+=0.005){
    const Iin = Ipeak * Math.exp(-t/tau);
    if(Iin < 1.13*Inm) break; // below trip threshold
    const tTrip = tMain(Iin);
    if(isFinite(tTrip) && tTrip <= t){
      trips = true;
      break;
    }
  }
  // SVG mini time/current chart
  const W=680, H=340, mLft=54, mTop=30, pw=W-mLft-18, ph=H-mTop-44;
  const L10=Math.log10;
  const X=(I)=>mLft+(L10(Math.min(Math.max(I,1),100000)))/5*pw;
  const Y=(t)=>mTop+(3-L10(Math.min(Math.max(t,0.001),1000)))/5*ph;
  let g='';
  g += `<rect x="0" y="0" width="${W}" height="${H}" fill="#06101c"/>`;
  g += `<defs><filter id="inrGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  // Grid
