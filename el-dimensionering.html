  for(let e=0;e<=5;e++){const I=Math.pow(10,e),x=X(I);g+=`<line x1="${x}" y1="${mTop}" x2="${x}" y2="${mTop+ph}" stroke="rgba(0,200,255,0.13)" stroke-width="1"/>`;g+=`<text x="${x}" y="${mTop+ph+13}" text-anchor="middle" font-size="9" fill="#7fa8c4">${I>=1000?(I/1000)+'k':I}A</text>`;}
  for(let e=-2;e<=3;e++){const y=Y(Math.pow(10,e));g+=`<line x1="${mLft}" y1="${y}" x2="${mLft+pw}" y2="${y}" stroke="rgba(0,200,255,0.13)" stroke-width="1"/>`;g+=`<text x="${mLft-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#7fa8c4">${Math.pow(10,e)<1?Math.pow(10,e).toFixed(2):Math.pow(10,e)}s</text>`;}
  // Main device trip curve
  let mpts=[];
  if(mainType==='mcb'){
    const sM=1.15*Inm;
    for(let i=0;i<=30;i++){const I=sM*Math.pow(IaM/sM,i/30);let t=K/((I/Inm)*(I/Inm)-1);if(t>1000)t=1000;mpts.push(X(I).toFixed(1)+','+Y(t).toFixed(1));}
    mpts.push(X(IaM).toFixed(1)+','+Y(0.02).toFixed(1));
    mpts.push(X(100000).toFixed(1)+','+Y(0.02).toFixed(1));
  } else {
    const sM=1.3*Inm;
    for(let i=0;i<=40;i++){const I=sM*Math.pow(100000/sM,i/40);let t=1056*Math.pow(I/Inm,-4.72);if(t>1000)t=1000;if(t<0.004)t=0.004;mpts.push(X(I).toFixed(1)+','+Y(t).toFixed(1));}
  }
  g += `<polyline points="${mpts.join(' ')}" fill="none" stroke="#ff9a4d" stroke-width="2.2" stroke-dasharray="7 4" opacity="0.9" filter="url(#inrGlow)"/>`;
  // Inrush envelope (decaying exponential plotted as time vs current)
  let inrPts=[];
  for(let t=0.01; t<=2.0; t+=0.01){
    const Iin = Ipeak * Math.exp(-t/tau);
    if(Iin < 1) break;
    inrPts.push(X(Iin).toFixed(1)+','+Y(t).toFixed(1));
  }
  if(inrPts.length > 1){
    g += `<polyline points="${inrPts.join(' ')}" fill="none" stroke="#c08cff" stroke-width="2.5" filter="url(#inrGlow)"/>`;
  }
  // Legend
  g += `<line x1="${mLft+pw-180}" y1="13" x2="${mLft+pw-162}" y2="13" stroke="#ff9a4d" stroke-width="2.5" stroke-dasharray="5 3"/><text x="${mLft+pw-158}" y="16" font-size="8.5" fill="#ffcaa0">${da?'Hovedv\u00E6rn':'Main device'} ${mainLbl}</text>`;
  g += `<line x1="${mLft+pw-180}" y1="25" x2="${mLft+pw-162}" y2="25" stroke="#c08cff" stroke-width="2.5"/><text x="${mLft+pw-158}" y="28" font-size="8.5" fill="#d4b8ff">${da?'Indkoblingsstr\u00F8m':'Inrush current'} (${inrushMult}\u00D7)</text>`;
  // Title
  g += `<text x="${mLft}" y="16" font-size="11" font-weight="800" fill="#bfe9ff">${da?'Trafo-indkobling':'Transformer inrush'} \u2014 ${trafoK} kVA (${inrushType==='dry'?da?'t\u00F8r':'dry':da?'olie':'oil'})</text>`;

  const verdictOk = !trips;
  const verdictTxt = verdictOk
    ? (da?'\u2713 Hovedv\u00E6rnet rider igennem indkoblingsstr\u00F8mmen \u2014 ingen utilsigtet udl\u00F8sning.':'\u2713 Main device rides through inrush \u2014 no nuisance trip.')
    : (da?'\u26A0 Risiko for utilsigtet udl\u00F8sning ved indkobling! Overvej tr\u00E6gere karakteristik (D-kurve) eller tidsforsinkelse.':'\u26A0 Risk of nuisance trip on energization! Consider slower characteristic (D-curve) or time delay.');
  const verdictCol = verdictOk ? 'var(--success)' : 'var(--warning-text)';

  // Inrush type selector
  const typeBtns = `<div class="select-group" style="margin-top:10px"><div class="select-label">${da?'Transformertype':'Transformer type'}</div><div class="select-grid"><button class="sel-btn ${inrushType==='oil'?'selected':''}" onclick="setInrushType('oil')">\uD83D\uDEE2\uFE0F ${da?'Olie (12\u00D7)':'Oil (12\u00D7)'}</button><button class="sel-btn ${inrushType==='dry'?'selected':''}" onclick="setInrushType('dry')">\uD83C\uDF21\uFE0F ${da?'T\u00F8r (25\u00D7)':'Dry (25\u00D7)'}</button></div></div>`;

  let html = `<div class="card fade-in"><div class="card-title">\uD83D\uDD0C ${da?'Trafo-indkobling':'Transformer inrush'} \u2014 ${trafoK} kVA \u00B7 ${mainLbl}</div>`;
  html += `<div class="info-row" style="margin-bottom:8px">${da?'Kontrollerer om hovedv\u00E6rnet udl\u00F8ser ved transformerens indkoblingsstr\u00F8m (magnetiseringspuls). Indkoblingsstr\u00F8mmen er typisk 12\u00D7 (olie) eller 25\u00D7 (t\u00F8r) m\u00E6rkestr\u00F8mmen med en tidskonstant p\u00E5 ~0,1 s.':'Checks whether the main protective device trips on transformer energization inrush (magnetizing pulse). Inrush is typically 12\u00D7 (oil) or 25\u00D7 (dry) rated current with a time constant of ~0.1 s.'}</div>`;
  html += `<svg viewBox="0 0 ${W} ${H}" width="100%" style="border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${g}</svg>`;
  html += typeBtns;
  html += `<div class="result-box ${verdictOk?'ok':'warning'}" style="margin-top:10px"><div class="result-row"><span class="label" style="line-height:1.5;color:${verdictCol}">${verdictTxt}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Trafo m\u00E6rkestr\u00F8m':'Trafo rated current'}: ${Irated.toFixed(1)} A</span><span class="value">${da?'Indkoblingspuls':'Inrush peak'}: ${Ipeak.toFixed(0)} A (${inrushMult}\u00D7)</span></div>`;
  html += `</div></div>`;
  return html;
}

// ===== ENERGY EFFICIENCY ANALYSIS =====
function buildEnergyEfficiency(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  if(!cons.length){
    return `<div class="card fade-in"><div class="card-title">\u26A1 ${da?'Energieffektivitet':'Energy efficiency'}</div><div class="info-row">${da?'Tilf\u00F8j forbrugere i belastningsskemaet f\u00F8rst.':'Add consumers to the load schedule first.'}</div></div>`;
  }
  // Cable losses: P = I^2 * R * L for each circuit
  const cables = (typeof CABLES_COPPER!=='undefined') ? (cableState.material==='copper'?CABLES_COPPER:CABLES_ALU) : null;
  const ct = cables ? cables[cableState.type] : null;
  const cc = ct ? (ct[cableState.cores]||{}) : {};
  const csVal = cableState.crossSection ? parseFloat(cableState.crossSection) : 2.5;
  const sc = cc[csVal] || {r:7.41, x:0.105}; // default 2.5mm2 Cu
  const cableLen = (typeof vdropState!=='undefined' && vdropState.length) ? vdropState.length/1000 : 0.025; // km
  let totalCableLossW = 0;
  cons.forEach(c=>{
    const curr = lsConsumerCurrent(c);
    const Imax = Math.max(curr.L1||0, curr.L2||0, curr.L3||0);
    // For 3-phase: 3 * I^2 * R * L; for 1-phase: 2 * I^2 * R * L
    const phases = c.phase==='3' ? 3 : 2;
    totalCableLossW += phases * Imax * Imax * sc.r * cableLen;
  });
  // Transformer losses
  let kVAv = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().kVA||0) : 0;
  if(!(kVAv>0)) kVAv = cons.reduce((a,c)=>a+(c.kW||0),0)/0.9;
  const trafoK = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=kVAv)||630) : 630;
  const tLoss = (typeof TRAFO_LOSSES!=='undefined') ? (TRAFO_LOSSES[trafoK]||{p0:860,pk:10500}) : {p0:860,pk:10500};
  const loadFactor = Math.min(1, kVAv / trafoK);
  const trafoP0 = tLoss.p0; // no-load (iron) losses W
  const trafoPk = tLoss.pk * loadFactor * loadFactor; // load (copper) losses W
  const trafoTotalW = trafoP0 + trafoPk;
  // Total
  const totalLossW = totalCableLossW + trafoTotalW;
  const totalUsefulW = cons.reduce((a,c)=>a+(c.kW||0)*c.sf*1000, 0);
  const totalPowerW = totalUsefulW + totalLossW;
  const annualLossKWh = totalLossW * eeOpHours / 1000;
  const annualCostDKK = annualLossKWh * eeElPrice;
  const effPct = totalPowerW > 0 ? (totalLossW / totalPowerW * 100) : 0;
  // Rating
  let rating, ratingCol;
  if(effPct < 2){ rating = da?'Fremragende':'Excellent'; ratingCol='#06d6a0'; }
  else if(effPct < 4){ rating = da?'God':'Good'; ratingCol='#00b4d8'; }
  else if(effPct < 6){ rating = da?'Acceptabel':'Fair'; ratingCol='#ffd166'; }
  else { rating = da?'D\u00E5rlig':'Poor'; ratingCol='#ef476f'; }
  // Donut chart SVG
  const cablePct = totalPowerW>0 ? totalCableLossW/totalPowerW*100 : 0;
  const trafoPct = totalPowerW>0 ? trafoTotalW/totalPowerW*100 : 0;
  const usefulPct = 100 - cablePct - trafoPct;
  // SVG donut with arcs
  const W=320, H=320, cx=160, cy=160, R=120, rInner=70;
  function arcPath(startAngle, endAngle, outerR, innerR){
    const s1=Math.cos(startAngle), c1=Math.sin(startAngle);
    const s2=Math.cos(endAngle), c2=Math.sin(endAngle);
    const large = (endAngle-startAngle) > Math.PI ? 1 : 0;
    return `M${cx+innerR*s1} ${cy-innerR*c1} L${cx+outerR*s1} ${cy-outerR*c1} A${outerR} ${outerR} 0 ${large} 1 ${cx+outerR*s2} ${cy-outerR*c2} L${cx+innerR*s2} ${cy-innerR*c2} A${innerR} ${innerR} 0 ${large} 0 ${cx+innerR*s1} ${cy-innerR*c1} Z`;
  }
  const a0 = 0;
  const a1 = a0 + (usefulPct/100)*2*Math.PI;
  const a2 = a1 + (cablePct/100)*2*Math.PI;
  const a3 = a2 + (trafoPct/100)*2*Math.PI;
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:320px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${W}" height="${H}" fill="#06101c"/>`;
  if(usefulPct>0.5) svg += `<path d="${arcPath(a0,a1,R,rInner)}" fill="#00e5ff" opacity="0.85"/>`;
  if(cablePct>0.5) svg += `<path d="${arcPath(a1,a2,R,rInner)}" fill="#ef476f" opacity="0.85"/>`;
  if(trafoPct>0.5) svg += `<path d="${arcPath(a2,Math.min(a3,a0+2*Math.PI-0.01),R,rInner)}" fill="#ff9a4d" opacity="0.85"/>`;
  // Center text
  svg += `<text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="22" font-weight="800" fill="${ratingCol}">${effPct.toFixed(1)}%</text>`;
  svg += `<text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="11" fill="#bfe9ff">${da?'tab':'loss'}</text>`;
  // Legend
  svg += `<rect x="20" y="${H-50}" width="12" height="12" fill="#00e5ff" rx="2"/><text x="36" y="${H-40}" font-size="9" fill="#bfe9ff">${da?'Nyttigt':'Useful'} ${usefulPct.toFixed(1)}%</text>`;
  svg += `<rect x="120" y="${H-50}" width="12" height="12" fill="#ef476f" rx="2"/><text x="136" y="${H-40}" font-size="9" fill="#ffb0c0">${da?'Kabeltab':'Cable loss'} ${cablePct.toFixed(1)}%</text>`;
  svg += `<rect x="220" y="${H-50}" width="12" height="12" fill="#ff9a4d" rx="2"/><text x="236" y="${H-40}" font-size="9" fill="#ffcaa0">${da?'Trafotab':'Trafo loss'} ${trafoPct.toFixed(1)}%</text>`;
  svg += `</svg>`;
  // Operating hours selector
  const hoursOpts = [1000,2000,2500,3000,4000,5000,8760];
  const priceOpts = [1.5,2.0,2.5,3.0,3.5,4.0];
  const hoursBtns = `<div class="select-group" style="margin-top:10px"><div class="select-label">${da?'Driftstimer/\u00E5r':'Operating hours/year'}</div><div class="select-grid">${hoursOpts.map(h=>`<button class="sel-btn ${eeOpHours===h?'selected':''}" onclick="setEeOpHours(${h})">${h}</button>`).join('')}</div></div>`;
  const priceBtns = `<div class="select-group" style="margin-top:8px"><div class="select-label">${da?'Elpris (DKK/kWh)':'Electricity price (DKK/kWh)'}</div><div class="select-grid">${priceOpts.map(p=>`<button class="sel-btn ${eeElPrice===p?'selected':''}" onclick="setEeElPrice(${p})">${p.toFixed(1)}</button>`).join('')}</div></div>`;
  let h = `<div class="card fade-in"><div class="card-title">\u26A1 ${da?'Energieffektivitet':'Energy efficiency'} \u2014 ${trafoK} kVA</div>`;
  h += `<div class="info-row" style="margin-bottom:8px">${da?'Analyserer installationens energitab: kabeltab (I\u00B2R) + trafotab (tomgangs- + lasttab). Vurdering baseret p\u00E5 samlet tabsprocent.':'Analyzes the installation energy losses: cable losses (I\u00B2R) + transformer losses (no-load + load). Rating based on total loss percentage.'}</div>`;
  h += svg;
  h += hoursBtns + priceBtns;
  h += `<div class="result-box ok" style="margin-top:10px">`;
  h += `<div class="result-row"><span class="label">${da?'Kabeltab':'Cable losses'}</span><span class="value">${totalCableLossW.toFixed(0)} W</span></div>`;
  h += `<div class="result-row"><span class="label">${da?'Trafotab (P0 + Pk)':'Trafo losses (P0 + Pk)'}</span><span class="value">${trafoP0.toFixed(0)} + ${trafoPk.toFixed(0)} = ${trafoTotalW.toFixed(0)} W</span></div>`;
  h += `<div class="result-row"><span class="label">${da?'\u00C5rligt energitab':'Annual energy loss'}</span><span class="value">${annualLossKWh.toFixed(0)} kWh/\u00E5r</span></div>`;
  h += `<div class="result-row"><span class="label">${da?'\u00C5rlig omkostning':'Annual cost'}</span><span class="value">${annualCostDKK.toFixed(0)} DKK</span></div>`;
  h += `<div class="result-row"><span class="label" style="color:${ratingCol};font-weight:800">${da?'Vurdering':'Rating'}: ${rating} (${effPct.toFixed(1)}% tab)</span></div>`;
  h += `</div></div>`;
  return h;
}

// ===== HARMONIC DISTORTION CHECK =====
function buildHarmonicCheck(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  if(!cons.length){
    return `<div class="card fade-in"><div class="card-title">\uD83C\uDF10 ${da?'Harmoniske (THD)':'Harmonics (THD)'}</div><div class="info-row">${da?'Tilf\u00F8j forbrugere i belastningsskemaet f\u00F8rst.':'Add consumers to the load schedule first.'}</div></div>`;
  }
  // THD profiles by load type
  function getThd(c){
    const t = sldInferType(c);
    switch(t){
      case 'light': return {thd:55, h3:48, h5:25, h7:12, h9:8, h11:5, h13:3, type:da?'LED/belysning':'LED/lighting'};
      case 'ev': return {thd:20, h3:12, h5:15, h7:10, h9:4, h11:3, h13:2, type:da?'EV-lader':'EV charger'};
      case 'motor': return {thd:50, h3:5, h5:40, h7:25, h9:3, h11:8, h13:5, type:da?'VFD/motor':'VFD/motor'};
      case 'heat': case 'cooker': return {thd:2, h3:1.5, h5:1, h7:0.5, h9:0.3, h11:0.2, h13:0.1, type:da?'Resistiv':'Resistive'};
      default: return {thd:30, h3:22, h5:18, h7:10, h9:6, h11:4, h13:3, type:da?'Stik/blandet':'Socket/mixed'};
    }
  }
  // Calculate combined THD at PCC using root-sum-square weighted by current magnitude
  let totalI = 0;
  let sumSqThd = 0;
  let sumH3sq = 0, sumH5sq = 0, sumH7sq = 0, sumH9sq = 0, sumH11sq = 0, sumH13sq = 0;
  const details = [];
  cons.forEach(c=>{
    const curr = lsConsumerCurrent(c);
    const Imax = Math.max(curr.L1||0, curr.L2||0, curr.L3||0);
    const prof = getThd(c);
    totalI += Imax;
    sumSqThd += (Imax * prof.thd/100) * (Imax * prof.thd/100);
    sumH3sq += (Imax * prof.h3/100) * (Imax * prof.h3/100);
    sumH5sq += (Imax * prof.h5/100) * (Imax * prof.h5/100);
    sumH7sq += (Imax * prof.h7/100) * (Imax * prof.h7/100);
    sumH9sq += (Imax * prof.h9/100) * (Imax * prof.h9/100);
    sumH11sq += (Imax * prof.h11/100) * (Imax * prof.h11/100);
    sumH13sq += (Imax * prof.h13/100) * (Imax * prof.h13/100);
    details.push({name: c.name||prof.type, I: Imax, thd: prof.thd, type: prof.type});
  });
  const combinedThd = totalI > 0 ? Math.sqrt(sumSqThd) / totalI * 100 : 0;
  const h3pct = totalI > 0 ? Math.sqrt(sumH3sq) / totalI * 100 : 0;
  const h5pct = totalI > 0 ? Math.sqrt(sumH5sq) / totalI * 100 : 0;
  const h7pct = totalI > 0 ? Math.sqrt(sumH7sq) / totalI * 100 : 0;
  const h9pct = totalI > 0 ? Math.sqrt(sumH9sq) / totalI * 100 : 0;
  const h11pct = totalI > 0 ? Math.sqrt(sumH11sq) / totalI * 100 : 0;
  const h13pct = totalI > 0 ? Math.sqrt(sumH13sq) / totalI * 100 : 0;
  // IEC 61000-2-4 Class 2 compatibility levels
  const limits = {h3:5, h5:6, h7:5, h9:1.5, h11:3.5, h13:3};
  const thdLimit = 8; // total THD limit for Class 2
  // 3rd harmonic neutral accumulation flag
  const has3phase = cons.some(c=>c.phase==='3');
  const neutralFlag = has3phase && h3pct > 15;
  // Verdict
  let verdict, verdictCol;
  if(combinedThd <= thdLimit && !neutralFlag){
    verdict = da?'\u2713 Inden for gr\u00E6nser (IEC 61000-2-4 klasse 2)':'\u2713 Within limits (IEC 61000-2-4 Class 2)';
    verdictCol = 'var(--success)';
  } else if(neutralFlag && combinedThd <= thdLimit*1.5){
    verdict = da?'\u26A0 Neutral-opskalering anbefales (3. harmonisk akkumulering i 3-faset system)':'\u26A0 Neutral upsizing recommended (3rd harmonic accumulation in 3-phase system)';
    verdictCol = 'var(--warning-text)';
  } else {
    verdict = da?'\u26A0 Aktivt filter anbefales \u2014 THD overstiger gr\u00E6nser':'\u26A0 Active filter recommended \u2014 THD exceeds limits';
    verdictCol = 'var(--danger)';
  }
  // SVG spectrum bar chart
  const W=580, H=260, mLft=50, mBot=36, mTop=30;
  const harmonics = [{order:1,pct:100,lim:100},{order:3,pct:h3pct,lim:limits.h3},{order:5,pct:h5pct,lim:limits.h5},{order:7,pct:h7pct,lim:limits.h7},{order:9,pct:h9pct,lim:limits.h9},{order:11,pct:h11pct,lim:limits.h11},{order:13,pct:h13pct,lim:limits.h13}];
  const maxPct = Math.max(100, ...harmonics.map(h=>h.pct));
  const barW = 50, gap = 20;
  const chartW = harmonics.length * (barW+gap);
  const chartH = H - mTop - mBot;
  let g = '';
  g += `<rect width="${W}" height="${H}" fill="#06101c"/>`;
  g += `<text x="${W/2}" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff">${da?'Harmonisk spektrum (% af grundtone)':'Harmonic spectrum (% of fundamental)'}</text>`;
  // Y-axis
  for(let p=0;p<=100;p+=20){
    const y = mTop + chartH * (1 - p/maxPct);
    g += `<line x1="${mLft}" y1="${y}" x2="${W-10}" y2="${y}" stroke="rgba(0,200,255,0.1)" stroke-width="1"/>`;
    g += `<text x="${mLft-6}" y="${y+3}" text-anchor="end" font-size="8" fill="#7fa8c4">${p}%</text>`;
  }
  // Bars
  harmonics.forEach((h,i)=>{
    const x = mLft + 20 + i*(barW+gap);
    const barH = (Math.min(h.pct, maxPct)/maxPct) * chartH;
    const y = mTop + chartH - barH;
    const col = h.order===1 ? '#00e5ff' : (h.pct > h.lim ? '#ef476f' : '#06d6a0');
    g += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${col}" opacity="0.8" rx="3"/>`;
    g += `<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" font-size="8" fill="${col}">${h.order===1?'100':h.pct.toFixed(1)}%</text>`;
    g += `<text x="${x+barW/2}" y="${H-mBot+14}" text-anchor="middle" font-size="9" fill="#bfe9ff">H${h.order}</text>`;
    // Limit line (except fundamental)
    if(h.order>1){
      const limY = mTop + chartH * (1 - h.lim/maxPct);
      g += `<line x1="${x-2}" y1="${limY}" x2="${x+barW+2}" y2="${limY}" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="4 2"/>`;
    }
  });
  g += `<text x="${W-10}" y="${H-8}" text-anchor="end" font-size="7.5" fill="#7fa8c4">${da?'Gul streg = IEC 61000-2-4 gr\u00E6nse':'Yellow line = IEC 61000-2-4 limit'}</text>`;
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${g}</svg>`;
  let htm = `<div class="card fade-in"><div class="card-title">\uD83C\uDF10 ${da?'Harmoniske (THD)':'Harmonics (THD)'} \u2014 THD-I ${combinedThd.toFixed(1)}%</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Estimerer den samlede harmoniske forvrængning (THD-I) ved PCC baseret på belastningstyper. Kontrollerer mod IEC 61000-2-4 klasse 2 kompatibilitetsgrænser.':'Estimates the combined total harmonic distortion (THD-I) at the PCC based on load types. Checks against IEC 61000-2-4 Class 2 compatibility levels.'}</div>`;
  htm += svg;
  htm += `<div class="result-box ${combinedThd<=thdLimit&&!neutralFlag?'ok':'warning'}" style="margin-top:10px">`;
  htm += `<div class="result-row"><span class="label">${da?'Samlet THD-I ved PCC':'Combined THD-I at PCC'}</span><span class="value" style="color:${verdictCol};font-weight:800">${combinedThd.toFixed(1)}% ${combinedThd<=thdLimit?'\u2264':'\u003E'} ${thdLimit}%</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'3. harmonisk (H3)':'3rd harmonic (H3)'}</span><span class="value">${h3pct.toFixed(1)}% (${da?'gr\u00E6nse':'limit'}: ${limits.h3}%)</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'5. harmonisk (H5)':'5th harmonic (H5)'}</span><span class="value">${h5pct.toFixed(1)}% (${da?'gr\u00E6nse':'limit'}: ${limits.h5}%)</span></div>`;
  if(neutralFlag) htm += `<div class="result-row"><span class="label" style="color:var(--warning-text)">\u26A0 ${da?'3. harmonisk akkumulerer i neutral (3-faset)':'3rd harmonic accumulates in neutral (3-phase)'}</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:${verdictCol};font-weight:700">${verdict}</span></div>`;
  htm += `</div></div>`;
  return htm;
}

// ===== CABLE AGING & LIFETIME ESTIMATE =====
function buildCableLifetime(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  if(!cons.length){
    return `<div class="card fade-in"><div class="card-title">\u23F3 ${da?'Kabellevetid':'Cable lifetime'}</div><div class="info-row">${da?'Tilf\u00F8j forbrugere i belastningsskemaet f\u00F8rst.':'Add consumers to the load schedule first.'}</div></div>`;
  }
  // Determine insulation type from cable state
  const isXLPE = /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test((typeof cableState!=='undefined'&&cableState.type)||'NOIKLX');
  const thetaRated = isXLPE ? 90 : 70; // rated conductor temperature
  const Lbase = isXLPE ? 40 : 30; // base lifetime years
  const insulLabel = isXLPE ? 'XLPE (90\u00B0C)' : 'PVC (70\u00B0C)';
  // Ambient temperature
  const thetaAmb = (typeof cableState!=='undefined' && cableState.temp) ? cableState.temp : 30;
  // Load factor: IB/Iz
  let ib = 0;
  if(typeof calcLoadSchedule==='function'){
    ib = calcLoadSchedule().ib || 0;
  }
  if(!(ib>0)){
    let pT={L1:0,L2:0,L3:0};
    cons.forEach(c=>{const x=lsConsumerCurrent(c);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;});
    ib=Math.max(pT.L1,pT.L2,pT.L3);
  }
  // Get Iz for the current cable
  let iz = 100; // default
  if(typeof izTableFor==='function' && cableState.crossSection){
    const izTbl = izTableFor();
    iz = izTbl[parseFloat(cableState.crossSection)] || 100;
    // Apply installation method and temperature correction
    const kI = (typeof INSTALL_METHODS!=='undefined') ? (INSTALL_METHODS[cableState.installMethod]||1) : 1;
    const kT = (typeof TEMP_FACTORS!=='undefined') ? (TEMP_FACTORS[cableState.temp]||1) : 1;
    iz = iz * kI * kT;
  }
  const loadFactor = Math.min(ib / Math.max(iz, 1), 1.0);
  // Operating temperature: theta_op = theta_amb + (theta_rated - theta_amb) * (IB/Iz)^2
  const thetaOp = thetaAmb + (thetaRated - thetaAmb) * loadFactor * loadFactor;
  // Estimated lifetime: L = L_base * 2^((theta_rated - theta_op) / 8)
  const lifetime = Lbase * Math.pow(2, (thetaRated - thetaOp) / 8);
  const lifetimeCapped = Math.min(lifetime, 60);
  // Warning conditions
  const warn20 = lifetime < 20;
  const warnTemp = thetaOp > (thetaRated - 5);
  // Recommendation
  let reco = '';
  if(warn20 || warnTemp){
    reco = da ? '\u26A0 Overvej et st\u00F8rre kabeltv\u00E6rsnit for at reducere driftstemperatur og forl\u00E6nge levetid.' : '\u26A0 Consider a larger cable cross-section to reduce operating temperature and extend lifetime.';
  } else {
    reco = da ? '\u2713 Kabellevetiden er tilfredsstillende ved aktuel belastning.' : '\u2713 Cable lifetime is satisfactory at current load.';
  }
  // SVG semicircle gauge (0-60 years)
  const W=380, H=220, cx=190, cy=180, Rg=140;
  const minAng = Math.PI, maxAng = 0; // semicircle from left to right
  const needleAng = Math.PI - (Math.min(lifetimeCapped,60)/60) * Math.PI;
  // Gauge arc
  let g = '';
  g += `<rect width="${W}" height="${H}" fill="#06101c"/>`;
  g += `<defs><filter id="lifeGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  // Background arc (grey)
  const arcBg = `M${cx+Rg*Math.cos(Math.PI)} ${cy-Rg*Math.sin(Math.PI)} A${Rg} ${Rg} 0 0 1 ${cx+Rg*Math.cos(0)} ${cy-Rg*Math.sin(0)}`;
  g += `<path d="${arcBg}" fill="none" stroke="rgba(100,150,180,0.2)" stroke-width="18" stroke-linecap="round"/>`;
  // Colored arc segments: red(0-20), yellow(20-35), green(35-60)
  function arcSeg(fromYr, toYr, color){
    const a1 = Math.PI - (fromYr/60)*Math.PI;
    const a2 = Math.PI - (toYr/60)*Math.PI;
    const x1=cx+Rg*Math.cos(a1), y1=cy-Rg*Math.sin(a1);
    const x2=cx+Rg*Math.cos(a2), y2=cy-Rg*Math.sin(a2);
    const large = (a1-a2) > Math.PI ? 1 : 0;
    return `<path d="M${x1} ${y1} A${Rg} ${Rg} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="18" stroke-linecap="butt" opacity="0.7"/>`;
  }
  g += arcSeg(0, 20, '#ef476f');
  g += arcSeg(20, 35, '#ffd166');
  g += arcSeg(35, 60, '#06d6a0');
  // Needle
  const nx = cx + (Rg-20)*Math.cos(needleAng);
  const ny = cy - (Rg-20)*Math.sin(needleAng);
  g += `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#ffffff" stroke-width="3" stroke-linecap="round" filter="url(#lifeGlow)"/>`;
  g += `<circle cx="${cx}" cy="${cy}" r="6" fill="#0a1e2e" stroke="#00e5ff" stroke-width="2"/>`;
  // Labels
  g += `<text x="${cx-Rg-5}" y="${cy+16}" text-anchor="middle" font-size="9" fill="#ef476f">0</text>`;
  g += `<text x="${cx}" y="${cy-Rg-8}" text-anchor="middle" font-size="9" fill="#ffd166">30</text>`;
  g += `<text x="${cx+Rg+5}" y="${cy+16}" text-anchor="middle" font-size="9" fill="#06d6a0">60 ${da?'\u00E5r':'yr'}</text>`;
  // Value
  g += `<text x="${cx}" y="${cy-30}" text-anchor="middle" font-size="22" font-weight="800" fill="${warn20?'#ef476f':warnTemp?'#ffd166':'#06d6a0'}" filter="url(#lifeGlow)">${lifetime>=60?'60+':lifetime.toFixed(0)} ${da?'\u00E5r':'years'}</text>`;
  g += `<text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="10" fill="#bfe9ff">${da?'Estimeret levetid':'Estimated lifetime'}</text>`;
  // Title
  g += `<text x="${cx}" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff">${da?'Kabellevetid (Arrhenius)':'Cable lifetime (Arrhenius)'}</text>`;
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:400px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${g}</svg>`;
  let htm = `<div class="card fade-in"><div class="card-title">\u23F3 ${da?'Kabellevetid':'Cable lifetime'} \u2014 ${insulLabel}</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Isoleringsaldring f\u00F8lger Arrhenius\u2019 lov: levetiden halveres for hver 8\u00B0C over m\u00E6rketemperatur. Baseret p\u00E5 kabeltype, belastningsgrad og omgivelsestemperatur.':'Insulation aging follows Arrhenius law: lifetime halves for every 8\u00B0C above rated temperature. Based on cable type, load factor and ambient temperature.'}</div>`;
  htm += svg;
  htm += `<div class="result-box ${warn20||warnTemp?'warning':'ok'}" style="margin-top:10px">`;
  htm += `<div class="result-row"><span class="label">${da?'Isoleringstype':'Insulation type'}</span><span class="value">${insulLabel}</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Omgivelsestemperatur':'Ambient temperature'}</span><span class="value">${thetaAmb}\u00B0C</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Belastningsgrad (IB/Iz)':'Load factor (IB/Iz)'}</span><span class="value">${(loadFactor*100).toFixed(0)}%</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Driftstemperatur':'Operating temperature'}</span><span class="value">${thetaOp.toFixed(1)}\u00B0C / ${thetaRated}\u00B0C ${da?'m\u00E6rke':'rated'}</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Estimeret levetid':'Estimated lifetime'}</span><span class="value" style="font-weight:800;color:${warn20?'var(--danger)':warnTemp?'var(--warning-text)':'var(--success)'}">${lifetime>=60?'60+':lifetime.toFixed(0)} ${da?'\u00E5r':'years'}</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:${warn20||warnTemp?'var(--warning-text)':'var(--success)'}">${reco}</span></div>`;
  htm += `</div></div>`;
  return htm;
}


// ===== POWER FLOW SANKEY DIAGRAM =====
function buildPowerFlow(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,12) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  if(!cons.length){
    return `<div class="card fade-in"><div class="card-title">\u26A1 ${da?'Effektflow (Sankey)':'Power flow (Sankey)'}</div><div class="info-row">${da?'Tilf\u00F8j forbrugere i belastningsskemaet f\u00F8rst.':'Add consumers to the load schedule first.'}</div></div>`;
  }
  const W=700, H=380, pad=40;
  // Calculate power for each circuit
  const circuits = cons.map(c => {
    const pUseful = c.kW * c.sf;
    // Estimate cable loss: I^2*R*L, assume typical 50m, R~1.2 ohm/km for 2.5mm2 
    const I = c.phase==='3' ? (pUseful*1000)/(Math.sqrt(3)*400*(c.cos||0.9)) : (pUseful*1000)/(230*(c.cos||0.95));
    const dist = c.dist || 30;
    const Rkm = c.phase==='3' ? 0.8 : 1.2;
    const Rcable = Rkm * (dist/1000);
    const pLoss = (c.phase==='3' ? 3 : 2) * I * I * Rcable / 1000; // kW
    return { name: c.name||'Kreds', pUseful, pLoss: Math.max(pLoss, pUseful*0.005), phase: c.phase };
  });
  const totalUseful = circuits.reduce((s,c) => s + c.pUseful, 0);
  const totalLoss = circuits.reduce((s,c) => s + c.pLoss, 0);
  const totalInput = totalUseful + totalLoss;
  // Sankey geometry
  const trafoX = pad+30, panelX = W*0.4, loadX = W-pad-60;
  const bandMaxH = H - 2*pad - 40;
  const scale = bandMaxH / totalInput;
  // Build SVG
  let svg = '';
  svg += `<defs><filter id="sankGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg += `<radialGradient id="sankBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1f33"/><stop offset="100%" stop-color="#06101c"/></radialGradient></defs>`;
  svg += `<rect width="${W}" height="${H}" fill="url(#sankBg)"/>`;
  // Title
  svg += `<text x="${W/2}" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="#bfe9ff" filter="url(#sankGlow)">${da?'Effektflow (Sankey)':'Power flow (Sankey)'}</text>`;
  // Transformer block
  const trafoH = totalInput * scale;
  const trafoY = (H - trafoH)/2;
  svg += `<rect x="${trafoX-20}" y="${trafoY}" width="40" height="${trafoH}" rx="4" fill="#0a1e33" stroke="#00e5ff" stroke-width="2" filter="url(#sankGlow)"/>`;
  svg += `<text x="${trafoX}" y="${trafoY-8}" text-anchor="middle" font-size="9" fill="#7fa8c4">${da?'Trafo':'Transformer'}</text>`;
  svg += `<text x="${trafoX}" y="${trafoY+trafoH/2+4}" text-anchor="middle" font-size="10" fill="#00e5ff" font-weight="700">${totalInput.toFixed(1)} kW</text>`;
  // Panel block
  const panelH = totalInput * scale;
  const panelY = trafoY;
  svg += `<rect x="${panelX-15}" y="${panelY}" width="30" height="${panelH}" rx="3" fill="#0a1e33" stroke="#00e5ff" stroke-width="1.5"/>`;
  svg += `<text x="${panelX}" y="${panelY-8}" text-anchor="middle" font-size="9" fill="#7fa8c4">${da?'Hovedtavle':'Main panel'}</text>`;
  // Main flow band: transformer -> panel
  const mainBandW = totalInput * scale;
  svg += `<path d="M${trafoX+20} ${trafoY} C${(trafoX+20+panelX-15)/2} ${trafoY} ${(trafoX+20+panelX-15)/2} ${panelY} ${panelX-15} ${panelY} L${panelX-15} ${panelY+panelH} C${(trafoX+20+panelX-15)/2} ${panelY+panelH} ${(trafoX+20+panelX-15)/2} ${trafoY+trafoH} ${trafoX+20} ${trafoY+trafoH} Z" fill="rgba(0,229,255,0.18)" stroke="rgba(0,229,255,0.4)" stroke-width="0.5"/>`;
  // Fan out to circuits from panel
  let yOff = panelY;
  const circColors = ['#00e5ff','#4dd0e1','#26c6da','#00bcd4','#0097a7','#00acc1','#80deea','#b2ebf2','#4db6ac','#80cbc4','#a7ffeb','#64ffda'];
  circuits.forEach((c, i) => {
    const bandH = (c.pUseful + c.pLoss) * scale;
    const lossH = c.pLoss * scale;
    const usefulH = c.pUseful * scale;
    const loadY = pad + 35 + i * ((H - 2*pad - 35) / circuits.length);
    const col = circColors[i % circColors.length];
    // Useful power band (cyan)
    const py1 = yOff, py2 = yOff + usefulH;
    const ly1 = loadY, ly2 = loadY + usefulH;
    svg += `<path d="M${panelX+15} ${py1} C${(panelX+15+loadX)/2} ${py1} ${(panelX+15+loadX)/2} ${ly1} ${loadX} ${ly1} L${loadX} ${ly2} C${(panelX+15+loadX)/2} ${ly2} ${(panelX+15+loadX)/2} ${py2} ${panelX+15} ${py2} Z" fill="${col}" fill-opacity="0.25" stroke="${col}" stroke-width="0.7" stroke-opacity="0.6"/>`;
    // Loss bleed band (red)
    const lpy1 = yOff + usefulH, lpy2 = lpy1 + lossH;
    const lly1 = ly2, lly2 = lly1 + Math.max(lossH, 2);
    svg += `<path d="M${panelX+15} ${lpy1} C${(panelX+15+loadX)/2} ${lpy1} ${(panelX+15+loadX)/2} ${lly1} ${loadX} ${lly1} L${loadX} ${lly2} C${(panelX+15+loadX)/2} ${lly2} ${(panelX+15+loadX)/2} ${lpy2} ${panelX+15} ${lpy2} Z" fill="#ff3b5c" fill-opacity="0.35" stroke="#ff3b5c" stroke-width="0.5" stroke-opacity="0.5"/>`;
    // Label
    svg += `<text x="${loadX+8}" y="${(ly1+ly2)/2+4}" font-size="8" fill="#bfe9ff">${c.name} (${c.pUseful.toFixed(1)} kW)</text>`;
    yOff += bandH;
  });
  // Totals
  svg += `<text x="${W/2}" y="${H-12}" text-anchor="middle" font-size="9" fill="#7fa8c4">${da?'Total ind':'Total in'}: ${totalInput.toFixed(1)} kW | ${da?'Nyttig':'Useful'}: <tspan fill="#00e5ff">${totalUseful.toFixed(1)} kW</tspan> | ${da?'Tab':'Losses'}: <tspan fill="#ff3b5c">${totalLoss.toFixed(2)} kW</tspan></text>`;
  const svgTag = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:720px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  let htm = `<div class="card fade-in"><div class="card-title">\u26A1 ${da?'Effektflow (Sankey)':'Power flow (Sankey)'}</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Sankey-diagram der viser effektstr\u00F8mmen fra transformeren gennem hovedtavlen til hver kreds. Bredden er proportional med effekten. R\u00F8de b\u00E5nd viser kabeltab (I\u00B2R).':'Sankey diagram showing power flow from transformer through main panel to each circuit. Band width is proportional to power. Red bands show cable losses (I\u00B2R).'}</div>`;
  htm += svgTag;
  htm += `<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-row"><span class="label" style="color:#7fa8c4">${da?'Total indgangseffekt':'Total input power'}</span><span class="value" style="color:#00e5ff">${totalInput.toFixed(2)} kW</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:#7fa8c4">${da?'Total nytteeffekt':'Total useful power'}</span><span class="value" style="color:#00e5ff">${totalUseful.toFixed(2)} kW</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:#7fa8c4">${da?'Totale kabeltab':'Total cable losses'}</span><span class="value" style="color:#ff3b5c">${totalLoss.toFixed(3)} kW (${(totalLoss/totalInput*100).toFixed(2)}%)</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:#7fa8c4">${da?'Virkningsgrad':'Efficiency'}</span><span class="value" style="color:#06d6a0">${(totalUseful/totalInput*100).toFixed(1)}%</span></div>`;
  htm += `</div></div>`;
  return htm;
}


// ===== VOLTAGE REGULATION UNDER LOAD (VOLTAGE PROFILE) =====
let vpMainLen = 25; // default main cable length in meters
function buildVoltageProfile(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,8) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader',dist:30},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur',dist:12},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper',dist:25},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer',dist:18},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning',dist:22}
  ];
  if(!cons.length){
    return `<div class="card fade-in"><div class="card-title">\uD83D\uDCC9 ${da?'Sp\u00E6ndingsprofil':'Voltage profile'}</div><div class="info-row">${da?'Tilf\u00F8j forbrugere i belastningsskemaet f\u00F8rst.':'Add consumers to the load schedule first.'}</div></div>`;
  }
  const mainLenOpts = [10,25,50,75,100];
  const mainLen = vpMainLen || 25;
  // Determine voltage system
  const is3ph = cons.some(c => c.phase==='3');
  const Vnom = is3ph ? 400 : 230;
  const Vmin = is3ph ? 380 : 220;
  const Vmax = Vnom;
  // Main cable voltage drop (assume 35mm2 Cu, R=0.524 ohm/km for XLPE 5G35)
  const Rmain = 0.524; // ohm/km
  const Xmain = 0.07;
  // Total current through main cable (sum of all loads)
  let ibTotal = 0;
  cons.forEach(c => {
    const p = c.kW * c.sf * 1000;
    ibTotal += c.phase==='3' ? p/(Math.sqrt(3)*400*(c.cos||0.9)) : p/(230*(c.cos||0.95));
  });
  const cosAvg = 0.9, sinAvg = Math.sin(Math.acos(cosAvg));
  const dvMain = (is3ph ? Math.sqrt(3) : 2) * ibTotal * (mainLen/1000) * (Rmain*cosAvg + Xmain*sinAvg);
  const Vpanel = Vnom - dvMain;
  // Per circuit voltage profile
  const W=660, H=320, padL=55, padR=30, padT=45, padB=50;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const circColors = ['#00e5ff','#ff9a4d','#06d6a0','#ffd166','#e040fb','#4dd0e1','#ff3b5c','#80cbc4'];
  // Calculate each circuit's profile points: [trafo(0m, Vnom), panel(mainLen, Vpanel), end(mainLen+dist, Vend)]
  const profiles = cons.map((c, i) => {
    const dist = c.dist || (typeof vdropState!=='undefined'? vdropState.length : 30);
    const p = c.kW * c.sf * 1000;
    const I = c.phase==='3' ? p/(Math.sqrt(3)*400*(c.cos||0.9)) : p/(230*(c.cos||0.95));
    // Branch cable: assume 2.5mm2 for small, 6mm2 for medium, 16mm2 for big
    let Rbranch = 7.41; // 2.5mm2
    if(c.kW > 5) Rbranch = 3.08; // 6mm2
    if(c.kW > 10) Rbranch = 1.15; // 16mm2
    const Xbranch = 0.08;
    const cosC = c.cos||0.9, sinC = Math.sin(Math.acos(cosC));
    const dvBranch = (c.phase==='3' ? Math.sqrt(3) : 2) * I * (dist/1000) * (Rbranch*cosC + Xbranch*sinC);
    const Vend = Vpanel - dvBranch;
    const totalDist = mainLen + dist;
    return { name: c.name, points: [{x:0,v:Vnom},{x:mainLen,v:Vpanel},{x:totalDist,v:Vend}], totalDist, Vend, dvPct: ((Vnom-Vend)/Vnom)*100, phase: c.phase };
  });
  const maxDist = Math.max(...profiles.map(p => p.totalDist), mainLen+10);
  // SVG
  let svg = '';
  svg += `<defs><filter id="vpGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg += `<radialGradient id="vpBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1f33"/><stop offset="100%" stop-color="#06101c"/></radialGradient></defs>`;
  svg += `<rect width="${W}" height="${H}" fill="url(#vpBg)"/>`;
  // Title
  svg += `<text x="${W/2}" y="20" text-anchor="middle" font-size="12" font-weight="800" fill="#bfe9ff" filter="url(#vpGlow)">${da?'Sp\u00E6ndingsprofil':'Voltage profile'}</text>`;
  // Grid
  const vRange = Vmax - Vmin;
  for(let v = Vmin; v <= Vmax; v += (is3ph?5:2.5)){
    const y = padT + plotH - ((v - Vmin)/vRange)*plotH;
    svg += `<line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" stroke="rgba(0,200,255,0.13)" stroke-width="0.5"/>`;
    svg += `<text x="${padL-5}" y="${y+3}" text-anchor="end" font-size="8" fill="#7fa8c4">${v.toFixed(0)}V</text>`;
  }
  // X axis labels
  for(let d=0; d<=maxDist; d+=Math.ceil(maxDist/5)){
    const x = padL + (d/maxDist)*plotW;
    svg += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+plotH}" stroke="rgba(0,200,255,0.08)" stroke-width="0.5"/>`;
    svg += `<text x="${x}" y="${padT+plotH+14}" text-anchor="middle" font-size="8" fill="#7fa8c4">${d}m</text>`;
  }
  // Voltage drop limit bands
  const limits = [{pct:3, color:'rgba(255,209,102,0.12)', label: da?'3% lys':'3% light'},
                  {pct:4, color:'rgba(255,154,77,0.10)', label: da?'4% generel':'4% general'},
                  {pct:5, color:'rgba(255,59,92,0.10)', label: '5% max'}];
  limits.forEach(lim => {
    const vLim = Vnom * (1 - lim.pct/100);
    if(vLim >= Vmin){
      const y = padT + plotH - ((vLim-Vmin)/vRange)*plotH;
      svg += `<line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" stroke="${lim.color.replace(/0\.\d+\)/,'0.6)')}" stroke-width="1.5" stroke-dasharray="4 3"/>`;
      svg += `<text x="${padL+plotW+3}" y="${y+3}" font-size="7" fill="${lim.color.replace(/0\.\d+\)/,'0.8)')}">${lim.label}</text>`;
    }
  });
  // Plot lines
  profiles.forEach((pr, i) => {
    const col = circColors[i % circColors.length];
    const pts = pr.points.map(p => {
      const x = padL + (p.x/maxDist)*plotW;
      const y = padT + plotH - ((p.v-Vmin)/vRange)*plotH;
      return `${x},${y}`;
    }).join(' ');
    svg += `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" filter="url(#vpGlow)"/>`;
    // End dot
    const lastPt = pr.points[pr.points.length-1];
    const ex = padL + (lastPt.x/maxDist)*plotW;
    const ey = padT + plotH - ((lastPt.v-Vmin)/vRange)*plotH;
    svg += `<circle cx="${ex}" cy="${ey}" r="3.5" fill="${col}" filter="url(#vpGlow)"/>`;
    svg += `<text x="${ex+6}" y="${ey+3}" font-size="7" fill="${col}">${pr.name}</text>`;
    // Mark if crossing limit
    if(pr.dvPct > 5){
      svg += `<text x="${ex+6}" y="${ey+12}" font-size="7" fill="#ff3b5c">\u26A0 ${pr.dvPct.toFixed(1)}%</text>`;
    }
  });
  // Axis labels
  svg += `<text x="${padL+plotW/2}" y="${H-5}" text-anchor="middle" font-size="9" fill="#7fa8c4">${da?'Afstand fra trafo (m)':'Distance from transformer (m)'}</text>`;
  svg += `<text x="12" y="${padT+plotH/2}" text-anchor="middle" font-size="9" fill="#7fa8c4" transform="rotate(-90,12,${padT+plotH/2})">${da?'Sp\u00E6nding (V)':'Voltage (V)'}</text>`;
  // Panel vertical line
  const panelXpos = padL + (mainLen/maxDist)*plotW;
  svg += `<line x1="${panelXpos}" y1="${padT}" x2="${panelXpos}" y2="${padT+plotH}" stroke="rgba(0,229,255,0.3)" stroke-width="1" stroke-dasharray="3 2"/>`;
  svg += `<text x="${panelXpos}" y="${padT-5}" text-anchor="middle" font-size="7" fill="#00e5ff">${da?'Tavle':'Panel'}</text>`;
  const svgTag = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:700px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  // Main cable length selector
  let selector = `<div class="select-group" style="margin-bottom:10px"><div class="select-label">${da?'Hovedkabel l\u00E6ngde':'Main cable length'}</div><div class="select-grid">`;
  mainLenOpts.forEach(ml => {
    selector += `<button class="sel-btn ${ml===mainLen?'selected':''}" onclick="vpMainLen=${ml};renderModule('draw')">${ml} m</button>`;
  });
  selector += `</div></div>`;
  let htm = `<div class="card fade-in"><div class="card-title">\uD83D\uDCC9 ${da?'Sp\u00E6ndingsprofil':'Voltage profile'}</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Viser sp\u00E6ndingsniveauet fra transformerens sekund\u00E6rside gennem hovedkabel og tavle til enden af hver kreds. V\u00E6lg hovedkablets l\u00E6ngde nedenfor.':'Shows voltage level from transformer secondary through main cable and panel to the end of each circuit. Select main cable length below.'}</div>`;
  htm += selector;
  htm += svgTag;
  // Summary table
  htm += `<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-row"><span class="label" style="color:#7fa8c4">${da?'Sp\u00E6nding ved tavle':'Voltage at panel'}</span><span class="value" style="color:#00e5ff">${Vpanel.toFixed(1)} V (\u0394${dvMain.toFixed(1)} V = ${(dvMain/Vnom*100).toFixed(2)}%)</span></div>`;
  profiles.forEach((pr,i) => {
    const col = circColors[i % circColors.length];
    const warn = pr.dvPct > 5 ? ' \u26A0' : pr.dvPct > 4 ? ' \u26A0' : '';
    htm += `<div class="result-row"><span class="label" style="color:${col}">${pr.name}</span><span class="value" style="color:${pr.dvPct>5?'#ff3b5c':pr.dvPct>4?'#ff9a4d':'#06d6a0'}">${pr.Vend.toFixed(1)} V (\u0394${pr.dvPct.toFixed(2)}%)${warn}</span></div>`;
  });
  htm += `</div></div>`;
  return htm;
}


// ===== EMC & CABLE ROUTING RECOMMENDATIONS =====
function buildEmcRouting(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'},{kW:8,cos:0.9,sf:0.9,phase:'3',name:'Serverrum'}
  ];
  if(!cons.length){
    return `<div class="card fade-in"><div class="card-title">\uD83D\uDEE1\uFE0F ${da?'EMC & kabelf\u00F8ring':'EMC & cable routing'}</div><div class="info-row">${da?'Tilf\u00F8j forbrugere i belastningsskemaet f\u00F8rst.':'Add consumers to the load schedule first.'}</div></div>`;
  }
  // Classify circuits into EMC categories
  function emcCat(c){
    const n = (c.name||'').toLowerCase();
    // Cat 1: sensitive (data, telecom, measurement)
    if(/server|data|ups|m\u00e5l|sensor|telecom|measurement|plc|signal/.test(n)) return 1;
    // Cat 3: disturbing (VFD motors, EV, welders, large switching)
    if(/motor|pumpe|pump|kompres|vent|kran|crane|elevator|lift|svejs|weld|ev|lade|elbil|charg|vfd|frekvens|inverter/.test(n)) return 3;
    // Cat 2: normal (lighting, sockets, general)
    return 2;
  }
  const classified = cons.map(c => ({...c, cat: emcCat(c)}));
  const cat1 = classified.filter(c => c.cat===1);
  const cat2 = classified.filter(c => c.cat===2);
  const cat3 = classified.filter(c => c.cat===3);
  // Separation rules per IEC 61000-5-2
  const rules = [
    {from:1, to:3, dist:300, alt: da?'eller metallisk barriere':'or metallic barrier'},
    {from:1, to:2, dist:100, alt:''},
    {from:2, to:3, dist:150, alt: da?'eller separat bakke':'or separate tray'}
  ];
  // SVG cross-section diagram
  const W=620, H=300;
  let svg = '';
  svg += `<defs><filter id="emcGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg += `<radialGradient id="emcBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1f33"/><stop offset="100%" stop-color="#06101c"/></radialGradient></defs>`;
  svg += `<rect width="${W}" height="${H}" fill="url(#emcBg)"/>`;
  // Title
  svg += `<text x="${W/2}" y="22" text-anchor="middle" font-size="12" font-weight="800" fill="#bfe9ff" filter="url(#emcGlow)">${da?'EMC & kabelf\u00F8ring \u2014 tv\u00E6rsnit':'EMC & cable routing \u2014 cross-section'}</text>`;
  // Draw cable tray outline
  const trayY = 100, trayH = 120, trayW = 500, trayX = (W-trayW)/2;
  svg += `<rect x="${trayX}" y="${trayY}" width="${trayW}" height="${trayH}" rx="6" fill="none" stroke="rgba(0,200,255,0.3)" stroke-width="2" stroke-dasharray="6 3"/>`;
  svg += `<text x="${trayX+trayW/2}" y="${trayY-8}" text-anchor="middle" font-size="9" fill="#7fa8c4">${da?'Kabelbakke / kabelrute':'Cable tray / route'}</text>`;
  // Three zones
  const zoneW = trayW / 3 - 20;
  const zones = [
    {label: da?'Kat. 1 (F\u00F8lsom)':'Cat. 1 (Sensitive)', color:'#06d6a0', x: trayX+15, items: cat1},
    {label: da?'Kat. 2 (Normal)':'Cat. 2 (Normal)', color:'#ffd166', x: trayX+trayW/3+5, items: cat2},
    {label: da?'Kat. 3 (Forstyrrende)':'Cat. 3 (Disturbing)', color:'#ff3b5c', x: trayX+2*trayW/3-5, items: cat3}
  ];
  zones.forEach((z,zi) => {
    svg += `<rect x="${z.x}" y="${trayY+10}" width="${zoneW}" height="${trayH-20}" rx="4" fill="${z.color}" fill-opacity="0.08" stroke="${z.color}" stroke-width="1.2" stroke-opacity="0.5"/>`;
    svg += `<text x="${z.x+zoneW/2}" y="${trayY+26}" text-anchor="middle" font-size="9" font-weight="700" fill="${z.color}">${z.label}</text>`;
    // Draw cable circles for items
    const maxShow = Math.min(z.items.length, 5);
    for(let i=0;i<maxShow;i++){
      const cx = z.x + 20 + i*(zoneW-40)/Math.max(maxShow-1,1);
      const cy = trayY + 60 + (i%2)*30;
      svg += `<circle cx="${cx}" cy="${cy}" r="10" fill="#0a1e2e" stroke="${z.color}" stroke-width="1.5" filter="url(#emcGlow)"/>`;
      svg += `<text x="${cx}" y="${cy+3}" text-anchor="middle" font-size="6" fill="${z.color}">${(z.items[i].name||'').slice(0,4)}</text>`;
    }
    if(z.items.length > 5){
      svg += `<text x="${z.x+zoneW/2}" y="${trayY+trayH-10}" text-anchor="middle" font-size="7" fill="${z.color}">+${z.items.length-5} ${da?'flere':'more'}</text>`;
    }
    if(z.items.length === 0){
      svg += `<text x="${z.x+zoneW/2}" y="${trayY+65}" text-anchor="middle" font-size="8" fill="#5a6d7e" opacity="0.6">(${da?'ingen':'none'})</text>`;
    }
  });
  // Separation arrows
  const arrowY = trayY + trayH + 25;
  // Cat1 <-> Cat2: 100mm
  const x1_2_l = trayX+15+zoneW, x1_2_r = trayX+trayW/3+5;
  svg += `<line x1="${x1_2_l}" y1="${arrowY}" x2="${x1_2_r}" y2="${arrowY}" stroke="#ffd166" stroke-width="1.5" marker-start="url(#emcArr)" marker-end="url(#emcArr)"/>`;
  svg += `<text x="${(x1_2_l+x1_2_r)/2}" y="${arrowY-5}" text-anchor="middle" font-size="8" fill="#ffd166">\u2265100mm</text>`;
  // Cat2 <-> Cat3: 150mm
  const x2_3_l = trayX+trayW/3+5+zoneW, x2_3_r = trayX+2*trayW/3-5;
  svg += `<line x1="${x2_3_l}" y1="${arrowY+20}" x2="${x2_3_r}" y2="${arrowY+20}" stroke="#ff9a4d" stroke-width="1.5"/>`;
  svg += `<text x="${(x2_3_l+x2_3_r)/2}" y="${arrowY+15}" text-anchor="middle" font-size="8" fill="#ff9a4d">\u2265150mm</text>`;
  // Cat1 <-> Cat3: 300mm (full span)
  svg += `<line x1="${trayX+15+zoneW/2}" y1="${arrowY+40}" x2="${trayX+2*trayW/3-5+zoneW/2}" y2="${arrowY+40}" stroke="#ff3b5c" stroke-width="1.5"/>`;
  svg += `<text x="${W/2}" y="${arrowY+35}" text-anchor="middle" font-size="8" fill="#ff3b5c">\u2265300mm ${da?'eller metallisk barriere':'or metallic barrier'}</text>`;
  // IEC reference
  svg += `<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="7" fill="#5a6d7e">IEC 61000-5-2</text>`;
  const svgTag = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:660px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  // Recommendations and issues
  let issues = [];
  let recos = [];
  if(cat1.length && cat3.length){
    issues.push(da?'F\u00F8lsomme kredse (data/server) og forstyrrende kredse (motorer/EV) er p\u00E5 samme installation \u2014 korrekt adskillelse kr\u00E6ves!':'Sensitive circuits (data/server) and disturbing circuits (motors/EV) are on the same installation \u2014 proper separation required!');
    recos.push(da?'Anvend skærmet kabel (f.eks. NOIKX-S eller LSZH-S) for kategori 1 kredse.':'Use shielded cable (e.g. NOIKX-S or LSZH-S) for category 1 circuits.');
    recos.push(da?'Monter EMC-filter p\u00E5 frekvensomformere og store kontaktorer.':'Install EMC filters on VFDs and large contactors.');
  }
  if(cat3.length){
    recos.push(da?'F\u00F8r kategori 3 kabler i separat bakke eller r\u00F8r med min. 150 mm afstand til kategori 2.':'Route category 3 cables in separate tray or conduit with min. 150mm separation from category 2.');
  }
  if(cat3.some(c => /ev|lade|elbil|charg/.test((c.name||'').toLowerCase()))){
    recos.push(da?'EV-ladere: Overvej skærmet forsyningskabel og ferritkerner p\u00E5 kommunikationskabler.':'EV chargers: Consider shielded supply cable and ferrite cores on communication cables.');
  }
  if(cat3.some(c => /svejs|weld/.test((c.name||'').toLowerCase()))){
    issues.push(da?'Svejseudstyr genererer kraftig EMI \u2014 dedikeret kreds med EMC-filter anbefales.':'Welding equipment generates strong EMI \u2014 dedicated circuit with EMC filter recommended.');
  }
  if(!issues.length && !recos.length){
    recos.push(da?'\u2713 Ingen kritiske EMC-problemer detekteret. Standardinstallation er tilstr\u00E6kkelig.':'\u2713 No critical EMC issues detected. Standard installation is sufficient.');
  }
  let htm = `<div class="card fade-in"><div class="card-title">\uD83D\uDEE1\uFE0F ${da?'EMC & kabelf\u00F8ring':'EMC & cable routing'}</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Klassificerer kredse i EMC-kategorier og anbefaler minimumafstande per IEC 61000-5-2. Visualiserer kabelbakkens tv\u00E6rsnit med anbefalet placering.':'Classifies circuits into EMC categories and recommends minimum separation distances per IEC 61000-5-2. Visualizes cable tray cross-section with recommended placement.'}</div>`;
  htm += svgTag;
  // Classification summary
  htm += `<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-title" style="color:#bfe9ff;margin-bottom:6px">${da?'Klassificering':'Classification'}</div>`;
  htm += `<div class="result-row"><span class="label" style="color:#06d6a0">${da?'Kat. 1 (F\u00F8lsom)':'Cat. 1 (Sensitive)'}</span><span class="value" style="color:#06d6a0">${cat1.length ? cat1.map(c=>c.name).join(', ') : (da?'Ingen':'None')}</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:#ffd166">${da?'Kat. 2 (Normal)':'Cat. 2 (Normal)'}</span><span class="value" style="color:#ffd166">${cat2.length ? cat2.map(c=>c.name).join(', ') : (da?'Ingen':'None')}</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:#ff3b5c">${da?'Kat. 3 (Forstyrrende)':'Cat. 3 (Disturbing)'}</span><span class="value" style="color:#ff3b5c">${cat3.length ? cat3.map(c=>c.name).join(', ') : (da?'Ingen':'None')}</span></div>`;
  htm += `</div>`;
  // Separation rules table
  htm += `<div class="result-box" style="margin-top:8px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-title" style="color:#bfe9ff;margin-bottom:6px">${da?'Mindsteafstande (IEC 61000-5-2)':'Minimum distances (IEC 61000-5-2)'}</div>`;
  rules.forEach(r => {
    htm += `<div class="result-row"><span class="label" style="color:#7fa8c4">${da?'Kat.':'Cat.'} ${r.from} \u2194 ${da?'Kat.':'Cat.'} ${r.to}</span><span class="value" style="color:#ff9a4d">\u2265 ${r.dist} mm ${r.alt}</span></div>`;
  });
  htm += `</div>`;
  // Issues and recommendations
  if(issues.length){
    htm += `<div class="result-box error" style="margin-top:8px">`;
    htm += `<div class="result-title" style="color:#ff3b5c">\u26A0 ${da?'Potentielle EMC-problemer':'Potential EMC issues'}</div>`;
    issues.forEach(iss => { htm += `<div class="result-row"><span class="label" style="color:#ff9a4d">${iss}</span></div>`; });
    htm += `</div>`;
  }
  if(recos.length){
    htm += `<div class="result-box" style="margin-top:8px;background:rgba(6,214,160,0.06);border:1px solid rgba(6,214,160,0.3)">`;
    htm += `<div class="result-title" style="color:#06d6a0">${da?'Anbefalinger':'Recommendations'}</div>`;
    recos.forEach(rec => { htm += `<div class="result-row"><span class="label" style="color:#bfe9ff">\u2022 ${rec}</span></div>`; });
    htm += `</div>`;
  }
  htm += `</div>`;
  return htm;
}


// ===== MOTOR STARTING ANALYSIS =====
function buildMotorStart(){
  const da = lang==='da';
  const motorPowers = [1.5,3,5.5,7.5,11,15,22,30,45,75];
  const methods = {
    dol: {da:'DOL (direkte)',en:'DOL (Direct On Line)',multMin:6,multMax:8,tMin:0.5,tMax:3},
    yd: {da:'Stjerne-Trekant (Y/\u0394)',en:'Star-Delta (Y/\u0394)',multMin:2,multMax:3,tMin:3,tMax:10},
    soft: {da:'Soft Starter',en:'Soft Starter',multMin:2,multMax:4,tMin:5,tMax:20},
    vfd: {da:'VFD (frekvensomformer)',en:'VFD (Variable Freq. Drive)',multMin:1,multMax:1.5,tMin:5,tMax:30}
  };
  const curves = ['B','C','D'];
  // Find a motor in loadList or use default
  const motorCons = loadList.find(c => /motor|pumpe|pump|kompres|vent|kran|crane/.test((c.name||'').toLowerCase()));
  const Pkw = msMotorKW;
  const In = (Pkw * 1000) / (Math.sqrt(3) * 400 * 0.85); // typical motor efficiency*cos
  const m = methods[msMethod];
  const Istart = In * (m.multMin + m.multMax) / 2;
  const tStart = (m.tMin + m.tMax) / 2;
  // Voltage dip: deltaU% = Istart * Zs / Un * 100 (Zs from transformer)
  const sch = calcLoadSchedule();
  const totalKVA = loadList.length ? sch.kVA : 100;
  const trafo = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=totalKVA)||400) : 400;
  const uk = TRAFO_UK[trafo] || 4;
  const Ztrafo = (uk/100) * (400*400) / (trafo*1000); // transformer impedance in ohms
  const deltaU = (Istart * Ztrafo / 400) * 100;
  // MCB trip check
  const mcbIn = In < 16 ? 16 : In < 20 ? 20 : In < 25 ? 25 : In < 32 ? 32 : In < 40 ? 40 : In < 50 ? 50 : In < 63 ? 63 : 80;
  const curve = MCB_CURVES[msCurve];
  const mcbInstTrip = curve.isdMax * mcbIn; // instantaneous trip threshold
  const ridesThrough = Istart < mcbInstTrip;
  // SVG chart: current vs time with MCB trip curve overlay
  const W=600, H=320;
  let svg = '';
  svg += '<defs><filter id="msGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '<radialGradient id="msBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1f33"/><stop offset="100%" stop-color="#06101c"/></radialGradient></defs>';
  svg += `<rect width="${W}" height="${H}" fill="url(#msBg)"/>`;
  svg += `<text x="${W/2}" y="20" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff" filter="url(#msGlow)">${da?'Motorstart \u2014 str\u00f8m vs tid':'Motor Start \u2014 current vs time'}</text>`;
  // Axes
  const ax={l:70,r:30,t:35,b:40};
  const pw=W-ax.l-ax.r, ph=H-ax.t-ax.b;
  svg += `<line x1="${ax.l}" y1="${ax.t}" x2="${ax.l}" y2="${H-ax.b}" stroke="#3a5a7a" stroke-width="1"/>`;
  svg += `<line x1="${ax.l}" y1="${H-ax.b}" x2="${W-ax.r}" y2="${H-ax.b}" stroke="#3a5a7a" stroke-width="1"/>`;
  svg += `<text x="${ax.l-8}" y="${ax.t-8}" text-anchor="end" font-size="8" fill="#7fa8c4">I (A)</text>`;
  svg += `<text x="${W-ax.r+5}" y="${H-ax.b+12}" font-size="8" fill="#7fa8c4">t (s)</text>`;
  // Scale
  const maxI = Math.max(Istart * 1.2, mcbInstTrip * 1.1);
  const maxT = Math.max(tStart * 1.5, 5);
  // Grid lines
  for(let g=0;g<=4;g++){
    const gy = ax.t + (ph/4)*g;
    const gval = (maxI*(4-g)/4).toFixed(0);
    svg += `<line x1="${ax.l}" y1="${gy}" x2="${W-ax.r}" y2="${gy}" stroke="#1a3a5a" stroke-width="0.5" stroke-dasharray="3 3"/>`;
    svg += `<text x="${ax.l-5}" y="${gy+3}" text-anchor="end" font-size="7" fill="#5a7a9a">${gval}</text>`;
  }
  for(let g=0;g<=5;g++){
    const gx = ax.l + (pw/5)*g;
    const gval = (maxT*g/5).toFixed(1);
    svg += `<text x="${gx}" y="${H-ax.b+12}" text-anchor="middle" font-size="7" fill="#5a7a9a">${gval}s</text>`;
  }
  // Motor starting current curve (exponential decay from Istart to In)
  const nPts = 40;
  let motorPath = '';
  for(let i=0;i<=nPts;i++){
    const t = (i/nPts) * maxT;
    let I;
    if(t <= tStart){
      // During start: high current decaying
      const frac = t / tStart;
      I = In + (Istart - In) * Math.exp(-3*frac);
    } else {
      I = In;
    }
    const px = ax.l + (t/maxT)*pw;
    const py = ax.t + (1 - I/maxI)*ph;
    motorPath += (i===0?'M':'L') + px.toFixed(1)+','+py.toFixed(1);
  }
  svg += `<path d="${motorPath}" fill="none" stroke="#00d4ff" stroke-width="2.5" filter="url(#msGlow)"/>`;
  svg += `<text x="${ax.l+pw*0.15}" y="${ax.t+(1-Istart/maxI)*ph-8}" font-size="8" fill="#00d4ff">Istart=${Istart.toFixed(0)}A</text>`;
  // MCB instantaneous trip line
  const mcbY = ax.t + (1 - mcbInstTrip/maxI)*ph;
  svg += `<line x1="${ax.l}" y1="${mcbY}" x2="${W-ax.r}" y2="${mcbY}" stroke="#ff3b5c" stroke-width="1.5" stroke-dasharray="6 3"/>`;
  svg += `<text x="${W-ax.r-5}" y="${mcbY-5}" text-anchor="end" font-size="8" fill="#ff3b5c">MCB ${msCurve}${mcbIn} inst.=${mcbInstTrip.toFixed(0)}A</text>`;
  // In line
  const inY = ax.t + (1 - In/maxI)*ph;
  svg += `<line x1="${ax.l}" y1="${inY}" x2="${W-ax.r}" y2="${inY}" stroke="#06d6a0" stroke-width="1" stroke-dasharray="4 2"/>`;
  svg += `<text x="${W-ax.r-5}" y="${inY-5}" text-anchor="end" font-size="8" fill="#06d6a0">In=${In.toFixed(1)}A</text>`;
  // Verdict on chart
  const verdictColor = ridesThrough ? '#06d6a0' : '#ffd166';
  const verdictText = ridesThrough ? (da?'Beskyttelsen holder':'Protection rides through') : (da?'Risiko for udl\u00f8sning':'Risk of nuisance trip');
  svg += `<rect x="${W/2-100}" y="${H-32}" width="200" height="20" rx="4" fill="${verdictColor}" fill-opacity="0.15" stroke="${verdictColor}" stroke-width="1"/>`;
  svg += `<text x="${W/2}" y="${H-19}" text-anchor="middle" font-size="9" font-weight="700" fill="${verdictColor}">${verdictText}</text>`;
  const svgTag = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:640px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  // Build HTML
  let htm = `<div class="card fade-in"><div class="card-title">\u2699\ufe0f ${da?'Motorstart-analyse':'Motor starting analysis'}</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Analyserer motorstartmetoders effekt p\u00e5 sp\u00e6ndingsfald og beskyttelseskoordinering.':'Analyzes motor starting methods and their effect on voltage drop and protection coordination.'}</div>`;
  // Selectors
  htm += `<div class="select-group"><div class="select-label">${da?'Motoreffekt (kW)':'Motor power (kW)'}</div><div class="select-grid">`;
  motorPowers.forEach(p => { htm += `<button class="sel-btn ${msMotorKW===p?'selected':''}" onclick="msSetMotor(${p})">${p} kW</button>`; });
  htm += `</div></div>`;
  htm += `<div class="select-group"><div class="select-label">${da?'Startmetode':'Starting method'}</div><div class="select-grid">`;
  Object.keys(methods).forEach(k => { htm += `<button class="sel-btn ${msMethod===k?'selected':''}" onclick="msSetMethod('${k}')">${da?methods[k].da:methods[k].en}</button>`; });
  htm += `</div></div>`;
  htm += `<div class="select-group"><div class="select-label">${da?'MCB-kurve':'MCB curve'}</div><div class="select-grid">`;
  curves.forEach(c => { htm += `<button class="sel-btn ${msCurve===c?'selected':''}" onclick="msSetCurve('${c}')">${c}</button>`; });
  htm += `</div></div>`;
  htm += svgTag;
  // Results
  htm += `<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-title" style="color:#bfe9ff">${da?'Startparametre':'Starting parameters'}</div>`;
  htm += `<div class="result-row"><span class="label">${da?'Nominel str\u00f8m In':'Nominal current In'}</span><span class="value" style="color:#06d6a0">${In.toFixed(1)} A</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Startstr\u00f8m Istart':'Starting current Istart'}</span><span class="value" style="color:#00d4ff">${Istart.toFixed(0)} A (${((m.multMin+m.multMax)/2).toFixed(1)}\u00d7In)</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Starttid':'Starting time'}</span><span class="value" style="color:#ffd166">${tStart.toFixed(1)} s</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Sp\u00e6ndingsdip ved PCC (\u0394U%)':'Voltage dip at PCC (\u0394U%)'}</span><span class="value" style="color:${deltaU>5?'#ff3b5c':'#06d6a0'}">${deltaU.toFixed(1)} %</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'MCB udl\u00f8sningsgr\u00e6nse':'MCB trip threshold'}</span><span class="value" style="color:#ff9a4d">${mcbInstTrip.toFixed(0)} A (${msCurve}${mcbIn})</span></div>`;
  htm += `</div>`;
  // Verdict box
  const vBg = ridesThrough ? 'rgba(6,214,160,0.08)' : 'rgba(255,209,102,0.1)';
  const vBorder = ridesThrough ? 'rgba(6,214,160,0.4)' : 'rgba(255,209,102,0.4)';
  htm += `<div class="result-box" style="margin-top:8px;background:${vBg};border:1px solid ${vBorder}">`;
  htm += `<div class="result-title" style="color:${verdictColor}">${ridesThrough?'\u2705':'\u26a0\ufe0f'} ${verdictText}</div>`;
  if(!ridesThrough){
    htm += `<div class="result-row"><span class="label" style="color:#ffd166">${da?'Anbefaling: Brug kurve C/D eller VFD for at undg\u00e5 falsk udl\u00f8sning.':'Recommendation: Use curve C/D or VFD to avoid nuisance tripping.'}</span></div>`;
  }
  htm += `</div></div>`;
  return htm;
}

// ===== CAPACITOR BANK SIZING (POWER FACTOR CORRECTION) =====
function buildCapBank(){
  const da = lang==='da';
  const sch = calcLoadSchedule();
  // Get total active power and average cos phi
  const totalKW = sch.kW || (loadList.length ? loadList.reduce((s,c)=>s+c.kW*c.sf,0) : 50);
  const avgCos = loadList.length ? (loadList.reduce((s,c)=>s+c.cos,0)/loadList.length) : 0.82;
  const cosCurrent = Math.min(Math.max(avgCos, 0.5), 0.99);
  const cosTarget = cbTarget;
  const targetOpts = [0.90,0.92,0.95,0.97,0.99,1.0];
  const stdBanks = [5,10,15,20,25,30,40,50,75,100];
  // Calculations
  const phi1 = Math.acos(cosCurrent);
  const phi2 = Math.acos(Math.min(cosTarget, 0.9999));
  const tanPhi1 = Math.tan(phi1);
  const tanPhi2 = Math.tan(phi2);
  const Qc = totalKW * (tanPhi1 - tanPhi2); // required kVAr
  const QcPos = Math.max(0, Qc);
  // Pick standard bank size
  const bankSize = stdBanks.find(b => b >= QcPos) || stdBanks[stdBanks.length-1];
  // Before/after apparent power and current
  const S_before = totalKW / cosCurrent;
  const S_after = totalKW / Math.min(cosTarget, 0.9999);
  const I_before = S_before * 1000 / (Math.sqrt(3) * 400);
  const I_after = S_after * 1000 / (Math.sqrt(3) * 400);
  const currentReduction = ((1 - I_after/I_before) * 100);
  // Loss reduction (I^2 R proportional)
  const lossReduction = ((1 - (I_after*I_after)/(I_before*I_before)) * 100);
  // Annual savings estimate
  const cableR = 0.002; // assumed system resistance in ohms per phase
  const hoursPerYear = 4000;
  const elPrice = 2.5; // DKK/kWh
  const lossBeforeW = 3 * I_before * I_before * cableR;
  const lossAfterW = 3 * I_after * I_after * cableR;
  const annualSavings = (lossBeforeW - lossAfterW) * hoursPerYear * elPrice / 1000;
  // Fixed vs automatic recommendation
  const loadVariability = loadList.length > 4 ? 'auto' : 'fixed';
  // SVG Power Triangle
  const W=580, H=320;
  let svg = '';
  svg += '<defs><filter id="cbGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '<radialGradient id="cbBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1f33"/><stop offset="100%" stop-color="#06101c"/></radialGradient></defs>';
  svg += `<rect width="${W}" height="${H}" fill="url(#cbBg)"/>`;
  svg += `<text x="${W/2}" y="20" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff" filter="url(#cbGlow)">${da?'Effekttrekant \u2014 f\u00f8r/efter kompensering':'Power triangle \u2014 before/after compensation'}</text>`;
  // Draw triangles
  const cx=W/2-50, cy=H-60;
  const scale = Math.min(200/(S_before||1), 150/(totalKW*tanPhi1||1));
  const pLen = totalKW * scale; // P horizontal
  const q1Len = totalKW * tanPhi1 * scale; // Q before (vertical, going UP)
  const q2Len = totalKW * tanPhi2 * scale; // Q after
  const s1Len = S_before * scale;
  // Before triangle (dimmer)
  const bx1=cx, by1=cy; // P start (bottom-left)
  const bx2=cx+pLen, by2=cy; // P end (bottom-right)
  const bx3=cx+pLen, by3=cy-q1Len; // Q top
  svg += `<polygon points="${bx1},${by1} ${bx2},${by2} ${bx3},${by3}" fill="rgba(255,59,92,0.08)" stroke="#ff3b5c" stroke-width="1.5" stroke-dasharray="4 2"/>`;
  // After triangle (bright)
  const ax3=cx+pLen, ay3=cy-q2Len;
  svg += `<polygon points="${bx1},${by1} ${bx2},${by2} ${ax3},${ay3}" fill="rgba(6,214,160,0.1)" stroke="#06d6a0" stroke-width="2"/>`;
  // Labels
  svg += `<text x="${cx+pLen/2}" y="${cy+18}" text-anchor="middle" font-size="9" fill="#ffd166" font-weight="700">P = ${totalKW.toFixed(0)} kW</text>`;
  svg += `<text x="${bx3+12}" y="${cy-(q1Len/2)}" font-size="8" fill="#ff3b5c" font-weight="600">Q\u2081=${(totalKW*tanPhi1).toFixed(0)} kVAr</text>`;
  svg += `<text x="${ax3+12}" y="${cy-(q2Len/2)}" font-size="8" fill="#06d6a0" font-weight="600">Q\u2082=${(totalKW*tanPhi2).toFixed(0)} kVAr</text>`;
  // S labels
  svg += `<text x="${cx+pLen/2-30}" y="${cy-q1Len/2-5}" font-size="8" fill="#ff3b5c" transform="rotate(${(-Math.atan2(q1Len,pLen)*180/Math.PI).toFixed(1)},${cx+pLen/2-30},${cy-q1Len/2-5})">S\u2081=${S_before.toFixed(0)} kVA</text>`;
  svg += `<text x="${cx+pLen/2-30}" y="${cy-q2Len/2+10}" font-size="8" fill="#06d6a0" transform="rotate(${(-Math.atan2(q2Len,pLen)*180/Math.PI).toFixed(1)},${cx+pLen/2-30},${cy-q2Len/2+10})">S\u2082=${S_after.toFixed(0)} kVA</text>`;
  // Qc arrow
  if(QcPos > 0){
    const qcY1 = cy - q1Len;
    const qcY2 = cy - q2Len;
    svg += `<line x1="${bx3+5}" y1="${qcY1}" x2="${ax3+5}" y2="${qcY2}" stroke="#00d4ff" stroke-width="2" marker-end="url(#cbArr)"/>`;
    svg += `<text x="${bx3+22}" y="${(qcY1+qcY2)/2+3}" font-size="9" fill="#00d4ff" font-weight="700">Qc=${QcPos.toFixed(0)} kVAr</text>`;
  }
  // Legend
  svg += `<rect x="15" y="35" width="12" height="12" rx="2" fill="none" stroke="#ff3b5c" stroke-dasharray="3 2"/>`;
  svg += `<text x="32" y="45" font-size="8" fill="#ff3b5c">${da?'F\u00f8r (cos\u03c6='+cosCurrent.toFixed(2)+')':'Before (cos\u03c6='+cosCurrent.toFixed(2)+')'}</text>`;
  svg += `<rect x="15" y="52" width="12" height="12" rx="2" fill="none" stroke="#06d6a0"/>`;
  svg += `<text x="32" y="62" font-size="8" fill="#06d6a0">${da?'Efter (cos\u03c6='+cosTarget.toFixed(2)+')':'After (cos\u03c6='+cosTarget.toFixed(2)+')'}</text>`;
  const svgTag = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:620px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  // HTML output
  let htm = `<div class="card fade-in"><div class="card-title">\u26a1 ${da?'Fasekompensering (kVAr)':'Power factor correction (kVAr)'}</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Beregner n\u00f8dvendig reaktiv effektkompensation (kVAr) for at forbedre cos \u03c6. Formel: Qc = P \u00d7 (tan\u03c6\u2081 \u2212 tan\u03c6\u2082)':'Calculates required reactive power compensation (kVAr) to improve cos \u03c6. Formula: Qc = P \u00d7 (tan\u03c6\u2081 \u2212 tan\u03c6\u2082)'}</div>`;
  // Target selector
  htm += `<div class="select-group"><div class="select-label">${da?'M\u00e5l cos \u03c6':'Target cos \u03c6'}</div><div class="select-grid">`;
  targetOpts.forEach(t => { htm += `<button class="sel-btn ${cbTarget===t?'selected':''}" onclick="cbSetTarget(${t})">${t.toFixed(2)}</button>`; });
  htm += `</div></div>`;
  htm += svgTag;
  // Results
  htm += `<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-title" style="color:#bfe9ff">${da?'Kompensering':'Compensation'}</div>`;
  htm += `<div class="result-row"><span class="label">${da?'Aktuel cos \u03c6':'Current cos \u03c6'}</span><span class="value" style="color:#ff9a4d">${cosCurrent.toFixed(3)}</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'M\u00e5l cos \u03c6':'Target cos \u03c6'}</span><span class="value" style="color:#06d6a0">${cosTarget.toFixed(2)}</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'N\u00f8dvendig Qc':'Required Qc'}</span><span class="value" style="color:#00d4ff">${QcPos.toFixed(1)} kVAr</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Valgt kondensatorbatteri':'Selected capacitor bank'}</span><span class="value" style="color:#ffd166">${bankSize} kVAr</span></div>`;
  htm += `</div>`;
  // Before/after comparison
  htm += `<div class="result-box" style="margin-top:8px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-title" style="color:#bfe9ff">${da?'F\u00f8r/efter sammenligning':'Before/after comparison'}</div>`;
  htm += `<div class="result-row"><span class="label">${da?'Str\u00f8m f\u00f8r':'Current before'}</span><span class="value" style="color:#ff3b5c">${I_before.toFixed(1)} A</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Str\u00f8m efter':'Current after'}</span><span class="value" style="color:#06d6a0">${I_after.toFixed(1)} A</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Str\u00f8mreduktion':'Current reduction'}</span><span class="value" style="color:#00d4ff">${currentReduction.toFixed(1)} %</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Tabsreduktion (I\u00b2R)':'Loss reduction (I\u00b2R)'}</span><span class="value" style="color:#06d6a0">${lossReduction.toFixed(1)} %</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'\u00c5rlig besparelse (estimat)':'Annual savings (estimate)'}</span><span class="value" style="color:#ffd166">${annualSavings.toFixed(0)} DKK</span></div>`;
  htm += `</div>`;
  // Recommendation
  const recoFixed = da?'Fast kompensering (fast kondensatorbatteri) \u2014 velegnet til stabil belastning.':'Fixed compensation (fixed capacitor bank) \u2014 suitable for stable load.';
  const recoAuto = da?'Automatisk (trinvis) kompensering \u2014 anbefales ved varierende belastning (>4 grupper).':'Automatic (stepped) compensation \u2014 recommended for variable load (>4 circuits).';
  htm += `<div class="result-box" style="margin-top:8px;background:rgba(6,214,160,0.06);border:1px solid rgba(6,214,160,0.3)">`;
  htm += `<div class="result-title" style="color:#06d6a0">${da?'Anbefaling':'Recommendation'}</div>`;
  htm += `<div class="result-row"><span class="label" style="color:#bfe9ff">\u2022 ${loadVariability==='auto'?recoAuto:recoFixed}</span></div>`;
  htm += `<div class="result-row"><span class="label" style="color:#7fa8c4">${da?'Standardst\u00f8rrelser: 5/10/15/20/25/30/40/50/75/100 kVAr':'Standard sizes: 5/10/15/20/25/30/40/50/75/100 kVAr'}</span></div>`;
  htm += `</div></div>`;
  return htm;
}

// ===== PROTECTION RELAY SETTINGS CALCULATOR =====
function buildRelaySettings(){
  const da = lang==='da';
  const sch = calcLoadSchedule();
  const IB = sch.ib || 50; // load current
  // Transformer data for Ik
  const totalKVA = sch.kVA || 100;
  const trafo = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=totalKVA)||400) : 400;
  const uk = TRAFO_UK[trafo] || 4;
  const Ik_busbar = (trafo * 1000) / (Math.sqrt(3) * 400 * (uk/100)); // Ik at busbar
  const Ik_min = Ik_busbar * 0.4; // approximate Ik at cable end (40% of busbar)
  // Relay settings
  const In_relay = IB < 100 ? (Math.ceil(IB/10)*10) : (Math.ceil(IB/50)*50); // next standard relay In
  const Ir = rlIrMult * In_relay; // long-time pickup
  const tr_options = [5,10,15,20,25,30]; // long-time delay at 6xIr
  const Isd = rlIsdMult * Ir; // short-time pickup
  const tsd = rlTsd; // short-time delay
  const Ii = 12 * In_relay; // instantaneous (fixed at 12xIn typical)
  const isdOptions = [2,3,4,5,6,7,8,9,10];
  const tsdOptions = [0,0.05,0.1,0.15,0.2,0.3,0.4];
  const irOptions = [0.8,0.85,0.9,0.95,1.0];
  // Verification checks
  const checks = [];
  checks.push({name: da?'Ir \u2265 IB (laststr\u00f8m)':'Ir \u2265 IB (load current)', ok: Ir >= IB*0.98, val: `${Ir.toFixed(1)}A \u2265 ${IB.toFixed(1)}A`});
  checks.push({name: da?'Isd \u2264 Ik_min (sikrer udl\u00f8sning)':'Isd \u2264 Ik_min (ensures trip)', ok: Isd <= Ik_min, val: `${Isd.toFixed(0)}A \u2264 ${Ik_min.toFixed(0)}A`});
  checks.push({name: da?'Ii \u2264 Ik_busbar':'Ii \u2264 Ik_busbar', ok: Ii <= Ik_busbar, val: `${Ii.toFixed(0)}A \u2264 ${Ik_busbar.toFixed(0)}A`});
  checks.push({name: da?'Selektivitet tsd > downstream':'Selectivity tsd > downstream', ok: tsd >= 0.05, val: `${(tsd*1000).toFixed(0)}ms`});
  // SVG trip curve visualization (3 zones)
  const W=580, H=340;
  let svg = '';
  svg += '<defs><filter id="rlGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '<radialGradient id="rlBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1f33"/><stop offset="100%" stop-color="#06101c"/></radialGradient></defs>';
  svg += `<rect width="${W}" height="${H}" fill="url(#rlBg)"/>`;
  svg += `<text x="${W/2}" y="20" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff" filter="url(#rlGlow)">${da?'Rel\u00e6-udl\u00f8sningskurve (3 zoner)':'Relay trip curve (3 zones)'}</text>`;
  // Log-log axes (simplified linear representation)
  const ax={l:70,r:30,t:40,b:45};
  const pw=W-ax.l-ax.r, ph=H-ax.t-ax.b;
  svg += `<line x1="${ax.l}" y1="${ax.t}" x2="${ax.l}" y2="${H-ax.b}" stroke="#3a5a7a" stroke-width="1"/>`;
  svg += `<line x1="${ax.l}" y1="${H-ax.b}" x2="${W-ax.r}" y2="${H-ax.b}" stroke="#3a5a7a" stroke-width="1"/>`;
  svg += `<text x="${ax.l-8}" y="${ax.t-8}" text-anchor="end" font-size="8" fill="#7fa8c4">t (s)</text>`;
  svg += `<text x="${W-ax.r+5}" y="${H-ax.b+12}" font-size="8" fill="#7fa8c4">I/Ir</text>`;
  // Simplified log scale: I/Ir from 1 to 15, t from 0.01 to 100
  const logI = (x) => Math.log10(x);
  const logT = (x) => Math.log10(x);
  const iMin=1, iMax=15, tMin2=0.01, tMax2=100;
  const xPos = (mult) => ax.l + ((logI(mult)-logI(iMin))/(logI(iMax)-logI(iMin)))*pw;
  const yPos = (t) => ax.t + ((logT(tMax2)-logT(t))/(logT(tMax2)-logT(tMin2)))*ph;
  // Grid
  [1,2,5,10,15].forEach(v => {
    const x = xPos(v);
    svg += `<line x1="${x}" y1="${ax.t}" x2="${x}" y2="${H-ax.b}" stroke="#1a3a5a" stroke-width="0.5" stroke-dasharray="2 3"/>`;
    svg += `<text x="${x}" y="${H-ax.b+12}" text-anchor="middle" font-size="7" fill="#5a7a9a">${v}x</text>`;
  });
  [0.01,0.1,1,10,100].forEach(v => {
    const y = yPos(v);
    svg += `<line x1="${ax.l}" y1="${y}" x2="${W-ax.r}" y2="${y}" stroke="#1a3a5a" stroke-width="0.5" stroke-dasharray="2 3"/>`;
    svg += `<text x="${ax.l-5}" y="${y+3}" text-anchor="end" font-size="7" fill="#5a7a9a">${v}s</text>`;
  });
  // Zone 1: Long-time (inverse curve from 1.05xIr to Isd)
  const ltPoints = [];
  for(let mult=1.05; mult<=rlIsdMult; mult+=0.2){
    const t = 15 / Math.pow(mult, 2); // simplified inverse characteristic
    ltPoints.push(`${xPos(mult).toFixed(1)},${yPos(Math.max(t,tsd+0.01)).toFixed(1)}`);
  }
  if(ltPoints.length>1) svg += `<polyline points="${ltPoints.join(' ')}" fill="none" stroke="#ffd166" stroke-width="2.5" filter="url(#rlGlow)"/>`;
  svg += `<text x="${xPos(2)}" y="${yPos(15/4)-10}" font-size="8" fill="#ffd166" font-weight="600">${da?'Langtid (invers)':'Long-time (inverse)'}</text>`;
  // Zone 2: Short-time (definite time from Isd to Ii)
  const stY = yPos(tsd || 0.05);
  const stX1 = xPos(rlIsdMult);
  const stX2 = xPos(Math.min(12, iMax));
  svg += `<line x1="${stX1}" y1="${stY}" x2="${stX2}" y2="${stY}" stroke="#00d4ff" stroke-width="2.5" filter="url(#rlGlow)"/>`;
  svg += `<text x="${(parseFloat(stX1)+parseFloat(stX2))/2}" y="${stY-8}" text-anchor="middle" font-size="8" fill="#00d4ff" font-weight="600">${da?'Korttid (definit)':'Short-time (definite)'}</text>`;
  // Zone 3: Instantaneous
