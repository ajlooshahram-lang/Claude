// --- SLD SVG Canvas Rendering ---
function sldNodeName(node) {
  if (lang === 'fa') return node.name_fa || node.name_en || node.type;
  if (lang === 'en') return node.name_en || node.name_da || node.type;
  return node.name_da || node.name_en || node.type;
}

function sldRenderCanvas(tree) {
  if (!tree || !tree.rootId) return '<svg width="100%" height="200"></svg>';
  const root = tree.nodes[tree.rootId];
  if (!root) return '<svg width="100%" height="200"></svg>';

  const nodeW = 120, nodeH = 70, gapX = 30, gapY = 90;
  let positions = {};
  let maxX = 0, maxY = 0;

  function layoutNode(id, x, y) {
    positions[id] = { x: x, y: y };
    if (x + nodeW > maxX) maxX = x + nodeW;
    if (y + nodeH > maxY) maxY = y + nodeH;
    const node = tree.nodes[id];
    if (!node || node.childIds.length === 0) return x + nodeW + gapX;
    let cx = x;
    node.childIds.forEach(function(cid) {
      cx = layoutNode(cid, cx, y + gapY + nodeH);
    });
    const firstChild = positions[node.childIds[0]];
    const lastChild = positions[node.childIds[node.childIds.length - 1]];
    positions[id].x = (firstChild.x + lastChild.x) / 2;
    return cx;
  }

  layoutNode(root.id, 20, 20);
  const svgW = maxX + 40;
  const svgH = maxY + 40;

  let svg = '<svg width="100%" viewBox="0 0 ' + svgW + ' ' + svgH + '" style="min-height:200px;max-height:500px;border:1px solid var(--border);border-radius:8px;background:var(--bg-secondary,#f8f9fa)">';
  svg += '<defs><filter id="sldGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';

  // Draw connections
  Object.keys(tree.nodes).forEach(function(id) {
    const node = tree.nodes[id];
    const pos = positions[id];
    if (!node || !pos) return;
    node.childIds.forEach(function(cid) {
      const cpos = positions[cid];
      if (!cpos) return;
      const x1 = pos.x + nodeW / 2;
      const y1 = pos.y + nodeH;
      const x2 = cpos.x + nodeW / 2;
      const y2 = cpos.y;
      // Only add clickable overlay when child node has a protection device assigned,
      // since selectivity analysis requires both upstream and downstream protection.
      const childNode = tree.nodes[cid];
      if (childNode && childNode.protection) {
        svg += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="transparent" stroke-width="14" style="cursor:pointer" onclick="sldShowSelectivity(\'' + id + '\',\'' + cid + '\')"/>';
      }
      // Visible line
      svg += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="var(--text-muted,#666)" stroke-width="2" pointer-events="none"/>';
    });
  });

  // Draw nodes
  Object.keys(tree.nodes).forEach(function(id) {
    const node = tree.nodes[id];
    const pos = positions[id];
    if (!node || !pos) return;
    const status = sldGetOverallStatus(tree, id);
    const isSelected = (id === sldSelectedId);
    let borderColor = status === 'ok' ? 'var(--success,#28a745)' : (status === 'warning' ? '#b8860b' : 'var(--danger,#dc3545)');
    if (node.type === 'transformer') borderColor = 'var(--primary,#2563eb)';
    const strokeW = isSelected ? 3 : 1.5;
    const fillColor = 'var(--bg-primary,#fff)';

    svg += '<g onclick="sldSelectNode(\'' + id + '\')" style="cursor:pointer">';

    if (node.type === 'transformer') {
      const cx = pos.x + nodeW / 2;
      const cy = pos.y + nodeH / 2;
      svg += '<circle cx="' + (cx - 12) + '" cy="' + cy + '" r="18" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="' + strokeW + '"/>';
      svg += '<circle cx="' + (cx + 12) + '" cy="' + cy + '" r="18" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="' + strokeW + '"/>';
      svg += '<text x="' + cx + '" y="' + (cy + 30) + '" text-anchor="middle" font-size="9" fill="var(--text,#333)">' + (node.power_kVA || 630) + ' kVA</text>';
    } else if (node.type === 'main_board' || node.type === 'sub_board') {
      svg += '<rect x="' + pos.x + '" y="' + pos.y + '" width="' + nodeW + '" height="' + nodeH + '" rx="4" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="' + strokeW + '"/>';
      svg += '<line x1="' + (pos.x + 10) + '" y1="' + (pos.y + 15) + '" x2="' + (pos.x + nodeW - 10) + '" y2="' + (pos.y + 15) + '" stroke="' + borderColor + '" stroke-width="3"/>';
      svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 35) + '" text-anchor="middle" font-size="9" fill="var(--text,#333)">' + sldNodeName(node) + '</text>';
      if (node._ib > 0) svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 50) + '" text-anchor="middle" font-size="8" fill="var(--text-muted,#666)">' + node._ib.toFixed(0) + 'A / ' + (node._vdrop || 0).toFixed(1) + '%</text>';
    } else {
      svg += '<rect x="' + pos.x + '" y="' + pos.y + '" width="' + nodeW + '" height="' + nodeH + '" rx="4" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="' + strokeW + '"/>';
      svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 20) + '" text-anchor="middle" font-size="9" fill="var(--text,#333)">' + sldNodeName(node) + '</text>';
      if (node.protectionIn) svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 35) + '" text-anchor="middle" font-size="8" fill="var(--text-muted,#666)">' + node.protectionIn + 'A ' + (node.cable ? node.cable.mm2 + 'mm\u00B2' : '') + '</text>';
      if (node._vdrop > 0) svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 50) + '" text-anchor="middle" font-size="8" fill="var(--text-muted,#666)">Vd:' + node._vdrop.toFixed(1) + '% Ik:' + ((node._ikmin || 0) / 1000).toFixed(1) + 'kA</text>';
    }
    if (isSelected) {
      svg += '<rect x="' + (pos.x - 3) + '" y="' + (pos.y - 3) + '" width="' + (nodeW + 6) + '" height="' + (nodeH + 6) + '" rx="6" fill="none" stroke="var(--primary,#2563eb)" stroke-width="2" stroke-dasharray="4,2"/>';
    }
    svg += '</g>';
  });

  svg += '</svg>';
  return svg;
}

// --- SLD Node Properties Panel ---
function sldRenderNodePanel(tree, nodeId) {
  if (!tree || !nodeId) return '';
  const node = tree.nodes[nodeId];
  if (!node) return '';

  const ib = node._ib || 0;
  const zs = node._zs || 0;
  const vdrop = node._vdrop || 0;
  const ikmax = node._ikmax || 0;
  const ikmin = node._ikmin || 0;
  const compliance = sldVerifyNode(tree, nodeId);
  const status = sldGetOverallStatus(tree, nodeId);
  const statusIcon = status === 'ok' ? '\u2705' : (status === 'warning' ? '\u26A0\uFE0F' : '\u274C');

  let html = '<div class="card fade-in" style="border-left:4px solid ' + (status === 'ok' ? 'var(--success)' : (status === 'warning' ? '#b8860b' : 'var(--danger)')) + '">';
  html += '<div class="card-title">' + statusIcon + ' ' + sldNodeName(node) + ' <span style="font-size:.8em;color:var(--text-muted)">(' + node.type.replace('_', ' ') + ')</span></div>';

  if (node.type !== 'transformer') {
    html += '<div class="result-box"><div class="result-title">' + tx('Beregningsresultater', 'Calculation Results') + '</div>';
    html += '<div class="result-row"><span class="label">IB</span><span class="value">' + ib.toFixed(1) + ' A</span></div>';
    html += '<div class="result-row"><span class="label">Zs (' + tx('kumulativ', 'cumulative') + ')</span><span class="value">' + (zs * 1000).toFixed(1) + ' m\u2126</span></div>';
    html += '<div class="result-row"><span class="label">\u0394U (' + tx('kumulativ', 'cumulative') + ')</span><span class="value">' + vdrop.toFixed(2) + ' %</span></div>';
    html += '<div class="result-row"><span class="label">Ik,max / Ik,min</span><span class="value">' + (ikmax / 1000).toFixed(1) + ' / ' + (ikmin / 1000).toFixed(1) + ' kA</span></div>';
    html += '</div>';
  }

  if (compliance.length > 0) {
    html += '<div class="result-box" style="margin-top:8px"><div class="result-title">' + tx('Overensstemmelse DS/HD 60364', 'DS/HD 60364 Compliance') + '</div>';
    compliance.forEach(function(c) {
      const icon = c.status === 'ok' ? '\u2705' : (c.status === 'warning' ? '\u26A0\uFE0F' : '\u274C');
      html += '<div class="result-row"><span class="label">' + icon + ' ' + c.rule + '</span><span class="value" style="font-size:.75em">' + c.clause + '<br>' + c.detail + '</span></div>';
    });
    html += '</div>';
  }

  // Selectivity section in node panel
  if (node.type !== 'transformer' && node.parentId && node.protection) {
    var pNode = tree.nodes[node.parentId];
    if (pNode && pNode.protection && pNode.type !== 'transformer') {
      var selRes = sldAnalyzeSelectivity(tree, nodeId);
      if (selRes) {
        var selIcon = selRes.verdict === 'full' ? '\u2705' : (selRes.verdict === 'partial' ? '\u26A0\uFE0F' : '\u274C');
        var selText = selRes.verdict === 'full' ? tx('Fuld selektivitet', 'Full selectivity') :
                      selRes.verdict === 'partial' ? tx('Delvis selektiv', 'Partially selective') :
                      tx('Ingen selektivitet', 'No selectivity');
        html += '<div class="select-group"><div class="select-label">' + selIcon + ' ' + tx('Selektivitet med opstr\u00F8ms', 'Selectivity with upstream') + '</div>';
        html += '<div style="font-size:.85em;padding:4px 8px;margin-bottom:4px">' + selText + '</div>';
        html += '<button class="sel-btn" onclick="sldShowSelectivity(\'' + node.parentId + '\',\'' + nodeId + '\')">' + tx('Vis tid-str\u00F8m kurve', 'Show time-current curve') + ' \u2197</button>';
        html += '</div>';
      }
    }
  }

  if (node.type !== 'transformer') {
    html += '<div class="select-group"><div class="select-label">' + tx('Kabellaengde', 'Cable Length') + ' (' + node.length_m + ' m)</div>';
    html += '<div class="select-grid">';
    html += '<button class="sel-btn" onclick="sldStepLength(\'' + nodeId + '\',-5)">-5m</button>';
    html += '<button class="sel-btn" onclick="sldStepLength(\'' + nodeId + '\',5)">+5m</button>';
    html += '<button class="sel-btn" onclick="sldStepLength(\'' + nodeId + '\',-20)">-20m</button>';
    html += '<button class="sel-btn" onclick="sldStepLength(\'' + nodeId + '\',20)">+20m</button>';
    html += '</div></div>';

    html += '<div class="select-group"><div class="select-label">' + tx('Installationsmetode', 'Installation Method') + '</div>';
    html += '<div class="select-grid">';
    ['A1','A2','B1','B2','C','D1','D2','E','F','G'].forEach(function(m) {
      html += '<button class="sel-btn ' + (node.installMethod === m ? 'selected' : '') + '" onclick="sldSetInstallMethod(\'' + nodeId + '\',\'' + m + '\')">' + m + '</button>';
    });
    html += '</div></div>';

    var suitableCables = recommendCables(ib || 1, node.cable ? (node.cable.material === 'Cu' ? 'copper' : 'aluminium') : 'copper');
    if (suitableCables.length > 0) {
      html += '<div class="select-group"><div class="select-label">' + tx('Kabel', 'Cable') + '</div>';
      html += '<div class="select-grid">';
      suitableCables.forEach(function(c) {
        var sel = (node.cable && node.cable.id === c.id) ? 'selected' : '';
        html += '<button class="sel-btn ' + sel + '" onclick="sldSetNodeCable(\'' + nodeId + '\',\'' + c.id + '\')">' + c.mm2 + 'mm\u00B2 ' + c.material + ' (Iz=' + c.iz + 'A)</button>';
      });
      html += '</div></div>';
    }

    if (ib <= 63) {
      var suitableMcbs = recommendMCBs(ib || 1, (ikmax || 6000) / 1000);
      if (suitableMcbs.length > 0) {
        html += '<div class="select-group"><div class="select-label">' + tx('Beskyttelse (MCB)', 'Protection (MCB)') + '</div>';
        html += '<div class="select-grid">';
        suitableMcbs.forEach(function(m) {
          var sel = (node.protection && node.protection.id === m.id) ? 'selected' : '';
          html += '<button class="sel-btn ' + sel + '" onclick="sldSetNodeProtection(\'' + nodeId + '\',\'' + m.id + '\')">' + m.curve + m.rating + ' ' + m.icu + 'kA</button>';
        });
        html += '</div></div>';
      }
    } else {
      var suitableMccbs = recommendMCCBs(ib, (ikmax || 10000) / 1000);
      if (suitableMccbs.length > 0) {
        html += '<div class="select-group"><div class="select-label">' + tx('Beskyttelse (MCCB)', 'Protection (MCCB)') + '</div>';
        html += '<div class="select-grid">';
        suitableMccbs.forEach(function(m) {
          var sel = (node.protection && node.protection.id === m.id) ? 'selected' : '';
          html += '<button class="sel-btn ' + sel + '" onclick="sldSetNodeProtection(\'' + nodeId + '\',\'' + m.id + '\')">' + m.model + ' ' + m.icu + 'kA</button>';
        });
        html += '</div></div>';
      }
    }

    if (node.type === 'final_circuit') {
      html += '<div class="select-group"><div class="select-label">' + tx('Effekt', 'Power') + ' (' + (node.power_kW || 0).toFixed(1) + ' kW)</div>';
      html += '<div class="select-grid">';
      [0.5, 1, 2, 3.68, 5, 7.36, 11, 15, 22].forEach(function(p) {
        var sel = (Math.abs((node.power_kW || 0) - p) < 0.01) ? 'selected' : '';
        html += '<button class="sel-btn ' + sel + '" onclick="sldSetNodeProp(\'' + nodeId + '\',\'power_kW\',' + p + ')">' + p + '</button>';
      });
      html += '</div></div>';
    }
  } else {
    html += '<div class="select-group"><div class="select-label">' + tx('Trafostoerrelse', 'Transformer Size') + '</div>';
    html += '<div class="select-grid">';
    TRAFO_SIZES.forEach(function(s) {
      var sel = (node.power_kVA === s) ? 'selected' : '';
      html += '<button class="sel-btn ' + sel + '" onclick="sldSetTrafoSize(' + s + ')">' + s + ' kVA</button>';
    });
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

// ===== SELECTIVITY COORDINATION ENGINE =====
// DS/HD 60364-5-53 section 536 - Coordination between protective devices
// Conservative approach: when uncertain, report non-selective (life-safety critical)

// --- STEP 1: Time-current curve data model ---
function sldDeviceCurve(device, In, settings) {
  // Returns array of {i, tMin, tMax} points for time-current plotting
  // device: product object from PRODUCTS (mcb, mccb, or fuse)
  // In: rated current (A)
  // settings: optional {io, isd} for MCCB Micrologic adjustments
  if (!device || !In) return [];
  var points = [];
  var i, tMin, tMax;

  if (device.curve && MCB_CURVES[device.curve]) {
    // MCB - IEC 60898 time-current characteristic
    var curveData = MCB_CURVES[device.curve];
    // Thermal region: inverse-time from 1.13*In to Isd
    // IEC 60898: at 1.13*In must NOT trip within 1h, at 1.45*In must trip within 1h
    // Approximate thermal curve: t = k / ((I/In)^2 - 1) with bounds
    var thermalPoints = [1.13, 1.2, 1.3, 1.45, 1.6, 2, 2.5, 3, 3.5, 4, 5, 6, 8, 10, 15, 20];
    for (var ti = 0; ti < thermalPoints.length; ti++) {
      var mult = thermalPoints[ti];
      if (mult >= curveData.isdMin) break;
      i = mult * In;
      // Inverse-time model: t = k / ((I/In)^2 - 1), bounded
      var ratio = mult * mult - 1;
      if (ratio <= 0) continue;
      tMax = Math.min(3600, 80 / ratio); // upper bound (cold start)
      tMin = Math.min(tMax * 0.5, 40 / ratio); // lower bound (hot start)
      if (tMin < 0.01) tMin = 0.01;
      if (tMax < 0.01) continue;
      points.push({i: i, tMin: tMin, tMax: tMax});
    }
    // Magnetic/instantaneous region
    var isdMinI = curveData.isdMin * In;
    var isdMaxI = curveData.isdMax * In;
    // At Isd boundary: trips between 0.01s and 0.1s (magnetic)
    points.push({i: isdMinI, tMin: 0.004, tMax: 0.1});
    points.push({i: isdMaxI, tMin: 0.004, tMax: 0.01});
    // Above Isd: instantaneous
    points.push({i: isdMaxI * 1.5, tMin: 0.003, tMax: 0.008});
    points.push({i: isdMaxI * 3, tMin: 0.003, tMax: 0.005});

  } else if (device.i5s) {
    // Fuse (gG) - IEC 60269 time-current characteristic
    // i5s = current that fuses in 5 seconds
    // I^2t = (i5s)^2 * 5 (total clearing energy)
    var i2t = device.i5s * device.i5s * 5;
    // Pre-arcing I^2t is approximately 40-80% of total I^2t for gG fuses depending
    // on fuse size (small D01: ~0.4, large NH3: ~0.8). Using 0.65 midpoint for chart
    // display only. Safety-critical verdicts in sldAnalyzeSelectivity use conservative
    // bounds (0.4) to avoid false "full selectivity" claims.
    var i2tPreArc = i2t * 0.65;
    var rating = device.rating;
    // Fuse thermal region: inverse-time curve t = I2t / I^2
    // Generate points from 1.2*In up to very high currents
    var fusePoints = [1.2, 1.4, 1.6, 2, 2.5, 3, 4, 5, 7, 10, 15, 20, 30, 50, 80, 100, 150, 200];
    for (var fi = 0; fi < fusePoints.length; fi++) {
      i = fusePoints[fi] * rating;
      // Total clearing time (max)
      tMax = i2t / (i * i);
      // Pre-arcing time (min)
      tMin = i2tPreArc / (i * i);
      if (tMax > 10000) tMax = 10000;
      if (tMax < 0.001) continue;
      if (tMin < 0.001) tMin = 0.001;
      points.push({i: i, tMin: tMin, tMax: tMax});
    }

  } else if (device.frame || device.inOptions) {
    // MCCB - Micrologic 2.2 trip unit
    var ir = In; // Default Ir = In
    var ioMult = 1.0;
    var isdMult = 10;
    if (settings) {
      if (settings.io) ioMult = settings.io;
      if (settings.isd) isdMult = settings.isd;
    }
    ir = In * ioMult;
    var isd = ir * isdMult;
    var isdDelay = (settings && settings.isdDelay) ? settings.isdDelay : 0;
    // Thermal region (long-time): trips at 1.05-1.3*Ir
    var mccbThermal = [1.05, 1.1, 1.2, 1.3, 1.5, 2, 3, 4, 5, 6, 8, 10];
    for (var mi = 0; mi < mccbThermal.length; mi++) {
      var mMult = mccbThermal[mi];
      i = mMult * ir;
      if (i >= isd) break;
      var mRatio = mMult * mMult - 1;
      if (mRatio <= 0) continue;
      tMax = Math.min(600, 120 / mRatio);
      tMin = Math.min(tMax * 0.6, 60 / mRatio);
      if (tMin < 0.01) tMin = 0.01;
      if (tMax < 0.01) continue;
      points.push({i: i, tMin: tMin, tMax: tMax});
    }
    // Short-time delay region (Isd)
    points.push({i: isd * 0.9, tMin: isdDelay + 0.01, tMax: isdDelay + 0.1});
    points.push({i: isd, tMin: isdDelay + 0.004, tMax: isdDelay + 0.04});
    points.push({i: isd * 1.5, tMin: isdDelay + 0.004, tMax: isdDelay + 0.02});
    // Instantaneous (Ii) - typically 12-15 * In for Micrologic
    var ii = 15 * In;
    points.push({i: ii, tMin: 0.003, tMax: 0.01});
    points.push({i: ii * 2, tMin: 0.003, tMax: 0.005});
  }
  return points;
}

// --- STEP 2: Selectivity analysis engine ---
function sldAnalyzeSelectivity(tree, childNodeId) {
  // Analyzes selectivity between child node protection and its parent's protection
  // Returns: {verdict, limitCurrent, details, clause, upstreamDevice, downstreamDevice}
  if (!tree || !childNodeId) return null;
  var childNode = tree.nodes[childNodeId];
  if (!childNode || !childNode.parentId) return null;
  var parentNode = tree.nodes[childNode.parentId];
  if (!parentNode) return null;

  var downstream = childNode.protection;
  var dsIn = childNode.protectionIn || (downstream ? downstream.rating : 0);
  var upstream = parentNode.protection;
  var usIn = parentNode.protectionIn || (upstream ? upstream.rating : 0);

  // If either device is missing, cannot analyze
  if (!downstream || !upstream || !dsIn || !usIn) {
    return {
      verdict: 'none',
      limitCurrent: null,
      details: tx('Manglende beskyttelsesudstyr - kan ikke analysere selektivitet',
                  'Missing protection device - cannot analyze selectivity'),
      clause: 'DS/HD 60364-5-53 cl.536.1',
      upstreamDevice: upstream,
      downstreamDevice: downstream
    };
  }

  var result = {
    verdict: 'none',
    limitCurrent: null,
    details: '',
    clause: 'DS/HD 60364-5-53 cl.536.4',
    upstreamDevice: upstream,
    downstreamDevice: downstream
  };

  // Determine device types
  var dsIsFuse = !!downstream.i5s;
  var dsIsMCB = !!(downstream.curve && MCB_CURVES[downstream.curve]);
  var dsIsMCCB = !!(downstream.frame || downstream.inOptions);
  var usIsFuse = !!upstream.i5s;
  var usIsMCB = !!(upstream.curve && MCB_CURVES[upstream.curve]);
  var usIsMCCB = !!(upstream.frame || upstream.inOptions);

  // (A) Fuse vs Fuse (gG): 1.6:1 ratio rule
  if (dsIsFuse && usIsFuse) {
    var ratio = usIn / dsIn;
    var dsI2t = downstream.i5s * downstream.i5s * 5;
    // Conservative pre-arcing ratio: use 0.4 (lowest end of the 0.4-0.8 range for gG fuses).
    // This makes upstream pre-arcing I2t SMALLER, so the condition dsI2t < usI2tPreArc
    // is HARDER to satisfy. If we still report "full selectivity", it genuinely holds
    // even for the worst-case fuse construction (small D01 fuses with low pre-arcing ratio).
    var usI2tPreArc = upstream.i5s * upstream.i5s * 5 * 0.4;

    if (ratio >= 1.6 && dsI2t < usI2tPreArc) {
      result.verdict = 'full';
      result.details = tx(
        'Sikringsforhold ' + ratio.toFixed(1) + ':1 >= 1.6:1. I\u00B2t nedstr\u00F8ms (' + (dsI2t/1000).toFixed(0) + 'kA\u00B2s) < I\u00B2t forsmeltning opstr\u00F8ms (' + (usI2tPreArc/1000).toFixed(0) + 'kA\u00B2s)',
        'Fuse ratio ' + ratio.toFixed(1) + ':1 >= 1.6:1. I\u00B2t downstream (' + (dsI2t/1000).toFixed(0) + 'kA\u00B2s) < pre-arcing I\u00B2t upstream (' + (usI2tPreArc/1000).toFixed(0) + 'kA\u00B2s)'
      );
      result.clause = 'DS/HD 60364-5-53 Annex A';
    } else if (ratio >= 1.6) {
      result.verdict = 'partial';
      // Find limit where I2t crossover occurs
      result.limitCurrent = Math.sqrt(usI2tPreArc / 5) * 0.9;
      result.details = tx(
        'Sikringsforhold ' + ratio.toFixed(1) + ':1 >= 1.6:1 men I\u00B2t begr\u00E6nser selektivitet ved ' + result.limitCurrent.toFixed(0) + ' A',
        'Fuse ratio ' + ratio.toFixed(1) + ':1 >= 1.6:1 but I\u00B2t limits selectivity at ' + result.limitCurrent.toFixed(0) + ' A'
      );
      result.clause = 'DS/HD 60364-5-53 Annex A';
    } else {
      result.verdict = 'none';
      result.details = tx(
        'Sikringsforhold ' + ratio.toFixed(1) + ':1 < 1.6:1 - utilstr\u00E6kkelig',
        'Fuse ratio ' + ratio.toFixed(1) + ':1 < 1.6:1 - insufficient'
      );
      result.clause = 'DS/HD 60364-5-53 Annex A';
    }
    return result;
  }

  // (B) MCB vs upstream Fuse: find selectivity limit current
  // NOTE: This analysis checks selectivity only at the MCB's instantaneous threshold
  // (where the MCB trips magnetically). It does NOT sweep the thermal region for
  // crossover. This is conservative for typical installations where fuse rating >> MCB
  // rating (e.g., 100A fuse upstream of 16A MCB), because the fuse will be far slower
  // than the MCB throughout the thermal range. For close ratings (e.g., 32A fuse above
  // 25A MCB), thermal crossover could occur and the reported limit may overstate the
  // actual selectivity boundary. A full thermal sweep would require iterating the MCB
  // inverse-time curve against the fuse curve at multiple points.
  if (dsIsMCB && usIsFuse) {
    var mcbCurve = MCB_CURVES[downstream.curve] || MCB_CURVES['B'];
    var isdMax = mcbCurve.isdMax * dsIn; // MCB instantaneous trip max
    // Conservative pre-arcing ratio: use 0.4 (lowest bound). This makes the upstream
    // fuse appear FASTER (less pre-arcing time), so it is HARDER to declare selectivity.
    // If we still report "partial selective", the fuse is genuinely slow enough.
    var usI2tPre = upstream.i5s * upstream.i5s * 5 * 0.4;
    var fuseTimeAtIsd = usI2tPre / (isdMax * isdMax);

    if (fuseTimeAtIsd > 0.01) {
      // Fuse is slow enough at MCB Isd - selective up to Isd
      result.verdict = 'partial';
      result.limitCurrent = isdMax;
      result.details = tx(
        'Selektiv op til MCB magnetisk udl\u00F8sning: ' + (isdMax).toFixed(0) + ' A. Over dette afbryder begge enheder.',
        'Selective up to MCB magnetic trip: ' + (isdMax).toFixed(0) + ' A. Above this both devices operate.'
      );
    } else {
      result.verdict = 'none';
      result.details = tx(
        'Sikringen er for hurtig ved MCB magnetisk udl\u00F8serstr\u00F8m - ingen selektivitet',
        'Fuse too fast at MCB magnetic trip current - no selectivity'
      );
    }
    result.clause = 'DS/HD 60364-5-53 cl.536.4';
    return result;
  }

  // (C) MCCB with short-time delay vs downstream MCB/fuse
  if (usIsMCCB && (dsIsMCB || dsIsFuse)) {
    var usIr = usIn;
    var usIsdMult = 10; // default
    var usIsdDelay = 0;
    if (parentNode.mccbSettings) {
      if (parentNode.mccbSettings.io) usIr = usIn * parentNode.mccbSettings.io;
      if (parentNode.mccbSettings.isd) usIsdMult = parentNode.mccbSettings.isd;
      if (parentNode.mccbSettings.isdDelay) usIsdDelay = parentNode.mccbSettings.isdDelay;
    }
    var usIsd = usIr * usIsdMult;

    if (dsIsMCB) {
      var dsCurve = MCB_CURVES[downstream.curve] || MCB_CURVES['B'];
      var dsIsdMax = dsCurve.isdMax * dsIn;
      // Per IEC 60947-2 Annex A, typical MCB instantaneous clearing time is 5-15 ms.
      // A 50 ms short-time delay provides adequate time margin (at least 3x) to ensure
      // the downstream MCB fully clears before the MCCB begins to trip. Below 50 ms,
      // the margin is insufficient for guaranteed time-grading, so we report partial.
      if (usIsdDelay >= 0.05 && usIsd > dsIsdMax) {
        result.verdict = 'full';
        result.details = tx(
          'MCCB korttidsforsinkelse (' + (usIsdDelay * 1000).toFixed(0) + ' ms) > MCB udkobling. Isd(MCCB)=' + usIsd.toFixed(0) + 'A > Isd(MCB)=' + dsIsdMax.toFixed(0) + 'A',
          'MCCB short-time delay (' + (usIsdDelay * 1000).toFixed(0) + ' ms) > MCB clearing. Isd(MCCB)=' + usIsd.toFixed(0) + 'A > Isd(MCB)=' + dsIsdMax.toFixed(0) + 'A'
        );
      } else if (usIsdDelay > 0) {
        result.verdict = 'partial';
        result.limitCurrent = Math.min(usIsd, dsIsdMax);
        result.details = tx(
          'Delvis selektiv: MCCB forsinkelse=' + (usIsdDelay * 1000).toFixed(0) + 'ms. Selektivitetsgr\u00E6nse: ' + result.limitCurrent.toFixed(0) + ' A',
          'Partially selective: MCCB delay=' + (usIsdDelay * 1000).toFixed(0) + 'ms. Selectivity limit: ' + result.limitCurrent.toFixed(0) + ' A'
        );
      } else {
        result.verdict = 'none';
        result.details = tx(
          'MCCB uden korttidsforsinkelse - ingen tidsgradering mulig',
          'MCCB without short-time delay - no time-grading possible'
        );
      }
    } else if (dsIsFuse) {
      // Fuse clears very fast at high currents
      var dsI2tTotal = downstream.i5s * downstream.i5s * 5;
      var dsTimeAtUsIsd = dsI2tTotal / (usIsd * usIsd);
      if (usIsdDelay > dsTimeAtUsIsd && usIsdDelay >= 0.05) {
        // 50 ms minimum per IEC 60947-2 Annex A reasoning (see MCB branch comment above)
        result.verdict = 'full';
        result.details = tx(
          'MCCB forsinkelse (' + (usIsdDelay * 1000).toFixed(0) + 'ms) > sikringsudkobling (' + (dsTimeAtUsIsd * 1000).toFixed(1) + 'ms)',
          'MCCB delay (' + (usIsdDelay * 1000).toFixed(0) + 'ms) > fuse clearing (' + (dsTimeAtUsIsd * 1000).toFixed(1) + 'ms)'
        );
      } else {
        result.verdict = 'partial';
        result.limitCurrent = usIsd * 0.8;
        result.details = tx(
          'Delvis selektiv: begr\u00E6nset af MCCB Isd-indstilling',
          'Partially selective: limited by MCCB Isd setting'
        );
      }
    }
    result.clause = 'DS/HD 60364-5-53 cl.536.4';
    return result;
  }

  // (D) MCB vs MCB - generally not selective unless large rating difference
  if (dsIsMCB && usIsMCB) {
    var dsCurveData = MCB_CURVES[downstream.curve] || MCB_CURVES['B'];
    var usCurveData = MCB_CURVES[upstream.curve] || MCB_CURVES['C'];
    var dsIsdMinCurr = dsCurveData.isdMin * dsIn;
    var usIsdMinCurr = usCurveData.isdMin * usIn;
    if (usIsdMinCurr > dsIsdMinCurr * 1.5 && usIn >= dsIn * 2) {
      result.verdict = 'partial';
      result.limitCurrent = dsIsdMinCurr;
      result.details = tx(
        'Delvis selektiv i overbelastningsomr\u00E5det op til ' + dsIsdMinCurr.toFixed(0) + ' A',
        'Partially selective in overload region up to ' + dsIsdMinCurr.toFixed(0) + ' A'
      );
    } else {
      result.verdict = 'none';
      result.details = tx(
        'MCB vs MCB: magnetiske udl\u00F8sere overlapper - ingen selektivitet ved kortslutning',
        'MCB vs MCB: magnetic trips overlap - no selectivity at short-circuit'
      );
    }
    result.clause = 'DS/HD 60364-5-53 cl.536.4';
    return result;
  }

  // (E) MCCB vs MCCB
  if (dsIsMCCB && usIsMCCB) {
    result.verdict = 'partial';
    result.limitCurrent = usIn * 10;
    result.details = tx(
      'MCCB vs MCCB: kr\u00E6ver detaljeret producent-selektivitetstabel',
      'MCCB vs MCCB: requires detailed manufacturer selectivity table'
    );
    result.clause = 'DS/HD 60364-5-53 cl.536.4';
    return result;
  }

  // Default conservative: non-selective
  result.verdict = 'none';
  result.details = tx(
    'Kombination ikke d\u00E6kket af standardanalyse - konservativt vurderet som ikke-selektiv',
    'Combination not covered by standard analysis - conservatively rated non-selective'
  );
  result.clause = 'DS/HD 60364-5-53 cl.536.1';
  return result;
}

// --- STEP 3: SVG log-log time-current chart renderer ---
function sldRenderTCCChart(upstreamCurve, downstreamCurve, selectivityResult) {
  // Renders a log-log time-current chart as SVG
  // X-axis: current (1A to 100kA), Y-axis: time (0.001s to 10000s)
  var w = 600, h = 500;
  var ml = 70, mr = 30, mt = 30, mb = 50; // margins
  var pw = w - ml - mr, ph = h - mt - mb; // plot area

  // Log scale helpers
  var xMin = 1, xMax = 100000; // A
  var yMin = 0.001, yMax = 10000; // seconds
  var logXMin = Math.log10(xMin), logXMax = Math.log10(xMax);
  var logYMin = Math.log10(yMin), logYMax = Math.log10(yMax);

  function xPos(current) {
    if (current <= 0) return ml;
    var logI = Math.log10(current);
    return ml + ((logI - logXMin) / (logXMax - logXMin)) * pw;
  }
  function yPos(time) {
    if (time <= 0) return mt + ph;
    var logT = Math.log10(time);
    return mt + ph - ((logT - logYMin) / (logYMax - logYMin)) * ph;
  }

  var svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;max-width:600px;height:auto;background:#fafbfc;border:1px solid var(--border,#ddd);border-radius:8px" xmlns="http://www.w3.org/2000/svg">';

  // Grid lines
  svg += '<g stroke="#e0e0e0" stroke-width="0.5">';
  for (var gx = 0; gx <= 5; gx++) {
    var xg = ml + (gx / 5) * pw;
    svg += '<line x1="' + xg + '" y1="' + mt + '" x2="' + xg + '" y2="' + (mt + ph) + '"/>';
  }
  for (var gy = 0; gy <= 7; gy++) {
    var yg = mt + (gy / 7) * ph;
    svg += '<line x1="' + ml + '" y1="' + yg + '" x2="' + (ml + pw) + '" y2="' + yg + '"/>';
  }
  svg += '</g>';

  // Axes
  svg += '<line x1="' + ml + '" y1="' + mt + '" x2="' + ml + '" y2="' + (mt + ph) + '" stroke="#333" stroke-width="1.5"/>';
  svg += '<line x1="' + ml + '" y1="' + (mt + ph) + '" x2="' + (ml + pw) + '" y2="' + (mt + ph) + '" stroke="#333" stroke-width="1.5"/>';

  // X-axis labels (current)
  var xLabels = [1, 10, 100, 1000, 10000, 100000];
  for (var xi = 0; xi < xLabels.length; xi++) {
    var xlv = xLabels[xi];
    var xlx = xPos(xlv);
    var xlLabel = xlv >= 1000 ? (xlv / 1000) + 'kA' : xlv + 'A';
    svg += '<text x="' + xlx + '" y="' + (mt + ph + 20) + '" text-anchor="middle" font-size="9" fill="#555">' + xlLabel + '</text>';
  }
  // Y-axis labels (time)
  var yLabels = [0.001, 0.01, 0.1, 1, 10, 100, 1000, 10000];
  for (var yi = 0; yi < yLabels.length; yi++) {
    var ylv = yLabels[yi];
    var yly = yPos(ylv);
    var ylLabel = ylv >= 1 ? ylv + 's' : (ylv * 1000) + 'ms';
    svg += '<text x="' + (ml - 5) + '" y="' + (yly + 3) + '" text-anchor="end" font-size="9" fill="#555">' + ylLabel + '</text>';
  }

  // Axis titles
  svg += '<text x="' + (ml + pw / 2) + '" y="' + (h - 5) + '" text-anchor="middle" font-size="10" fill="#333">' + tx('Str\u00F8m (A)', 'Current (A)') + '</text>';
  svg += '<text x="15" y="' + (mt + ph / 2) + '" text-anchor="middle" font-size="10" fill="#333" transform="rotate(-90,15,' + (mt + ph / 2) + ')">' + tx('Tid (s)', 'Time (s)') + '</text>';

  // Draw curve band helper
  function drawCurveBand(curve, colorFill, colorStroke, label) {
    if (!curve || curve.length < 2) return '';
    var pathMin = '', pathMax = '';
    var sortedCurve = curve.slice().sort(function(a, b) { return a.i - b.i; });
    // Build min path forward and max path backward for filled area
    for (var ci = 0; ci < sortedCurve.length; ci++) {
      var pt = sortedCurve[ci];
      var px = xPos(pt.i);
      var pyMin = yPos(pt.tMin);
      var pyMax = yPos(pt.tMax);
      if (px < ml || px > ml + pw) continue;
      pyMin = Math.max(mt, Math.min(mt + ph, pyMin));
      pyMax = Math.max(mt, Math.min(mt + ph, pyMax));
      if (ci === 0) {
        pathMin += 'M' + px + ',' + pyMin;
        pathMax = px + ',' + pyMax;
      } else {
        pathMin += ' L' + px + ',' + pyMin;
        pathMax = px + ',' + pyMax + ' L' + pathMax;
      }
    }
    // Build reverse max path
    var revMax = '';
    for (var ri = sortedCurve.length - 1; ri >= 0; ri--) {
      var rpt = sortedCurve[ri];
      var rpx = xPos(rpt.i);
      var rpyMax = yPos(rpt.tMax);
      if (rpx < ml || rpx > ml + pw) continue;
      rpyMax = Math.max(mt, Math.min(mt + ph, rpyMax));
      revMax += ' L' + rpx + ',' + rpyMax;
    }
    var band = pathMin + revMax + ' Z';
    var s = '<path d="' + band + '" fill="' + colorFill + '" stroke="' + colorStroke + '" stroke-width="1" opacity="0.6"/>';
    // Label
    if (sortedCurve.length > 0) {
      var lpt = sortedCurve[Math.floor(sortedCurve.length / 2)];
      s += '<text x="' + xPos(lpt.i) + '" y="' + (yPos(lpt.tMax) - 5) + '" font-size="8" fill="' + colorStroke + '">' + label + '</text>';
    }
    return s;
  }

  // Draw selectivity zone (green) where downstream is faster
  if (downstreamCurve && upstreamCurve && downstreamCurve.length > 1 && upstreamCurve.length > 1) {
    // Find overlapping current range
    var dsSorted = downstreamCurve.slice().sort(function(a, b) { return a.i - b.i; });
    var usSorted = upstreamCurve.slice().sort(function(a, b) { return a.i - b.i; });
    var overlapMin = Math.max(dsSorted[0].i, usSorted[0].i);
    var overlapMax = Math.min(dsSorted[dsSorted.length - 1].i, usSorted[usSorted.length - 1].i);

    if (overlapMin < overlapMax && selectivityResult) {
      var zoneColor = selectivityResult.verdict === 'full' ? 'rgba(40,167,69,0.15)' :
                      selectivityResult.verdict === 'partial' ? 'rgba(255,193,7,0.15)' :
                      'rgba(220,53,69,0.15)';
      svg += '<rect x="' + xPos(overlapMin) + '" y="' + mt + '" width="' + (xPos(overlapMax) - xPos(overlapMin)) + '" height="' + ph + '" fill="' + zoneColor + '"/>';
    }
  }

  // Draw upstream curve (red/orange)
  svg += drawCurveBand(upstreamCurve, 'rgba(220,53,69,0.2)', '#dc3545', tx('Opstr\u00F8ms', 'Upstream'));
  // Draw downstream curve (blue/cyan)
  svg += drawCurveBand(downstreamCurve, 'rgba(37,99,235,0.2)', '#2563eb', tx('Nedstr\u00F8ms', 'Downstream'));

  // Selectivity limit line if partial
  if (selectivityResult && selectivityResult.limitCurrent && selectivityResult.verdict === 'partial') {
    var limX = xPos(selectivityResult.limitCurrent);
    svg += '<line x1="' + limX + '" y1="' + mt + '" x2="' + limX + '" y2="' + (mt + ph) + '" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="4,3"/>';
    svg += '<text x="' + (limX + 3) + '" y="' + (mt + 15) + '" font-size="8" fill="#b8860b">' + tx('Gr\u00E6nse', 'Limit') + ' ' + selectivityResult.limitCurrent.toFixed(0) + 'A</text>';
  }

  // Legend
  svg += '<rect x="' + (ml + pw - 150) + '" y="' + (mt + 5) + '" width="145" height="50" fill="rgba(255,255,255,0.9)" stroke="#ccc" rx="4"/>';
  svg += '<line x1="' + (ml + pw - 140) + '" y1="' + (mt + 18) + '" x2="' + (ml + pw - 120) + '" y2="' + (mt + 18) + '" stroke="#dc3545" stroke-width="3"/>';
  svg += '<text x="' + (ml + pw - 115) + '" y="' + (mt + 22) + '" font-size="9" fill="#333">' + tx('Opstr\u00F8ms enhed', 'Upstream device') + '</text>';
  svg += '<line x1="' + (ml + pw - 140) + '" y1="' + (mt + 33) + '" x2="' + (ml + pw - 120) + '" y2="' + (mt + 33) + '" stroke="#2563eb" stroke-width="3"/>';
  svg += '<text x="' + (ml + pw - 115) + '" y="' + (mt + 37) + '" font-size="9" fill="#333">' + tx('Nedstr\u00F8ms enhed', 'Downstream device') + '</text>';
  svg += '<line x1="' + (ml + pw - 140) + '" y1="' + (mt + 48) + '" x2="' + (ml + pw - 120) + '" y2="' + (mt + 48) + '" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="4,3"/>';
  svg += '<text x="' + (ml + pw - 115) + '" y="' + (mt + 52) + '" font-size="9" fill="#333">' + tx('Selektivitetsgr\u00E6nse', 'Selectivity limit') + '</text>';

  // Title
  svg += '<text x="' + (ml + pw / 2) + '" y="' + (mt - 10) + '" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">' + tx('Tid-str\u00F8m karakteristik', 'Time-Current Characteristic') + '</text>';

  svg += '</svg>';
  return svg;
}

// --- STEP 4: SLD integration - selectivity panel and clickable connections ---
var sldSelectivityPanelOpen = false;
var sldSelectivityParentId = null;
var sldSelectivityChildId = null;

function sldShowSelectivity(parentId, childId) {
  sldSelectivityPanelOpen = true;
  sldSelectivityParentId = parentId;
  sldSelectivityChildId = childId;
  renderModule('sld');
}

function sldCloseSelectivity() {
  sldSelectivityPanelOpen = false;
  sldSelectivityParentId = null;
  sldSelectivityChildId = null;
  renderModule('sld');
}

function sldRenderSelectivityPanel(tree, parentId, childId) {
  if (!tree || !parentId || !childId) return '';
  var parentNode = tree.nodes[parentId];
  var childNode = tree.nodes[childId];
  if (!parentNode || !childNode) return '';

  var result = sldAnalyzeSelectivity(tree, childId);
  if (!result) return '';

  var verdictIcon = result.verdict === 'full' ? '\u2705' : (result.verdict === 'partial' ? '\u26A0\uFE0F' : '\u274C');
  var verdictColor = result.verdict === 'full' ? 'var(--success,#28a745)' : (result.verdict === 'partial' ? '#b8860b' : 'var(--danger,#dc3545)');
  var verdictText = result.verdict === 'full' ? tx('Fuld selektivitet', 'Full selectivity') :
                    result.verdict === 'partial' ? tx('Delvis selektiv op til ', 'Partially selective up to ') + (result.limitCurrent ? result.limitCurrent.toFixed(0) + ' A' : '') :
                    tx('Ingen selektivitet', 'No selectivity');

  var html = '<div class="card fade-in" style="border-left:4px solid ' + verdictColor + '">';
  html += '<div class="card-title" style="display:flex;justify-content:space-between;align-items:center">';
  html += '<span>' + verdictIcon + ' ' + tx('Selektivitetsanalyse', 'Selectivity Analysis') + '</span>';
  html += '<button class="sel-btn" onclick="sldCloseSelectivity()" style="padding:2px 10px">\u2715</button>';
  html += '</div>';

  // Verdict
  html += '<div class="result-box"><div class="result-title" style="color:' + verdictColor + '">' + verdictText + '</div>';
  html += '<div class="result-row"><span class="label">' + tx('Opstr\u00F8ms', 'Upstream') + '</span><span class="value">' + sldNodeName(parentNode) + (parentNode.protection ? ' (' + (parentNode.protection.model || '') + ' ' + (parentNode.protectionIn || '') + 'A)' : '') + '</span></div>';
  html += '<div class="result-row"><span class="label">' + tx('Nedstr\u00F8ms', 'Downstream') + '</span><span class="value">' + sldNodeName(childNode) + (childNode.protection ? ' (' + (childNode.protection.model || '') + ' ' + (childNode.protectionIn || '') + 'A)' : '') + '</span></div>';
  html += '<div class="result-row"><span class="label">' + tx('Standard', 'Standard') + '</span><span class="value">' + result.clause + '</span></div>';
  html += '<div class="result-row"><span class="label">' + tx('Detaljer', 'Details') + '</span><span class="value" style="font-size:.8em">' + result.details + '</span></div>';
  html += '</div>';

  // Zs path information
  var path = sldGetPath(tree, childId);
  if (path && path.length > 0) {
    html += '<div class="result-box" style="margin-top:8px"><div class="result-title">' + tx('Zs-sti (transformer til enhed)', 'Zs Path (transformer to device)') + '</div>';
    for (var pi = 0; pi < path.length; pi++) {
      var pnode = tree.nodes[path[pi]];
      if (!pnode) continue;
      var pzs = pnode._zs || 0;
      html += '<div class="result-row"><span class="label">' + sldNodeName(pnode) + '</span><span class="value">' + (pzs * 1000).toFixed(1) + ' m\u03A9</span></div>';
    }
    html += '</div>';
  }

  // TCC Chart
  var usIn = parentNode.protectionIn || (parentNode.protection ? parentNode.protection.rating : 0);
  var dsIn = childNode.protectionIn || (childNode.protection ? childNode.protection.rating : 0);
  var usCurve = sldDeviceCurve(parentNode.protection, usIn, parentNode.mccbSettings);
  var dsCurve = sldDeviceCurve(childNode.protection, dsIn, childNode.mccbSettings);

  if (usCurve.length > 1 && dsCurve.length > 1) {
    html += '<div style="margin-top:12px">';
    html += '<div class="result-title">' + tx('Tid-str\u00F8m karakteristik', 'Time-Current Characteristic') + '</div>';
    html += sldRenderTCCChart(usCurve, dsCurve, result);
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// --- STEP 5: DS/HD 60364-5-53 section 536 compliance verification ---
function sldVerifySelectivityAll(tree) {
  // Iterates all parent-child pairs and reports selectivity compliance
  if (!tree || !tree.rootId) return [];
  var results = [];
  Object.keys(tree.nodes).forEach(function(id) {
    var node = tree.nodes[id];
    if (!node || node.type === 'transformer') return;
    if (!node.parentId) return;
    var parent = tree.nodes[node.parentId];
    if (!parent || parent.type === 'transformer') return;
    // Only check pairs where both have protection
    if (!node.protection || !parent.protection) return;
    var sel = sldAnalyzeSelectivity(tree, id);
    if (sel) {
      results.push({
        childId: id,
        parentId: node.parentId,
        childName: sldNodeName(node),
        parentName: sldNodeName(parent),
        verdict: sel.verdict,
        limitCurrent: sel.limitCurrent,
        details: sel.details,
        clause: sel.clause
      });
    }
  });
  return results;
}

// --- PHASE 3: Fault Simulation Engine ---

// State variables for fault simulation mode
var sldFaultSimMode = false;
var sldFaultSimResult = null;
var sldFaultSimAnimating = false;
var sldFaultSimFrame = 0;
var sldFaultSimType = 'short_circuit'; // 'short_circuit' or 'earth_fault'

// STEP 2: Trip time interpolation helper
function sldGetTripTime(device, In, Ifault, settings) {
  // Returns conservative (worst-case) trip time tMax at given fault current.
  // Uses log-log interpolation between curve points.
  // Returns Infinity if device will not trip at this current.
  if (!device || !In || !Ifault || Ifault <= 0) return Infinity;
  var curve = sldDeviceCurve(device, In, settings);
  if (!curve || curve.length === 0) return Infinity;
  // Sort curve by current ascending
  curve.sort(function(a, b) { return a.i - b.i; });
  // If fault current is below the first curve point, device won't trip
  if (Ifault < curve[0].i) return Infinity;
  // If fault current is above or at the last curve point, return last tMax
  if (Ifault >= curve[curve.length - 1].i) return curve[curve.length - 1].tMax;
  // Find bracketing points and interpolate in log-log space
  for (var k = 0; k < curve.length - 1; k++) {
    if (Ifault >= curve[k].i && Ifault <= curve[k + 1].i) {
      var logI1 = Math.log(curve[k].i);
      var logI2 = Math.log(curve[k + 1].i);
      var logT1 = Math.log(Math.max(curve[k].tMax, 0.001));
      var logT2 = Math.log(Math.max(curve[k + 1].tMax, 0.001));
      var logIfault = Math.log(Ifault);
      var frac = (logIfault - logI1) / (logI2 - logI1);
      var logT = logT1 + frac * (logT2 - logT1);
      return Math.exp(logT);
    }
  }
  return curve[curve.length - 1].tMax;
}

// STEP 1: Fault simulation calculation engine
function sldSimulateFault(tree, nodeId, faultType) {
  // Simulate a fault at given node.
  // faultType: 'short_circuit' or 'earth_fault'
  // Returns complete result object for visualization.
  if (!tree || !nodeId || !tree.nodes[nodeId]) {
    return { faultNodeId: nodeId, faultType: faultType, ikFault: 0, zsAtFault: 0,
             path: [], trippingDeviceNodeId: null, tripTime: Infinity,
             requiredTime: 5, meetsStandard: false, clause: 'DS/HD 60364-4-41',
             selectivityIssues: [], verdict: 'failed' };
  }
  var node = tree.nodes[nodeId];
  var path = sldGetPath(tree, nodeId);
  var ikData = sldCalcNodeIk(tree, nodeId);
  // For earth fault, use ikmin (conservative - lower current = longer trip time)
  // For short circuit, also use ikmin for disconnection time check (conservative)
  var ikFault = (faultType === 'earth_fault') ? ikData.ikmin : ikData.ikmin;
  var zsAtFault = ikData.zs;

  // Determine required disconnection time per DS/HD 60364-4-41
  var requiredTime = 5; // Default: distribution circuits
  var clause = 'DS/HD 60364-4-41 cl.411.3.2.3';
  if (node.type === 'final_circuit') {
    var nomCurrent = node.protectionIn || 0;
    if (nomCurrent <= 32) {
      requiredTime = 0.4; // Final circuits <=32A at 230V: 0.4s
      clause = 'DS/HD 60364-4-41 cl.411.3.2.2';
    }
  }

  // Walk path from fault point toward root, find which device trips first
  var trippingDeviceNodeId = null;
  var tripTime = Infinity;
  var allTripTimes = []; // For selectivity analysis

  for (var pi = path.length - 1; pi >= 0; pi--) {
    var pathNodeId = path[pi];
    var pathNode = tree.nodes[pathNodeId];
    if (!pathNode || pathNode.type === 'transformer') continue;
    if (!pathNode.protection || !pathNode.protectionIn) continue;
    var devTripTime = sldGetTripTime(pathNode.protection, pathNode.protectionIn, ikFault, pathNode.mccbSettings);
    allTripTimes.push({ nodeId: pathNodeId, tripTime: devTripTime, name: sldNodeName(pathNode) });
    if (devTripTime < tripTime) {
      tripTime = devTripTime;
      trippingDeviceNodeId = pathNodeId;
    }
  }

  // Check for selectivity issues: upstream devices that also trip
  var selectivityIssues = [];
  if (trippingDeviceNodeId) {
    for (var si = 0; si < allTripTimes.length; si++) {
      var entry = allTripTimes[si];
      if (entry.nodeId === trippingDeviceNodeId) continue;
      // If an upstream device trips within 150% of the first device trip time, it's a selectivity concern
      if (entry.tripTime < Infinity && entry.tripTime < tripTime * 1.5) {
        selectivityIssues.push({
          nodeId: entry.nodeId,
          name: entry.name,
          tripTime: entry.tripTime
        });
      }
    }
  }

  // Determine verdict
  var meetsStandard = (tripTime <= requiredTime) && (tripTime < Infinity);
  var verdict = 'failed';
  if (tripTime === Infinity || !trippingDeviceNodeId) {
    verdict = 'failed'; // No device trips
  } else if (!meetsStandard) {
    verdict = 'slow'; // Device trips but too slow
  } else {
    verdict = 'protected'; // Device trips within required time
  }

  return {
    faultNodeId: nodeId,
    faultType: faultType,
    ikFault: ikFault,
    zsAtFault: zsAtFault,
    path: path,
    trippingDeviceNodeId: trippingDeviceNodeId,
    tripTime: tripTime,
    requiredTime: requiredTime,
    meetsStandard: meetsStandard,
    clause: clause,
    selectivityIssues: selectivityIssues,
    verdict: verdict
  };
}

// STEP 3: Fault injection trigger
function sldInjectFault(nodeId) {
  if (!sldTree || !nodeId) return;
  var node = sldTree.nodes[nodeId];
  if (!node || node.type === 'transformer') return;
  sldPropagateAll(sldTree);
  sldFaultSimResult = sldSimulateFault(sldTree, nodeId, sldFaultSimType);
  sldFaultSimAnimating = true;
  sldFaultSimFrame = 0;
  renderModule('sld');
}

function sldToggleFaultMode() {
  sldFaultSimMode = !sldFaultSimMode;
  if (!sldFaultSimMode) {
    sldFaultSimResult = null;
    sldFaultSimAnimating = false;
    sldFaultSimFrame = 0;
  }
  renderModule('sld');
}

function sldSetFaultType(ftype) {
  sldFaultSimType = ftype;
  renderModule('sld');
}

function sldExitFaultSim() {
  sldFaultSimMode = false;
  sldFaultSimResult = null;
  sldFaultSimAnimating = false;
  sldFaultSimFrame = 0;
  renderModule('sld');
}

// STEP 4: Animated 3D SVG Fault Visualization
function sldRenderFaultAnimation(tree, result) {
  if (!tree || !result || !result.path || result.path.length === 0) return '';
  var nodeW = 100, nodeH = 55, gapX = 20, gapY = 70;
  var positions = {};
  var maxX = 0, maxY = 0;

  // Layout only path nodes vertically for focused view
  for (var li = 0; li < result.path.length; li++) {
    var nid = result.path[li];
    var px = 200;
    var py = 30 + li * (nodeH + gapY);
    positions[nid] = { x: px, y: py };
    if (px + nodeW > maxX) maxX = px + nodeW;
    if (py + nodeH > maxY) maxY = py + nodeH;
  }

  var svgW = maxX + 200;
  var svgH = maxY + 60;
  var pathColor = result.verdict === 'protected' ? '#00ff88' : '#ff3344';
  var glowColor = result.verdict === 'protected' ? '#00ff8855' : '#ff334455';
  var currentIntensity = Math.min(1, (result.ikFault || 0) / 10000);
  var glowStd = 3 + currentIntensity * 6;

  var svg = '<svg width="100%" viewBox="0 0 ' + svgW + ' ' + svgH + '" style="min-height:250px;max-height:600px;border-radius:12px;overflow:hidden">';
  // Dark background
  svg += '<rect width="100%" height="100%" fill="url(#faultBg)"/>';
  // Defs: gradients + glow filters
  svg += '<defs>';
  svg += '<linearGradient id="faultBg" x1="0" y1="0" x2="0" y2="1">';
  svg += '<stop offset="0%" stop-color="#050c18"/>';
  svg += '<stop offset="65%" stop-color="#020710"/>';
  svg += '<stop offset="100%" stop-color="#010408"/>';
  svg += '</linearGradient>';
  svg += '<filter id="faultGlow"><feGaussianBlur stdDeviation="' + glowStd.toFixed(1) + '" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '<filter id="faultPulse"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '</defs>';

  // Draw connection lines with animated current flow
  for (var ci = 0; ci < result.path.length - 1; ci++) {
    var fromId = result.path[ci];
    var toId = result.path[ci + 1];
    var fromPos = positions[fromId];
    var toPos = positions[toId];
    if (!fromPos || !toPos) continue;
    var x1 = fromPos.x + nodeW / 2;
    var y1 = fromPos.y + nodeH;
    var x2 = toPos.x + nodeW / 2;
    var y2 = toPos.y;
    // Base cable line
    svg += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="' + pathColor + '" stroke-width="3" opacity="0.3" filter="url(#faultGlow)"/>';
    // Animated dashed overlay (current flow)
    svg += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="' + pathColor + '" stroke-width="2" stroke-dasharray="8,12" filter="url(#faultGlow)">';
    svg += '<animate attributeName="stroke-dashoffset" from="0" to="-40" dur="0.6s" repeatCount="indefinite"/>';
    svg += '</line>';
  }

  // Draw nodes as isometric 3D boxes
  for (var ni = 0; ni < result.path.length; ni++) {
    var drawId = result.path[ni];
    var drawNode = tree.nodes[drawId];
    var dpos = positions[drawId];
    if (!drawNode || !dpos) continue;
    var isTripping = (drawId === result.trippingDeviceNodeId);
    var isFault = (drawId === result.faultNodeId);
    var boxColor = '#4488cc';
    if (drawNode.type === 'transformer') boxColor = '#ff8a5c';
    else if (drawNode.type === 'main_board') boxColor = '#7fc8ff';
    else if (drawNode.type === 'sub_board') boxColor = '#a78bfa';
    else boxColor = '#34d399';

    if (isTripping) boxColor = '#ff3344';

    // 3D isometric box (top, left, right faces)
    var bw = nodeW, bh = nodeH, bd = 20;
    var bx = dpos.x, by = dpos.y;
    // Top face
    var topPoly = (bx + bd) + ',' + by + ' ' + (bx + bw + bd) + ',' + by + ' ' + (bx + bw) + ',' + (by + bd) + ' ' + bx + ',' + (by + bd);
    // Front face
    var frontPoly = bx + ',' + (by + bd) + ' ' + (bx + bw) + ',' + (by + bd) + ' ' + (bx + bw) + ',' + (by + bh) + ' ' + bx + ',' + (by + bh);
    // Right face
    var rightPoly = (bx + bw) + ',' + (by + bd) + ' ' + (bx + bw + bd) + ',' + by + ' ' + (bx + bw + bd) + ',' + (by + bh - bd) + ' ' + (bx + bw) + ',' + (by + bh);

    var nodeFilter = isTripping ? 'filter="url(#faultPulse)"' : 'filter="url(#faultGlow)"';
    svg += '<g ' + nodeFilter + '>';
    svg += '<polygon points="' + topPoly + '" fill="' + boxColor + '" opacity="0.7"/>';
    svg += '<polygon points="' + frontPoly + '" fill="' + boxColor + '" opacity="0.9"/>';
    svg += '<polygon points="' + rightPoly + '" fill="' + boxColor + '" opacity="0.5"/>';
    // Label
    svg += '<text x="' + (bx + bw / 2) + '" y="' + (by + bd + (bh - bd) / 2 + 4) + '" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">' + sldNodeName(drawNode) + '</text>';

    // Tripping device animation (red strobe)
    if (isTripping) {
      svg += '<rect x="' + (bx - 4) + '" y="' + (by - 4) + '" width="' + (bw + bd + 8) + '" height="' + (bh + 8) + '" rx="4" fill="none" stroke="#ff3344" stroke-width="3">';
      svg += '<animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite"/>';
      svg += '</rect>';
    }

    // Fault injection point (lightning bolt)
    if (isFault) {
      var lx = bx + bw + bd + 15;
      var ly = by + bh / 2 - 10;
      svg += '<text x="' + lx + '" y="' + ly + '" font-size="24" fill="#ffdd00" filter="url(#faultGlow)">\u26A1</text>';
    }
    svg += '</g>';
  }

  svg += '</svg>';
  return svg;
}

// STEP 5: Results Panel
function sldRenderFaultResults(result) {
  if (!result) return '';
  var verdictColor = result.verdict === 'protected' ? 'var(--success,#28a745)' : (result.verdict === 'slow' ? '#b8860b' : 'var(--danger,#dc3545)');
  var verdictIcon = result.verdict === 'protected' ? '\u2705' : (result.verdict === 'slow' ? '\u26A0\uFE0F' : '\u274C');
  var verdictText = result.verdict === 'protected' ?
    tx('Beskyttelse tilstraekkelig', 'Protection adequate') :
    (result.verdict === 'slow' ?
      tx('Frakobling for langsom', 'Disconnection too slow') :
      tx('Beskyttelse fejlet', 'Protection failed'));

  var faultTypeText = result.faultType === 'earth_fault' ?
    tx('Jordfejl', 'Earth fault') :
    tx('Kortslutning', 'Short-circuit');

  var tripDeviceName = '---';
  if (result.trippingDeviceNodeId && sldTree && sldTree.nodes[result.trippingDeviceNodeId]) {
    var tNode = sldTree.nodes[result.trippingDeviceNodeId];
    tripDeviceName = sldNodeName(tNode);
    if (tNode.protection) {
      tripDeviceName += ' (' + (tNode.protection.model || tNode.protection.curve || '') + ' ' + (tNode.protectionIn || '') + 'A)';
    }
  }

  var html = '<div class="card fade-in" style="border-left:4px solid ' + verdictColor + '">';
  html += '<div class="card-title">' + verdictIcon + ' ' + tx('Fejlsimulering - Resultater', 'Fault Simulation - Results') + '</div>';
  html += '<div class="result-box">';
  html += '<div class="result-title" style="color:' + verdictColor + '">' + verdictText + '</div>';
  html += '<div class="result-row"><span class="label">' + tx('Fejltype', 'Fault type') + '</span><span class="value">' + faultTypeText + '</span></div>';
  html += '<div class="result-row"><span class="label">' + tx('Fejlstroem Ik', 'Fault current Ik') + '</span><span class="value">' + (result.ikFault / 1000).toFixed(2) + ' kA</span></div>';
  html += '<div class="result-row"><span class="label">' + tx('Enhed udloest', 'Device tripped') + '</span><span class="value">' + tripDeviceName + '</span></div>';
  html += '<div class="result-row"><span class="label">' + tx('Udloesningstid', 'Trip time') + '</span><span class="value">' + (result.tripTime === Infinity ? tx('Ingen udloesning', 'No trip') : (result.tripTime * 1000).toFixed(0) + ' ms') + '</span></div>';
  html += '<div class="result-row"><span class="label">' + tx('Kraevet tid', 'Required time') + '</span><span class="value">' + (result.requiredTime * 1000).toFixed(0) + ' ms (' + result.clause + ')</span></div>';
  html += '<div class="result-row"><span class="label">Zs ' + tx('ved fejlsted', 'at fault point') + '</span><span class="value">' + (result.zsAtFault * 1000).toFixed(1) + ' m\u03A9</span></div>';
  html += '</div>';

  // Selectivity issues
  if (result.selectivityIssues && result.selectivityIssues.length > 0) {
    html += '<div class="result-box" style="margin-top:8px;border-left:3px solid #b8860b">';
    html += '<div class="result-title" style="color:#b8860b">\u26A0\uFE0F ' + tx('Selektivitetsproblemer', 'Selectivity issues') + '</div>';
    for (var si = 0; si < result.selectivityIssues.length; si++) {
      var issue = result.selectivityIssues[si];
      html += '<div class="result-row"><span class="label">' + issue.name + '</span><span class="value">' + (issue.tripTime * 1000).toFixed(0) + ' ms</span></div>';
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// --- Main SLD Render Function ---
function renderSLD() {
  if (!sldTree) sldInit();
  sldPropagateAll(sldTree);

  const selNode = sldTree.nodes[sldSelectedId];
  const canAddSubBoard = selNode && (selNode.type === 'main_board' || selNode.type === 'sub_board');
  const canAddCircuit = selNode && (selNode.type === 'main_board' || selNode.type === 'sub_board');
  const canRemove = selNode && sldSelectedId !== sldTree.rootId && !(selNode.type === 'main_board' && sldTree.nodes[sldTree.rootId].childIds.length <= 1);

  let html = '<div class="card fade-in">';
  html += '<div class="card-title">\u26A1 ' + tx('Installationsplan (SLD)', 'Installation Plan (SLD)') + '</div>';

  // Fault simulation mode indicator and instructions
  if (sldFaultSimMode && !sldFaultSimResult) {
    html += '<div class="info-row" style="color:var(--danger);font-weight:bold">\u26A1 ' + tx('FEJLSIMULERING AKTIV - Klik paa en node for at injicere fejl', 'FAULT SIMULATION ACTIVE - Click a node to inject fault') + '</div>';
  } else if (!sldFaultSimMode) {
    html += '<div class="info-row">' + tx('Klik paa en node for at vaelge den. Brug knapperne til at tilfoeje/fjerne noder.', 'Click a node to select it. Use buttons to add/remove nodes.') + '</div>';
  }

  html += '<div class="select-grid" style="margin-bottom:12px">';
  if (!sldFaultSimMode) {
    if (canAddSubBoard) {
      html += '<button class="sel-btn" onclick="sldAddNode(\'' + sldSelectedId + '\',\'sub_board\')">+ ' + tx('Undertavle', 'Sub-Board') + '</button>';
    }
    if (canAddCircuit) {
      html += '<button class="sel-btn" onclick="sldAddNode(\'' + sldSelectedId + '\',\'final_circuit\')">+ ' + tx('Gruppe', 'Circuit') + '</button>';
    }
    if (canRemove) {
      html += '<button class="sel-btn" style="color:var(--danger)" onclick="sldRemoveNode(\'' + sldSelectedId + '\')">\uD83D\uDDD1\uFE0F ' + tx('Fjern', 'Remove') + '</button>';
    }
  }
  // Fault simulation toggle button
  html += '<button class="sel-btn' + (sldFaultSimMode ? ' selected' : '') + '" style="' + (sldFaultSimMode ? 'background:var(--danger);color:#fff' : '') + '" onclick="sldToggleFaultMode()">\u26A1 ' + tx('Fejlsimulering', 'Fault Simulation') + '</button>';
  html += '</div>';

  // Fault type selection (visible when mode is active, before results)
  if (sldFaultSimMode && !sldFaultSimResult) {
    html += '<div class="select-grid" style="margin-bottom:12px">';
    html += '<button class="sel-btn' + (sldFaultSimType === 'short_circuit' ? ' selected' : '') + '" onclick="sldSetFaultType(\'short_circuit\')">\u26A1 ' + tx('Kortslutning', 'Short-circuit') + '</button>';
    html += '<button class="sel-btn' + (sldFaultSimType === 'earth_fault' ? ' selected' : '') + '" onclick="sldSetFaultType(\'earth_fault\')">\u23DA ' + tx('Jordfejl', 'Earth fault') + '</button>';
    html += '</div>';
  }

  // Render SLD canvas - in fault sim mode, nodes trigger fault injection
  if (sldFaultSimMode && !sldFaultSimResult) {
    html += sldRenderCanvasFaultMode(sldTree);
  } else {
    html += sldRenderCanvas(sldTree);
  }
  html += '</div>';

  // Fault simulation results
  if (sldFaultSimMode && sldFaultSimResult) {
    html += '<div class="card fade-in">';
    html += '<div class="card-title">\u26A1 ' + tx('3D Fejlvisualisering', '3D Fault Visualization') + '</div>';
    html += sldRenderFaultAnimation(sldTree, sldFaultSimResult);
    html += '<div style="margin-top:12px;text-align:center">';
    html += '<button class="sel-btn" style="color:var(--danger)" onclick="sldExitFaultSim()">\u2715 ' + tx('Afslut simulering', 'Exit simulation') + '</button>';
    html += '</div>';
    html += '</div>';
    html += sldRenderFaultResults(sldFaultSimResult);
  } else {
    if (sldSelectedId) {
      html += sldRenderNodePanel(sldTree, sldSelectedId);
    }

    // Selectivity panel (shown when connection line is clicked)
    if (sldSelectivityPanelOpen && sldSelectivityParentId && sldSelectivityChildId) {
      html += sldRenderSelectivityPanel(sldTree, sldSelectivityParentId, sldSelectivityChildId);
    }
  }

  return html;
}

// SLD Canvas in Fault Simulation Mode (clicking nodes injects faults)
function sldRenderCanvasFaultMode(tree) {
  if (!tree || !tree.rootId) return '<svg width="100%" height="200"></svg>';
  const root = tree.nodes[tree.rootId];
  if (!root) return '<svg width="100%" height="200"></svg>';

  const nodeW = 120, nodeH = 70, gapX = 30, gapY = 90;
  let positions = {};
  let maxX = 0, maxY = 0;

  function layoutNode(id, x, y) {
    positions[id] = { x: x, y: y };
    if (x + nodeW > maxX) maxX = x + nodeW;
    if (y + nodeH > maxY) maxY = y + nodeH;
    const node = tree.nodes[id];
    if (!node || node.childIds.length === 0) return x + nodeW + gapX;
    let cx = x;
    node.childIds.forEach(function(cid) {
      cx = layoutNode(cid, cx, y + gapY + nodeH);
    });
    const firstChild = positions[node.childIds[0]];
    const lastChild = positions[node.childIds[node.childIds.length - 1]];
    positions[id].x = (firstChild.x + lastChild.x) / 2;
    return cx;
  }

  layoutNode(root.id, 20, 20);
  const svgW = maxX + 40;
  const svgH = maxY + 40;

  let svg = '<svg width="100%" viewBox="0 0 ' + svgW + ' ' + svgH + '" style="min-height:200px;max-height:500px;border:2px solid var(--danger);border-radius:8px;background:linear-gradient(180deg,#0a0a1a,#1a0a0a)">';
  svg += '<defs><filter id="fSimGlow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';

  // Draw connections
  Object.keys(tree.nodes).forEach(function(id) {
    const node = tree.nodes[id];
    const pos = positions[id];
    if (!node || !pos) return;
    node.childIds.forEach(function(cid) {
      const cpos = positions[cid];
      if (!cpos) return;
      const x1 = pos.x + nodeW / 2;
      const y1 = pos.y + nodeH;
      const x2 = cpos.x + nodeW / 2;
      const y2 = cpos.y;
      svg += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="#446688" stroke-width="2" filter="url(#fSimGlow)"/>';
    });
  });

  // Draw nodes - clicking non-transformer nodes triggers fault injection
  Object.keys(tree.nodes).forEach(function(id) {
    const node = tree.nodes[id];
    const pos = positions[id];
    if (!node || !pos) return;
    const isTransformer = (node.type === 'transformer');
    const fillColor = isTransformer ? '#334' : '#221111';
    const borderColor = isTransformer ? '#5588bb' : '#ff4444';
    const cursor = isTransformer ? 'not-allowed' : 'pointer';
    const onclick = isTransformer ? '' : 'onclick="sldInjectFault(\'' + id + '\')"';

    svg += '<g ' + onclick + ' style="cursor:' + cursor + '">';
    if (isTransformer) {
      const cx = pos.x + nodeW / 2;
      const cy = pos.y + nodeH / 2;
      svg += '<circle cx="' + (cx - 12) + '" cy="' + cy + '" r="18" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="2" filter="url(#fSimGlow)"/>';
      svg += '<circle cx="' + (cx + 12) + '" cy="' + cy + '" r="18" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="2" filter="url(#fSimGlow)"/>';
      svg += '<text x="' + cx + '" y="' + (cy + 30) + '" text-anchor="middle" font-size="9" fill="#aaa">' + (node.power_kVA || 630) + ' kVA</text>';
    } else {
      svg += '<rect x="' + pos.x + '" y="' + pos.y + '" width="' + nodeW + '" height="' + nodeH + '" rx="4" fill="' + fillColor + '" stroke="' + borderColor + '" stroke-width="2" filter="url(#fSimGlow)"/>';
      svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 25) + '" text-anchor="middle" font-size="9" fill="#eee">' + sldNodeName(node) + '</text>';
      svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 42) + '" text-anchor="middle" font-size="8" fill="#ff8888">\u26A1 ' + tx('Klik for fejl', 'Click to fault') + '</text>';
      if (node.protectionIn) {
        svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + 57) + '" text-anchor="middle" font-size="8" fill="#888">' + node.protectionIn + 'A</text>';
      }
    }
    svg += '</g>';
  });

  svg += '</svg>';
  return svg;
}

renderStatusBar();
renderModule(activeModule);
(function(){ var b=document.getElementById('verBadge'); if(b) b.textContent='v'+DATA_VERSION; })();
