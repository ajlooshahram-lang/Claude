<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El-Dimensionering / Electrical Dimensioning</title>
<style>
:root {
  --primary: #0f4c75;
  --primary-light: #3282b8;
  --primary-glow: rgba(50,130,184,0.15);
  --accent: #00b4d8;
  --accent-soft: #90e0ef;
  --success: #06d6a0;
  --success-bg: rgba(6,214,160,0.08);
  --danger: #ef476f;
  --danger-bg: rgba(239,71,111,0.08);
  --warning: #ffd166;
  --warning-bg: rgba(255,209,102,0.1);
  --bg: #f0f4f8;
  --bg-gradient: linear-gradient(180deg, #e8eef5 0%, #f0f4f8 100%);
  --card: #ffffff;
  --text: #1b2838;
  --text-light: #5a6d7e;
  --text-muted: #8fa3b5;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --shadow-sm: 0 1px 3px rgba(15,76,117,0.04), 0 1px 2px rgba(15,76,117,0.06);
  --shadow: 0 4px 12px rgba(15,76,117,0.06), 0 1px 3px rgba(15,76,117,0.08);
  --shadow-lg: 0 10px 30px rgba(15,76,117,0.08), 0 4px 10px rgba(15,76,117,0.05);
  --shadow-glow: 0 0 20px rgba(50,130,184,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  /* Theme-aware tinted surfaces (used by inline result boxes / SVG wraps) */
  --tint-success: linear-gradient(135deg,#eafaf1,#d5f5e3);
  --tint-warning: linear-gradient(135deg,#fef9e7,#fdebd0);
  --tint-info: linear-gradient(135deg,#eaf3fb,#d6eafb);
  --tint-panel: linear-gradient(135deg,#f8fafc,#eef3f8);
  --warning-text: #b8860b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: var(--bg-gradient);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0a2e4d 0%, var(--primary) 50%, var(--primary-light) 100%);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(10,46,77,0.25);
  backdrop-filter: blur(10px);
}

.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.lang-toggle {
  display: flex;
  gap: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 22px;
  padding: 3px;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.1);
}

.lang-btn {
  padding: 6px 16px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 700;
  background: transparent;
  color: rgba(255,255,255,0.6);
  transition: var(--transition);
  letter-spacing: 0.5px;
}

.lang-btn:hover { color: rgba(255,255,255,0.9); }
.lang-btn.active {
  background: white;
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Navigation */
.nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 14px 20px;
  background: white;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.nav::-webkit-scrollbar { display: none; }

.nav-btn {
  padding: 9px 18px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--bg);
  color: var(--text-light);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: var(--transition);
  letter-spacing: 0.2px;
}

.nav-btn:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  background: var(--primary-glow);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.nav-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-color: transparent;
  box-shadow: 0 3px 12px rgba(15,76,117,0.3);
  transform: translateY(-1px);
}

/* Main Content */
.main {
  padding: 20px;
  max-width: 920px;
  margin: 0 auto;
}

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid var(--border-light);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: var(--transition);
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.card:hover::before { opacity: 1; }

.card-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border-light);
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Selection Grid */
.select-group {
  margin-bottom: 20px;
}

.select-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.select-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.sel-btn {
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  color: var(--text);
  font-size: 0.84rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  min-width: 52px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.sel-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--primary-glow);
  opacity: 0;
  transition: var(--transition);
}

.sel-btn:hover {
  border-color: var(--primary-light);
  background: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(50,130,184,0.12);
}

.sel-btn:hover::after { opacity: 1; }

.sel-btn:active {
  transform: translateY(0);
  box-shadow: none;
}

.sel-btn.selected {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(15,76,117,0.25);
  transform: translateY(-1px);
}

.sel-btn.selected::after { display: none; }
.sel-btn.disabled { opacity: 0.35; pointer-events: none; filter: grayscale(0.5); }

/* Results */
.result-box {
  background: linear-gradient(135deg, rgba(6,214,160,0.05), rgba(6,214,160,0.02));
  border: 1.5px solid var(--success);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-top: 18px;
  position: relative;
  overflow: hidden;
}

.result-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--success);
  border-radius: 2px;
}

.result-box.warning {
  background: linear-gradient(135deg, rgba(255,209,102,0.06), rgba(255,209,102,0.02));
  border-color: var(--warning);
}
.result-box.warning::before { background: var(--warning); }

.result-box.error {
  background: linear-gradient(135deg, rgba(239,71,111,0.04), rgba(239,71,111,0.02));
  border-color: var(--danger);
}
.result-box.error::before { background: var(--danger); }

.result-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  color: var(--success);
  padding-left: 8px;
}

.result-box.warning .result-title { color: var(--warning-text); }
.result-box.error .result-title { color: var(--danger); }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 8px 8px 12px;
  margin: 2px 0;
  border-radius: 6px;
  font-size: 0.88rem;
  transition: var(--transition);
}

.result-row:hover { background: rgba(15,76,117,0.03); }
.result-row .label { color: var(--text-light); font-weight: 500; }
.result-row .value { font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

/* Verification badges */
.verify-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.verify-badge.ok {
  background: linear-gradient(135deg, rgba(6,214,160,0.15), rgba(6,214,160,0.08));
  color: #047857;
  border: 1px solid rgba(6,214,160,0.3);
}

.verify-badge.fail {
  background: linear-gradient(135deg, rgba(239,71,111,0.12), rgba(239,71,111,0.06));
  color: #b91c46;
  border: 1px solid rgba(239,71,111,0.3);
}

/* Table */
.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 0.82rem;
  margin-top: 12px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.data-table th {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
  transition: var(--transition);
}

.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--primary-glow); }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 1.05rem; }
  .nav { padding: 9px 10px; gap: 5px; }
  .nav-btn { font-size: 0.7rem; padding: 6px 11px; border-radius: 16px; }
  .card { padding: 16px; margin-bottom: 14px; border-radius: var(--radius); }
  .sel-btn { padding: 7px 11px; font-size: 0.76rem; min-width: 40px; }
  .main { padding: 14px; }
  .select-grid { gap: 5px; }
  .card-title { font-size: 0.96rem; }
}

@media (max-width: 380px) {
  .nav-btn { font-size: 0.64rem; padding: 5px 9px; }
  .sel-btn { padding: 6px 9px; font-size: 0.72rem; min-width: 36px; }
  .select-grid { gap: 4px; }
}

/* Animations */
.fade-in {
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }

/* Info tooltip */
.info-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg, var(--primary-glow), rgba(50,130,184,0.05));
  border: 1px solid rgba(50,130,184,0.12);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  font-size: 0.8rem;
  color: var(--primary);
  font-weight: 500;
}

.info-row::before {
  content: "\2139";
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(15,76,117,0.2);
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Status Bar */
.status-bar {
  display: flex;
  gap: 6px;
  padding: 8px 20px;
  background: linear-gradient(135deg, #f8fafc, #edf2f7);
  border-bottom: 1px solid var(--border-light);
  overflow-x: auto;
  scrollbar-width: none;
  align-items: center;
  min-height: 40px;
}
.status-bar::-webkit-scrollbar { display: none; }
.status-bar:empty { display: none; }

.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-light);
  white-space: nowrap;
  transition: var(--transition);
  cursor: pointer;
}

.status-chip:hover {
  border-color: var(--primary-light);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.status-chip .chip-label {
  color: var(--text-muted);
  font-weight: 500;
}

.status-chip .chip-value {
  color: var(--primary);
  font-weight: 700;
}

.status-chip.has-value {
  background: var(--primary-glow);
  border-color: rgba(50,130,184,0.2);
}

/* ===== DARK MODE ===== */
body.dark {
  --primary: #4a9fd4;
  --primary-light: #6bb6e0;
  --primary-glow: rgba(74,159,212,0.18);
  --accent: #2ec7e0;
  --bg: #0f1620;
  --bg-gradient: linear-gradient(180deg, #0b1119 0%, #0f1620 100%);
  --card: #1a2330;
  --text: #e6edf3;
  --text-light: #aab8c5;
  --text-muted: #718595;
  --border: #2a3645;
  --border-light: #232e3b;
  --success: #2ee6a8;
  --success-bg: rgba(46,230,168,0.10);
  --danger: #ff6b8a;
  --danger-bg: rgba(255,107,138,0.10);
  --warning: #ffd27a;
  --warning-bg: rgba(255,210,122,0.12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.45);
  /* Theme-aware tinted surfaces -> deep neon-glass in dark mode */
  --tint-success: linear-gradient(135deg, rgba(46,230,168,0.14), rgba(46,230,168,0.04));
  --tint-warning: linear-gradient(135deg, rgba(255,210,122,0.16), rgba(255,160,60,0.05));
  --tint-info: linear-gradient(135deg, rgba(0,200,255,0.14), rgba(0,128,255,0.04));
  --tint-panel: linear-gradient(135deg, #0f1d2e, #0a1622);
  --warning-text: #ffd27a;
}
body.dark .sel-btn { background: #1a2535; color: #b8d4e8; border-color: #2a3f55; }
body.dark .sel-btn:hover { background: #1f3048; border-color: #00e5ff; color: #e0f4ff; box-shadow: 0 0 10px rgba(0,229,255,0.25); }
body.dark .sel-btn.selected { background: linear-gradient(135deg, #00c8ff, #0080ff); color: #fff; border-color: transparent; box-shadow: 0 0 18px rgba(0,229,255,0.75), 0 0 4px rgba(0,200,255,0.9); text-shadow: 0 0 6px rgba(255,255,255,0.5); }
body.dark .nav { background: #0f1a26; }
body.dark .nav-btn { background: #1a2535; color: #8ab4d0; border-color: #2a3f55; }
body.dark .nav-btn:hover { border-color: #00e5ff; color: #e0f4ff; box-shadow: 0 0 8px rgba(0,229,255,0.3); }
body.dark .nav-btn.active { background: linear-gradient(135deg, #00c8ff, #0080ff); color: #fff; border-color: transparent; box-shadow: 0 0 14px rgba(0,229,255,0.7); }
body.dark .status-bar { background: linear-gradient(135deg, #161f2a, #1a2330); }
body.dark .status-chip { background: #1a2535; border-color: #2a3f55; }
body.dark .status-chip.has-value { background: rgba(0,200,255,0.12); border-color: rgba(0,229,255,0.4); }
body.dark #aiSearchBox { background: #1a2535; color: #e0f4ff; border-color: #00c8ff; box-shadow: 0 0 8px rgba(0,200,255,0.2); }
body.dark .card { border-color: #1f3048; }
body.dark .card-title { color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.4); }
body.dark .result-box { background: rgba(10,25,40,0.8); border-color: #1f4060; }
body.dark .result-box.warning { background: rgba(40,30,10,0.6); border-color: #7a5a00; }
body.dark .result-box.error { background: rgba(40,10,20,0.6); border-color: #7a0025; }
body.dark .result-row { border-color: rgba(100,180,255,0.08); }
body.dark .result-row .label { color: #8cc8e8; }
body.dark .result-row .value { color: #e8f4ff; }
body.dark .result-title { color: #00ffc8; }
body.dark .info-row { background: rgba(0,180,255,0.08); border-color: rgba(0,200,255,0.2); color: #7dd4f0; }
body.dark .select-label { color: #6aa8c8; }
body.dark .data-table th { background: linear-gradient(135deg, #0a2540, #0f3050); }
body.dark .data-table td { border-color: #1f3048; color: #c8e0f0; }
body.dark .data-table tr:hover td { background: rgba(0,200,255,0.08); }
body.dark .verify-badge.ok { background: rgba(0,255,200,0.15); color: #00ffc8; border-color: rgba(0,255,200,0.3); }
body.dark .verify-badge.fail { background: rgba(255,80,120,0.15); color: #ff8aa6; border-color: rgba(255,80,120,0.3); }
body.dark img { filter: brightness(0.92); }
.theme-btn {
  border: none;
  background: rgba(255,255,255,0.12);
  color: #fff;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.theme-btn:hover { background: rgba(255,255,255,0.25); }

/* ===================================================================
   GAME-GRADE NEON SCI-FI LAYER  \u2014  high-quality glow, depth & motion
   Light theme = clean premium glass. Dark theme = full neon sci-fi.
   =================================================================== */

/* --- Ambient animated background (sits behind all content) --- */
:root {
  --amb1: rgba(50,130,184,0.12);
  --amb2: rgba(0,180,216,0.10);
  --amb3: rgba(120,170,255,0.08);
  --grid-line: rgba(50,130,184,0.05);
}
body.dark {
  --amb1: rgba(0,200,255,0.12);
  --amb2: rgba(140,60,255,0.12);
  --amb3: rgba(0,255,200,0.07);
  --grid-line: rgba(0,200,255,0.07);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(ellipse 90% 55% at 50% -8%, var(--amb1), transparent 60%),
    radial-gradient(ellipse 55% 50% at 100% 0%, var(--amb2), transparent 55%),
    radial-gradient(ellipse 55% 55% at 0% 18%, var(--amb3), transparent 55%);
  transition: background 0.5s ease;
}
/* Moving neon perspective grid (subtle in light, vivid in dark) */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0.5;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 46px 46px;
  -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 0%, #000 25%, transparent 78%);
          mask-image: radial-gradient(ellipse 75% 65% at 50% 0%, #000 25%, transparent 78%);
  animation: gridDrift 22s linear infinite;
}
body.dark::after { opacity: 0.7; }
@keyframes gridDrift {
  from { background-position: 0 0, 0 0; }
  to   { background-position: 46px 46px, 46px 46px; }
}

/* --- Header: neon glow, animated sheen, gradient title --- */
.header { overflow: hidden; box-shadow: 0 4px 20px rgba(10,46,77,0.25), 0 0 40px rgba(0,180,216,0.10); }
.header::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 32%, rgba(255,255,255,0.16) 50%, transparent 68%);
  transform: translateX(-130%);
  animation: sheen 7.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes sheen { 0%, 55% { transform: translateX(-130%); } 100% { transform: translateX(130%); } }
body.dark .header {
  background: linear-gradient(135deg, #061320 0%, #0a2742 55%, #0e3e62 100%);
  border-bottom: 1px solid rgba(0,200,255,0.28);
  box-shadow: 0 4px 26px rgba(0,0,0,0.55), 0 0 46px rgba(0,200,255,0.18);
}
#appTitleText {
  background: linear-gradient(90deg, #ffffff, #cdeeff);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
}
body.dark #appTitleText {

.card { backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px); }

.card:hover::before { box-shadow: 0 0 14px var(--accent); }
body.dark .card {
  background: linear-gradient(160deg, rgba(28,38,54,0.86), rgba(14,22,36,0.94));
  border: 1px solid rgba(0,200,255,0.15);

body.dark .card:hover {
  border-color: rgba(0,200,255,0.42);
  box-shadow: 0 16px 44px rgba(0,0,0,0.55), 0 0 32px rgba(0,200,255,0.14);
}

/* --- Buttons: shine sweep + neon glow --- */
.sel-btn::before, .nav-btn::before {
  content: "";
  position: absolute; top: 0; left: -130%;
  width: 55%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.45), transparent);
  transform: skewX(-20deg);
  transition: left 0.55s cubic-bezier(0.2, 0.8, 0.2, 1);
  pointer-events: none;
  z-index: 1;
}
.nav-btn { position: relative; overflow: hidden; }
.sel-btn:hover::before, .nav-btn:hover::before { left: 150%; }

/* Pulsing neon on the active/selected control (dark = showcase) */
@keyframes neonPulse {
  0%, 100% { box-shadow: 0 0 16px rgba(0,229,255,0.55), 0 0 4px rgba(0,200,255,0.85); }
  50%      { box-shadow: 0 0 28px rgba(0,229,255,0.95), 0 0 10px rgba(0,220,255,1); }

body.dark .sel-btn.selected { animation: neonPulse 2.8s ease-in-out infinite; }
body.dark .nav-btn.active   { animation: neonPulse 3.4s ease-in-out infinite; }

/* --- Result boxes & chips: inner glow in dark --- */
body.dark .result-box { box-shadow: inset 0 0 0 1px rgba(0,200,255,0.06), 0 0 20px rgba(0,120,200,0.10); }
body.dark .status-chip.has-value { box-shadow: 0 0 12px rgba(0,200,255,0.18); }
body.dark .verify-badge.ok { box-shadow: 0 0 14px rgba(0,255,200,0.25); }
body.dark .info-row { box-shadow: inset 0 0 0 1px rgba(0,200,255,0.08); }

/* --- Theme button glow --- */
body.dark .theme-btn { box-shadow: 0 0 14px rgba(0,200,255,0.3); }

body.dark ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00c8ff, #0066aa); }
body.dark ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #2ee6ff, #0080cc); }

body.dark .data-table { box-shadow: 0 0 22px rgba(0,150,220,0.12); }

/* --- Respect reduced-motion preference --- */
@media (prefers-reduced-motion: reduce) {
  body::after, .header::after { animation: none; }

@media print {

// ===== SMART RECOMMENDATION ENGINE =====
// Only returns products that are SAFE and CORRECT for the given parameters
// Rules per IEC 60364-4-43: IB <= In <= Iz, Icu >= Ikmax

// Official Iz (DS/HD 60364-5-52 Table C.52.1, method C). NKT NOIKLX/NOIKX-Flex
// are halogen-free XLPE 90°C -> use XLPE column; others use conservative PVC 70°C.
function officialIz(product) {
  const xlpe = /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(product.model || '');
  if (product.material === 'Al') return (xlpe ? IZ_ALU_XLPE : IZ_ALU)[product.mm2] || product.iz;
  return (xlpe ? IZ_COPPER_XLPE : IZ_COPPER)[product.mm2] || product.iz;
}

function recommendCables(ib, material) {
  // Proper coordination IB <= In <= Iz: the cable must carry at least the
  // protection rating (next standard size >= IB), not just IB itself.
  const mat = material || cableState.material;
  const stdRatings = [6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const inMin = stdRatings.find(r => r >= ib) || ib;
  return PRODUCTS.cables
    .filter(c => c.material === (mat === 'copper' ? 'Cu' : 'Al'))
    .filter(c => officialIz(c) >= inMin) // Iz >= In >= IB
    .sort((a, b) => officialIz(a) - officialIz(b)) // Smallest suitable first
    .slice(0, 5);
}

function recommendMCBs(ib, ikmax) {
  // IEC 60364-4-43: IB <= In (rating must be >= load current)
  // Icu >= Ikmax (breaking capacity must handle short circuit)
  const ikMaxA = (ikmax || 6) * 1000; // convert kA to A, default 6kA
  return PRODUCTS.mcbs
    .filter(m => m.rating >= ib) // In >= IB
    .filter(m => m.icu * 1000 >= ikMaxA) // Icu >= Ikmax
    .sort((a, b) => a.rating - b.rating || a.icu - b.icu)
    .slice(0, 6);
}

function recommendMCCBs(ib, ikmax) {
  const ikMaxA = (ikmax || 10) * 1000;
  return PRODUCTS.mccbs
    .filter(m => {
      const maxIn = Math.max(...m.inOptions);
      return maxIn >= ib && m.icu * 1000 >= ikMaxA;
    })
    .sort((a, b) => Math.min(...a.inOptions.filter(i => i >= ib)) - Math.min(...b.inOptions.filter(i => i >= ib)))
    .slice(0, 4);
}

function recommendFuses(ib) {
  // In >= IB (fuse must be rated at or above load current)
  return PRODUCTS.fuses
    .filter(f => f.rating >= ib)
    .sort((a, b) => a.rating - b.rating)
    .slice(0, 5);
}

function recommendContactors(ib) {
  // AC-3 rating must be >= motor current
  return PRODUCTS.contactors
    .filter(c => c.ac3_A >= ib)
    .sort((a, b) => a.ac3_A - b.ac3_A)
    .slice(0, 4);
}

function recommendRCDs(ib, phases) {
  // RCD rating must be >= load current; match pole count to phase count
  const poles = phases === '3x400' ? '4P' : '2P';
  return PRODUCTS.rcds
    .filter(r => r.poles === poles && r.rating >= ib && r.sensitivity === 30)
    .sort((a, b) => a.rating - b.rating)
    .slice(0, 4);
}

function recommendMPCBs(ib) {
  // Motor protection: IB must fall within adjustment range
  return PRODUCTS.mpcbs
    .filter(m => ib <= m.rangeMax && ib >= m.rangeMin * 0.7)
    .sort((a, b) => a.rangeMax - b.rangeMax)
    .slice(0, 3);
}

function recommendOverloadRelays(ib) {
  // Overload relay: IB must fall within range
  return PRODUCTS.overloadRelays
    .filter(r => ib <= r.rangeMax && ib >= r.rangeMin * 0.7)
    .sort((a, b) => a.rangeMax - b.rangeMax)
    .slice(0, 3);
}

// Render product recommendation card
function renderRecommendations(title, products, type) {
  if (!products || products.length === 0) return '';

  const typeToCat = { cable:'cables', mcb:'mcbs', mccb:'mccbs', fuse:'fuses', contactor:'contactors', rcd:'rcds', mpcb:'mpcbs', relay:'overloadRelays' };
  const cat = typeToCat[type] || type;

  const rowWrap = (p, mainLabel, valueText, sub) => `
    <div class="result-row" style="align-items:center;gap:12px">
      ${getComponentVisual(cat, p)}
      <div style="flex:1;display:flex;flex-direction:column;gap:2px">
        <div style="display:flex;justify-content:space-between;width:100%;gap:8px">
          <span class="label">${mainLabel}</span>
          <span class="value">${valueText}</span>
        </div>
        ${sub ? `<span style="font-size:0.75rem;color:var(--text-muted)">${sub}</span>` : ''}
      </div>
    </div>`;

  let rows = '';
  if (type === 'cable') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.cores} ${p.mm2} mm\u00B2`, `Iz = ${officialIz(p)} A`, `${lang === 'da' ? p.use_da : p.use_en} | R=${p.r} X=${p.x} \u03A9/km`)).join('');
  } else if (type === 'mcb') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.curve}${p.rating} (${p.poles})`, `Icu = ${p.icu} kA`)).join('');
  } else if (type === 'mccb') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model}`, `Icu = ${p.icu} kA`, `In: ${p.inOptions.join(', ')} A`)).join('');
  } else if (type === 'fuse') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.rating} A`, `${p.size}`, `Icu=${p.icu} kA | I5s=${p.i5s} A`)).join('');
  } else if (type === 'contactor') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} (${p.series})`, `AC-3: ${p.ac3_A} A`, `${p.ac3_kW} kW`)).join('');
  } else if (type === 'rcd') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} ${p.poles} ${p.rating}A`, `${p.sensitivity} mA`, `Type ${p.rcdType}`)).join('');
  } else if (type === 'mpcb') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} (${p.series})`, `${p.rangeMin}-${p.rangeMax} A`, `${p.kW} kW`)).join('');
  } else if (type === 'relay') {
    rows = products.map(p => rowWrap(p, `<strong>${p.brand}</strong> ${p.model} (${p.series})`, `${p.rangeMin}-${p.rangeMax} A`)).join('');
  }

  return `
    <div class="card fade-in">
      <div class="card-title">\u2705 ${title}</div>
      <div class="info-row">${lang === 'da' ? 'Kun sikkerhedsgodkendte produkter vises. Baseret p\u00E5 IB \u2264 In \u2264 Iz og Icu \u2265 Ik max.' : 'Only safety-approved products shown. Based on IB \u2264 In \u2264 Iz and Icu \u2265 Ik max.'}</div>
      <div class="result-box">
        <div class="result-title">${lang === 'da' ? 'Anbefalede produkter' : 'Recommended Products'}</div>
        ${rows}
      </div>
    </div>
  `;
}

// ===== AI ASSISTANT - Contextual Guidance =====
// Provides intelligent tips and warnings in each module based on current state

function getAiAssistant(module) {
  const ib = calcIB();
  const tips = [];
  const warnings = [];
  const errors = [];

  switch(module) {
    case 'load':
      if (loadState.power === 1) {
        tips.push(lang === 'da' ? 'Tip: Vælg den faktiske effekt for din belastning.' : 'Tip: Select the actual power for your load.');
      }
      if (ib > 63 && ib <= 125) {
        tips.push(lang === 'da' ? 'IB > 63 A: Overvej C120N/H MCB eller NH-sikring.' : 'IB > 63 A: Consider C120N/H MCB or NH fuse.');
      }
      if (ib > 125) {
        tips.push(lang === 'da' ? 'IB > 125 A: Brug maksimalafbryder (MCCB) eller NH-sikring.' : 'IB > 125 A: Use MCCB or NH fuse.');
      }
      if (loadState.cosPhi < 0.85) {
        tips.push(lang === 'da' ? 'Lav cos\u03C6: Overvej fasekompensering for at reducere strømmen.' : 'Low cos\u03C6: Consider power factor correction to reduce current.');
      }
      if (loadState.simFactor < 0.7) {
        tips.push(lang === 'da' ? 'Lav samtidighedsfaktor: Kontroll\u00E9r at dette er korrekt for anlægstypen.' : 'Low simultaneity factor: Verify this is correct for the installation type.');
      }
      break;

    case 'fuse':
      if (fuseState.size && fuseState.size < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Sikringsstørrelse (' + fuseState.size + ' A) er MINDRE end IB (' + ib.toFixed(1) + ' A)! Vælg en større sikring.' : '\u26A0\uFE0F ERROR: Fuse rating (' + fuseState.size + ' A) is LESS than IB (' + ib.toFixed(1) + ' A)! Select a larger fuse.');
      }
      if (fuseState.size && fuseState.size >= ib) {
        tips.push(lang === 'da' ? '\u2705 IB (' + ib.toFixed(1) + ' A) \u2264 In (' + fuseState.size + ' A) — korrekt dimensioneret.' : '\u2705 IB (' + ib.toFixed(1) + ' A) \u2264 In (' + fuseState.size + ' A) — correctly dimensioned.');
      }
      if (!fuseState.size) {
        tips.push(lang === 'da' ? 'Vælg sikringsholder og størrelse. IB = ' + ib.toFixed(1) + ' A.' : 'Select fuse holder and size. IB = ' + ib.toFixed(1) + ' A.');
      }
      break;

    case 'mcb':
      if (mcbState.rating && mcbState.rating < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: MCB mærkestrøm (' + mcbState.rating + ' A) < IB (' + ib.toFixed(1) + ' A)! Oversikret kabel!' : '\u26A0\uFE0F ERROR: MCB rating (' + mcbState.rating + ' A) < IB (' + ib.toFixed(1) + ' A)! Cable overloaded!');
      }
      if (mcbState.rating && mcbState.rating >= ib) {
        tips.push(lang === 'da' ? '\u2705 IB \u2264 In — korrekt.' : '\u2705 IB \u2264 In — correct.');
      }
      if (mcbState.curve === 'B') {
        tips.push(lang === 'da' ? 'Kurve B: Bedst til resistive belastninger (lys, varme, stikkontakter).' : 'Curve B: Best for resistive loads (lighting, heating, sockets).');
      } else if (mcbState.curve === 'C') {
        tips.push(lang === 'da' ? 'Kurve C: Til induktive belastninger (motorer, transformere, kompressorer).' : 'Curve C: For inductive loads (motors, transformers, compressors).');
      } else if (mcbState.curve === 'D') {
        tips.push(lang === 'da' ? 'Kurve D: Til høje startstrømme (store motorer, svejsemaskiner).' : 'Curve D: For high inrush (large motors, welding machines).');
      }
      break;

    case 'mccb':
      const io = mccbState.inVal * mccbState.ioMult;
      if (io < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Io (' + io.toFixed(0) + ' A) < IB (' + ib.toFixed(1) + ' A)! Utilstrækkelig beskyttelse.' : '\u26A0\uFE0F ERROR: Io (' + io.toFixed(0) + ' A) < IB (' + ib.toFixed(1) + ' A)! Insufficient protection.');
      }
      if (io >= ib) {
        tips.push(lang === 'da' ? '\u2705 IB \u2264 Io — langsom udløser korrekt indstillet.' : '\u2705 IB \u2264 Io — long-time protection correctly set.');
      }
      tips.push(lang === 'da' ? 'Micrologic 2.2: Indstil Io \u2265 IB, og Isd baseret p\u00E5 Ik min.' : 'Micrologic 2.2: Set Io \u2265 IB, and Isd based on Ik min.');
      break;

    case 'cable':
      if (cableState.crossSection) {
        const izTable = izTableFor();
        const baseIz = izTable[parseFloat(cableState.crossSection)] || 0;
        const kInstall = INSTALL_METHODS[cableState.installMethod] || 1.0;
        const kTemp = TEMP_FACTORS[cableState.temp] || 1.0;
        const kGroup = GROUP_FACTORS[cableState.grouping] || 1.0;
        const correctedIz = baseIz * kInstall * kTemp * kGroup;

        if (correctedIz < ib) {
          errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Korrigeret Iz (' + correctedIz.toFixed(1) + ' A) < IB (' + ib.toFixed(1) + ' A)! Kablet er UNDERDIMENSIONERET!' : '\u26A0\uFE0F ERROR: Corrected Iz (' + correctedIz.toFixed(1) + ' A) < IB (' + ib.toFixed(1) + ' A)! Cable is UNDERSIZED!');
        } else {
          tips.push(lang === 'da' ? '\u2705 Iz (' + correctedIz.toFixed(1) + ' A) \u2265 IB (' + ib.toFixed(1) + ' A) — kabel korrekt dimensioneret.' : '\u2705 Iz (' + correctedIz.toFixed(1) + ' A) \u2265 IB (' + ib.toFixed(1) + ' A) — cable correctly sized.');
        }
        if (cableState.grouping > 3) {
          warnings.push(lang === 'da' ? 'H\u00F8j gruppering reducerer kapaciteten kraftigt. Overvej større tværsnit.' : 'High grouping significantly reduces capacity. Consider larger cross-section.');
        }
        if (cableState.temp > 35) {
          warnings.push(lang === 'da' ? 'Forhøjet temperatur: Kablets kapacitet er reduceret.' : 'Elevated temperature: Cable capacity is reduced.');
        }
      } else {
        tips.push(lang === 'da' ? 'Vælg kabeltype og tværsnit. Krævet Iz \u2265 ' + ib.toFixed(1) + ' A.' : 'Select cable type and cross-section. Required Iz \u2265 ' + ib.toFixed(1) + ' A.');
      }
      break;

    case 'vdrop':
      const cables2 = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
      const ct2 = cables2[cableState.type];
      const cc2 = ct2 && ct2[cableState.cores] ? ct2[cableState.cores] : {};
      const sc2 = cc2[cableState.crossSection];
      if (sc2) {
        const L = vdropState.length / 1000;
        const cosP = loadState.cosPhi;
        const sinP = Math.sin(Math.acos(cosP));
        const Un = loadState.voltage === '3x400' ? 400 : 230;
        let vd;
        if (loadState.voltage === '3x400') {
          vd = Math.sqrt(3) * ib * L * (sc2.r * cosP + sc2.x * sinP);
        } else {
          vd = 2 * ib * L * (sc2.r * cosP + sc2.x * sinP);
        }
        const vdP = (vd / Un) * 100;
        if (vdP > 5) {
          errors.push(lang === 'da' ? '\u26A0\uFE0F Spændingsfald ' + vdP.toFixed(1) + '% OVERSTIGER 5%! Vælg større kabel eller kortere kabelrute.' : '\u26A0\uFE0F Voltage drop ' + vdP.toFixed(1) + '% EXCEEDS 5%! Choose larger cable or shorter route.');
        } else if (vdP > 3) {
          warnings.push(lang === 'da' ? 'Spændingsfald ' + vdP.toFixed(1) + '% — uegnet til belysning (maks 3%).' : 'Voltage drop ' + vdP.toFixed(1) + '% — unsuitable for lighting (max 3%).');
        } else {
          tips.push(lang === 'da' ? '\u2705 Spændingsfald ' + vdP.toFixed(1) + '% — OK for alle belastningstyper.' : '\u2705 Voltage drop ' + vdP.toFixed(1) + '% — OK for all load types.');
        }
      }
      if (vdropState.length > 100) {
        tips.push(lang === 'da' ? 'Lang kabelrute: Kontroller spændingsfald og kortslutningsstrøm i enden.' : 'Long cable run: Check voltage drop and short-circuit current at end.');
      }
      break;

    case 'scircuit':
      tips.push(lang === 'da' ? 'Kontroll\u00E9r: Icu \u2265 Ik max OG Isd \u2264 Ik min for korrekt beskyttelse.' : 'Verify: Icu \u2265 Ik max AND Isd \u2264 Ik min for correct protection.');
      tips.push(lang === 'da' ? 'IEC 60909: c = 1,05 (maks) for lavspænding. Ik min beregnes med 0,95 faktor.' : 'IEC 60909: c = 1.05 (max) for LV. Ik min calculated with 0.95 factor.');
      break;

    case 'trafo':
      tips.push(lang === 'da' ? 'Belastningsgrad 75-80% er optimal for levetid og effektivitet.' : 'Load level 75-80% is optimal for lifetime and efficiency.');
      if (trafoState.loadPercent > 90) {
        warnings.push(lang === 'da' ? 'Belastning over 90%: Overvej større trafo for fremtidige udvidelser.' : 'Load above 90%: Consider larger transformer for future expansion.');
      }
      break;

    case 'standards':
      tips.push(lang === 'da' ? 'Alle beregninger f\u00F8lger DS/HD 60364 og IEC 60909.' : 'All calculations follow DS/HD 60364 and IEC 60909.');
      break;
  }

  return { tips, warnings, errors };
}

// ===== QI VALIDATION SYSTEM =====
// Quality Index: Checks coordination between all modules and flags issues

function runQiValidation() {
  const ib = calcIB();
  const issues = [];
  const passed = [];

  // 1. Check IB <= In (protection device rating)
  if (mcbState.rating) {
    if (mcbState.rating >= ib) {
      passed.push({ rule: 'IB \u2264 In (MCB)', detail: ib.toFixed(1) + ' A \u2264 ' + mcbState.rating + ' A' });
    } else {
      issues.push({ rule: 'IB \u2264 In (MCB)', detail: ib.toFixed(1) + ' A > ' + mcbState.rating + ' A', severity: 'error' });
    }
  }

  // 2. Check In <= Iz (protection device <= cable capacity)
  if (mcbState.rating && cableState.crossSection) {
    const izTable = izTableFor();
    const baseIz = izTable[parseFloat(cableState.crossSection)] || 0;
    const kTotal = (INSTALL_METHODS[cableState.installMethod] || 1) * (TEMP_FACTORS[cableState.temp] || 1) * (GROUP_FACTORS[cableState.grouping] || 1);
    const corrIz = baseIz * kTotal;
    if (mcbState.rating <= corrIz) {
      passed.push({ rule: 'In \u2264 Iz', detail: mcbState.rating + ' A \u2264 ' + corrIz.toFixed(1) + ' A' });
    } else {
      issues.push({ rule: 'In \u2264 Iz', detail: mcbState.rating + ' A > ' + corrIz.toFixed(1) + ' A', severity: 'error' });
    }
  }

  // 3. Check voltage drop
  const cables3 = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const ct3 = cables3[cableState.type];
  const cc3 = ct3 && ct3[cableState.cores] ? ct3[cableState.cores] : {};
  const sc3 = cc3[cableState.crossSection];
  if (sc3 && vdropState.length) {
    const L = vdropState.length / 1000;
    const cosP = loadState.cosPhi;
    const sinP = Math.sin(Math.acos(cosP));
    const Un = loadState.voltage === '3x400' ? 400 : 230;
    const vd = loadState.voltage === '3x400'
      ? Math.sqrt(3) * ib * L * (sc3.r * cosP + sc3.x * sinP)
      : 2 * ib * L * (sc3.r * cosP + sc3.x * sinP);
    const vdP = (vd / Un) * 100;
    if (vdP <= 4) {
      passed.push({ rule: '\u0394U \u2264 4%', detail: vdP.toFixed(2) + '%' });
    } else {
      issues.push({ rule: '\u0394U \u2264 4%', detail: vdP.toFixed(2) + '% > 4%', severity: vdP > 5 ? 'error' : 'warning' });
    }
  }

  // 4. Coordination check: IB <= In <= Iz
  if (mcbState.rating && cableState.crossSection) {
    const izTable = izTableFor();
    const corrIz = (izTable[parseFloat(cableState.crossSection)] || 0) *
      (INSTALL_METHODS[cableState.installMethod] || 1) *
      (TEMP_FACTORS[cableState.temp] || 1) *
      (GROUP_FACTORS[cableState.grouping] || 1);
    if (ib <= mcbState.rating && mcbState.rating <= corrIz) {
      passed.push({ rule: 'IB \u2264 In \u2264 Iz (koordination)', detail: ib.toFixed(1) + ' \u2264 ' + mcbState.rating + ' \u2264 ' + corrIz.toFixed(1) + ' A' });
    }
  }

  // 5. Fuse coordination
  if (fuseState.size) {
    if (fuseState.size >= ib) {
      passed.push({ rule: 'IB \u2264 In (sikring)', detail: ib.toFixed(1) + ' A \u2264 ' + fuseState.size + ' A' });
    } else {
      issues.push({ rule: 'IB \u2264 In (sikring)', detail: ib.toFixed(1) + ' A > ' + fuseState.size + ' A', severity: 'error' });
    }
  }

  return { issues, passed, score: passed.length > 0 ? Math.round((passed.length / (passed.length + issues.length)) * 100) : 0 };
}

// ===== DYNAMIC COORDINATE AXES =====
// When a value changes in one module, propagate relevant data to other modules

function syncAxes() {
  // Auto-suggest cable based on IB
  const ib = calcIB();

  // If no cable selected yet, auto-find smallest suitable
  if (!cableState.crossSection && ib > 0) {
    const izTable = izTableFor();
    const sizes = Object.keys(izTable).map(Number).sort((a,b) => a - b);
    for (const sz of sizes) {
      if (izTable[sz] >= ib) {
        // Don't auto-set, but store suggestion
        cableState._suggested = sz;
        break;
      }
    }
  }

  // Auto-suggest fuse based on IB
  if (!fuseState.size && ib > 0) {
    const allSizes = [6,10,13,16,20,25,32,35,40,50,63,80,100,125,160,200,250,315,400,500,630];
    fuseState._suggested = allSizes.find(s => s >= ib) || null;
  }

  // Auto-suggest MCB based on IB
  if (!mcbState.rating && ib > 0) {
    const stdRatings = [6,10,13,16,20,25,32,40,50,63];
    mcbState._suggested = stdRatings.find(r => r >= ib) || null;
  }
}

let diversityState = { homes: 115, kwhPerHome: 8300, show: false };
function calcDiversityPb() {
  const W = diversityState.kwhPerHome / 1000; // MWh per home

// ===== UNLIMITED LOAD SCHEDULE (Belastningsskema) =====
// Add any number of consumers; the app sums them with per-phase balancing,
// exactly like exam Q1 (belastningsoversigt for tavler).
// consumer: { name, kW, cos, sf, phase }  phase: '3' (3-phase) | 'L1' | 'L2' | 'L3'
let loadList = [];
function lsAdd(){ loadList.push({ kW: 5, cos: 0.9, sf: 1.0, phase: '3' }); renderModule('load'); }
function lsRemove(i){ loadList.splice(i,1); renderModule('load'); }
function lsSet(i,k,v){ loadList[i][k]=v; renderModule('load'); }
function lsClear(){ loadList=[]; renderModule('load'); }
function lsStep(i,k,d,min,max){ let v=+(loadList[i][k]+d).toFixed(2); if(v<min)v=min; if(max!=null&&v>max)v=max; loadList[i][k]=v; renderModule('load'); }

// Per-consumer current contribution to each phase (A)
function lsConsumerCurrent(c){
  const P = c.kW*1000*c.sf;
  if(c.phase==='3'){ const I = P/(Math.sqrt(3)*400*c.cos); return {L1:I,L2:I,L3:I,kVA:c.kW*c.sf/c.cos}; }
  const I = P/(230*c.cos); const r={L1:0,L2:0,L3:0,kVA:c.kW*c.sf/c.cos}; r[c.phase]=I; return r;
}
function calcLoadSchedule(){
  const ph={L1:0,L2:0,L3:0}; let kVA=0, kW=0;
  loadList.forEach(c=>{ const x=lsConsumerCurrent(c); ph.L1+=x.L1; ph.L2+=x.L2; ph.L3+=x.L3; kVA+=x.kVA; kW+=c.kW*c.sf; });
  const maxPhase=Math.max(ph.L1,ph.L2,ph.L3);
  return { ph, maxPhase, kVA, kW, ib: maxPhase, count: loadList.length };
}

function renderNav() {

function switchModule(mod) {
  activeModule = mod;

function renderStatusBar() {
  const bar = document.getElementById('statusBar');
  const chips = [];

  // IB from load module
  const ib = calcIB();
  if (loadState.power > 0) {
    chips.push({ label: 'IB', value: `${ib.toFixed(1)} A`, mod: 'load' });
    chips.push({ label: loadState.voltage === '3x400' ? '3~' : '1~', value: `${loadState.voltage}V`, mod: 'load' });
  }

  // Protection device
  if (mcbState.rating) {
    chips.push({ label: 'MCB', value: `${mcbState.type} ${mcbState.curve}${mcbState.rating}`, mod: 'mcb' });
  } else if (mccbState.inVal) {
    chips.push({ label: 'MCCB', value: `${mccbState.frame} ${mccbState.inVal}A`, mod: 'mccb' });
  }

  // Fuse
  if (fuseState.size) {
    chips.push({ label: lang === 'da' ? 'Sikring' : 'Fuse', value: `${fuseState.holder} ${fuseState.size}A`, mod: 'fuse' });
  }

  // Cable
  if (cableState.crossSection) {
    chips.push({ label: lang === 'da' ? 'Kabel' : 'Cable', value: `${cableState.crossSection} mm²`, mod: 'cable' });
  }

  // Length
  if (vdropState.length && cableState.crossSection) {
    chips.push({ label: 'L', value: `${vdropState.length} m`, mod: 'vdrop' });
  }

  bar.innerHTML = chips.map(c =>
    `<span class="status-chip has-value" onclick="switchModule('${c.mod}')"><span class="chip-label">${c.label}:</span><span class="chip-value">${c.value}</span></span>`
  ).join('');
}

function renderModule(mod) {
  syncAxes(); // Dynamic coordination
  const main = document.getElementById('mainContent');
  let content = '';
  switch(mod) {
    case 'load': content = renderLoad(); break;
    case 'brain': content = renderBrain(); break;
    case 'fuse': content = renderFuse(); break;
    case 'mcb': content = renderMCB(); break;
    case 'mccb': content = renderMCCB(); break;
    case 'cable': content = renderCable(); break;
    case 'vdrop': content = renderVdrop(); break;
    case 'scircuit': content = renderShortCircuit(); break;
    case 'trafo': content = renderTrafo(); break;
    case 'standards': content = renderStandards(); break;
    case 'bank': content = renderBank(); break;
    case 'ai': content = renderAiElectrician(); break;
    case 'bid': content = renderBid(); break;
    case 'projekt': content = renderProjekt(); break;
    case 'verify': content = renderVerify(); break;
    case 'draw': content = renderDrawing(); break;
  }
  // Append AI assistant to every module
  content += renderAiAssistant(mod);
  // Append QI validation summary if enough data exists
  const qi = runQiValidation();
  const noQi = ['standards','bank','ai','bid','projekt','verify','draw','brain'];
  if (qi.passed.length + qi.issues.length > 0 && noQi.indexOf(mod) < 0) {
    content += renderQiCard(qi);
  }
  main.innerHTML = content;
  renderStatusBar();
}

function renderQiCard(qi) {
  const scoreColor = qi.score >= 80 ? 'var(--success)' : qi.score >= 50 ? 'var(--warning-text)' : 'var(--danger)';
  let html = '<div class="card fade-in" style="border-left:4px solid ' + scoreColor + ';">';
  html += '<div class="card-title">\uD83D\uDCCA ' + (lang === 'da' ? 'QI Kvalitetsindeks' : 'QI Quality Index') + ' \u2014 ' + qi.score + '%</div>';

  if (qi.issues.length > 0) {
    html += '<div class="result-box ' + (qi.issues.some(i => i.severity === 'error') ? 'error' : 'warning') + '" style="margin-top:0">';
    html += '<div class="result-title">' + (lang === 'da' ? 'Problemer fundet' : 'Issues found') + '</div>';
    qi.issues.forEach(i => {
      const icon = i.severity === 'error' ? '\u274C' : '\u26A0\uFE0F';
      html += '<div class="result-row"><span class="label">' + icon + ' ' + i.rule + '</span><span class="value">' + i.detail + '</span></div>';
    });
    html += '</div>';
  }

  if (qi.passed.length > 0) {
    html += '<div class="result-box" style="margin-top:8px">';
    html += '<div class="result-title">' + (lang === 'da' ? 'Bestået' : 'Passed') + '</div>';
    qi.passed.forEach(p => {
      html += '<div class="result-row"><span class="label">\u2705 ' + p.rule + '</span><span class="value">' + p.detail + '</span></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function calcIB() {
  const P = loadState.power * 1000; // W
  const cosP = loadState.cosPhi;
  const sf = loadState.simFactor;
  const ef = loadState.expFactor;
  let ib;
  if (loadState.voltage === '3x400') {
    ib = P / (Math.sqrt(3) * 400 * cosP);
  } else {
    ib = P / (230 * cosP);
  }
  return ib * sf * ef;
}

function calcS() {
  return loadState.power / loadState.cosPhi;
}

// ===== VOLTAGE DROP MODULE =====
function renderVdrop() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const currentType = cables[cableState.type];
  const currentCores = currentType && currentType[cableState.cores] ? currentType[cableState.cores] : {};
  const selectedCable = currentCores[cableState.crossSection];

  const lengthSteps = [5, 10, 15, 20, 25, 30, 40, 50, 60, 70, 80, 90, 100, 125, 150, 175, 200, 250, 300, 400, 500];

  let vdrop = 0, vdropPercent = 0, Un = 400;
  if (selectedCable) {
    const ib = calcIB();
    const L = vdropState.length / 1000; // km
    const cosP = loadState.cosPhi;
    const sinP = Math.sin(Math.acos(cosP));
    Un = loadState.voltage === '3x400' ? 400 : 230;

    if (loadState.voltage === '3x400') {
      vdrop = Math.sqrt(3) * ib * L * (selectedCable.r * cosP + selectedCable.x * sinP);
    } else {
      vdrop = 2 * ib * L * (selectedCable.r * cosP + selectedCable.x * sinP);
    }
    vdropPercent = (vdrop / Un) * 100;
  }

  const isOk = vdropPercent <= 4;
  const isLighting = vdropPercent <= 3;
  const boxClass = !selectedCable ? '' : (isOk ? '' : 'error');

  return `
    <div class="card fade-in">
      <div class="card-title">${t('vdropTitle')}</div>
      <div class="info-row">${lang === 'da' ? 'V\u00E6lg kabel under "Kabler" f\u00F8rst, derefter l\u00E6ngde her' : 'Select cable under "Cables" first, then length here'}</div>

      ${!selectedCable ? `
        <div class="result-box warning">
          <div class="result-title">${lang === 'da' ? 'Advarsel' : 'Warning'}</div>
          <div class="result-row"><span class="label">${lang === 'da' ? 'V\u00E6lg kabel i "Kabler"-modulet f\u00F8rst' : 'Select a cable in the "Cables" module first'}</span></div>
        </div>
      ` : `
        <div class="result-box" style="margin-bottom:16px;background:var(--primary-glow);border-color:var(--primary-light)">
          <div class="result-row"><span class="label">${t('cableType')}</span><span class="value">${cableState.type} ${cableState.cores} ${cableState.crossSection} mm\u00B2</span></div>
          <div class="result-row"><span class="label">IB</span><span class="value">${calcIB().toFixed(1)} A</span></div>
        </div>
      `}

      <div class="select-group">
        <div class="select-label">${t('cableLength')}</div>
        <div class="select-grid">
          ${lengthSteps.map(l =>
            `<button class="sel-btn ${vdropState.length === l ? 'selected' : ''}" onclick="vdropState.length=${l};renderModule('vdrop')">${l}</button>`
          ).join('')}
        </div>
      </div>
    </div>

    ${selectedCable ? `
    <div class="card fade-in">
      <div class="card-title">${t('vdropResult')}</div>
      <div class="result-box ${boxClass}">
        <div class="result-title">${t('result')} ${isOk ? '<span class="verify-badge ok">\u2713 OK</span>' : '<span class="verify-badge fail">\u2717 > 4%</span>'}</div>
        <div class="result-row"><span class="label">${t('vdropVolts')}</span><span class="value">${vdrop.toFixed(2)} V</span></div>
        <div class="result-row"><span class="label">${t('vdropPercent')}</span><span class="value">${vdropPercent.toFixed(2)} %</span></div>
        <div class="result-row"><span class="label">${t('vdropRemaining')}</span><span class="value">${(Un - vdrop).toFixed(1)} V</span></div>
        <div class="result-row"><span class="label">${t('vdropLimit')}</span><span class="value">${isOk ? '\u2713' : '\u2717'}</span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Belysning ≤3%' : 'Lighting ≤3%'}</span><span class="value"><span class="verify-badge ${isLighting ? 'ok' : 'fail'}">${isLighting ? (lang==='da'?'OK':'OK') : (lang==='da'?'Over 3%':'Over 3%')}</span></span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Andre ≤5%' : 'Other ≤5%'}</span><span class="value"><span class="verify-badge ${vdropPercent <= 5 ? 'ok' : 'fail'}">${vdropPercent <= 5 ? 'OK' : (lang==='da'?'Over 5%':'Over 5%')}</span></span></div>
      </div>
    </div>
    ` : ''}
  `;
}

// ===== SHORT CIRCUIT MODULE =====
function renderShortCircuit() {
  const zNetSteps = [0.5, 1, 1.5, 2, 3, 4, 5, 7, 10, 15, 20];
  const zTrafoSteps = [2, 3, 4, 5, 6, 7, 8, 10, 12, 15, 20, 25, 30, 40, 50];

  // Cable impedance
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const currentType = cables[cableState.type];
  const currentCores = currentType && currentType[cableState.cores] ? currentType[cableState.cores] : {};
  const selectedCable = currentCores[cableState.crossSection];

  let zCable = 0;
  if (selectedCable) {
    const L = vdropState.length / 1000; // km
    const rCable = selectedCable.r * L;
    const xCable = selectedCable.x * L;
    zCable = Math.sqrt(rCable * rCable + xCable * xCable) * 1000; // mOhm
  }

  const zTotal = scState.zNet + scState.zTrafo + zCable;
  const Un = loadState.voltage === '3x400' ? 400 : 230;
  const cFactor = 1.05; // voltage factor per IEC 60909

  // Ik max (3-phase, at busbar)
  const ikMax3ph = (cFactor * Un) / (Math.sqrt(3) * (scState.zNet + scState.zTrafo) / 1000);
  // Ik min (2-phase at end of cable, factor 0.95)
  const ikMin2ph = (0.95 * Un) / (2 * zTotal / 1000);

  // Get protection device Icu and Isd for check
  let deviceIcu = 0, deviceIsd = 0;
  if (activeModule === 'scircuit') {
    // Try MCCB first
    deviceIcu = MCCB_TRIPS[mccbState.trip] * 1000; // A
    const io = mccbState.inVal * mccbState.ioMult;
    deviceIsd = io * mccbState.isdMult * 1.1;

    // Or MCB
    if (mcbState.rating) {
      const mcb = MCB_TYPES[mcbState.type];
      const mcbIcu = (mcbState.poles === '1p' ? mcb.icu1p : mcb.icuMp) * 1000;
      if (mcbIcu > 0) {
        deviceIcu = mcbIcu;
        deviceIsd = MCB_CURVES[mcbState.curve].isdMax * mcbState.rating;
      }
    }
  }

  const check1 = deviceIcu >= ikMax3ph;
  const check2 = deviceIsd <= ikMin2ph;
  // Disconnection time per DS/HD 60364-4-41: final circuits <=32A must clear
  // within 0.4s (TN), distribution within 5s. Met if Ik min trips the magnetic element.
  const ibForTime = calcIB();
  const reqTime = (ibForTime <= 32 && loadState.voltage !== '3x400') ? 0.4 : (ibForTime <= 32 ? 0.4 : 5);
  const discOk = ikMin2ph >= deviceIsd; // Ik min reaches the instantaneous/magnetic trip

  return `
    <div class="card fade-in">
      <div class="card-title">${t('scTitle')}</div>
      <div class="info-row">${lang === 'da' ? 'V\u00E6lg netimpedans og trafoimpedans. Kabelimpedans beregnes fra kabelmodulet.' : 'Select network impedance and transformer impedance. Cable impedance is calculated from the cable module.'}</div>

      <div class="select-group">
        <div class="select-label">${t('scZnet')}</div>
        <div class="select-grid">
          ${zNetSteps.map(z =>
            `<button class="sel-btn ${scState.zNet === z ? 'selected' : ''}" onclick="scState.zNet=${z};renderModule('scircuit')">${z}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${t('scZtrafo')}</div>
        <div class="select-grid">
          ${zTrafoSteps.map(z =>

// Data from 1.-Dim-af-trafo.ppx.pptx
let trafoState = { size: 400, voltage: '10/0.4', loadPercent: 75 };

function renderTrafo() {
  const S = trafoState.size;
  const uk = TRAFO_UK[S] || 4;
  const losses = TRAFO_LOSSES[S] || { p0: 0, pk: 0 };
  const loadFactor = trafoState.loadPercent / 100;

  // Full load current (secondary)
  const Ifl = (S * 1000) / (Math.sqrt(3) * 400);
  // Actual load current
  const Iload = Ifl * loadFactor;
  // Transformer impedance in mOhm (secondary side)
  const Ztrafo = (uk / 100) * (400 * 400) / (S * 1000) * 1000; // mOhm
  // Short-circuit current at secondary busbar
  const Ik = (S * 1000) / (Math.sqrt(3) * 400 * (uk / 100));
  // Total losses at given load
  const Ploss = losses.p0 + losses.pk * loadFactor * loadFactor;

  const voltageOptions = ['10/0.4', '20/0.4', '50/10', '30/10'];
  const loadSteps = [25, 50, 60, 70, 75, 80, 85, 90, 95, 100];

  return `
    <div class="card fade-in">
      <div class="card-title">${lang === 'da' ? 'Transformerdimensionering' : 'Transformer Dimensioning'}</div>
      <div class="info-row">${lang === 'da' ? 'Vælg trafostørrelse og belastningsgrad. Baseret på Fællesregulativet 2019.' : 'Select transformer size and load level. Based on Fællesregulativet 2019.'}</div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Trafostørrelse [kVA]' : 'Transformer Size [kVA]'}</div>
        <div class="select-grid">
          ${TRAFO_SIZES.map(s =>
            `<button class="sel-btn ${trafoState.size === s ? 'selected' : ''}" onclick="trafoState.size=${s};renderModule('trafo')">${s}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Omsætningsforhold [kV]' : 'Voltage Ratio [kV]'}</div>
        <div class="select-grid">
          ${voltageOptions.map(v =>
            `<button class="sel-btn ${trafoState.voltage === v ? 'selected' : ''}" onclick="trafoState.voltage='${v}';renderModule('trafo')">${v}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Belastningsgrad [%]' : 'Load Level [%]'}</div>
        <div class="select-grid">
          ${loadSteps.map(l =>
            `<button class="sel-btn ${trafoState.loadPercent === l ? 'selected' : ''}" onclick="trafoState.loadPercent=${l};renderModule('trafo')">${l}%</button>`
          ).join('')}
        </div>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-title">${lang === 'da' ? 'Trafodata' : 'Transformer Data'}</div>
      <div class="result-box">
        <div class="result-title">${lang === 'da' ? 'Resultat' : 'Result'}</div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Størrelse' : 'Size'}</span><span class="value">${S} kVA</span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Omsætning' : 'Ratio'}</span><span class="value">${trafoState.voltage} kV</span></div>
        <div class="result-row"><span class="label">uk%</span><span class="value">${uk} %</span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Fuldlaststrøm (sek.)' : 'Full-load current (sec.)'}</span><span class="value">${Ifl.toFixed(1)} A</span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Aktuel belastning' : 'Actual load'}</span><span class="value">${Iload.toFixed(1)} A (${trafoState.loadPercent}%)</span></div>
        <div class="result-row"><span class="label">Z trafo</span><span class="value">${Ztrafo.toFixed(2)} mΩ</span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Ik (sekundær skinne)' : 'Ik (secondary busbar)'}</span><span class="value">${(Ik/1000).toFixed(2)} kA</span></div>

      </div>

// Resolves a photo URL and whether it is the EXACT product photo or a
// REPRESENTATIVE category photo. Returns { url, exact } or null.
function photoUrlFor(category, p) {
  if (!PHOTOS_ENABLED) return null;
  // 1) explicit per-product photo (exact)
  if (p && p.img) return { url: /^https?:/.test(p.img) ? p.img : (PHOTO_BASE + p.img), exact: true };
  // 2) connected feed -> resolve the EXACT photo per model.
  //    PHOTO_BASE may be a pattern with placeholders {id} {ref} {brand} {model},
  //    or a plain base URL to which "<id>.jpg" is appended.
  if (PHOTO_BASE && p) {
    let url;
    if (PHOTO_BASE.indexOf('{') >= 0) {
      url = PHOTO_BASE
        .replace(/\{id\}/g, encodeURIComponent(p.id || ''))
        .replace(/\{ref\}/g, encodeURIComponent(p.ref || p.id || ''))
        .replace(/\{brand\}/g, encodeURIComponent(p.brand || ''))
        .replace(/\{model\}/g, encodeURIComponent(p.model || ''));
    } else {
      url = PHOTO_BASE + encodeURIComponent(p.ref || p.id || '') + '.jpg';
    }
    return { url, exact: true };
  }
  // 3) per-category default (representative, not the exact model)
  const c = COMPONENT_PHOTOS[category];
  if (c) return { url: /^https?:/.test(c) ? c : (PHOTO_BASE + c), exact: false };
  return null;
}

// Returns a real <img> photo (with SVG fallback) or the SVG illustration.
// Representative (non-exact) photos get an honest "~" badge.
function getComponentVisual(category, p) {
  const res = photoUrlFor(category, p);
  const svg = getComponentSvg(category, p);
  if (!res) return svg;
  const fid = 'ph' + Math.random().toString(36).slice(2, 9);
  const badge = res.exact ? '' :
    `<span title="${lang === 'da' ? 'Repr\u00E6sentativt billede (ikke n\u00F8jagtig model)' : 'Representative image (not the exact model)'}"
       style="position:absolute;bottom:-3px;right:-3px;background:var(--warning);color:#5a4500;font-size:8px;font-weight:700;padding:1px 3px;border-radius:4px;line-height:1.2">~</span>`;
  return `<span style="position:relative;display:inline-flex;flex-shrink:0">
    <img src="${res.url}" alt="${(p && p.model) || ''}" width="56" height="56" loading="lazy"
      style="object-fit:cover;border-radius:8px;border:1px solid var(--border)"
      onerror="this.style.display='none';var f=document.getElementById('${fid}');if(f)f.style.display='inline-flex'">
    <span id="${fid}" style="display:none">${svg}</span>
    ${badge}
  </span>`;
}

function configurePhotos() {
  const msg = lang === 'da'
    ? 'Indtast URL-m\u00F8nster til dit licenserede billedfeed, s\u00E5 hvert produkt viser SIT eget foto.\n\nBrug pladsholdere: {ref} {id} {brand} {model}\nEksempel: https://feed.lemu.dk/img/{ref}.jpg\n\n(Tomt = brug repr\u00E6sentative fotos)'
    : 'Enter a URL pattern for your licensed image feed so each product shows ITS OWN photo.\n\nUse placeholders: {ref} {id} {brand} {model}\nExample: https://feed.lemu.dk/img/{ref}.jpg\n\n(Empty = use representative photos)';
  const base = prompt(msg, PHOTO_BASE);
  if (base === null) return;
  PHOTO_BASE = base.trim();
  PHOTOS_ENABLED = true; // representative photos still show when base is empty
  localStorage.setItem('photoBase', PHOTO_BASE);
  localStorage.setItem('photosEnabled', '1');
  renderModule(activeModule);
}

// ===== COMPONENT VISUALS (code-generated SVG illustrations - fallback) =====
// License-safe, offline, scalable illustrations of each real component type.
function getComponentSvg(category, p) {
  const w = 64, h = 64;
  const wrap = (inner) => `<svg viewBox="0 0 ${w} ${h}" width="56" height="56" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;border-radius:8px;background:var(--tint-panel);border:1px solid var(--border)"><defs><radialGradient id="cgTop" cx="0.5" cy="0.1" r="0.7"><stop offset="0" stop-color="#fff" stop-opacity="0.9"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient><linearGradient id="cgMetal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e4e9ee"/><stop offset="0.5" stop-color="#aab4bf"/><stop offset="1" stop-color="#6d7782"/></linearGradient><filter id="cgShad" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="1.3" flood-color="#0a1a2a" flood-opacity="0.38"/></filter></defs><g filter="url(#cgShad)">${inner}</g><ellipse cx="32" cy="11" rx="30" ry="13" fill="url(#cgTop)" opacity="0.16"/></svg>`;

  switch (category) {
    case 'cables': {
      // Cable cross-section: sheath + colored cores
      const coreColors = ['#8b5a2b', '#1b2838', '#9aa5b1', '#2980b9', '#27ae60']; // L1,L2,L3,N,PE(green)
      const isAl = p.material === 'Al';
      const sheath = isAl ? '#000' : '#1b1b1b';
      let cores = '';
      const positions = [[26,26],[38,26],[26,38],[38,38],[32,32]];
      for (let i = 0; i < 5; i++) {
        const c = i === 4 ? '#27ae60' : coreColors[i];
        cores += `<circle cx="${positions[i][0]}" cy="${positions[i][1]}" r="5" fill="${c}" stroke="#fff" stroke-width="0.8"/>`;
      }
      return wrap(`<circle cx="32" cy="32" r="22" fill="${sheath}"/><circle cx="32" cy="32" r="22" fill="none" stroke="#444" stroke-width="1"/>${cores}<text x="32" y="58" font-size="7" fill="${isAl?'#888':'#b87333'}" text-anchor="middle" font-family="monospace">${isAl?'Al':'Cu'}</text>`);
    }
    case 'mcbs':
    case 'rcbos': {
      // DIN-rail module with toggle, glossy body and metallic terminals
      const body = category === 'rcbos' ? '#eef3f9' : '#f7f7f2';
      return wrap(`<rect x="22" y="8" width="20" height="48" rx="2" fill="${body}" stroke="#9aa5b1"/><rect x="22" y="8" width="6" height="48" rx="2" fill="#fff" opacity="0.45"/><rect x="26" y="12" width="12" height="14" rx="1" fill="#1a5276"/><rect x="29" y="16" width="6" height="14" rx="1" fill="#fff" stroke="#1a5276"/><rect x="24" y="44" width="16" height="3" rx="1" fill="url(#cgMetal)"/><rect x="24" y="49" width="16" height="3" rx="1" fill="url(#cgMetal)"/><text x="32" y="40" font-size="6" fill="#333" text-anchor="middle" font-family="monospace">${(p.curve||'')+(p.rating||'')}</text>`);
    }
    case 'mccbs': {
      // Moulded case breaker (larger black block)
      return wrap(`<rect x="14" y="10" width="36" height="44" rx="3" fill="#222" stroke="#000"/><rect x="20" y="16" width="24" height="18" rx="2" fill="#333"/><circle cx="32" cy="25" r="6" fill="#1a5276"/><rect x="29" y="20" width="6" height="10" rx="1" fill="#ffd166"/><rect x="20" y="40" width="24" height="6" rx="1" fill="#444"/><text x="32" y="51" font-size="6" fill="#fff" text-anchor="middle" font-family="monospace">NSX</text>`);
    }
    case 'fuses': {
      const isNH = (p.size||'').indexOf('NH') === 0;
      if (isNH) {
        // NH knife-blade fuse
        return wrap(`<rect x="20" y="16" width="24" height="32" rx="2" fill="#d9c8a0" stroke="#a89668"/><rect x="26" y="10" width="5" height="8" fill="#888"/><rect x="33" y="10" width="5" height="8" fill="#888"/><rect x="26" y="46" width="5" height="8" fill="#888"/><rect x="33" y="46" width="5" height="8" fill="#888"/><circle cx="32" cy="32" r="4" fill="#c0392b"/><text x="32" y="34" font-size="5" fill="#fff" text-anchor="middle" font-family="monospace">${p.rating}</text>`);

    case 'rcds': {

    case 'spds': {

    }
    case 'mpcbs': {
      // Motor protector with rotary dial
      return wrap(`<rect x="20" y="8" width="24" height="48" rx="2" fill="#1a1a1a" stroke="#000"/><circle cx="32" cy="24" r="9" fill="#333" stroke="#666"/><circle cx="32" cy="24" r="2" fill="#ffd166"/><line x1="32" y1="24" x2="32" y2="17" stroke="#ffd166" stroke-width="1.5"/><rect x="27" y="40" width="10" height="8" rx="1" fill="#c0392b"/><text x="32" y="46" font-size="4.5" fill="#fff" text-anchor="middle" font-family="monospace">M</text></svg>`.replace('</svg>',''));
    }
    case 'overloadRelays': {
      // Overload relay block
      return wrap(`<rect x="18" y="12" width="28" height="40" rx="2" fill="#2b2b2b" stroke="#000"/><circle cx="28" cy="26" r="6" fill="#333" stroke="#666"/><circle cx="28" cy="26" r="1.5" fill="#ffd166"/><rect x="37" y="22" width="6" height="5" rx="1" fill="#27ae60"/><rect x="37" y="30" width="6" height="5" rx="1" fill="#c0392b"/><text x="32" y="46" font-size="5.5" fill="#ffd166" text-anchor="middle" font-family="monospace">${p.rangeMax}A</text>`);
    }
    case 'wiringDevices': {
      if (p.cat === 'socket') {
        // Danish socket face (round, 2 holes + earth pins)
        return wrap(`<circle cx="32" cy="32" r="24" fill="#fff" stroke="#d0d6dd" stroke-width="2"/><circle cx="24" cy="30" r="3" fill="#333"/><circle cx="40" cy="30" r="3" fill="#333"/><path d="M28 42 h8" stroke="#888" stroke-width="3" stroke-linecap="round"/><path d="M22 40 v4 M42 40 v4" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>`);
      }
      // Switch face
      return wrap(`<rect x="14" y="10" width="36" height="44" rx="4" fill="#fff" stroke="#d0d6dd" stroke-width="2"/><rect x="22" y="18" width="20" height="28" rx="3" fill="#f0f3f7" stroke="#c0c8d0"/><rect x="22" y="18" width="20" height="14" rx="3" fill="#e2e8f0"/>`);
    }
    default:
      return wrap(`<rect x="16" y="16" width="32" height="32" rx="4" fill="#9aa5b1"/>`);
  }
}

function renderBank() {
  const categories = {
    cables: { da: 'Kabler', en: 'Cables', data: PRODUCTS.cables },
    mcbs: { da: 'Automatsikringer', en: 'MCBs', data: PRODUCTS.mcbs },
    mccbs: { da: 'Maksimalafbrydere', en: 'MCCBs', data: PRODUCTS.mccbs },
    fuses: { da: 'Smeltesikringer', en: 'Fuses', data: PRODUCTS.fuses },
    rcds: { da: 'HPFI / RCD', en: 'RCDs', data: PRODUCTS.rcds },
    rcbos: { da: 'HPFI-automater', en: 'RCBOs', data: PRODUCTS.rcbos },
    spds: { da: 'Overspændingsbeskyttelse', en: 'Surge Protection', data: PRODUCTS.spds },
    contactors: { da: 'Kontaktorer', en: 'Contactors', data: PRODUCTS.contactors },
    mpcbs: { da: 'Motorværn', en: 'Motor Protection', data: PRODUCTS.mpcbs },
    overloadRelays: { da: 'Termorelæer', en: 'Overload Relays', data: PRODUCTS.overloadRelays },
    wiringDevices: { da: 'Stik & Afbrydere', en: 'Sockets & Switches', data: PRODUCTS.wiringDevices }
  };

  const cat = categories[bankCategory];
  let items = cat.data;

  // Get unique brands for filter
  const brands = ['all', ...new Set(cat.data.map(p => p.brand))];

  // Filter by brand
  if (bankBrand !== 'all') {
    items = items.filter(p => p.brand === bankBrand);
  }

  // Build rows based on category
  const rows = items.map(p => {
    let spec = '';
    if (bankCategory === 'cables') spec = `${p.cores} ${p.mm2} mm\u00B2 ${p.material} | Iz=${officialIz(p)}A`;
    else if (bankCategory === 'mcbs') spec = `${p.curve}${p.rating} ${p.poles} | Icu=${p.icu}kA | ${p.standard}`;
    else if (bankCategory === 'mccbs') spec = `${p.trip} | Icu=${p.icu}kA | In: ${p.inOptions.join('/')}A`;
    else if (bankCategory === 'fuses') spec = `${p.rating}A | ${p.size} | Icu=${p.icu}kA`;
    else if (bankCategory === 'rcds') spec = `${p.poles} ${p.rating}A | ${p.sensitivity}mA Type ${p.rcdType}`;
    else if (bankCategory === 'rcbos') spec = `${p.poles} ${p.curve}${p.rating} | ${p.sensitivity}mA | Icu=${p.icu}kA`;
    else if (bankCategory === 'spds') spec = `${p.spdType} ${p.poles} | Imax=${p.imax}kA | Up=${p.up}kV`;
    else if (bankCategory === 'contactors') spec = `AC-3: ${p.ac3_A}A / ${p.ac3_kW}kW`;
    else if (bankCategory === 'mpcbs') spec = `${p.rangeMin}-${p.rangeMax}A / ${p.kW}kW`;
    else if (bankCategory === 'overloadRelays') spec = `${p.rangeMin}-${p.rangeMax}A`;
    else if (bankCategory === 'wiringDevices') spec = `${p.rating}A | ${lang === 'da' ? p.desc_da : p.desc_en}`;

    const useText = p.use_da ? (lang === 'da' ? p.use_da : p.use_en) : '';

    return `
      <div class="result-row" style="align-items:center;gap:12px">
        ${getComponentVisual(bankCategory, p)}
        <div style="flex:1;display:flex;flex-direction:column;gap:2px">
          <div style="display:flex;justify-content:space-between;width:100%;gap:8px">
            <span class="label"><strong>${p.brand}</strong> ${p.model}</span>
            <span class="value">${spec}</span>
          </div>
          ${useText ? `<span style="font-size:0.75rem;color:var(--text-muted)">${useText}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="card fade-in">
      <div class="card-title">\uD83D\uDCE6 ${lang === 'da' ? 'Komponentbank' : 'Component Bank'}</div>
      <div class="info-row">${lang === 'da' ? 'Komplet bank over elektriske komponenter tilg\u00E6ngelige i Danmark (NKT, Schneider, ABB, Eaton, Hager, LK). Klik for at filtrere.' : 'Complete bank of electrical components available in Denmark (NKT, Schneider, ABB, Eaton, Hager, LK). Click to filter.'}</div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Billeder' : 'Photos'}</div>
        <div class="select-grid">
          <button class="sel-btn ${PHOTOS_ENABLED ? 'selected' : ''}" onclick="${PHOTOS_ENABLED ? "PHOTOS_ENABLED=false;localStorage.setItem('photosEnabled','0');renderModule('bank')" : "PHOTOS_ENABLED=true;localStorage.setItem('photosEnabled','1');renderModule('bank')"}">\uD83D\uDCF7 ${PHOTOS_ENABLED ? (lang === 'da' ? 'Rigtige fotos: TIL' : 'Real photos: ON') : (lang === 'da' ? 'Rigtige fotos: FRA' : 'Real photos: OFF')}</button>
          <button class="sel-btn" onclick="configurePhotos()">\u2699\uFE0F ${lang === 'da' ? 'Eget billedfeed' : 'Own image feed'}</button>
        </div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:6px">${PHOTOS_ENABLED ? (lang === 'da' ? 'Viser rigtige fotos (Wikimedia Commons, CC-licens). Tilslut "Eget billedfeed" for eksakte modelfotos.' : 'Showing real photos (Wikimedia Commons, CC-licensed). Connect "Own image feed" for exact model photos.') : (lang === 'da' ? 'Viser SVG-illustrationer.' : 'Showing SVG illustrations.')}</div>
      </div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Kategori' : 'Category'}</div>
        <div class="select-grid">
          ${Object.keys(categories).map(k =>
            `<button class="sel-btn ${bankCategory === k ? 'selected' : ''}" onclick="bankCategory='${k}';bankBrand='all';renderModule('bank')">${lang === 'da' ? categories[k].da : categories[k].en}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'M\u00E6rke' : 'Brand'}</div>
        <div class="select-grid">
          ${brands.map(b =>
            `<button class="sel-btn ${bankBrand === b ? 'selected' : ''}" onclick="bankBrand='${b}';renderModule('bank')">${b === 'all' ? (lang === 'da' ? 'Alle' : 'All') : b}</button>`
          ).join('')}
        </div>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-title">${lang === 'da' ? cat.da : cat.en} (${items.length})</div>
      <div class="result-box" style="background:var(--card);border-color:var(--border)">
        ${rows || '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Ingen produkter' : 'No products') + '</span></div>'}
      </div>
    </div>
  `;
}
