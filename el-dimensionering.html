}

// ===== AI ASSISTANT - Contextual Guidance =====
// Provides intelligent tips and warnings in each module based on current state

function getAiAssistant(module) {
  const ib = calcIB();
  const tips = [];
  const warnings = [];
  const errors = [];

  switch(module) {
    case 'load':
      if (loadState.power === 1) {
        tips.push(lang === 'da' ? 'Tip: Vælg den faktiske effekt for din belastning.' : 'Tip: Select the actual power for your load.');
      }
      if (ib > 63 && ib <= 125) {
        tips.push(lang === 'da' ? 'IB > 63 A: Overvej C120N/H MCB eller NH-sikring.' : 'IB > 63 A: Consider C120N/H MCB or NH fuse.');
      }
      if (ib > 125) {
        tips.push(lang === 'da' ? 'IB > 125 A: Brug maksimalafbryder (MCCB) eller NH-sikring.' : 'IB > 125 A: Use MCCB or NH fuse.');
      }
      if (loadState.cosPhi < 0.85) {
        tips.push(lang === 'da' ? 'Lav cos\u03C6: Overvej fasekompensering for at reducere strømmen.' : 'Low cos\u03C6: Consider power factor correction to reduce current.');
      }
      if (loadState.simFactor < 0.7) {
        tips.push(lang === 'da' ? 'Lav samtidighedsfaktor: Kontroll\u00E9r at dette er korrekt for anlægstypen.' : 'Low simultaneity factor: Verify this is correct for the installation type.');
      }
      break;

    case 'fuse':
      if (fuseState.size && fuseState.size < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Sikringsstørrelse (' + fuseState.size + ' A) er MINDRE end IB (' + ib.toFixed(1) + ' A)! Vælg en større sikring.' : '\u26A0\uFE0F ERROR: Fuse rating (' + fuseState.size + ' A) is LESS than IB (' + ib.toFixed(1) + ' A)! Select a larger fuse.');
      }
      if (fuseState.size && fuseState.size >= ib) {
        tips.push(lang === 'da' ? '\u2705 IB (' + ib.toFixed(1) + ' A) \u2264 In (' + fuseState.size + ' A) — korrekt dimensioneret.' : '\u2705 IB (' + ib.toFixed(1) + ' A) \u2264 In (' + fuseState.size + ' A) — correctly dimensioned.');
      }
      if (!fuseState.size) {
        tips.push(lang === 'da' ? 'Vælg sikringsholder og størrelse. IB = ' + ib.toFixed(1) + ' A.' : 'Select fuse holder and size. IB = ' + ib.toFixed(1) + ' A.');
      }
      break;

    case 'mcb':
      if (mcbState.rating && mcbState.rating < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: MCB mærkestrøm (' + mcbState.rating + ' A) < IB (' + ib.toFixed(1) + ' A)! Oversikret kabel!' : '\u26A0\uFE0F ERROR: MCB rating (' + mcbState.rating + ' A) < IB (' + ib.toFixed(1) + ' A)! Cable overloaded!');
      }
      if (mcbState.rating && mcbState.rating >= ib) {
        tips.push(lang === 'da' ? '\u2705 IB \u2264 In — korrekt.' : '\u2705 IB \u2264 In — correct.');
      }
      if (mcbState.curve === 'B') {
        tips.push(lang === 'da' ? 'Kurve B: Bedst til resistive belastninger (lys, varme, stikkontakter).' : 'Curve B: Best for resistive loads (lighting, heating, sockets).');
      } else if (mcbState.curve === 'C') {
        tips.push(lang === 'da' ? 'Kurve C: Til induktive belastninger (motorer, transformere, kompressorer).' : 'Curve C: For inductive loads (motors, transformers, compressors).');
      } else if (mcbState.curve === 'D') {
        tips.push(lang === 'da' ? 'Kurve D: Til høje startstrømme (store motorer, svejsemaskiner).' : 'Curve D: For high inrush (large motors, welding machines).');
      }
      break;

    case 'mccb':
      const io = mccbState.inVal * mccbState.ioMult;
      if (io < ib) {
        errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Io (' + io.toFixed(0) + ' A) < IB (' + ib.toFixed(1) + ' A)! Utilstrækkelig beskyttelse.' : '\u26A0\uFE0F ERROR: Io (' + io.toFixed(0) + ' A) < IB (' + ib.toFixed(1) + ' A)! Insufficient protection.');
      }
      if (io >= ib) {
        tips.push(lang === 'da' ? '\u2705 IB \u2264 Io — langsom udløser korrekt indstillet.' : '\u2705 IB \u2264 Io — long-time protection correctly set.');
      }
      tips.push(lang === 'da' ? 'Micrologic 2.2: Indstil Io \u2265 IB, og Isd baseret p\u00E5 Ik min.' : 'Micrologic 2.2: Set Io \u2265 IB, and Isd based on Ik min.');
      break;

    case 'cable':
      if (cableState.crossSection) {
        const izTable = izTableFor();
        const baseIz = izTable[parseFloat(cableState.crossSection)] || 0;
        // Single source of truth — no duplicated inline derating math.
        const dRes = computeDeratedIz({
          baseIz: baseIz,
          caKey: cableState.temp,
          cgKey: cableState.grouping,
          csKey: cableState.soil,
          kInstallKey: cableState.installMethod,
          buried: cableState.installMethod === 'D'
        });

        if (!dRes.ok) {
          errors.push(lang === 'da'
            ? '\u26A0\uFE0F FEJL: Ugyldig korrektionsfaktor (' + dRes.error.factor + ' \u2014 ' + dRes.error.reason + '). Iz kan ikke beregnes.'
            : '\u26A0\uFE0F ERROR: Invalid correction factor (' + dRes.error.factor + ' \u2014 ' + dRes.error.reason + '). Iz cannot be computed.');
        } else {
          const correctedIz = dRes.deratedIz;
          if (correctedIz < ib) {
            errors.push(lang === 'da' ? '\u26A0\uFE0F FEJL: Korrigeret Iz (' + correctedIz.toFixed(2) + ' A) < IB (' + ib.toFixed(1) + ' A)! Kablet er UNDERDIMENSIONERET!' : '\u26A0\uFE0F ERROR: Corrected Iz (' + correctedIz.toFixed(2) + ' A) < IB (' + ib.toFixed(1) + ' A)! Cable is UNDERSIZED!');
          } else {
            tips.push(lang === 'da' ? '\u2705 Iz (' + correctedIz.toFixed(2) + ' A) \u2265 IB (' + ib.toFixed(1) + ' A) — kabel korrekt dimensioneret.' : '\u2705 Iz (' + correctedIz.toFixed(2) + ' A) \u2265 IB (' + ib.toFixed(1) + ' A) — cable correctly sized.');
          }
          if (cableState.grouping > 3) {
            warnings.push(lang === 'da' ? 'H\u00F8j gruppering reducerer kapaciteten kraftigt. Overvej større tværsnit.' : 'High grouping significantly reduces capacity. Consider larger cross-section.');
          }
          if (cableState.temp > 35) {
            warnings.push(lang === 'da' ? 'Forhøjet temperatur: Kablets kapacitet er reduceret.' : 'Elevated temperature: Cable capacity is reduced.');
          }
        }
      } else {
        tips.push(lang === 'da' ? 'Vælg kabeltype og tværsnit. Krævet Iz \u2265 ' + ib.toFixed(1) + ' A.' : 'Select cable type and cross-section. Required Iz \u2265 ' + ib.toFixed(1) + ' A.');
      }
      break;

    case 'vdrop':
      const cables2 = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
      const ct2 = cables2[cableState.type];
      const cc2 = ct2 && ct2[cableState.cores] ? ct2[cableState.cores] : {};
      const sc2 = cc2[cableState.crossSection];
      if (sc2) {
        const L = vdropState.length / 1000;
        const cosP = loadState.cosPhi;
        const sinP = Math.sin(Math.acos(cosP));
        const Un = loadState.voltage === '3x400' ? 400 : 230;
        let vd;
        if (loadState.voltage === '3x400') {
          vd = Math.sqrt(3) * ib * L * (sc2.r * cosP + sc2.x * sinP);
        } else {
          vd = 2 * ib * L * (sc2.r * cosP + sc2.x * sinP);
        }
        const vdP = (vd / Un) * 100;
        if (vdP > 5) {
          errors.push(lang === 'da' ? '\u26A0\uFE0F Spændingsfald ' + vdP.toFixed(1) + '% OVERSTIGER 5%! Vælg større kabel eller kortere kabelrute.' : '\u26A0\uFE0F Voltage drop ' + vdP.toFixed(1) + '% EXCEEDS 5%! Choose larger cable or shorter route.');
        } else if (vdP > 3) {
          warnings.push(lang === 'da' ? 'Spændingsfald ' + vdP.toFixed(1) + '% — uegnet til belysning (maks 3%).' : 'Voltage drop ' + vdP.toFixed(1) + '% — unsuitable for lighting (max 3%).');
        } else {
          tips.push(lang === 'da' ? '\u2705 Spændingsfald ' + vdP.toFixed(1) + '% — OK for alle belastningstyper.' : '\u2705 Voltage drop ' + vdP.toFixed(1) + '% — OK for all load types.');
        }
      }
      if (vdropState.length > 100) {
        tips.push(lang === 'da' ? 'Lang kabelrute: Kontroller spændingsfald og kortslutningsstrøm i enden.' : 'Long cable run: Check voltage drop and short-circuit current at end.');
      }
      break;

    case 'scircuit':
      tips.push(lang === 'da' ? 'Kontroll\u00E9r: Icu \u2265 Ik max OG Isd \u2264 Ik min for korrekt beskyttelse.' : 'Verify: Icu \u2265 Ik max AND Isd \u2264 Ik min for correct protection.');
      tips.push(lang === 'da' ? 'IEC 60909: c = 1,05 (maks) for lavspænding. Ik min beregnes med 0,95 faktor.' : 'IEC 60909: c = 1.05 (max) for LV. Ik min calculated with 0.95 factor.');
      break;

    case 'trafo':
      tips.push(lang === 'da' ? 'Belastningsgrad 75-80% er optimal for levetid og effektivitet.' : 'Load level 75-80% is optimal for lifetime and efficiency.');
      if (trafoState.loadPercent > 90) {
        warnings.push(lang === 'da' ? 'Belastning over 90%: Overvej større trafo for fremtidige udvidelser.' : 'Load above 90%: Consider larger transformer for future expansion.');
      }
      break;

    case 'standards':
      tips.push(lang === 'da' ? 'Alle beregninger f\u00F8lger DS/HD 60364 og IEC 60909.' : 'All calculations follow DS/HD 60364 and IEC 60909.');
      break;
  }

  return { tips, warnings, errors };
}

// Render AI assistant card
function renderAiAssistant(module) {
  const ai = getAiAssistant(module);
  if (ai.tips.length === 0 && ai.warnings.length === 0 && ai.errors.length === 0) return '';

  let html = '<div class="card fade-in" style="border-left:4px solid var(--accent);"><div class="card-title">\uD83E\uDD16 ' + (lang === 'da' ? 'AI-Assistent' : 'AI Assistant') + '</div>';

  if (ai.errors.length > 0) {
    html += '<div class="result-box error" style="margin-top:0">';
    html += '<div class="result-title">' + (lang === 'da' ? 'FEJL — Korrektion påkrævet' : 'ERROR — Correction required') + '</div>';
    ai.errors.forEach(e => { html += '<div class="result-row"><span class="label" style="color:var(--danger);font-weight:600">' + e + '</span></div>'; });
    html += '</div>';
  }

  if (ai.warnings.length > 0) {
    html += '<div class="result-box warning" style="margin-top:8px">';
    html += '<div class="result-title">' + (lang === 'da' ? 'Advarsel' : 'Warning') + '</div>';
    ai.warnings.forEach(w => { html += '<div class="result-row"><span class="label" style="color:#b8860b">\u26A0\uFE0F ' + w + '</span></div>'; });
    html += '</div>';
  }

  if (ai.tips.length > 0) {
    html += '<div style="margin-top:8px;padding:10px 12px;background:var(--primary-glow);border-radius:var(--radius-sm)">';
    ai.tips.forEach(t => { html += '<div style="padding:4px 0;font-size:0.82rem;color:var(--primary);">\uD83D\uDCA1 ' + t + '</div>'; });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ===== QI VALIDATION SYSTEM =====
// Quality Index: Checks coordination between all modules and flags issues

function runQiValidation() {
  const ib = calcIB();
  const issues = [];
  const passed = [];

  // 1. Check IB <= In (protection device rating)
  if (mcbState.rating) {
    if (mcbState.rating >= ib) {
      passed.push({ rule: 'IB \u2264 In (MCB)', detail: ib.toFixed(1) + ' A \u2264 ' + mcbState.rating + ' A' });
    } else {
      issues.push({ rule: 'IB \u2264 In (MCB)', detail: ib.toFixed(1) + ' A > ' + mcbState.rating + ' A', severity: 'error' });
    }
  }

  // 2. Check In <= Iz (protection device <= cable capacity)
  if (mcbState.rating && cableState.crossSection) {
    const izTable = izTableFor();
    const baseIz = izTable[parseFloat(cableState.crossSection)] || 0;
    const kTotal = (INSTALL_METHODS[cableState.installMethod] || 1) * (TEMP_FACTORS[cableState.temp] || 1) * (GROUP_FACTORS[cableState.grouping] || 1);
    const corrIz = baseIz * kTotal;
    if (mcbState.rating <= corrIz) {
      passed.push({ rule: 'In \u2264 Iz', detail: mcbState.rating + ' A \u2264 ' + corrIz.toFixed(1) + ' A' });
    } else {
      issues.push({ rule: 'In \u2264 Iz', detail: mcbState.rating + ' A > ' + corrIz.toFixed(1) + ' A', severity: 'error' });
    }
  }

  // 3. Check voltage drop
  const cables3 = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const ct3 = cables3[cableState.type];
  const cc3 = ct3 && ct3[cableState.cores] ? ct3[cableState.cores] : {};
  const sc3 = cc3[cableState.crossSection];
  if (sc3 && vdropState.length) {
    const L = vdropState.length / 1000;
    const cosP = loadState.cosPhi;
    const sinP = Math.sin(Math.acos(cosP));
    const Un = loadState.voltage === '3x400' ? 400 : 230;
    const vd = loadState.voltage === '3x400'
      ? Math.sqrt(3) * ib * L * (sc3.r * cosP + sc3.x * sinP)
      : 2 * ib * L * (sc3.r * cosP + sc3.x * sinP);
    const vdP = (vd / Un) * 100;
    if (vdP <= 4) {
      passed.push({ rule: '\u0394U \u2264 4%', detail: vdP.toFixed(2) + '%' });
    } else {
      issues.push({ rule: '\u0394U \u2264 4%', detail: vdP.toFixed(2) + '% > 4%', severity: vdP > 5 ? 'error' : 'warning' });
    }
  }

  // 4. Coordination check: IB <= In <= Iz
  if (mcbState.rating && cableState.crossSection) {
    const izTable = izTableFor();
    const corrIz = (izTable[parseFloat(cableState.crossSection)] || 0) *
      (INSTALL_METHODS[cableState.installMethod] || 1) *
      (TEMP_FACTORS[cableState.temp] || 1) *
      (GROUP_FACTORS[cableState.grouping] || 1);
    if (ib <= mcbState.rating && mcbState.rating <= corrIz) {
      passed.push({ rule: 'IB \u2264 In \u2264 Iz (koordination)', detail: ib.toFixed(1) + ' \u2264 ' + mcbState.rating + ' \u2264 ' + corrIz.toFixed(1) + ' A' });
    }
  }

  // 5. Fuse coordination
  if (fuseState.size) {
    if (fuseState.size >= ib) {
      passed.push({ rule: 'IB \u2264 In (sikring)', detail: ib.toFixed(1) + ' A \u2264 ' + fuseState.size + ' A' });
    } else {
      issues.push({ rule: 'IB \u2264 In (sikring)', detail: ib.toFixed(1) + ' A > ' + fuseState.size + ' A', severity: 'error' });
    }
  }

  // 6. Correctness-engine verdicts (Tier 1 hardening) — appended as scored rules
  // from the ONE shared bundle so QI matches Verify and Risk exactly. PASS ->
  // passed; FAIL -> error issue; INSUFFICIENT_DATA -> warning issue (never
  // counted as passing). Wrapped so it can never break the existing QI scoring.
  try {
    const bundle = evaluateCorrectnessVerdicts();
    const ruleNames = {
      ampacity:  { da: 'Str\u00F8mb\u00E6reevne IB \u2264 In \u2264 Iz', en: 'Ampacity IB \u2264 In \u2264 Iz' },
      overload:  { da: 'Overbelastning I\u2082 \u2264 1,45\u00D7Iz', en: 'Overload I\u2082 \u2264 1.45\u00D7Iz' },
      adiabatic: { da: 'Kortslutningsholdbarhed k\u00B2S\u00B2 \u2265 I\u00B2t', en: 'Short-circuit withstand k\u00B2S\u00B2 \u2265 I\u00B2t' },
      zs:        { da: 'Fejlsl\u00F8jfe Zs \u2264 Zs_max', en: 'Fault loop Zs \u2264 Zs_max' }
    };
    ['ampacity', 'overload', 'adiabatic', 'zs'].forEach(function (id) {
      const v = bundle[id];
      if (!v) return;
      const rn = ruleNames[id] ? (lang === 'da' ? ruleNames[id].da : ruleNames[id].en) : id;
      const msg = v.message ? (lang === 'da' ? v.message.da : v.message.en) : '';
      const detail = msg + ' [' + v.clause + ']';
      const cls = classifyVerdictForQi(v);
      if (cls.target === 'passed') passed.push({ rule: rn, detail: detail });
      else issues.push({ rule: rn, detail: detail, severity: cls.severity });
    });
  } catch (e) { /* defensive: never break existing QI scoring/logic */ }

  return { issues, passed, score: passed.length > 0 ? Math.round((passed.length / (passed.length + issues.length)) * 100) : 0 };
}

// When a value changes in one module, propagate relevant data to other modules

function syncAxes() {
  // Auto-suggest cable based on IB
  const ib = calcIB();

  // If no cable selected yet, auto-find smallest suitable
  if (!cableState.crossSection && ib > 0) {
    const izTable = izTableFor();
    const sizes = Object.keys(izTable).map(Number).sort((a,b) => a - b);
    for (const sz of sizes) {
      if (izTable[sz] >= ib) {
        // Don't auto-set, but store suggestion
        cableState._suggested = sz;
        break;
      }
    }
  }

  // Auto-suggest fuse based on IB
  if (!fuseState.size && ib > 0) {
    const allSizes = [6,10,13,16,20,25,32,35,40,50,63,80,100,125,160,200,250,315,400,500,630];
    fuseState._suggested = allSizes.find(s => s >= ib) || null;
  }

  // Auto-suggest MCB based on IB
  if (!mcbState.rating && ib > 0) {
    const stdRatings = [6,10,13,16,20,25,32,40,50,63];
    mcbState._suggested = stdRatings.find(r => r >= ib) || null;
  }
}

// Pb = 0.834 * (W*n)^0.89  [kW], W = avg annual energy per home (MWh), n = homes

// Add any number of consumers; the app sums them with per-phase balancing,
// exactly like exam Q1 (belastningsoversigt for tavler).
// consumer: { name, kW, cos, sf, phase }  phase: '3' (3-phase) | 'L1' | 'L2' | 'L3'
let loadList = [];
function lsAdd(){ loadList.push({ kW: 5, cos: 0.9, sf: 1.0, phase: '3' }); renderModule('load'); }
function lsRemove(i){ loadList.splice(i,1); renderModule('load'); }
function lsSet(i,k,v){ loadList[i][k]=v; renderModule('load'); }
function lsClear(){ loadList=[]; renderModule('load'); }
function lsStep(i,k,d,min,max){ let v=+(loadList[i][k]+d).toFixed(2); if(v<min)v=min; if(max!=null&&v>max)v=max; loadList[i][k]=v; renderModule('load'); }

// Per-consumer current contribution to each phase (A)
function lsConsumerCurrent(c){
  const P = c.kW*1000*c.sf;
  if(c.phase==='3'){ const I = P/(Math.sqrt(3)*400*c.cos); return {L1:I,L2:I,L3:I,kVA:c.kW*c.sf/c.cos}; }
  const I = P/(230*c.cos); const r={L1:0,L2:0,L3:0,kVA:c.kW*c.sf/c.cos}; r[c.phase]=I; return r;
}
function calcLoadSchedule(){
  const ph={L1:0,L2:0,L3:0}; let kVA=0, kW=0;
  loadList.forEach(c=>{ const x=lsConsumerCurrent(c); ph.L1+=x.L1; ph.L2+=x.L2; ph.L3+=x.L3; kVA+=x.kVA; kW+=c.kW*c.sf; });
  const maxPhase=Math.max(ph.L1,ph.L2,ph.L3);
  return { ph, maxPhase, kVA, kW, ib: maxPhase, count: loadList.length };
}

  if (cableState.crossSection) {
    chips.push({ label: lang === 'da' ? 'Kabel' : 'Cable', value: `${cableState.crossSection} mm²`, mod: 'cable' });
  }

  // Length
  if (vdropState.length && cableState.crossSection) {
    chips.push({ label: 'L', value: `${vdropState.length} m`, mod: 'vdrop' });
  }

  bar.innerHTML = chips.map(c =>
    `<span class="status-chip has-value" onclick="switchModule('${c.mod}')"><span class="chip-label">${c.label}:</span><span class="chip-value">${c.value}</span></span>`
  ).join('');
}

function renderModule(mod) {
  syncAxes(); // Dynamic coordination
  const main = document.getElementById('mainContent');
  let content = '';
  switch(mod) {
    case 'load': content = renderLoad(); break;
    case 'fuse': content = renderFuse(); break;
    case 'mcb': content = renderMCB(); break;
    case 'mccb': content = renderMCCB(); break;
    case 'cable': content = renderCable(); break;
    case 'vdrop': content = renderVdrop(); break;
    case 'scircuit': content = renderShortCircuit(); break;
    case 'trafo': content = renderTrafo(); break;
    case 'standards': content = renderStandards(); break;
    case 'bank': content = renderBank(); break;
    case 'ai': content = renderAiElectrician(); break;
    case 'bid': content = renderBid(); break;
    case 'projekt': content = renderProjekt(); break;
    case 'verify': content = renderVerify(); break;
    case 'draw': content = renderDrawing(); break;
    case 'backup': content = renderBackup(); break;
    case 'wire': content = renderWire(); break;
    case 'risk': content = renderRisk(); break;
    case 'selectivity': content = renderSelectivity(); break;
    case 'commission': content = renderCommission(); break;
    case 'ev': content = renderEV(); break;
    case 'earthing': content = renderEarthing(); break;
    case 'harmonics': content = renderHarmonics(); break;
    case 'motor': content = renderMotor(); break;
    case 'tray': content = renderTray(); break;
    case 'meter': content = renderMeter(); break;
  }
  // Append AI assistant to every module
  content += renderAiAssistant(mod);
  // Append QI validation summary if enough data exists
  const qi = runQiValidation();
  const noQi = ['standards','bank','ai','bid','projekt','verify','draw','backup','wire','risk'];
  if (qi.passed.length + qi.issues.length > 0 && noQi.indexOf(mod) < 0) {
    content += renderQiCard(qi);
  }
  main.innerHTML = content;
  renderStatusBar();
}

function renderQiCard(qi) {
  const scoreColor = qi.score >= 80 ? 'var(--success)' : qi.score >= 50 ? '#b8860b' : 'var(--danger)';
  let html = '<div class="card fade-in" style="border-left:4px solid ' + scoreColor + ';">';
  html += '<div class="card-title">\uD83D\uDCCA ' + (lang === 'da' ? 'QI Kvalitetsindeks' : 'QI Quality Index') + ' \u2014 ' + qi.score + '%</div>';

  if (qi.issues.length > 0) {
    html += '<div class="result-box ' + (qi.issues.some(i => i.severity === 'error') ? 'error' : 'warning') + '" style="margin-top:0">';
    html += '<div class="result-title">' + (lang === 'da' ? 'Problemer fundet' : 'Issues found') + '</div>';
    qi.issues.forEach(i => {
      const icon = i.severity === 'error' ? '\u274C' : '\u26A0\uFE0F';
      html += '<div class="result-row"><span class="label">' + icon + ' ' + i.rule + '</span><span class="value">' + i.detail + '</span></div>';
    });
    html += '</div>';
  }

  if (qi.passed.length > 0) {
    html += '<div class="result-box" style="margin-top:8px">';
    html += '<div class="result-title">' + (lang === 'da' ? 'Bestået' : 'Passed') + '</div>';
    qi.passed.forEach(p => {
      html += '<div class="result-row"><span class="label">\u2705 ' + p.rule + '</span><span class="value">' + p.detail + '</span></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function calcIB() {
  const P = loadState.power * 1000; // W
  const cosP = loadState.cosPhi;
  const sf = loadState.simFactor;
  const ef = loadState.expFactor;
  let ib;
  if (loadState.voltage === '3x400') {
    ib = P / (Math.sqrt(3) * 400 * cosP);
  } else {
    ib = P / (230 * cosP);
  }
  return ib * sf * ef;
}

function calcS() {
  return loadState.power / loadState.cosPhi;
}

        <div class="result-row"><span class="label">Io</span><span class="value">${io.toFixed(0)} A</span></div>
        <div class="result-row"><span class="label">${t('mccbIr')}</span><span class="value">${(mccbState.inVal * 0.4).toFixed(0)} - ${io.toFixed(0)} A</span></div>
        <div class="result-row"><span class="label">${t('mccbIsdCalc')}</span><span class="value">${isdMin.toFixed(0)} - ${isdMax.toFixed(0)} A (\u00B110%)</span></div>
        <div class="result-row"><span class="label">${t('mccbIi')}</span><span class="value">${ii} A</span></div>
      </div>
    </div>
  `;
}

// ===== AUTO-DIMENSIONING SOLVER (Feature: auto-dimensioning-solver) =====
// Life-safety-critical: every verdict cites DS/HD 60364, conservative always.
// Exhaustive search with early-exit pipeline: ampacity → overload → adiabatic → Zs → ΔU.

function preFilterCandidates(ib) {
  var cables = PRODUCTS.cables.filter(function(c) {
    return officialIz(c) >= ib;
  });
  var devices = [];
  PRODUCTS.mcbs.forEach(function(m) {
    if (m.rating >= ib) {
      devices.push({ id: m.id, kind: 'mcb', inA: m.rating, curve: m.curve, icu: m.icu, brand: m.brand, model: m.model, i5s: null, _src: m });
    }
  });
  PRODUCTS.mccbs.forEach(function(m) {
    (m.inOptions || []).forEach(function(inVal) {
      if (inVal >= ib) {
        devices.push({ id: m.id + '-' + inVal, kind: 'mccb', inA: inVal, curve: null, icu: m.icu, brand: m.brand, model: m.model + ' @ ' + inVal + 'A', i5s: null, _src: m });
      }
    });
  });
  PRODUCTS.fuses.forEach(function(f) {
    if (f.rating >= ib) {
      devices.push({ id: f.id, kind: 'fuse', inA: f.rating, curve: null, icu: f.icu, brand: f.brand, model: f.model, i5s: f.i5s || null, _src: f });
    }
  });
  return { cables: cables, devices: devices };
}

function rankCompliantSets(sets) {
  var CURVE_ORDER = { B: 0, C: 1, D: 2 };
  return sets.slice().sort(function(a, b) {
    if (a.cable.mm2 !== b.cable.mm2) return a.cable.mm2 - b.cable.mm2;
    if (a.inA !== b.inA) return a.inA - b.inA;
    var curveA = CURVE_ORDER[a.device.curve] != null ? CURVE_ORDER[a.device.curve] : 1;
    var curveB = CURVE_ORDER[b.device.curve] != null ? CURVE_ORDER[b.device.curve] : 1;
    if (curveA !== curveB) return curveA - curveB;
    if (a.device.icu !== b.device.icu) return b.device.icu - a.device.icu;
    var rcdA = a.rcd ? 0 : 1;
    var rcdB = b.rcd ? 0 : 1;
    return rcdA - rcdB;
  });
}

function computeZsForCandidate(cable, cableLength) {
  if (!cable || typeof cable.r !== 'number' || typeof cable.x !== 'number') return NaN;
  if (typeof cableLength !== 'number' || cableLength <= 0) return NaN;
  if (typeof scState.zNet !== 'number' || typeof scState.zTrafo !== 'number') return NaN;
  var L_km = cableLength / 1000;
  var rCable = cable.r * L_km;
  var xCable = cable.x * L_km;
  var zCable_mOhm = Math.sqrt(rCable * rCable + xCable * xCable) * 1000;
  var zTotal_mOhm = scState.zNet + scState.zTrafo + zCable_mOhm;
  return Math.ceil(zTotal_mOhm / 1000 * 100) / 100;
}

function computeVdropForCandidate(cable, ib, env) {
  if (!cable || typeof cable.r !== 'number' || typeof cable.x !== 'number') return Infinity;
  var L_km = env.cableLength / 1000;
  var cosP = loadState.cosPhi || 0.9;
  var sinP = Math.sqrt(1 - cosP * cosP);
  var rX = cable.r * cosP + cable.x * sinP;
  var is3phase = (loadState.voltage === '3x400');
  var Unom = is3phase ? 400 : 230;
  var factor = is3phase ? Math.sqrt(3) : 2;
  var deltaU_V = factor * ib * L_km * rX;
  return (deltaU_V / Unom) * 100;
}

function findBestRCD(deviceInA, zsActual, env) {
  var compatible = PRODUCTS.rcds.filter(function(rcd) {
    if (rcd.rating < deviceInA) return false;
    var iDn_A = rcd.sensitivity / 1000;
    return (zsActual * iDn_A) <= 50;
  });
  if (compatible.length === 0) return null;
  compatible.sort(function(a, b) {
    if (a.sensitivity !== b.sensitivity) return a.sensitivity - b.sensitivity;
    return a.rating - b.rating;
  });
  return compatible[0];
}

function computeIscForSolver(env) {
  var Un = (loadState.voltage === '3x400') ? 400 : 230;
  var zSource_mOhm = scState.zNet + scState.zTrafo;
  if (!isFinite(zSource_mOhm) || zSource_mOhm <= 0) return NaN;
  return (1.05 * Un) / (Math.sqrt(3) * zSource_mOhm / 1000);
}

function deriveTClearForSolver(device, env) {
  var reqTime = requiredDisconnectionTime(env.systemType, env.circuitCategory, device.inA);
  if (reqTime != null) return reqTime;
  return 5;
}

function buildZsVerdictTT(zsActual, iDn_A) {
  var product = zsActual * iDn_A;
  var zsMax = 50 / iDn_A;
  var pass = product <= 50;
  return {
    id: 'zs', state: pass ? 'PASS' : 'FAIL',
    clause: 'DS/HD 60364-4-41 §411.5',
    values: { zsActual: round2(zsActual), zsMax: round2(zsMax), rcdIDn: iDn_A, touchVoltage: round2(product) },
    message: pass
      ? { da: 'Zs×IΔn = ' + round2(product) + 'V ≤ 50V — RCD-fejlbeskyttelse OK (TT).', en: 'Zs×IΔn = ' + round2(product) + 'V ≤ 50V — RCD fault protection OK (TT).' }
      : { da: 'Zs×IΔn = ' + round2(product) + 'V > 50V — fejlbeskyttelse ikke opfyldt.', en: 'Zs×IΔn = ' + round2(product) + 'V > 50V — fault protection not met.' },
    recommendation: null
  };
}

function buildZsVerdictTN(zsActual, device, env) {
  var reqTime = requiredDisconnectionTime(env.systemType, env.circuitCategory, device.inA);
  var iaRes = deriveIa(device, reqTime);
  if (!iaRes.known || !isFinite(iaRes.ia) || iaRes.ia <= 0 || !isFinite(zsActual)) {
    return {
      id: 'zs', state: 'INSUFFICIENT_DATA',
      clause: 'DS/HD 60364-4-41 §411.4',
      values: { zsActual: round2(zsActual), ia: iaRes.known ? round2(iaRes.ia) : null },
      message: { da: 'Ia eller Zs mangler — kan ikke vurdere udkobling.', en: 'Ia or Zs missing — cannot evaluate disconnection.' },
      recommendation: null
    };
  }
  var u0 = 230;
  var zsMax = u0 / iaRes.ia;
  var pass = zsActual <= zsMax;
  return {
    id: 'zs', state: pass ? 'PASS' : 'FAIL',
    clause: 'DS/HD 60364-4-41 §411.4',
    values: { zsActual: round2(zsActual), zsMax: round2(zsMax), ia: round2(iaRes.ia), reqTime: reqTime, u0: u0 },
    message: pass
      ? { da: 'Zs = ' + round2(zsActual) + 'Ω ≤ Zs_max = ' + round2(zsMax) + 'Ω — udkobling OK (TN).', en: 'Zs = ' + round2(zsActual) + 'Ω ≤ Zs_max = ' + round2(zsMax) + 'Ω — disconnection OK (TN).' }
      : { da: 'Zs = ' + round2(zsActual) + 'Ω > Zs_max = ' + round2(zsMax) + 'Ω — udkobling ikke sikret.', en: 'Zs = ' + round2(zsActual) + 'Ω > Zs_max = ' + round2(zsMax) + 'Ω — disconnection not assured.' },
    recommendation: null
  };
}

function evaluateCandidateSet(cable, device, deratedIz, ib, env) {
  var verdicts = {};
  var rcd = null;
  // CHECK 1: Ampacity IB ≤ In ≤ Derated_Iz (§523)
  var ampState, ampClause = 'DS/HD 60364-5-52 §523';
  if (ib <= device.inA && device.inA <= deratedIz) { ampState = 'PASS'; } else { ampState = 'FAIL'; }
  verdicts.ampacity = {
    id: 'ampacity', state: ampState, clause: ampClause,
    values: { ib: round2(ib), inA: round2(device.inA), deratedIz: round2(deratedIz) },
    message: ampState === 'PASS'
      ? { da: 'IB ≤ In ≤ Iz: ' + round2(ib) + ' ≤ ' + device.inA + ' ≤ ' + round2(deratedIz) + ' A — OK.', en: 'IB ≤ In ≤ Iz: ' + round2(ib) + ' ≤ ' + device.inA + ' ≤ ' + round2(deratedIz) + ' A — OK.' }
      : { da: 'Ampacity fejler: IB=' + round2(ib) + ', In=' + device.inA + ', Iz=' + round2(deratedIz), en: 'Ampacity fails: IB=' + round2(ib) + ', In=' + device.inA + ', Iz=' + round2(deratedIz) },
    recommendation: null
  };
  if (ampState !== 'PASS') {
    return { cable: cable, device: device, rcd: null, deratedIz: deratedIz, inA: device.inA, verdicts: verdicts, compliant: false, failedCheck: 'ampacity', reason: ampState, deviceKind: device.kind };
  }
  // CHECK 2: Overload I2 ≤ 1.45 × Derated_Iz (§433.1)
  verdicts.overload = checkOverloadI2({ device: device, deratedIz: deratedIz });
  if (verdicts.overload.state !== 'PASS') {
    return { cable: cable, device: device, rcd: null, deratedIz: deratedIz, inA: device.inA, verdicts: verdicts, compliant: false, failedCheck: 'overload', reason: verdicts.overload.state, deviceKind: device.kind };
  }
  // CHECK 3: Adiabatic k²S² ≥ I²t (§434.5.2)
  var insulation = insulationForType(cable.model);
  var material = cable.material;
  var isc = computeIscForSolver(env);
  var tClear = deriveTClearForSolver(device, env);
  verdicts.adiabatic = checkAdiabatic({ material: material, insulation: insulation, sArea: cable.mm2, isc: isc, tClear: tClear });
  if (verdicts.adiabatic.state !== 'PASS') {
    return { cable: cable, device: device, rcd: null, deratedIz: deratedIz, inA: device.inA, verdicts: verdicts, compliant: false, failedCheck: 'adiabatic', reason: verdicts.adiabatic.state, deviceKind: device.kind };
  }
  // CHECK 4: Zs / disconnection (§411)
  var zsActual = computeZsForCandidate(cable, env.cableLength);
  var zsCeil = Math.ceil(zsActual * 100) / 100;
  if (env.systemType === 'TT') {
    rcd = findBestRCD(device.inA, zsCeil, env);
    if (rcd) {
      verdicts.zs = buildZsVerdictTT(zsCeil, rcd.sensitivity / 1000);
    } else {
      verdicts.zs = { id: 'zs', state: 'FAIL', clause: 'DS/HD 60364-4-41 §411.5', values: { zsActual: zsCeil }, message: { da: 'Ingen kompatibel RCD giver Zs×IΔn ≤ 50V.', en: 'No compatible RCD achieves Zs×IΔn ≤ 50V.' }, recommendation: null };
    }
  } else {
    verdicts.zs = buildZsVerdictTN(zsCeil, device, env);
    if (verdicts.zs.state !== 'PASS') {
      rcd = findBestRCD(device.inA, zsCeil, env);
      if (rcd) {
        verdicts.zs = buildZsVerdictTT(zsCeil, rcd.sensitivity / 1000);
        verdicts.zs.clause = 'DS/HD 60364-4-41 §411.4 (+ RCD §411.3.3)';
      }
    }
  }
  if (verdicts.zs.state !== 'PASS') {
    return { cable: cable, device: device, rcd: rcd, deratedIz: deratedIz, inA: device.inA, verdicts: verdicts, compliant: false, failedCheck: 'zs', reason: verdicts.zs.state, deviceKind: device.kind };
  }
  // CHECK 5: Voltage drop ΔU ≤ 4% (§525)
  var vdrop = computeVdropForCandidate(cable, ib, env);
  var vdropClause = 'DS/HD 60364-5-52 §525';
  verdicts.vdrop = {
    id: 'vdrop', state: (vdrop <= 4.0) ? 'PASS' : 'FAIL', clause: vdropClause,
    values: { deltaU_pct: round2(vdrop), limit: 4.0, length: env.cableLength },
    message: (vdrop <= 4.0)
      ? { da: 'ΔU = ' + round2(vdrop) + '% ≤ 4% — OK.', en: 'ΔU = ' + round2(vdrop) + '% ≤ 4% — OK.' }
      : { da: 'ΔU = ' + round2(vdrop) + '% > 4% — for stor.', en: 'ΔU = ' + round2(vdrop) + '% > 4% — excessive.' },
    recommendation: (vdrop <= 4.0) ? null : { da: 'Vælg større tværsnit eller kortere kabel.', en: 'Choose larger cross-section or shorter cable.' }
  };
  if (verdicts.vdrop.state !== 'PASS') {
    return { cable: cable, device: device, rcd: rcd, deratedIz: deratedIz, inA: device.inA, verdicts: verdicts, compliant: false, failedCheck: 'vdrop', reason: 'FAIL', deviceKind: device.kind };
  }
  // ALL 5 PASS
  return { cable: cable, device: device, rcd: rcd, deratedIz: deratedIz, inA: device.inA, verdicts: verdicts, compliant: true, failedCheck: null, reason: null, deviceKind: device.kind };
}

function solveOptimalSet(opts) {
  opts = opts || {};
  var t0 = performance.now();
  var ib = (typeof opts.ib === 'number' && opts.ib > 0) ? opts.ib : calcIB();
  if (!isFinite(ib) || ib <= 0) {
    return { ranked: [], totalEvaluated: 0, totalCompliant: 0, exclusionLog: [], elapsedMs: 0, noSolutionClause: null };
  }
  var env = {
    systemType: opts.systemType || solverState.systemType,
    circuitCategory: opts.circuitCategory || solverState.circuitCategory,
    cableLength: opts.cableLength || solverState.cableLength,
    installMethod: opts.installMethod || solverState.installMethod,
    temp: opts.temp != null ? opts.temp : solverState.temp,
    grouping: opts.grouping != null ? opts.grouping : solverState.grouping,
    soil: opts.soil !== undefined ? opts.soil : solverState.soil
  };
  var buried = (env.installMethod === 'D');
  var filtered = preFilterCandidates(ib);
  var compliantSets = [];
  var exclusionLog = [];
  var totalEvaluated = 0;
  for (var ci = 0; ci < filtered.cables.length; ci++) {
    var cable = filtered.cables[ci];
    var baseIz = officialIz(cable);
    var dRes = computeDeratedIz({ baseIz: baseIz, caKey: env.temp, cgKey: env.grouping, csKey: env.soil, kInstallKey: env.installMethod, buried: buried });
    if (!dRes.ok) {
      exclusionLog.push({ cableId: cable.id, deviceId: '*', failedCheck: 'derating', reason: dRes.error });
      continue;
    }
    var deratedIz = dRes.deratedIz;
    if (deratedIz < ib) {
      exclusionLog.push({ cableId: cable.id, deviceId: '*', failedCheck: 'ampacity_post_derating', reason: 'Derated_Iz < IB' });
      continue;
    }
    for (var di = 0; di < filtered.devices.length; di++) {
      var device = filtered.devices[di];
      totalEvaluated++;
      var result = evaluateCandidateSet(cable, device, deratedIz, ib, env);
      if (result.compliant) {
        compliantSets.push(result);
      } else {
        exclusionLog.push({ cableId: cable.id, deviceId: device.id, failedCheck: result.failedCheck, reason: result.reason });
      }
    }
  }
  var finalSets = compliantSets;
  if (env.systemType === 'TT') {
    finalSets = compliantSets.filter(function(s) { return s.rcd !== null; });
  }
  var ranked = rankCompliantSets(finalSets).slice(0, 4);
  var noSolutionClause = null;
  if (ranked.length === 0 && exclusionLog.length > 0) {
    var freq = {};
    exclusionLog.forEach(function(e) { var key = e.failedCheck || 'unknown'; freq[key] = (freq[key] || 0) + 1; });
    noSolutionClause = Object.keys(freq).reduce(function(a, b) { return freq[a] >= freq[b] ? a : b; });
  }
  var elapsedMs = performance.now() - t0;
  return { ranked: ranked, totalEvaluated: totalEvaluated, totalCompliant: finalSets.length, exclusionLog: exclusionLog, elapsedMs: elapsedMs, noSolutionClause: noSolutionClause };
}

    if (solverResult.ranked.length > 0) {

        });
        html += '</div>';

        html += '<div class="result-row"><span class="label">' + t('solverGoverning') + '</span><span class="value">' + solverResult.noSolutionClause + '</span></div>';
      }
      html += '</div>';
    }
  }
  return html;
}

function applySolverResult(idx) {
  if (!solverResult || !solverResult.ranked[idx]) return;
  var s = solverResult.ranked[idx];
  // Update cableState
  cableState.material = s.cable.material === 'Cu' ? 'copper' : 'aluminium';
  cableState.crossSection = String(s.cable.mm2);
  // Try to match type/cores from PRODUCTS
  if (/NOIKLX/.test(s.cable.model)) cableState.type = 'NOIKLX';
  else if (/NOIKX-Flex/.test(s.cable.model)) cableState.type = 'NOIKX-Flex';
  else if (/NOIK-AL/.test(s.cable.model)) cableState.type = 'NOIK-AL-M';
  if (s.cable.cores) cableState.cores = s.cable.cores;
  // Update protection state
  if (s.deviceKind === 'mcb') {
    mcbState.type = s.device._src.model || mcbState.type;
    mcbState.curve = s.device.curve || mcbState.curve;
    mcbState.rating = s.device.inA;
  } else if (s.deviceKind === 'fuse') {
    fuseState.size = s.device.inA;
  }
  // Collapse solver
  solverState.expanded = false;
  solverResult = null;
  renderModule('cable');
}

// ===== CABLE MODULE =====
function renderCable() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const types = Object.keys(cables);
  const currentType = cables[cableState.type];
  const cores = currentType ? Object.keys(currentType) : [];
  const currentCores = currentType && currentType[cableState.cores] ? currentType[cableState.cores] : {};
  const crossSections = Object.keys(currentCores);

  const izTable = izTableFor();
  const selectedCable = currentCores[cableState.crossSection];

  // Derating via the single source of truth (computeDeratedIz). The duplicated
  // inline kInstall*kTemp*kGroup math has been removed — DS/HD 60364-5-52 §523.
  const baseIz = izTable[parseFloat(cableState.crossSection)] || 0;

    baseIz: baseIz,

    kInstallKey: cableState.installMethod,

  });

// ===== VOLTAGE DROP MODULE =====
function renderVdrop() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const currentType = cables[cableState.type];
  const currentCores = currentType && currentType[cableState.cores] ? currentType[cableState.cores] : {};
  const selectedCable = currentCores[cableState.crossSection];

  const lengthSteps = [5, 10, 15, 20, 25, 30, 40, 50, 60, 70, 80, 90, 100, 125, 150, 175, 200, 250, 300, 400, 500];

  let vdrop = 0, vdropPercent = 0, Un = 400;
  if (selectedCable) {
    const ib = calcIB();
    const L = vdropState.length / 1000; // km
    const cosP = loadState.cosPhi;
    const sinP = Math.sin(Math.acos(cosP));
    Un = loadState.voltage === '3x400' ? 400 : 230;

    if (loadState.voltage === '3x400') {
      vdrop = Math.sqrt(3) * ib * L * (selectedCable.r * cosP + selectedCable.x * sinP);
    } else {
      vdrop = 2 * ib * L * (selectedCable.r * cosP + selectedCable.x * sinP);
    }
    vdropPercent = (vdrop / Un) * 100;
  }

  const isOk = vdropPercent <= 4;
  const isLighting = vdropPercent <= 3;
  const boxClass = !selectedCable ? '' : (isOk ? '' : 'error');

  return `
    <div class="card fade-in">
      <div class="card-title">${t('vdropTitle')}</div>
      <div class="info-row">${lang === 'da' ? 'V\u00E6lg kabel under "Kabler" f\u00F8rst, derefter l\u00E6ngde her' : 'Select cable under "Cables" first, then length here'}</div>

      ${!selectedCable ? `
        <div class="result-box warning">
          <div class="result-title">${lang === 'da' ? 'Advarsel' : 'Warning'}</div>
          <div class="result-row"><span class="label">${lang === 'da' ? 'V\u00E6lg kabel i "Kabler"-modulet f\u00F8rst' : 'Select a cable in the "Cables" module first'}</span></div>
        </div>
      ` : `
        <div class="result-box" style="margin-bottom:16px;background:var(--primary-glow);border-color:var(--primary-light)">
          <div class="result-row"><span class="label">${t('cableType')}</span><span class="value">${cableState.type} ${cableState.cores} ${cableState.crossSection} mm\u00B2</span></div>
          <div class="result-row"><span class="label">IB</span><span class="value">${calcIB().toFixed(1)} A</span></div>
        </div>
      `}

      <div class="select-group">
        <div class="select-label">${t('cableLength')}</div>
        <div class="select-grid">
          ${lengthSteps.map(l =>
            `<button class="sel-btn ${vdropState.length === l ? 'selected' : ''}" onclick="vdropState.length=${l};renderModule('vdrop')">${l}</button>`
          ).join('')}
        </div>
      </div>
    </div>

    ${selectedCable ? `
    <div class="card fade-in">
      <div class="card-title">${t('vdropResult')}</div>
      <div class="result-box ${boxClass}">
        <div class="result-title">${t('result')} ${isOk ? '<span class="verify-badge ok">\u2713 OK</span>' : '<span class="verify-badge fail">\u2717 > 4%</span>'}</div>
        <div class="result-row"><span class="label">${t('vdropVolts')}</span><span class="value">${vdrop.toFixed(2)} V</span></div>
        <div class="result-row"><span class="label">${t('vdropPercent')}</span><span class="value">${vdropPercent.toFixed(2)} %</span></div>
        <div class="result-row"><span class="label">${t('vdropRemaining')}</span><span class="value">${(Un - vdrop).toFixed(1)} V</span></div>
        <div class="result-row"><span class="label">${t('vdropLimit')}</span><span class="value">${isOk ? '\u2713' : '\u2717'}</span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Belysning ≤3%' : 'Lighting ≤3%'}</span><span class="value"><span class="verify-badge ${isLighting ? 'ok' : 'fail'}">${isLighting ? (lang==='da'?'OK':'OK') : (lang==='da'?'Over 3%':'Over 3%')}</span></span></div>
        <div class="result-row"><span class="label">${lang === 'da' ? 'Andre ≤5%' : 'Other ≤5%'}</span><span class="value"><span class="verify-badge ${vdropPercent <= 5 ? 'ok' : 'fail'}">${vdropPercent <= 5 ? 'OK' : (lang==='da'?'Over 5%':'Over 5%')}</span></span></div>
      </div>
    </div>
    ` : ''}
  `;
}

// ===== SHORT CIRCUIT MODULE =====
function renderShortCircuit() {
  const zNetSteps = [0.5, 1, 1.5, 2, 3, 4, 5, 7, 10, 15, 20];
  const zTrafoSteps = [2, 3, 4, 5, 6, 7, 8, 10, 12, 15, 20, 25, 30, 40, 50];

  // Cable impedance
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const currentType = cables[cableState.type];
  const currentCores = currentType && currentType[cableState.cores] ? currentType[cableState.cores] : {};
  const selectedCable = currentCores[cableState.crossSection];

  let zCable = 0;
  if (selectedCable) {
    const L = vdropState.length / 1000; // km
    const rCable = selectedCable.r * L;
    const xCable = selectedCable.x * L;
    zCable = Math.sqrt(rCable * rCable + xCable * xCable) * 1000; // mOhm
  }

  const zTotal = scState.zNet + scState.zTrafo + zCable;
  const Un = loadState.voltage === '3x400' ? 400 : 230;
  const cFactor = 1.05; // voltage factor per IEC 60909

  // Ik max (3-phase, at busbar)
  const ikMax3ph = (cFactor * Un) / (Math.sqrt(3) * (scState.zNet + scState.zTrafo) / 1000);
  // Ik min (2-phase at end of cable, factor 0.95)
  const ikMin2ph = (0.95 * Un) / (2 * zTotal / 1000);

  // Get protection device Icu and Isd for check
  let deviceIcu = 0, deviceIsd = 0;
  if (activeModule === 'scircuit') {
    // Try MCCB first
    deviceIcu = MCCB_TRIPS[mccbState.trip] * 1000; // A
    const io = mccbState.inVal * mccbState.ioMult;
    deviceIsd = io * mccbState.isdMult * 1.1;

    // Or MCB
    if (mcbState.rating) {
      const mcb = MCB_TYPES[mcbState.type];
      const mcbIcu = (mcbState.poles === '1p' ? mcb.icu1p : mcb.icuMp) * 1000;
      if (mcbIcu > 0) {
        deviceIcu = mcbIcu;
        deviceIsd = MCB_CURVES[mcbState.curve].isdMax * mcbState.rating;
      }
    }
  }

  const check1 = deviceIcu >= ikMax3ph;
  const check2 = deviceIsd <= ikMin2ph;
  // Disconnection time per DS/HD 60364-4-41: final circuits <=32A must clear
  // within 0.4s (TN), distribution within 5s. Met if Ik min trips the magnetic element.
  const ibForTime = calcIB();
  const reqTime = (ibForTime <= 32 && loadState.voltage !== '3x400') ? 0.4 : (ibForTime <= 32 ? 0.4 : 5);
  const discOk = ikMin2ph >= deviceIsd; // Ik min reaches the instantaneous/magnetic trip

  return `
    <div class="card fade-in">
      <div class="card-title">${t('scTitle')}</div>
      <div class="info-row">${lang === 'da' ? 'V\u00E6lg netimpedans og trafoimpedans. Kabelimpedans beregnes fra kabelmodulet.' : 'Select network impedance and transformer impedance. Cable impedance is calculated from the cable module.'}</div>

      <div class="select-group">
        <div class="select-label">${t('scZnet')}</div>
        <div class="select-grid">
          ${zNetSteps.map(z =>
            `<button class="sel-btn ${scState.zNet === z ? 'selected' : ''}" onclick="scState.zNet=${z};renderModule('scircuit')">${z}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${t('scZtrafo')}</div>
        <div class="select-grid">
          ${zTrafoSteps.map(z =>
            `<button class="sel-btn ${scState.zTrafo === z ? 'selected' : ''}" onclick="scState.zTrafo=${z};renderModule('scircuit')">${z}</button>`
          ).join('')}
        </div>
      </div>

      ${selectedCable ? `
        <div class="result-box" style="margin-top:12px;background:var(--primary-glow);border-color:var(--primary-light)">
          <div class="result-row"><span class="label">${lang === 'da' ? 'Kabelimpedans' : 'Cable impedance'}</span><span class="value">${zCable.toFixed(2)} m\u03A9</span></div>
          <div class="result-row"><span class="label">${lang === 'da' ? 'Kabel' : 'Cable'}</span><span class="value">${cableState.type} ${cableState.crossSection} mm\u00B2 \u00D7 ${vdropState.length} m</span></div>
        </div>
      ` : `
        <div class="result-box warning" style="margin-top:12px">
          <div class="result-row"><span class="label">${lang === 'da' ? 'V\u00E6lg kabel i "Kabler"-modulet for fuld beregning' : 'Select cable in "Cables" module for full calculation'}</span></div>
        </div>
      `}
    </div>

    <div class="card fade-in">
      <div class="card-title">${t('scResult')}</div>
      <div class="result-box">
        <div class="result-title">${t('result')}</div>
        <div class="result-row"><span class="label">${t('scIkmax')} (3-${lang === 'da' ? 'faset' : 'phase'})</span><span class="value">${(ikMax3ph/1000).toFixed(2)} kA</span></div>
        <div class="result-row"><span class="label">${t('scIkmin')} (2-${lang === 'da' ? 'faset' : 'phase'})</span><span class="value">${ikMin2ph.toFixed(0)} A</span></div>
        <div class="result-row"><span class="label">Z total</span><span class="value">${zTotal.toFixed(2)} m\u03A9</span></div>
      </div>

      ${deviceIcu > 0 ? `
      <div class="result-box ${check1 && check2 ? '' : 'error'}" style="margin-top:12px">
        <div class="result-title">${lang === 'da' ? 'Kontrol' : 'Verification'}</div>
        <div class="result-row">
          <span class="label">${t('scCheck1')}</span>
          <span class="value">
            ${(deviceIcu/1000).toFixed(1)} kA \u2265 ${(ikMax3ph/1000).toFixed(2)} kA
            <span class="verify-badge ${check1 ? 'ok' : 'fail'}">${check1 ? t('ok') : t('fail')}</span>
          </span>
        </div>
        <div class="result-row">
          <span class="label">${t('scCheck2')}</span>
          <span class="value">
            ${deviceIsd.toFixed(0)} A \u2264 ${ikMin2ph.toFixed(0)} A
            <span class="verify-badge ${check2 ? 'ok' : 'fail'}">${check2 ? t('ok') : t('fail')}</span>
          </span>
        </div>
        <div class="result-row">
          <span class="label">${lang === 'da' ? 'Frakoblingstid' : 'Disconnection time'} (DS/HD 60364-4-41)</span>
          <span class="value">
            \u2264 ${reqTime.toFixed(1)} s
            <span class="verify-badge ${discOk ? 'ok' : 'fail'}">${discOk ? (lang==='da'?'OK <0,4s':'OK <0.4s') : (lang==='da'?'For langsom':'Too slow')}</span>
          </span>
        </div>
      </div>
      ` : `
      <div class="result-box warning" style="margin-top:12px">
        <div class="result-row"><span class="label">${lang === 'da' ? 'V\u00E6lg beskyttelsesenhed (MCB/MCCB) for kontrolberegning' : 'Select protection device (MCB/MCCB) for verification'}</span></div>
      </div>
      `}
    </div>
  `;
}

let trafoState = { size: 400, voltage: '10/0.4', loadPercent: 75 };

function renderTrafo() {
  const S = trafoState.size;
  const uk = TRAFO_UK[S] || 4;
  const losses = TRAFO_LOSSES[S] || { p0: 0, pk: 0 };
  const loadFactor = trafoState.loadPercent / 100;

  // Full load current (secondary)

  // Actual load current

  // Transformer impedance in mOhm (secondary side)
  const Ztrafo = (uk / 100) * (400 * 400) / (S * 1000) * 1000; // mOhm
  // Short-circuit current at secondary busbar
  const Ik = (S * 1000) / (Math.sqrt(3) * 400 * (uk / 100));
  // Total losses at given load
  const Ploss = losses.p0 + losses.pk * loadFactor * loadFactor;

  const voltageOptions = ['10/0.4', '20/0.4', '50/10', '30/10'];

// ===== COMPONENT BANK MODULE =====
// Browsable bank of ALL electrical components available in the Danish market
let bankCategory = 'cables';
let bankBrand = 'all';

// ===== REAL PHOTO SYSTEM =====
// Shows ACTUAL product photographs via <img>, with SVG illustration as automatic
// fallback when a photo URL is missing or fails to load (offline/broken link).
//
// Photos are loaded from a licensed image source you configure (e.g. your B2B
// wholesaler product feed - Lemvigh-Müller / Solar - or a folder of licensed photos).
// Per-product photos can be set via the product's `img` field; per-category
// defaults live in COMPONENT_PHOTOS. Nothing copyrighted is bundled in the file.

let PHOTO_BASE = localStorage.getItem('photoBase') || ''; // optional: your own per-model feed
let PHOTOS_ENABLED = localStorage.getItem('photosEnabled') !== '0'; // real photos ON by default

// Real, Creative-Commons-licensed product photographs (Wikimedia Commons).
// Special:FilePath redirects to the actual image file; ?width thumbnails for speed.
// Images CC BY-SA / CC0 via Wikimedia Commons. SVG illustration is the offline fallback.
const WM = 'https://commons.wikimedia.org/wiki/Special:FilePath/';
const COMPONENT_PHOTOS = {
  cables: WM + 'Copper%20cable%205G16.JPG?width=200',
  mcbs: WM + 'MCB%20Hager%20C10.jpg?width=200',
  mccbs: WM + 'MCCB%20Merlin%20Gerin%20compact%20NS100N%20(front%20side).jpg?width=200',
  fuses: WM + 'NH%20000%2000.jpg?width=200',
  rcds: WM + 'Differential%20residual%20current%20circuit%20interrupter.JPG?width=200',
  rcbos: WM + 'ABB%20RCBO.jpg?width=200',
  spds: WM + '1-phase%20surge%20arrester.JPG?width=200',
  contactors: WM + 'GE%20MC2A310AT1.JPG?width=200',
  mpcbs: WM + 'Motor%20protective%20circuit%20breaker%20with%20symbol.JPG?width=200',
  overloadRelays: WM + 'GE%20MTO3N.JPG?width=200',
  wiringDevices: WM + 'Danish%20type%20K%20Power%20Socket.jpg?width=200'
};

// Resolves a photo URL and whether it is the EXACT product photo or a
// REPRESENTATIVE category photo. Returns { url, exact } or null.
function photoUrlFor(category, p) {
  if (!PHOTOS_ENABLED) return null;
  // 1) explicit per-product photo (exact)
  if (p && p.img) return { url: /^https?:/.test(p.img) ? p.img : (PHOTO_BASE + p.img), exact: true };
  // 2) connected feed -> resolve the EXACT photo per model.
  //    PHOTO_BASE may be a pattern with placeholders {id} {ref} {brand} {model},
  //    or a plain base URL to which "<id>.jpg" is appended.
  if (PHOTO_BASE && p) {
    let url;
    if (PHOTO_BASE.indexOf('{') >= 0) {
      url = PHOTO_BASE
        .replace(/\{id\}/g, encodeURIComponent(p.id || ''))
        .replace(/\{ref\}/g, encodeURIComponent(p.ref || p.id || ''))
        .replace(/\{brand\}/g, encodeURIComponent(p.brand || ''))
        .replace(/\{model\}/g, encodeURIComponent(p.model || ''));
    } else {
      url = PHOTO_BASE + encodeURIComponent(p.ref || p.id || '') + '.jpg';
    }
    return { url, exact: true };
  }
  // 3) per-category default (representative, not the exact model)
  const c = COMPONENT_PHOTOS[category];
  if (c) return { url: /^https?:/.test(c) ? c : (PHOTO_BASE + c), exact: false };
  return null;
}

// Returns a real <img> photo (with SVG fallback) or the SVG illustration.
// Representative (non-exact) photos get an honest "~" badge.
function getComponentVisual(category, p) {
  const res = photoUrlFor(category, p);
  const svg = getComponentSvg(category, p);
  if (!res) return svg;
  const fid = 'ph' + Math.random().toString(36).slice(2, 9);
  const badge = res.exact ? '' :
    `<span title="${lang === 'da' ? 'Repr\u00E6sentativt billede (ikke n\u00F8jagtig model)' : 'Representative image (not the exact model)'}"
       style="position:absolute;bottom:-3px;right:-3px;background:var(--warning);color:#5a4500;font-size:8px;font-weight:700;padding:1px 3px;border-radius:4px;line-height:1.2">~</span>`;
  return `<span style="position:relative;display:inline-flex;flex-shrink:0">
    <img src="${res.url}" alt="${(p && p.model) || ''}" width="56" height="56" loading="lazy"
      style="object-fit:cover;border-radius:8px;border:1px solid var(--border)"
      onerror="this.style.display='none';var f=document.getElementById('${fid}');if(f)f.style.display='inline-flex'">
    <span id="${fid}" style="display:none">${svg}</span>
    ${badge}
  </span>`;
}

function configurePhotos() {
  const msg = lang === 'da'
    ? 'Indtast URL-m\u00F8nster til dit licenserede billedfeed, s\u00E5 hvert produkt viser SIT eget foto.\n\nBrug pladsholdere: {ref} {id} {brand} {model}\nEksempel: https://feed.lemu.dk/img/{ref}.jpg\n\n(Tomt = brug repr\u00E6sentative fotos)'
    : 'Enter a URL pattern for your licensed image feed so each product shows ITS OWN photo.\n\nUse placeholders: {ref} {id} {brand} {model}\nExample: https://feed.lemu.dk/img/{ref}.jpg\n\n(Empty = use representative photos)';
  const base = prompt(msg, PHOTO_BASE);
  if (base === null) return;
  PHOTO_BASE = base.trim();
  PHOTOS_ENABLED = true; // representative photos still show when base is empty
  localStorage.setItem('photoBase', PHOTO_BASE);
  localStorage.setItem('photosEnabled', '1');
  renderModule(activeModule);
}

// ===== COMPONENT VISUALS (code-generated SVG illustrations - fallback) =====
// License-safe, offline, scalable illustrations of each real component type.
function getComponentSvg(category, p) {
  const w = 64, h = 64;
  const wrap = (inner) => `<svg viewBox="0 0 ${w} ${h}" width="56" height="56" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;border-radius:8px;background:linear-gradient(135deg,#f8fafc,#eef3f8);border:1px solid var(--border)">${inner}</svg>`;

  switch (category) {
    case 'cables': {
      // Cable cross-section: sheath + colored cores
      const coreColors = ['#8b5a2b', '#1b2838', '#9aa5b1', '#2980b9', '#27ae60']; // L1,L2,L3,N,PE(green)
      const isAl = p.material === 'Al';
      const sheath = isAl ? '#000' : '#1b1b1b';
      let cores = '';
      const positions = [[26,26],[38,26],[26,38],[38,38],[32,32]];
      for (let i = 0; i < 5; i++) {
        const c = i === 4 ? '#27ae60' : coreColors[i];
        cores += `<circle cx="${positions[i][0]}" cy="${positions[i][1]}" r="5" fill="${c}" stroke="#fff" stroke-width="0.8"/>`;
      }
      return wrap(`<circle cx="32" cy="32" r="22" fill="${sheath}"/><circle cx="32" cy="32" r="22" fill="none" stroke="#444" stroke-width="1"/>${cores}<text x="32" y="58" font-size="7" fill="${isAl?'#888':'#b87333'}" text-anchor="middle" font-family="monospace">${isAl?'Al':'Cu'}</text>`);
    }
    case 'mcbs':
    case 'rcbos': {
      // DIN-rail module with toggle
      const body = category === 'rcbos' ? '#e8eef5' : '#f5f5f0';
      return wrap(`<rect x="22" y="8" width="20" height="48" rx="2" fill="${body}" stroke="#9aa5b1"/><rect x="26" y="12" width="12" height="14" rx="1" fill="#1a5276"/><rect x="29" y="16" width="6" height="14" rx="1" fill="#fff" stroke="#1a5276"/><rect x="24" y="44" width="16" height="3" fill="#c0c0c0"/><rect x="24" y="49" width="16" height="3" fill="#c0c0c0"/><text x="32" y="40" font-size="6" fill="#333" text-anchor="middle" font-family="monospace">${(p.curve||'')+(p.rating||'')}</text>`);
    }
    case 'mccbs': {
      // Moulded case breaker (larger black block)
      return wrap(`<rect x="14" y="10" width="36" height="44" rx="3" fill="#222" stroke="#000"/><rect x="20" y="16" width="24" height="18" rx="2" fill="#333"/><circle cx="32" cy="25" r="6" fill="#1a5276"/><rect x="29" y="20" width="6" height="10" rx="1" fill="#ffd166"/><rect x="20" y="40" width="24" height="6" rx="1" fill="#444"/><text x="32" y="51" font-size="6" fill="#fff" text-anchor="middle" font-family="monospace">NSX</text>`);
    }
    case 'fuses': {
      const isNH = (p.size||'').indexOf('NH') === 0;
      if (isNH) {
        // NH knife-blade fuse

function renderBank() {
  const categories = {
    cables: { da: 'Kabler', en: 'Cables', data: PRODUCTS.cables },
    mcbs: { da: 'Automatsikringer', en: 'MCBs', data: PRODUCTS.mcbs },
    mccbs: { da: 'Maksimalafbrydere', en: 'MCCBs', data: PRODUCTS.mccbs },
    fuses: { da: 'Smeltesikringer', en: 'Fuses', data: PRODUCTS.fuses },
    rcds: { da: 'HPFI / RCD', en: 'RCDs', data: PRODUCTS.rcds },
    rcbos: { da: 'HPFI-automater', en: 'RCBOs', data: PRODUCTS.rcbos },
    spds: { da: 'Overspændingsbeskyttelse', en: 'Surge Protection', data: PRODUCTS.spds },
    contactors: { da: 'Kontaktorer', en: 'Contactors', data: PRODUCTS.contactors },
    mpcbs: { da: 'Motorværn', en: 'Motor Protection', data: PRODUCTS.mpcbs },
    overloadRelays: { da: 'Termorelæer', en: 'Overload Relays', data: PRODUCTS.overloadRelays },
    wiringDevices: { da: 'Stik & Afbrydere', en: 'Sockets & Switches', data: PRODUCTS.wiringDevices }
  };

  const cat = categories[bankCategory];
  let items = cat.data;

  // Get unique brands for filter
  const brands = ['all', ...new Set(cat.data.map(p => p.brand))];

  // Filter by brand
  if (bankBrand !== 'all') {
    items = items.filter(p => p.brand === bankBrand);
  }

  // Build rows based on category
  const rows = items.map(p => {
    let spec = '';
    if (bankCategory === 'cables') spec = `${p.cores} ${p.mm2} mm\u00B2 ${p.material} | Iz=${officialIz(p)}A`;
    else if (bankCategory === 'mcbs') spec = `${p.curve}${p.rating} ${p.poles} | Icu=${p.icu}kA | ${p.standard}`;
    else if (bankCategory === 'mccbs') spec = `${p.trip} | Icu=${p.icu}kA | In: ${p.inOptions.join('/')}A`;
    else if (bankCategory === 'fuses') spec = `${p.rating}A | ${p.size} | Icu=${p.icu}kA`;
    else if (bankCategory === 'rcds') spec = `${p.poles} ${p.rating}A | ${p.sensitivity}mA Type ${p.rcdType}`;
    else if (bankCategory === 'rcbos') spec = `${p.poles} ${p.curve}${p.rating} | ${p.sensitivity}mA | Icu=${p.icu}kA`;
    else if (bankCategory === 'spds') spec = `${p.spdType} ${p.poles} | Imax=${p.imax}kA | Up=${p.up}kV`;
    else if (bankCategory === 'contactors') spec = `AC-3: ${p.ac3_A}A / ${p.ac3_kW}kW`;
    else if (bankCategory === 'mpcbs') spec = `${p.rangeMin}-${p.rangeMax}A / ${p.kW}kW`;
    else if (bankCategory === 'overloadRelays') spec = `${p.rangeMin}-${p.rangeMax}A`;
    else if (bankCategory === 'wiringDevices') spec = `${p.rating}A | ${lang === 'da' ? p.desc_da : p.desc_en}`;

    const useText = p.use_da ? (lang === 'da' ? p.use_da : p.use_en) : '';

    return `
      <div class="result-row" style="align-items:center;gap:12px">
        ${getComponentVisual(bankCategory, p)}
        <div style="flex:1;display:flex;flex-direction:column;gap:2px">
          <div style="display:flex;justify-content:space-between;width:100%;gap:8px">
            <span class="label"><strong>${p.brand}</strong> ${p.model}</span>
            <span class="value">${spec}</span>
          </div>
          ${useText ? `<span style="font-size:0.75rem;color:var(--text-muted)">${useText}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="card fade-in">
      <div class="card-title">\uD83D\uDCE6 ${lang === 'da' ? 'Komponentbank' : 'Component Bank'}</div>
      <div class="info-row">${lang === 'da' ? 'Komplet bank over elektriske komponenter tilg\u00E6ngelige i Danmark (NKT, Schneider, ABB, Eaton, Hager, LK). Klik for at filtrere.' : 'Complete bank of electrical components available in Denmark (NKT, Schneider, ABB, Eaton, Hager, LK). Click to filter.'}</div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Billeder' : 'Photos'}</div>
        <div class="select-grid">
          <button class="sel-btn ${PHOTOS_ENABLED ? 'selected' : ''}" onclick="${PHOTOS_ENABLED ? "PHOTOS_ENABLED=false;localStorage.setItem('photosEnabled','0');renderModule('bank')" : "PHOTOS_ENABLED=true;localStorage.setItem('photosEnabled','1');renderModule('bank')"}">\uD83D\uDCF7 ${PHOTOS_ENABLED ? (lang === 'da' ? 'Rigtige fotos: TIL' : 'Real photos: ON') : (lang === 'da' ? 'Rigtige fotos: FRA' : 'Real photos: OFF')}</button>
          <button class="sel-btn" onclick="configurePhotos()">\u2699\uFE0F ${lang === 'da' ? 'Eget billedfeed' : 'Own image feed'}</button>
        </div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:6px">${PHOTOS_ENABLED ? (lang === 'da' ? 'Viser rigtige fotos (Wikimedia Commons, CC-licens). Tilslut "Eget billedfeed" for eksakte modelfotos.' : 'Showing real photos (Wikimedia Commons, CC-licensed). Connect "Own image feed" for exact model photos.') : (lang === 'da' ? 'Viser SVG-illustrationer.' : 'Showing SVG illustrations.')}</div>
      </div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Kategori' : 'Category'}</div>
        <div class="select-grid">
          ${Object.keys(categories).map(k =>
            `<button class="sel-btn ${bankCategory === k ? 'selected' : ''}" onclick="bankCategory='${k}';bankBrand='all';renderModule('bank')">${lang === 'da' ? categories[k].da : categories[k].en}</button>`
          ).join('')}
        </div>
      </div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'M\u00E6rke' : 'Brand'}</div>
        <div class="select-grid">
          ${brands.map(b =>
            `<button class="sel-btn ${bankBrand === b ? 'selected' : ''}" onclick="bankBrand='${b}';renderModule('bank')">${b === 'all' ? (lang === 'da' ? 'Alle' : 'All') : b}</button>`
          ).join('')}
        </div>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-title">${lang === 'da' ? cat.da : cat.en} (${items.length})</div>
      <div class="result-box" style="background:var(--card);border-color:var(--border)">
        ${rows || '<div class="result-row"><span class="label">' + (lang === 'da' ? 'Ingen produkter' : 'No products') + '</span></div>'}
      </div>
    </div>
  `;
}

  { topic: 'law', tags: ['dokumentation','afprøvning','idriftsættelse','måling'],
    q_da: 'Hvilken dokumentation kræves før en installation tages i brug?',
    q_en: 'What documentation is required before an installation is put into use?',
    a_da: 'Før idriftsættelse skal installationen afprøves og dokumenteres: kontinuitet af beskyttelsesledere, isolationsmodstand, fejlstrømsafbryderes (HPFI) funktion og udløsetid, og kontrol af effektiv jordforbindelse/sløjfeimpedans. Resultaterne dokumenteres i en afleveringsrapport iht. DS/HD 60364-6.',
    a_en: 'Before commissioning, the installation must be tested and documented: continuity of protective conductors, insulation resistance, RCD function and trip time, and verification of effective earthing/loop impedance. Results are documented in a handover report per DS/HD 60364-6.' },

  // --- Zones (bathroom) ---
  { topic: 'zones', tags: ['badeværelse','zone','vådrum','ip'],

    q_en: 'What rules apply to electrics in bathrooms?',
    a_da: 'Badeværelser er opdelt i zoner (0, 1, 2) iht. DS/HD 60364-7-701. Zone 0 (i karret/bruseren): kun SELV 12V. Zone 1 (over): IPX4, kun fast materiel egnet til formålet. Zone 2 (0,6 m omkring): IPX4. HPFI 30 mA er obligatorisk på alle kredse. Stikkontakter er ikke tilladt i zone 0-1.',
    a_en: 'Bathrooms are divided into zones (0, 1, 2) per DS/HD 60364-7-701. Zone 0 (inside tub/shower): only SELV 12V. Zone 1 (above): IPX4, only fixed equipment suitable for the purpose. Zone 2 (0.6 m around): IPX4. RCD 30 mA is mandatory on all circuits. Sockets are not permitted in zones 0-1.' },
  { topic: 'zones', tags: ['udendørs','ip','kapsling','vejr'],

    a_en: 'Per DS/HD 60364-4-41: in TN systems a fault must be disconnected within 0.4 s for final circuits up to 32 A (230V), and within 5 s for distribution circuits. This requires Ik min to be large enough to trip the protection — hence the loop impedance is verified. Use the "Short Circuit" module.' },

  // --- Group/circuit sizing ---

  { topic: 'protection', tags: ['selektivitet','koordination','serieforbindelse'],

    a_en: 'Selectivity means that on a fault, only the nearest upstream protection trips — not the main fuse. It is achieved by choosing protective devices with sufficient difference in rating and trip characteristic (typically 1.6:1 ratio for fuses). This keeps the rest of the installation operating.' },

  // --- Cable color code ---
  { topic: 'cable', tags: ['farve','leder','l1','l2','l3','n','pe'],

    a_da: 'Iht. HD 60364-5-51: Beskyttelsesleder (PE) er grøn/gul. Neutralleder (N) er blå. Faseledere (L1, L2, L3) er typisk brun, sort og grå. Grøn/gul må ALDRIG bruges til andet end PE.',
    a_en: 'Per HD 60364-5-51: Protective conductor (PE) is green/yellow. Neutral (N) is blue. Phase conductors (L1, L2, L3) are typically brown, black and grey. Green/yellow must NEVER be used for anything other than PE.' },

  // --- Authorization (El-autorisation) ---

  { topic: 'auth', tags: ['kls','kvalitetsledelse','egenkontrol','dokumentation'],

    a_en: 'KLS is the mandatory quality management system an authorized company must maintain. It documents that work is done safely and correctly: procedures, self-inspection of each installation, measurement protocols, fault handling and regular audit. The Safety Authority audits KLS by sampling.' },
  { topic: 'auth', tags: ['autorisation','simple','arbejder','privat','undtagelse'],

    a_en: 'Certain simple tasks are exempt (per the order on simple works): e.g. fitting/replacing switches and sockets, mounting lamp outlets/luminaires, and replacing certain appliances in one\'s own home — provided it is done correctly. All other fixed installation work requires an authorized company.' },
  { topic: 'auth', tags: ['fagligt ansvarlig','kompetence','svendebrev'],

  { topic: 'protection', tags: ['parallel','flere kabler','samme gruppe'],

  { topic: 'earth', tags: ['udligning','pe','potentialudligning','vand','gas'],

    a_en: 'Direct-on-line (DOL) gives 6-8× rated current. To limit: star-delta (~1/3 starting current), soft starter (gradual ramp) or VFD (lowest starting current + control). Choose curve C/D protection so it does not trip on inrush.' },

let aiTopic = 'all';
let aiTag = null;
let aiOpenQuestion = null;
let aiSearch = ''; // free-text search (allowed only here)
let aiMode = 'offline'; // 'offline' = click-only KB, 'online' = live AI
let aiChat = []; // online chat history

// Build the offline Q&A results list HTML (used for live search updates)
function buildAiResultsHtml() {
  let questions = AI_KNOWLEDGE;
  if (aiTopic !== 'all') questions = questions.filter(k => k.topic === aiTopic);
  if (aiTag) questions = questions.filter(k => k.tags.includes(aiTag));
  if (aiSearch.trim()) {
    const terms = aiSearch.toLowerCase().split(/\s+/).filter(Boolean);
    questions = questions.filter(k => {
      const hay = ((lang === 'da' ? k.q_da + ' ' + k.a_da : k.q_en + ' ' + k.a_en) + ' ' + k.tags.join(' ')).toLowerCase();
      return terms.every(term => hay.includes(term));
    });
  }
  const list = questions.map(k => {
    const globalIdx = AI_KNOWLEDGE.indexOf(k);
    const isOpen = aiOpenQuestion === globalIdx;
    return `
      <div style="margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden">
        <button class="sel-btn" style="width:100%;text-align:left;border:none;border-radius:0;${isOpen ? 'background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white' : ''}" onclick="aiOpenQuestion=${isOpen ? 'null' : globalIdx};renderModule('ai')">
          ${AI_TOPICS[k.topic].icon} ${lang === 'da' ? k.q_da : k.q_en}
        </button>
        ${isOpen ? `
        <div style="padding:14px 16px;background:var(--success-bg);font-size:0.88rem;line-height:1.7;color:var(--text)">
          \uD83D\uDC68\u200D\uD83D\uDD27 ${lang === 'da' ? k.a_da : k.a_en}
        </div>` : ''}
      </div>`;
  }).join('');
  const header = `<div class="card-title">${lang === 'da' ? 'Sp\u00F8rgsm\u00E5l & Svar' : 'Questions & Answers'} (${questions.length})</div>`;
  return header + (list || '<div class="info-row">' + (lang === 'da' ? 'Ingen sp\u00F8rgsm\u00E5l matcher. Pr\u00F8v andre ord, eller skift til Online AI for ethvert sp\u00F8rgsm\u00E5l.' : 'No questions match. Try other words, or switch to Online AI for any question.') + '</div>');
}

// Live search handler — updates only the results container so the input keeps focus
function aiLiveSearch() {
  const inp = document.getElementById('aiSearchBox');
  if (!inp) return;
  aiSearch = inp.value;
  aiOpenQuestion = null;
  const res = document.getElementById('aiResults');
  if (res) res.innerHTML = buildAiResultsHtml();
}
let aiBusy = false;

// Call a live AI service for open-ended questions (online mode only)
async function askOnlineAI(question) {
  const cfg = JSON.parse(localStorage.getItem('aiElectricianCfg') || '{}');
  if (!cfg.endpoint || !cfg.key) {
    aiChat.push({ role: 'assistant', text: lang === 'da'
      ? 'Online AI er ikke konfigureret. Klik p\u00E5 "Indstil AI" for at tilslutte en AI-tjeneste (OpenAI-kompatibel).'
      : 'Online AI is not configured. Click "Configure AI" to connect an AI service (OpenAI-compatible).' });
    aiBusy = false; renderModule('ai'); return;
  }
  aiBusy = true; renderModule('ai');
  const sysPrompt = lang === 'da'
    ? 'Du er en erfaren dansk autoriseret elektriker og ekspert i DS/HD 60364, Elsikkerhedsloven, Installationsbekendtgørelsen og Fællesregulativet. Svar præcist, sikkert og kortfattet på dansk. Henvis altid til relevante standarder. Hvis noget kræver en autoriseret elinstallatør, sig det.'
    : 'You are an experienced Danish authorized electrician and expert in DS/HD 60364, the Electrical Safety Act, the Installation Order and Fællesregulativet. Answer precisely, safely and concisely in English. Always reference relevant standards. If something requires an authorized electrician, say so.';
  try {
    const res = await fetch(cfg.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.key },
      body: JSON.stringify({
        model: cfg.model || 'gpt-4o-mini',
        messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content: question }],
        temperature: 0.2
      })
    });
    const data = await res.json();
    const answer = data.choices && data.choices[0] && data.choices[0].message
      ? data.choices[0].message.content
      : (lang === 'da' ? 'Intet svar modtaget.' : 'No answer received.');
    aiChat.push({ role: 'assistant', text: answer });
  } catch (e) {
    aiChat.push({ role: 'assistant', text: (lang === 'da' ? 'Fejl ved forbindelse: ' : 'Connection error: ') + e.message });
  }
  aiBusy = false; renderModule('ai');
}

function submitAiQuestion() {
  const inp = document.getElementById('aiQuestionInput');
  if (!inp || !inp.value.trim()) return;
  const q = inp.value.trim();
  aiChat.push({ role: 'user', text: q });
  askOnlineAI(q);
}

function configureAI() {
  const cfg = JSON.parse(localStorage.getItem('aiElectricianCfg') || '{}');
  const endpoint = prompt(lang === 'da' ? 'AI endpoint URL (OpenAI-kompatibel):' : 'AI endpoint URL (OpenAI-compatible):', cfg.endpoint || 'https://api.openai.com/v1/chat/completions');
  if (endpoint === null) return;
  const key = prompt(lang === 'da' ? 'API-nøgle:' : 'API key:', cfg.key || '');
  if (key === null) return;
  const model = prompt(lang === 'da' ? 'Model:' : 'Model:', cfg.model || 'gpt-4o-mini');
  if (model === null) return;
  localStorage.setItem('aiElectricianCfg', JSON.stringify({ endpoint, key, model }));
  renderModule('ai');
}
