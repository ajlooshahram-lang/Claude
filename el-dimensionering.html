  const iiX = xPos(Math.min(12, iMax));
  svg += `<line x1="${iiX}" y1="${yPos(0.01)}" x2="${iiX}" y2="${stY}" stroke="#ff3b5c" stroke-width="2.5" filter="url(#rlGlow)"/>`;
  svg += `<text x="${iiX+5}" y="${yPos(0.03)}" font-size="8" fill="#ff3b5c" font-weight="600">${da?'Momentan':'Instantaneous'}</text>`;
  // Ir marker
  svg += `<line x1="${xPos(1)}" y1="${ax.t}" x2="${xPos(1)}" y2="${H-ax.b}" stroke="#06d6a0" stroke-width="1" stroke-dasharray="4 2"/>`;
  svg += `<text x="${xPos(1)+3}" y="${ax.t+12}" font-size="7" fill="#06d6a0">Ir=${Ir.toFixed(0)}A</text>`;
  const svgTag = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:620px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  // Build HTML
  let htm = `<div class="card fade-in"><div class="card-title">\uD83D\uDD12 ${da?'Rel\u00e6indstillinger':'Relay settings'}</div>`;
  htm += `<div class="info-row" style="margin-bottom:8px">${da?'Beregner indstillinger for elektroniske beskyttelsesrel\u00e6er (ANSI 50/51). Verificerer mod laststr\u00f8m, minimums- og maksimumskortslutningsstr\u00f8m.':'Computes settings for electronic protection relays (ANSI 50/51). Verifies against load current, minimum and maximum short-circuit current.'}</div>`;
  // Selectors
  htm += `<div class="select-group"><div class="select-label">${da?'Langtid pickup Ir (multiplikator af In)':'Long-time pickup Ir (multiplier of In)'}</div><div class="select-grid">`;
  irOptions.forEach(v => { htm += `<button class="sel-btn ${rlIrMult===v?'selected':''}" onclick="rlSetIr(${v})">${v.toFixed(2)}x</button>`; });
  htm += `</div></div>`;
  htm += `<div class="select-group"><div class="select-label">${da?'Korttid pickup Isd (multiplikator af Ir)':'Short-time pickup Isd (multiplier of Ir)'}</div><div class="select-grid">`;
  isdOptions.forEach(v => { htm += `<button class="sel-btn ${rlIsdMult===v?'selected':''}" onclick="rlSetIsd(${v})">${v}x</button>`; });
  htm += `</div></div>`;
  htm += `<div class="select-group"><div class="select-label">${da?'Korttid forsinkelse tsd':'Short-time delay tsd'}</div><div class="select-grid">`;
  tsdOptions.forEach(v => { htm += `<button class="sel-btn ${rlTsd===v?'selected':''}" onclick="rlSetTsd(${v})">${(v*1000).toFixed(0)} ms</button>`; });
  htm += `</div></div>`;
  htm += svgTag;
  // Settings summary
  htm += `<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-title" style="color:#bfe9ff">${da?'Rel\u00e6indstillinger':'Relay settings'}</div>`;
  htm += `<div class="result-row"><span class="label">${da?'Rel\u00e6 In (standardramme)':'Relay In (standard frame)'}</span><span class="value" style="color:#bfe9ff">${In_relay} A</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Langtid pickup Ir':'Long-time pickup Ir'}</span><span class="value" style="color:#ffd166">${Ir.toFixed(1)} A (${rlIrMult}\u00d7In)</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Korttid pickup Isd':'Short-time pickup Isd'}</span><span class="value" style="color:#00d4ff">${Isd.toFixed(0)} A (${rlIsdMult}\u00d7Ir)</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Korttid forsinkelse tsd':'Short-time delay tsd'}</span><span class="value" style="color:#00d4ff">${(tsd*1000).toFixed(0)} ms</span></div>`;
  htm += `<div class="result-row"><span class="label">${da?'Momentan Ii':'Instantaneous Ii'}</span><span class="value" style="color:#ff3b5c">${Ii.toFixed(0)} A (12\u00d7In)</span></div>`;
  htm += `<div class="result-row"><span class="label">Ik ${da?'tavle':'busbar'}</span><span class="value" style="color:#ff9a4d">${Ik_busbar.toFixed(0)} A</span></div>`;
  htm += `<div class="result-row"><span class="label">Ik min (${da?'kabelende':'cable end'})</span><span class="value" style="color:#ff9a4d">${Ik_min.toFixed(0)} A</span></div>`;
  htm += `</div>`;
  // Verification badges
  htm += `<div class="result-box" style="margin-top:8px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">`;
  htm += `<div class="result-title" style="color:#bfe9ff">${da?'Verifikation':'Verification'}</div>`;
  checks.forEach(ch => {
    const icon = ch.ok ? '\u2705' : '\u274c';
    const color = ch.ok ? '#06d6a0' : '#ff3b5c';
    htm += `<div class="result-row"><span class="label">${icon} ${ch.name}</span><span class="value" style="color:${color}">${ch.val}</span></div>`;
  });
  htm += `</div></div>`;
  return htm;
}

// ===== BACKUP GENERATOR SIZING + TRANSFER SWITCHING =====
function buildGenSet(){
  const da = lang==='da';
  const sch = calcLoadSchedule();
  const totalKW = sch.kW || 30;
  const totalKVA = sch.kVA || 40;
  // Priority loads = percentage of total
  const priorityKW = totalKW * (gsPriorityPct/100);
  const priorityKVA = totalKVA * (gsPriorityPct/100);
  // Motor starting allowance
  const genKVA_raw = priorityKVA * gsMotorAllow;
  // Standard genset sizes
  const GENSET_SIZES = [15,20,25,30,40,50,60,75,100,125,150,200,250,300,350,400,500];
  const genKVA = GENSET_SIZES.find(g => g >= genKVA_raw) || 500;
  const genIdx = GENSET_SIZES.indexOf(genKVA);
  // ATS sizing (next standard above gen capacity)
  const ATS_SIZES = [63,100,160,250,400,630,800,1000,1250,1600];
  const genA = genKVA * 1000 / (Math.sqrt(3) * 400);
  const atsA = ATS_SIZES.find(a => a >= genA) || 1600;
  // Transfer time options
  const transferOptions = [0,3,5,10,15,30];
  const motorOptions = [1.0,1.25,1.5,1.75,2.0];
  const priorityOptions = [30,40,50,60,70,80,90,100];
  // Load breakdown
  const cons = loadList.length ? loadList.slice(0,12) : [{kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:5,cos:0.95,sf:0.8,phase:'3',name:'Ventilation'},{kW:3,cos:1,sf:0.6,phase:'L1',name:'Belysning'}];
  const priorityLoads = cons.slice(0, Math.ceil(cons.length * gsPriorityPct/100));
  // SVG timeline diagram
  const W=580, H=300;
  let svg = '';
  svg += '<defs><filter id="gsGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '<radialGradient id="gsBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1a2e"/><stop offset="100%" stop-color="#060e1c"/></radialGradient></defs>';
  svg += '<rect width="'+W+'" height="'+H+'" fill="url(#gsBg)"/>';
  svg += '<text x="'+(W/2)+'" y="22" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff" filter="url(#gsGlow)">'+(da?'Transfersekvens (tidslinje)':'Transfer sequence (timeline)')+'</text>';
  // Timeline
  const tl={l:60,r:40,y1:80,y2:220,mid:150};
  const phases = [{t:0,label:da?'Netfejl':'Mains fail',color:'#ff3b5c'},{t:gsTransferTime*0.3,label:da?'Detektering':'Detection',color:'#ffd166'},{t:gsTransferTime*0.6,label:da?'Genstart':'Gen start',color:'#06d6a0'},{t:gsTransferTime,label:da?'ATS transfer':'ATS transfer',color:'#00d4ff'},{t:gsTransferTime+2,label:da?'Last tilsluttet':'Load connected',color:'#a78bfa'}];
  const maxT = gsTransferTime + 5;
  const xT = (t) => tl.l + (t/maxT)*(W-tl.l-tl.r);
  // Axis
  svg += '<line x1="'+tl.l+'" y1="'+tl.mid+'" x2="'+(W-tl.r)+'" y2="'+tl.mid+'" stroke="#3a5a7a" stroke-width="1.5"/>';
  svg += '<text x="'+(W-tl.r+5)+'" y="'+(tl.mid+4)+'" font-size="8" fill="#7fa8c4">t(s)</text>';
  // Mains voltage (drops at t=0)
  svg += '<polyline points="'+tl.l+','+(tl.mid-40)+' '+xT(0)+','+(tl.mid-40)+' '+xT(0.1)+','+(tl.mid-5)+' '+(W-tl.r)+','+(tl.mid-5)+'" fill="none" stroke="#ff3b5c" stroke-width="2" filter="url(#gsGlow)"/>';
  svg += '<text x="'+(tl.l+5)+'" y="'+(tl.mid-45)+'" font-size="8" fill="#ff3b5c">'+(da?'Netsp\u00e6nding':'Mains voltage')+'</text>';
  // Gen voltage (ramps up)
  const genStart = xT(gsTransferTime*0.6);
  const genReady = xT(gsTransferTime);
  svg += '<polyline points="'+tl.l+','+(tl.mid+5)+' '+genStart+','+(tl.mid+5)+' '+genReady+','+(tl.mid+40)+' '+(W-tl.r)+','+(tl.mid+40)+'" fill="none" stroke="#06d6a0" stroke-width="2" filter="url(#gsGlow)"/>';
  svg += '<text x="'+genStart+'" y="'+(tl.mid+55)+'" font-size="8" fill="#06d6a0">'+(da?'Generatorsp\u00e6nding':'Generator voltage')+'</text>';
  // Phase markers
  phases.forEach(function(ph){
    const x = xT(ph.t);
    svg += '<line x1="'+x+'" y1="'+(tl.mid-55)+'" x2="'+x+'" y2="'+(tl.mid+60)+'" stroke="'+ph.color+'" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>';
    svg += '<circle cx="'+x+'" cy="'+tl.mid+'" r="4" fill="'+ph.color+'" filter="url(#gsGlow)"/>';
    svg += '<text x="'+x+'" y="'+(tl.mid+72)+'" text-anchor="middle" font-size="7" fill="'+ph.color+'">'+ph.label+'</text>';
    svg += '<text x="'+x+'" y="'+(tl.mid+82)+'" text-anchor="middle" font-size="7" fill="#5a7a9a">'+ph.t.toFixed(1)+'s</text>';
  });
  // Generator icon
  svg += '<rect x="'+(W-tl.r-60)+'" y="40" width="50" height="30" rx="5" fill="none" stroke="#06d6a0" stroke-width="1.5"/>';
  svg += '<text x="'+(W-tl.r-35)+'" y="58" text-anchor="middle" font-size="9" fill="#06d6a0" font-weight="700">G</text>';
  svg += '<text x="'+(W-tl.r-35)+'" y="78" text-anchor="middle" font-size="7" fill="#06d6a0">'+genKVA+' kVA</text>';
  const svgTag = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:620px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">'+svg+'</svg>';
  // Build HTML
  let htm = '<div class="card fade-in"><div class="card-title">\u26A1 '+(da?'N\u00f8dstr\u00f8m & generator':'Backup power & generator')+'</div>';
  htm += '<div class="info-row" style="margin-bottom:8px">'+(da?'Beregner generatorst\u00f8rrelse ud fra prioriterede laster, motorstartfaktor og ATS-dimensionering. Viser transfersekvens.':'Calculates generator size from priority loads, motor starting factor, and ATS sizing. Shows transfer sequence.')+'</div>';
  // Selectors
  htm += '<div class="select-group"><div class="select-label">'+(da?'Prioriterede laster (% af total)':'Priority loads (% of total)')+'</div><div class="select-grid">';
  priorityOptions.forEach(function(v){ htm += '<button class="sel-btn '+(gsPriorityPct===v?'selected':'')+'" onclick="gsSetPriority('+v+')">'+v+'%</button>'; });
  htm += '</div></div>';
  htm += '<div class="select-group"><div class="select-label">'+(da?'Motorstartfaktor':'Motor starting allowance')+'</div><div class="select-grid">';
  motorOptions.forEach(function(v){ htm += '<button class="sel-btn '+(gsMotorAllow===v?'selected':'')+'" onclick="gsSetMotor('+v+')">'+v.toFixed(2)+'x</button>'; });
  htm += '</div></div>';
  htm += '<div class="select-group"><div class="select-label">'+(da?'Transfertid (sek)':'Transfer time (sec)')+'</div><div class="select-grid">';
  transferOptions.forEach(function(v){ htm += '<button class="sel-btn '+(gsTransferTime===v?'selected':'')+'" onclick="gsSetTransfer('+v+')">'+v+' s</button>'; });
  htm += '</div></div>';
  htm += svgTag;
  // Results
  htm += '<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">';
  htm += '<div class="result-title" style="color:#bfe9ff">'+(da?'Generatordimensionering':'Generator sizing')+'</div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Total last':'Total load')+'</span><span class="value" style="color:#bfe9ff">'+totalKVA.toFixed(1)+' kVA / '+totalKW.toFixed(1)+' kW</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Prioriteret last':'Priority load')+'</span><span class="value" style="color:#ffd166">'+priorityKVA.toFixed(1)+' kVA ('+gsPriorityPct+'%)</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Med motorstart':'With motor start')+'</span><span class="value" style="color:#ff9a4d">'+genKVA_raw.toFixed(1)+' kVA (x'+gsMotorAllow+')</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Valgt generator':'Selected generator')+'</span><span class="value" style="color:#06d6a0">'+genKVA+' kVA</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Generator str\u00f8m':'Generator current')+'</span><span class="value" style="color:#06d6a0">'+genA.toFixed(1)+' A</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'ATS dimensionering':'ATS sizing')+'</span><span class="value" style="color:#00d4ff">'+atsA+' A</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Transfertid':'Transfer time')+'</span><span class="value" style="color:#a78bfa">'+gsTransferTime+' s</span></div>';
  htm += '</div>';
  // Priority load list
  htm += '<div class="result-box" style="margin-top:8px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">';
  htm += '<div class="result-title" style="color:#bfe9ff">'+(da?'Prioriterede forbrugere':'Priority consumers')+'</div>';
  priorityLoads.forEach(function(c){ htm += '<div class="result-row"><span class="label">'+c.name+'</span><span class="value" style="color:#06d6a0">'+c.kW+' kW</span></div>'; });
  htm += '</div></div>';
  return htm;
}

// ===== LIGHTNING PROTECTION RISK ASSESSMENT =====
function buildLightningRisk(){
  const da = lang==='da';
  // IEC 62305-2 simplified parameters
  const Ng = 1.5; // ground flash density for Denmark
  // Building dimensions from type
  const buildTypes = {office:{da:'Kontor',en:'Office',L:30,W2:20,H:12},house:{da:'Bolig',en:'House',L:12,W2:10,H:8},warehouse:{da:'Lager',en:'Warehouse',L:50,W2:30,H:10},hospital:{da:'Hospital',en:'Hospital',L:60,W2:40,H:20},church:{da:'Kirke',en:'Church',L:20,W2:12,H:25}};
  const bt = buildTypes[lpBuildingType] || buildTypes.office;
  const H = lpHeight || bt.H;
  // Collection area (simplified): Ad = L*W + 2*L*H + 2*W*H + pi*H^2
  const L = bt.L, W2 = bt.W2;
  const Ad = (L*W2 + 2*L*H + 2*W2*H + Math.PI*H*H) * 1e-6; // km^2
  // Location factor Cd
  const locationFactors = {isolated:2.0,rural:1.0,suburban:0.5,urban:0.25};
  const Cd = locationFactors[lpLocation] || 0.5;
  // Expected number of strikes per year
  const Nd = Ng * Ad * Cd * 1e6 * 1e-6; // Nd = Ng * Ad * Cd (Ad already in km2)
  const Nd_real = Ng * (L*W2 + 2*L*H + 2*W2*H + Math.PI*H*H) * 1e-6 * Cd;
  // Risk factors
  const roofFactors = {flat:1.0,pitched:0.8,metal:1.5,thatch:2.0};
  const contentFactors = {standard:1.0,electronics:2.0,explosive:5.0,irreplaceable:3.0};
  const Cr = roofFactors[lpRoofType] || 1.0;
  const Cc = contentFactors[lpContents] || 1.0;
  // Tolerable risk (IEC 62305-2 Table 7)
  const Rt = 1e-5; // typical for loss of human life
  const Ra = Nd_real * Cr * Cc * 0.01; // simplified annual risk
  const needsLPS = Ra > Rt;
  // LPS class
  let lpsClass = 'IV';
  if(Ra > 0.02) lpsClass = 'I';
  else if(Ra > 0.005) lpsClass = 'II';
  else if(Ra > 0.001) lpsClass = 'III';
  // Rolling sphere radius per class
  const sphereR = {I:20,II:30,III:45,IV:60};
  const R = sphereR[lpsClass];
  // SVG building with protection dome
  const SW=580, SH=340;
  let svg = '';
  svg += '<defs><filter id="lpGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '<radialGradient id="lpBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1a2e"/><stop offset="100%" stop-color="#060e1c"/></radialGradient></defs>';
  svg += '<rect width="'+SW+'" height="'+SH+'" fill="url(#lpBg)"/>';
  svg += '<text x="'+(SW/2)+'" y="22" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff" filter="url(#lpGlow)">'+(da?'Lynbeskyttelseszone (rullende kugle)':'Lightning protection zone (rolling sphere)')+'</text>';
  // Ground line
  var gy = SH-50;
  svg += '<line x1="40" y1="'+gy+'" x2="'+(SW-40)+'" y2="'+gy+'" stroke="#3a5a7a" stroke-width="1.5"/>';
  // Building
  var bx = SW/2-50, bw = 100, bh = Math.min(120, H*5);
  var by = gy - bh;
  svg += '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="rgba(0,100,180,0.15)" stroke="#00d4ff" stroke-width="1.5" rx="3"/>';
  svg += '<text x="'+(SW/2)+'" y="'+(by+bh/2)+'" text-anchor="middle" font-size="9" fill="#00d4ff" font-weight="600">'+(da?bt.da:bt.en)+'</text>';
  svg += '<text x="'+(SW/2)+'" y="'+(by+bh/2+14)+'" text-anchor="middle" font-size="8" fill="#7fa8c4">H='+H+'m</text>';
  // Protection dome (rolling sphere)
  if(needsLPS){
    var cx = SW/2, dome_r = Math.min(150, R*3);
    svg += '<ellipse cx="'+cx+'" cy="'+by+'" rx="'+dome_r+'" ry="'+(dome_r*0.6)+'" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7" filter="url(#lpGlow)"/>';
    svg += '<text x="'+cx+'" y="'+(by-dome_r*0.6-8)+'" text-anchor="middle" font-size="8" fill="#a78bfa">R='+R+'m (Klasse '+lpsClass+')</text>';
    // Lightning rod
    svg += '<line x1="'+(SW/2)+'" y1="'+(by-15)+'" x2="'+(SW/2)+'" y2="'+by+'" stroke="#ffd166" stroke-width="2" filter="url(#lpGlow)"/>';
    svg += '<circle cx="'+(SW/2)+'" cy="'+(by-18)+'" r="3" fill="#ffd166" filter="url(#lpGlow)"/>';
    svg += '<text x="'+(SW/2+10)+'" y="'+(by-10)+'" font-size="7" fill="#ffd166">'+(da?'Fanganordning':'Air terminal')+'</text>';
  }
  // Lightning bolt
  svg += '<polyline points="'+(SW/2+60)+',30 '+(SW/2+50)+',60 '+(SW/2+65)+',60 '+(SW/2+45)+',100" fill="none" stroke="#ffd166" stroke-width="2" filter="url(#lpGlow)"/>';
  // Ground electrode
  svg += '<line x1="'+(bx+bw-10)+'" y1="'+gy+'" x2="'+(bx+bw-10)+'" y2="'+(gy+25)+'" stroke="#06d6a0" stroke-width="2"/>';
  svg += '<line x1="'+(bx+bw-18)+'" y1="'+(gy+25)+'" x2="'+(bx+bw-2)+'" y2="'+(gy+25)+'" stroke="#06d6a0" stroke-width="2"/>';

// ===== THERMAL IMAGING PREDICTION =====
function buildThermalPred(){
  const da = lang==='da';
  const sch = calcLoadSchedule();
  const IB = sch.ib || 50;
  // Connection points to analyze
  const cons = loadList.length ? loadList.slice(0,10) : [{kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:5,cos:0.95,sf:0.8,phase:'3',name:'Motor'},{kW:3,cos:1,sf:0.6,phase:'L1',name:'Stikgrupper'}];
  // Connection quality factors
  const qualityFactors = {excellent:0.7,good:1.0,fair:1.5,poor:2.5};
  const Cq = qualityFactors[tpConnQuality] || 1.0;
  // Ambient temp selector options
  const ambientOptions = [15,20,25,30,35,40,45];
  const qualityOptions = [{k:'excellent',da:'Fremragende',en:'Excellent'},{k:'good',da:'God',en:'Good'},{k:'fair',da:'Rimelig',en:'Fair'},{k:'poor',da:'D\u00e5rlig',en:'Poor'}];
  // Calculate temperatures at connection points
  // Formula: deltaT = (I/In)^2 * deltaT_rated * Cq
  // deltaT_rated typical values: cable term=15K, breaker term=25K, busbar joint=20K
  const points = [];
  cons.forEach(function(c,i){
    const ci = lsConsumerCurrent(c);
    const Ic = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
    const mcbs = recommendMCBs(Ic,10);
    const In = (mcbs && mcbs[0]) ? mcbs[0].rating : Math.ceil(Ic/10)*10;
    const ratio = Ic/In;
    const dtCable = Math.pow(ratio,2) * 15 * Cq;
    const dtBreaker = Math.pow(ratio,2) * 25 * Cq;
    const dtBusbar = Math.pow(ratio,2) * 20 * Cq;
    const tCable = tpAmbient + dtCable;
    const tBreaker = tpAmbient + dtBreaker;
    const tBusbar = tpAmbient + dtBusbar;
    // Hot spot threshold: ambient + 50K for breakers, ambient + 40K for cables
    points.push({name:c.name,Ic:Ic,In:In,ratio:ratio,tCable:tCable,tBreaker:tBreaker,tBusbar:tBusbar,dtCable:dtCable,dtBreaker:dtBreaker,dtBusbar:dtBusbar,hotCable:tCable>(tpAmbient+40),hotBreaker:tBreaker>(tpAmbient+50),hotBusbar:tBusbar>(tpAmbient+45)});
  });
  const hotSpots = points.filter(function(p){return p.hotCable||p.hotBreaker||p.hotBusbar;});
  // SVG thermal color map
  const SW=580, SH=320;
  let svg = '';
  svg += '<defs><filter id="tpGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '<radialGradient id="tpBg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0d1a2e"/><stop offset="100%" stop-color="#060e1c"/></radialGradient>';
  svg += '<linearGradient id="tpHeat" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0066ff"/><stop offset="25%" stop-color="#00ccff"/><stop offset="50%" stop-color="#00ff66"/><stop offset="75%" stop-color="#ffcc00"/><stop offset="100%" stop-color="#ff3300"/></linearGradient></defs>';
  svg += '<rect width="'+SW+'" height="'+SH+'" fill="url(#tpBg)"/>';
  svg += '<text x="'+(SW/2)+'" y="22" text-anchor="middle" font-size="11" font-weight="800" fill="#bfe9ff" filter="url(#tpGlow)">'+(da?'Termisk farvekort':'Thermal color map')+'</text>';
  // Color bar legend
  svg += '<rect x="40" y="'+( SH-30)+'" width="200" height="12" fill="url(#tpHeat)" rx="3"/>';
  svg += '<text x="40" y="'+(SH-5)+'" font-size="7" fill="#7fa8c4">'+tpAmbient+'\u00b0C</text>';
  svg += '<text x="240" y="'+(SH-5)+'" font-size="7" fill="#7fa8c4">'+(tpAmbient+70)+'\u00b0C</text>';
  // Draw connection points as thermal spots
  var cols = Math.min(points.length, 5);
  var rows = Math.ceil(points.length/cols);
  var startX = 60, startY = 50, gapX = (SW-120)/Math.max(cols-1,1), gapY = (SH-120)/Math.max(rows-1,1);
  points.forEach(function(pt,idx){
    var col = idx % cols, row = Math.floor(idx/cols);
    var cx = startX + col*gapX, cy = startY + row*gapY + 20;
    // Temperature determines color
    var maxT = Math.max(pt.tCable,pt.tBreaker,pt.tBusbar);
    var tNorm = Math.min(1, Math.max(0, (maxT-tpAmbient)/70));
    var r = Math.round(tNorm*255);
    var g = Math.round((1-tNorm)*200);
    var b2 = Math.round((1-tNorm)*255);
    var color = 'rgb('+r+','+g+','+b2+')';
    var radius = 12 + tNorm*10;
    // Glow effect for hot spots
    if(pt.hotCable||pt.hotBreaker||pt.hotBusbar){
      svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+(radius+8)+'" fill="none" stroke="'+color+'" stroke-width="2" opacity="0.4" filter="url(#tpGlow)"/>';
    }
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+radius+'" fill="'+color+'" opacity="0.85" filter="url(#tpGlow)"/>';
    svg += '<text x="'+cx+'" y="'+(cy+3)+'" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">'+maxT.toFixed(0)+'\u00b0</text>';
    svg += '<text x="'+cx+'" y="'+(cy+radius+12)+'" text-anchor="middle" font-size="7" fill="#bfe9ff">'+pt.name+'</text>';
    if(pt.hotCable||pt.hotBreaker||pt.hotBusbar){
      svg += '<text x="'+cx+'" y="'+(cy-radius-5)+'" text-anchor="middle" font-size="8" fill="#ff3b5c" font-weight="700">\u26a0</text>';
    }
  });
  var svgTag = '<svg viewBox="0 0 '+SW+' '+SH+'" width="100%" style="max-width:620px;border-radius:12px;border:1px solid rgba(0,200,255,0.28);box-shadow:0 0 24px rgba(0,160,255,0.15)" xmlns="http://www.w3.org/2000/svg">'+svg+'</svg>';
  // Build HTML
  let htm = '<div class="card fade-in"><div class="card-title">\uD83C\uDF21\uFE0F '+(da?'Termisk forudsigelse':'Thermal prediction')+'</div>';
  htm += '<div class="info-row" style="margin-bottom:8px">'+(da?'Forudsiger temperaturer ved kabeltilslutninger, afbryderklemmer og skinnesamlinger. Formel: \u0394T = (I/In)\u00b2 \u00d7 \u0394T_rated \u00d7 kvalitetsfaktor.':'Predicts temperatures at cable connections, breaker terminals, and busbar joints. Formula: \u0394T = (I/In)\u00b2 \u00d7 \u0394T_rated \u00d7 quality factor.')+'</div>';
  // Selectors
  htm += '<div class="select-group"><div class="select-label">'+(da?'Omgivelsestemperatur':'Ambient temperature')+'</div><div class="select-grid">';
  ambientOptions.forEach(function(v){ htm += '<button class="sel-btn '+(tpAmbient===v?'selected':'')+'" onclick="tpSetAmbient('+v+')">'+v+' \u00b0C</button>'; });
  htm += '</div></div>';
  htm += '<div class="select-group"><div class="select-label">'+(da?'Tilslutningskvalitet':'Connection quality')+'</div><div class="select-grid">';
  qualityOptions.forEach(function(q){ htm += '<button class="sel-btn '+(tpConnQuality===q.k?'selected':'')+'" onclick="tpSetConn(\''+q.k+'\')">'+(da?q.da:q.en)+'</button>'; });
  htm += '</div></div>';
  htm += svgTag;
  // Results table
  htm += '<div class="result-box" style="margin-top:10px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">';
  htm += '<div class="result-title" style="color:#bfe9ff">'+(da?'Temperaturforudsigelse':'Temperature prediction')+'</div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Omgivelsestemperatur':'Ambient')+'</span><span class="value" style="color:#bfe9ff">'+tpAmbient+' \u00b0C</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Kvalitetsfaktor':'Quality factor')+'</span><span class="value" style="color:#ffd166">'+Cq+'x ('+tpConnQuality+')</span></div>';
  htm += '<div class="result-row"><span class="label">'+(da?'Hot spots fundet':'Hot spots found')+'</span><span class="value" style="color:'+(hotSpots.length>0?'#ff3b5c':'#06d6a0')+'">'+hotSpots.length+'</span></div>';
  htm += '</div>';
  // Detailed per-point results
  htm += '<div class="result-box" style="margin-top:8px;background:rgba(0,30,50,0.4);border:1px solid rgba(0,200,255,0.2)">';
  htm += '<div class="result-title" style="color:#bfe9ff">'+(da?'Tilslutningspunkter':'Connection points')+'</div>';
  points.forEach(function(pt){
    var hot = pt.hotCable||pt.hotBreaker||pt.hotBusbar;
    var icon = hot?'\u26a0\ufe0f':'\u2705';
    var maxT2 = Math.max(pt.tCable,pt.tBreaker,pt.tBusbar);
    var color = hot?'#ff3b5c':'#06d6a0';
    htm += '<div class="result-row"><span class="label">'+icon+' '+pt.name+' ('+pt.Ic.toFixed(1)+'A / '+pt.In+'A)</span><span class="value" style="color:'+color+'">'+maxT2.toFixed(1)+' \u00b0C (\u0394T='+pt.dtBreaker.toFixed(1)+'K)</span></div>';
  });
  htm += '</div></div>';
  return htm;
}

function buildInspectionInterval(){
  const da = lang==='da';
  // Base intervals in months
  const BASE_INTERVALS = {
    residential: 120, commercial: 60, industrial: 36, hospital: 12,
    school: 60, swimming_pool: 12, construction: 3
  };
  const TYPE_LABELS = {
    residential: {da:'Bolig',en:'Residential'},
    commercial: {da:'Erhverv',en:'Commercial'},
    industrial: {da:'Industri',en:'Industrial'},
    hospital: {da:'Hospital',en:'Hospital'},
    school: {da:'Skole',en:'School'},
    swimming_pool: {da:'Svommehal',en:'Swimming pool'},
    construction: {da:'Byggeplads',en:'Construction site'}
  };
  const ENV_LABELS = {
    dry: {da:'Tor',en:'Dry'},
    damp: {da:'Fugtig',en:'Damp'},
    corrosive: {da:'Korrosiv',en:'Corrosive'},
    explosive: {da:'Eksplosiv',en:'Explosive'}
  };
  const AGE_LABELS = ['0-5','5-10','10-20','20-40','40+'];
  const MOD_LABELS = {
    none: {da:'Ingen',en:'None'},
    minor: {da:'Mindre',en:'Minor'},
    major: {da:'Vasentlige',en:'Major'}
  };
  // Environment factor
  const envFactor = inspEnv==='dry'?1.0 : inspEnv==='damp'?0.7 : inspEnv==='corrosive'?0.5 : 0.3;
  // Age factor
  const ageFactor = inspAge==='0-5'?1.0 : inspAge==='5-10'?0.9 : inspAge==='10-20'?0.75 : inspAge==='20-40'?0.6 : 0.5;
  // Modification factor
  const modFactor = inspMod==='none'?1.0 : inspMod==='minor'?0.85 : 0.6;
  // Calculate interval
  const baseMonths = BASE_INTERVALS[inspType] || 60;
  const adjMonths = Math.max(1, Math.round(baseMonths * envFactor * ageFactor * modFactor));
  const adjYears = adjMonths >= 12 ? (adjMonths/12).toFixed(1) : null;
  const intervalLabel = adjMonths >= 12 ? (adjYears + (da?' ar':' years')) : (adjMonths + (da?' mdr':' months'));
  // Next inspection date
  const now = new Date();
  const nextDate = new Date(now.getTime() + adjMonths * 30.44 * 24 * 60 * 60 * 1000);
  const nextStr = nextDate.toISOString().slice(0,10);
  // Legal requirement
  const legalRequired = ['hospital','swimming_pool','construction','industrial'].includes(inspType);
  const legalLabel = legalRequired
    ? (da?'LOVPLIGTIGT eftersyn (BEK 1082 \u00a78)':'LEGALLY REQUIRED inspection (BEK 1082 \u00a78)')
    : (da?'Anbefalet eftersyn (god praksis)':'Recommended inspection (good practice)');
  // Inspection scope per DS/HD 60364-6 section 6.5
  const scope = [
    {da:'Visuel inspektion af hele installationen',en:'Visual inspection of the entire installation'},
    {da:'Test af beskyttelseslederes kontinuitet',en:'Continuity test of protective conductors'},
    {da:'Isolationsmodstandsmaaling',en:'Insulation resistance measurement'},
    {da:'Sloejfeimpedansmaaling (Zs)',en:'Loop impedance measurement (Zs)'},
    {da:'HPFI/RCD-funktionstest',en:'RCD function test'},
    {da:'Gennemgang af dokumentation og maerkning',en:'Review of documentation and labelling'},
    {da:'Kontrol af belastningsforhold',en:'Verification of loading conditions'}
  ];

  let html = `<div class="card fade-in" style="border-left:4px solid var(--primary-light)">`;
  html += `<div class="card-title">\u{1F50D} ${da?'Eftersyn & interval':'Inspection & interval'}</div>`;
  html += `<div class="info-row" style="margin-bottom:6px">${da?'Beregner anbefalet eftersynsinterval baseret paa DS/HD 60364-6 \u00a76.5, Installationsbekendtgoerelsen og Sikkerhedsstyrelsens retningslinjer.':'Calculates recommended inspection interval based on DS/HD 60364-6 \u00a76.5, the Installation Order and Danish Safety Authority guidelines.'}</div>`;
  html += `<div style="font-size:0.68rem;font-style:italic;color:var(--text-muted);margin-bottom:10px;opacity:0.85">\u{1F4D6} DS/HD 60364-6 \u00a76.5 \u00b7 BEK 1082 \u00a78 \u00b7 <a href="https://sikkerhedsstyrelsen.dk/eftersyn" target="_blank" style="color:var(--primary-light)">Sikkerhedsstyrelsen.dk/eftersyn</a></div>`;

  // Installation type selector
  html += `<div class="select-group"><div class="select-label">${da?'Installationstype':'Installation type'}</div><div class="select-grid">`;
  Object.keys(TYPE_LABELS).forEach(k => {
    html += `<button class="sel-btn ${inspType===k?'selected':''}" onclick="inspSetType('${k}')">${TYPE_LABELS[k][da?'da':'en']}</button>`;
  });
  html += `</div></div>`;

  // Environment selector
  html += `<div class="select-group"><div class="select-label">${da?'Miljo':'Environment'}</div><div class="select-grid">`;
  Object.keys(ENV_LABELS).forEach(k => {
    html += `<button class="sel-btn ${inspEnv===k?'selected':''}" onclick="inspSetEnv('${k}')">${ENV_LABELS[k][da?'da':'en']}</button>`;
  });
  html += `</div></div>`;

  // Age selector
  html += `<div class="select-group"><div class="select-label">${da?'Installationens alder':'Installation age'}</div><div class="select-grid">`;
  AGE_LABELS.forEach(a => {
    html += `<button class="sel-btn ${inspAge===a?'selected':''}" onclick="inspSetAge('${a}')">${a} ${da?'ar':'yr'}</button>`;
  });
  html += `</div></div>`;

  // Modifications selector
  html += `<div class="select-group"><div class="select-label">${da?'Aendringer siden sidst':'Modifications since last'}</div><div class="select-grid">`;
  Object.keys(MOD_LABELS).forEach(k => {
    html += `<button class="sel-btn ${inspMod===k?'selected':''}" onclick="inspSetMod('${k}')">${MOD_LABELS[k][da?'da':'en']}</button>`;
  });
  html += `</div></div>`;

  // Results
  html += `<div class="result-box" style="margin-top:12px">`;
  html += `<div class="result-title">${da?'Anbefalet interval':'Recommended interval'}</div>`;
  html += `<div class="result-row"><span class="label">${da?'Basisinterval':'Base interval'}</span><span class="value">${baseMonths>=12?(baseMonths/12)+' '+(da?'ar':'yr'):baseMonths+' '+(da?'mdr':'mo')}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Miljofaktor':'Env. factor'}</span><span class="value">\u00d7${envFactor.toFixed(2)}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Aldersfaktor':'Age factor'}</span><span class="value">\u00d7${ageFactor.toFixed(2)}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Aendringsfaktor':'Mod. factor'}</span><span class="value">\u00d7${modFactor.toFixed(2)}</span></div>`;
  html += `<div class="result-row" style="font-weight:700;font-size:1rem"><span class="label">${da?'Justeret interval':'Adjusted interval'}</span><span class="value" style="color:var(--primary-light)">${intervalLabel}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Naeste eftersyn':'Next inspection'}</span><span class="value">${nextStr}</span></div>`;
  html += `</div>`;

  // Legal status
  const legalColor = legalRequired ? 'var(--danger)' : 'var(--success)';
  html += `<div style="margin-top:10px;padding:10px 14px;border-radius:8px;border:1.5px solid ${legalColor};background:rgba(0,0,0,0.2)">`;
  html += `<div style="font-weight:700;color:${legalColor};font-size:0.85rem">${legalRequired?'\u26A0\uFE0F':'\u2705'} ${legalLabel}</div>`;
  html += `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">\u{1F4D6} DS/HD 60364-6 \u00a76.5 \u00b7 BEK 1082 \u00a78 \u00b7 Sikkerhedsstyrelsen.dk/eftersyn</div>`;
  html += `</div>`;

  // Scope of inspection
  html += `<div style="margin-top:12px"><div style="font-weight:700;font-size:0.82rem;color:var(--text);margin-bottom:6px">${da?'Eftersyn skal daekke (\u00a76.5):':'Inspection must cover (\u00a76.5):'}</div>`;
  scope.forEach((s,i) => {
    html += `<div style="font-size:0.78rem;padding:4px 0;color:var(--text-light)">${i+1}. ${da?s.da:s.en}</div>`;
  });
  html += `</div>`;

  html += `</div>`;
  return html;
}

function buildZsSimulator(){
  const da = lang==='da';
  // Cable resistance data (ohm/km at 20C for copper)
  const ZS_CABLE_R = {1.5:12.1, 2.5:7.41, 4:4.61, 6:3.08, 10:1.83, 16:1.15, 25:0.727, 35:0.525, 50:0.388, 70:0.269, 95:0.194};
  const ZS_SIZES = [1.5, 2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95];
  const ZS_LENGTHS = [5, 10, 15, 20, 30, 50, 75, 100, 150, 200];
  const ZS_MCB_RATINGS = [6, 10, 13, 16, 20, 25, 32, 40, 50, 63];
  // Ze values per earthing system
  const ZS_ZE = {'TN-C-S':0.35, 'TN-S':0.80, 'TT':20.0, 'IT':50.0};
  // Zs_max table values (DS/HD 60364-6 Table 6A) for 0.4s disconnection (TN)
  const ZS_MAX_B = {6:7.67, 10:4.60, 13:3.54, 16:2.87, 20:2.30, 25:1.84, 32:1.44, 40:1.15, 50:0.92, 63:0.73};
  const ZS_MAX_C = {6:3.83, 10:2.30, 13:1.77, 16:1.44, 20:1.15, 25:0.92, 32:0.72, 40:0.57, 50:0.46, 63:0.37};
  const ZS_MAX_D = {6:1.92, 10:1.15, 13:0.88, 16:0.72, 20:0.57, 25:0.46, 32:0.36, 40:0.29, 50:0.23, 63:0.18};
  const ZS_MAX = zsMcbCurve==='B'?ZS_MAX_B : zsMcbCurve==='D'?ZS_MAX_D : ZS_MAX_C;

  // Calculate R1+R2 (line + PE, same size assumed)
  const rPerKm = ZS_CABLE_R[zsSize] || 7.41;
  const R1R2 = 2 * rPerKm * (zsLen / 1000);
  const Ze = ZS_ZE[zsEarth] || 0.35;
  const Zs = Ze + R1R2;
  const ZsMax = ZS_MAX[zsMcbRating] || 1.44;
  const zsOk = Zs <= ZsMax;
  // Simulated test current and voltage
  const Itest = 25; // typical test current in mA (actually uses higher, but display simplified)
  const Vdrop = Zs * Itest;
  // Fault current
  const If = 230 / Zs;
  // Ia for MCB
  const mcbMult = zsMcbCurve==='B'?5 : zsMcbCurve==='D'?20 : 10;
  const Ia = mcbMult * zsMcbRating;
  const tripsOk = If >= Ia;

  // SVG: Stylized loop impedance tester with digital display and circuit loop
  const svgW = 440, svgH = 260;
  const displayZs = Zs.toFixed(3);
  const displayColor = zsOk ? '#00ff88' : '#ff3b5c';
  const loopColor = zsOk ? '#00c8ff' : '#ff3b5c';
  const animDur = zsOk ? '2s' : '1s';

  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;max-width:440px;height:auto;margin:10px auto;display:block;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(0,200,255,0.2)">`;
  // Instrument body
  svg += `<rect x="20" y="30" width="150" height="200" rx="12" fill="#1a1a2e" stroke="${loopColor}" stroke-width="2"/>`;
  svg += `<text x="95" y="55" text-anchor="middle" fill="${loopColor}" font-size="9" font-weight="700">${da?'SLOEJFEIMPEDANSTESTER':'LOOP IMPEDANCE TESTER'}</text>`;
  // Digital display
  svg += `<rect x="35" y="65" width="120" height="55" rx="6" fill="#0a0a15" stroke="${displayColor}" stroke-width="1.5"/>`;
  svg += `<text x="95" y="83" text-anchor="middle" fill="#aaa" font-size="8">Zs (\u03A9)</text>`;
  svg += `<text x="95" y="110" text-anchor="middle" fill="${displayColor}" font-size="22" font-weight="800">${displayZs}</text>`;
  // Max label
  svg += `<text x="95" y="135" text-anchor="middle" fill="#888" font-size="7.5">Zs_max = ${ZsMax.toFixed(2)} \u03A9</text>`;
  // Status indicator
  svg += `<circle cx="55" cy="155" r="8" fill="${zsOk?'#00ff88':'#ff3b5c'}" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.5s" repeatCount="indefinite"/></circle>`;
  svg += `<text x="70" y="159" fill="${zsOk?'#00ff88':'#ff3b5c'}" font-size="10" font-weight="700">${zsOk?'OK':'FAIL'}</text>`;
  // Test leads from instrument
  svg += `<line x1="95" y1="230" x2="95" y2="245" stroke="#ff6600" stroke-width="3" stroke-linecap="round"/>`;
  svg += `<text x="95" y="225" text-anchor="middle" fill="#aaa" font-size="7">L - PE</text>`;
  // Circuit loop path (right side)
  svg += `<path d="M 170 80 L 250 80 L 250 30 L 400 30 L 400 230 L 250 230 L 250 180 L 170 180" fill="none" stroke="${loopColor}" stroke-width="2" stroke-dasharray="6 3" opacity="0.7">`;
  svg += `<animate attributeName="stroke-dashoffset" values="0;-18" dur="${animDur}" repeatCount="indefinite"/></path>`;
  // Labels on loop
  svg += `<text x="210" y="72" fill="#ff9500" font-size="8" font-weight="600">L (${da?'fase':'line'})</text>`;
  svg += `<text x="210" y="195" fill="#00cc66" font-size="8" font-weight="600">PE</text>`;
  // Ze section
  svg += `<rect x="355" y="100" width="60" height="50" rx="4" fill="none" stroke="#ffd27a" stroke-width="1.5" stroke-dasharray="3 2"/>`;
  svg += `<text x="385" y="120" text-anchor="middle" fill="#ffd27a" font-size="8" font-weight="600">Ze</text>`;
  svg += `<text x="385" y="137" text-anchor="middle" fill="#ffd27a" font-size="10" font-weight="700">${Ze.toFixed(2)} \u03A9</text>`;
  // R1+R2 section
  svg += `<rect x="260" y="100" width="70" height="50" rx="4" fill="none" stroke="#00c8ff" stroke-width="1.5" stroke-dasharray="3 2"/>`;
  svg += `<text x="295" y="120" text-anchor="middle" fill="#00c8ff" font-size="8" font-weight="600">R1+R2</text>`;
  svg += `<text x="295" y="137" text-anchor="middle" fill="#00c8ff" font-size="10" font-weight="700">${R1R2.toFixed(3)} \u03A9</text>`;
  // Test current arrow
  svg += `<circle cx="250" cy="130" r="5" fill="${loopColor}" opacity="0.8"><animate attributeName="cx" values="190;400;400;190" dur="${animDur}" repeatCount="indefinite"/><animate attributeName="cy" values="80;80;180;180" dur="${animDur}" repeatCount="indefinite"/></circle>`;
  // Formula annotation
  svg += `<text x="295" y="210" text-anchor="middle" fill="#aaa" font-size="8">Zs = Ze + (R1+R2) = ${Ze.toFixed(2)} + ${R1R2.toFixed(3)} = ${Zs.toFixed(3)} \u03A9</text>`;
  svg += `</svg>`;

  let html = `<div class="card fade-in" style="border-left:4px solid ${zsOk?'var(--success)':'var(--danger)'}">`;
  html += `<div class="card-title">\u26A1 ${da?'Sloejfeimpedans-test (simulator)':'Loop impedance test (simulator)'}</div>`;
  html += `<div class="info-row" style="margin-bottom:6px">${da?'Interaktiv simulation af hvordan en sloejfeimpedanstester virker: injicerer en teststr\u00f8m i L-PE sloejfen, maaler spaendingsfaldet og beregner Zs = V/I.':'Interactive simulation of how a loop impedance tester works: injects a test current into the L-PE loop, measures the voltage drop and computes Zs = V/I.'}</div>`;
  html += `<div style="font-size:0.68rem;font-style:italic;color:var(--text-muted);margin-bottom:10px;opacity:0.85">\u{1F4D6} DS/HD 60364-6 \u00a76.4.3.4 \u00b7 Tabel 6A</div>`;

  // Cable length selector
  html += `<div class="select-group"><div class="select-label">${da?'Kabellængde':'Cable length'}</div><div class="select-grid">`;
  ZS_LENGTHS.forEach(l => {
    html += `<button class="sel-btn ${zsLen===l?'selected':''}" onclick="zsSetLen(${l})">${l} m</button>`;
  });
  html += `</div></div>`;

  // Cable size selector
  html += `<div class="select-group"><div class="select-label">${da?'Kabeltvaersnit':'Cable size'}</div><div class="select-grid">`;
  ZS_SIZES.forEach(s => {
    html += `<button class="sel-btn ${zsSize===s?'selected':''}" onclick="zsSetSize(${s})">${s} mm\u00b2</button>`;
  });
  html += `</div></div>`;

  // Earthing system selector
  html += `<div class="select-group"><div class="select-label">${da?'Jordingssystem':'Earthing system'}</div><div class="select-grid">`;
  ['TN-C-S','TN-S','TT','IT'].forEach(e => {
    html += `<button class="sel-btn ${zsEarth===e?'selected':''}" onclick="zsSetEarth('${e}')">\u23DA ${e}</button>`;
  });
  html += `</div></div>`;

  // MCB curve selector
  html += `<div class="select-group"><div class="select-label">${da?'MCB karakteristik':'MCB curve'}</div><div class="select-grid">`;
  ['B','C','D'].forEach(c => {
    html += `<button class="sel-btn ${zsMcbCurve===c?'selected':''}" onclick="zsSetCurve('${c}')">Kurve ${c}</button>`;
  });
  html += `</div></div>`;

  // MCB rating selector
  html += `<div class="select-group"><div class="select-label">${da?'MCB maerkestr\u00f8m':'MCB rating'}</div><div class="select-grid">`;
  ZS_MCB_RATINGS.forEach(r => {
    html += `<button class="sel-btn ${zsMcbRating===r?'selected':''}" onclick="zsSetMcb(${r})">${r} A</button>`;
  });
  html += `</div></div>`;

  // SVG display
  html += svg;

  // Results
  html += `<div class="result-box" style="margin-top:12px;border-color:${zsOk?'var(--success)':'var(--danger)'}">`;
  html += `<div class="result-title">${da?'Maalingsresultat':'Measurement result'}</div>`;
  html += `<div class="result-row"><span class="label">Ze (${da?'forsyningsjordimpedans':'supply earth impedance'})</span><span class="value">${Ze.toFixed(2)} \u03A9</span></div>`;
  html += `<div class="result-row"><span class="label">R1+R2 (${zsSize} mm\u00b2 \u00d7 ${zsLen} m)</span><span class="value">${R1R2.toFixed(3)} \u03A9</span></div>`;
  html += `<div class="result-row" style="font-weight:700"><span class="label">Zs = Ze + R1+R2</span><span class="value" style="color:${displayColor}">${Zs.toFixed(3)} \u03A9</span></div>`;
  html += `<div class="result-row"><span class="label">Zs_max (${zsMcbCurve}${zsMcbRating}, 0.4s)</span><span class="value">${ZsMax.toFixed(2)} \u03A9</span></div>`;
  html += `<div class="result-row"><span class="label">If = Uo/Zs</span><span class="value">${If.toFixed(1)} A</span></div>`;
  html += `<div class="result-row"><span class="label">Ia (${mcbMult}\u00d7In)</span><span class="value">${Ia} A</span></div>`;
  html += `</div>`;

  // Verdict
  const verdictColor = zsOk ? 'var(--success)' : 'var(--danger)';
  const verdictText = zsOk
    ? (da?'Zs OK \u2014 afbrydelse sikret inden for kraevet tid':'Zs OK \u2014 disconnection assured within required time')
    : (da?'Zs for hoej \u2014 forhoej kabeltvaersnit eller tilfoej HPFI/RCD':'Zs too high \u2014 increase cable size or add RCD');
  html += `<div style="margin-top:10px;padding:10px 14px;border-radius:8px;border:1.5px solid ${verdictColor};background:rgba(0,0,0,0.2)">`;
  html += `<div style="font-weight:700;color:${verdictColor};font-size:0.9rem">${zsOk?'\u2705':'\u274C'} ${verdictText}</div>`;
  html += `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">\u{1F4D6} DS/HD 60364-6 \u00a76.4.3.4 \u00b7 Tabel 6A</div>`;
  html += `</div>`;

  html += `</div>`;
  return html;
}

// ===== SELECTIVE COORDINATION MAP (DS/HD 60364-4-43 §435) =====
function buildSelectiveMap(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  const STD=[6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const nextStd=(v)=>STD.find(x=>x>=v)||STD[STD.length-1];
  const K=90;
  // Transformer info
  let kVAv = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().kVA||0) : 0;
  if(!(kVAv>0)){ kVAv = cons.reduce((a,cc)=>a+(cc.kW||0),0)/0.9; }
  const trafoK = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=kVAv)||630) : 630;
  const uk = (typeof TRAFO_UK!=='undefined' && TRAFO_UK[trafoK]) ? (TRAFO_UK[trafoK]/100) : 0.04;
  const Ik = trafoK*1000/(Math.sqrt(3)*400*uk);
  // Main device
  let mainIb = 0;
  let pT={L1:0,L2:0,L3:0}; cons.forEach(cc=>{const x=lsConsumerCurrent(cc);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;});
  mainIb=Math.max(pT.L1,pT.L2,pT.L3);
  const firstMcb = recommendMCBs(cons[0]?(Math.max(...Object.values(lsConsumerCurrent(cons[0])).filter(v=>typeof v==='number'))):16,10)[0];
  const firstIn = firstMcb?firstMcb.rating:16;
  mainIb = Math.max(mainIb, firstIn*1.25);
  const mainType = mainIb<=63 ? 'mcb' : 'fuse';
  const Inm = Math.max(nextStd(mainIb), nextStd(firstIn));
  const IaM = 10*Inm;
  const mainLbl = mainType==='mcb' ? ('C'+Inm+'A') : ('gG '+Inm+'A');
  const mainIcu = mainType==='mcb' ? 10 : 120;
  const tMain = (I)=> mainType==='mcb'
    ? (I>=IaM?0.02:(I>1.13*Inm?K/((I/Inm)*(I/Inm)-1):Infinity))
    : Math.min(1000, Math.max(0.004, 1056*Math.pow(I/Inm,-4.72)));
  // Build branch data
  const branches = [];
  cons.forEach((c,i)=>{
    const ci = lsConsumerCurrent(c);
    const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
    const mcb = recommendMCBs(cIb,10)[0];
    if(!mcb) return;
    const In = mcb.rating, curve = mcb.curve||'C';
    const m = curve==='B'?5:curve==='D'?20:10, Ia = m*In;
    const autoL = (c.dist && c.dist>0) ? c.dist : 25;
    const L = sldRunLen>0 ? sldRunLen : autoL;
    const cab = recommendCables(cIb)[0];
    const Rkm = cab ? (cab.r!=null?cab.r:(cab.R||0)) : 0;
    const R1R2 = 2*Rkm*(L/1000);
    const Ze = sldEarthing==='TN-C-S'?0.35 : sldEarthing==='TN-S'?0.80 : sldEarthing==='TT'?20 : 0;
    const measZs = sldMeasZsFactor*(Ze+R1R2), Uo=230, Cmin=0.95;
    let If;
    if(sldEarthing==='IT' && !sldITSecond){ If=0.5; }
    else if(sldEarthing==='IT' && sldITSecond){ If=400/(2*R1R2+0.3); }
    else { If=(Cmin*Uo)/measZs; }
    let tBranch;
    if(If>=Ia) tBranch=0.02;
    else if(If>1.13*In) tBranch=K/((If/In)*(If/In)-1);
    else tBranch=Infinity;
    const tM = tMain(If);
    let ratio = isFinite(tM)&&isFinite(tBranch)&&tBranch>0 ? tM/tBranch : 999;
    let status, color;
    if(!isFinite(tBranch)){ status='rcd'; color='#ffd166'; }
    else if(ratio>=1.5){ status='sel'; color='#06d6a0'; }
    else if(ratio>=1.0){ status='backup'; color='#ffd166'; }
    else { status='no'; color='#ef476f'; }
    branches.push({name:c.name||('K'+(i+1)), lbl:curve+In+'A', icu:mcb.icu||6, If:If, tBranch, tM, ratio, status, color});
  });
  // SVG tree diagram
  const svgW = 500, nodeH = 50, gapY = 70;
  const nBr = Math.max(branches.length,1);
  const svgH = 80 + gapY + nodeH + 60;
  const brSpacing = Math.min(90, (svgW-60)/nBr);
  const brStartX = (svgW - (nBr-1)*brSpacing)/2;
  // Build SVG
  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;max-width:500px;height:auto;margin:10px auto;display:block;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(0,200,255,0.15)">`;
  // Transformer node (top center)
  const txX = svgW/2, txY = 35;
  svg += `<rect x="${txX-45}" y="${txY-18}" width="90" height="36" rx="8" fill="#1a1a2e" stroke="#00c8ff" stroke-width="2"/>`;
  svg += `<text x="${txX}" y="${txY-4}" text-anchor="middle" fill="#00c8ff" font-size="8" font-weight="700">${da?'TRAFO':'TRANSFORMER'}</text>`;
  svg += `<text x="${txX}" y="${txY+10}" text-anchor="middle" fill="#aaa" font-size="7">${trafoK} kVA / Ik=${(Ik/1000).toFixed(1)}kA</text>`;
  // Main device node (middle)
  const mainX = svgW/2, mainY = txY + gapY;
  svg += `<line x1="${txX}" y1="${txY+18}" x2="${mainX}" y2="${mainY-18}" stroke="#00c8ff" stroke-width="2" stroke-dasharray="4,2"/>`;
  svg += `<rect x="${mainX-50}" y="${mainY-18}" width="100" height="36" rx="8" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>`;
  svg += `<text x="${mainX}" y="${mainY-4}" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="700">${da?'HOVED':'MAIN'}: ${mainLbl}</text>`;
  svg += `<text x="${mainX}" y="${mainY+10}" text-anchor="middle" fill="#aaa" font-size="7">Icu=${mainIcu}kA</text>`;
  // Branch device nodes
  const brY = mainY + gapY;
  branches.forEach((b,i)=>{
    const bx = brStartX + i*brSpacing;
    // Line from main to branch
    svg += `<line x1="${mainX}" y1="${mainY+18}" x2="${bx}" y2="${brY-18}" stroke="${b.color}" stroke-width="2"/>`;
    // Ratio label at midpoint
    const mx = (mainX+bx)/2, my = (mainY+18+brY-18)/2;
    const ratioTxt = b.status==='rcd'?'RCD':(isFinite(b.ratio)?b.ratio.toFixed(1)+'x':'--');
    svg += `<rect x="${mx-14}" y="${my-7}" width="28" height="14" rx="4" fill="rgba(0,0,0,0.7)" stroke="${b.color}" stroke-width="1"/>`;
    svg += `<text x="${mx}" y="${my+3}" text-anchor="middle" fill="${b.color}" font-size="7" font-weight="700">${ratioTxt}</text>`;
    // Branch node box
    svg += `<rect x="${bx-35}" y="${brY-16}" width="70" height="32" rx="7" fill="#1a1a2e" stroke="${b.color}" stroke-width="1.5"/>`;
    svg += `<text x="${bx}" y="${brY-3}" text-anchor="middle" fill="${b.color}" font-size="7" font-weight="600">${b.name}</text>`;
    svg += `<text x="${bx}" y="${brY+9}" text-anchor="middle" fill="#aaa" font-size="6.5">${b.lbl} / ${b.icu}kA</text>`;
  });
  // Legend
  const legY = brY + 28;
  svg += `<circle cx="30" cy="${legY}" r="5" fill="#06d6a0"/>`;
  svg += `<text x="40" y="${legY+3}" fill="#aaa" font-size="7">${da?'Selektiv':'Selective'}</text>`;
  svg += `<circle cx="120" cy="${legY}" r="5" fill="#ffd166"/>`;
  svg += `<text x="130" y="${legY+3}" fill="#aaa" font-size="7">${da?'Back-up':'Back-up'}</text>`;
  svg += `<circle cx="210" cy="${legY}" r="5" fill="#ef476f"/>`;
  svg += `<text x="220" y="${legY+3}" fill="#aaa" font-size="7">${da?'Ikke selektiv':'Not selective'}</text>`;
  svg += `</svg>`;
  // Summary counts
  const selCount = branches.filter(b=>b.status==='sel').length;
  const backCount = branches.filter(b=>b.status==='backup'||b.status==='rcd').length;
  const noCount = branches.filter(b=>b.status==='no').length;
  const allSel = noCount===0 && backCount===0;
  const verdictColor = allSel ? 'var(--success)' : noCount>0 ? 'var(--danger)' : '#ffd166';
  const verdictText = allSel
    ? (da?'Fuld selektivitet opnaaet for alle kredse':'Full selectivity achieved for all circuits')
    : noCount>0
      ? (da?'Ikke fuld selektivitet -- overvej stoerre hovedvaern eller tidsforsinket udloeser':'Not fully selective -- consider larger main device or time-delayed trip')
      : (da?'Delvis selektivitet -- back-up koordination kraeves':'Partial selectivity -- back-up coordination required');
  let html = `<div class="card fade-in"><div class="card-title">\uD83D\uDDFA\uFE0F ${da?'Selektivitetskort':'Selectivity map'} \u00b7 \u23DA ${sldEarthing}</div>`;
  html += `<div class="info-row" style="margin-bottom:8px">${da?'Visuelt hierarki: trafo \u2192 hovedvaern \u2192 grenvaern. Linjefarve viser selektivitetsstatus. Ratio = hovedtid / grentid ved fejlstroem.':'Visual hierarchy: transformer \u2192 main device \u2192 branch devices. Line colour shows selectivity status. Ratio = main time / branch time at fault current.'}</div>`;
  html += svg;
  html += `<div class="result-box" style="margin-top:10px"><div class="result-row"><span class="label">${da?'Selektive':'Selective'}</span><span class="value" style="color:#06d6a0">${selCount}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Back-up / RCD':'Back-up / RCD'}</span><span class="value" style="color:#ffd166">${backCount}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Ikke selektive':'Not selective'}</span><span class="value" style="color:#ef476f">${noCount}</span></div></div>`;

  html += `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">\uD83D\uDCD6 DS/HD 60364-4-43 \u00A7435 \u00b7 ${da?'Selektivitet':'Selectivity'}</div>`;
  html += `</div></div>`;
  return html;
}

// ===== TOUCH VOLTAGE ANALYSIS (DS/HD 60364-4-41 §411.3.3) =====
function buildTouchVoltage(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  let idx = (sldFaultRow>=0 && sldFaultRow<cons.length) ? sldFaultRow : 0;
  const c = cons[idx];
  const ci = lsConsumerCurrent(c);
  const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
  const cab = recommendCables(cIb)[0];
  const mcb = recommendMCBs(cIb,10)[0];
  if(!mcb) return '';
  const In = mcb.rating, curve = mcb.curve||'C';
  const m = curve==='B'?5:curve==='D'?20:10, Ia = m*In, K=90;
  const autoL = (c.dist && c.dist>0) ? c.dist : 25;
  const L = sldRunLen>0 ? sldRunLen : autoL;
  const Rkm = cab ? (cab.r!=null?cab.r:(cab.R||0)) : 0;
  const R1R2 = 2*Rkm*(L/1000);
  const Ze = sldEarthing==='TN-C-S'?0.35 : sldEarthing==='TN-S'?0.80 : sldEarthing==='TT'?20 : 0;
  const measZs = sldMeasZsFactor*(Ze+R1R2), Uo=230, Cmin=0.95;
  // Fault current
  let Ief;
  if(sldEarthing==='IT' && !sldITSecond){ Ief=0.5; }
  else if(sldEarthing==='IT' && sldITSecond){ Ief=400/(2*R1R2+0.3); }
  else { Ief=(Cmin*Uo)/measZs; }
  // Touch voltage calculation
  // TT: Ut = Ief * RA (earth electrode resistance)
  // TN: Ut = Ief * Zpe (PE impedance)
  const RA = sldEarthing==='TT' ? Ze : (R1R2/2); // TT uses full Ze as earth electrode, TN uses PE impedance
  const Ut = Ief * RA;
  // Safe limit
  const limit = tvLocType==='special' ? 25 : 50;
  // Disconnection time
  let tDisc;
  if(Ief>=Ia) tDisc=0.02;
  else if(Ief>1.13*In) tDisc=K/((Ief/In)*(Ief/In)-1);
  else tDisc=Infinity;
  // Has RCD?
  const hasRCD = sldEarthing==='TT' || sldEarthing==='TN-S';
  const rcdTrip = hasRCD ? 0.03 : null; // 30mA RCD trips in ~30ms
  const effectiveTrip = hasRCD ? Math.min(tDisc, 0.2) : tDisc;
  // Required time per DS/HD 60364-4-41
  const tReq = limit<=25 ? 0.2 : (sldEarthing.startsWith('TN') ? 0.4 : 0.2);
  // Verdict
  const utOk = Ut < limit;
  const timeOk = isFinite(effectiveTrip) && effectiveTrip <= tReq;
  const safe = utOk || timeOk; // Safe if under limit OR cleared fast enough
  const verdictColor = safe ? 'var(--success)' : 'var(--danger)';
  const verdictText = safe
    ? (da?'Sikkert -- Ut < graense og/eller afbrudt inden for kraevet tid':'Safe -- Ut < limit and/or cleared within required time')
    : (da?'Farligt -- Ut overstiger graense og afbrydelse for langsom':'Dangerous -- Ut exceeds limit or clearing too slow');
  // SVG visualization: person touching faulted equipment
  const svgW = 420, svgH = 280;
  const utNorm = Math.min(Ut/limit, 2.5); // normalized for bar height
  const barH = Math.min(utNorm * 80, 200);
  const barColor = safe ? '#06d6a0' : '#ef476f';
  const personColor = safe ? '#00c8ff' : '#ef476f';
  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;max-width:420px;height:auto;margin:10px auto;display:block;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(0,200,255,0.15)">`;
  // Equipment box (faulted)
  svg += `<rect x="60" y="80" width="80" height="120" rx="6" fill="#1a1a2e" stroke="#ef476f" stroke-width="2"/>`;
  svg += `<text x="100" y="110" text-anchor="middle" fill="#ef476f" font-size="9" font-weight="700">\u26A1 ${da?'FEJL':'FAULT'}</text>`;
  svg += `<text x="100" y="130" text-anchor="middle" fill="#aaa" font-size="7.5">Ief = ${Ief<1?Ief.toFixed(2):Ief.toFixed(1)} A</text>`;
  svg += `<text x="100" y="145" text-anchor="middle" fill="#aaa" font-size="7.5">${c.name||('K'+(idx+1))}</text>`;
  // Person figure (stick figure)
  svg += `<circle cx="180" cy="90" r="12" fill="none" stroke="${personColor}" stroke-width="2"/>`;
  svg += `<line x1="180" y1="102" x2="180" y2="155" stroke="${personColor}" stroke-width="2"/>`;
  svg += `<line x1="180" y1="115" x2="140" y2="130" stroke="${personColor}" stroke-width="2"/>`;
  svg += `<line x1="180" y1="115" x2="200" y2="105" stroke="${personColor}" stroke-width="2"/>`;
  svg += `<line x1="180" y1="155" x2="170" y2="190" stroke="${personColor}" stroke-width="2"/>`;
  svg += `<line x1="180" y1="155" x2="190" y2="190" stroke="${personColor}" stroke-width="2"/>`;
  // Hand touching equipment
  svg += `<line x1="140" y1="130" x2="140" y2="135" stroke="${personColor}" stroke-width="2" stroke-dasharray="3,2"><animate attributeName="opacity" values="1;0.4;1" dur="0.8s" repeatCount="indefinite"/></line>`;
  // Ground connection from feet
  svg += `<line x1="180" y1="190" x2="180" y2="210" stroke="#06d6a0" stroke-width="1.5"/>`;
  svg += earthSymbol(180, 220, '#06d6a0');
  // Current path arrow
  svg += `<path d="M 100,200 L 100,240 L 180,240 L 180,210" fill="none" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="4,3"><animate attributeName="stroke-dashoffset" values="0;14" dur="0.6s" repeatCount="indefinite"/></path>`;
  svg += `<text x="140" y="252" text-anchor="middle" fill="#ffd166" font-size="7">${da?'Fejlstroem via jord':'Fault current via earth'}</text>`;
  // Voltage level indicator (bar chart on right)
  const barX = 300, barBaseY = 240, limitY = barBaseY - (limit/Ut)*barH;
  svg += `<rect x="${barX}" y="${barBaseY-barH}" width="30" height="${barH}" rx="4" fill="${barColor}" opacity="0.3" stroke="${barColor}" stroke-width="1.5"/>`;
  svg += `<text x="${barX+15}" y="${barBaseY-barH-8}" text-anchor="middle" fill="${barColor}" font-size="10" font-weight="700">Ut=${Ut.toFixed(1)}V</text>`;
  // Limit line
  const limLineY = Math.max(barBaseY - barH, barBaseY - (limit/(Ut||1))*barH);
  svg += `<line x1="${barX-10}" y1="${limLineY}" x2="${barX+40}" y2="${limLineY}" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="4,2"/>`;
  svg += `<text x="${barX+50}" y="${limLineY+4}" fill="#ffd166" font-size="8">${limit}V ${da?'graense':'limit'}</text>`;
  svg += `<text x="${barX+15}" y="${barBaseY+14}" text-anchor="middle" fill="#aaa" font-size="7">${da?'Spaendingsniveau':'Voltage level'}</text>`;
  // Timeline on far right
  const tlX = 380, tlTop = 80, tlBot = 240;
  svg += `<line x1="${tlX}" y1="${tlTop}" x2="${tlX}" y2="${tlBot}" stroke="#555" stroke-width="1"/>`;
  svg += `<text x="${tlX}" y="${tlTop-5}" text-anchor="middle" fill="#aaa" font-size="7">${da?'Tid':'Time'}</text>`;
  svg += `<circle cx="${tlX}" cy="${tlTop+20}" r="3" fill="#ef476f"/>`;
  svg += `<text x="${tlX+8}" y="${tlTop+23}" fill="#ef476f" font-size="6.5" text-anchor="start">${da?'Fejl opstaar':'Fault occurs'}</text>`;
  if(hasRCD){
    svg += `<circle cx="${tlX}" cy="${tlTop+70}" r="3" fill="#ffd166"/>`;
    svg += `<text x="${tlX+8}" y="${tlTop+73}" fill="#ffd166" font-size="6.5" text-anchor="start">${da?'HPFI detekterer':'RCD detects'}</text>`;
  }
  svg += `<circle cx="${tlX}" cy="${tlTop+120}" r="3" fill="#06d6a0"/>`;
  svg += `<text x="${tlX+8}" y="${tlTop+123}" fill="#06d6a0" font-size="6.5" text-anchor="start">${da?'Afbrydelse':'Trip'} ${isFinite(effectiveTrip)?effectiveTrip.toFixed(2)+'s':'\u221E'}</text>`;
  svg += `</svg>`;
  // Build output
  let html = `<div class="card fade-in"><div class="card-title">\u26A1 ${da?'Beroeringssp\u00E6nding':'Touch voltage'} \u00b7 \u23DA ${sldEarthing}</div>`;
  html += `<div class="info-row" style="margin-bottom:8px">${da?'Beregner prospektiv beroeringssp\u00E6nding under fejl og sammenligner med sikkerhedsgraensen (50V normal / 25V vaadomraader). Personens eksponering afhaenger af afbrydelsestiden.':'Calculates prospective touch voltage during fault and compares against safety limit (50V normal / 25V wet areas). Person exposure depends on disconnection time.'}</div>`;
  // Location type selector
  html += `<div class="select-group" style="margin-bottom:10px"><div class="select-label">${da?'Lokationstype':'Location type'}</div><div class="select-grid">`;
  html += `<button class="sel-btn ${tvLocType==='normal'?'selected':''}" onclick="tvSetLoc('normal')">\uD83C\uDFE2 ${da?'Normal (50V)':'Normal (50V)'}</button>`;
  html += `<button class="sel-btn ${tvLocType==='special'?'selected':''}" onclick="tvSetLoc('special')">\uD83D\uDEBF ${da?'Speciel (25V) - bad/pool/byggeplads':'Special (25V) - bathroom/pool/construction'}</button>`;
  html += `</div></div>`;
  html += svg;
  html += `<div class="result-box" style="margin-top:10px">`;
  html += `<div class="result-row"><span class="label">Ut (${da?'beroeringssp\u00E6nding':'touch voltage'})</span><span class="value" style="color:${utOk?'var(--success)':'var(--danger)'};">${Ut.toFixed(1)} V</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Sikkerhedsgraense':'Safety limit'}</span><span class="value">${limit} V (${tvLocType==='special'?(da?'speciel':'special'):(da?'normal':'normal')})</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Afbrydelsestid':'Disconnection time'}</span><span class="value">${isFinite(effectiveTrip)?effectiveTrip.toFixed(3)+' s':'\u221E'}</span></div>`;
  html += `<div class="result-row"><span class="label">${da?'Kraevet tid':'Required time'}</span><span class="value">${tReq} s</span></div>`;
  html += `<div class="result-row"><span class="label">Ief</span><span class="value">${Ief<1?Ief.toFixed(2):Ief.toFixed(1)} A</span></div>`;
  html += `<div class="result-row"><span class="label">${sldEarthing==='TT'?'RA':'Zpe'}</span><span class="value">${RA.toFixed(3)} \u03A9</span></div>`;
  html += `</div>`;
  // Verdict
  html += `<div style="margin-top:10px;padding:10px 14px;border-radius:8px;border:1.5px solid ${verdictColor};background:rgba(0,0,0,0.2)">`;
  html += `<div style="font-weight:700;color:${verdictColor};font-size:0.9rem">${safe?'\u2705':'\u274C'} ${verdictText}</div>`;
  html += `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">\uD83D\uDCD6 DS/HD 60364-4-41 \u00A7411.3.3 \u00b7 ${da?'Beroeringssp\u00E6nding':'Touch voltage'}</div>`;
  html += `</div></div>`;
  return html;
}

// ===== DOCUMENTATION COMPLETENESS CHECKLIST (DS/HD 60364-6 §6.1 + BEK 1082) =====
function buildDocChecklist(){
  const da = lang==='da';
  const items = [
    {key:'sld', da:'Enstregsdiagram', en:'Single-line diagram'},
    {key:'cables', da:'Kabelfortegnelse', en:'Cable schedule'},
    {key:'coord', da:'Koordinationsstudie (selektivitet)', en:'Protection coordination study'},
    {key:'testCont', da:'Testprotokol - kontinuitet', en:'Test protocol - continuity'},
    {key:'testIns', da:'Testprotokol - isolationsmodstand', en:'Test protocol - insulation resistance'},
    {key:'testZs', da:'Testprotokol - sloejfeimpedans (Zs)', en:'Test protocol - loop impedance (Zs)'},
    {key:'testRcd', da:'Testprotokol - HPFI/RCD', en:'Test protocol - RCD'},
    {key:'asbuilt', da:'As-built tegninger', en:'As-built drawings'},
    {key:'datasheets', da:'Produktdatablade', en:'Product data sheets'},
    {key:'maint', da:'Vedligeholdelsesinstruktioner', en:'Maintenance instructions'},
    {key:'risk', da:'Risikovurdering', en:'Risk assessment'},
    {key:'decl', da:'Overensstemmelseserkl\u00E6ring (EU)', en:'Declaration of conformity (EU)'}
  ];

  let passCount = 0, failCount = 0, naCount = 0;
  items.forEach(it=>{

    if(v==='pass') passCount++;
    else if(v==='fail') failCount++;
    else if(v==='na') naCount++;
  });
  const answeredCount = passCount + failCount + naCount;
  const applicableCount = totalItems - naCount;
  const pct = applicableCount > 0 ? Math.round((passCount / applicableCount)*100) : 0;
  const allDone = passCount === applicableCount && applicableCount > 0 && failCount === 0;

  const barColor = pct>=100 ? '#06d6a0' : pct>=60 ? '#ffd166' : '#ef476f';
