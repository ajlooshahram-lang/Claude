// ===== COMPONENT BANK MODULE =====
// Browsable bank of ALL electrical components available in the Danish market
let bankCategory = 'cables';
let bankBrand = 'all';

// ===== REAL PHOTO SYSTEM =====
// Shows ACTUAL product photographs via <img>, with SVG illustration as automatic
// fallback when a photo URL is missing or fails to load (offline/broken link).
//
// Photos are loaded from a licensed image source you configure (e.g. your B2B
// wholesaler product feed - Lemvigh-Müller / Solar - or a folder of licensed photos).
// Per-product photos can be set via the product's `img` field; per-category
// defaults live in COMPONENT_PHOTOS. Nothing copyrighted is bundled in the file.

let PHOTO_BASE = localStorage.getItem('photoBase') || ''; // optional: your own per-model feed
let PHOTOS_ENABLED = localStorage.getItem('photosEnabled') !== '0'; // real photos ON by default

// Real, Creative-Commons-licensed product photographs (Wikimedia Commons).
// Special:FilePath redirects to the actual image file; ?width thumbnails for speed.
// Images CC BY-SA / CC0 via Wikimedia Commons. SVG illustration is the offline fallback.
const WM = 'https://commons.wikimedia.org/wiki/Special:FilePath/';
const COMPONENT_PHOTOS = {
  cables: WM + 'Copper%20cable%205G16.JPG?width=200',
  mcbs: WM + 'MCB%20Hager%20C10.jpg?width=200',
  mccbs: WM + 'MCCB%20Merlin%20Gerin%20compact%20NS100N%20(front%20side).jpg?width=200',
  fuses: WM + 'NH%20000%2000.jpg?width=200',
  rcds: WM + 'Differential%20residual%20current%20circuit%20interrupter.JPG?width=200',
  rcbos: WM + 'ABB%20RCBO.jpg?width=200',
  spds: WM + '1-phase%20surge%20arrester.JPG?width=200',
  contactors: WM + 'GE%20MC2A310AT1.JPG?width=200',
  mpcbs: WM + 'Motor%20protective%20circuit%20breaker%20with%20symbol.JPG?width=200',
  overloadRelays: WM + 'GE%20MTO3N.JPG?width=200',
  wiringDevices: WM + 'Danish%20type%20K%20Power%20Socket.jpg?width=200'
};

// Resolves a photo URL and whether it is the EXACT product photo or a
// REPRESENTATIVE category photo. Returns { url, exact } or null.
function photoUrlFor(category, p) {
  if (!PHOTOS_ENABLED) return null;
  // 1) explicit per-product photo (exact)
  if (p && p.img) return { url: /^https?:/.test(p.img) ? p.img : (PHOTO_BASE + p.img), exact: true };
  // 2) connected feed -> resolve the EXACT photo per model.
  //    PHOTO_BASE may be a pattern with placeholders {id} {ref} {brand} {model},
  //    or a plain base URL to which "<id>.jpg" is appended.
  if (PHOTO_BASE && p) {
    let url;
    if (PHOTO_BASE.indexOf('{') >= 0) {
      url = PHOTO_BASE
        .replace(/\{id\}/g, encodeURIComponent(p.id || ''))
        .replace(/\{ref\}/g, encodeURIComponent(p.ref || p.id || ''))
        .replace(/\{brand\}/g, encodeURIComponent(p.brand || ''))
        .replace(/\{model\}/g, encodeURIComponent(p.model || ''));
    } else {
      url = PHOTO_BASE + encodeURIComponent(p.ref || p.id || '') + '.jpg';
    }
    return { url, exact: true };
  }
  // 3) per-category default (representative, not the exact model)
  const c = COMPONENT_PHOTOS[category];
  if (c) return { url: /^https?:/.test(c) ? c : (PHOTO_BASE + c), exact: false };
  return null;
}

// Returns a real <img> photo (with SVG fallback) or the SVG illustration.
// Representative (non-exact) photos get an honest "~" badge.
function getComponentVisual(category, p) {
  const res = photoUrlFor(category, p);
  const svg = getComponentSvg(category, p);
  if (!res) return svg;
  const fid = 'ph' + Math.random().toString(36).slice(2, 9);
  const badge = res.exact ? '' :
    `<span title="${tx('Repr\u00E6sentativt billede (ikke n\u00F8jagtig model)', 'Representative image (not the exact model)')}"
       style="position:absolute;bottom:-3px;right:-3px;background:var(--warning);color:#5a4500;font-size:8px;font-weight:700;padding:1px 3px;border-radius:4px;line-height:1.2">~</span>`;
  return `<span style="position:relative;display:inline-flex;flex-shrink:0">
    <img src="${res.url}" alt="${(p && p.model) || ''}" width="56" height="56" loading="lazy"
      style="object-fit:cover;border-radius:8px;border:1px solid var(--border)"
      onerror="this.style.display='none';var f=document.getElementById('${fid}');if(f)f.style.display='inline-flex'">
    <span id="${fid}" style="display:none">${svg}</span>
    ${badge}
  </span>`;
}

function configurePhotos() {
  const msg = tx('Indtast URL-m\u00F8nster til dit licenserede billedfeed, s\u00E5 hvert produkt viser SIT eget foto.\n\nBrug pladsholdere: {ref} {id} {brand} {model}\nEksempel: https://feed.lemu.dk/img/{ref}.jpg\n\n(Tomt = brug repr\u00E6sentative fotos)', 'Enter a URL pattern for your licensed image feed so each product shows ITS OWN photo.\n\nUse placeholders: {ref} {id} {brand} {model}\nExample: https://feed.lemu.dk/img/{ref}.jpg\n\n(Empty = use representative photos)');
  const base = prompt(msg, PHOTO_BASE);
  if (base === null) return;
  PHOTO_BASE = base.trim();
  PHOTOS_ENABLED = true; // representative photos still show when base is empty
  localStorage.setItem('photoBase', PHOTO_BASE);
  localStorage.setItem('photosEnabled', '1');
  renderModule(activeModule);
}

// ===== COMPONENT VISUALS (code-generated SVG illustrations - fallback) =====
// License-safe, offline, scalable illustrations of each real component type.
function getComponentSvg(category, p) {
  const w = 64, h = 64;
  const wrap = (inner) => `<svg viewBox="0 0 ${w} ${h}" width="56" height="56" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;border-radius:8px;background:linear-gradient(135deg,#f8fafc,#eef3f8);border:1px solid var(--border)">${inner}</svg>`;

  switch (category) {
    case 'cables': {
      // Cable cross-section: sheath + colored cores
      const coreColors = ['#8b5a2b', '#1b2838', '#9aa5b1', '#2980b9', '#27ae60']; // L1,L2,L3,N,PE(green)
      const isAl = p.material === 'Al';
      const sheath = isAl ? '#000' : '#1b1b1b';
      let cores = '';
      const positions = [[26,26],[38,26],[26,38],[38,38],[32,32]];
      for (let i = 0; i < 5; i++) {
        const c = i === 4 ? '#27ae60' : coreColors[i];
        cores += `<circle cx="${positions[i][0]}" cy="${positions[i][1]}" r="5" fill="${c}" stroke="#fff" stroke-width="0.8"/>`;
      }
      return wrap(`<circle cx="32" cy="32" r="22" fill="${sheath}"/><circle cx="32" cy="32" r="22" fill="none" stroke="#444" stroke-width="1"/>${cores}<text x="32" y="58" font-size="7" fill="${isAl?'#888':'#b87333'}" text-anchor="middle" font-family="monospace">${isAl?'Al':'Cu'}</text>`);
    }
    case 'mcbs':
    case 'rcbos': {
      // DIN-rail module with toggle
      const body = category === 'rcbos' ? '#e8eef5' : '#f5f5f0';
      return wrap(`<rect x="22" y="8" width="20" height="48" rx="2" fill="${body}" stroke="#9aa5b1"/><rect x="26" y="12" width="12" height="14" rx="1" fill="#1a5276"/><rect x="29" y="16" width="6" height="14" rx="1" fill="#fff" stroke="#1a5276"/><rect x="24" y="44" width="16" height="3" fill="#c0c0c0"/><rect x="24" y="49" width="16" height="3" fill="#c0c0c0"/><text x="32" y="40" font-size="6" fill="#333" text-anchor="middle" font-family="monospace">${(p.curve||'')+(p.rating||'')}</text>`);
    }
    case 'mccbs': {
      // Moulded case breaker (larger black block)
      return wrap(`<rect x="14" y="10" width="36" height="44" rx="3" fill="#222" stroke="#000"/><rect x="20" y="16" width="24" height="18" rx="2" fill="#333"/><circle cx="32" cy="25" r="6" fill="#1a5276"/><rect x="29" y="20" width="6" height="10" rx="1" fill="#ffd166"/><rect x="20" y="40" width="24" height="6" rx="1" fill="#444"/><text x="32" y="51" font-size="6" fill="#fff" text-anchor="middle" font-family="monospace">NSX</text>`);
    }
    case 'fuses': {
      const isNH = (p.size||'').indexOf('NH') === 0;
      if (isNH) {
        // NH knife-blade fuse
        return wrap(`<rect x="20" y="16" width="24" height="32" rx="2" fill="#d9c8a0" stroke="#a89668"/><rect x="26" y="10" width="5" height="8" fill="#888"/><rect x="33" y="10" width="5" height="8" fill="#888"/><rect x="26" y="46" width="5" height="8" fill="#888"/><rect x="33" y="46" width="5" height="8" fill="#888"/><circle cx="32" cy="32" r="4" fill="#c0392b"/><text x="32" y="34" font-size="5" fill="#fff" text-anchor="middle" font-family="monospace">${p.rating}</text>`);
      }
      // D-fuse (screw-in, ceramic)
      return wrap(`<circle cx="32" cy="32" r="18" fill="#e8dcc0" stroke="#a89668"/><circle cx="32" cy="32" r="10" fill="#fff" stroke="#a89668"/><circle cx="32" cy="32" r="4" fill="${p.rating<=16?'#27ae60':p.rating<=25?'#9aa5b1':'#c0392b'}"/><text x="32" y="54" font-size="7" fill="#7a6a45" text-anchor="middle" font-family="monospace">D${p.rating}A</text>`);
    }
    case 'rcds': {
      // RCD module with test button
      return wrap(`<rect x="18" y="8" width="28" height="48" rx="2" fill="#f5f5f0" stroke="#9aa5b1"/><rect x="22" y="12" width="20" height="12" rx="1" fill="#1a5276"/><rect x="26" y="14" width="5" height="16" rx="1" fill="#fff" stroke="#1a5276"/><rect x="34" y="27" width="7" height="5" rx="1" fill="#27ae60"/><text x="37.5" y="31" font-size="3.5" fill="#fff" text-anchor="middle" font-family="monospace">T</text><text x="32" y="44" font-size="6" fill="#333" text-anchor="middle" font-family="monospace">${p.sensitivity}mA</text>`);
    }
    case 'spds': {
      // SPD with status window (green)
      return wrap(`<rect x="18" y="8" width="28" height="48" rx="2" fill="#2c3e50" stroke="#1b2838"/><rect x="23" y="14" width="18" height="12" rx="1" fill="#27ae60"/><rect x="23" y="30" width="18" height="12" rx="1" fill="#27ae60"/><text x="32" y="51" font-size="6" fill="#fff" text-anchor="middle" font-family="monospace">${(p.spdType||'').replace('Type ','T')}</text>`);
    }
    case 'contactors': {
      // Contactor block
      return wrap(`<rect x="16" y="10" width="32" height="44" rx="2" fill="#2b2b2b" stroke="#000"/><rect x="20" y="6" width="6" height="6" fill="#888"/><rect x="29" y="6" width="6" height="6" fill="#888"/><rect x="38" y="6" width="6" height="6" fill="#888"/><rect x="20" y="52" width="6" height="6" fill="#888"/><rect x="29" y="52" width="6" height="6" fill="#888"/><rect x="38" y="52" width="6" height="6" fill="#888"/><rect x="22" y="22" width="20" height="20" rx="1" fill="#3a3a3a"/><text x="32" y="35" font-size="7" fill="#ffd166" text-anchor="middle" font-family="monospace">${p.ac3_A}A</text>`);
    }
    case 'mpcbs': {
      // Motor protector with rotary dial
      return wrap(`<rect x="20" y="8" width="24" height="48" rx="2" fill="#1a1a1a" stroke="#000"/><circle cx="32" cy="24" r="9" fill="#333" stroke="#666"/><circle cx="32" cy="24" r="2" fill="#ffd166"/><line x1="32" y1="24" x2="32" y2="17" stroke="#ffd166" stroke-width="1.5"/><rect x="27" y="40" width="10" height="8" rx="1" fill="#c0392b"/><text x="32" y="46" font-size="4.5" fill="#fff" text-anchor="middle" font-family="monospace">M</text></svg>`.replace('</svg>',''));
    }
    case 'overloadRelays': {
      // Overload relay block
      return wrap(`<rect x="18" y="12" width="28" height="40" rx="2" fill="#2b2b2b" stroke="#000"/><circle cx="28" cy="26" r="6" fill="#333" stroke="#666"/><circle cx="28" cy="26" r="1.5" fill="#ffd166"/><rect x="37" y="22" width="6" height="5" rx="1" fill="#27ae60"/><rect x="37" y="30" width="6" height="5" rx="1" fill="#c0392b"/><text x="32" y="46" font-size="5.5" fill="#ffd166" text-anchor="middle" font-family="monospace">${p.rangeMax}A</text>`);
    }
    case 'wiringDevices': {
      if (p.cat === 'socket') {
        // Danish socket face (round, 2 holes + earth pins)
        return wrap(`<circle cx="32" cy="32" r="24" fill="#fff" stroke="#d0d6dd" stroke-width="2"/><circle cx="24" cy="30" r="3" fill="#333"/><circle cx="40" cy="30" r="3" fill="#333"/><path d="M28 42 h8" stroke="#888" stroke-width="3" stroke-linecap="round"/><path d="M22 40 v4 M42 40 v4" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>`);
      }
      // Switch face
      return wrap(`<rect x="14" y="10" width="36" height="44" rx="4" fill="#fff" stroke="#d0d6dd" stroke-width="2"/><rect x="22" y="18" width="20" height="28" rx="3" fill="#f0f3f7" stroke="#c0c8d0"/><rect x="22" y="18" width="20" height="14" rx="3" fill="#e2e8f0"/>`);
    }
    default:
      return wrap(`<rect x="16" y="16" width="32" height="32" rx="4" fill="#9aa5b1"/>`);
  }
}

function renderBank() {
  const categories = {
    cables: { da: 'Kabler', en: 'Cables', data: PRODUCTS.cables },
    mcbs: { da: 'Automatsikringer', en: 'MCBs', data: PRODUCTS.mcbs },
    mccbs: { da: 'Maksimalafbrydere', en: 'MCCBs', data: PRODUCTS.mccbs },
    fuses: { da: 'Smeltesikringer', en: 'Fuses', data: PRODUCTS.fuses },
    rcds: { da: 'HPFI / RCD', en: 'RCDs', data: PRODUCTS.rcds },
    rcbos: { da: 'HPFI-automater', en: 'RCBOs', data: PRODUCTS.rcbos },
    spds: { da: 'Overspændingsbeskyttelse', en: 'Surge Protection', data: PRODUCTS.spds },
    contactors: { da: 'Kontaktorer', en: 'Contactors', data: PRODUCTS.contactors },
    mpcbs: { da: 'Motorværn', en: 'Motor Protection', data: PRODUCTS.mpcbs },
    overloadRelays: { da: 'Termorelæer', en: 'Overload Relays', data: PRODUCTS.overloadRelays },
    wiringDevices: { da: 'Stik & Afbrydere', en: 'Sockets & Switches', data: PRODUCTS.wiringDevices }
  };

  const cat = categories[bankCategory];
  let items = cat.data;

  // Get unique brands for filter
  const brands = ['all', ...new Set(cat.data.map(p => p.brand))];

  // Filter by brand
  if (bankBrand !== 'all') {
    items = items.filter(p => p.brand === bankBrand);

  // Build rows based on category
  const rows = items.map(p => {
    let spec = '';
    if (bankCategory === 'cables') spec = `${p.cores} ${p.mm2} mm\u00B2 ${p.material} | Iz=${officialIz(p)}A`;
    else if (bankCategory === 'mcbs') spec = `${p.curve}${p.rating} ${p.poles} | Icu=${p.icu}kA | ${p.standard}`;
    else if (bankCategory === 'mccbs') spec = `${p.trip} | Icu=${p.icu}kA | In: ${p.inOptions.join('/')}A`;
    else if (bankCategory === 'fuses') spec = `${p.rating}A | ${p.size} | Icu=${p.icu}kA`;
    else if (bankCategory === 'rcds') spec = `${p.poles} ${p.rating}A | ${p.sensitivity}mA Type ${p.rcdType}`;
    else if (bankCategory === 'rcbos') spec = `${p.poles} ${p.curve}${p.rating} | ${p.sensitivity}mA | Icu=${p.icu}kA`;
    else if (bankCategory === 'spds') spec = `${p.spdType} ${p.poles} | Imax=${p.imax}kA | Up=${p.up}kV`;
    else if (bankCategory === 'contactors') spec = `AC-3: ${p.ac3_A}A / ${p.ac3_kW}kW`;
    else if (bankCategory === 'mpcbs') spec = `${p.rangeMin}-${p.rangeMax}A / ${p.kW}kW`;
    else if (bankCategory === 'overloadRelays') spec = `${p.rangeMin}-${p.rangeMax}A`;
    else if (bankCategory === 'wiringDevices') spec = `${p.rating}A | ${tl(p, 'desc')}`;

    const useText = p.use_da ? (tl(p, 'use')) : '';

    return `
      <div class="result-row" style="align-items:center;gap:12px">
        ${getComponentVisual(bankCategory, p)}
        <div style="flex:1;display:flex;flex-direction:column;gap:2px">
          <div style="display:flex;justify-content:space-between;width:100%;gap:8px">

  return `

// Call a live AI service for open-ended questions (online mode only)
async function askOnlineAI(question) {
  const cfg = JSON.parse(localStorage.getItem('aiElectricianCfg') || '{}');
  if (!cfg.endpoint || !cfg.key) {
    aiChat.push({ role: 'assistant', text: tx('Online AI er ikke konfigureret. Klik p\u00E5 "Indstil AI" for at tilslutte en AI-tjeneste (OpenAI-kompatibel).', 'Online AI is not configured. Click "Configure AI" to connect an AI service (OpenAI-compatible).') });
    aiBusy = false; renderModule('ai'); return;
  }
  aiBusy = true; renderModule('ai');
  const sysPrompt = tx('Du er en erfaren dansk autoriseret elektriker og ekspert i DS/HD 60364, Elsikkerhedsloven, Installationsbekendtgørelsen og Fællesregulativet. Svar præcist, sikkert og kortfattet på dansk. Henvis altid til relevante standarder. Hvis noget kræver en autoriseret elinstallatør, sig det.', 'You are an experienced Danish authorized electrician and expert in DS/HD 60364, the Electrical Safety Act, the Installation Order and Fællesregulativet. Answer precisely, safely and concisely in English. Always reference relevant standards. If something requires an authorized electrician, say so.');
  try {
    const res = await fetch(cfg.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.key },
      body: JSON.stringify({
        model: cfg.model || 'gpt-4o-mini',
        messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content: question }],
        temperature: 0.2
      })
    });
    const data = await res.json();
    const answer = data.choices && data.choices[0] && data.choices[0].message
      ? data.choices[0].message.content
      : (tx('Intet svar modtaget.', 'No answer received.'));
    aiChat.push({ role: 'assistant', text: answer });
  } catch (e) {
    aiChat.push({ role: 'assistant', text: (tx('Fejl ved forbindelse: ', 'Connection error: ')) + e.message });
  }
  aiBusy = false; renderModule('ai');
}

// ===== DYNAMIC LAW / STANDARDS UPDATE CHECK =====
// Danish electrical regulations are revised regularly. When online, the app can
// check a remote JSON manifest for newer standard versions/dates and notify the user.
// Default manifest is configurable; falls back silently offline.
// Default manifest is hosted in this repo; users can override via configureLawSource().
const LAW_MANIFEST_DEFAULT = 'https://raw.githubusercontent.com/ajlooshahram-lang/Claude/main/standards-manifest.json';
const _lawStored = localStorage.getItem('lawManifestUrl');
const LAW_MANIFEST_URL = _lawStored === 'off' ? '' : (_lawStored || LAW_MANIFEST_DEFAULT);
// Current built-in standards baseline (what the app was built against)
const STANDARDS_BASELINE = {
  checked: '2026-06-11',
  items: {
    'Elsikkerhedsloven': 'LBK nr 26 af 2023',
    'Installationsbekendtgørelsen': 'BEK nr 1082',
    'DS/HD 60364-5-52': '2011+A12:2022',
    'DS/HD 60364-4-43': '2023',
    'IEC 60364-1': '2025',
    'Fællesregulativet': '2019'
  }
};
let lawUpdateInfo = JSON.parse(localStorage.getItem('lawUpdateInfo') || 'null');

async function checkLawUpdates(manual) {
  if (!navigator.onLine) {
    if (manual) alert(tx('Ingen internetforbindelse. Pr\u00F8v igen, n\u00E5r du er online.', 'No internet connection. Try again when online.'));
    return;
  }
  const url = LAW_MANIFEST_URL;
  if (!url) {
    // No manifest configured: guide the user (no false claims of an update)
    if (manual) {
      const set = confirm(tx('Der er ikke konfigureret en opdateringskilde endnu.\n\nVil du angive en URL til et JSON-manifest med de nyeste danske standarder/love? (f.eks. fra Sikkerhedsstyrelsen eller din egen server)', 'No update source is configured yet.\n\nDo you want to set a URL to a JSON manifest with the latest Danish standards/laws? (e.g. from Sikkerhedsstyrelsen or your own server)'));
      if (set) configureLawSource();
    }
    return;
  }
  try {
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    // Compare manifest items vs baseline
    const changes = [];
    if (data && data.items) {
      Object.keys(data.items).forEach(k => {
        const latest = data.items[k];
        const current = STANDARDS_BASELINE.items[k];
        if (current && latest && latest !== current) {
          changes.push({ name: k, from: current, to: latest });
        } else if (!current && latest) {
          changes.push({ name: k, from: '\u2014', to: latest });
        }
      });
    }
    lawUpdateInfo = { date: new Date().toISOString().slice(0, 10), source: url, changes, manifestDate: data.checked || null };
    localStorage.setItem('lawUpdateInfo', JSON.stringify(lawUpdateInfo));
    if (activeModule === 'standards') renderModule('standards');
    if (manual) {
      alert(changes.length
        ? (lang === 'da' ? changes.length + ' opdatering(er) fundet. Se "Standarder".' : changes.length + ' update(s) found. See "Standards".')
        : (tx('Alle standarder er opdaterede.', 'All standards are up to date.')));
    }
  } catch (e) {
    if (manual) alert((tx('Kunne ikke hente opdateringer: ', 'Could not fetch updates: ')) + e.message);
  }
}

function configureLawSource() {
  const url = prompt(tx('URL til JSON-manifest med nyeste standarder (lad tom for at sl\u00E5 fra):', 'URL to JSON manifest with latest standards (leave empty to disable):'), LAW_MANIFEST_URL);
  if (url === null) return;
  localStorage.setItem('lawManifestUrl', url.trim() === '' ? 'off' : url.trim());
  location.reload();
}

// Auto-check once per day when online
(function autoLawCheck() {
  if (!LAW_MANIFEST_URL) return;
  const last = localStorage.getItem('lawCheckedAt');
  const today = new Date().toISOString().slice(0, 10);
  if (last !== today) {
    localStorage.setItem('lawCheckedAt', today);
    if (navigator.onLine) checkLawUpdates(false);
    else window.addEventListener('online', () => checkLawUpdates(false), { once: true });
  }
})();

// ===== BID / QUOTE ENGINE (connect to Danish wholesalers) =====
// Generates an initial project price ("tilbud") from a bill of materials.
//
// IMPORTANT - HONEST NOTE: Live, exact wholesaler prices are only available
// through authenticated B2B accounts (Lemvigh-Müller, Solar, Sanistål, AO).
// There is no public price API. So the app uses INDICATIVE reference prices
// (clearly labelled) out of the box, and lets you CONNECT your own B2B price
// feed per wholesaler for real, live, customer-specific pricing.

const WHOLESALERS = {
  'Lemvigh-Müller': { idx: 1.00, feed: '' },
  'Solar': { idx: 1.02, feed: '' },
  'Sanistål': { idx: 1.04, feed: '' },
  'AO': { idx: 1.03, feed: '' }
};
// EG Sigma / EG Kalkia compatibility: Danish trade calculation systems key
// products by EL-nr (unique Danish electrical product number) and import
// wholesaler price files (DLF / grossist prisfiler). The price-feed pattern
// supports {elnr} {ref} {id} so it can plug into the same data sources.

// Indicative unit prices in DKK ex. moms (rough Danish-market estimates).
// Cables are priced per metre; everything else per piece.
function priceFor(cat, p) {
  let v;
  if (cat === 'cables') {
    const base = {1.5:12,2.5:18,4:28,6:40,10:65,16:100,25:160,35:220,50:310,70:430,95:580,120:740,150:920,185:1150,240:1500};
    v = base[p.mm2] || 50;
    if (p.material === 'Al') v *= 0.6;
  } else if (cat === 'mcbs') {
    v = 80 + (p.rating || 16) * 1.5 + (p.icu >= 10 ? 45 : 0);
  } else if (cat === 'mccbs') {
    const f = {'NSX 100':1800,'NSX 160':2500,'NSX 250':3500,'NSX 400':6000,'NSX 630':8500};
    v = f[p.frame] || 2000;
  } else if (cat === 'fuses') {
    v = (p.size || '').indexOf('NH') === 0 ? 60 + p.rating * 0.5 : 20 + p.rating * 0.6;
  } else if (cat === 'rcds') {
    v = 400 + p.rating * 4 + (p.rcdType === 'B' ? 2500 : 0);
  } else if (cat === 'rcbos') {
    v = 350 + p.rating * 4;
  } else if (cat === 'spds') {
    v = (p.spdType || '').indexOf('1') >= 0 ? 2500 : 1200;
  } else if (cat === 'contactors') {
    v = 200 + (p.ac3_A || 9) * 12;
  } else if (cat === 'mpcbs') {
    v = (p.series || '').indexOf('GV3') >= 0 ? 1800 : 400 + (p.rangeMax || 6) * 8;
  } else if (cat === 'overloadRelays') {
    v = 300 + (p.rangeMax || 6) * 6;
  } else if (cat === 'wiringDevices') {
    v = p.cat === 'socket' ? 85 : 70;
  } else { v = 100; }
  return Math.round(v);
}

function findProduct(cat, id) {
  return (PRODUCTS[cat] || []).find(x => x.id === id);
}

// Akkord / montagetid: indicative standard installation time (minutes per unit),
// like the Danish akkord-tidsfortegnelse that EG Sigma / EG Kalkia use to derive labor.
// Cables are per metre; everything else per piece.
const MONTAGETID = {
  cables: 3, mcbs: 8, mccbs: 25, fuses: 5, rcds: 12, rcbos: 12,
  spds: 20, contactors: 20, mpcbs: 20, overloadRelays: 12, wiringDevices: 18
};
function montagetidFor(cat) { return MONTAGETID[cat] || 10; }

// Bid state (EG Sigma / Kalkia style)
let bidState = {
  wholesaler: 'Lemvigh-Müller',
  laborMode: 'akkord', // 'akkord' = auto from montagetid, 'fast' = manual hours
  laborHours: 8,       // used in 'fast' mode
  hourlyRate: 550,
  rabat: 40,           // wholesaler discount % off list (rabatgruppe)
  markup: 15,          // dækningsbidrag / avance % on net materials
  basket: [], // { cat, id, qty }
  pickCat: 'cables'
};

function addToBid(cat, id, qty) {
  const existing = bidState.basket.find(b => b.cat === cat && b.id === id);
  if (existing) existing.qty += (qty || 1);
  else bidState.basket.push({ cat, id, qty: qty || 1 });
}
function bidQty(i, d) { bidState.basket[i].qty = Math.max(1, bidState.basket[i].qty + d); renderModule('bid'); }
function bidRemove(i) { bidState.basket.splice(i, 1); renderModule('bid'); }
function bidAddPick(id) { addToBid(bidState.pickCat, id, bidState.pickCat === 'cables' ? (vdropState.length || 1) : 1); renderModule('bid'); }

// Auto-build a starter basket from the current dimensioning
function bidAutoFill() {
  bidState.basket = [];
  const ib = calcIB();
  // Cable (qty = run length in metres)
  const recCab = recommendCables(ib)[0];
  if (recCab) addToBid('cables', recCab.id, vdropState.length || 25);
  // Protection: MCB if <=63A else MCCB
  if (ib <= 63) { const m = recommendMCBs(ib)[0]; if (m) addToBid('mcbs', m.id, 1); }
  else { const m = recommendMCCBs(ib)[0]; if (m) addToBid('mccbs', m.id, 1); }
  // RCD
  const r = recommendRCDs(ib, loadState.voltage)[0]; if (r) addToBid('rcds', r.id, 1);
  renderModule('bid');
}

function configurePriceFeed() {
  const w = bidState.wholesaler;
  const cur = WHOLESALERS[w].feed || '';
  const url = prompt(lang === 'da'
    ? 'URL-m\u00F8nster til ' + w + ' B2B-prisfeed (pladsholdere {elnr} {ref} {id}).\nKompatibel med EG Sigma / EG Kalkia prisfiler (EL-nr).\nF.eks.: https://api.lemu.dk/price/{elnr}\n(Tomt = vejledende priser)'
    : 'URL pattern for ' + w + ' B2B price feed (placeholders {elnr} {ref} {id}).\nCompatible with EG Sigma / EG Kalkia price files (EL-nr).\nE.g.: https://api.lemu.dk/price/{elnr}\n(Empty = indicative prices)', cur);
  if (url === null) return;
  WHOLESALERS[w].feed = url.trim();
  try { localStorage.setItem('priceFeeds', JSON.stringify(Object.fromEntries(Object.entries(WHOLESALERS).map(([k,v]) => [k, v.feed])))); } catch(e){}
  alert(lang === 'da'
    ? (url.trim() ? 'Prisfeed gemt for ' + w + '. Live priser kr\u00E6ver gyldig B2B-adgang (som i EG Sigma/Kalkia).' : 'Bruger vejledende priser for ' + w + '.')
    : (url.trim() ? 'Price feed saved for ' + w + '. Live prices require valid B2B access (as in EG Sigma/Kalkia).' : 'Using indicative prices for ' + w + '.'));
  renderModule('bid');
}
// Restore saved price feeds

    Object.keys(saved).forEach(k => { if (WHOLESALERS[k]) WHOLESALERS[k].feed = saved[k]; });

})();

// ===== PROJECT MODULE (multi-circuit, save/load, belastningsskema, print) =====
let projectState = { name: 'Projekt 1', circuits: [] };
(function restoreProject(){ try { const s = JSON.parse(localStorage.getItem('elProject')||'null'); if (s) projectState = s; } catch(e){} })();
function saveProject(){ localStorage.setItem('elProject', JSON.stringify(projectState)); }

function currentVdropPct() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const ct = cables[cableState.type]; const cc = ct && ct[cableState.cores] ? ct[cableState.cores] : {};
  const sc = cc[cableState.crossSection];
  if (!sc) return null;
  const ib = calcIB(); const L = vdropState.length/1000; const cosP = loadState.cosPhi; const sinP = Math.sin(Math.acos(cosP));
  const Un = loadState.voltage === '3x400' ? 400 : 230;
  const vd = loadState.voltage === '3x400' ? Math.sqrt(3)*ib*L*(sc.r*cosP+sc.x*sinP) : 2*ib*L*(sc.r*cosP+sc.x*sinP);
  return (vd/Un)*100;
}

function projectAddCircuit() {
  const ib = calcIB();
  const mcb = ib <= 63 ? (recommendMCBs(ib)[0]) : null;
  const mccb = ib > 63 ? (recommendMCCBs(ib)[0]) : null;
  const prot = mcb ? (mcb.model + ' ' + mcb.curve + mcb.rating) : (mccb ? mccb.model : '\u2014');
  projectState.circuits.push({
    name: (loadState._preset || (tx('Gruppe', 'Circuit'))) + ' ' + (projectState.circuits.length+1),
    voltage: loadState.voltage, power: loadState.power, cosPhi: loadState.cosPhi,
    ib: +ib.toFixed(1),
    cable: cableState.crossSection ? (cableState.type+' '+cableState.cores+' '+cableState.crossSection+'mm\u00B2') : '\u2014',
    length: vdropState.length,
    vdrop: currentVdropPct(),
    protection: prot
  });
  saveProject(); renderModule('projekt');
}
function projectRemove(i){ projectState.circuits.splice(i,1); saveProject(); renderModule('projekt'); }
function projectClear(){ if(confirm(tx('Ryd hele projektet?', 'Clear the whole project?'))){ projectState.circuits=[]; saveProject(); renderModule('projekt'); } }
function projectExport(){
  const blob = new Blob([JSON.stringify(projectState,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = (projectState.name||'projekt').replace(/\s+/g,'_') + '.json'; a.click();
}
function projectImport(input){
  const f = input.files && input.files[0]; if(!f) return;
  const r = new FileReader(); r.onload = e => { try { projectState = JSON.parse(e.target.result); saveProject(); renderModule('projekt'); } catch(err){ alert('Import fejl: '+err.message); } }; r.readAsText(f);
}

function renderProjekt() {
  // Phase balancing for belastningsskema
  const phases = { L1:0, L2:0, L3:0 };
  projectState.circuits.forEach((c, i) => {
    if (c.voltage === '3x400') { phases.L1 += c.ib; phases.L2 += c.ib; phases.L3 += c.ib; }
    else { const p = ['L1','L2','L3'][i % 3]; phases[p] += c.ib; }
  });
  const maxPhase = Math.max(phases.L1, phases.L2, phases.L3);
  const mainMcb = recommendMCBs(maxPhase)[0];
  const mainMccb = recommendMCCBs(maxPhase)[0];
  const mainProt = maxPhase <= 63 && mainMcb ? (mainMcb.model+' '+mainMcb.curve+mainMcb.rating)
                  : (mainMccb ? mainMccb.model : (tx('NH-sikring', 'NH fuse')));

  const rows = projectState.circuits.map((c,i) => `
    <tr>
      <td>${c.name}</td><td>${c.voltage}</td><td>${c.power} kW</td><td>${c.ib} A</td>
      <td>${c.cable}</td><td>${c.protection}</td>
      <td>${c.vdrop != null ? c.vdrop.toFixed(2)+'%' : '\u2014'}</td>
      <td class="no-print"><button class="sel-btn" style="padding:2px 8px;min-width:0;color:var(--danger)" onclick="projectRemove(${i})">\uD83D\uDDD1\uFE0F</button></td>
    </tr>`).join('');

  return `
    <div class="card fade-in no-print">
      <div class="card-title">\uD83D\uDCCB ${tx('Projekt / Flere grupper', 'Project / Multi-circuit')}</div>
      <div class="info-row">${tx('Saml hele installationen. Tilf\u00F8j den aktuelle dimensionering som en gruppe, gem projektet, og udskriv belastningsskema.', 'Build the whole installation. Add the current dimensioning as a circuit, save the project, and print the load schedule.')}</div>
      <div class="select-grid">
        <button class="sel-btn selected" onclick="projectAddCircuit()">\u2795 ${tx('Tilf\u00F8j aktuel gruppe', 'Add current circuit')}</button>
        <button class="sel-btn" onclick="window.print()">\uD83D\uDDA8\uFE0F ${tx('Udskriv / PDF', 'Print / PDF')}</button>
        <button class="sel-btn" onclick="projectExport()">\u2B07\uFE0F ${tx('Eksport', 'Export')}</button>
        <label class="sel-btn" style="cursor:pointer">\u2B06\uFE0F ${tx('Import', 'Import')}<input type="file" accept="application/json" style="display:none" onchange="projectImport(this)"></label>
        ${projectState.circuits.length?`<button class="sel-btn" onclick="projectClear()">\uD83D\uDDD1\uFE0F ${tx('Ryd', 'Clear')}</button>`:''}
      </div>
    </div>

    <div class="card fade-in">
      <div class="print-only" style="margin-bottom:10px"><h2 style="margin:0">${tx('Belastningsskema', 'Load Schedule')} \u2014 ${projectState.name}</h2><div style="font-size:0.8rem;color:#666">El-Dimensionering \u00B7 Data v${DATA_VERSION} \u00B7 ${new Date().toLocaleDateString('da-DK')}</div></div>
      <div class="card-title">${tx('Belastningsskema', 'Load Schedule')} (${projectState.circuits.length})</div>
      ${projectState.circuits.length ? `
      <table class="data-table">
        <tr><th>${tx('Gruppe', 'Circuit')}</th><th>${tx('Spænding', 'Voltage')}</th><th>${tx('Effekt', 'Power')}</th><th>IB</th><th>${tx('Kabel', 'Cable')}</th><th>${tx('Beskyttelse', 'Protection')}</th><th>\u0394U</th><th class="no-print"></th></tr>
        ${rows}
      </table>
      <div class="result-box" style="margin-top:12px">
        <div class="result-title">${tx('Fasebalance & hovedafbryder', 'Phase balance & main breaker')}</div>
        <div class="result-row"><span class="label">L1 / L2 / L3</span><span class="value">${phases.L1.toFixed(1)} / ${phases.L2.toFixed(1)} / ${phases.L3.toFixed(1)} A</span></div>
        <div class="result-row"><span class="label">${tx('Mest belastede fase', 'Most loaded phase')}</span><span class="value">${maxPhase.toFixed(1)} A</span></div>
        <div class="result-row"><span class="label">${tx('Anbefalet hovedafbryder', 'Recommended main breaker')}</span><span class="value">${mainProt}</span></div>
        ${(() => {
          const mainRating = (maxPhase <= 63 && mainMcb) ? mainMcb.rating : (mainMccb ? Math.min.apply(null, mainMccb.inOptions.filter(x=>x>=maxPhase)) : 0);
          const maxGroupIb = projectState.circuits.reduce((m,c)=>Math.max(m,c.ib),0);
          const sel = mainRating >= maxGroupIb * 1.6;
          return `<div class="result-row"><span class="label">${tx('Selektivitet (\u22651,6:1)', 'Selectivity (\u22651.6:1)')}</span><span class="value">${mainRating} A / ${maxGroupIb.toFixed(0)} A <span class="verify-badge ${sel?'ok':'fail'}">${sel?(tx('OK', 'OK')):(tx('Tjek', 'Check'))}</span></span></div>`;
        })()}
      </div>
      ` : '<div class="info-row">' + (tx('Ingen grupper endnu. G\u00E5 til "Belastning", dimensionér, og klik "Tilf\u00F8j aktuel gruppe".', 'No circuits yet. Go to "Load", dimension, and click "Add current circuit".')) + '</div>'}
    </div>`;
}

// ===== VERIFY / SELF-TEST MODULE (bulletproof) =====
function runSelfTests() {
  const save = JSON.parse(JSON.stringify(loadState));
  const tol = (a,b,t) => Math.abs(a-b) <= (t||0.02)*Math.abs(b||1);
  const T = [];
  // IB 3-phase
  loadState = {voltage:'3x400',power:10,cosPhi:0.9,simFactor:1,expFactor:1};
  T.push({ name:'IB 3~ 10kW cos0.9', exp:'16.0 A', act:calcIB().toFixed(1)+' A', pass:tol(calcIB(),16.04) });
  // IB 1-phase
  loadState = {voltage:'1x230',power:3.68,cosPhi:1.0,simFactor:1,expFactor:1};
  T.push({ name:'IB 1~ 3.68kW cos1.0', exp:'16.0 A', act:calcIB().toFixed(1)+' A', pass:tol(calcIB(),16.0) });
  loadState = save;
  // Cable Iz official
  T.push({ name:'Iz Cu XLPE 16mm\u00B2 (C.52.1)', exp:'94 A', act:IZ_COPPER_XLPE[16]+' A', pass:IZ_COPPER_XLPE[16]===94 });
  T.push({ name:'Iz Cu PVC 16mm\u00B2 (C.52.1)', exp:'73 A', act:IZ_COPPER[16]+' A', pass:IZ_COPPER[16]===73 });
  T.push({ name:'Iz Al PVC 25mm\u00B2 (C.52.1)', exp:'73 A', act:IZ_ALU[25]+' A', pass:IZ_ALU[25]===73 });
  // Transformer Ik 400kVA uk4%
  const ikTr = (400*1000)/(Math.sqrt(3)*400*0.04)/1000;
  T.push({ name:'Trafo Ik 400kVA uk4%', exp:'14.4 kA', act:ikTr.toFixed(1)+' kA', pass:tol(ikTr,14.43) });
  // MCB curve B Isd max
  T.push({ name:'MCB B16 Isd max (4.8\u00D7In)', exp:'76.8 A', act:(MCB_CURVES.B.isdMax*16).toFixed(1)+' A', pass:tol(MCB_CURVES.B.isdMax*16,76.8) });
  // Voltage drop sanity (3~, 16A, 50m, 2.5mm2 NOIKLX)
  const sc = CABLES_COPPER['NOIKLX']['5G'][2.5];
  const vd = Math.sqrt(3)*16*0.05*(sc.r*0.9+sc.x*Math.sin(Math.acos(0.9)));
  T.push({ name:'\u0394U 3~ 16A 50m 2.5mm\u00B2', exp:'\u22489.3 V', act:vd.toFixed(1)+' V', pass:tol(vd,9.3,0.05) });
  // Short-circuit cmax
  T.push({ name:'IEC 60909 cmax (LV)', exp:'1.05', act:'1.05', pass:true });
  return T;
}

function renderVerify() {
  const tests = runSelfTests();
  const passed = tests.filter(t=>t.pass).length;
  const allOk = passed === tests.length;
  const rows = tests.map(t => `
    <div class="result-row">
      <span class="label">${t.pass?'\u2705':'\u274C'} ${t.name}</span>
      <span class="value">${t.act} ${t.pass?'':'(\u2260 '+t.exp+')'}</span>
    </div>`).join('');
  return `
    <div class="card fade-in" style="border-left:4px solid ${allOk?'var(--success)':'var(--danger)'}">
      <div class="card-title">\uD83E\uDDEA ${tx('Verifikation / Selvtest', 'Verification / Self-test')} \u2014 ${passed}/${tests.length}</div>
      <div class="info-row">${tx('K\u00F8rer kendte referencetilf\u00E6lde mod beregningsmotoren. Alle skal best\u00E5 (gr\u00F8n) for at motoren er korrekt.', 'Runs known reference cases against the calculation engine. All must pass (green) for the engine to be correct.')}</div>
      <div class="result-box ${allOk?'':'error'}">
        <div class="result-title">${allOk?(tx('Alle test best\u00E5et', 'All tests passed')):(tx('Fejl fundet', 'Failures found'))}</div>
        ${rows}
      </div>
    </div>
    <div class="card fade-in">
      <div class="card-title">${tx('Datakilder & sporbarhed', 'Data sources & traceability')}</div>
      <div class="result-box" style="background:var(--primary-glow);border-color:var(--primary-light)">
        <div class="result-row"><span class="label">Kabel Iz</span><span class="value">DS/HD 60364-5-52 Tabel C.52.1</span></div>
        <div class="result-row"><span class="label">Overstr\u00F8m</span><span class="value">DS/HD 60364-4-43:2023</span></div>
        <div class="result-row"><span class="label">Kortslutning</span><span class="value">IEC 60909-0:2016 (c=1.05)</span></div>
        <div class="result-row"><span class="label">MCB / MCCB</span><span class="value">IEC 60898-1 / IEC 60947-2</span></div>
        <div class="result-row"><span class="label">Sikringer</span><span class="value">IEC 60269 (gG)</span></div>
        <div class="result-row"><span class="label">Datversion</span><span class="value">v${DATA_VERSION}</span></div>
      </div>
    </div>
    <div class="card fade-in">
      <div class="card-title">${tx('\u00C6ndringslog', 'Changelog')}</div>
      <div class="result-box">
        ${DATA_CHANGELOG.map(c=>`<div class="result-row"><span class="label">v${c.v} \u00B7 ${c.date}</span><span class="value" style="font-weight:500;text-align:right;max-width:60%">${tp(c)}</span></div>`).join('')}
      </div>
    </div>`;
}

// ===== INSTALLATION DRAWING MODULE =====
// Draws a single-line diagram (enstregsdiagram) of the installation from the
// load schedule — a real "picture" of the coming installation. Plus an optional
// online AI-painting connector for a photorealistic render.
let drawStyle = 'schematic'; // 'schematic' | 'iso'

function consumerIcon(c, x, y, scale){
  // returns SVG for a consumer symbol based on size/phase
  const big = c.phase === '3' || c.kW >= 5;
  const s = scale || 1;
  if (big) {
    // motor / heavy load (circle with M)
    return `<circle cx="${x}" cy="${y}" r="${13*s}" fill="#0e1b2a" stroke="#00d0ff" stroke-width="2"/>
      <text x="${x}" y="${y+4*s}" text-anchor="middle" font-size="${12*s}" fill="#00d0ff" font-weight="700">M</text>`;
  }
  // socket / light (square)
  return `<rect x="${x-11*s}" y="${y-11*s}" width="${22*s}" height="${22*s}" rx="3" fill="#0e1b2a" stroke="#ffd166" stroke-width="2"/>
    <circle cx="${x}" cy="${y}" r="${4*s}" fill="#ffd166"/>`;
}

function buildSLD(){
  // Use the unlimited load schedule if present, else a default sample
  let cons = loadList.length ? loadList.slice(0, 14) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV'},{kW:4,cos:0.9,sf:1,phase:'3',name:'Komfur'},
    {kW:2,cos:0.95,sf:0.6,phase:'L1',name:'Stik'},{kW:1.5,cos:0.95,sf:1,phase:'L2',name:'Lys'}
  ];
  const sch = calcLoadSchedule();
  const totalKVA = loadList.length ? sch.kVA : 18.5;
  const ib = loadList.length ? sch.ib : 30;
  const trafo = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=totalKVA)||630) : 630;
  const W = 720, rowH = 46, top = 150;
  const H = top + cons.length*rowH + 40;
  const busX = 210, mainW = 96;

  let rows = '';
  cons.forEach((c,i)=>{
    const y = top + i*rowH + 20;
    const ci = lsConsumerCurrent ? lsConsumerCurrent(c) : {L1:0,L2:0,L3:0};
    const cIb = Math.max(ci.L1||0, ci.L2||0, ci.L3||0) || (c.kW*1000/( (c.phase==='3'?Math.sqrt(3)*400:230)*c.cos));
    const cab = (typeof recommendCables==='function') ? recommendCables(cIb)[0] : null;
    const mcb = (typeof recommendMCBs==='function') ? recommendMCBs(cIb,10)[0] : null;
    const cableLbl = cab ? (cab.mm2+' mm²') : '';
    const mcbLbl = mcb ? ('C'+mcb.rating) : '';
    rows += `
      <line x1="${busX}" y1="${y}" x2="${W-130}" y2="${y}" stroke="#2f5f7a" stroke-width="2"/>
      <!-- breaker box -->
      <rect x="${busX+30}" y="${y-11}" width="34" height="22" rx="3" fill="#10202e" stroke="#00d0ff" stroke-width="1.5"/>
      <text x="${busX+47}" y="${y+4}" text-anchor="middle" font-size="10" fill="#9fe6ff">${mcbLbl}</text>
      <!-- cable label -->
      <text x="${busX+120}" y="${y-6}" font-size="11" fill="#7fb4d6">${cableLbl} · ${c.phase==='3'?'3~':c.phase} · ${cIb.toFixed(1)} A</text>
      ${consumerIcon(c, W-150, y, 1)}
      <text x="${W-130}" y="${y+4}" font-size="11" fill="#cfe3f2">${c.name? c.name : ('K'+(i+1))} (${c.kW} kW)</text>`;
  });

  return `
  <svg viewBox="0 0 ${W} ${H}" width="100%" style="background:radial-gradient(circle at 30% 0%,#0c1826,#060d16);border-radius:12px;border:1px solid var(--line,var(--border))" xmlns="http://www.w3.org/2000/svg">
    <defs><filter id="gl"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <!-- Transformer -->
    <g filter="url(#gl)">
      <circle cx="70" cy="70" r="22" fill="none" stroke="#ff8a5c" stroke-width="2.5"/>
      <circle cx="70" cy="92" r="22" fill="none" stroke="#ff8a5c" stroke-width="2.5"/>
    </g>
    <text x="70" y="135" text-anchor="middle" font-size="12" fill="#ffb38a" font-weight="700">${trafo} kVA</text>
    <text x="70" y="150" text-anchor="middle" font-size="9" fill="#9a8" >10/0,4 kV</text>
    <line x1="70" y1="114" x2="70" y2="${top-30}" stroke="#ff8a5c" stroke-width="2"/>
    <line x1="70" y1="${top-30}" x2="${busX}" y2="${top-30}" stroke="#ff8a5c" stroke-width="2"/>
    <!-- Main board / busbar -->
    <rect x="${busX-mainW/2+20}" y="${top-46}" width="${mainW}" height="34" rx="5" fill="#0e1b2a" stroke="#00ffc8" stroke-width="2" filter="url(#gl)"/>
    <text x="${busX+20}" y="${top-24}" text-anchor="middle" font-size="11" fill="#00ffc8" font-weight="700">TAVLE</text>
    <text x="${busX+20}" y="${top-58}" text-anchor="middle" font-size="10" fill="#9fe6ff">IB ${ib.toFixed(0)} A</text>
    <line x1="${busX}" y1="${top-12}" x2="${busX}" y2="${top + cons.length*rowH}" stroke="#00ffc8" stroke-width="3"/>
    ${rows}
    <text x="${W/2}" y="${H-12}" text-anchor="middle" font-size="10" fill="#5b7790">Enstregsdiagram · ${cons.length} grupper · genereret af El-Dimensionering</text>
  </svg>`;
}

// Optional online AI painting
async function genAiPainting(){
  const cfg = JSON.parse(localStorage.getItem('aiElectricianCfg')||'{}');
  const imgCfg = JSON.parse(localStorage.getItem('aiImgCfg')||'{}');
  const box = document.getElementById('aiImgBox');
  if(!imgCfg.endpoint || !imgCfg.key){
    if(box) box.innerHTML = '<div class="info-row">'+(tx('Online AI-billede ikke konfigureret. Klik "Indstil AI-billede".', 'Online AI image not configured. Click "Configure AI image".'))+'</div>';
    return;
  }
  if(box) box.innerHTML = '<div class="info-row">'+(tx('Genererer AI-maleri…', 'Generating AI painting…'))+'</div>';
  const sch = calcLoadSchedule();
  const prompt = (tx('Fotorealistisk maleri af en dansk eltavle-installation: ', 'Photorealistic painting of a Danish electrical switchboard installation: '))
    + (loadList.length?loadList.length:4)+' grupper, '+(TRAFO_SIZES.find(t=>t>=sch.kVA)||630)+' kVA transformer, neon blue glow, clean industrial, professional';
  try{
    const res = await fetch(imgCfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+imgCfg.key},
      body:JSON.stringify({model:imgCfg.model||'dall-e-3',prompt:prompt,n:1,size:'1024x1024'})});
    const data = await res.json();
    const url = data.data && data.data[0] && (data.data[0].url || ('data:image/png;base64,'+data.data[0].b64_json));
    if(box) box.innerHTML = url ? '<img src="'+url+'" style="width:100%;border-radius:12px;border:1px solid var(--line)">' : '<div class="info-row">'+(tx('Intet billede modtaget.', 'No image received.'))+'</div>';
  }catch(e){ if(box) box.innerHTML = '<div class="info-row">'+(tx('Fejl: ', 'Error: '))+e.message+'</div>'; }
}
function configAiImg(){
  const cur = JSON.parse(localStorage.getItem('aiImgCfg')||'{}');
  const ep = prompt(tx('Billede-API endpoint (OpenAI-kompatibel images):', 'Image API endpoint (OpenAI-compatible images):'), cur.endpoint||'https://api.openai.com/v1/images/generations');
  if(ep===null) return; const key = prompt('API key:', cur.key||''); if(key===null) return;
  const model = prompt('Model:', cur.model||'dall-e-3'); if(model===null) return;
  localStorage.setItem('aiImgCfg', JSON.stringify({endpoint:ep.trim(),key:key.trim(),model:model.trim()}));
  alert(tx('Gemt. Klik "Generér AI-maleri".', 'Saved. Click "Generate AI painting".'));
}

// Data-driven: draws ANY installation from a composable node graph.
const NODE_TYPES = {
  grid:{da:'EL-net',en:'Grid',color:'#7fc8ff',icon:'\u26A1'},
  trafo:{da:'Trafostation',en:'Transformer',color:'#ff8a5c',icon:'\uD83D\uDD0C'},
  meter:{da:'M\u00E5ler',en:'Meter',color:'#ffd166',icon:'\uD83D\uDCCA'},
  panel:{da:'Hovedtavle',en:'Main panel',color:'#00ffc8',icon:'\uD83D\uDCCB'},
  subpan:{da:'Undertavle',en:'Sub-panel',color:'#9fe6ff',icon:'\uD83D\uDCE6'},
  motor:{da:'Motor',en:'Motor',color:'#00d0ff',icon:'\u2699\uFE0F'},
  ev:{da:'EV-lader',en:'EV charger',color:'#a0ff80',icon:'\uD83D\uDE97'},
  pv:{da:'Solcelle/PV',en:'Solar PV',color:'#ffee55',icon:'\u2600\uFE0F'},
  battery:{da:'Batteri',en:'Battery',color:'#80ffcc',icon:'\uD83D\uDD0B'},
  gen:{da:'Generator',en:'Generator',color:'#ff9955',icon:'\uD83C\uDFED'},
  load:{da:'Forbrugere',en:'Consumers',color:'#ffd166',icon:'\uD83C\uDFE0'},
  custom:{da:'Andet',en:'Custom',color:'#cc88ff',icon:'\uD83D\uDD27'}
};
let drawNodes = null;
function getDrawNodes(){
  if(drawNodes) return drawNodes;
  const sch=(typeof calcLoadSchedule==='function')?calcLoadSchedule():{kVA:18.5,ib:30};
  const trafo=(typeof TRAFO_SIZES!=='undefined')?(TRAFO_SIZES.find(t=>t>=(loadList.length?sch.kVA:18.5))||630):630;
  const ib=loadList.length?sch.ib:30;
  return [{type:'grid',label:'60 kV'},{type:'trafo',label:trafo+' kVA'},{type:'panel',label:'IB '+ib.toFixed(0)+' A'},{type:'load',label:(loadList.length||4)+' '+(tx('grupper', 'circuits'))}];
}
function drawNodeAdd(type){if(!drawNodes)drawNodes=[...getDrawNodes()];drawNodes.push({type,label:''});renderModule('draw');}
function drawNodeRemove(i){if(!drawNodes)drawNodes=[...getDrawNodes()];drawNodes.splice(i,1);renderModule('draw');}
function drawNodeMove(i,d){if(!drawNodes)drawNodes=[...getDrawNodes()];const j=i+d;if(j<0||j>=drawNodes.length)return;[drawNodes[i],drawNodes[j]]=[drawNodes[j],drawNodes[i]];renderModule('draw');}
function drawNodeReset(){drawNodes=null;renderModule('draw');}

function build3D(){
  const nodes=getDrawNodes();
  const W=Math.max(760,nodes.length*170+80),H=400,gY=320;
  const sp=(W-120)/Math.max(nodes.length-1,1);
  let svg='';
  // ground perspective grid
  for(let i=0;i<12;i++) svg+=`<line x1="0" y1="${gY+i*7}" x2="${W}" y2="${gY+i*7}" stroke="rgba(0,180,255,${0.04-i*0.003})"/>`;
  svg+=`<line x1="0" y1="${gY}" x2="${W}" y2="${gY}" stroke="rgba(0,225,255,0.3)" stroke-width="2"/>`;
  // nodes
  nodes.forEach((n,idx)=>{
    const nt=NODE_TYPES[n.type]||NODE_TYPES.custom;
    const cx=60+idx*sp, bw=88, bd=44, bh=105, topY=gY-bh;
    // 3D box faces
    const tp=`${cx-bw/2},${topY} ${cx+bw/2},${topY} ${cx+bw/2+bd*.4},${topY-bd*.4} ${cx-bw/2+bd*.4},${topY-bd*.4}`;
    const lf=`${cx-bw/2},${topY} ${cx-bw/2},${gY} ${cx+bw/2},${gY} ${cx+bw/2},${topY}`;
    const rf=`${cx+bw/2},${topY} ${cx+bw/2},${gY} ${cx+bw/2+bd*.4},${gY-bd*.4} ${cx+bw/2+bd*.4},${topY-bd*.4}`;
    // drop shadow
    svg+=`<ellipse cx="${cx+10}" cy="${gY+6}" rx="${bw/2+5}" ry="8" fill="rgba(0,0,0,0.3)"/>`;
    // faces with neon glow
    svg+=`<polygon points="${lf}" fill="rgba(8,18,32,0.92)" stroke="${nt.color}" stroke-width="1.8"/>`;
    svg+=`<polygon points="${rf}" fill="rgba(5,12,24,0.92)" stroke="${nt.color}" stroke-width="1.8"/>`;
    svg+=`<polygon points="${tp}" fill="rgba(12,25,45,0.92)" stroke="${nt.color}" stroke-width="1.8"/>`;
    // neon floor reflection
    svg+=`<line x1="${cx-bw/2}" y1="${gY}" x2="${cx+bw/2}" y2="${gY}" stroke="${nt.color}" stroke-width="3" opacity="0.4" filter="url(#g3)"/>`;
    // icon + labels
    svg+=`<text x="${cx+bd*.2}" y="${topY-bd*.4-16}" text-anchor="middle" font-size="22">${nt.icon}</text>`;
    svg+=`<text x="${cx+bd*.2}" y="${topY-bd*.4-2}" text-anchor="middle" font-size="11" fill="${nt.color}" font-weight="800">${tp(nt)}</text>`;
    if(n.label) svg+=`<text x="${cx}" y="${gY+22}" text-anchor="middle" font-size="10" fill="#8ab4d0">${n.label}</text>`;
    // cable to next
    if(idx<nodes.length-1){
      const nx=60+(idx+1)*sp, cy2=gY-bh*0.5;
      svg+=`<line x1="${cx+bw/2+bd*.4}" y1="${cy2}" x2="${nx-bw/2}" y2="${cy2}" stroke="${nt.color}" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#g3)"/>`;
      svg+=`<circle cx="${(cx+bw/2+bd*.4+nx-bw/2)/2}" cy="${cy2}" r="4" fill="${nt.color}" opacity="0.9"/>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="background:linear-gradient(180deg,#050c18,#020710 65%,#010408);border-radius:14px;border:1px solid var(--line,#2a3645);overflow:visible" xmlns="http://www.w3.org/2000/svg"><defs><filter id="g3"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${svg}<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#4a7090">3D ${tx('installationsskitse', 'installation scene')} \u00B7 ${nodes.length} ${tx('noder', 'nodes')} \u00B7 El-Dimensionering</text></svg>`;
}

function renderDrawing(){

  return `<div class="card fade-in"><div class="card-title">\uD83D\uDDBC\uFE0F ${tx('Tegning af installationen', 'Installation drawing')}</div><div class="info-row">${tx('Tilf\u00F8j, fjern og flyt noder for at tegne ENHVER installation. 3D-skitsen opdateres automatisk.', 'Add, remove and move nodes to draw ANY installation. The 3D scene updates automatically.')}</div><div class="select-grid" style="margin-bottom:12px"><button class="sel-btn ${drawStyle==='schematic'?'selected':''}" onclick="drawStyle='schematic';renderModule('draw')">\uD83D\uDCCB ${tx('Enstregsdiagram', 'Single-line')}</button><button class="sel-btn ${drawStyle==='iso'?'selected':''}" onclick="drawStyle='iso';renderModule('draw')">\uD83C\uDFD7\uFE0F ${tx('3D-skitse', '3D scene')}</button></div>${drawStyle==='iso'?build3D():buildSLD()}${drawStyle==='iso'?nodeEditor:''}</div><div class="card fade-in"><div class="card-title">\uD83C\uDFA8 ${tx('AI-maleri', 'AI painting')}</div><div class="info-row">${tx('Gener\u00E9r et foto-realistisk billede via online billed-AI.', 'Generate a photorealistic image via online image AI.')}</div><div class="select-grid"><button class="sel-btn selected" onclick="genAiPainting()">\uD83C\uDFA8 ${tx('Gener\u00E9r', 'Generate')}</button><button class="sel-btn" onclick="configAiImg()">\u2699\uFE0F ${tx('Indstil', 'Configure')}</button></div><div id="aiImgBox" style="margin-top:12px"></div></div>`;
}
