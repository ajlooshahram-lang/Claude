  html += `<div class="info-row" style="margin-bottom:8px">${da?'Tjekliste baseret paa DS/HD 60364-6 \u00A76.1 og BEK 1082 \u00A76. Marker hvert punkt som bestaaet/fejlet/ikke relevant. Alle bestaede punkter genererer en afleveringserkl\u00E6ring.':'Checklist based on DS/HD 60364-6 \u00A76.1 and BEK 1082 \u00A76. Mark each item as passed/failed/not applicable. All passed items generate a completion declaration.'}</div>`;
  // Progress bar
  html += `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-muted);margin-bottom:4px"><span>${da?'Fremskridt':'Progress'}</span><span>${pct}% (${passCount}/${applicableCount})</span></div>`;
  html += `<div style="width:100%;height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${barColor};border-radius:5px;transition:width 0.3s"></div></div></div>`;
  // Checklist items
  html += `<div style="display:flex;flex-direction:column;gap:6px">`;
  items.forEach(it=>{
    const v = docCheckItems[it.key] || '';
    const label = da ? it.da : it.en;
    const passActive = v==='pass' ? 'selected' : '';
    const failActive = v==='fail' ? 'selected' : '';
    const naActive = v==='na' ? 'selected' : '';
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,0.15)">`;
    html += `<span style="flex:1;font-size:0.82rem;color:var(--text-primary)">${v==='pass'?'\u2705':v==='fail'?'\u274C':v==='na'?'\u2796':'\u2B1C'} ${label}</span>`;
    html += `<button class="sel-btn ${passActive}" style="padding:2px 8px;min-width:0;font-size:.7rem" onclick="docSetItem('${it.key}','pass')">${da?'OK':'Pass'}</button>`;
    html += `<button class="sel-btn ${failActive}" style="padding:2px 8px;min-width:0;font-size:.7rem;${v==='fail'?'border-color:var(--danger);color:var(--danger)':''}" onclick="docSetItem('${it.key}','fail')">${da?'Fejl':'Fail'}</button>`;
    html += `<button class="sel-btn ${naActive}" style="padding:2px 8px;min-width:0;font-size:.7rem" onclick="docSetItem('${it.key}','na')">N/A</button>`;
    html += `</div>`;
  });
  html += `</div>`;
  // Reset button
  html += `<div style="margin-top:8px"><button class="sel-btn" onclick="docResetAll()">\u21BA ${da?'Nulstil alle':'Reset all'}</button></div>`;
  // Declaration of completion (when all done)
  if(allDone){
    html += `<div style="margin-top:14px;padding:14px 16px;border-radius:10px;border:2px solid #06d6a0;background:rgba(6,214,160,0.06)">`;
    html += `<div style="font-weight:700;color:#06d6a0;font-size:1rem;margin-bottom:6px">\uD83C\uDFC6 ${da?'Afleveringserkl\u00E6ring':'Declaration of completion'}</div>`;
    html += `<div style="font-size:0.82rem;color:var(--text-primary);margin-bottom:4px">${da?'Alle dokumentationskrav er opfyldt iht. DS/HD 60364-6 \u00A76.1 og BEK 1082 \u00A76.':'All documentation requirements fulfilled per DS/HD 60364-6 \u00A76.1 and BEK 1082 \u00A76.'}</div>`;
    html += `<div style="font-size:0.78rem;color:var(--text-muted)">${da?'Installationen er klar til aflevering og idriftsaettelse.':'Installation is ready for handover and commissioning.'}</div>`;
    html += `<div style="margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;font-size:0.75rem;color:#aaa">`;
    html += `<span>\u2705 ${da?'Dokumenter':'Documents'}: ${passCount}</span>`;
    html += `<span>\u2796 N/A: ${naCount}</span>`;
    html += `<span>\uD83D\uDCC5 ${new Date().toLocaleDateString(da?'da-DK':'en-GB')}</span>`;
    html += `</div></div>`;
  }
  // Verdict
  const verdictColor = allDone ? 'var(--success)' : failCount>0 ? 'var(--danger)' : '#ffd166';
  const verdictText = allDone
    ? (da?'Komplet -- alle krav opfyldt':'Complete -- all requirements met')
    : failCount>0
      ? (da?'Mangler -- ' + failCount + ' punkt(er) fejlet':'Incomplete -- ' + failCount + ' item(s) failed')
      : (da?'Under arbejde -- ' + (applicableCount-passCount) + ' punkt(er) mangler':'In progress -- ' + (applicableCount-passCount) + ' item(s) remaining');
  html += `<div style="margin-top:10px;padding:10px 14px;border-radius:8px;border:1.5px solid ${verdictColor};background:rgba(0,0,0,0.2)">`;
  html += `<div style="font-weight:700;color:${verdictColor};font-size:0.9rem">${allDone?'\u2705':failCount>0?'\u274C':'\u23F3'} ${verdictText}</div>`;
  html += `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">\uD83D\uDCD6 DS/HD 60364-6 \u00A76.1 \u00b7 BEK 1082 \u00A76 \u00b7 Sikkerhedsstyrelsen.dk</div>`;
  html += `</div></div>`;
  return html;
}

function buildProtReport(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  let idx = (sldFaultRow>=0 && sldFaultRow<cons.length) ? sldFaultRow : cons.findIndex(c=>['motor','ev','heat','cooker'].includes(sldInferType(c)));
  if(idx<0) idx=0;
  const c = cons[idx];
  const ci = lsConsumerCurrent(c);
  const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
  const cab = recommendCables(cIb)[0];
  const mcb = recommendMCBs(cIb,10)[0];
  if(!mcb) return '';
  const In = mcb.rating, curve = mcb.curve||'C';
  const m = curve==='B'?5:curve==='D'?20:10, Ia = m*In, K = 90;
  const autoL = (c.dist && c.dist>0) ? c.dist : 25;
  const L = sldRunLen>0 ? sldRunLen : autoL;
  const Rkm = cab ? (cab.r!=null?cab.r:(cab.R||0)) : 0;
  const R1R2 = 2*Rkm*(L/1000);
  const Ze = sldEarthing==='TN-C-S'?0.35 : sldEarthing==='TN-S'?0.80 : sldEarthing==='TT'?20 : 0;
  const measZs = sldMeasZsFactor*(Ze+R1R2), Uo=230, Cmin=0.95;
  let If, scen;
  if(sldEarthing==='IT' && !sldITSecond){ If=0.5; scen='it1'; }
  else if(sldEarthing==='IT' && sldITSecond){ If=400/(2*R1R2+0.3); scen='it2'; }
  else { If=(Cmin*Uo)/measZs; scen=(sldEarthing==='TT')?'tt':'tn'; }
  const tReq = scen==='it1' ? null : (sldEarthing==='TT'?0.2:((In<=32)?0.4:5));
  const Iz = cab ? officialIz(cab) : cIb*1.25;
  // Disconnection time
  let tDisc; if(If>=Ia)tDisc=0.02; else if(If>1.13*In)tDisc=K/((If/In)*(If/In)-1); else tDisc=Infinity;
  const fmt=(t)=> t<0.1?t.toFixed(2):t.toFixed(1);
  // Main device
  const STD=[6,10,13,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  const nextStd=(v)=>STD.find(x=>x>=v)||STD[STD.length-1];
  let mainIb = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().ib||0) : 0;
  if(!(mainIb>0)){ let pT={L1:0,L2:0,L3:0}; cons.forEach(cc=>{const x=lsConsumerCurrent(cc);pT.L1+=x.L1||0;pT.L2+=x.L2||0;pT.L3+=x.L3||0;}); mainIb=Math.max(pT.L1,pT.L2,pT.L3); }
  mainIb = Math.max(mainIb, In*1.25);
  const mainType = mainIb<=63 ? 'mcb' : 'fuse';
  const Inm = Math.max(nextStd(mainIb), nextStd(In));
  const mainLbl = mainType==='mcb' ? ('C'+Inm+' A') : ('gG '+Inm+' A');
  const IaM = 10*Inm;
  const tMain = (I)=> mainType==='mcb'
    ? (I>=IaM?0.02:(I>1.13*Inm?K/((I/Inm)*(I/Inm)-1):Infinity))
    : Math.min(1000, Math.max(0.004, 1056*Math.pow(I/Inm,-4.72)));
  // Selectivity
  let selVerdict;
  if(!isFinite(tDisc)){ selVerdict = da?'Via HPFI/tid':'Via RCD/time'; }
  else { const tm=tMain(If); const ratio=isFinite(tm)?tm/tDisc:999; selVerdict = ratio>=1.5?(da?'SELEKTIV ✓':'SELECTIVE ✓'):(da?'IKKE fuld selektiv ⚠':'NOT fully selective ⚠'); }
  // Ik & cascading
  let kVAv = (typeof calcLoadSchedule==='function') ? (calcLoadSchedule().kVA||0) : 0;
  if(!(kVAv>0)){ kVAv = cons.reduce((a,cc)=>a+(cc.kW||0),0)/0.9; }
  const trafoK = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=kVAv)||630) : 630;
  const uk = (typeof TRAFO_UK!=='undefined' && TRAFO_UK[trafoK]) ? (TRAFO_UK[trafoK]/100) : 0.04;
  const Ik = trafoK*1000/(Math.sqrt(3)*400*uk)/1000;
  const IcuBr = (mcb.icu!=null?mcb.icu:6);
  const mainProd = mainType==='mcb' ? recommendMCBs(mainIb,10)[0] : (typeof recommendFuses==='function'?recommendFuses(mainIb)[0]:null);
  const IcuMain = mainProd ? (mainProd.icu!=null?mainProd.icu:(mainType==='fuse'?120:10)) : (mainType==='fuse'?120:10);
  let cascVerdict;
  if(Ik<=IcuBr){ cascVerdict = da?'Gren-Icu tilstrækkeligt':'Branch Icu adequate'; }
  else if(Ik<=IcuMain){ cascVerdict = da?'CASCADING med hovedværn':'CASCADING with main'; }
  else { cascVerdict = da?'⚠ Icu utilstrækkeligt':'⚠ Icu insufficient'; }
  // I²t adiabatic
  const cabS = cab ? cab.mm2 : 2.5;
  const cabXlpe = cab ? /NOIKLX|NOIKX|NOIK-AL|NOSP/i.test(cab.model||'') : false;
  const cabMat = cab ? cab.material : 'Cu';
  const kAdiab = (cabMat==='Cu') ? (cabXlpe ? 143 : 115) : (cabXlpe ? 94 : 76);
  const cableI2tLimit = kAdiab * kAdiab * cabS * cabS;
  const brI2t = (isFinite(tDisc) && tDisc>0) ? (If*If*tDisc) : (If*If*0.02);
  const i2tOk = brI2t <= cableI2tLimit;
  const i2tVerdict = i2tOk ? (da?'Kablet tåler ✓':'Cable withstands ✓') : (da?'Kablet kan blive beskadiget ⚠':'Cable may be damaged ⚠');
  const fmtI2t = (v) => v>=1e6 ? (v/1e6).toFixed(1)+'M' : v>=1e3 ? (v/1e3).toFixed(1)+'k' : v.toFixed(0);
  // Disconnection verdict
  let discVerdict;
  if(scen==='it1'){ discVerdict = da?'IMD alarmerer (ingen udkobling)':'IMD alarms (no disconnection)'; }
  else if(scen==='tt'){ discVerdict = da?'HPFI 30 mA ≤ 0,2 s':'RCD 30 mA ≤ 0.2 s'; }
  else { discVerdict = (isFinite(tDisc)&&tDisc<=(tReq||5))?(da?'Opfyldt ✓':'Met ✓'):(da?'Ikke opfyldt ⚠':'Not met ⚠'); }

  const row = (l,v,col)=>`<div class="result-row"><span class="label">${l}</span><span class="value"${col?` style="color:${col}"`:''}>${v}</span></div>`;
  const title = da ? 'Koordinationsrapport' : 'Coordination report';
  const circName = c.name || ('K'+(idx+1));

  let html = `<div class="card fade-in prot-report" style="page-break-inside:avoid"><style>.prot-report{display:block}@media print{.prot-report{display:block!important;border:2px solid #333;padding:16px;margin:12px 0}}</style>`;
  html += `<div class="card-title">📋 ${title} — ${circName} · ⏚ ${sldEarthing}</div>`;
  html += `<div class="result-box ok" style="margin-top:8px">`;
  html += row(da?'Kreds':'Circuit', circName + ' ('+c.phase+', '+(c.kW||0)+' kW)');
  html += row('IB ('+da?'driftstrøm':'load current'+')', cIb.toFixed(1)+' A');
  html += row('In ('+da?'mærkestrøm':'rated current'+')', In+' A ('+curve+In+')');
  html += row('Iz ('+da?'kabelstrømværdi':'cable current capacity'+')', Iz.toFixed(0)+' A ('+(cab?cab.mm2:'?')+' mm² '+(cabMat)+')');
  html += row(da?'Jordingssystem':'Earthing system', sldEarthing);
  html += row('Zs', measZs.toFixed(2)+' Ω (Ze='+Ze.toFixed(2)+', R1+R2='+R1R2.toFixed(3)+')');
  html += row('Ief ('+da?'fejlstrøm':'fault current'+')', (If<1?'<1':If.toFixed(0))+' A');
  html += row(da?'Udkoblingstid':'Disconnection time', isFinite(tDisc)?fmt(tDisc)+' s':(da?'Ingen':'None')+' ('+discVerdict+')');
  html += row(da?'Selektivitet':'Selectivity', selVerdict);
  html += row(da?'Brydeevne / Cascading':'Breaking capacity / Cascading', cascVerdict + ' (Ik≈'+Ik.toFixed(1)+' kA, Icu gren='+IcuBr+' kA, hoved='+IcuMain+' kA)');
  html += row('I²t '+da?'adiabatisk kontrol':'adiabatic check', fmtI2t(brI2t)+' A²s '+(i2tOk?'≤':'>')+' '+fmtI2t(cableI2tLimit)+' A²s → '+i2tVerdict, i2tOk?'var(--success)':'var(--danger)');
  html += `</div>`;
  html += `<div style="font-size:0.68rem;font-style:italic;color:var(--text-muted);margin-top:8px;opacity:0.85;line-height:1.5">\u{1F4D6} DS/HD 60364-6 \u00B7 Installationsbekendtg\u00F8relsen BEK 1082 \u00B7 <a href="https://sikkerhedsstyrelsen.dk" target="_blank" style="color:var(--primary-light)">Sikkerhedsstyrelsen.dk</a></div>`;
  html += `<div style="margin-top:10px;text-align:right"><button class="sel-btn" onclick="window.print()" style="font-weight:700">\u{1F5A8}\uFE0F ${da?'Print rapport':'Print report'}</button></div>`;
  html += `</div>`;
  return html;
}

// Loop-impedance (Zs), prospective fault current and disconnection-time readout for the
// selected/faulted circuit. Earthing-system aware; click-only length + measured-Zs controls.
function buildLoopReadout(){
  const da = lang==='da';
  const cons = loadList.length ? loadList.slice(0,16) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV-lader'},{kW:11,cos:1,sf:0.7,phase:'3',name:'Komfur'},
    {kW:3.7,cos:0.95,sf:0.6,phase:'L1',name:'Stikgrupper'},{kW:2.2,cos:0.95,sf:0.6,phase:'L2',name:'Hvidevarer'},
    {kW:1.5,cos:0.95,sf:1,phase:'L3',name:'Belysning'}
  ];
  let idx = (sldFaultRow>=0 && sldFaultRow<cons.length) ? sldFaultRow : cons.findIndex(c=>['motor','ev','heat','cooker'].includes(sldInferType(c)));
  if(idx<0) idx=0;
  const c = cons[idx];
  const ci = lsConsumerCurrent(c);
  const cIb = Math.max(ci.L1||0,ci.L2||0,ci.L3||0) || (c.kW*1000/((c.phase==='3'?Math.sqrt(3)*400:230)*(c.cos||0.9)));
  const cab = recommendCables(cIb)[0];
  const mcb = recommendMCBs(cIb,10)[0];
  const autoL = (c.dist && c.dist>0) ? c.dist : 25;
  const L = sldRunLen>0 ? sldRunLen : autoL;
  const Rkm = cab ? (cab.r!=null ? cab.r : (cab.R||0)) : 0;
  const R1R2 = 2 * Rkm * (L/1000);
  const Ze = sldEarthing==='TN-C-S'?0.35 : sldEarthing==='TN-S'?0.80 : sldEarthing==='TT'?20 : 0;
  const Uo = 230, Cmin = 0.95;
  const k = mcb ? (mcb.curve==='B'?5:mcb.curve==='D'?20:10) : 10;
  const Ia = mcb ? k*mcb.rating : null;
  const devLbl = mcb ? (mcb.curve+mcb.rating+' A') : (cIb>63?'MCCB/NH':'—');
  const row = (l,v,col)=>`<div class="result-row"><span class="label">${l}</span><span class="value"${col?` style="color:${col}"`:''}>${v}</span></div>`;

  // click-only controls (length + measured-Zs factor), hidden for IT (no Zs there)
  const lenBtns = ['auto',10,25,50,75,100].map(m=>{const val=m==='auto'?0:m; const sel=(sldRunLen===val); return `<button class="sel-btn ${sel?'selected':''}" onclick="sldSetRunLen(${val})">${m==='auto'?'auto':m+' m'}</button>`;}).join('');
  const facBtns = [1,1.25,1.5,2].map(f=>`<button class="sel-btn ${sldMeasZsFactor===f?'selected':''}" onclick="sldSetMeasZs(${f})">${f}×</button>`).join('');
  const controls = (sldEarthing==='IT') ? '' :
    `<div class="select-group" style="margin-bottom:6px"><div class="select-label">${da?'Kabellængde til Zs-beregning':'Cable length for Zs'}</div><div class="select-grid">${lenBtns}</div></div>`
    + `<div class="select-group" style="margin-bottom:6px"><div class="select-label">${da?'Målt Zs (× beregnet) — verifikation':'Measured Zs (× calculated) — verification'}</div><div class="select-grid">${facBtns}</div></div>`;

  let rowsHtml='', verdict='', cls='ok';
  if(sldEarthing==='IT' && !sldITSecond){
    cls='warning';
    rowsHtml += row(da?'System':'System','IT '+(da?'(isoleret/Z, IMD)':'(isolated/Z, IMD)'));
    rowsHtml += row(da?'Beskyttelse':'Protection', devLbl);
    verdict = da ? 'IT — 1. fejl: meget lille fejlstrøm (begrænset af Zct/kapacitans). INGEN udkobling; IMD alarmerer. En 2. fejl på en anden fase giver fase-fase-strøm og udkobling.' : 'IT — 1st fault: very small fault current (limited by Zct/capacitance). NO disconnection; the IMD alarms. A 2nd fault on another phase gives line-line current and disconnection.';
  } else if(sldEarthing==='IT' && sldITSecond){
    cls='error';
    const Vll=400, Zloop=2*R1R2+0.3, If2=Vll/Zloop;
    rowsHtml += row(da?'System':'System','IT — '+(da?'2. fejl (fase-fase)':'2nd fault (line-line)'));
    rowsHtml += row(da?'Fejlsløjfespænding':'Fault-loop voltage', Vll+' V');
    rowsHtml += row(da?'Anslået fejlstrøm':'Estimated fault current','≈ '+If2.toFixed(0)+' A');
    rowsHtml += row(da?'Beskyttelse':'Protection', devLbl+(Ia?(' · Ia≈'+Ia+' A'):''));
    verdict = da ? 'IT 2. fejl: to fejl på forskellige faser danner en fase-fase-sløjfe (~400 V) med høj strøm → automatsikringen udløser hurtigt (<0,1 s).' : 'IT 2nd fault: two faults on different phases form a line-line loop (~400 V) with high current → the MCB disconnects fast (<0.1 s).';
  } else {
    const calcZs = Ze + R1R2;
    const If = (Cmin*Uo)/calcZs;
    const measZs = sldMeasZsFactor*calcZs;
    rowsHtml += row('Ze ('+(da?'kilde/typisk':'source/typical')+')', Ze.toFixed(2)+' Ω');
    rowsHtml += row('R1+R2 (L='+L+' m'+((sldRunLen===0 && !(c.dist>0))?(da?', antaget':', assumed'):'')+')', R1R2.toFixed(3)+' Ω');
    rowsHtml += row(da?'Beregnet Zs':'Calculated Zs', calcZs.toFixed(2)+' Ω');
    rowsHtml += row(da?'Forventet fejlstrøm Ief':'Prospective Ief', If.toFixed(0)+' A');
    rowsHtml += row(da?'Beskyttelse':'Protection', devLbl+(Ia?(' · Ia≈'+Ia+' A'):''));
    if(sldEarthing==='TT'){
      const RAmax = 50/0.03, Utouch = measZs*0.03;
      rowsHtml += row(da?'Maks. RA (HPFI 30 mA, 50 V)':'Max RA (RCD 30 mA, 50 V)', RAmax.toFixed(0)+' Ω');
      rowsHtml += row((da?'Målt RA = ':'Measured RA = ')+sldMeasZsFactor+'×', measZs.toFixed(2)+' Ω', measZs<=RAmax?'var(--success)':'var(--danger)');
      rowsHtml += row(da?'Berøringsspænding RA·IΔn':'Touch voltage RA·IΔn', Utouch.toFixed(1)+' V (≤ 50 V '+(Utouch<=50?'✓':'✗')+')');
      cls = (measZs<=RAmax && Utouch<=50) ? 'ok' : 'error';
      verdict = da ? ('TT: HPFI 30 mA udkobler så længe RA ≤ '+RAmax.toFixed(0)+' Ω. Målt '+measZs.toFixed(1)+' Ω → '+(measZs<=RAmax?'✓ opfyldt, udkobler <0,2 s.':'✗ for høj!')) : ('TT: the 30 mA RCD disconnects while RA ≤ '+RAmax.toFixed(0)+' Ω. Measured '+measZs.toFixed(1)+' Ω → '+(measZs<=RAmax?'✓ met, trips <0.2 s.':'✗ too high!'));
    } else {
      const ZsMax = Ia ? (Cmin*Uo/Ia) : null;
      const tReq = (mcb && mcb.rating<=32)?0.4:5;
      const measOk = ZsMax!=null && measZs<=ZsMax;
      const calcOk = ZsMax!=null && calcZs<=ZsMax;
      rowsHtml += row(da?'Maks. Zs (Cmin·Uo/Ia)':'Max Zs (Cmin·Uo/Ia)', ZsMax!=null?ZsMax.toFixed(2)+' Ω':'—');
      rowsHtml += row((da?'Målt Zs = ':'Measured Zs = ')+sldMeasZsFactor+'×', measZs.toFixed(2)+' Ω', measOk?'var(--success)':'var(--danger)');
      rowsHtml += row(da?'Krævet udkoblingstid':'Required disconnection','≤ '+tReq+' s');
      cls = measOk ? 'ok' : (calcOk ? 'warning' : 'error');
      verdict = measOk
        ? (da ? ('✓ Målt Zs ('+measZs.toFixed(2)+' Ω) ≤ maks. ('+ZsMax.toFixed(2)+' Ω) → momentan udkobling <0,1 s, opfylder ≤'+tReq+' s.') : ('✓ Measured Zs ('+measZs.toFixed(2)+' Ω) ≤ max ('+ZsMax.toFixed(2)+' Ω) → instantaneous trip <0.1 s, meets ≤'+tReq+' s.'))
        : (da ? ('⚠ Målt Zs ('+measZs.toFixed(2)+' Ω) > maks. ('+(ZsMax!=null?ZsMax.toFixed(2):'?')+' Ω) → automatsikring udløser ikke i tide. Forkort kabel, øg tværsnit, eller anvend HPFI.') : ('⚠ Measured Zs ('+measZs.toFixed(2)+' Ω) > max ('+(ZsMax!=null?ZsMax.toFixed(2):'?')+' Ω) → MCB will not trip in time. Shorten the run, increase csa, or use an RCD.'));
    }
  }
  return `<div class="card fade-in"><div class="card-title">📐 ${da?'Sløjfeimpedans & udkobling':'Loop impedance & disconnection'} — ${c.name||('K'+(idx+1))} · ⏚ ${sldEarthing}</div>`
    + controls
    + `<div class="result-box ${cls}">${rowsHtml}<div class="result-row"><span class="label" style="line-height:1.55">${verdict}</span></div></div>`
    + `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:6px">${da?'Ze og kabellængde er typiske/antagne værdier til undervisning. Brug målt sløjfeimpedans ved idriftsættelse (DS/HD 60364-6).':'Ze and cable length are typical/assumed teaching values. Use the measured loop impedance at commissioning (DS/HD 60364-6).'}</div>`
    + `<div style="font-size:0.68rem;font-style:italic;color:var(--text-muted);margin-top:4px;opacity:0.85">\u{1F4D6} Ref: DS/HD 60364-6 \u00A76.4.3.4 + DS/HD 60364-4-41 \u00A7411.3.2 \u00B7 <a href="https://sikkerhedsstyrelsen.dk" target="_blank" style="color:var(--primary-light)">sik.dk</a></div></div>`;
}

// ===== COMMISSIONING TEST PROTOCOL (DS/HD 60364-6) =====
// Click-through checklist of all required tests per DS/HD 60364-6 section 6.4.
// State object tracking pass/fail/na per test, plus printable certificate.
let commResults = {};

function commSetResult(testId, result){
  commResults[testId] = result;
  renderModule('draw');
}

function commReset(){
  commResults = {};
  renderModule('draw');
}

function buildCommissioning(){
  const da = lang==='da';
  const tests = [
    { id:'continuity', clause:'\u00A76.4.3.2', da:'Kontinuitet af beskyttelsesledere', en:'Continuity of protective conductors', da_desc:'M\u00E5l modstanden i alle PE/PEN-ledere. Forbind milliohmmeter mellem tavlens PE-skinne og hver udtagspunkts PE-klemme.', en_desc:'Measure resistance in all PE/PEN conductors. Connect milliohm meter between panel PE bar and each outlet PE terminal.', da_crit:'R \u2264 1 \u03A9 (typisk < 0,5 \u03A9 for korte kredse)', en_crit:'R \u2264 1 \u03A9 (typically < 0.5 \u03A9 for short circuits)' },
    { id:'insulation', clause:'\u00A76.4.3.3', da:'Isolationsmodstand', en:'Insulation resistance', da_desc:'M\u00E5l med 500 V DC megger mellem alle aktive ledere og jord (PE). Alle forbrugere frakoblet, HPFI\u2019er sl\u00E5et fra.', en_desc:'Measure with 500 V DC megger between all live conductors and earth (PE). All loads disconnected, RCDs switched off.', da_crit:'R_iso \u2265 1 M\u03A9 (SELV/PELV: 0,5 M\u03A9, FELV: 0,5 M\u03A9)', en_crit:'R_iso \u2265 1 M\u03A9 (SELV/PELV: 0.5 M\u03A9, FELV: 0.5 M\u03A9)' },
    { id:'loop', clause:'\u00A76.4.3.4', da:'Sl\u00F8jfeimpedans (Zs)', en:'Loop impedance (Zs)', da_desc:'M\u00E5l Zs med sløjfeimpedanstester i hvert udtagspunkt. Sammenlign med maks. Zs for det valgte beskyttelsesudstyr.', en_desc:'Measure Zs with loop impedance tester at each outlet point. Compare with max Zs for the selected protective device.', da_crit:'Zs \u2264 Zs_max (s\u00E5 Ia udl\u00F8ser inden for kr\u00E6vet tid)', en_crit:'Zs \u2264 Zs_max (so Ia trips within required time)' },
    { id:'polarity', clause:'\u00A76.4.3.5', da:'Polaritetskontrol', en:'Polarity check', da_desc:'Verificer at alle enfasede kontakter har korrekt L/N/PE tilslutning, og at afbrydere er monteret i faseleder (L), ikke neutral.', en_desc:'Verify all single-phase outlets have correct L/N/PE connection, and that switches are installed in the line conductor (L), not neutral.', da_crit:'Alle kontakter korrekt: L=h\u00F8jre, N=venstre, PE=top', en_crit:'All outlets correct: L=right, N=left, PE=top' },
    { id:'rcd', clause:'\u00A76.4.3.6', da:'HPFI/RCD-funktion', en:'RCD function test', da_desc:'Test alle HPFI/RCD-enheder med kalibreret RCD-tester. M\u00E5l udl\u00F8setid ved I\u0394n og 5\u00D7I\u0394n. Kontroller ogs\u00E5 testknap.', en_desc:'Test all RCD devices with calibrated RCD tester. Measure trip time at I\u0394n and 5\u00D7I\u0394n. Also check test button.', da_crit:'Udl\u00F8setid \u2264 300 ms ved I\u0394n, \u2264 40 ms ved 5\u00D7I\u0394n', en_crit:'Trip time \u2264 300 ms at I\u0394n, \u2264 40 ms at 5\u00D7I\u0394n' },
    { id:'voltage', clause:'\u00A76.4.3.7', da:'Sp\u00E6ndingsm\u00E5ling', en:'Voltage measurement', da_desc:'M\u00E5l fase-nul, fase-fase og fase-jord sp\u00E6ndinger ved forsyningspunktet. Kontroller at sp\u00E6ndingen er inden for \u00B110% af nominel.', en_desc:'Measure line-neutral, line-line and line-earth voltages at the supply point. Verify voltage is within \u00B110% of nominal.', da_crit:'207-253 V (L-N), 360-440 V (L-L)', en_crit:'207-253 V (L-N), 360-440 V (L-L)' }
  ];

  const total = tests.length;
  const passed = tests.filter(t=>commResults[t.id]==='pass').length;
  const failed = tests.filter(t=>commResults[t.id]==='fail').length;
  const na = tests.filter(t=>commResults[t.id]==='na').length;
  const pending = total - passed - failed - na;
  const allDone = pending === 0;
  const allOk = allDone && failed === 0;

  let html = `<div class="card fade-in" style="border-left:4px solid ${allOk?'var(--success)':failed>0?'var(--danger)':'var(--primary-light)'}">`;
  html += `<div class="card-title">\u{1F9EA} ${da?'Idriftss\u00E6ttelsespr\u00F8vning (DS/HD 60364-6)':'Commissioning tests (DS/HD 60364-6)'}</div>`;
  html += `<div class="info-row" style="margin-bottom:4px">${da?'Klik-baseret checkliste for alle p\u00E5kr\u00E6vede pr\u00F8vninger if\u00F8lge DS/HD 60364-6 \u00A76.4. Marker hver pr\u00F8vning som best\u00E5et, fejlet eller N/A.':'Click-based checklist for all required tests per DS/HD 60364-6 \u00A76.4. Mark each test as passed, failed or N/A.'}</div>`;
  html += `<div style="font-size:0.68rem;font-style:italic;color:var(--text-muted);margin-bottom:10px;opacity:0.85">\u{1F4D6} DS/HD 60364-6 \u00A76.4 \u00B7 Installationsbekendtg\u00F8relsen BEK 1082 \u00B7 <a href="https://sikkerhedsstyrelsen.dk" target="_blank" style="color:var(--primary-light)">Sikkerhedsstyrelsen.dk</a></div>`;

  // Progress bar
  html += `<div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">`;
  html += `<div style="flex:1;min-width:60px;text-align:center;padding:8px;border-radius:8px;background:rgba(0,200,255,0.08);border:1px solid rgba(0,200,255,0.2)"><div style="font-size:1.4rem;font-weight:800;color:var(--success)">${passed}</div><div style="font-size:.7rem;color:var(--text-muted)">${da?'best\u00E5et':'passed'}</div></div>`;
  html += `<div style="flex:1;min-width:60px;text-align:center;padding:8px;border-radius:8px;background:rgba(255,59,92,0.08);border:1px solid rgba(255,59,92,0.2)"><div style="font-size:1.4rem;font-weight:800;color:var(--danger)">${failed}</div><div style="font-size:.7rem;color:var(--text-muted)">${da?'fejlet':'failed'}</div></div>`;

  });

  // Reset button
  html += `<div style="margin-top:8px;text-align:right"><button class="sel-btn" onclick="commReset()" style="font-size:.72rem">\u21BA ${da?'Nulstil alle':'Reset all'}</button></div>`;

function _loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = () => rej(new Error('load failed'));
    document.head.appendChild(s);
  });
}

// File picker handler (txt/csv/md read directly; pdf via pdf.js with fallback)
async function brainHandleFile(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  brainErr = ''; brainAiOut = '';
  const name = file.name.toLowerCase();
  if(name.endsWith('.pdf')){ await brainReadPdf(file); return; }
  try {
    const text = await file.text();
    brainAnalyze(text, file.name);
  } catch(e){
    brainErr = (lang==='da' ? 'Kunne ikke læse filen. Prøv en .txt-fil eller vælg et eksempelprojekt.' : 'Could not read the file. Try a .txt file or pick a sample project.');
    renderModule('brain');
  }
}

async function brainReadPdf(file){
  brainBusy = true; brainErr = ''; renderModule('brain');
  try {
    if(!window.pdfjsLib){
      await _loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    }
    if(window.pdfjsLib && pdfjsLib.GlobalWorkerOptions){
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let text = '';
    for(let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const c = await page.getTextContent();
      text += c.items.map(it => it.str).join(' ') + '\n';
    }
    brainBusy = false;
    if(text.replace(/\s/g,'').length < 20) throw new Error('empty');
    brainAnalyze(text, file.name);
  } catch(e){
    // Offline / scanned PDF fallback: naive byte scan for embedded plain text
    try {
      const t = await file.text();
      const clean = t.replace(/[^\x09\x0A\x0D\x20-\x7E\u00C0-\u017F]/g, ' ');
      if(clean.replace(/\s/g,'').length > 60){ brainBusy = false; brainAnalyze(clean, file.name + ' (rå tekst)'); return; }
    } catch(_){}
    brainBusy = false;
    brainErr = (lang==='da'
      ? 'Kunne ikke læse PDF\'en offline (måske scannet/komprimeret). Forbind til internettet, upload en .txt, eller vælg et eksempelprojekt nedenfor.'
      : 'Could not read the PDF offline (possibly scanned/compressed). Connect to the internet, upload a .txt, or pick a sample project below.');
    renderModule('brain');
  }
}

  const s = BRAIN_SAMPLES[key]; if(!s) return;
  brainErr=''; brainAiOut='';
  brainAnalyze(lang==='da'? s.da : s.en, (lang==='da'? s.da_label : s.en_label));
}

// Core extractor: text -> structured project.
// Segment-based: each number is bound to the nearest preceding keyword, and
// overlapping keyword hits (e.g. "pumpe" inside "varmepumpe") are removed.
function brainExtract(text){
  const low = (' ' + text.toLowerCase() + ' ').replace(/\s+/g,' ');
  const supply = /(\b400\s*v|3\s*[x×]\s*400|3-?faset|three-?phase|3~)/.test(low) ? '3x400'
               : (/(\b230\s*v|1-?faset|single-?phase)/.test(low) ? '1x230' : '3x400');

  // 1) one hit per library entry (its earliest keyword occurrence)
  let hits = [];
  BRAIN_LIB.forEach(entry => {
    let best = -1, bestKey = '';
    entry.keys.forEach(k => { const p = low.indexOf(k); if(p >= 0 && (best < 0 || p < best)){ best = p; bestKey = k; } });
    if(best >= 0) hits.push({ entry, pos: best, end: best + bestKey.length });
  });
  // 2) order by position, longer keyword wins ties, then drop overlaps
  hits.sort((a,b) => a.pos - b.pos || (b.end - b.pos) - (a.end - a.pos));
  const accepted = []; let lastEnd = -1;
  hits.forEach(h => { if(h.pos >= lastEnd){ accepted.push(h); lastEnd = h.end; } });

  // 3) parse power/distance from each hit's own segment (up to the next hit)
  const consumers = [];
  const features = new Set();
  accepted.forEach((h, i) => {
    const entry = h.entry;
    const segEnd = (i+1 < accepted.length) ? accepted[i+1].pos : Math.min(low.length, h.end + 80);
    const seg = low.slice(h.end, segEnd);
    const pre = low.slice((i > 0) ? accepted[i-1].end : Math.max(0, h.pos - 18), h.pos);

    let qty = 1;
    const qm = pre.match(/(\d{1,3})\s*(?:stk\.?|styk|x|×|pcs|pieces)?\s*$/);
    if(qm){ const q = parseInt(qm[1],10); if(q >= 1 && q <= 500) qty = q; }

    let kW = entry.kW, m;
    if((m = seg.match(/(\d+(?:[.,]\d+)?)\s*kw/)))            kW = _brainNum(m[1]);
    else if((m = seg.match(/(\d+(?:[.,]\d+)?)\s*kva/)))      kW = _brainNum(m[1]) * entry.cos;
    else if((m = seg.match(/(\d+(?:[.,]\d+)?)\s*a(?:mp|mpere)?\b/))){
      const A = _brainNum(m[1]);
      kW = (entry.phase==='3' ? Math.sqrt(3)*400*entry.cos*A : 230*entry.cos*A) / 1000;
    }
    else if((m = seg.match(/(\d{3,5})\s*w\b/)))              kW = _brainNum(m[1]) / 1000;

    let dist = entry.dist;
    const dm = seg.match(/(\d+(?:[.,]\d+)?)\s*m(?:eter|tr)?\b/);
    if(dm){ const d = _brainNum(dm[1]); if(d > 0 && d < 2000) dist = d; }

    const label = (lang==='da'? entry.da : entry.en) + (qty > 1 ? ' (' + qty + ' stk)' : '');
    consumers.push({
      name: label, kW: +(kW*qty).toFixed(2), kWunit: kW, qty,
      cos: entry.cos, sf: entry.sf, phase: entry.phase,
      node: entry.node, feature: entry.feature || null, dist
    });
    if(entry.feature) features.add(entry.feature);
  });

  BRAIN_REQ.forEach(r => { if(r.keys.some(k => low.indexOf(k) >= 0)) features.add(r.feature); });

  let note = '';
  if(consumers.length === 0){
    consumers.push({ name: lang==='da'?'Blandet forbrug':'Mixed load', kW:10, kWunit:10, qty:1, cos:0.9, sf:0.8, phase:'3', node:'load', feature:null, dist:18 });
    note = lang==='da' ? 'Ingen specifikke forbrugere fundet i teksten — bruger et generisk skøn. Tilføj flere detaljer for et mere præcist forslag.' : 'No specific loads found in the text — using a generic estimate. Add more detail for a more precise proposal.';
  }
  return { consumers, features:[...features], supply, source: brainSource, note, raw:text };
}

// Build the 3D scene node list for a project
function brainBuildNodes(p){
  const sch = calcLoadSchedule();
  const trafo = TRAFO_SIZES.find(t => t >= sch.kVA) || TRAFO_SIZES[TRAFO_SIZES.length-1];
  const nodes = [
    { type:'grid',  label: p.supply==='3x400' ? '400 V 3~' : '230 V 1~' },
    { type:'trafo', label: trafo + ' kVA' },
    { type:'meter', label: lang==='da'?'Måler':'Meter' },
    { type:'panel', label: 'IB ' + sch.ib.toFixed(0) + ' A' }
  ];
  const f = p.features;
  if(f.includes('pv'))      nodes.push({ type:'pv',      label:'PV' });
  if(f.includes('battery')) nodes.push({ type:'battery', label: lang==='da'?'Batteri':'Battery' });
  if(f.includes('ev'))      nodes.push({ type:'ev',      label:'EV' });
  if(f.includes('motor'))   nodes.push({ type:'motor',   label: lang==='da'?'Motorer':'Motors' });
  nodes.push({ type:'load', label: p.consumers.length + ' ' + (lang==='da'?'grupper':'circuits') });
  return nodes;
}

// Per-circuit dimensioning proposal
function brainDimension(p){
  const rows = [];
  let anyVdropOver = false;
  p.consumers.forEach(c => {
    const cur = lsConsumerCurrent(c);
    const ib = Math.max(cur.L1||0, cur.L2||0, cur.L3||0) || 0.1;
    const cable = recommendCables(ib, 'copper')[0];
    let prot = '';
    if(ib > 125){ const mc = recommendMCCBs(ib)[0]; prot = mc ? (mc.brand+' '+mc.model) : (lang==='da'?'NH-sikring':'NH fuse'); }
    else if(ib > 63){ const f = recommendFuses(ib)[0]; const mc = recommendMCBs(ib)[0]; prot = mc ? (mc.model+' '+mc.curve+mc.rating) : (f ? (f.brand+' '+f.rating+'A') : '—'); }
    else { const curve = c.feature==='motor' ? 'C' : 'B'; const mc = recommendMCBs(ib)[0]; prot = mc ? (mc.brand+' '+mc.model+' '+curve+mc.rating) : '—'; }
    // voltage drop
    let vdP = 0;
    if(cable){
      const L = (c.dist||0)/1000, cosP = c.cos, sinP = Math.sin(Math.acos(cosP)), Un = c.phase==='3'?400:230;
      const vd = (c.phase==='3' ? Math.sqrt(3) : 2) * ib * L * ((cable.r||0)*cosP + (cable.x||0)*sinP);
      vdP = (vd/Un)*100;
    }
    const limit = c.feature==='lighting' ? 3 : 4;
    const vdOver = vdP > limit;
    if(vdOver) anyVdropOver = true;
    rows.push({
      name: c.name, kW: c.kW, phase: c.phase==='3'?'3~':c.phase, ib,
      cable: cable ? (cable.mm2+' mm²') : '—',
      cableObj: cable, prot, dist: c.dist||0, vdP, vdOver, limit, feature: c.feature
    });
  });
  return { rows, anyVdropOver };
}

// Recommendations for the installer (technical)
function brainInstallerRecs(p, dim){
  const r = [], da = lang==='da', f = p.features;
  const sch = calcLoadSchedule();
  const trafo = TRAFO_SIZES.find(t => t >= sch.kVA) || TRAFO_SIZES[TRAFO_SIZES.length-1];
  r.push(da ? `Dimensionér hovedforsyning efter IB ≈ ${sch.ib.toFixed(0)} A / ${sch.kVA.toFixed(1)} kVA — foreslået transformer ${trafo} kVA.` 
            : `Size the main supply for IB ≈ ${sch.ib.toFixed(0)} A / ${sch.kVA.toFixed(1)} kVA — suggested transformer ${trafo} kVA.`);
  r.push(da ? 'Alle endegrupper beskyttes med HPFI/RCD 30 mA (min. Type A) iht. Installationsbekendtgørelsen.' 
            : 'Protect all final circuits with RCD 30 mA (min. Type A) per the Installation Order.');
  r.push(da ? 'Montér overspændingsbeskyttelse SPD Type 2 i hovedtavlen (Type 1+2 ved lynudsat placering).' 
            : 'Install surge protection SPD Type 2 in the main panel (Type 1+2 if lightning-exposed).');
  r.push(da ? 'Kontrollér selektivitet mellem hoved- og gruppebeskyttelse (typisk 1,6:1 for sikringer).' 
            : 'Verify selectivity between main and group protection (typically 1.6:1 for fuses).');
  if(f.includes('ev'))      r.push(da ? 'EV-ladere: dedikeret gruppe, kurve C, og Type B HPFI ELLER Type A + 6 mA DC-detektion (DS/HD 60364-7-722).' : 'EV chargers: dedicated circuit, curve C, and Type B RCD OR Type A + 6 mA DC detection (DS/HD 60364-7-722).');
  if(f.includes('pv'))      r.push(da ? 'Solceller: AC-sidesikring, anti-ø-drift, korrekt mærkning og adskillelse; overvej Type B ved transformerløs inverter.' : 'Solar PV: AC-side protection, anti-islanding, correct labelling and isolation; consider Type B with transformerless inverter.');
  if(f.includes('battery')) r.push(da ? 'Batterilager: følg producentens krav til afbryder, BMS og placering; brandmæssig adskillelse.' : 'Battery storage: follow manufacturer requirements for isolation, BMS and placement; fire separation.');
  if(f.includes('motor'))   r.push(da ? 'Motorafgange: kurve C/D, motorværn (MPCB) + termorelæ indstillet til mærkestrøm; overvej softstart/VFD ved store motorer.' : 'Motor feeders: curve C/D, motor protection (MPCB) + overload relay set to rated current; consider soft-start/VFD for large motors.');
  if(f.includes('bathroom'))r.push(da ? 'Badeværelse: overhold zoner 0/1/2 (DS/HD 60364-7-701), IPX4+, SELV i zone 0, og potentialudligning.' : 'Bathroom: observe zones 0/1/2 (DS/HD 60364-7-701), IPX4+, SELV in zone 0, and equipotential bonding.');
  if(f.includes('outdoor')) r.push(da ? 'Udendørs: materiel min. IP44 (IP65 ved direkte vejr), UV-bestandigt, HPFI 30 mA på alle udendørs kredse.' : 'Outdoor: equipment min. IP44 (IP65 for direct weather), UV-resistant, RCD 30 mA on all outdoor circuits.');
  if(f.includes('lighting'))r.push(da ? 'Belysning: spændingsfald ≤ 3% — vælg evt. større tværsnit på lange lysgrupper.' : 'Lighting: voltage drop ≤ 3% — upsize conductors on long lighting runs if needed.');
  if(dim.anyVdropOver)      r.push(da ? '⚠️ En eller flere grupper overstiger spændingsfaldsgrænsen — opgradér kabeltværsnit eller afkort ruten.' : '⚠️ One or more circuits exceed the voltage-drop limit — upsize the cable or shorten the route.');
  r.push(da ? 'Dokumentér med måleprotokol (kontinuitet, isolation, HPFI-udløsetid, sløjfeimpedans) før idriftsættelse (DS/HD 60364-6).' : 'Document with a test protocol (continuity, insulation, RCD trip time, loop impedance) before commissioning (DS/HD 60364-6).');
  return r;
}

// Recommendations for the customer (plain language, zero electrical knowledge)
function brainCustomerRecs(p){
  const da = lang==='da', f = p.features, out = [];
  const names = p.consumers.map(c => (c.name||'').replace(/\s*\(\d+ stk\)/,'')).filter((v,i,a)=>a.indexOf(v)===i);
  out.push(da
    ? `Vi installerer et komplet, sikkert og fremtidssikret el-anlæg til dit projekt — i alt ${p.consumers.length} grupper, bl.a. ${names.slice(0,5).join(', ')}.`
    : `We will install a complete, safe and future-proof electrical system for your project — ${p.consumers.length} circuits in total, including ${names.slice(0,5).join(', ')}.`);
  out.push(da
    ? 'Alt beskyttes af moderne fejlstrømsafbrydere (HPFI), der afbryder strømmen på et splitsekund, hvis noget går galt — det beskytter både dig og din familie.'
    : 'Everything is protected by modern residual-current devices that cut the power in a split second if anything goes wrong — protecting you and your family.');
  if(f.includes('ev') || f.includes('pv') || f.includes('battery'))
    out.push(da
      ? 'Anlægget er klar til den grønne fremtid: elbil-opladning, solceller og batteri spiller sammen, så du sparer penge og er forberedt på i morgen.'
      : 'Your system is ready for the green future: EV charging, solar and battery work together so you save money and are prepared for tomorrow.');
  out.push(da
    ? 'Alt udføres efter de danske el-regler (DS/HD 60364) af en autoriseret elektriker — og afleveres med fuld dokumentation og måling.'
    : 'Everything is done to the Danish electrical rules (DS/HD 60364) by an authorized electrician — and delivered with full documentation and testing.');
  out.push(da
    ? '👆 3D-tegningen ovenfor viser præcis, hvad der bliver installeret — fra forsyning til hver enkelt gruppe i dit hjem.'
    : '👆 The 3D drawing above shows exactly what will be installed — from the supply to every circuit in your home.');
  return out;
}

function brainAnalyze(text, source){
  brainSource = source || '';
  const p = brainExtract(text);
  // Sync into the app-wide load schedule so the whole tool reflects the project
  loadList = p.consumers.map(c => ({ name:c.name, kW:c.kW, cos:c.cos, sf:c.sf, phase:c.phase, dist:c.dist }));
  p.nodes = brainBuildNodes(p);
  brainProject = p;
  renderModule('brain');
}

function brainReset(){ brainProject=null; brainSource=''; brainErr=''; brainAiOut=''; loadList=[]; renderModule('brain'); }

// Optional: enhance analysis with online AI (uses the AI-Electrician config)
async function brainAiAnalyze(){
  if(!brainProject){ return; }
  const cfg = JSON.parse(localStorage.getItem('aiElectricianCfg') || '{}');

  brainBusy = true; renderModule('brain');
  const sys = lang==='da'
    ? 'Du er en erfaren dansk autoriseret elinstallatør. Analysér projektbeskrivelsen og giv et kort, struktureret dimensioneringsoverblik (forsyning, hovedtavle, vigtige grupper, kabler, beskyttelse) samt de 3 vigtigste anbefalinger. Følg DS/HD 60364. Svar kort på dansk.'
    : 'You are an experienced Danish authorized electrician. Analyze the project description and give a short, structured dimensioning overview (supply, main panel, key circuits, cables, protection) plus the 3 most important recommendations. Follow DS/HD 60364. Answer briefly in English.';

  brainBusy = false; renderModule('brain');
}

      </div>
    </div>`;

  // Optional online AI enhancement
  html += `
    <div class="card fade-in">
      <div class="card-title">🌐 ${da? 'Forbedr med online AI (valgfrit)' : 'Enhance with online AI (optional)'}</div>
      <div class="info-row">${da?'Send projektet til en tilsluttet AI-tjeneste for et ekstra ekspert-tjek. Virker også 100% offline uden dette.':'Send the project to a connected AI service for an extra expert check. Works 100% offline without this too.'}</div>
      <div class="select-grid"><button class="sel-btn selected" onclick="brainAiAnalyze()">🤖 ${da?'Analysér med online AI':'Analyze with online AI'}</button></div>
      ${brainBusy ? `<div class="info-row" style="margin-top:8px">🤖 ${da?'AI tænker…':'AI is thinking…'}</div>` : ''}
      ${brainAiOut ? `<div class="result-box" style="margin-top:10px;background:var(--tint-info);border-color:var(--accent)"><div class="result-title">${da?'AI-ekspertvurdering':'AI expert assessment'}</div><div class="result-row"><span class="label" style="white-space:pre-wrap;line-height:1.6">${brainAiOut.replace(/</g,'&lt;')}</span></div></div>` : ''}
    </div>`;

  return html;
}

// ===== INIT =====
renderNav();
renderStatusBar();
renderModule(activeModule);
(function(){ var b=document.getElementById('verBadge'); if(b) b.textContent='v'+DATA_VERSION; })();
</script>
