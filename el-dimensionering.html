// ===== DYNAMIC LAW / STANDARDS UPDATE CHECK =====
// Danish electrical regulations are revised regularly. When online, the app can
// check a remote JSON manifest for newer standard versions/dates and notify the user.
// Default manifest is configurable; falls back silently offline.
// Default manifest is hosted in this repo; users can override via configureLawSource().
const LAW_MANIFEST_DEFAULT = 'https://raw.githubusercontent.com/ajlooshahram-lang/Claude/main/standards-manifest.json';
const _lawStored = localStorage.getItem('lawManifestUrl');
const LAW_MANIFEST_URL = _lawStored === 'off' ? '' : (_lawStored || LAW_MANIFEST_DEFAULT);
// Current built-in standards baseline (what the app was built against)
const STANDARDS_BASELINE = {
  checked: '2026-06-11',
  items: {
    'Elsikkerhedsloven': 'LBK nr 26 af 2023',
    'Installationsbekendtgørelsen': 'BEK nr 1082',
    'DS/HD 60364-5-52': '2011+A12:2022',
    'DS/HD 60364-4-43': '2023',
    'IEC 60364-1': '2025',
    'Fællesregulativet': '2019'
  }
};
let lawUpdateInfo = JSON.parse(localStorage.getItem('lawUpdateInfo') || 'null');

async function checkLawUpdates(manual) {
  if (!navigator.onLine) {
    if (manual) alert(lang === 'da' ? 'Ingen internetforbindelse. Pr\u00F8v igen, n\u00E5r du er online.' : 'No internet connection. Try again when online.');
    return;
  }
  const url = LAW_MANIFEST_URL;
  if (!url) {
    // No manifest configured: guide the user (no false claims of an update)
    if (manual) {
      const set = confirm(lang === 'da'
        ? 'Der er ikke konfigureret en opdateringskilde endnu.\n\nVil du angive en URL til et JSON-manifest med de nyeste danske standarder/love? (f.eks. fra Sikkerhedsstyrelsen eller din egen server)'
        : 'No update source is configured yet.\n\nDo you want to set a URL to a JSON manifest with the latest Danish standards/laws? (e.g. from Sikkerhedsstyrelsen or your own server)');
      if (set) configureLawSource();
    }
    return;
  }
  try {
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    // Compare manifest items vs baseline
    const changes = [];
    if (data && data.items) {
      Object.keys(data.items).forEach(k => {
        const latest = data.items[k];
        const current = STANDARDS_BASELINE.items[k];
        if (current && latest && latest !== current) {
          changes.push({ name: k, from: current, to: latest });
        } else if (!current && latest) {
          changes.push({ name: k, from: '\u2014', to: latest });
        }
      });
    }
    lawUpdateInfo = { date: new Date().toISOString().slice(0, 10), source: url, changes, manifestDate: data.checked || null };
    localStorage.setItem('lawUpdateInfo', JSON.stringify(lawUpdateInfo));
    if (activeModule === 'standards') renderModule('standards');
    if (manual) {
      alert(changes.length
        ? (lang === 'da' ? changes.length + ' opdatering(er) fundet. Se "Standarder".' : changes.length + ' update(s) found. See "Standards".')
        : (lang === 'da' ? 'Alle standarder er opdaterede.' : 'All standards are up to date.'));
    }
  } catch (e) {
    if (manual) alert((lang === 'da' ? 'Kunne ikke hente opdateringer: ' : 'Could not fetch updates: ') + e.message);
  }
}

function configureLawSource() {
  const url = prompt(lang === 'da'
    ? 'URL til JSON-manifest med nyeste standarder (lad tom for at sl\u00E5 fra):'
    : 'URL to JSON manifest with latest standards (leave empty to disable):', LAW_MANIFEST_URL);
  if (url === null) return;
  localStorage.setItem('lawManifestUrl', url.trim() === '' ? 'off' : url.trim());
  location.reload();
}

// Auto-check once per day when online
(function autoLawCheck() {
  if (!LAW_MANIFEST_URL) return;
  const last = localStorage.getItem('lawCheckedAt');
  const today = new Date().toISOString().slice(0, 10);
  if (last !== today) {
    localStorage.setItem('lawCheckedAt', today);
    if (navigator.onLine) checkLawUpdates(false);
    else window.addEventListener('online', () => checkLawUpdates(false), { once: true });
  }
})();

// ===== BID / QUOTE ENGINE (connect to Danish wholesalers) =====
// Generates an initial project price ("tilbud") from a bill of materials.
//
// IMPORTANT - HONEST NOTE: Live, exact wholesaler prices are only available
// through authenticated B2B accounts (Lemvigh-Müller, Solar, Sanistål, AO).
// There is no public price API. So the app uses INDICATIVE reference prices
// (clearly labelled) out of the box, and lets you CONNECT your own B2B price
// feed per wholesaler for real, live, customer-specific pricing.

const WHOLESALERS = {
  'Lemvigh-Müller': { idx: 1.00, feed: '' },
  'Solar': { idx: 1.02, feed: '' },
  'Sanistål': { idx: 1.04, feed: '' },
  'AO': { idx: 1.03, feed: '' }
};
// EG Sigma / EG Kalkia compatibility: Danish trade calculation systems key
// products by EL-nr (unique Danish electrical product number) and import
// wholesaler price files (DLF / grossist prisfiler). The price-feed pattern
// supports {elnr} {ref} {id} so it can plug into the same data sources.

// Indicative unit prices in DKK ex. moms (rough Danish-market estimates).
// Cables are priced per metre; everything else per piece.
function priceFor(cat, p) {
  let v;
  if (cat === 'cables') {
    const base = {1.5:12,2.5:18,4:28,6:40,10:65,16:100,25:160,35:220,50:310,70:430,95:580,120:740,150:920,185:1150,240:1500};
    v = base[p.mm2] || 50;
    if (p.material === 'Al') v *= 0.6;
  } else if (cat === 'mcbs') {
    v = 80 + (p.rating || 16) * 1.5 + (p.icu >= 10 ? 45 : 0);
  } else if (cat === 'mccbs') {
    const f = {'NSX 100':1800,'NSX 160':2500,'NSX 250':3500,'NSX 400':6000,'NSX 630':8500};
    v = f[p.frame] || 2000;
  } else if (cat === 'fuses') {
    v = (p.size || '').indexOf('NH') === 0 ? 60 + p.rating * 0.5 : 20 + p.rating * 0.6;
  } else if (cat === 'rcds') {
    v = 400 + p.rating * 4 + (p.rcdType === 'B' ? 2500 : 0);
  } else if (cat === 'rcbos') {
    v = 350 + p.rating * 4;
  } else if (cat === 'spds') {
    v = (p.spdType || '').indexOf('1') >= 0 ? 2500 : 1200;
  } else if (cat === 'contactors') {
    v = 200 + (p.ac3_A || 9) * 12;
  } else if (cat === 'mpcbs') {
    v = (p.series || '').indexOf('GV3') >= 0 ? 1800 : 400 + (p.rangeMax || 6) * 8;
  } else if (cat === 'overloadRelays') {
    v = 300 + (p.rangeMax || 6) * 6;
  } else if (cat === 'wiringDevices') {
    v = p.cat === 'socket' ? 85 : 70;
  } else { v = 100; }
  return Math.round(v);
}

function findProduct(cat, id) {
  return (PRODUCTS[cat] || []).find(x => x.id === id);
}

// Akkord / montagetid: indicative standard installation time (minutes per unit),
// like the Danish akkord-tidsfortegnelse that EG Sigma / EG Kalkia use to derive labor.
// Cables are per metre; everything else per piece.
const MONTAGETID = {
  cables: 3, mcbs: 8, mccbs: 25, fuses: 5, rcds: 12, rcbos: 12,
  spds: 20, contactors: 20, mpcbs: 20, overloadRelays: 12, wiringDevices: 18
};
function montagetidFor(cat) { return MONTAGETID[cat] || 10; }

// Bid state (EG Sigma / Kalkia style)
let bidState = {
  wholesaler: 'Lemvigh-Müller',
  laborMode: 'akkord', // 'akkord' = auto from montagetid, 'fast' = manual hours
  laborHours: 8,       // used in 'fast' mode
  hourlyRate: 550,
  rabat: 40,           // wholesaler discount % off list (rabatgruppe)
  markup: 15,          // dækningsbidrag / avance % on net materials
  basket: [], // { cat, id, qty }
  pickCat: 'cables'
};

function addToBid(cat, id, qty) {
  const existing = bidState.basket.find(b => b.cat === cat && b.id === id);
  if (existing) existing.qty += (qty || 1);
  else bidState.basket.push({ cat, id, qty: qty || 1 });
}
function bidQty(i, d) { bidState.basket[i].qty = Math.max(1, bidState.basket[i].qty + d); renderModule('bid'); }
function bidRemove(i) { bidState.basket.splice(i, 1); renderModule('bid'); }
function bidAddPick(id) { addToBid(bidState.pickCat, id, bidState.pickCat === 'cables' ? (vdropState.length || 1) : 1); renderModule('bid'); }

// Auto-build a starter basket from the current dimensioning
function bidAutoFill() {
  bidState.basket = [];
  const ib = calcIB();
  // Cable (qty = run length in metres)
  const recCab = recommendCables(ib)[0];
  if (recCab) addToBid('cables', recCab.id, vdropState.length || 25);
  // Protection: MCB if <=63A else MCCB
  if (ib <= 63) { const m = recommendMCBs(ib)[0]; if (m) addToBid('mcbs', m.id, 1); }
  else { const m = recommendMCCBs(ib)[0]; if (m) addToBid('mccbs', m.id, 1); }
  // RCD
  const r = recommendRCDs(ib, loadState.voltage)[0]; if (r) addToBid('rcds', r.id, 1);
  renderModule('bid');
}

function renderBid() {
  const wsKeys = Object.keys(WHOLESALERS);
  const ws = WHOLESALERS[bidState.wholesaler];
  const hourlyOptions = [450, 500, 550, 600, 650, 750];
  const markupOptions = [0, 10, 15, 20, 25, 30];
  const rabatOptions = [0, 20, 30, 40, 50, 55, 60];

  // Build itemized lines (EG Sigma/Kalkia style: list price -> rabat -> net)
  let materialsList = 0;   // sum of list prices
  let totalMinutes = 0;    // sum of montagetid (akkord)
  const lines = bidState.basket.map((b, i) => {
    const p = findProduct(b.cat, b.id);
    if (!p) return '';
    const list = Math.round(priceFor(b.cat, p) * ws.idx);
    const lineList = list * b.qty;
    materialsList += lineList;
    const mins = montagetidFor(b.cat) * b.qty;
    totalMinutes += mins;
    const net = Math.round(list * (1 - bidState.rabat / 100));
    const lineNet = net * b.qty;
    const unitLabel = b.cat === 'cables' ? 'kr/m' : 'kr/stk';
    return `
      <div class="result-row" style="align-items:center;gap:10px">
        ${getComponentVisual(b.cat, p)}
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <span class="label"><strong>${p.brand}</strong> ${p.model}</span>
            <span class="value">${lineNet.toLocaleString('da-DK')} kr</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <button class="sel-btn" style="padding:2px 9px;min-width:0" onclick="bidQty(${i},-1)">\u2212</button>
            <span style="font-weight:700;min-width:50px;text-align:center">${b.qty} ${b.cat === 'cables' ? 'm' : 'stk'}</span>
            <button class="sel-btn" style="padding:2px 9px;min-width:0" onclick="bidQty(${i},1)">+</button>
            <span style="font-size:0.72rem;color:var(--text-muted)">${list} ${unitLabel} \u00F7${bidState.rabat}% \u2192 ${net} | \u23F1\uFE0F ${montagetidFor(b.cat)} min</span>
            <button class="sel-btn" style="padding:2px 9px;min-width:0;margin-left:auto;color:var(--danger)" onclick="bidRemove(${i})">\uD83D\uDDD1\uFE0F</button>
          </div>
        </div>
      </div>`;
  }).join('');

  // EG Sigma / Kalkia calculation:
  // list -> rabat -> net materials -> +avance(DB) -> materials sale price
  // labor = akkord (montagetid) or fast (manual hours) x rate
  const materialsNet = materialsList * (1 - bidState.rabat / 100);
  const markupAmt = materialsNet * (bidState.markup / 100);
  const materialsSale = materialsNet + markupAmt;
  const akkordHours = totalMinutes / 60;
  const hours = bidState.laborMode === 'akkord' ? akkordHours : bidState.laborHours;
  const labor = hours * bidState.hourlyRate;
  const exVat = materialsSale + labor;
  const vat = exVat * 0.25;
  const total = exVat + vat;
  const fmt = n => Math.round(n).toLocaleString('da-DK');

  // Picker products for chosen category
  const pickCats = { cables:'Kabler', mcbs:'Automatsikringer', mccbs:'Maksimalafbrydere', fuses:'Sikringer', rcds:'HPFI', rcbos:'HPFI-auto', spds:'Overspænding', contactors:'Kontaktorer', mpcbs:'Motorværn', overloadRelays:'Termorelæ', wiringDevices:'Stik/Afbryder' };
  const pickItems = (PRODUCTS[bidState.pickCat] || []).map(p =>
    `<button class="sel-btn" onclick="bidAddPick('${p.id}')">+ ${p.brand} ${p.model}${p.mm2 ? ' ' + p.mm2 + 'mm\u00B2' : (p.rating ? ' ' + (p.curve||'') + p.rating + 'A' : '')}</button>`
  ).join('');

  return `
    <div class="card fade-in">
      <div class="card-title">\uD83D\uDCB0 ${lang === 'da' ? 'Tilbud / Projektpris' : 'Bid / Project Price'}</div>
      <div class="info-row">${lang === 'da' ? 'Genererer en indledende projektpris fra din materialeliste. Priser er VEJLEDENDE indtil du tilslutter dit B2B-prisfeed.' : 'Generates an initial project price from your bill of materials. Prices are INDICATIVE until you connect your B2B price feed.'}</div>

      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Grossist' : 'Wholesaler'}</div>
        <div class="select-grid">
          ${wsKeys.map(w =>
            `<button class="sel-btn ${bidState.wholesaler === w ? 'selected' : ''}" onclick="bidState.wholesaler='${w}';renderModule('bid')">${w}${WHOLESALERS[w].feed ? ' \uD83D\uDD17' : ''}</button>`
          ).join('')}
        </div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:6px">${ws.feed ? (lang === 'da' ? 'Live priser tilsluttet.' : 'Live prices connected.') : (lang === 'da' ? 'Vejledende priser (prisindeks ' + ws.idx.toFixed(2) + '). Tilslut feed for live priser.' : 'Indicative prices (index ' + ws.idx.toFixed(2) + '). Connect feed for live prices.')}</div>
      </div>

      <div class="select-grid" style="margin-bottom:8px">
        <button class="sel-btn selected" onclick="bidAutoFill()">\u26A1 ${lang === 'da' ? 'Auto-udfyld fra dimensionering' : 'Auto-fill from dimensioning'}</button>
        <button class="sel-btn" onclick="configurePriceFeed()">\uD83D\uDD17 ${lang === 'da' ? 'Tilslut prisfeed' : 'Connect price feed'}</button>
        ${bidState.basket.length ? `<button class="sel-btn" onclick="bidState.basket=[];renderModule('bid')">\uD83D\uDDD1\uFE0F ${lang === 'da' ? 'Ryd' : 'Clear'}</button>` : ''}
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-title">${lang === 'da' ? 'Tilf\u00F8j komponenter' : 'Add components'}</div>
      <div class="select-group">
        <div class="select-label">${lang === 'da' ? 'Kategori' : 'Category'}</div>
        <div class="select-grid">
          ${Object.keys(pickCats).map(k =>
            `<button class="sel-btn ${bidState.pickCat === k ? 'selected' : ''}" onclick="bidState.pickCat='${k}';renderModule('bid')">${pickCats[k]}</button>`
          ).join('')}
        </div>
      </div>
      <div class="select-grid" style="max-height:160px;overflow-y:auto">${pickItems}</div>
    </div>

    <div class="card fade-in">
      <div class="card-title">${lang === 'da' ? 'Materialeliste' : 'Bill of Materials'} (${bidState.basket.length})</div>
      ${lines || '<div class="info-row">' + (lang === 'da' ? 'Kurven er tom. Brug "Auto-udfyld" eller tilf\u00F8j komponenter ovenfor.' : 'Basket is empty. Use "Auto-fill" or add components above.') + '</div>'}
    </div>

    <div class="card fade-in">
      <div class="card-title">${lang === 'da' ? 'Rabat, arbejdsl\u00F8n & avance' : 'Discount, labor & markup'}</div>

let projectState = { name: 'Projekt 1', circuits: [] };
(function restoreProject(){ try { const s = JSON.parse(localStorage.getItem('elProject')||'null'); if (s) projectState = s; } catch(e){} })();
function saveProject(){ localStorage.setItem('elProject', JSON.stringify(projectState)); }

function currentVdropPct() {
  const cables = cableState.material === 'copper' ? CABLES_COPPER : CABLES_ALU;
  const ct = cables[cableState.type]; const cc = ct && ct[cableState.cores] ? ct[cableState.cores] : {};
  const sc = cc[cableState.crossSection];
  if (!sc) return null;
  const ib = calcIB(); const L = vdropState.length/1000; const cosP = loadState.cosPhi; const sinP = Math.sin(Math.acos(cosP));
  const Un = loadState.voltage === '3x400' ? 400 : 230;
  const vd = loadState.voltage === '3x400' ? Math.sqrt(3)*ib*L*(sc.r*cosP+sc.x*sinP) : 2*ib*L*(sc.r*cosP+sc.x*sinP);
  return (vd/Un)*100;
}

function projectAddCircuit() {
  const ib = calcIB();
  const mcb = ib <= 63 ? (recommendMCBs(ib)[0]) : null;
  const mccb = ib > 63 ? (recommendMCCBs(ib)[0]) : null;
  const prot = mcb ? (mcb.model + ' ' + mcb.curve + mcb.rating) : (mccb ? mccb.model : '\u2014');
  projectState.circuits.push({
    name: (loadState._preset || (lang==='da'?'Gruppe':'Circuit')) + ' ' + (projectState.circuits.length+1),
    voltage: loadState.voltage, power: loadState.power, cosPhi: loadState.cosPhi,
    ib: +ib.toFixed(1),
    cable: cableState.crossSection ? (cableState.type+' '+cableState.cores+' '+cableState.crossSection+'mm\u00B2') : '\u2014',
    length: vdropState.length,
    vdrop: currentVdropPct(),
    protection: prot
  });
  saveProject(); renderModule('projekt');
}
function projectRemove(i){ projectState.circuits.splice(i,1); saveProject(); renderModule('projekt'); }
function projectClear(){ if(confirm(lang==='da'?'Ryd hele projektet?':'Clear the whole project?')){ projectState.circuits=[]; saveProject(); renderModule('projekt'); } }
function projectExport(){
  const blob = new Blob([JSON.stringify(projectState,null,2)], {type:'application/json'});

  a.download = (projectState.name||'projekt').replace(/\s+/g,'_') + '.json'; a.click();

// ===== VERIFY / SELF-TEST MODULE (bulletproof) =====
function runSelfTests() {
  const save = JSON.parse(JSON.stringify(loadState));
  const tol = (a,b,t) => Math.abs(a-b) <= (t||0.02)*Math.abs(b||1);
  const T = [];
  // IB 3-phase
  loadState = {voltage:'3x400',power:10,cosPhi:0.9,simFactor:1,expFactor:1};
  T.push({ name:'IB 3~ 10kW cos0.9', exp:'16.0 A', act:calcIB().toFixed(1)+' A', pass:tol(calcIB(),16.04) });
  // IB 1-phase
  loadState = {voltage:'1x230',power:3.68,cosPhi:1.0,simFactor:1,expFactor:1};
  T.push({ name:'IB 1~ 3.68kW cos1.0', exp:'16.0 A', act:calcIB().toFixed(1)+' A', pass:tol(calcIB(),16.0) });
  loadState = save;
  // Cable Iz official
  T.push({ name:'Iz Cu XLPE 16mm\u00B2 (C.52.1)', exp:'94 A', act:IZ_COPPER_XLPE[16]+' A', pass:IZ_COPPER_XLPE[16]===94 });
  T.push({ name:'Iz Cu PVC 16mm\u00B2 (C.52.1)', exp:'73 A', act:IZ_COPPER[16]+' A', pass:IZ_COPPER[16]===73 });
  T.push({ name:'Iz Al PVC 25mm\u00B2 (C.52.1)', exp:'73 A', act:IZ_ALU[25]+' A', pass:IZ_ALU[25]===73 });
  // Transformer Ik 400kVA uk4%
  const ikTr = (400*1000)/(Math.sqrt(3)*400*0.04)/1000;
  T.push({ name:'Trafo Ik 400kVA uk4%', exp:'14.4 kA', act:ikTr.toFixed(1)+' kA', pass:tol(ikTr,14.43) });
  // MCB curve B Isd max
  T.push({ name:'MCB B16 Isd max (4.8\u00D7In)', exp:'76.8 A', act:(MCB_CURVES.B.isdMax*16).toFixed(1)+' A', pass:tol(MCB_CURVES.B.isdMax*16,76.8) });
  // Voltage drop sanity (3~, 16A, 50m, 2.5mm2 NOIKLX)
  const sc = CABLES_COPPER['NOIKLX']['5G'][2.5];
  const vd = Math.sqrt(3)*16*0.05*(sc.r*0.9+sc.x*Math.sin(Math.acos(0.9)));
  T.push({ name:'\u0394U 3~ 16A 50m 2.5mm\u00B2', exp:'\u22489.3 V', act:vd.toFixed(1)+' V', pass:tol(vd,9.3,0.05) });
  // Short-circuit cmax
  T.push({ name:'IEC 60909 cmax (LV)', exp:'1.05', act:'1.05', pass:true });

  // ==========================================================================
  // ===== PROPERTY-BASED SELF-TESTS — Derating engine (Tier 1 hardening) ======
  // Feature: dimensioning-correctness-hardening. No fast-check at runtime, so
  // each property is checked with ~100 randomized in-browser iterations (the
  // app's existing self-test mechanism). Each pushes a single summary row.
  // ==========================================================================
  const rnd = (arr) => arr[(Math.random() * arr.length) | 0];
  const caKeysN = Object.keys(TEMP_FACTORS).map(Number);
  const cgKeysN = Object.keys(GROUP_FACTORS).map(Number);
  const kKeysA = Object.keys(INSTALL_METHODS);

  // Feature: dimensioning-correctness-hardening, Property 2: Derating formula and round-down
  (function () {
    let pass = true, fail = null;
    for (let i = 0; i < 100; i++) {
      const baseIz = Math.round((Math.random() * 399 + 1) * 100) / 100; // 1..400 A
      const res = computeDeratedIz({ baseIz: baseIz, caKey: rnd(caKeysN), cgKey: rnd(cgKeysN), csKey: null, kInstallKey: rnd(kKeysA), buried: false });
      if (!res.ok) continue;
      const exact = baseIz * res.totalFactor;
      const expected = Math.floor(exact * 100) / 100;
      const twoDp = Math.abs(res.deratedIz * 100 - Math.round(res.deratedIz * 100)) < 1e-6;
      if (res.deratedIz !== expected || res.deratedIz > exact + 1e-9 || !twoDp) {
        pass = false; fail = JSON.stringify({ baseIz: baseIz, derated: res.deratedIz, expected: expected, exact: +exact.toFixed(5) }); break;
      }
    }
    T.push({ name: 'Prop 2: Derated_Iz = floor(base\u00D7\u03A0k\u00D7100)/100 \u2264 exact (100\u00D7)', exp: 'all ok', act: pass ? 'all ok' : ('fail ' + fail), pass: pass });
  })();

  // Feature: dimensioning-correctness-hardening, Property 3: Derating never increases capacity
  (function () {
    let pass = true, fail = null;
    for (let i = 0; i < 100; i++) {
      const baseIz = Math.round((Math.random() * 399 + 1) * 100) / 100;
      const res = computeDeratedIz({ baseIz: baseIz, caKey: rnd(caKeysN), cgKey: rnd(cgKeysN), csKey: null, kInstallKey: rnd(kKeysA), buried: false });
      if (!res.ok) continue;
      if (res.totalFactor <= 1 && res.deratedIz > baseIz + 1e-9) {
        pass = false; fail = JSON.stringify({ baseIz: baseIz, total: +res.totalFactor.toFixed(4), derated: res.deratedIz }); break;

        if (zsRaw < zRawExact - 1e-9) { pass = false; fail = 'Zs ' + zsRaw + ' < raw ' + zRawExact.toFixed(6); break; }
      }
    }
    T.push({ name: 'Solver Prop 11: Iz ≤ raw float, Zs ≥ raw float (50×)', exp: 'conservative', act: pass ? 'conservative' : ('fail ' + fail), pass: pass });
  })();

  // ==========================================================================
  // ===== PROPERTY-BASED SELF-TESTS — Selectivity, Commission, Forensic =======
  // Feature: selectivity T-I curves, commissioning witness, forensic explainer
  // ==========================================================================

  // Selectivity: getTripCurveData returns sorted ascending current points for B/C/D/fuse
  (function () {
    let pass = true, fail = null;
    const configs = [
      { type: 'mcb', curve: 'B', rating: 16 },
      { type: 'mcb', curve: 'C', rating: 25 },
      { type: 'mcb', curve: 'D', rating: 32 },
      { type: 'fuse', curve: null, rating: 25 },
      { type: 'fuse', curve: null, rating: 63 },
      { type: 'fuse', curve: null, rating: 160 },
      { type: 'mccb', curve: null, rating: 250, ioMult: 0.8, isdMult: 2 }
    ];
    configs.forEach(function (dev) {
      if (!pass) return;
      var pts = getTripCurveData(dev);
      if (pts.length < 2) { pass = false; fail = 'too few points for ' + dev.type + ' ' + dev.rating; return; }
      for (var i = 1; i < pts.length; i++) {
        if (pts[i].current_A < pts[i - 1].current_A - 1e-9) {
          pass = false; fail = 'not sorted asc ' + dev.type + ' ' + dev.rating + ' at idx ' + i;
          return;
        }
      }
      // All points must have positive current and time
      pts.forEach(function (p, idx) {
        if (p.current_A <= 0 || p.time_s <= 0) { pass = false; fail = 'non-positive at ' + dev.type + ' ' + dev.rating + ' idx=' + idx; }
      });
    });
    T.push({ name: 'Selectivity: getTripCurveData sorted asc + positive for B/C/D/fuse/MCCB', exp: 'sorted', act: pass ? 'sorted' : ('fail ' + fail), pass: pass });
  })();

  // Selectivity: fuse selectivity ratio ≥1.6:1 implies selective
  (function () {
    let pass = true, fail = null;
    var fusePairs = [[63, 25], [100, 40], [160, 63], [250, 100]];
    fusePairs.forEach(function (pair) {
      if (!pass) return;
      var up = { type: 'fuse', curve: null, rating: pair[0] };
      var down = { type: 'fuse', curve: null, rating: pair[1] };
      var ratio = pair[0] / pair[1];
      var sel = checkSelectivity(up, down);
      if (ratio >= 1.6 && !sel.selective) { pass = false; fail = pair[0] + '/' + pair[1] + ' ratio=' + ratio.toFixed(2) + ' not selective'; }
    });
    T.push({ name: 'Selectivity: gG fuse ratio ≥1.6:1 → selective', exp: 'selective', act: pass ? 'selective' : ('fail ' + fail), pass: pass });
  })();

  // Commission: all test verdicts computed correctly
  (function () {
    let pass = true, fail = null;
    // PE continuity: 0.5Ω → OK, 1.5Ω → FAIL
    if (!COMMISSION_TESTS[0].check(0.5)) { pass = false; fail = 'PE 0.5 should pass'; }
    if (COMMISSION_TESTS[0].check(1.5)) { pass = false; fail = 'PE 1.5 should fail'; }
    // Insulation: 1MΩ → OK, 0.5MΩ → FAIL
    if (!COMMISSION_TESTS[1].check(1)) { pass = false; fail = 'Insul 1 should pass'; }
    if (COMMISSION_TESTS[1].check(0.5)) { pass = false; fail = 'Insul 0.5 should fail'; }
    // Polarity
    if (!COMMISSION_TESTS[2].check('PASS')) { pass = false; fail = 'Polarity PASS should pass'; }
    if (COMMISSION_TESTS[2].check('FAIL')) { pass = false; fail = 'Polarity FAIL should fail'; }
    // RCD ×1 IΔn: 200ms → OK, 300ms → OK, 301 would fail but we test 300
    if (!COMMISSION_TESTS[4].check(200)) { pass = false; fail = 'RCD1 200 should pass'; }
    if (!COMMISSION_TESTS[4].check(300)) { pass = false; fail = 'RCD1 300 should pass'; }
    // RCD ×5 IΔn: 30ms → OK, 50ms → FAIL
    if (!COMMISSION_TESTS[5].check(30)) { pass = false; fail = 'RCD5 30 should pass'; }
    if (COMMISSION_TESTS[5].check(50)) { pass = false; fail = 'RCD5 50 should fail'; }
    // Phase sequence
    if (!COMMISSION_TESTS[6].check('L1-L2-L3')) { pass = false; fail = 'Phase L1L2L3 should pass'; }
    if (!COMMISSION_TESTS[6].check('N/A')) { pass = false; fail = 'Phase N/A should pass'; }
    T.push({ name: 'Commission: all test verdicts computed correctly (PE/Insul/Pol/RCD/Phase)', exp: 'correct', act: pass ? 'correct' : ('fail ' + fail), pass: pass });
  })();

  // Forensic: buildForensicExplanation returns non-empty explanation + ≥1 fix for FAIL
  (function () {
    let pass = true, fail = null;
    var saveCable = JSON.parse(JSON.stringify(cableState));
    var saveSc = JSON.parse(JSON.stringify(scState));
    var saveVd = JSON.parse(JSON.stringify(vdropState));
    // Create scenario that produces FAILs
    cableState.material = 'copper'; cableState.type = 'NOIKLX'; cableState.cores = '5G';
    cableState.crossSection = 1.5; cableState.installMethod = 'A1';
    cableState.temp = 50; cableState.grouping = 9; cableState.soil = null;
    scState.zNet = 5000; scState.zTrafo = 0; vdropState.length = 0;

    // Test ampacity FAIL
    var ampV = { id: 'ampacity', state: 'FAIL', values: { baseIz: 22, deratedIz: 7, inA: 16, ib: 14 }, clause: 'DS/HD 60364-5-52' };
    var fe = buildForensicExplanation(ampV);
    if (!fe.causal.da || fe.causal.da.length < 10) { pass = false; fail = 'ampacity causal empty'; }
    if (fe.fixes.length < 1) { pass = false; fail = 'ampacity no fixes'; }

    // Test overload FAIL
    var ovV = { id: 'overload', state: 'FAIL', values: { i2: 40, limit: 29, factor: 1.6, inA: 25, deratedIz: 20 }, clause: 'DS/HD 60364-4-43' };
    fe = buildForensicExplanation(ovV);
    if (!fe.causal.en || fe.causal.en.length < 10) { pass = false; fail = 'overload causal empty'; }
    if (fe.fixes.length < 1) { pass = false; fail = 'overload no fixes'; }

    // Test adiabatic FAIL
    var adV = { id: 'adiabatic', state: 'FAIL', values: { isc: 6000, tClear: 0.4, i2t: 14400000, k: 143, sArea: 2.5, withstand: 127806, sMin: 4.2, recommendedCsa: 6 }, clause: 'DS/HD 60364-4-43' };
    fe = buildForensicExplanation(adV);
    if (!fe.causal.da || fe.causal.da.length < 10) { pass = false; fail = 'adiabatic causal empty'; }
    if (fe.fixes.length < 1) { pass = false; fail = 'adiabatic no fixes'; }

    // Test Zs FAIL
    var zsV = { id: 'zs', state: 'FAIL', values: { zsActual: 4.5, zsMax: 2.99, ia: 77 }, clause: 'DS/HD 60364-4-41' };
    fe = buildForensicExplanation(zsV);
    if (!fe.causal.da || fe.causal.da.length < 5) { pass = false; fail = 'zs causal empty'; }
    if (fe.fixes.length < 1) { pass = false; fail = 'zs no fixes'; }

    // PASS verdict should return empty
    var passV = { id: 'ampacity', state: 'PASS', values: {}, clause: 'DS/HD 60364' };
    fe = buildForensicExplanation(passV);
    if (fe.causal.da !== '' || fe.fixes.length > 0) { pass = false; fail = 'PASS should return empty forensic'; }

    cableState = saveCable; scState = saveSc; vdropState = saveVd;
    T.push({ name: 'Forensic: non-empty explanation + ≥1 fix for every FAIL scenario', exp: 'all have forensic', act: pass ? 'all have forensic' : ('fail ' + fail), pass: pass });
  })();

  // ===== EV CHARGER MODULE TESTS (DS/HD 60364-7-722) =====
  // Test: continuous load factor = 1.0 per 722.531.1
  (function() {
    var calc = calcEVCableSize(7.4, '1', 10, 'none');
    T.push({ name: 'EV 722: continuous load factor = 1.0', exp: '1', act: String(calc.contFactor), pass: calc.contFactor === 1.0 });
  })();
  // Test: Mode 3 requires RCD Type B per 722.531.2
  (function() {
    var rcd = getEVRcdType('mode3');
    T.push({ name: 'EV 722: Mode 3 requires RCD Type B', exp: 'Type B', act: rcd.type, pass: rcd.type === 'Type B' });
  })();
  // Test: Mode 2 allows Type A + 6mA DC per 722.531.2.101
  (function() {
    var rcd = getEVRcdType('mode2');
    T.push({ name: 'EV 722: Mode 2 allows Type A + 6mA DC', exp: 'Type A + 6mA DC', act: rcd.type, pass: rcd.type === 'Type A + 6mA DC' });
  })();

  // ===== EARTHING MODULE TESTS (DS/HD 60364-5-54) =====
  // Test: Rod electrode resistance formula R = rho/(2*pi*L)
  (function() {
    var R = calcEarthResistance(100, 'rod', 2.4);
    var expected = 100 / (2 * Math.PI * 2.4); // ~6.63 ohm
    T.push({ name: 'Earthing 54: rod R=rho/(2piL) 100ohm-m 2.4m', exp: expected.toFixed(2)+' \u03A9', act: R.toFixed(2)+' \u03A9', pass: Math.abs(R - expected) < 0.01 });
  })();
  // Test: PE sizing per Table 54.1 (phase 10mm2 -> PE 10mm2)
  (function() {
    var pe = getMinPESize(10);
    T.push({ name: 'Earthing 54: PE size for 10mm\u00B2 phase = 10mm\u00B2', exp: '10', act: String(pe), pass: pe === 10 });
  })();
  // Test: PE sizing per Table 54.1 (phase 50mm2 -> PE 25mm2)
  (function() {
    var pe = getMinPESize(50);
    T.push({ name: 'Earthing 54: PE size for 50mm\u00B2 phase = 25mm\u00B2', exp: '25', act: String(pe), pass: pe === 25 });
  })();

  // ===== HARMONICS MODULE TESTS (section 523.6.3) =====
  // Test: Neutral factor 1.45 for THD > 33%
  (function() {
    var f = calcNeutralFactor('33-45', 'balanced');
    T.push({ name: 'Harmonics 523.6.3: neutral factor 1.45 for THD 33-45%', exp: '1.45', act: f.toFixed(2), pass: Math.abs(f - 1.45) < 0.001 });
  })();
  // Test: Neutral factor 1.0 for THD < 15%
  (function() {
    var f = calcNeutralFactor('0-15', 'balanced');
    T.push({ name: 'Harmonics 523.6.3: neutral factor 1.0 for THD 0-15%', exp: '1.00', act: f.toFixed(2), pass: Math.abs(f - 1.0) < 0.001 });
  })();
  // Test: Neutral factor 1.45 for THD > 45%
  (function() {
    var f = calcNeutralFactor('>45', 'balanced');
    T.push({ name: 'Harmonics 523.6.3: neutral factor 1.45 for THD >45%', exp: '1.45', act: f.toFixed(2), pass: Math.abs(f - 1.45) < 0.001 });
  })();

  // ===== MOTOR STARTER MODULE TESTS (IEC 60947-4-1) =====
  // Test: FLC calculation for 11kW 400V 3-phase
  (function() {
    var flc = calcMotorFLC(11, '400', '3');
    // FLC = 11000 / (sqrt(3) * 400 * 0.85 * 0.88) = ~21.2A (conservative)
    var expected = 11000 / (Math.sqrt(3) * 400 * 0.85 * 0.88);
    T.push({ name: 'Motor IEC 60947-4-1: FLC 11kW 400V 3ph', exp: expected.toFixed(1)+' A', act: flc.toFixed(1)+' A', pass: Math.abs(flc - expected) < 0.1 });
  })();
  // Test: Contactor sizing - next size above FLC
  (function() {
    var flc = calcMotorFLC(11, '400', '3');
    var contactor = getNextContactorSize(flc);
    T.push({ name: 'Motor IEC 60947-4-1: contactor >= FLC', exp: '>=' + flc.toFixed(1), act: String(contactor) + ' A', pass: contactor >= flc });
  })();
  // Test: DOL starting multiple = 8x
  (function() {
    var scpd = getMotorSCPD(20, 'DOL', '2');
    T.push({ name: 'Motor IEC 60947-4-1: DOL start multiple 8x', exp: '8', act: String(scpd.startMult), pass: scpd.startMult === 8 });
  })();

  // ===== CABLE TRAY MODULE TESTS (NEMA VE-2 / IEC 61537) =====
  // Test: 3 cables of 20mm OD in 300x100mm ladder tray fill calculation
  (function() {
    var calc = calcTrayFill('ladder', 300, 100, [20, 20, 20]);
    var expectedArea = 3 * Math.PI * 10 * 10; // 3 * pi * r^2 = 942.48 mm^2
    var expectedFill = (expectedArea / (300 * 100)) * 100; // ~3.14%
    T.push({ name: 'Tray: 3x20mm in 300x100 ladder fill%', exp: expectedFill.toFixed(1)+'%', act: calc.fillPct.toFixed(1)+'%', pass: Math.abs(calc.fillPct - expectedFill) < 0.1 });
  })();
  // Test: Solid tray fill limit is 40%
  (function() {
    var calc = calcTrayFill('solid', 300, 100, []);
    T.push({ name: 'Tray: solid tray limit 40%', exp: '40', act: calc.fillLimit.toFixed(0), pass: calc.fillLimit === 40 });
  })();
  // Test: Ladder tray fill limit is 50%
  (function() {
    var calc = calcTrayFill('ladder', 300, 100, []);
    T.push({ name: 'Tray: ladder tray limit 50%', exp: '50', act: calc.fillLimit.toFixed(0), pass: calc.fillLimit === 50 });
  })();

  // ===== ENERGY METER/CT MODULE TESTS (EN 50470 + MID) =====
  // Test: 200A load requires minimum 250/5 CT ratio (1.2 x 200 = 240A)
  (function() {
    var ct = calcCTSizing(200);
    T.push({ name: 'Meter EN 50470: 200A load -> CT 250/5', exp: '250/5', act: ct.recommended.label, pass: ct.recommended.label === '250/5' });
  })();
  // Test: 500A load requires minimum 600/5 CT ratio (1.2 x 500 = 600A)
  (function() {
    var ct = calcCTSizing(500);
    T.push({ name: 'Meter EN 50470: 500A load -> CT 600/5', exp: '600/5', act: ct.recommended.label, pass: ct.recommended.label === '600/5' });
  })();
  // Test: 50A load requires minimum 75/5 CT ratio (1.2 x 50 = 60A)
  (function() {
    var ct = calcCTSizing(50);
    T.push({ name: 'Meter EN 50470: 50A load -> CT 75/5', exp: '75/5', act: ct.recommended.label, pass: ct.recommended.label === '75/5' });
  })();

  return T;
}

function renderVerify() {
  const tests = runSelfTests();
  const passed = tests.filter(t=>t.pass).length;
  const allOk = passed === tests.length;
  const rows = tests.map(t => `
    <div class="result-row">
      <span class="label">${t.pass?'\u2705':'\u274C'} ${t.name}</span>
      <span class="value">${t.act} ${t.pass?'':'(\u2260 '+t.exp+')'}</span>
    </div>`).join('');
  // Live correctness-verdict panel — the four cards + click-only inputs, all
  // rendered from the ONE shared bundle so this view matches QI and Risk exactly.
  let verdictPanel = '';
  try {
    const vb = evaluateCorrectnessVerdicts();
    verdictPanel = `
    <div class="card fade-in">
      <div class="card-title">\u2696\uFE0F ${t('verdictPanelTitle')}</div>
      <div class="info-row">${lang==='da'?'Live korrekthedsverdikter \u2014 alle visninger l\u00E6ser samme beregnede kilde (\u00E9n sandhedskilde).':'Live correctness verdicts \u2014 every view reads the one computed source of truth.'}</div>

      ${renderVerdictRow(vb.adiabatic)}

    <div class="card fade-in" style="border-left:4px solid ${allOk?'var(--success)':'var(--danger)'}">
      <div class="card-title">\uD83E\uDDEA ${lang==='da'?'Verifikation / Selvtest':'Verification / Self-test'} \u2014 ${passed}/${tests.length}</div>
      <div class="info-row">${lang==='da'?'K\u00F8rer kendte referencetilf\u00E6lde mod beregningsmotoren. Alle skal best\u00E5 (gr\u00F8n) for at motoren er korrekt.':'Runs known reference cases against the calculation engine. All must pass (green) for the engine to be correct.'}</div>

      <div class="card-title">${lang==='da'?'Datakilder & sporbarhed':'Data sources & traceability'}</div>
      <div class="result-box" style="background:var(--primary-glow);border-color:var(--primary-light)">

        <div class="result-row"><span class="label">Overstr\u00F8m</span><span class="value">DS/HD 60364-4-43:2023</span></div>

        <div class="result-row"><span class="label">Sikringer</span><span class="value">IEC 60269 (gG)</span></div>
        <div class="result-row"><span class="label">Datversion</span><span class="value">v${DATA_VERSION}</span></div>

// ===== INSTALLATION DRAWING MODULE =====
// Draws a single-line diagram (enstregsdiagram) of the installation from the
// load schedule — a real "picture" of the coming installation. Plus an optional
// online AI-painting connector for a photorealistic render.
let drawStyle = 'schematic'; // 'schematic' | 'iso'

function consumerIcon(c, x, y, scale){
  // returns SVG for a consumer symbol based on size/phase
  const big = c.phase === '3' || c.kW >= 5;
  const s = scale || 1;
  if (big) {
    // motor / heavy load (circle with M)
    return `<circle cx="${x}" cy="${y}" r="${13*s}" fill="#0e1b2a" stroke="#00d0ff" stroke-width="2"/>
      <text x="${x}" y="${y+4*s}" text-anchor="middle" font-size="${12*s}" fill="#00d0ff" font-weight="700">M</text>`;
  }
  // socket / light (square)
  return `<rect x="${x-11*s}" y="${y-11*s}" width="${22*s}" height="${22*s}" rx="3" fill="#0e1b2a" stroke="#ffd166" stroke-width="2"/>
    <circle cx="${x}" cy="${y}" r="${4*s}" fill="#ffd166"/>`;
}

function buildSLD(){
  // Use the unlimited load schedule if present, else a default sample
  let cons = loadList.length ? loadList.slice(0, 14) : [
    {kW:11,cos:0.9,sf:1,phase:'3',name:'EV'},{kW:4,cos:0.9,sf:1,phase:'3',name:'Komfur'},
    {kW:2,cos:0.95,sf:0.6,phase:'L1',name:'Stik'},{kW:1.5,cos:0.95,sf:1,phase:'L2',name:'Lys'}
  ];
  const sch = calcLoadSchedule();
  const totalKVA = loadList.length ? sch.kVA : 18.5;
  const ib = loadList.length ? sch.ib : 30;
  const trafo = (typeof TRAFO_SIZES!=='undefined') ? (TRAFO_SIZES.find(t=>t>=totalKVA)||630) : 630;
  const W = 720, rowH = 46, top = 150;
  const H = top + cons.length*rowH + 40;
  const busX = 210, mainW = 96;

  let rows = '';
  cons.forEach((c,i)=>{
    const y = top + i*rowH + 20;
    const ci = lsConsumerCurrent ? lsConsumerCurrent(c) : {L1:0,L2:0,L3:0};
    const cIb = Math.max(ci.L1||0, ci.L2||0, ci.L3||0) || (c.kW*1000/( (c.phase==='3'?Math.sqrt(3)*400:230)*c.cos));
    const cab = (typeof recommendCables==='function') ? recommendCables(cIb)[0] : null;
    const mcb = (typeof recommendMCBs==='function') ? recommendMCBs(cIb,10)[0] : null;
    const cableLbl = cab ? (cab.mm2+' mm²') : '';
    const mcbLbl = mcb ? ('C'+mcb.rating) : '';
    rows += `
      <line x1="${busX}" y1="${y}" x2="${W-130}" y2="${y}" stroke="#2f5f7a" stroke-width="2"/>
      <!-- breaker box -->
      <rect x="${busX+30}" y="${y-11}" width="34" height="22" rx="3" fill="#10202e" stroke="#00d0ff" stroke-width="1.5"/>

      ${consumerIcon(c, W-150, y, 1)}
      <text x="${W-130}" y="${y+4}" font-size="11" fill="#cfe3f2">${c.name? c.name : ('K'+(i+1))} (${c.kW} kW)</text>`;
  });

  return `
  <svg viewBox="0 0 ${W} ${H}" width="100%" style="background:radial-gradient(circle at 30% 0%,#0c1826,#060d16);border-radius:12px;border:1px solid var(--line,var(--border))" xmlns="http://www.w3.org/2000/svg">
    <defs><filter id="gl"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <!-- Transformer -->
    <g filter="url(#gl)">
      <circle cx="70" cy="70" r="22" fill="none" stroke="#ff8a5c" stroke-width="2.5"/>
      <circle cx="70" cy="92" r="22" fill="none" stroke="#ff8a5c" stroke-width="2.5"/>
    </g>
    <text x="70" y="135" text-anchor="middle" font-size="12" fill="#ffb38a" font-weight="700">${trafo} kVA</text>
    <text x="70" y="150" text-anchor="middle" font-size="9" fill="#9a8" >10/0,4 kV</text>
    <line x1="70" y1="114" x2="70" y2="${top-30}" stroke="#ff8a5c" stroke-width="2"/>
    <line x1="70" y1="${top-30}" x2="${busX}" y2="${top-30}" stroke="#ff8a5c" stroke-width="2"/>

let drawNodes = null;
function getDrawNodes(){
  if(drawNodes) return drawNodes;
  const sch=(typeof calcLoadSchedule==='function')?calcLoadSchedule():{kVA:18.5,ib:30};
  const trafo=(typeof TRAFO_SIZES!=='undefined')?(TRAFO_SIZES.find(t=>t>=(loadList.length?sch.kVA:18.5))||630):630;
  const ib=loadList.length?sch.ib:30;
  return [{type:'grid',label:'60 kV'},{type:'trafo',label:trafo+' kVA'},{type:'panel',label:'IB '+ib.toFixed(0)+' A'},{type:'load',label:(loadList.length||4)+' '+(lang==='da'?'grupper':'circuits')}];

function drawNodeAdd(type){if(!drawNodes)drawNodes=[...getDrawNodes()];drawNodes.push({type,label:''});renderModule('draw');}
function drawNodeRemove(i){if(!drawNodes)drawNodes=[...getDrawNodes()];drawNodes.splice(i,1);renderModule('draw');}
function drawNodeMove(i,d){if(!drawNodes)drawNodes=[...getDrawNodes()];const j=i+d;if(j<0||j>=drawNodes.length)return;[drawNodes[i],drawNodes[j]]=[drawNodes[j],drawNodes[i]];renderModule('draw');}
function drawNodeReset(){drawNodes=null;renderModule('draw');}

function build3D(){
  const nodes=getDrawNodes();
  const W=Math.max(760,nodes.length*170+80),H=400,gY=320;
  const sp=(W-120)/Math.max(nodes.length-1,1);
  let svg='';
  // ground perspective grid
  for(let i=0;i<12;i++) svg+=`<line x1="0" y1="${gY+i*7}" x2="${W}" y2="${gY+i*7}" stroke="rgba(0,180,255,${0.04-i*0.003})"/>`;
  svg+=`<line x1="0" y1="${gY}" x2="${W}" y2="${gY}" stroke="rgba(0,225,255,0.3)" stroke-width="2"/>`;
  // nodes
  nodes.forEach((n,idx)=>{
    const nt=NODE_TYPES[n.type]||NODE_TYPES.custom;
    const cx=60+idx*sp, bw=88, bd=44, bh=105, topY=gY-bh;
    // 3D box faces
    const tp=`${cx-bw/2},${topY} ${cx+bw/2},${topY} ${cx+bw/2+bd*.4},${topY-bd*.4} ${cx-bw/2+bd*.4},${topY-bd*.4}`;
    const lf=`${cx-bw/2},${topY} ${cx-bw/2},${gY} ${cx+bw/2},${gY} ${cx+bw/2},${topY}`;
    const rf=`${cx+bw/2},${topY} ${cx+bw/2},${gY} ${cx+bw/2+bd*.4},${gY-bd*.4} ${cx+bw/2+bd*.4},${topY-bd*.4}`;
    // drop shadow
    svg+=`<ellipse cx="${cx+10}" cy="${gY+6}" rx="${bw/2+5}" ry="8" fill="rgba(0,0,0,0.3)"/>`;
    // faces with neon glow
    svg+=`<polygon points="${lf}" fill="rgba(8,18,32,0.92)" stroke="${nt.color}" stroke-width="1.8"/>`;
    svg+=`<polygon points="${rf}" fill="rgba(5,12,24,0.92)" stroke="${nt.color}" stroke-width="1.8"/>`;
    svg+=`<polygon points="${tp}" fill="rgba(12,25,45,0.92)" stroke="${nt.color}" stroke-width="1.8"/>`;
    // neon floor reflection
    svg+=`<line x1="${cx-bw/2}" y1="${gY}" x2="${cx+bw/2}" y2="${gY}" stroke="${nt.color}" stroke-width="3" opacity="0.4" filter="url(#g3)"/>`;
    // icon + labels
    svg+=`<text x="${cx+bd*.2}" y="${topY-bd*.4-16}" text-anchor="middle" font-size="22">${nt.icon}</text>`;
    svg+=`<text x="${cx+bd*.2}" y="${topY-bd*.4-2}" text-anchor="middle" font-size="11" fill="${nt.color}" font-weight="800">${lang==='da'?nt.da:nt.en}</text>`;
    if(n.label) svg+=`<text x="${cx}" y="${gY+22}" text-anchor="middle" font-size="10" fill="#8ab4d0">${n.label}</text>`;
    // cable to next
    if(idx<nodes.length-1){
      const nx=60+(idx+1)*sp, cy2=gY-bh*0.5;
      svg+=`<line x1="${cx+bw/2+bd*.4}" y1="${cy2}" x2="${nx-bw/2}" y2="${cy2}" stroke="${nt.color}" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#g3)"/>`;
      svg+=`<circle cx="${(cx+bw/2+bd*.4+nx-bw/2)/2}" cy="${cy2}" r="4" fill="${nt.color}" opacity="0.9"/>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="background:linear-gradient(180deg,#050c18,#020710 65%,#010408);border-radius:14px;border:1px solid var(--line,#2a3645);overflow:visible" xmlns="http://www.w3.org/2000/svg"><defs><filter id="g3"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${svg}<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#4a7090">3D ${lang==='da'?'installationsskitse':'installation scene'} \u00B7 ${nodes.length} ${lang==='da'?'noder':'nodes'} \u00B7 El-Dimensionering</text></svg>`;
}

function validateBackupCombination(manufacturer, upstreamKey, downstreamKey, ikProspective) {
  try {
    if (!manufacturer || !BACKUP_TABLES[manufacturer]) {
      return { valid: false, icuBackup: null, source: null, warning: lang==='da'?'⚠️ ADVARSEL: Vælg producent':'⚠️ WARNING: Select manufacturer' };
    }
    const mfr = BACKUP_TABLES[manufacturer];
    const combos = mfr.combinations[upstreamKey];
    if (!combos) {
      return { valid: false, icuBackup: null, source: mfr.source, warning: lang==='da'?'🚫 AFVIST: Opstrømsenheden findes ikke i '+mfr.name+' back-up tabel':'🚫 REJECTED: Upstream device not in '+mfr.name+' tested table' };
    }
    const entry = combos[downstreamKey];
    if (!entry) {
      return { valid: false, icuBackup: null, source: mfr.source, warning: lang==='da'?'🚫 AFVIST: Kombinationen er IKKE type-testet af '+mfr.name+'. Brug KUN verificerede kombinationer per IEC 60947-2 Annex A.':'🚫 REJECTED: Combination NOT type-tested by '+mfr.name+'. Use ONLY verified combinations per IEC 60947-2 Annex A.' };
    }
    if (ikProspective > entry.icuBackup) {
      return { valid: false, icuBackup: entry.icuBackup, source: mfr.source, warning: lang==='da'?'🚫 FEJL: Ik ('+ikProspective+' kA) > Icu_backup ('+entry.icuBackup+' kA). Installation er IKKE sikker.':'🚫 ERROR: Ik ('+ikProspective+' kA) > Icu_backup ('+entry.icuBackup+' kA). Installation is NOT safe.' };
    }
    const safeIk = entry.icuBackup * 0.9;
    if (ikProspective > safeIk) {
      return { valid: true, icuBackup: entry.icuBackup, source: mfr.source, warning: lang==='da'?'⚠️ BEMÆRK: Ik er tæt på grænsen ('+ikProspective+' / '+entry.icuBackup+' kA). Overvej større opstrømssikring.':'⚠️ NOTE: Ik is close to limit ('+ikProspective+' / '+entry.icuBackup+' kA). Consider larger upstream device.' };
    }
    return { valid: true, icuBackup: entry.icuBackup, source: mfr.source, warning: null };
  } catch(e) {
    return { valid: false, icuBackup: null, source: null, warning: lang==='da'?'🚫 FEJL: Intern valideringsfejl. Kombination afvist (konservativ sikkerhed).':'🚫 ERROR: Internal validation error. Combination rejected (conservative safety).' };
  }
}

function backupSetMfr(m){ backupState.manufacturer=m; backupState.upstreamDevice=null; backupState.downstreamDevice=null; backupState.validatedResult=null; renderModule('backup'); }
function backupSetUp(u){ backupState.upstreamDevice=u; backupState.downstreamDevice=null; backupState.validatedResult=null; renderModule('backup'); }
function backupSetDown(d){
  backupState.downstreamDevice=d;
  var ik = 0;
  try { var zTotal=scState.zNet+scState.zTrafo; ik=zTotal>0?(400/(Math.sqrt(3)*zTotal/1000)):0; ik=Math.round(ik*10)/10; } catch(e){ ik=0; }
  backupState.ikAtPoint=ik;
  backupState.validatedResult=validateBackupCombination(backupState.manufacturer, backupState.upstreamDevice, d, ik);
  renderModule('backup');
}

  }

  // Ik info
  if(backupState.ikAtPoint>0){
    html += '<div class="result-box"><div class="result-title">'+(lang==='da'?'Prospektiv kortslutningsstrøm':'Prospective short-circuit current')+'</div><div class="result-row"><span class="label">Ik</span><span class="value">'+backupState.ikAtPoint+' kA</span></div></div>';

    } else {
      html += '<div class="result-box error"><div class="result-title" style="color:var(--danger)">🚫 '+(lang==='da'?'AFVIST':'REJECTED')+'</div>';
      html += '<div class="result-row"><span class="label">'+(lang==='da'?'Årsag':'Reason')+'</span><span class="value" style="color:var(--danger)">'+r.warning+'</span></div>';
      if(r.icuBackup) html += '<div class="result-row"><span class="label">Icu_backup</span><span class="value">'+r.icuBackup+' kA</span></div>';
      html += '</div>';
      // Show valid alternatives
      if(backupState.upstreamDevice && backupState.manufacturer){
        var alts = Object.keys(BACKUP_TABLES[backupState.manufacturer].combinations[backupState.upstreamDevice]||{});
        if(alts.length>0){
          html += '<div class="select-group"><div class="select-label">'+(lang==='da'?'Gyldige alternativer for valgt opstrøm':'Valid alternatives for selected upstream')+'</div><div class="select-grid">';
          alts.forEach(function(a){ 
            var e=BACKUP_TABLES[backupState.manufacturer].combinations[backupState.upstreamDevice][a];
            html += '<button class="sel-btn" onclick="backupSetDown(\''+a+'\')">'+a+' ('+e.icuBackup+' kA)</button>'; 
          });
          html += '</div></div>';
        }
      }
    }
  } else if(!backupState.manufacturer){
    html += '<div class="result-box warning"><div class="result-title">'+(lang==='da'?'Vælg producent for at starte validering':'Select manufacturer to start validation')+'</div></div>';
  }

  html += '</div>';
  return html;
}

function generateWireNumbers(consumers, panelName, scheme) {
  var config = WIRE_SCHEME[scheme] || WIRE_SCHEME.danish;
  var wires = [];
  consumers.forEach(function(consumer, idx){
    var circuitNum = idx + 1;
    var circuitId = panelName + '-' + config.circuitPrefix + circuitNum;
    var is3phase = consumer.phase === '3';
    var conductors = is3phase ? config.conductors3phase : config.conductors1phase;
    var mm2 = cableState.crossSection || 2.5;
    conductors.forEach(function(cond){
      wires.push({
        wireNumber: circuitId + '-' + cond,
        circuit: circuitId,
        conductor: cond,
        color: config.colors[cond],
        crossSection: mm2,
        terminalFrom: panelName + ':X' + circuitNum + ':' + cond,
        terminalTo: circuitId + ':load'
      });
    });
  });
  return wires;
}

function selectTerminal(mm2, conductor, manufacturer) {
  var mfr = TERMINAL_MANUFACTURERS[manufacturer] || TERMINAL_MANUFACTURERS.phoenix;
  var isPE = conductor === 'PE';
  var isN = conductor === 'N';
  var candidates = [];
  Object.keys(mfr.types).forEach(function(key){
    var t = mfr.types[key];
    if (isPE && t.type !== 'PE') return;
    if (isN && t.type !== 'N' && t.type === 'PE') return;
    if (isN && !t.type && candidates.length === 0) { /* allow standard if no N-specific */ }
    if (!isPE && !isN && t.type) return;
    if (t.maxMM2 >= mm2) candidates.push({ key: key, data: t });
  });
  // For N conductor: prefer N-type, fall back to standard
  if (isN) {
    var nTypes = [];
    var stdTypes = [];
    Object.keys(mfr.types).forEach(function(key){
      var t = mfr.types[key];
      if (t.type === 'PE') return;
      if (t.maxMM2 < mm2) return;
      if (t.type === 'N') nTypes.push({ key: key, data: t });
      else if (!t.type) stdTypes.push({ key: key, data: t });
    });
    candidates = nTypes.length > 0 ? nTypes : stdTypes;
  }
  candidates.sort(function(a, b){ return a.data.maxMM2 - b.data.maxMM2; });
  return candidates.length > 0 ? candidates[0] : null;
}

function generateTerminalLayout(wireList, manufacturer) {
  var strips = [];
  var currentStrip = { name: 'X1', terminals: [] };
  wireList.forEach(function(w, idx){
    var term = selectTerminal(w.crossSection, w.conductor, manufacturer);
    currentStrip.terminals.push({
      position: idx + 1,
      wireNumber: w.wireNumber,
      conductor: w.conductor,
      terminal: term,
      color: w.color
    });
    if (currentStrip.terminals.length >= 20) {
      strips.push(currentStrip);
      currentStrip = { name: 'X' + (strips.length + 2), terminals: [] };
    }
  });
  if (currentStrip.terminals.length > 0) strips.push(currentStrip);
  return strips;
}

function renderTerminalSVG(terminalStrips) {
  var pageW = 794, pageH = 1123; // A4 at 96dpi
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+pageW+' '+pageH+'" style="width:100%;max-width:794px;background:#0e1b2a;border-radius:8px">';
  svg += '<text x="397" y="30" text-anchor="middle" fill="#00d0ff" font-size="16" font-weight="700">'+(lang==='da'?'Klemmeplan / Terminal Layout':'Terminal Strip Layout')+'</text>';
  var y = 50;
  terminalStrips.forEach(function(strip){
    svg += '<text x="20" y="'+(y+15)+'" fill="#ffd166" font-size="12" font-weight="700">'+strip.name+'</text>';
    y += 25;
    strip.terminals.forEach(function(t, i){
      var tx = 60 + (i % 10) * 70;
      var ty = y + Math.floor(i / 10) * 60;
      var col = t.color ? t.color.hex : '#aaa';
      if (t.conductor === 'PE') col = '#228B22';
      else if (t.conductor === 'N') col = '#0066CC';
      svg += '<rect x="'+tx+'" y="'+ty+'" width="55" height="40" rx="3" fill="rgba(255,255,255,0.05)" stroke="'+col+'" stroke-width="2"/>';
      svg += '<text x="'+(tx+27)+'" y="'+(ty+17)+'" text-anchor="middle" fill="'+col+'" font-size="8" font-weight="700">'+t.wireNumber.split('-').slice(-2).join('-')+'</text>';
      svg += '<text x="'+(tx+27)+'" y="'+(ty+32)+'" text-anchor="middle" fill="#aaa" font-size="7">'+(t.terminal?t.terminal.key:'?')+'</text>';
    });
    y += Math.ceil(strip.terminals.length / 10) * 60 + 15;
  });
  svg += '</svg>';
  return svg;
}

function wireSetMfr(m){ wireState.terminalMfr=m; wireState.wireList=[]; wireState.terminalStrips=[]; renderModule('wire'); }

  wireState.wireList = generateWireNumbers(loadList, wireState.panelName, wireState.numberingScheme);

  renderModule('wire');
}

  },
  {

      // Superseded by the verdict-driven Zs entry (Task 8.4): it reads the ONE
      // correctness bundle, so a PASS Zs verdict leaves no residual earth-fault
      // entry while FAIL/INSUFFICIENT_DATA adds exactly one. Kept for
      // traceability; no longer self-triggers.
      return false;
    },

function calculateRiskLevel(probability, consequence) {
  var p = Math.max(1, Math.min(5, Math.round(probability))) - 1;
  var c = Math.max(1, Math.min(5, Math.round(consequence))) - 1;
  return RISK_MATRIX[c][p];
}

function autoPopulateRisks() {
  var risks = [];
  AUTO_RISK_RULES.forEach(function(rule){
    var triggered = true;
    try { triggered = rule.condition(); } catch(e) { triggered = true; }
    if (triggered) {
      var level = RISK_MATRIX[rule.consequence - 1][rule.probability - 1];
      risks.push({
        id: rule.id,
        category: rule.category,
        description: rule.description,
        probability: rule.probability,
        consequence: rule.consequence,
        riskLevel: level,
        autoDetected: true,
        clause: rule.clause,
        mitigation: rule.mitigation
      });
    }
  });
  // Verdict-driven entries from the ONE shared correctness bundle: any FAIL or
  // INSUFFICIENT_DATA verdict contributes exactly one entry (referencing the
  // verdict id, state and clause); a PASS verdict contributes none, so a
  // now-passing verdict leaves no residual risk entry (Req 7.5, 7.6).
  verdictRiskEntries().forEach(function(e){ risks.push(e); });
  var priority = { red: 0, yellow: 1, green: 2 };
  risks.sort(function(a, b){ return priority[a.riskLevel] - priority[b.riskLevel]; });
  return risks;
}

function generateMitigations(risks) {
  var mits = [];
  risks.forEach(function(r){
    if (r.riskLevel === 'red' || r.riskLevel === 'yellow') {
      mits.push({
        riskId: r.id,
        category: r.category,
        clause: r.clause,
        action: r.mitigation,
        priority: r.riskLevel === 'red' ? 1 : 2
      });
    }
  });
  mits.sort(function(a, b){ return a.priority - b.priority; });
  return mits;
}

// ============================================================================
// ===== FEATURE A: SELECTIVITY T-I CURVE RENDERER + PROOF ENGINE =============
// DS/HD 60364-5-53 §535.2 — coordination of protective devices. Log-log time-
// current SVG renderer with selectivity limit computation.
// ============================================================================

// getTripCurveData(device) — returns sorted [{current_A, time_s}] points.
// device = { type:'mcb'|'fuse'|'mccb', curve:'B'|'C'|'D', rating:Number, ... }
function getTripCurveData(device) {
  if (!device || !device.type) return [];
  const pts = [];
  if (device.type === 'mcb') {
    const In = device.rating || 16;
    const curve = MCB_CURVES[device.curve || 'C'];
    if (!curve) return [];
    const magLo = curve.isdMin * In;
    const magHi = curve.isdMax * In;
    // Thermal zone: I²t=const from ~1.13×In at 3600s down to magnetic region
    const iStart = 1.13 * In;
    const tStart = 3600;
    const I2t = iStart * iStart * tStart;
    // Generate thermal points from 1.13In up to magnetic low
    for (let mult = 1.13; mult < curve.isdMin; mult *= 1.15) {
      const I = mult * In;
      const tTrip = I2t / (I * I);
      if (tTrip > 0.001 && tTrip <= 10000) pts.push({ current_A: I, time_s: tTrip });
    }
    // Magnetic trip zone (instantaneous)
    pts.push({ current_A: magLo, time_s: 0.08 });
    pts.push({ current_A: magHi, time_s: 0.04 });
    // Beyond magnetic: instantaneous
    pts.push({ current_A: magHi * 2, time_s: 0.02 });
  } else if (device.type === 'fuse') {
    const size = device.rating;
    if (!size) return [];
    const i5s = FUSE_5S[size];
    const i04s = FUSE_0_4S[size];
    // Conventional non-fusing current ~1.25×In, fusing ~1.6×In at long times
    const iPreArc = 1.6 * size;
    pts.push({ current_A: iPreArc, time_s: 7200 });
    pts.push({ current_A: 2 * size, time_s: 600 });
    // 5s point
    if (i5s) pts.push({ current_A: i5s, time_s: 5 });
    // Interpolate between 5s and 0.4s log-log
    if (i5s && i04s) {
      const logI1 = Math.log10(i5s), logT1 = Math.log10(5);
      const logI2 = Math.log10(i04s), logT2 = Math.log10(0.4);
      for (let f = 0.2; f <= 0.8; f += 0.2) {
        const logI = logI1 + f * (logI2 - logI1);
        const logT = logT1 + f * (logT2 - logT1);
        pts.push({ current_A: Math.pow(10, logI), time_s: Math.pow(10, logT) });
      }
    }
    // 0.4s point
    if (i04s) pts.push({ current_A: i04s, time_s: 0.4 });
    // Beyond 0.4s: extrapolate to 0.01s
    if (i04s) {
      pts.push({ current_A: i04s * 2, time_s: 0.05 });
      pts.push({ current_A: i04s * 4, time_s: 0.01 });
    }
  } else if (device.type === 'mccb') {
    const In = device.rating || 400;
    const ioMult = device.ioMult || 0.8;
    const isdMult = device.isdMult || 2;
    const Ir = In * ioMult;
    const Isd = Ir * isdMult;
    // Long-time thermal zone
    const I2t = (1.1 * Ir) * (1.1 * Ir) * 3600;
    for (let mult = 1.05; mult < isdMult * ioMult; mult *= 1.2) {
      const I = mult * In;
      const tTrip = I2t / (I * I);
      if (tTrip > 0.001 && tTrip <= 10000) pts.push({ current_A: I, time_s: tTrip });
    }
    // Short-time (Isd) magnetic pickup
    pts.push({ current_A: Isd, time_s: 0.1 });
    pts.push({ current_A: Isd * 1.5, time_s: 0.05 });
    // Instantaneous
    pts.push({ current_A: In * 12, time_s: 0.02 });
  }
  // Sort ascending by current
  pts.sort(function (a, b) { return a.current_A - b.current_A; });
  return pts;
}

// checkSelectivity(upstream, downstream) — compare two T-I curves
function checkSelectivity(upstream, downstream) {
  const upCurve = getTripCurveData(upstream);
  const downCurve = getTripCurveData(downstream);
  if (upCurve.length < 2 || downCurve.length < 2) {
    return { selective: false, limitCurrent_A: 0, ratio: 0, message: { da: 'Utilstrækkelige data til analyse.', en: 'Insufficient data for analysis.' } };
  }
  // Helper: interpolate time at a given current from a curve (log-log)
  function timeAtCurrent(curve, I) {
    if (I <= curve[0].current_A) return curve[0].time_s * 2; // extrapolate slower
    if (I >= curve[curve.length - 1].current_A) return curve[curve.length - 1].time_s;
    for (let j = 1; j < curve.length; j++) {
      if (curve[j].current_A >= I) {
        const logI1 = Math.log10(curve[j - 1].current_A), logT1 = Math.log10(curve[j - 1].time_s);
        const logI2 = Math.log10(curve[j].current_A), logT2 = Math.log10(curve[j].time_s);
        const f = (Math.log10(I) - logI1) / (logI2 - logI1);
        return Math.pow(10, logT1 + f * (logT2 - logT1));
      }
    }
    return curve[curve.length - 1].time_s;
  }

  // Find selectivity limit: highest current where downstream trips faster than upstream
  let limitCurrent = 0;
  const testCurrents = [];
  for (let logI = 0; logI <= 5; logI += 0.05) testCurrents.push(Math.pow(10, logI));
  for (let i = 0; i < testCurrents.length; i++) {
    const I = testCurrents[i];
    const tUp = timeAtCurrent(upCurve, I);
    const tDown = timeAtCurrent(downCurve, I);
    if (tDown < tUp * 0.9) { // downstream is faster (selective)
      limitCurrent = I;
    }
  }

  // Ratio check (rule of thumb for gG fuses: ≥1.6:1)
  const ratio = (upstream.rating && downstream.rating) ? upstream.rating / downstream.rating : 0;
  const isFusesFuse = upstream.type === 'fuse' && downstream.type === 'fuse';
  const selective = isFusesFuse ? (ratio >= 1.6) : (limitCurrent > 0);

  if (selective) {
    return {
      selective: true, limitCurrent_A: Math.round(limitCurrent), ratio: +ratio.toFixed(2),
      message: {
        da: 'Selektiv op til ' + Math.round(limitCurrent) + ' A' + (isFusesFuse ? ' (forhold ' + ratio.toFixed(1) + ':1 ≥ 1,6:1)' : ''),
        en: 'Selective up to ' + Math.round(limitCurrent) + ' A' + (isFusesFuse ? ' (ratio ' + ratio.toFixed(1) + ':1 ≥ 1.6:1)' : '')
      }
    };
  }
  return {
    selective: false, limitCurrent_A: Math.round(limitCurrent), ratio: +ratio.toFixed(2),
    message: {
      da: 'IKKE selektiv' + (limitCurrent > 0 ? ' — overlap ved ' + Math.round(limitCurrent) + ' A' : '') + (isFusesFuse ? ' (forhold ' + ratio.toFixed(1) + ':1 < 1,6:1)' : ''),
      en: 'NOT selective' + (limitCurrent > 0 ? ' — overlap at ' + Math.round(limitCurrent) + ' A' : '') + (isFusesFuse ? ' (ratio ' + ratio.toFixed(1) + ':1 < 1.6:1)' : '')
    }
  };
}

// renderSelectivitySVG — inline SVG log-log T-I plot
function renderSelectivitySVG(upstream, downstream) {
  const upCurve = getTripCurveData(upstream);
  const downCurve = getTripCurveData(downstream);
  const sel = checkSelectivity(upstream, downstream);
  const W = 600, H = 400, pad = 60, padR = 30, padT = 30;
  const plotW = W - pad - padR, plotH = H - padT - pad;
  // Log scales: X = current 1A..100kA (0..5), Y = time 0.001s..10000s (-3..4)
  function xPos(logI) { return pad + (logI / 5) * plotW; }
  function yPos(logT) { return padT + ((4 - logT) / 7) * plotH; } // 7 decades
  function curvePath(curve, color) {
    if (curve.length < 2) return '';
    let d = '';
    curve.forEach(function (pt, i) {
      const x = xPos(Math.log10(Math.max(pt.current_A, 1)));
      const y = yPos(Math.log10(Math.max(pt.time_s, 0.001)));
      d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
    });
    return '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  }
  // Grid lines
  let grid = '';
  for (let i = 0; i <= 5; i++) {
    const x = xPos(i);
    grid += '<line x1="' + x + '" y1="' + padT + '" x2="' + x + '" y2="' + (H - pad) + '" stroke="#2a3645" stroke-width="0.5"/>';
    grid += '<text x="' + x + '" y="' + (H - pad + 14) + '" text-anchor="middle" font-size="9" fill="#8fa3b5">' + Math.pow(10, i) + '</text>';
  }
  for (let j = -3; j <= 4; j++) {
    const y = yPos(j);
    grid += '<line x1="' + pad + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="#2a3645" stroke-width="0.5"/>';
    grid += '<text x="' + (pad - 5) + '" y="' + (y + 3) + '" text-anchor="end" font-size="9" fill="#8fa3b5">' + (j < 0 ? '0.' + '0'.repeat(-j - 1) + '1' : Math.pow(10, j)) + '</text>';
  }
  // Selectivity limit line
  let limitLine = '';
  if (sel.limitCurrent_A > 0) {
    const lx = xPos(Math.log10(sel.limitCurrent_A));
    limitLine = '<line x1="' + lx + '" y1="' + padT + '" x2="' + lx + '" y2="' + (H - pad) + '" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="6,4"/>';
    limitLine += '<text x="' + lx + '" y="' + (padT - 5) + '" text-anchor="middle" font-size="9" font-weight="700" fill="#ffd166">' + Math.round(sel.limitCurrent_A) + ' A</text>';
  }
  // Labels
  const upLabel = (upstream.type === 'fuse' ? 'gG ' : (upstream.type === 'mccb' ? 'MCCB ' : 'MCB ' + (upstream.curve || '') + ' ')) + upstream.rating + 'A';
  const downLabel = (downstream.type === 'fuse' ? 'gG ' : (downstream.type === 'mccb' ? 'MCCB ' : 'MCB ' + (downstream.curve || '') + ' ')) + downstream.rating + 'A';

  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;max-width:600px;background:#0f1620;border-radius:12px;border:1px solid #2a3645">' +
    grid + limitLine +
    curvePath(upCurve, '#ff6b8a') + curvePath(downCurve, '#00d0ff') +
    '<text x="' + (W - padR - 5) + '" y="' + (H - pad + 30) + '" text-anchor="end" font-size="10" fill="#8fa3b5">' + (lang === 'da' ? 'Strøm [A]' : 'Current [A]') + '</text>' +
    '<text x="' + (pad - 35) + '" y="' + (padT + plotH / 2) + '" text-anchor="middle" font-size="10" fill="#8fa3b5" transform="rotate(-90,' + (pad - 35) + ',' + (padT + plotH / 2) + ')">' + (lang === 'da' ? 'Tid [s]' : 'Time [s]') + '</text>' +
    '<rect x="' + (pad + 10) + '" y="' + (padT + 5) + '" width="12" height="3" fill="#ff6b8a"/>' +
    '<text x="' + (pad + 26) + '" y="' + (padT + 9) + '" font-size="9" fill="#ff6b8a">' + upLabel + ' (' + (lang === 'da' ? 'opstrøms' : 'upstream') + ')</text>' +
    '<rect x="' + (pad + 10) + '" y="' + (padT + 18) + '" width="12" height="3" fill="#00d0ff"/>' +
    '<text x="' + (pad + 26) + '" y="' + (padT + 22) + '" font-size="9" fill="#00d0ff">' + downLabel + ' (' + (lang === 'da' ? 'nedstrøms' : 'downstream') + ')</text>' +
    '</svg>';
}

// renderSelectivity — the selectivity module UI
function renderSelectivity() {
  const ss = selectivityState;
  const deviceTypes = [
    { label: 'MCB B', opts: [6, 10, 13, 16, 20, 25, 32, 40, 50, 63], type: 'mcb', curve: 'B' },
    { label: 'MCB C', opts: [6, 10, 13, 16, 20, 25, 32, 40, 50, 63], type: 'mcb', curve: 'C' },
    { label: 'MCB D', opts: [10, 16, 20, 25, 32, 40, 50, 63], type: 'mcb', curve: 'D' },
    { label: 'gG ' + (lang === 'da' ? 'sikring' : 'fuse'), opts: [6, 10, 13, 16, 20, 25, 32, 40, 50, 63, 80, 100, 125, 160, 200, 250], type: 'fuse', curve: null },
    { label: 'MCCB', opts: [100, 160, 250, 400, 630], type: 'mccb', curve: null }
  ];

  function renderDeviceSelector(role) {
    const selected = ss[role];
    let html = '';
    deviceTypes.forEach(function (dt) {
      html += '<div class="select-group"><div class="select-label">' + dt.label + '</div><div class="select-grid">';
      dt.opts.forEach(function (r) {
        const isSel = selected && selected.type === dt.type && selected.curve === dt.curve && selected.rating === r;
        html += '<button class="sel-btn ' + (isSel ? 'selected' : '') + '" onclick="selectivityState.' + role + '={type:\'' + dt.type + '\',curve:' + (dt.curve ? '\'' + dt.curve + '\'' : 'null') + ',rating:' + r + (dt.type === 'mccb' ? ',ioMult:0.8,isdMult:2' : '') + '};selectivityState.showProof=false;renderModule(\'selectivity\')">' + r + '</button>';
      });
      html += '</div></div>';
    });
    return html;
  }

  let result = '';
  if (ss.upstream && ss.downstream) {

    const boxClass = sel.selective ? '' : 'error';
    const badge = sel.selective ? '<span class="verify-badge ok">✓ ' + (lang === 'da' ? 'SELEKTIV' : 'SELECTIVE') + '</span>' : '<span class="verify-badge fail">✗ ' + (lang === 'da' ? 'IKKE SELEKTIV' : 'NOT SELECTIVE') + '</span>';

    '<div class="card-title" style="font-size:0.9rem;border:none;padding:0;margin:12px 0 0">↑ ' + t('selectUpstream') + '</div>' +

// ============================================================================
// ===== FEATURE B: COMMISSIONING WITNESS MODE (DS/HD 60364-6 §6.4) ===========
// Step-by-step test sequence per the standard's verification requirements.
// ============================================================================

const COMMISSION_TESTS = [
  { id: 'pe', keyName: 'commTestPE', requirement: { da: 'Kontinuitet ≤ 1 Ω (DS/HD 60364-6 §61.3.2)', en: 'Continuity ≤ 1 Ω (DS/HD 60364-6 §61.3.2)' }, options: [0.1, 0.2, 0.3, 0.5, 0.7, 1.0, 1.5, 2.0, 3.0, 5.0], unit: 'Ω', check: function (v) { return v <= 1.0; } },
  { id: 'insulation', keyName: 'commTestInsul', requirement: { da: 'Isolationsmodstand ≥ 1 MΩ ved 500V DC (DS/HD 60364-6 §61.3.3)', en: 'Insulation resistance ≥ 1 MΩ at 500V DC (DS/HD 60364-6 §61.3.3)' }, options: [0.5, 1, 2, 5, 10, 20, 50, 100, 200, 500, 999], unit: 'MΩ', check: function (v) { return v >= 1; } },
  { id: 'polarity', keyName: 'commTestPol', requirement: { da: 'Korrekt polaritet (DS/HD 60364-6 §61.3.4)', en: 'Correct polarity (DS/HD 60364-6 §61.3.4)' }, options: ['PASS', 'FAIL'], unit: '', check: function (v) { return v === 'PASS'; } },
  { id: 'zs', keyName: 'commTestZs', requirement: { da: 'Zs ≤ Zs_max (DS/HD 60364-6 §61.3.6)', en: 'Zs ≤ Zs_max (DS/HD 60364-6 §61.3.6)' }, options: [0.1, 0.2, 0.3, 0.5, 0.7, 1.0, 1.5, 2.0, 3.0, 5.0, 7.0, 10.0], unit: 'Ω', check: function (v) { try { var b = evaluateCorrectnessVerdicts(); if (b.zs && b.zs.values && b.zs.values.zsMax) return v <= b.zs.values.zsMax; } catch (e) {} return v <= 2.0; } },
  { id: 'rcd1', keyName: 'commTestRCD1', requirement: { da: 'RCD ×1 IΔn ≤ 300 ms (DS/HD 60364-6 §61.3.7)', en: 'RCD ×1 IΔn ≤ 300 ms (DS/HD 60364-6 §61.3.7)' }, options: [10, 20, 30, 50, 80, 100, 150, 200, 250, 300], unit: 'ms', check: function (v) { return v <= 300; } },
  { id: 'rcd5', keyName: 'commTestRCD5', requirement: { da: 'RCD ×5 IΔn ≤ 40 ms (DS/HD 60364-6 §61.3.7)', en: 'RCD ×5 IΔn ≤ 40 ms (DS/HD 60364-6 §61.3.7)' }, options: [5, 8, 10, 15, 20, 25, 30, 35, 40, 50], unit: 'ms', check: function (v) { return v <= 40; } },
  { id: 'phase', keyName: 'commTestPhase', requirement: { da: 'Korrekt fasesekvens L1-L2-L3 (DS/HD 60364-6 §61.3.8)', en: 'Correct phase sequence L1-L2-L3 (DS/HD 60364-6 §61.3.8)' }, options: ['L1-L2-L3', (typeof lang !== 'undefined' && lang === 'en') ? 'Reverse' : 'Omvendt', 'N/A'], unit: '', check: function (v) { return v === 'L1-L2-L3' || v === 'N/A'; } }
];

function commSetValue(stepIdx, val) {
  commissionState.results[stepIdx] = val;
  renderModule('commission');
}
function commNext() { if (commissionState.step < COMMISSION_TESTS.length - 1) { commissionState.step++; renderModule('commission'); } }
function commPrev() { if (commissionState.step > 0) { commissionState.step--; renderModule('commission'); } }
function commRestart() { commissionState = { step: 0, results: [], projectName: commissionState.projectName, date: commissionState.date }; renderModule('commission'); }
function commSetProject(name) { commissionState.projectName = name; }
function commSetDate(d) { commissionState.date = d; }

  svg += '<text x="397" y="62" text-anchor="middle" font-size="11" fill="#555">' + (commissionState.projectName || 'Projekt') + ' | ' + (commissionState.date || new Date().toLocaleDateString('da-DK')) + ' | El-Dimensionering v' + DATA_VERSION + '</text>';

  COMMISSION_TESTS.forEach(function (test, i) {

    svg += '<text x="350" y="' + (y + 16) + '" font-size="8" fill="#555">' + (lang === 'da' ? test.requirement.da : test.requirement.en) + '</text>';
    svg += '<text x="560" y="' + (y + 16) + '" font-size="9" fill="#111" font-weight="600">' + (val != null ? val + ' ' + test.unit : '—') + '</text>';

  // Final verdict

  svg += '<text x="397" y="' + (y + 23) + '" text-anchor="middle" font-size="14" font-weight="700" fill="' + (allPass ? '#059669' : '#dc2626') + '">' + (allPass ? (lang === 'da' ? '✓ BESTÅET — Installationen er godkendt til drift' : '✓ PASS — Installation approved for operation') : (lang === 'da' ? '✗ IKKE BESTÅET — Udbedring påkrævet' : '✗ FAIL — Remedial action required')) + '</text>';
  svg += '</svg>';
  return svg;
}

  var cs = commissionState;

// ============================================================================
// ===== FEATURE C: FORENSIC EXPLAINER ("Why Did It Fail?") ====================
// Attached to every FAIL verdict — causal chain + ranked fix options.
// ============================================================================

// buildForensicExplanation(verdict, env) — returns { causal:{da,en}, fixes:[{desc:{da,en},fixed:bool}] }
function buildForensicExplanation(verdict, env) {
  env = env || {};
  var result = { causal: { da: '', en: '' }, fixes: [] };
  if (!verdict || verdict.state !== 'FAIL') return result;
  var vals = verdict.values || {};

  if (verdict.id === 'ampacity') {
    // Causal chain
    var cs = (typeof cableState !== 'undefined') ? cableState : {};
    var caKey = cs.temp, cgKey = cs.grouping, kKey = cs.installMethod;
    var ca = getCorrectionFactor('ca', caKey);
    var cg = getCorrectionFactor('cg', cgKey);
    var kI = getCorrectionFactor('kInstall', kKey);
    result.causal.da = 'Derated_Iz = Base_Iz(' + (vals.baseIz || '?') + 'A) × Ca(' + ca.value.toFixed(2) + ') × Cg(' + cg.value.toFixed(2) + ') × k_install(' + kI.value.toFixed(2) + ') = ' + (vals.deratedIz || '?') + ' A. In(' + (vals.inA || '?') + 'A) > ' + (vals.deratedIz || '?') + 'A → FEJL';
    result.causal.en = 'Derated_Iz = Base_Iz(' + (vals.baseIz || '?') + 'A) × Ca(' + ca.value.toFixed(2) + ') × Cg(' + cg.value.toFixed(2) + ') × k_install(' + kI.value.toFixed(2) + ') = ' + (vals.deratedIz || '?') + ' A. In(' + (vals.inA || '?') + 'A) > ' + (vals.deratedIz || '?') + 'A → FAIL';

    // Fix options
    // 1. Reduce grouping
    if (cgKey && cgKey > 1) {
      var newCg = Math.max(1, Math.ceil(cgKey / 3));
      var newCgFactor = getCorrectionFactor('cg', newCg).value;
      var newIz1 = Math.floor((vals.baseIz || 0) * ca.value * newCgFactor * kI.value * 100) / 100;
      var fixes1 = newIz1 >= (vals.inA || 0);
      result.fixes.push({ desc: { da: 'Reducer gruppering fra ' + cgKey + '→' + newCg + ': Iz stiger til ' + newIz1.toFixed(0) + 'A ' + (fixes1 ? '✅' : '(utilstrækkelig)'), en: 'Reduce grouping from ' + cgKey + '→' + newCg + ': Iz rises to ' + newIz1.toFixed(0) + 'A ' + (fixes1 ? '✅' : '(insufficient)') }, fixed: fixes1 });
    }
    // 2. Upsize cable
    var currentCsa = cs.crossSection ? parseFloat(cs.crossSection) : 0;
    var nextCsa = STANDARD_CSA.find(function (s) { return s > currentCsa; });
    if (nextCsa) {
      var izTable = (typeof izTableFor === 'function') ? izTableFor() : {};
      var newBase = izTable[nextCsa] || 0;
      var newIz2 = Math.floor(newBase * ca.value * cg.value * kI.value * 100) / 100;
      var fixes2 = newIz2 >= (vals.inA || 0);
      result.fixes.push({ desc: { da: 'Opskalér kabel til ' + nextCsa + 'mm²: Iz = ' + newIz2.toFixed(0) + 'A ' + (fixes2 ? '✅' : '(utilstrækkelig)'), en: 'Upsize cable to ' + nextCsa + 'mm²: Iz = ' + newIz2.toFixed(0) + 'A ' + (fixes2 ? '✅' : '(insufficient)') }, fixed: fixes2 });
    }
    // 3. Change installation method
    if (kKey !== 'E' && kKey !== 'F' && kKey !== 'G') {
      var betterK = INSTALL_METHODS['E'] || 1.04;
      var newIz3 = Math.floor((vals.baseIz || 0) * ca.value * cg.value * betterK * 100) / 100;
      var fixes3 = newIz3 >= (vals.inA || 0);
      result.fixes.push({ desc: { da: 'Skift metode til E (perforeret bakke): Iz = ' + newIz3.toFixed(0) + 'A ' + (fixes3 ? '✅' : '(utilstrækkelig)'), en: 'Change method to E (perforated tray): Iz = ' + newIz3.toFixed(0) + 'A ' + (fixes3 ? '✅' : '(insufficient)') }, fixed: fixes3 });
    }
  } else if (verdict.id === 'overload') {
    var factor = vals.factor || 1.6;
    result.causal.da = 'I₂ = ' + factor + ' × In(' + (vals.inA || '?') + 'A) = ' + (vals.i2 || '?') + 'A. Grænse = 1,45 × Iz(' + (vals.deratedIz || '?') + 'A) = ' + (vals.limit || '?') + 'A. ' + (vals.i2 || 0) + ' > ' + (vals.limit || 0) + ' → FEJL';
    result.causal.en = 'I₂ = ' + factor + ' × In(' + (vals.inA || '?') + 'A) = ' + (vals.i2 || '?') + 'A. Limit = 1.45 × Iz(' + (vals.deratedIz || '?') + 'A) = ' + (vals.limit || '?') + 'A. ' + (vals.i2 || 0) + ' > ' + (vals.limit || 0) + ' → FAIL';
    // Fix: increase cable size
    if (vals.i2 && vals.i2 > 0) {
      var reqIz = vals.i2 / 1.45;
      result.fixes.push({ desc: { da: 'Behøver Iz ≥ ' + reqIz.toFixed(1) + 'A (I₂/1,45). Opskalér kabeltværsnit.', en: 'Need Iz ≥ ' + reqIz.toFixed(1) + 'A (I₂/1.45). Upsize cable cross-section.' }, fixed: false });
    }
    // Fix: use MCB instead of fuse (lower I2 factor)
    if (vals.factor > 1.45) {
      var newI2 = 1.45 * (vals.inA || 0);
      var wouldPass = newI2 <= (vals.limit || 0);
      result.fixes.push({ desc: { da: 'Skift til MCB/MCCB (I₂=1,45×In=' + newI2.toFixed(1) + 'A) i stedet for sikring ' + (wouldPass ? '✅' : ''), en: 'Switch to MCB/MCCB (I₂=1.45×In=' + newI2.toFixed(1) + 'A) instead of fuse ' + (wouldPass ? '✅' : '') }, fixed: wouldPass });
    }
  } else if (verdict.id === 'adiabatic') {
    result.causal.da = 'I²t = Isc²(' + (vals.isc || '?') + '²) × t(' + (vals.tClear || '?') + 's) = ' + Math.round(vals.i2t || 0) + '. k²S² = ' + (vals.k || '?') + '² × ' + (vals.sArea || '?') + '² = ' + Math.round(vals.withstand || 0) + '. ' + Math.round(vals.withstand || 0) + ' < ' + Math.round(vals.i2t || 0) + ' → FEJL';
    result.causal.en = 'I²t = Isc²(' + (vals.isc || '?') + '²) × t(' + (vals.tClear || '?') + 's) = ' + Math.round(vals.i2t || 0) + '. k²S² = ' + (vals.k || '?') + '² × ' + (vals.sArea || '?') + '² = ' + Math.round(vals.withstand || 0) + '. ' + Math.round(vals.withstand || 0) + ' < ' + Math.round(vals.i2t || 0) + ' → FAIL';
    if (vals.recommendedCsa) {
      result.fixes.push({ desc: { da: 'Opskalér kabel til ≥ ' + vals.recommendedCsa + ' mm² (S_min = ' + (vals.sMin || 0).toFixed(2) + ' mm²) ✅', en: 'Upsize cable to ≥ ' + vals.recommendedCsa + ' mm² (S_min = ' + (vals.sMin || 0).toFixed(2) + ' mm²) ✅' }, fixed: true });
    }
    // Fix: reduce clearing time
    if (vals.isc && vals.sArea && vals.k) {
      var maxT = (vals.k * vals.k * vals.sArea * vals.sArea) / (vals.isc * vals.isc);
      result.fixes.push({ desc: { da: 'Reducer udkoblingstid til < ' + maxT.toFixed(3) + ' s (hurtigere enhed)', en: 'Reduce clearing time to < ' + maxT.toFixed(3) + ' s (faster device)' }, fixed: false });
    }
  } else if (verdict.id === 'zs') {
    if (vals.zsActual != null && vals.zsMax != null) {
      result.causal.da = 'Zs = ' + (vals.zsActual || '?') + ' Ω > Zs_max = ' + (vals.zsMax || '?') + ' Ω (= U₀/' + (vals.ia || 'Ia') + ') → FEJL';
      result.causal.en = 'Zs = ' + (vals.zsActual || '?') + ' Ω > Zs_max = ' + (vals.zsMax || '?') + ' Ω (= U₀/' + (vals.ia || 'Ia') + ') → FAIL';
    } else if (vals.touchVoltage != null) {
      result.causal.da = 'Zs × IΔn = ' + (vals.touchVoltage || '?') + ' V > 50 V → FEJL';
      result.causal.en = 'Zs × IΔn = ' + (vals.touchVoltage || '?') + ' V > 50 V → FAIL';
    }
    // Fix options
    result.fixes.push({ desc: { da: 'Tilføj RCD med lavere IΔn (f.eks. 30 mA) for at sikre udkobling', en: 'Add RCD with lower IΔn (e.g. 30 mA) to ensure disconnection' }, fixed: false });
    result.fixes.push({ desc: { da: 'Opskalér kabeltværsnit (reducerer impedans) eller forkort kabellængde', en: 'Upsize cable cross-section (reduces impedance) or shorten cable length' }, fixed: false });
  }

  // Sort fixes: fixed=true first (proven solutions first)
  result.fixes.sort(function (a, b) { return (b.fixed ? 1 : 0) - (a.fixed ? 1 : 0); });
  return result;
}
