# ---------------------------------------------------------------------------
# STP Platform — Docker Compose production deployment
# ---------------------------------------------------------------------------
# Quick start:
#   cp .env.example .env   (then fill in real secrets)
#   docker compose up --build -d
#   docker compose exec backend npx prisma db push
#   docker compose exec backend npx tsx prisma/seed.ts
# ---------------------------------------------------------------------------
# TLS REQUIREMENT:
# Session cookies set Secure=true in production, so a TLS-terminating reverse
# proxy MUST sit in front of nginx for production use. Options include:
#   - Cloudflare Tunnel (recommended for zero-config TLS)
#   - Caddy (automatic HTTPS via Let's Encrypt)
#   - Traefik or a cloud load balancer with TLS termination
# Without TLS, browsers will reject the session cookie and login will fail.
# For local testing without TLS, set NODE_ENV=development in .env.
# ---------------------------------------------------------------------------

services:
  # PostgreSQL database — isolated on internal network only
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # Fastify backend — not exposed to host, only reachable via nginx
  backend:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      CORS_ORIGINS: ""
      NODE_ENV: production
      DATA_REGION: eu-west
    networks:
      - internal

  # Nginx frontend — serves static files and proxies API requests
  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - internal
      - web

volumes:
  pgdata:

networks:
  internal:
    internal: true
  web:
