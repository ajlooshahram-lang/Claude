version: "3.8"

services:
  db:
    image: postgres:16-alpine
    volumes:
      - qi_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-qi_platform}
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qi} -d ${POSTGRES_DB:-qi_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qi}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-qi_platform}?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY must be set}
      NODE_ENV: production
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    networks:
      - internal
      - default
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./qi-webapp:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - default
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  qi_data:
