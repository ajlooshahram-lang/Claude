version: "3.8"

services:
  db:
    image: postgres:16-alpine
    volumes:
      - qi_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-qi_platform}
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qi} -d ${POSTGRES_DB:-qi_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qi}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-qi_platform}?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY must be set}
      NODE_ENV: production
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    networks:
      - internal
      - default
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./qi-webapp:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - default
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-qi}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATABASE: ${POSTGRES_DB:-qi_platform}
    volumes:
      - ./backups:/backups
    networks:
      - internal
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup service started. Running daily pg_dump with 30-day retention."
        while true; do
          sleep 86400
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          DUMP_FILE="/backups/$${PGDATABASE}_$${TIMESTAMP}.sql.gz"
          echo "Creating backup: $${DUMP_FILE}"
          pg_dump -h "$${PGHOST}" -U "$${PGUSER}" "$${PGDATABASE}" | gzip > "$${DUMP_FILE}"
          if [ $$? -eq 0 ]; then
            echo "Backup completed: $${DUMP_FILE}"
          else
            echo "Backup failed"
          fi
          echo "Removing backups older than 30 days..."
          find /backups -name "*.sql.gz" -mtime +30 -delete
        done

networks:
  internal:
    driver: bridge

volumes:
  qi_data:
  backups:
