<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QI Intelligence Platform</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" id="brandMark">QI<img id="brandLogo" alt="" hidden></div>
        <div class="brand-text">
          <strong id="brandCompany">QI Platform</strong>
          <span id="brandProject">QI Intelligence Program</span>
        </div>
      </div>
      <div class="projswitch">
        <select id="projectSwitch" title="Switch project"></select>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-foot">
        <button class="btn btn-primary block" id="navAddCase">+ New Case</button>
        <button class="sidebar-toggle" id="btnSidebar" title="Collapse sidebar" aria-label="Collapse sidebar">«</button>
        <span class="savedhint" id="savedHint">Auto-saved locally</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topbar-actions">
          <button class="btn btn-icon" id="btnTheme" title="Toggle dark mode (t)" aria-label="Toggle theme">◐</button>
          <button class="btn btn-icon" id="btnChecks" title="Run all checks (c)" aria-label="Run checks">✓</button>
          <button class="btn btn-icon" id="btnHelp" title="Keyboard shortcuts (?)" aria-label="Help">?</button>
          <button class="btn" id="btnShare">Share</button>
          <button class="btn" id="btnPrint">Print</button>
          <button class="btn" id="btnExport">Export</button>
          <button class="btn" id="btnImport">Import</button>
          <input type="file" id="fileImport" accept="application/json" hidden />
        </div>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>

  <!-- modal host -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>
  <button class="fab" id="fab" title="Add new case (n)" aria-label="Add new case">+</button>
  <div class="toast" id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/store.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
