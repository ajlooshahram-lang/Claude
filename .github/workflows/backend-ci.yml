name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: server

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://qi:qi@localhost:5432/qi_platform?schema=public"
      SESSION_SECRET: "ci-session-secret-min-16-chars"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qi
          POSTGRES_PASSWORD: qi
          POSTGRES_DB: qi_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Typecheck + build
        run: npm run build

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
