name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: server

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      # Dummy connection string: Prisma validate/generate read it but never connect.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/qi_ci?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck + build
        run: npm run build

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
